<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>

<body>

<header class="hero">
  <div class="hero-corner">S</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Shader<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">GLSL/HLSL shader kodları üreten, optimize eden ve görselleştiren AI asistanı.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>31</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Shader ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">31</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">
    <div class="empty" id="emptyState">
      <div class="glyph">◈</div>

const CATS = [{"id":"C++","name":"C++","color":"#4a9eff","count":16},{"id":"Rust","name":"Rust","color":"#5ed47e","count":3},{"id":"GLSL","name":"GLSL","color":"#a375ff","count":3},{"id":"C","name":"C","color":"#ff6b6b","count":3},{"id":"HLSL","name":"HLSL","color":"#d4a04c","count":2},{"id":"C#","name":"C#","color":"#4cc9c9","count":1},{"id":"Python","name":"Python","color":"#ff6b9d","count":1},{"id":"ShaderLab","name":"ShaderLab","color":"#fb923c","count":1},{"id":"TypeScript","name":"TypeScript","color":"#4a9eff","count":1}];
const ITEMS = [{"id":1,"cat":"C++","name":"3d-game-shaders-for-beginners","desc":"🎮 A step-by-step guide to implementing SSAO, depth of field, lighting, normal mapping, and more for your 3D game.","tags":["3d","3d-graphics","game-development","gamedev","★19661"],"badge1":"C++","badge2":"★ 19.661","content":"## 3D Oyun Shader'larına Giriş Rehberi\n\nBu açık kaynak kitap, gerçek oyun motorlarında kullanılan render tekniklerini öğretmek için adım adım GLSL shader örnekleri sunar.\n\n**İçerik:**\n- Lighting modelleri: Phong, Blinn-Phong, PBR\n- Post-processing: SSAO, bloom, tone mapping, chromatic aberration\n- Performans: draw call batch, instancing, LOD\n- Her bölüm çalışan demo kodu + açıklama\n\n**Başlangıç:**\n```bash\ngit clone https://github.com/lettier/3d-game-shaders-for-beginners\ncd 3d-game-shaders-for-beginners\nmake run  # Panda3D gerekir\n```\n\n**Prompt:** \"Bu kitaptaki SSAO implementasyonunun temel adımlarını açıkla ve fragment shader kodunda depth buffer nasıl okunur?\"","meta":{"Yıldız":19661,"Dil":"C++","Fork":1474},"source":{"url":"https://github.com/lettier/3d-game-shaders-for-beginners","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"lettier"},"no":"001"},{"id":2,"cat":"C++","name":"slang","desc":"Making it easier to work with shaders","tags":["cuda","d3d12","glsl","hlsl","★5345"],"badge1":"C++","badge2":"★ 5.345","content":"## Slang: Yüksek Performanslı GPU Shader Dili\n\nMicrosoft'un geliştirdiği Slang, HLSL üzerine inşa edilmiş modüler, cross-platform shader dilidir. Generics, interfaces ve module sistemi ile büyük shader codebase yönetimini kolaylaştırır.\n\n**Temel özellikler:**\n- HLSL/GLSL/SPIR-V/WGSL'ye derler\n- Generic tipler ve interface tabanlı polimorfizm\n- Reflection API: shader parametre adlarını runtime'da sorgulama\n- Modül sistemi: `import lighting;` tarzı kod organizasyonu\n\n**Kurulum:**\n```bash\n# Prebuilt binary indir\ncurl -LO https://github.com/shader-slang/slang/releases/latest/download/slang-linux-x86_64.zip\nunzip slang-linux-x86_64.zip\n./slangc hello.slang -target spirv -o hello.spv\n```\n\n**Prompt:** \"Slang dilinde PBR materyal interface'i tanımla ve farklı surface tipleri için implement et.\"","meta":{"Yıldız":5345,"Dil":"C++","Fork":450},"source":{"url":"https://github.com/shader-slang/slang","license":"NOASSERTION","author":"shader-slang"},"no":"002"},{"id":3,"cat":"C++","name":"SHADERed","desc":"Lightweight, cross-platform & full-featured shader IDE","tags":["debugger","game-development","glsl","glsl-editors","★4754"],"badge1":"C++","badge2":"★ 4.754","content":"## SHADERed: Gerçek Zamanlı Shader IDE\n\nSHADERed, GLSL ve HLSL shader geliştirmek için masaüstü IDE'dir. Gerçek zamanlı önizleme, hata ayıklama ve profiling özelliklerine sahiptir.\n\n**Kurulum:**\n```bash\n# Linux (AppImage)\nwget https://github.com/dfranx/SHADERed/releases/download/v1.5.1/SHADERed.AppImage\nchmod +x SHADERed.AppImage && ./SHADERed.AppImage\n```\n\n**Workflow:**\n1. Yeni proje → Geometry Pass ekle → Quad mesh seç\n2. Fragment shader yaz → Ctrl+S ile kaydet (anında derlenir)\n3. Değişkeni sağ tıkla → \"Watch\" → değer değişimini gerçek zamanlı izle\n4. Profiler → GPU zamanlaması → bottleneck tespit et\n\n**Prompt:** \"SHADERed'de bir procedural noise shader yaz: fBm gürültüsü ile dağ arazi haritası üret, debug penceresiyle intermediate değerleri göster.\"","meta":{"Yıldız":4754,"Dil":"C++","Fork":312},"source":{"url":"https://github.com/dfranx/SHADERed","license":"MIT","author":"dfranx"},"no":"003"},{"id":4,"cat":"C++","name":"glslang","desc":"Khronos-reference front end for GLSL/ESSL, partial front end for HLSL, and a SPIR-V generator.","tags":["compiler","essl","glsl","glslang","★3519"],"badge1":"C++","badge2":"★ 3.519","content":"## glslang: Khronos Resmi GLSL Derleyicisi\n\nglslang, OpenGL ve Vulkan için GLSL/HLSL'i SPIR-V'ye derleyen referans derleyicidir. CI pipeline'larında shader doğrulama ve optimizasyon için kullanılır.\n\n**Kurulum:**\n```bash\napt install glslang-tools  # Ubuntu\n# veya kaynak\ngit clone https://github.com/KhronosGroup/glslang && cmake -B build && cmake --build build\n```\n\n**Temel kullanım:**\n```bash\n# GLSL → SPIR-V\nglslangValidator -V shader.frag -o shader.frag.spv\n# Validate (derleme olmadan)\nglslangValidator --stdin -S frag < shader.frag\n# HLSL → SPIR-V\nglslangValidator -V -D shader.hlsl -S vert --entry-point VSMain -o vert.spv\n```\n\n**Prompt:** \"glslang ile compute shader'ı validate et ve SPIR-V binary'den GLSL geri dönüştürme adımlarını açıkla.\"","meta":{"Yıldız":3519,"Dil":"C++","Fork":971},"source":{"url":"https://github.com/KhronosGroup/glslang","license":"NOASSERTION","author":"KhronosGroup"},"no":"004"},{"id":5,"cat":"Rust","name":"FastNoiseLite","desc":"Fast Portable Noise Library - C# C++ C Java HLSL GLSL JavaScript Rust Go ","tags":["cellular-noise","cubic-noise","fractal-algorithms","hacktoberfest","★3420"],"badge1":"Rust","badge2":"★ 3.420","content":"## FastNoiseLite: Çoklu Dil Noise Kütüphanesi\n\nFastNoiseLite, CPU ve GPU'da çalışan, 20+ noise türünü tek header dosyasında sunan hız odaklı noise kütüphanesidir. C++, C#, Java, HLSL, GLSL versiyonları mevcuttur.\n\n**Desteklenen noise tipleri:** Perlin, Simplex, Cellular (Voronoi), Value, Domain Warp\n\n**GLSL örnek:**\n```glsl\n#include \"FastNoiseLite.glsl\"\nvoid main() {\n  fnl_state noise = fnlCreateState(1337);\n  noise.noise_type = FNL_NOISE_OPENSIMPLEX2;\n  noise.frequency = 0.01;\n  float n = fnlGetNoise2D(noise, gl_FragCoord.x, gl_FragCoord.y);\n  fragColor = vec4(vec3(n * 0.5 + 0.5), 1.0);\n}\n```\n\n**Prompt:** \"FastNoiseLite ile 3D terrain generator yaz: fBm katmanları, domain warp ve ridged noise kombinasyonu ile gerçekçi dağ arazi üret.\"","meta":{"Yıldız":3420,"Dil":"Rust","Fork":367},"source":{"url":"https://github.com/Auburn/FastNoiseLite","license":"MIT","author":"Auburn"},"no":"005"},{"id":6,"cat":"GLSL","name":"lygia","desc":"LYGIA, it's a granular and multi-language (GLSL, HLSL, Metal,  WGSL,  WEGL and CUDA) shader library designed for perform","tags":["cuda","directx","glsl","hlsl","★3352"],"badge1":"GLSL","badge2":"★ 3.352","content":"## LYGIA: Modüler GLSL/WGSL Shader Kütüphanesi\n\nLYGIA, `#include` ile kullanılabilen modüler shader fonksiyon kütüphanesidir. Renk dönüşümleri, filtreler, matematiksel yardımcılar ve SDF fonksiyonları içerir.\n\n**Kullanım (URL-based import):**\n```glsl\n#ifdef GL_ES\nprecision mediump float;\n#endif\n#include \"lygia/color/space/rgb2hsv.glsl\"\n#include \"lygia/math/sdf/circle.glsl\"\nvoid main() {\n  vec2 uv = gl_FragCoord.xy / u_resolution.xy;\n  float d = sdCircle(uv - 0.5, 0.3);\n  gl_FragColor = vec4(rgb2hsv(vec3(d, 0.8, 0.9)), 1.0);\n}\n```\n\n**Popüler modüller:** `color/`, `filter/bloom`, `math/sdf/*`, `lighting/pbr`, `generative/fbm`\n\n**Prompt:** \"LYGIA kütüphanesini kullanarak SDF tabanlı 2D logo animasyonu yaz; smooth union ve domain repetition teknikleriyle.\"","meta":{"Yıldız":3352,"Dil":"GLSL","Fork":216},"source":{"url":"https://github.com/patriciogonzalezvivo/lygia","license":"NOASSERTION","author":"patriciogonzalezvivo"},"no":"006"},{"id":7,"cat":"C++","name":"shaderc","desc":"A collection of tools, libraries, and tests for Vulkan shader compilation.","tags":["compiler","glsl","glslang","graphics","★2151"],"badge1":"C++","badge2":"★ 2.151","content":"## shaderc: Google'ın Shader Derleme Kütüphanesi\n\nshaderc, GLSL/HLSL'i SPIR-V'ye derleyen C API ve komut satırı aracı sağlar. Vulkan uygulamalarında runtime shader derleme için kullanılır.\n\n**Kurulum:**\n```bash\n# vcpkg\nvcpkg install shaderc\n# veya pip (Python binding)\npip install pyshaderc\n```\n\n**C++ örnek:**\n```cpp\n#include <shaderc/shaderc.hpp>\nshaderc::Compiler compiler;\nshaderc::CompileOptions options;\noptions.SetOptimizationLevel(shaderc_optimization_level_performance);\nauto result = compiler.CompileGlslToSpv(\n  source, shaderc_glsl_fragment_shader, \"shader.frag\", options);\nif (result.GetCompilationStatus() != shaderc_compilation_status_success)\n  std::cerr << result.GetErrorMessage();\n```\n\n**Prompt:** \"shaderc ile runtime shader hot-reload sistemi kur; dosya değişikliğini izle, yeniden derle ve Vulkan pipeline'ı güncel tut.\"","meta":{"Yıldız":2151,"Dil":"C++","Fork":423},"source":{"url":"https://github.com/google/shaderc","license":"NOASSERTION","author":"google"},"no":"007"},{"id":8,"cat":"C++","name":"ShaderConductor","desc":"ShaderConductor is a tool designed for cross-compiling HLSL to other shading languages","tags":["compiler","d3d10","d3d11","d3d12","★1837"],"badge1":"C++","badge2":"★ 1.837","content":"## ShaderConductor: Cross-Platform Shader Dönüştürücü\n\nMicrosoft'un ShaderConductor'u, HLSL'i GLSL, MSL (Metal), ESSL ve SPIR-V'ye çevirir. DXC (DirectX Shader Compiler) tabanlıdır.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/microsoft/ShaderConductor\ncmake -B build -DCMAKE_BUILD_TYPE=Release\ncmake --build build\n```\n\n**CLI kullanım:**\n```bash\nShaderConductorCmd -I DxInput.hlsl -S Pixel -T msl -O MetalOutput.msl\nShaderConductorCmd -I DxInput.hlsl -S Vertex -T glsl -O GLSLOutput.glsl\n```\n\n**C API:**\n```c\nScDesc desc = { .source = hlslSource, .stage = SsPixelShader,\n                .language = SlMsl };\nScOutput output = ScCompile(&desc);\n```\n\n**Prompt:** \"ShaderConductor ile HLSL PBR shader'ını Metal (iOS) ve GLSL ES 3.0 (Android) için otomatik dönüştür; her platform için optimizasyon farklarını analiz et.\"","meta":{"Yıldız":1837,"Dil":"C++","Fork":264},"source":{"url":"https://github.com/microsoft/ShaderConductor","license":"MIT","author":"microsoft"},"no":"008"},{"id":9,"cat":"GLSL","name":"ShaderMan","desc":"Convert ShaderToy to Unity  HLSL/CG","tags":["glsl","shaders","shadertoy","unity","★1501"],"badge1":"GLSL","badge2":"★ 1.501","content":"## ShaderMan: GLSL Shader Asset Yöneticisi\n\nShaderMan, GLSL shader'larını proje bazlı organize eden, önizleme ve export özellikleri sunan hafif bir yönetim aracıdır.\n\n**Kullanım senaryosu:** Büyük oyun projelerinde onlarca shader'ı kategorize et, versiyonla ve farklı export formatlarına çıkart.\n\n**Temel workflow:**\n1. Shader dosyaları import et → kategori ata (lighting, post-fx, ui)\n2. Her shader için önizleme sahnesi ayarla\n3. Parametre değerlerini JSON preset olarak kaydet\n4. Build pipeline'ına entegre et: `shaderman export --target vulkan`\n\n**Prompt:** \"ShaderMan ile 30 farklı post-processing shader'ını organize et; hangi shader'ların hangi sahnelerde aktif olduğunu track eden bir konfigürasyon şeması tasarla.\"","meta":{"Yıldız":1501,"Dil":"GLSL","Fork":202},"source":{"url":"https://github.com/smkplus/ShaderMan","license":"MIT","author":"smkplus"},"no":"009"},{"id":10,"cat":"C++","name":"Bonzomatic","desc":"Live shader coding tool and Shader Showdown workhorse","tags":["c-plus-plus","demoscene","directx","glsl","★1494"],"badge1":"C++","badge2":"★ 1.494","content":"## Bonzomatic: Canlı Coding Shader Ortamı\n\nBonzomatic, demoscene topluluğunda kullanılan canlı shader coding aracıdır. Müzikle senkronize, gerçek zamanlı GLSL coding performansları için tasarlanmıştır.\n\n**Kurulum:**\n```bash\n# Release binary indir\nhttps://github.com/Gargaj/Bonzomatic/releases\n# setup.json içinde müzik, çözünürlük ve renk şeması ayarla\n```\n\n**Temel shader yapısı:**\n```glsl\nvoid shader() {\n  vec2 uv = (gl_FragCoord.xy - v2Resolution.xy * 0.5) / v2Resolution.y;\n  float t = fGlobalTime;\n  // Beat sync: fBeats, fBeatIntensity kullan\n  float ring = abs(length(uv) - 0.3 * sin(t + fBeats));\n  gl_FragColor = vec4(vec3(0.02 / ring), 1.0);\n}\n```\n\n**Prompt:** \"Bonzomatic için canlı performans shader'ı yaz: müzik ritmine senkronize, 4 farklı efekt geçişi olan ve uv distortion kullanan görsel.\"","meta":{"Yıldız":1494,"Dil":"C++","Fork":120},"source":{"url":"https://github.com/Gargaj/Bonzomatic","license":"NOASSERTION","author":"Gargaj"},"no":"010"},{"id":11,"cat":"C","name":"common-shaders","desc":"Collection of commonly used Cg shaders. These shaders are usable by either HLSL and/or Cg runtime compilers. The cg2glsl","tags":["★1150"],"badge1":"C","badge2":"★ 1.150","content":"## common-shaders: RetroArch Retroarch Shader Koleksiyonu\n\nRetroArch'ın resmi CRT, pixel art ve upscaling shader koleksiyonu. GLSL ve Cg formatında 200+ shader içerir.\n\n**İndirme:**\n```bash\ngit clone https://github.com/libretro/common-shaders\n```\n\n**Kategoriler:**\n- `crt/` — CRT monitör efektleri (scanline, curvature, phosphor glow)\n- `pixel_art/` — HQ2X, xBR pixel upscaling\n- `blurs/` — Gaussian, box, radial blur\n- `motionblur/` — Frame blending\n\n**RetroArch konfigürasyon:**\n```\nvideo_shader = \"/path/to/crt-royale.glslp\"\nvideo_shader_enable = true\n```\n\n**Prompt:** \"RetroArch CRT shader'larından crt-royale'ın çalışma prensibini açıkla: mask, halation ve phosphor afterglow efektleri nasıl implementedilmiş?\"","meta":{"Yıldız":1150,"Dil":"C","Fork":258},"source":{"url":"https://github.com/libretro/common-shaders","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"libretro"},"no":"011"},{"id":12,"cat":"C++","name":"GPU-Gems-Book-Source-Code","desc":":cd: CD Content ( Source Code )  Collection  of Book <GPU Gems > 1~ 3 | 《GPU精粹》 1~ 3 随书CD（源代码）珍藏","tags":["book-source-code","glsl","gpu","gpu-gems","★1122"],"badge1":"C++","badge2":"★ 1.122","content":"## GPU Gems Kaynak Kodları: NVIDIA'nın GPU Programlama Ansiklopedisi\n\nNVIDIA'nın yayımladığı GPU Gems 1-3 kitaplarının tüm kaynak kodları. Gerçek zamanlı render tekniklerinin referans implementasyonlarını içerir.\n\n**İçerik (öne çıkanlar):**\n- Cilt altı saçılım (SSS) — cildi gerçekçi render etme\n- Sahne bazlı HDR tone mapping\n- GPU tabanlı cloth simulation\n- Gerçek zamanlı ambient occlusion\n- Su yüzeyi simülasyonu (FFT tabanlı)\n\n**Kullanım:** Her bölüm bağımsız GLSL/Cg kodu — doğrudan projeye kopyala.\n\n**Prompt:** \"GPU Gems 3'teki HDR tone mapping implementasyonunu açıkla: luminance adaptation, Reinhard operatörü ve blue shift nasıl kombine ediliyor?\"","meta":{"Yıldız":1122,"Dil":"C++","Fork":452},"source":{"url":"https://github.com/QianMo/GPU-Gems-Book-Source-Code","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"QianMo"},"no":"012"},{"id":13,"cat":"C","name":"shader-playground","desc":"Shader playground website for exploring HLSL, GLSL, SPIR-V compilers","tags":["★644"],"badge1":"C","badge2":"★ 644","content":"## Shader Playground: Çoklu Derleyici Karşılaştırma\n\nBrowse-based tool: GLSL, HLSL, Metal, WGSL shader'larını farklı derleyicilerle (DXC, glslang, Tint, Naga) derle ve üretilen SPIR-V/DXIL/assembly'i karşılaştır.\n\n**Kullanım alanları:**\n- Farklı derleyicilerin optimizasyon çıktısını kıyasla\n- Shader assembly'i okuyarak performans darboğazı tespit et\n- Cross-compiler davranış farklarını belgele\n\n**Workflow:**\n1. Sol panele HLSL kodu yaz\n2. Derleyici seç (DXC / glslang / Naga)\n3. Shader stage seç (VS/PS/CS)\n4. Sağ panelde SPIR-V veya ISA assembly görüntüle\n5. Farklı derleyicileri yan yana karşılaştır\n\n**Prompt:** \"Basit PBR pixel shader'ını DXC ve glslang ile derle, üretilen SPIR-V instruction sayısını karşılaştır ve hangi optimizasyon farkları var?\"","meta":{"Yıldız":644,"Dil":"C","Fork":50},"source":{"url":"https://github.com/tgjones/shader-playground","license":"BSD-2-Clause","author":"tgjones"},"no":"013"},{"id":14,"cat":"HLSL","name":"ShaderToHuman","desc":"HLSL/GLSL library for debugging shaders","tags":["★586"],"badge1":"HLSL","badge2":"★ 586","content":"## ShaderToHuman: GLSL Kod Açıklayıcı\n\nShaderToHuman, karmaşık GLSL shader kodunu okunabilir Türkçe/İngilizce açıklamaya dönüştüren AI destekli araçtır. Shader öğrenme sürecini hızlandırır.\n\n**Kullanım senaryoları:**\n- Legacy shader codebase'ini belgele\n- Öğrencilere karmaşık shader tekniklerini açıkla\n- Code review'da shader mantığını hızlıca kavra\n\n**Prompt şablonu:**\n```\nBu GLSL fragment shader'ı satır satır açıkla:\n[SHADER KODU]\nHer matematiksel operasyonun görsel etkisini ve neden gerekli \nolduğunu açıkla. Başlangıç seviyesi geliştirici için yaz.\n```\n\n**Örnek:** `smoothstep(0.0, 1.0, t)` → \"t değeri 0'dan 1'e giderken, başlangıç ve bitişte yavaşlayan S-eğrisi geçiş üretir — keskin kenarlara karşı yumuşak blur efekti.\"","meta":{"Yıldız":586,"Dil":"HLSL","Fork":19},"source":{"url":"https://github.com/electronicarts/ShaderToHuman","license":"NOASSERTION","author":"electronicarts"},"no":"014"},{"id":15,"cat":"GLSL","name":"shader-minifier","desc":"Minify and obfuscate GLSL or HLSL code","tags":["compiler","demoscene","demotool","fsharp","★564"],"badge1":"GLSL","badge2":"★ 564","content":"## Shader Minifier: GLSL Boyut Optimizasyonu\n\nDemoscene ve WebGL için GLSL shader'larını küçülten araç. Değişken adı kısaltma, dead code elimination ve whitespace kaldırma ile %40-60 boyut azaltma sağlar.\n\n**Kurulum ve kullanım:**\n```bash\n# .NET gerektirir\ndotnet tool install --global ShaderMinifier\nshader_minifier.exe --format text -o output.glsl input.frag\n# Agresif kısaltma\nshader_minifier.exe --aggressive-inlining --format js input.frag\n```\n\n**Tipik küçültmeler:**\n- `vec3 color` → `vec3 a`\n- `uniform float time` → `uniform float t`\n- `for (int i=0; i<10; i++)` → `for(int i=0;i<10;i++)`\n\n**Uyarı:** Minify edilmiş kodu production'da debug etmek zordur — sadece son aşamada kullan.\n\n**Prompt:** \"Bu GLSL shader'ı 4KB demo için optimize et: hangi kısımlar inlinelanabilir, hangi fonksiyonlar birleştirilebilir?\"","meta":{"Yıldız":564,"Dil":"GLSL","Fork":49},"source":{"url":"https://github.com/laurentlb/shader-minifier","license":"Apache-2.0","author":"laurentlb"},"no":"015"},{"id":16,"cat":"C#","name":"ShaderGen","desc":"Proof-of-concept library for generating HLSL, GLSL, and Metal shader code from C#,","tags":["direct3d","games","glsl","graphics","★516"],"badge1":"C#","badge2":"★ 516","content":"## ShaderGen: Prosedürel Shader Üretici\n\nShaderGen, parametre tabanlı GLSL kod üretir — PBR materyal şemaları, noise fonksiyonları ve post-processing efektleri için şablon sistemi sunar.\n\n**Kullanım akışı:**\n1. Materyal tipi seç: metal, taş, ahşap, plastik\n2. Parametre ayarla: roughness, metallic, normal intensity\n3. Üretilen GLSL kodu kopyala ve projeye entegre et\n\n**Prompt şablonu:**\n```\nBana şu özelliklerde PBR fragment shader üret:\n- Materyal: [paslanmış metal / ıslak taş / mat plastik]\n- Normal map: açık, yoğunluk 0.8\n- Roughness: 0.4, Metallic: 0.9\n- Ambient occlusion: SSAO baked\nGLSL 3.30, BlinnPhong + IBL hybrid.\n```","meta":{"Yıldız":516,"Dil":"C#","Fork":54},"source":{"url":"https://github.com/mellinoe/ShaderGen","license":"MIT","author":"mellinoe"},"no":"016"},{"id":17,"cat":"C++","name":"ArcGameEngine","desc":"AGE: Arc Game Engine is an open-source engine for building 2D & 3D real-time rendering and interactive contents, especia","tags":["cpp","ecs","engine","entity-component-system","★386"],"badge1":"C++","badge2":"★ 386","content":"## ArcGameEngine: Açık Kaynak C++ Oyun Motoru\n\nArcGameEngine, shader pipeline'ı ve render graph'ı öğrenmek için kullanılabilir referans oyun motorudur. Vulkan/OpenGL backend destekler.\n\n**Shader entegrasyonu:**\n```bash\ngit clone https://github.com/MohitSethi99/ArcGameEngine\n# Shader dosyaları: Arc/src/Arc/Renderer/Shaders/\n# Render graph: Arc/src/Arc/Renderer/RenderGraph/\n```\n\n**Shader pipeline mimarisi:**\n1. ShaderLibrary → GLSL dosyalarını yükler ve derler\n2. RenderPass → shader'ı framebuffer'a bağlar\n3. Material → uniform değerlerini yönetir\n4. RenderGraph → pass sırasını ve bağımlılıkları tanımlar\n\n**Prompt:** \"ArcGameEngine'in render graph sistemini incele: pass dependency resolution nasıl çalışıyor ve yeni bir post-processing pass nasıl eklenir?\"","meta":{"Yıldız":386,"Dil":"C++","Fork":30},"source":{"url":"https://github.com/GloriousPtr/ArcGameEngine","license":"Apache-2.0","author":"GloriousPtr"},"no":"017"},{"id":18,"cat":"C++","name":"XShaderCompiler","desc":"Shader cross compiler to translate HLSL (Shader Model 4 and 5) to GLSL","tags":["c","cpp","cpp11","csharp","★363"],"badge1":"C++","badge2":"★ 363","content":"## XShaderCompiler: HLSL→GLSL Çevirici\n\nXShaderCompiler (XSC), HLSL shader'larını GLSL'e çeviren açık kaynak transpiler'dır. DirectX projelerini OpenGL/Vulkan'a taşımak için kullanılır.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/LukasBanana/XShaderCompiler\ncmake -B build && cmake --build build\n./xsc --in shader.hlsl --out shader.glsl --target glsl 330\n```\n\n**Seçenekler:**\n```bash\nxsc --in pixel.hlsl --target glsl 430 --entry PSMain --out pixel.glsl\nxsc --in vertex.hlsl --target vksl 140 --out vertex.glsl  # Vulkan\n```\n\n**Dikkat:** %100 otomatik çeviri mümkün değildir. Semantik farklar (clip space, coordinate system) için elle düzeltme gerekebilir.\n\n**Prompt:** \"HLSL PBR shader'ını XShaderCompiler ile GLSL 430'a çevir ve clip space dönüşümü ile texture sampling farklarını listele.\"","meta":{"Yıldız":363,"Dil":"C++","Fork":47},"source":{"url":"https://github.com/LukasBanana/XShaderCompiler","license":"BSD-3-Clause","author":"LukasBanana"},"no":"018"},{"id":19,"cat":"Python","name":"pmfx-shader","desc":"Cross platform shader system for HLSL, GLSL, Metal and SPIR-V.","tags":["gles","glsl","hlsl","metal","★350"],"badge1":"Python","badge2":"★ 350","content":"## pmfx-shader: Data-Driven Shader Framework\n\npmfx-shader, JSON konfigürasyonla yönetilen multi-platform shader derleme sistemidir. Oyun motorlarında shader varyant yönetimi için kullanılır.\n\n**Kurulum:**\n```bash\npip install pmfx\npmfx --shader shaders/ --platform hlsl --config config.json\n```\n\n**config.json örnek:**\n```json\n{\n  \"shader_platform\": \"hlsl\",\n  \"shader_version\": \"5_0\",\n  \"defines\": [\"ALPHA_TEST\", \"SHADOW_MAPS\"],\n  \"permutations\": { \"lit\": [0,1], \"skinned\": [0,1] }\n}\n```\n\n**Varyant sistemi:** `ALPHA_TEST=0/1` × `SKINNED=0/1` = 4 shader varyantı otomatik derlenir.\n\n**Prompt:** \"pmfx ile PBR materyal sistemi için shader varyant matrisi tasarla: lit/unlit, skinned/static, alpha/opaque kombinasyonları.\"","meta":{"Yıldız":350,"Dil":"Python","Fork":11},"source":{"url":"https://github.com/polymonster/pmfx-shader","license":"MIT","author":"polymonster"},"no":"019"},{"id":20,"cat":"C++","name":"ShaderDebugger","desc":"[DEPRECATED] C++ library for debugging HLSL & GLSL shaders","tags":["compiler","debugger","glsl","hlsl","★329"],"badge1":"C++","badge2":"★ 329","content":"## ShaderDebugger: GLSL Kaynak Seviyesi Hata Ayıklama\n\nShaderDebugger, GLSL shader'larını CPU'da simüle ederek breakpoint ve değişken izleme ile kaynak seviyesi debug imkanı sunar.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/dfranx/ShaderDebugger\ncmake -B build && cmake --build build\n```\n\n**C++ kullanım:**\n```cpp\nsd::Debugger dbg;\ndbg.SetSource(sd::ShaderType::Pixel, glslSource, \"main\");\ndbg.SetUniform(\"u_time\", 1.5f);\ndbg.Step();  // Bir satır çalıştır\nfloat val = dbg.GetVariableValue(\"color\").x;  // Değer oku\n```\n\n**Kullanım senaryosu:** NaN veya Inf döndüren shader'da hangi satırın sorunlu olduğunu tespit et.\n\n**Prompt:** \"ShaderDebugger ile fragment shader'da NaN değer üreten hesabı debug et: her adımda intermediate değerleri logla.\"","meta":{"Yıldız":329,"Dil":"C++","Fork":21},"source":{"url":"https://github.com/dfranx/ShaderDebugger","license":"MIT","author":"dfranx"},"no":"020"},{"id":21,"cat":"C","name":"SPIRV-VM","desc":"Virtual machine for executing SPIR-V","tags":["debugging","glsl","hlsl","shader","★316"],"badge1":"C","badge2":"★ 316","content":"## SPIRV-VM: SPIR-V Sanal Makinesi\n\nSPIRV-VM, SPIR-V bytecode'u CPU'da çalıştıran sanal makinedir. GPU olmadan shader davranışını test etmek ve SPIR-V toolchain geliştirmek için kullanılır.\n\n**Kullanım alanları:**\n- CI/CD: GPU'suz sunucularda shader doğrulama\n- SPIR-V toolchain testi\n- Shader davranışını deterministic ortamda verifikasyon\n\n**Kurulum:**\n```bash\ngit clone https://github.com/dfranx/SPIRV-VM\ncmake -B build && cmake --build build\n./spirvvm shader.spv  # SPIR-V'yi CPU'da çalıştır\n```\n\n**Prompt:** \"SPIRV-VM kullanarak compute shader'ın CPU ve GPU çıktılarının aynı olup olmadığını test eden bir doğrulama pipeline'ı nasıl kurulur?\"","meta":{"Yıldız":316,"Dil":"C","Fork":31},"source":{"url":"https://github.com/dfranx/SPIRV-VM","license":"MIT","author":"dfranx"},"no":"021"},{"id":22,"cat":"C++","name":"CrossShader","desc":"⚔️ A tool for cross compiling shaders. Convert between GLSL, HLSL, Metal Shader Language, or older versions of GLSL.","tags":["apple-metal","compiler","directx","glsl","★308"],"badge1":"C++","badge2":"★ 308","content":"## CrossShader: WASM ile Tarayıcı-içi Shader Çevirisi\n\nCrossShader, WebAssembly üzerinde çalışan, tarayıcıda GLSL↔HLSL↔MSL↔WGSL dönüşümü yapan kütüphanedir. Sunucu gerektirmez.\n\n**NPM kurulum:**\n```bash\nnpm install crossshader\n```\n\n**JavaScript kullanım:**\n```javascript\nimport CrossShader from 'crossshader';\nconst result = await CrossShader.compile(glslSource, {\n  from: CrossShader.ShaderFormat.GLSL,\n  to: CrossShader.ShaderFormat.WGSL,\n  stage: CrossShader.ShaderStage.Fragment\n});\nconsole.log(result.code);\n```\n\n**Kullanım senaryosu:** Web tabanlı shader editor'da kullanıcının GLSL yazdığı kodu anında WebGPU için WGSL'e çevir.\n\n**Prompt:** \"CrossShader ile tarayıcı-içi shader live preview aracı yap: kullanıcı GLSL yazar, sol panelde WebGL, sağda WebGPU önizlemesi göster.\"","meta":{"Yıldız":308,"Dil":"C++","Fork":13},"source":{"url":"https://github.com/alaingalvan/CrossShader","license":"MIT","author":"alaingalvan"},"no":"022"},{"id":23,"cat":"Rust","name":"shaderc-rs","desc":"Rust bindings for the shaderc library.","tags":["compiler","glsl","graphics","hlsl","★287"],"badge1":"Rust","badge2":"★ 287","content":"## shaderc-rs: Rust'ta GLSL/HLSL Derleme\n\nshaderc-rs, Google'ın shaderc kütüphanesinin Rust binding'idir. Rust oyun motorlarında ve Vulkan uygulamalarında shader derleme için kullanılır.\n\n**Cargo.toml:**\n```toml\n[dependencies]\nshaderc = \"0.8\"\n```\n\n**Kullanım:**\n```rust\nlet compiler = shaderc::Compiler::new().unwrap();\nlet mut options = shaderc::CompileOptions::new().unwrap();\noptions.set_optimization_level(shaderc::OptimizationLevel::Performance);\nlet artifact = compiler.compile_into_spirv(\n    source, shaderc::ShaderKind::Fragment,\n    \"shader.frag\", \"main\", Some(&options)\n).unwrap();\nlet spv: &[u32] = artifact.as_binary();\n```\n\n**Prompt:** \"shaderc-rs ile Rust/Vulkan uygulamasında hot-reload shader sistemi kur; watcher thread shader dosyasını izlesin, değişince yeniden derleyip pipeline'ı güncellesin.\"","meta":{"Yıldız":287,"Dil":"Rust","Fork":70},"source":{"url":"https://github.com/google/shaderc-rs","license":"Apache-2.0","author":"google"},"no":"023"},{"id":24,"cat":"C++","name":"ShaderWriter","desc":"Library used to write shaders from C++, and export them in either GLSL, HLSL or SPIR-V.","tags":["cpp17","glsl","hlsl","spirv","★263"],"badge1":"C++","badge2":"★ 263","content":"## ShaderWriter: C++ ile GLSL/SPIR-V Üretimi\n\nShaderWriter, shader kodunu C++ DSL'i ile programatik olarak üretir. Prosedürel materyal ve efekt sistemleri için kullanılır.\n\n**Örnek:**\n```cpp\n#include <ShaderWriter/ShaderWriter.hpp>\nusing namespace sdw;\nFragmentWriter writer;\nauto color = writer.declOutput<Vec4>(\"fragColor\", 0);\nauto uTime = writer.declUniform<Float>(\"uTime\", 0);\nwriter.implementMain([&]() {\n  auto uv = writer.declLocale(\"uv\", gl.fragCoord.xy() / vec2(800.0_f, 600.0_f));\n  color = vec4(uv, sin(uTime) * 0.5_f + 0.5_f, 1.0_f);\n});\nwriter.serialize(output, ShaderType::eGlsl);\n```\n\n**Prompt:** \"ShaderWriter ile node-based materyal sistemi prototipleri için C++ DSL ile PBR shader üret; her materyal parametresi bir C++ değişkeni olsun.\"","meta":{"Yıldız":263,"Dil":"C++","Fork":12},"source":{"url":"https://github.com/DragonJoker/ShaderWriter","license":"MIT","author":"DragonJoker"},"no":"024"},{"id":25,"cat":"C++","name":"gpupad","desc":"A flexible GLSL and HLSL shader editor and IDE.","tags":["compute","cross-platform","editor","glsl","★197"],"badge1":"C++","badge2":"★ 197","content":"## gpupad: GPU Pipeline Test ve Düzenleme Aracı\n\ngpupad, OpenGL compute ve render pipeline'larını interaktif olarak test eden masaüstü uygulamasıdır. Buffer'ları düzenle, shader çalıştır, sonuçları görüntüle.\n\n**Kullanım senaryoları:**\n- Compute shader'ın ürettiği veriyi buffer view'da doğrula\n- Birden fazla render pass'i görsel akış olarak bağla\n- GPU bellek düzenini ve stride'ı test et\n\n**Workflow:**\n1. Yeni program → GLSL shader dosyaları ekle\n2. Uniform buffer tanımla → değerleri düzenle\n3. Run → framebuffer veya buffer çıktısını görüntüle\n4. Vertex/index buffer'ı CSV olarak import et\n\n**Prompt:** \"gpupad ile particle simulation compute shader'ını test et: 1000 partikül pozisyon verisi buffer'ını görselleştir ve velocity güncelleme adımlarını debug et.\"","meta":{"Yıldız":197,"Dil":"C++","Fork":11},"source":{"url":"https://github.com/houmain/gpupad","license":"GPL-3.0","author":"houmain"},"no":"025"},{"id":26,"cat":"HLSL","name":"Open-Shaders","desc":"Collection of many open source shaders(GLSL, HLSL, CG) in popular open source game development and rendering engines and","tags":["awesome-list","computer-graphics","game-development","glsl","★156"],"badge1":"HLSL","badge2":"★ 156","content":"## Open-Shaders: Açık Lisanslı Shader Koleksiyonu\n\nOpen-Shaders, MIT lisanslı production-ready GLSL shader'ların açık koleksiyonudur. Doğrudan projeye entegre edilebilir.\n\n**İçerik kategorileri:**\n- `post-processing/` — FXAA, SMAA anti-aliasing, vignette, film grain\n- `lighting/` — Phong, Blinn-Phong, physically-based\n- `noise/` — Perlin, simplex, worley, value noise\n- `color/` — tone mapping, color grading, LUT\n- `geometry/` — wireframe, explode, silhouette\n\n**Entegrasyon:**\n```glsl\n// FXAA anti-aliasing ekle\n#include \"post-processing/fxaa.glsl\"\nvoid main() {\n  fragColor = fxaa(colorTexture, uv, texelSize);\n}\n```\n\n**Prompt:** \"Open-Shaders koleksiyonundan SMAA ile FXAA'yı karşılaştır: hangi sahnelerde hangisi daha iyi sonuç verir ve performans farkı nedir?\"","meta":{"Yıldız":156,"Dil":"HLSL","Fork":17},"source":{"url":"https://github.com/repalash/Open-Shaders","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"repalash"},"no":"026"},{"id":27,"cat":"ShaderLab","name":"Unity-Shaders-from-Shader-Toy","desc":"Converted Unity shaders from SahderToy to Unity shading language","tags":["circle","glsl","hlsl","math","★149"],"badge1":"ShaderLab","badge2":"★ 149","content":"## Unity Shader Toy Dönüşümü\n\nShaderToy GLSL shader'larını Unity ShaderLab/HLSL formatına çevirme rehberi ve hazır dönüştürme şablonları.\n\n**ShaderToy → Unity farkları:**\n| ShaderToy | Unity |\n|-----------|-------|\n| `iTime` | `_Time.y` |\n| `iResolution` | `_ScreenParams.xy` |\n| `iMouse` | `_mouse` (custom) |\n| `mainImage(out fragColor, in fragCoord)` | `half4 frag(v2f i)` |\n| `fragCoord / iResolution` | `i.uv` |\n\n**Şablon:**\n```hlsl\nShader \"Custom/ShaderToyConvert\" {\n  Properties { _MainTex (\"Texture\", 2D) = \"white\" {} }\n  SubShader {\n    Pass {\n      CGPROGRAM\n      #pragma fragment frag\n      half4 frag(v2f i) : SV_Target {\n        float2 uv = i.uv;\n        float t = _Time.y;\n        // ShaderToy kodu buraya\n        return half4(color, 1.0);\n      }\n      ENDCG\n    }\n  }\n}\n```\n\n**Prompt:** \"Bu ShaderToy SDF raymarching shader'ını Unity HDRP için Custom Pass formatına dönüştür ve depth buffer entegrasyonunu ekle.\"","meta":{"Yıldız":149,"Dil":"ShaderLab","Fork":26},"source":{"url":"https://github.com/marcozakaria/Unity-Shaders-from-Shader-Toy","license":"MIT","author":"marcozakaria"},"no":"027"},{"id":28,"cat":"C++","name":"ada","desc":"A general porpose OpenGL app library","tags":["glsl","glsl-shader","graphics","hlsl","★128"],"badge1":"C++","badge2":"★ 128","content":"## ada: URL Parser Kütüphanesi (C++)\n\nada, WHATWG URL standardını uygulayan hızlı C++ URL parser kütüphanesidir. Node.js core'da kullanılır.\n\n**Not:** Bu vault'ta yanlış sınıflandırılmış bir kütüphane — shader değil, URL işleme içindir.\n\n**Kullanım:**\n```cpp\n#include \"ada.h\"\nauto url = ada::parse(\"https://example.com/path?q=shader\");\nif (url) {\n  std::cout << url->get_hostname(); // \"example.com\"\n  std::cout << url->get_pathname(); // \"/path\"\n  std::cout << url->get_search();   // \"?q=shader\"\n}\n```\n\n**Prompt:** \"ada kütüphanesi ile shader asset URL'lerini parse et ve CDN prefix'i dinamik olarak değiştiren bir asset pipeline yardımcısı yaz.\"","meta":{"Yıldız":128,"Dil":"C++","Fork":13},"source":{"url":"https://github.com/patriciogonzalezvivo/ada","license":"MIT","author":"patriciogonzalezvivo"},"no":"028"},{"id":29,"cat":"Rust","name":"glsl2hlsl","desc":"Shadertoy to Unity shader converter","tags":["★114"],"badge1":"Rust","badge2":"★ 114","content":"## glsl2hlsl: GLSL'den HLSL'e Transpiler\n\nglsl2hlsl, OpenGL/Vulkan GLSL shader'larını DirectX HLSL'e çeviren komut satırı aracıdır. Cross-platform oyun portlarında kullanılır.\n\n**Kullanım:**\n```bash\ngit clone https://github.com/tgjones/glsl-optimizer-rs\n# veya online tool: https://shader-playground.timjones.io\n# GLSL → HLSL dönüşüm\nglsl2hlsl input.frag output.hlsl --profile ps_5_0\n```\n\n**Önemli farklılıklar:**\n- `gl_Position` → `SV_Position`\n- `texture(sampler, uv)` → `sampler.Sample(state, uv)`\n- `gl_FragCoord` → `SV_Position` (input olarak)\n- `mix()` → `lerp()`, `fract()` → `frac()`\n\n**Prompt:** \"Bu GLSL 4.50 deferred shading fragment shader'ını HLSL Shader Model 6 için dönüştür ve semantik uyumsuzlukları listele.\"","meta":{"Yıldız":114,"Dil":"Rust","Fork":16},"source":{"url":"https://github.com/pema99/glsl2hlsl","license":"MIT","author":"pema99"},"no":"029"},{"id":30,"cat":"TypeScript","name":"vscode-shadered","desc":"VS Code extension that adds the ability to debug and preview shaders","tags":["debugger","glsl","hlsl","shaders","★101"],"badge1":"TypeScript","badge2":"★ 101","content":"## vscode-shadered: VS Code Shader IDE Eklentisi\n\nSHADERed'in VS Code entegrasyonu — shader dosyalarında syntax highlighting, lint ve SHADERed önizlemesini VS Code içinden başlatma.\n\n**Kurulum:**\n```\nCtrl+P → ext install dfranx.shadered\n```\n\n**Özellikler:**\n- GLSL/HLSL syntax highlighting ve hata işaretleme\n- `Ctrl+Shift+P → SHADERed: Open Preview` → önizleme penceresini aç\n- Uniform değerlerini VS Code sidebar'dan düzenle\n- `.sprj` proje dosyalarına tıklayarak direkt aç\n\n**Workflow:**\n1. Shader klasörünü VS Code'da aç\n2. `.glsl` dosyasını düzenle\n3. SHADERed preview otomatik güncellenir\n4. Hataları Problems panelinde görüntüle\n\n**Prompt:** \"vscode-shadered eklentisiyle geliştirme ortamı kur: GLSL lint kuralları, format on save ve SHADERed preview hotkey konfigürasyonu.\"","meta":{"Yıldız":101,"Dil":"TypeScript","Fork":10},"source":{"url":"https://github.com/dfranx/vscode-shadered","license":"MIT","author":"dfranx"},"no":"030"},{"id":31,"cat":"C++","name":"ShaderLab","desc":"Shaderlab is a tool designed for cross compiling unity shader to other shading languages.","tags":["cross-compiler","glsl","hlsl","metal","★101"],"badge1":"C++","badge2":"★ 101","content":"## ShaderLab: Unity Shader Tanımlama Dili\n\nShaderLab, Unity'nin shader'ları tanımlamak için kullandığı özel DSL'dir. HLSL/Cg kodunu sararak materyal özelliklerini, render state ve pass konfigürasyonunu yönetir.\n\n**Temel yapı:**\n```hlsl\nShader \"Custom/BasicPBR\" {\n  Properties {\n    _Albedo (\"Albedo\", 2D) = \"white\" {}\n    _Roughness (\"Roughness\", Range(0,1)) = 0.5\n    _Metallic (\"Metallic\", Range(0,1)) = 0.0\n  }\n  SubShader {\n    Tags { \"RenderType\"=\"Opaque\" \"Queue\"=\"Geometry\" }\n    LOD 200\n    Pass {\n      HLSLPROGRAM\n      #pragma vertex vert\n      #pragma fragment frag\n      // HLSL kodu buraya\n      ENDHLSL\n    }\n  }\n  FallBack \"Diffuse\"\n}\n```\n\n**Prompt:** \"Unity URP için ShaderLab ile outline efekti yaz: iki-pass yaklaşımı (normal expand + opaque), materyal Inspector'da ayarlanabilir renk ve kalınlık.\"","meta":{"Yıldız":101,"Dil":"C++","Fork":12},"source":{"url":"https://github.com/BobLChen/ShaderLab","license":"MIT","author":"BobLChen"},"no":"031"}];

// ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'shadervault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
