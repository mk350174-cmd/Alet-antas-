<style>
:root{
  --bg:#0e0606;--bg2:#120a0a;--bg3:#160e0e;--bg4:#1a1212;
  --border:#1e1616;--border2:#261e1e;--border3:#322a2a;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#ff6b6b;--primary2:#ff6b6b;
  --primary-dim:#ff6b6b15;--primary-glow:#ff6b6b30;
  --accent:#d4a04c;--accent2:#d4a04c;
  --accent-dim:#d4a04c18;--accent-glow:#d4a04c30;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#ff6b6b08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#d4a04c06 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#120a0a 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#ff6b6b0a 0%,#ff6b6b03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #ff6b6b30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#ff6b6b03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#ff6b6b06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#e14d4d);color:#0e0606;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #ff6b6b20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #ff6b6b35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#120a0a,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#e14d4d);color:#0e0606;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #ff6b6b20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #ff6b6b35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">B</div>
  <div class="hero-eyebrow">Spesifik Disiplinler & Analitik · Alet Çantası</div>
  <h1 class="hero-title">Bio<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Biyolojik sistemler ve veri analizi üzerine kavramsal araştırma şablonları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>15</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Bio ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">15</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>

varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["alphafold", "protein yapısı", "tahmin", "performans", "yalın", "orta"], "badge1": "Orta", "content": "## Protein Yapı Tahmini\n1. AlphaFold2 DB'de proteini arar; yoksa ColabFold çalıştır.\n2. pLDDT skoru < 70 bölgeler belirsiz, dikkatli yorumla.\n3. PAE haritasından domain sınırlarını belirle.\n4. ChimeraX/PyMOL ile yapıyı görselleştir.\n\n## Uygulama Senaryosu (Yalın)\n\nBu protokolü, performans alanında Protein Yapı Tahmin problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Protein Yapı Tahmin akışını yalın yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 225, "no": "225", "cat": "Veri Analizi", "name": "Stream Tabanlı Biyolojik Tekrar vs Refactor Yöntemi", "desc": "veri bağlamında Biyolojik Tekrar vs için stream tabanlı bir refactor yöntemi. Deney tekrarı türlerini ayırt etme ve raporlamada doğru kullanım. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["tekrar", "biyolojik", "teknik", "veri", "stream tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Tekrar Türleri\n1. Teknik tekrar: aynı örneği 3× ölç (cihaz hatasını azaltır).\n2. Biyolojik tekrar: farklı bireyden 3× örnek (gerçek değişkenlik).\n3. İstatistik: biyolojik tekrar sayısını kullan.\n4. Hata çubukları için SEM vs SD farkını belirt.\n\n## Genişletilmiş Notlar (Stream Tabanlı)\n\n- **Hedef Kitle:** İleri seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosistemin a:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sinyal, yolak, hücre\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 242, "no": "242", "cat": "Biyolojik Sistemler", "name": "DevOps-Ready Gen İfadesi ve Kuralı", "desc": "dağıtım bağlamında Gen İfadesi ve için devops-ready bir kuralı. Transkripsiyon faktörleri ve epigenetik kontrolün temel mekanizmaları. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["gen ifadesi", "transkripsiyon", "epigenetik", "dağıtım", "devops-ready", "pro"], "badge1": "Pro", "content": "## Gen İfadesi\n1. Promoter ve enhancer bölgelerini belirle.\n2. Transkripsiyon faktörü bağlanma modelini incele.\n3. DNA metilasyonu ve histon modifikasyonlarını ele al.\n4. RNA işleme adımlarını (splicing) ekle.\n\n## Uygulama Senaryosu (DevOps-Ready)\n\nBu kuralı, dağıtım alanında Gen İfadesi ve problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Gen İfadesi ve akışını devops-ready yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 243, "no": "243", "cat": "Biyolojik Sistemler", "name": "Event-Sourced Metabolik Yol Haritası Stratejisi", "desc": "güvenlik bağlamında Metabolik Yol Haritası için event-sourced bir stratejisi. Glikoliz, TCA döngüsü ve oksidatif fosforilasyonu sistematik açıklayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["metabolizma", "glikoliz", "TCA", "güvenlik", "event-sourced", "orta"], "badge1": "Orta", "content": "## Metabolik Yollar\n1. Glikolizi 10 adımda özetle, net ATP kazancını belirt.\n2. TCA döngüsündeki asetil-CoA girişini göster.\n3. Oksidatif fosforilasyonda H+ gradyanını açıkla.\n4. Düzenleyici enzim noktalarını işaretle.\n\n## Genişletilmiş Notlar (Event-Sourced)\n\n- **Hedef Kitle:** Orta seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Metabolik Yol Haritası senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Metabolik Yol Haritası işlemleri daha event-sourced hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Metabolik Yol Haritası ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** metabolizma, glikoliz, TCA\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 244, "no": "244", "cat": "Biyoinformatik", "name": "Otonom FASTA Dizisi İşleme Sözleşmesi", "desc": "mikroservis bağlamında FASTA Dizisi İşleme için otonom bir sözleşmesi. FASTA formatlı DNA/protein dizilerini ayrıştırma ve temel analiz. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["fasta", "dizi", "bioinformatik", "mikroservis", "otonom", "uzman"], "badge1": "Uzman", "content": "## FASTA İşleme\n```python\ndef parse_fasta(dosya):\n    kayitlar = {}\n    with open(dosya) as f:\n        baslik = None\n        for satir in f:\n            if satir.startswith('>'):\n                baslik = satir[1:].strip()\n                kayitlar[baslik] = ''\n            else:\n                kayitlar[baslik] += satir.strip()\n    return kayitlar\n```\n\n## Genişletilmiş Notlar (Otonom)\n\n- **Hedef Kitle:** Uzman seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde FASTA Dizisi İşleme senaryoları\n- **Avantajları:** Bu sözleşmesi sayesinde FASTA Dizisi İşleme işlemleri daha otonom hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde FASTA Dizisi İşleme ihtiyacını analiz edin.\n  2. Bu sözleşmesi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** fasta, dizi, bioinformatik\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 245, "no": "245", "cat": "Biyoinformatik", "name": "API-First BLAST Sonuç Yorumlama Şablonu", "desc": "ölçeklenme bağlamında BLAST Sonuç Yorumlama için api-first bir şablonu. E-value, bit score ve identity yüzdesi ile BLAST çıktısını yorumlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["blast", "e-value", "hizalama", "ölçeklenme", "api-first", "i̇leri"], "badge1": "İleri", "content": "## BLAST Yorumu\n1. E-value: < 0.001 anlamlı benzerlik.\n2. Identity %: yapısal homoloji için >30%.\n3. Coverage: < %50 ise sonuçları şüpheyle değerlendir.\n4. Birden fazla organizmada tutarlı hit'leri tercih et.\n\n## Genişletilmiş Notlar (API-First)\n\n- **Hedef Kitle:** İleri seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde BLAST Sonuç Yorumlama senaryoları\n- **Avantajları:** Bu şablonu sayesinde BLAST Sonuç Yorumlama işlemleri daha api-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde BLAST Sonuç Yorumlama ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** blast, e-value, hizalama\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 246, "no": "246", "cat": "Biyoinformatik", "name": "Stream Tabanlı Filogenetik Ağaç Oluşturma Kılavuzu", "desc": "CI/CD bağlamında Filogenetik Ağaç Oluşturma için stream tabanlı bir kılavuzu. Çoklu dizi hizalamasından maksimum likelihood ağacı oluşturma adımları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["filogenetik", "ağaç", "hizalama", "CI/CD", "stream tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Filogenetik Analiz\n1. MUSCLE/MAFFT ile çoklu hizalama yap.\n2. ModelFinder ile en uygun evrim modelini seç.\n3. IQ-TREE ile ML ağacı oluştur.\n4. Bootstrap değerleri >70 güvenilir.\n\n## Uygulama Senaryosu (Stream Tabanlı)\n\nBu kılavuzu, CI/CD alanında Filogenetik Ağaç Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Filogenetik Ağaç Oluşturma akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 247, "no": "247", "cat": "Araştırma Metodolojisi", "name": "Headless Deney Tasarımı Kontrol Optimizasyonu", "desc": "API bağlamında Deney Tasarımı Kontrol için headless bir optimizasyonu. Biyolojik deney için tekrar, kontrol grubu ve körleme kontrolleri. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["deney", "kontrol", "metodoloji", "API", "headless", "i̇leri"], "badge1": "İleri", "content": "## Deney Tasarımı\n1. Hipotezi null ve alternatif formülünde yaz.\n2. Bağımsız değişkeni ve kontrol grubunu belirle.\n3. En az 3 biyolojik tekrar planla.\n4. Körleşme (blinding) uygulanabilir mi değerlendir.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** İleri seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Deney Tasarımı Kontrol senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde Deney Tasarımı Kontrol işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Deney Tasarımı Kontrol ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** deney, kontrol, metodoloji\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 248, "no": "248", "cat": "Araştırma Metodolojisi", "name": "Reaktif Western Blot Optimizasyonu Sistemi", "desc": "mühendislik bağlamında Western Blot Optimizasyonu için reaktif bir sistemi. Blokaj, antikor seyreltme ve ekspozür süresi için optimizasyon kılavuzu. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["western blot", "antikor", "optimizasyon", "mühend s": ["filogenetik", "ağaç", "hizalama", "veri", "type-safe", "i̇leri"], "badge1": "İleri", "content": "## Filogenetik Analiz\n1. MUSCLE/MAFFT ile çoklu hizalama yap.\n2. ModelFinder ile en uygun evrim modelini seç.\n3. IQ-TREE ile ML ağacı oluştur.\n4. Bootstrap değerleri >70 güvenilir.\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu doktrini, veri alanında Filogenetik Ağaç Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Filogenetik Ağaç Oluşturma akışını type-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 307, "no": "307", "cat": "Araştırma Metodolojisi", "name": "Hibrit-Cloud Deney Tasarımı Kontrol Tasarımı", "desc": "arayüz bağlamında Deney Tasarımı Kontrol için hibrit-cloud bir tasarımı. Biyolojik deney için tekrar, kontrol grubu ve körleme kontrolleri. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["deney", "kontrol", "metodoloji", "arayüz", "hibrit-cloud", "pro"], "badge1": "Pro", "content": "## Deney Tasarımı\n1. Hipotezi null ve alternatif formülünde yaz.\n2. Bağımsız değişkeni ve kontrol grubunu belirle.\n3. En az 3 biyolojik tekrar planla.\n4. Körleşme (blinding) uygulanabilir mi değerlendir.\n\n## Genişletilmiş Notlar (Hibrit-Cloud)\n\n- **Hedef Kitle:** Pro seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Deney Tasarımı Kontrol senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Deney Tasarımı Kontrol işlemleri daha hibrit-cloud hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Deney Tasarımı Kontrol ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** deney, kontrol, metodoloji\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 308, "no": "308", "cat": "Araştırma Metodolojisi", "name": "Dağıtık Western Blot Optimizasyonu Düzeneği", "desc": "test bağlamında Western Blot Optimizasyonu için dağıtık bir düzeneği. Blokaj, antikor seyreltme ve ekspozür süresi için optimizasyon kılavuzu. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["western blot", "antikor", "optimizasyon", "test", "dağıtık", "i̇leri"], "badge1": "İleri", "content": "## Western Blot\n1. Blokaj: %5 süt veya BSA (fosfo-antikor için BSA).\n2. Primer antikor seyreltisi üreticinin önerisinin 2× altından başla.\n3. Sekonder 1:5000-1:20000 arası optimize et.\n4. Aynı membranı ev tercihen farklı bölgelerde kullan.\n\n## Genişletilmiş Notlar (Dağıtık)\n\n- **Hedef Kitle:** İleri seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Western Blot Optimizasyonu senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Western Blot Optimizasyonu işlemleri daha dağıtık hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Western Blot Optimizasyonu ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** western blot, antikor, optimizasyon\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 309, "no": "309", "cat": "Veri Analizi", "name": "Senkron RNA-Seq Veri Analiz Düzeneği", "desc": "dağıtım bağlamında RNA-Seq Veri Analiz için senkron bir düzeneği. Kalite kontrolden diferansiyel ekspresyona RNA-Seq pipeline'ı. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["rna-seq", "diferansiyel ekspresyon", "pipeline", "dağıtım", "senkron", "başlangıç"], "badge1": "Başlangıç", "content": "## RNA-Seq Pipeline\n1. FastQC ile kalite kontrol.\n2. Trimmomatic ile adaptör kırpma.\n3. STAR/HISAT2 ile referans genomuna hizala.\n4. DESeq2 ile diferansiyel ekspresyon analizi.\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** Başlangıç seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde RNA-Seq Veri Analiz senaryoları\n- **Avantajları:** Bu düzeneği sayesinde RNA-Seq Veri Analiz işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde RNA-Seq Veri Analiz ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** rna-seq, diferansiyel ekspresyon, pipeline\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 310, "no": "310", "cat": "Veri Analizi", "name": "Hibrit İstatistiksel Test Seçim Kalıbı", "desc": "performans bağlamında İstatistiksel Test Seçim için hibrit bir kalıbı. Biyolojik veride t-test, ANOVA, Mann-Whitney arasında doğru seçim. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["istatistik", "t-test", "anova", "performans", "hibrit", "başlangıç"], "badge1": "Başlangıç", "content": "## Test Seçimi\n1. 2 grup, normal dağılım: t-test.\n2. 3+ grup, normal: ANOVA + post-hoc.\n3. Normal değil: Mann-Whitney veya Kruskal-Wallis.\n4. Eşleşmiş veri: paired t-test veya Wilcoxon.\n5. Düzeltme: çoklu karşılaştırmada Bonferroni/FDR.\n\n## Uygulama Senaryosu (Hibrit)\n\nBu kalıbı, performans alanında İstatistiksel Test Seçim problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İstatistiksel Test Seçim akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 311, "no": "311", "cat": "Laboratuvar Protokolleri", "name": "Polyglot PCR Bileşen Hazırlama Düzeneği", "desc": "API bağlamında PCR Bileşen Hazırlama için polyglot bir düzeneği. Master mix hesaplama ve primer tasarımı için standart PCR protokolü. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["pcr", "primer", "master mix", "API", "polyglot", "pro"], "badge1": "Pro", "content": "## PCR Protokolü\n```\n2× Master Mix: 12.5 µL\nForward primer (10µM): 1 µL\nReverse primer (10µM): 1 µL\nDNA şablonu: 1 µL\nH₂O: 9.5 µL\nToplam: 25 µL\n```\nPrimer Tm farkı < 5°C olsun.\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** Pro seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde PCR Bileşen Hazırlama senaryoları\n- **Avantajları:** Bu düzeneği sayesinde PCR Bileşen Hazırlama işlemleri daha polyglot hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde PCR Bileşen Hazırlama ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** pcr, primer, master mix\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 312, "no": "312", "cat": "Laboratuvar Protokolleri", "name": "Hibrit Hücre Kültürü Kontaminasyon Modeli", "desc": "yapay zeka bağlamında Hücre Kültürü Kontaminasyon için hibrit bir modeli. Mikoplazma ve bakteri kontaminasyonunu önleyen steril çalışma kuralları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["hücre kültürü", "kontaminasyon", "steril", "yapay zeka", "hibrit", "i̇leri"], "badge1": "İleri", "content": "## Steril Teknik\n1. Kapüşon içinde yalnızca steril malzeme kullan.\n2. Her çalışmadan önce yüzeyi %70 etanol ile sil.\n3. Hücreleri aylık mikoplazma testi ile kontrol et.\n4. Antibiyotik kullanımı mikoplazma maskeler, dikkatli ol.\n\n## Uygulama Senaryosu (Hibrit)\n\nBu modeli, yapay zeka alanında Hücre Kültürü Kontaminasyon problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hücre Kültürü Kontaminasyon akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştır n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** rna-seq, diferansiyel ekspresyon, pipeline\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 340, "no": "340", "cat": "Veri Analizi", "name": "Hibrit-Cloud İstatistiksel Test Seçim Yapısı", "desc": "mühendislik bağlamında İstatistiksel Test Seçim için hibrit-cloud bir yapısı. Biyolojik veride t-test, ANOVA, Mann-Whitney arasında doğru seçim. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["istatistik", "t-test", "anova", "mühendislik", "hibrit-cloud", "uzman"], "badge1": "Uzman", "content": "## Test Seçimi\n1. 2 grup, normal dağılım: t-test.\n2. 3+ grup, normal: ANOVA + post-hoc.\n3. Normal değil: Mann-Whitney veya Kruskal-Wallis.\n4. Eşleşmiş veri: paired t-test veya Wilcoxon.\n5. Düzeltme: çoklu karşılaştırmada Bonferroni/FDR.\n\n## Uygulama Senaryosu (Hibrit-Cloud)\n\nBu yapısı, mühendislik alanında İstatistiksel Test Seçim problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İstatistiksel Test Seçim akışını hibrit-cloud yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 341, "no": "341", "cat": "Laboratuvar Protokolleri", "name": "Container-Native PCR Bileşen Hazırlama Modeli", "desc": "dağıtım bağlamında PCR Bileşen Hazırlama için container-native bir modeli. Master mix hesaplama ve primer tasarımı için standart PCR protokolü. Bu va landı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 344, "no": "344", "cat": "Kavramsal Açıklama", "name": "Zero-Config Protein Yapı Tahmin Sistemi", "desc": "caching bağlamında Protein Yapı Tahmin için zero-config bir sistemi. AlphaFold2 ve benzeri araçlarla protein 3B yapı tahmininin kullanımı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["alphafold", "protein yapısı", "tahmin", "caching", "zero-config", "uzman"], "badge1": "Uzman", "content": "## Protein Yapı Tahmini\n1. AlphaFold2 DB'de proteini arar; yoksa ColabFold çalıştır.\n2. pLDDT skoru < 70 bölgeler belirsiz, dikkatli yorumla.\n3. PAE haritasından domain sınırlarını belirle.\n4. ChimeraX/PyMOL ile yapıyı görselleştir.\n\n## Uygulama Senaryosu (Zero-Config)\n\nBu sistemi, caching alanında Protein Yapı Tahmin problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Protein Yapı Tahmin akışını zero-config yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 345, "no": "345", "cat": "Veri Analizi", "name": "Serverless Biyolojik Tekrar vs İskeleti", "desc": "dağıtım bağlamında Biyolojik Tekrar vs için serverless bir i̇skeleti. Deney tekrarı türlerini ayırt etme ve raporlamada doğru kullanım. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["tekra ut planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 376, "no": "376", "cat": "Biyolojik Sistemler", "name": "Headless Pratik Spesifik Pattern'i Modeli", "desc": "monitoring bağlamında Pratik Spesifik Pattern'i için headless bir modeli. Biyolojik Sistemler kategorisinde spesifik odaklı pratik bir pattern'i. Orta seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["biyolojik sistemler", "spesifik", "pratik", "monitoring", "headless", "orta"], "badge1": "Orta", "content": "## Pratik Spesifik Pattern'i\n\nBu öğe, **Biyolojik Sistemler** kategorisinde spesifik konusuna pratik bir yaklaşım sunar.\n\n### Temel Konsept\nSpesifik bağlamında hücre kavramı, modern biyolojik sistemler pratiğinde merkezi bir rol oynar. Pratik yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım maliyeti düşer.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata oranı azalır.\n\n### Adım Adım Uygulama\n\n1. **Analiz:** Mevcut biyolojik sistemler yapınızdaki spesifik ihtiyaçlarını listele.\n2. **Tasarım:** Bu pattern'i için orta seviyede bir taslak çıkar.\n3. **Pilot:** Küçük bir kapsamda dene, metrik topla.\n4. **Geri Bildirim:** Ekip ve kullanıcı geri bildirimlerini değerlendir.\n5. **Rollout:** Kademeli olarak tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokümantasyon: ekip dışı kullanıcılar zorlanır.\n- Metrik eksikliği: başarıyı ölçemezsen iyileştiremezsin.\n- Eskimiş bağımlılıklar: güvenlik açıklarına davetiye.\n\n### Anahtar Metrikler\n\n 0, "no": "400", "cat": "Veri Analizi", "name": "Sıfır-Trust İstatistiksel Test Seçim Kılavuzu", "desc": "logging bağlamında İstatistiksel Test Seçim için sıfır-trust bir kılavuzu. Biyolojik veride t-test, ANOVA, Mann-Whitney arasında doğru seçim. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["istatistik", "t-test", "anova", "logging", "sıfır-trust", "uzman"], "badge1": "Uzman", "content": "## Test Seçimi\n1. 2 grup, normal dağılım: t-test.\n2. 3+ grup, normal: ANOVA + post-hoc.\n3. Normal değil: Mann-Whitney veya Kruskal-Wallis.\n4. Eşleşmiş veri: paired t-test veya Wilcoxon.\n5. Düzeltme: çoklu karşılaştırmada Bonferroni/FDR.\n\n## Genişletilmiş Notlar (Sıfır-Trust)\n\n- **Hedef Kitle:** Uzman seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde İstatistiksel Test Seçim senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde İstatistiksel Test Seçim işlemleri daha sıfır-trust hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde İstatistiksel Test Seçim ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** istatistik, t-test, anova\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 401, "no": "401", "cat": "AI Prompt Kütüphanesi", "name": "Sistem Promptu — Biyoloji", "desc": "Biyoloji alanı için orijinal sistem promptu promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "system-prompt", "biyoloji", "orijinal"], "badge1": "Orijinal AI", "content": "## SİSTEM PROMPTU — Biyoloji Uzmanı\n\nSen kıdemli bir **Biyoloji** uzmanısın. Görevin: bioinformatics, genetics.\n\n### Davranış Kuralları\n1. **Net ve doğrulanabilir** yanıtlar ver; spekülasyondan kaçın.\n2. Her iddiayı kaynak veya somut örnekle destekle.\n3. Belirsizlik varsa açıkça **\"emin değilim\"** de — yanlış cevap verme.\n4. Kullanıcıya **adım adım** rehberlik et; tek seferde fazla yükleme.\n5. Yanıt formatı: önce TL;DR (2 cümle), sonra detaylar, sonra sonraki adım önerisi.\n\n### Yasak Davranışlar\n- Üretilmiş istatistik veya uydurma kaynak verme\n- Konu dışına çıkma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru Biyoloji kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 402, "no": "402", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — Biyoloji", "desc": "Biyoloji alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "biyoloji", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Biyoloji\n\nAşağıda Biyoloji alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** bioinformatics, genetics konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** bioinformatics, genetics alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** bioinformatics, genetics için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Biyoloji", "desc": "Biyoloji alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "biyoloji", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Biyoloji\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Biyoloji ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) bioinformatics, genetics ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Biyoloji", "desc": "Biyoloji alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "biyoloji", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Biyoloji Mentörü\n\n**Kimsin:** 15+ yıl Biyoloji deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n teryalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 409, "no": "409", "cat": "Biyoinformatik", "name": "Mikroservis FASTA Dizisi İşleme Doktrini", "desc": "yapay zeka bağlamında FASTA Dizisi İşleme için mikroservis bir doktrini. FASTA formatlı DNA/protein dizilerini ayrıştırma ve temel analiz. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["fasta", "dizi", "bioinformatik", "yapay zeka", "mikroservis", "başlangıç"], "badge1": "Başlangıç", "content": "## FASTA İşleme\n```python\ndef parse_fasta(dosya):\n    kayitlar = {}\n    with open(dosya) as f:\n        baslik = None\n        for satir in f:\n            if satir.startswith('>'):\n                baslik = satir[1:].strip()\n                kayitlar[baslik] = ''\n            else:\n                kayitlar[baslik] += satir.strip()\n    return kayitlar\n```\n\n## Uygulama Senaryosu (Mikroservis)\n\nBu doktrini, yapay zeka alanında FASTA Dizisi İşleme problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** FASTA Dizisi İşleme akışını mikroservis yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 410, "no": "410", "cat": "Biyoinformatik", "name": "Self-Healing BLAST Sonuç Yorumlama Rehberi", "desc": "gözlemlenebilirlik bağlamında BLAST Sonuç Yorumlama için self-healing bir rehberi. E-value, bit score ve identity yüzdesi ile BLAST çıktısını   2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** deney, kontrol, metodoloji\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 413, "no": "413", "cat": "Araştırma Metodolojisi", "name": "API-First Western Blot Optimizasyonu Çekirdeği", "desc": "arayüz bağlamında Western Blot Optimizasyonu için api-first bir çekirdeği. Blokaj, antikor seyreltme ve ekspozür süresi için optimizasyon kılavuzu. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["western blot", "antikor", "optimizasyon", "arayüz", "api-first", "başlangıç"], "badge1": "Başlangıç", "content": "## Western Blot\n1. Blokaj: %5 süt veya BSA (fosfo-antikor için BSA).\n2. Primer antikor seyreltisi üreticinin önerisinin 2× altından başla.\n3. Sekonder 1:5000-1:20000 arası optimize et.\n4. Aynı membranı ev tercihen farklı bölgelerde kullan.\n\n## Genişletilmiş Notlar (API-First)\n\n- **Hedef Kitle:** Başlangıç seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Western Blot Optimizasyonu senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Western Blot Optimizasyonu işlemleri daha api-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Western Blot Optimizasyonu ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** western blot, antikor, optimizasyon\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 414, "no": "414", "cat": "Veri Analizi", "name": "Idempotent RNA-Seq Veri Analiz Düzeneği", "desc": "performans bağlamında RNA-Seq Veri Analiz için idempotent bir düzeneği. Kalite kontrolden diferansiyel ekspresyona RNA-Seq pipeline'ı. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["rna-seq", "diferansiyel ekspresyon", "pipeline", "performans", "idempotent", "orta"], "badge1": "Orta", "content": "## RNA-Seq Pipeline\n1. FastQC ile kalite kontrol.\n2. Trimmomatic ile adaptör kırpma.\n3. STAR/HISAT2 ile referans genomuna hizala.\n4. DESeq2 ile diferansiyel ekspresyon analizi.\n\n## Uygulama Senaryosu (Idempotent)\n\nBu düzeneği, performans alanında RNA-Seq Veri Analiz problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** RNA-Seq Veri Analiz akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 415, "no": "415", "cat": "Veri Analizi", "name": "Performant İstatistiksel Test Seçim Yönergesi", "desc": "mikroservis bağlamında İstatistiksel Test Seçim için performant bir yönergesi. Biyolojik veride t-test, ANOVA, Mann-Whitney arasında doğru seçim. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["istatistik", "t-test", "anova", "mikroservis", "performant", "başlangıç"], "badge1": "Başlangıç", "content": "## Test Seçimi\n1. 2 grup, normal dağılım: t-test.\n2. 3+ grup, normal: ANOVA + post-hoc.\n3. Normal değil: Mann-Whitney veya Kruskal-Wallis.\n4. Eşleşmiş veri: paired t-test veya Wilcoxon.\n5. Düzeltme: çoklu karşılaştırmada Bonferroni/FDR.\n\n## Genişletilmiş Notlar (Performant)\n\n- **Hedef Kitle:** Başlangıç seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde İstatistiksel Test Seçim senaryoları\n- **Avantajları:** Bu yönergesi sayesinde İstatistiksel Test Seçim işlemleri daha performant hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde İstatistiksel Test Seçim ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** istatistik, t-test, anova\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 416, "no": "416", "cat": "Laboratuvar Protokolleri", "name": "AI-Augmented PCR Bileşen Hazırlama Modeli", "desc": "CI/CD bağlamında PCR Bileşen Hazırlama için ai-augmented bir modeli. Master mix hesaplama ve primer tasarımı için standart PCR protokolü. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["pcr", "primer", "master mix", "CI/CD", "ai-augmented", "i̇leri"], "badge1": "İleri", "content": "## PCR Protokolü\n```\n2× Master Mix: 12.5 µL\nForward primer (10µM): 1 µL\nReverse primer (10µM): 1 µL\nDNA şablonu: 1 µL\nH₂O: 9.5 µL\nToplam: 25 µL\n```\nPrimer Tm farkı < 5°C olsun.\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu modeli, CI/CD alanında PCR Bileşen Hazırlama problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sist e feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hücre kültürü, kontaminasyon, steril\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-450-final"}}, {"id": 418, "no": "418", "cat": "Kavramsal Açıklama", "name": "Adaptif CRISPR-Cas9 Mekanizması Kuralı", "desc": "monitoring bağlamında CRISPR-Cas9 Mekanizması için adaptif bir kuralı. sgRNA tasarımından DNA kesme ve onarıma CRISPR-Cas9 çalışma prensibi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["crispr", "cas9", "gen düzenleme", "monitoring", "adaptif", "pro"], "badge1": "Pro", "content": "## CRISPR-Cas9\n1. 20 nt sgRNA hedef diziye tamamlayıcı olarak tasarla.\n2. PAM dizisi (NGG) hedefin 3' ucunda bulunmalı.\n3. Cas9-sgRNA kompleksi DNA'yı keser (DSB).\n4. Onarım: NHEJ (mutasyon) veya HDR (yerine koyma).\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** Pro seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde CRISPR-Cas9 Mekanizması senaryoları\n- **Avantajları:** Bu kuralı sayesinde CRISPR-Cas9 Mekanizması işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde CRISPR-Cas9 Mekanizması ihtiyacını analiz edin.\n  2. Bu kuralı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** crispr, cas9, gen düzenleme\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-450-final"}}, {"id": 419, "no": "419", "cat": "Kavramsal Açıklama", "name": "Production-Grade Protein Yapı Tahmin İsk  "variant_of": 3, "wave": "v3-450-final"}}, {"id": 439, "no": "439", "cat": "Biyoinformatik", "name": "Pratik FASTA Dizisi İşleme Düzeneği", "desc": "güvenlik bağlamında FASTA Dizisi İşleme için pratik bir düzeneği. FASTA formatlı DNA/protein dizilerini ayrıştırma ve temel analiz. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["fasta", "dizi", "bioinformatik", "güvenlik", "pratik", "başlangıç"], "badge1": "Başlangıç", "content": "## FASTA İşleme\n```python\ndef parse_fasta(dosya):\n    kayitlar = {}\n    with open(dosya) as f:\n        baslik = None\n        for satir in f:\n            if satir.startswith('>'):\n                baslik = satir[1:].strip()\n                kayitlar[baslik] = ''\n            else:\n                kayitlar[baslik] += satir.strip()\n    return kayitlar\n```\n\n## Genişletilmiş Notlar (Pratik)\n\n- **Hedef Kitle:** Başlangıç seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde FASTA Dizisi İşleme senaryoları\n- **Avantajları:** Bu düzeneği sayesinde FASTA Dizisi İşleme işlemleri daha pratik hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde FASTA Dizisi İşleme ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** fasta, dizi, bioinformatik\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 440, "no": "440", "cat": "Biyoinformatik", "name": "Federe BLAST Sonuç Yorumlama Düzeni", "desc": "caching bağlamında BLAST Sonuç Yorumlama için federe bir düzeni. E-value, bit score ve identity y // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'biovault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
