<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">S</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">State<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Karmaşık state-machine (durum makinesi) yapılarını modelleyen ve C++ çıktı veren araç.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>20</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="State ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">20</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

const ITEMS = [{"id": 1, "no": "001", "cat": "Temel Tasarım", "name": "Basit Durum Makinesi", "desc": "Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın.", "tags": ["temel", "mimari", "yapı"], "badge1": "Başlangıç", "content": "## Yeni State Machine Oluşturma\nBir oyun objesi için temel durum makinesini tanımlayın.\n1.  **Başlangıç Durumu:** `Idle` olarak adlandırın.\n2.  **Geçişler:** `Idle` -> `Moving`, `Idle` -> `Attacking` tanımlayın.\n3.  **Çıkış Koşulları:** Her durumdan `Exit` koşullarını belirleyin.\nBu yapı, karakterin temel davranış akışını netleştirir ve genişletilebilir bir temel sağlar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 2, "no": "002", "cat": "Temel Tasarım", "name": "Durum Geçiş Kuralları", "desc": "Durumlar arası geçişleri tetikleyen olayları ve koşulları yapılandırın.", "tags": ["geçiş", "olay", "koşul"], "badge1": "Orta", "content": "## Geçiş Kurallarını Belirleme\nGeçişleri tetikleyen olay ve koşulları tanımlayın.\n1.  **Olay Tetikleyiciler:** `OnInput_Move`, `OnEnemyDetected` gibi olaylar oluşturun.\n2.  **Koşullar:** `HasStamina > 0`, `IsGrounded == true` gibi Boolean koşulları ekleyin.\n3.  **Öncelik:** Aynı anda birden fazla geçiş mümkünse öncelik sıralaması belirleyin.\nBu, durum değişimlerinin öngörülebilir ve mantıklı olmasını sağlar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 3, "no": "003", "cat": "Temel Tasarım", "name": "Hiyerarşik Durumlar", "desc": "İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin.", "tags": ["hiyerarşi", "alt durum", "modüler"], "badge1": "İleri", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat` durumunu oluşturun.\n2.  **Alt Durumlar:** `Combat` içinde `Attacking`, `Dodging`, `Blocking` gibi alt durumlar ekleyin.\n3.  **Geçiş Kapsamı:** Alt durumların kendi içinde geçişlerini ve ana duruma geri dönüşleri belirleyin.\nBu, karmaşık sistemleri daha okunabilir ve yönetilebilir hale getirir.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 4, "no": "004", "cat": "Oyun Mekanikleri", "name": "Karakter Hareket Durumları", "desc": "Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin.", "tags": ["oyuncu", "hareket", "mekanik"], "badge1": "Başlangıç", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 5, "no": "005", "cat": "Oyun Mekanikleri", "name": "Zıplama Durumu Yönetimi", "desc": "Karakterin zıplama mekaniğini state machine ile uygulayın.", "tags": ["zıplama", "fizik", "oyuncu"], "badge1": "Orta", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 6, "no": "006", "cat": "Oyun Mekanikleri", "name": "Envanter Durumları", "desc": "Envanter açma, kapama ve eşya kullanma durumlarını yönetin.", "tags": ["UI", "envanter", "oyuncu"], "badge1": "Orta", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 7, "no": "007", "cat": "Animasyon", "name": "Animasyon Durum Grafiği", "desc": "State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun.", "tags": ["animasyon", "karakter", "görsel"], "badge1": "Başlangıç", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 8, "no": "008", "cat": "Animasyon", "name": "Animasyon Geçiş Blend'leri", "desc": "Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın.", "tags": ["animasyon", "geçiş", "akıcılık"], "badge1": "Orta", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 9, "no": "009", "cat": "Animasyon", "name": "Durum Tabanlı Çift Katman Animasyon", "desc": "Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin.", "tags": ["katman", "çift animasyon", "karmaşık"], "badge1": "İleri", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 10, "no": "010", "cat": "AI Yönetimi", "name": "Düşman AI Temel Davranışı", "desc": "Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin.", "tags": ["AI", "düşman", "davranış"], "badge1": "Başlangıç", "content": "## Temel Düşman AI Durumları\nBasit bir düşman AI için ana davranış durumlarını tanımlayın.\n1.  **`Patrol` (Devriye):** Belirli yollar üzerinde hareket eder.\n2.  **`Chase` (Kovalamaca):** Oyuncuyu görüş alanına girince takip eder.\n3.  **`Attack` (Saldırı):** Oyuncu menzile girince saldırır.\n4.  **Geçiş Koşulları:** `PlayerDetected`, `PlayerLost`, `AttackRangeReached` gibi koşulları belirleyin.\nBu, düşmanların öngörülebilir ve mantıklı davranmasını sağlar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 11, "no": "011", "cat": "AI Yönetimi", "name": "Algı ve Tepki Durumları", "desc": "AI'nın çevresel algılara göre durum değiştirmesini sağlayın.", "tags": ["algı", "tepki", "sensör"], "badge1": "Orta", "content": "## Algı Tabanlı AI Durumları\nAI'nın çevresel algılara göre davranışını değiştiren durumlar yaratın.\n1.  **`Idle`:** Hiçbir tehdit yokken bekler.\n2.  **`Alert`:** Ses veya görsel bir ipucu aldığında şüphelenir ve araştırır.\n3.  **`Engaged`:** Doğrudan tehdit algıladığında çatışmaya girer.\n4.  **Algı Mekanizmaları:** `SightCone`, `HearRadius` gibi algı sensörlerini durum geçişlerine bağlayın.\nBu, AI'ya dinamik ve gerçekçi tepkiler kazandırır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 12, "no": "012", "cat": "AI Yönetimi", "name": "Hedef Tabanlı AI Durumları", "desc": "AI'nın belirli hedeflere ulaşmak için durumlarını yönetin.", "tags": ["hedef", "görev", "NPC"], "badge1": "İleri", "content": "## Hedef Odaklı AI Durumları\nAI'nın belirli bir hedefe ulaşmak için durumlar arasında geçiş yapmasını sağlayın.\n1.  **`SeekingObjective`:** Belirlenen bir hedefe doğru hareket eder.\n2.  **`InteractingWithTarget`:** Hedefe ulaştığında belirli bir eylemi gerçekleştirir (örneğin, kapı açma).\n3.  **`ReturningToPost`:** Hedefe ulaşıldıktan sonra başlangıç noktasına döner.\n4.  **Hedef Koşulları:** `TargetReached`, `InteractionComplete` gibi koşulları tanımlayın.\nBu, görev tabanlı AI davranışlarını kolaylaştırır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 13, "no": "013", "cat": "3D Etkileşim", "name": "Etkileşimli Obje Durumları", "desc": "Kapı, düğme gibi 3D objelerin etkileşim durumlarını modelleyin.", "tags": ["objeler", "etkileşim", "çevre"], "badge1": "Başlangıç", "content": "## Etkileşimli Objelerin Durumları\nBir kapı veya düğme gibi objelerin etkileşim durumlarını tanımlayın.\n1.  **`Closed` / `Locked`:** Objenin varsayılan kapalı veya kilitli durumu.\n2.  **`Open` / `Unlocked`:** Objenin etkileşim sonucu açılmış veya kilitsiz durumu.\n3.  **`Interacting`:** Oyuncunun objeyle etkileşimde olduğu kısa süreli durum (animasyon oynatma).\n4.  **Geçişler:** `UseKey`, `PlayerProximity`, `ButtonPressed` gibi olayları kullanın.\nBu, çevre etkileşimlerini düzenler.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 14, "no": "014", "cat": "3D Etkileşim", "name": "Kamera Durumları", "desc": "Oyun içi kamera açısı ve mod değişimlerini durum makinesi ile yönetin.", "tags": ["kamera", "görünüm", "cinematik"], "badge1": "Orta", "content": "## Kamera Modları Durum Makinesi\nFarklı kamera görünümleri için durumlar oluşturun.\n1.  **`ThirdPerson`:** Varsayılan oyuncu takibi.\n2.  **`FirstPerson`:** Yakın çekim veya nişan alma modu.\n3.  **`Cinematic`:** Önceden tanımlanmış bir kamera yolu.\n4.  **Geçişler:** `AimButtonPressed`, `CutsceneTriggered`, `ViewModeChange` gibi olayları kullanın.\nBu, kamera geçişlerini akıcı ve kontrol edilebilir hale getirir.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 15, "no": "015", "cat": "3D Etkileşim", "name": "Araç Sürüş Durumları", "desc": "Araçların hızlanma, frenleme ve dönme gibi sürüş durumlarını kontrol edin.", "tags": ["araç", "sürüş", "fizik"], "badge1": "İleri", "content": "## Araç Sürüş Durumları\nBir aracın sürüş mekaniklerini state machine ile modelleyin.\n1.  **`Idle`:** Araç duruyor.\n2.  **`Accelerating`:** Gaz pedalı basılı, araç hızlanıyor.\n3.  **`Braking`:** Fren basılı, araç yavaşlıyor.\n4.  **`Turning`:** Direksiyon çevriliyor.\n5.  **Geçişler:** `GasInput`, `BrakeInput`, `SteerInput` gibi girişleri kullanarak durumları değiştirin.\nBu, araç fiziği ve kontrolünü daha modüler yapar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 16, "no": "016", "cat": "C++ Entegrasyon", "name": "Temel C++ Sınıf Yapısı", "desc": "Durum makinesini C++ sınıflarına dönüştürmek için temel bir yapı oluşturun.", "tags": ["C++", "kod", "şablon"], "badge1": "Başlangıç", "content": "## C++ Durum Sınıfı Şablonu\nStateVault'tan C++ kod çıktısı için temel bir sınıf yapısı oluşturun.\n```cpp\nclass IState {\npublic:\n    virtual void Enter() = 0;\n    virtual void Execute() = 0;\n    virtual void Exit() = 0;\n};\n```\nBu arayüz, her durumun belirli bir yaşam döngüsü metoduna sahip olmasını garanti eder ve kodun genişletilebilirliğini artırır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 17, "no": "017", "cat": "C++ Entegrasyon", "name": "Durum Yöneticisi Uygulaması", "desc": "Durumlar arası geçişleri ve güncellemeleri yöneten bir C++ sınıfı tasarlayın.", "tags": ["C++", "yönetici", "tasarım"], "badge1": "Orta", "content": "## Durum Yöneticisi C++ Kodu\nDurumlar arası geçişleri ve güncellemeleri yönetecek bir sınıf oluşturun.\n```cpp\nclass StateMachine {\n    IState* currentState;\npublic:\n    void ChangeState(IState* newState);\n    void Update();\n};\n```\n`ChangeState` metodu mevcut durumu sonlandırır ve yeni durumu başlatır. `Update` ise mevcut durumu her karede çalıştırır. Bu, merkezi bir kontrol noktası sağlar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 18, "no": "018", "cat": "C++ Entegrasyon", "name": "Olay Bazlı Geçişler", "desc": "C++'ta olay dinleyicileri kullanarak durum geçişlerini tetikleyin.", "tags": ["C++", "olay", "geçiş"], "badge1": "Orta", "content": "## Olay Tabanlı C++ Geçişleri\nDurum geçişlerini C++ olay sistemine bağlayın.\n1.  **Olay Sistemi Entegrasyonu:** Oyun motorunuzun olay dinleme mekanizmalarını (delegates, signals) kullanın.\n2.  **Dinleyici Kaydı:** `CurrentState`'in `Enter()` metodunda ilgili olaylara dinleyici kaydedin.\n3.  **Geçiş Tetikleyicileri:** Olay tetiklendiğinde `StateMachine::ChangeState` metodunu çağırın.\nBu, durum değişimlerini dış olaylara duyarlı hale getirir ve kodu modülerleştirir.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 19, "no": "019", "cat": "C++ Entegrasyon", "name": "Durum Verisi ve Paylaşım", "desc": "Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın.", "tags": ["C++", "veri", "bağlam"], "badge1": "İleri", "content": "## Durumlar Arası Veri Paylaşımı\nDurumlar arasında veri paylaşımını yönetmek için bir bağlam (context) sınıfı kullanın.\n```cpp\nclass PlayerContext {\npublic:\n    float Health;\n    bool IsGrounded;\n};\nclass PlayerState : public IState {\nprotected:\n    PlayerContext* context;\n};\n```\n`PlayerContext` sınıfı, tüm durumların erişebileceği ortak verileri tutar. Her durum bu bağlamı referans alır. Bu, veri tutarlılığını ve erişilebilirliğini artırır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 20, "no": "020", "cat": "C++ Entegrasyon", "name": "StateVault C++ Entegrasyon Kılavuzu", "desc": "StateVault Pro tarafından üretilen C++ kodunu projenize entegre etme adımları.", "tags": ["entegrasyon", "kılavuz", "kurulum"], "badge1": "İleri", "content": "## StateVault C++ Entegrasyon Adımları\nStateVault tarafından üretilen C++ kodunu oyun projenize entegre edin.\n1.  **Dosya Ekleme:** Üretilen `.h` ve `.cpp` dosyalarını projenizin kaynak dizinine ekleyin.\n2.  **Derleme Ayarları:** Gerekirse derleyici ayarlarınızı (include yolları) güncelleyin.\n3.  **StateMachine Nesnesi:** Oyun motorunuzun ana döngüsünde (örneğin `Tick()` metodu) bir `StateMachine` nesnesi örneklendirin.\n4.  **Güncelleme Çağrısı:** Her karede `stateMachine->Update()` metodunu çağırın.\nBu, StateVault çıktısını hızla kullanıma almanızı sağlar.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 22, "no": "022", "cat": "Temel Tasarım", "name": "Hibrit Basit Durum Yapısı", "desc": "makinesi) bağlamında basit durum için hibrit bir yapısı. Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "mimari", "yapı", "makinesi)", "hibrit", "orta"], "badge1": "Orta", "content": "## Yeni State Machine Oluşturma\nBir oyun objesi için temel durum makinesini tanımlayın.\n1.  **Başlangıç Durumu:** `Idle` olarak adlandırın.\n2.  **Geçişler:** `Idle` -> `Moving`, `Idle` -> `Attacking` tanımlayın.\n3.  **Çıkış Koşulları:** n klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Uygulama Senaryosu (Mikroservis)\n\nBu kütüphanesi, şablon alanında Animasyon Durum Grafiği problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Durum Grafiği akışını mikroservis yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 229, "no": "229", "cat": "Animasyon", "name": "Kullanıcı-Merkezli Animasyon Geçiş Blend'leri Tasarımı", "desc": "dağıtım bağlamında Animasyon Geçiş Blend'leri için kullanıcı-merkezli bir tasarımı. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "dağıtım", "kullanıcı-merkezli", "pro"], "badge1": "Pro", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Genişletilmiş Notlar (Kullanıcı-Merkezli)\n\n- **Hedef Kitle:** Pro seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Animasyon Geçiş Blend'leri senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Animasyon Geçiş Blend'leri işlemleri daha kullanıcı-merkezli hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Animasyon Geçiş Blend'leri ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, geçiş, akıcılık\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 230, "no": "230", "cat": "Animasyon", "name": "Federe Durum Tabanlı Çift Rehberi", "desc": "dağıtım bağlamında Durum Tabanlı Çift için federe bir rehberi. Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["katman", "çift animasyon", "karmaşık", "dağıtım", "federe", "başlangıç"], "badge1": "Başlangıç", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.\n\n## Genişletilmiş Notlar (Federe)\n\n- **Hedef Kitle:** Başlangıç seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Durum Tabanlı Çift senaryoları\n- **Avantajları:** Bu rehberi sayesinde Durum Tabanlı Çift işlemleri daha federe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Durum Tabanlı Çift ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katman, çift animasyon, karmaşık\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 231, "no": "231", "cat": "AI Yönetimi", "name": "Type-Safe Düşman AI Temel Anlaşması", "desc": "güvenlik bağlamında Düşman AI Temel için type-safe bir anlaşması. Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["AI", "düşman", "davranış", "güvenlik", "type-safe", "orta"], "badge1": "Orta", "content": "## Temel Düşman AI Durumları\nBasit bir düşman AI için ana davranış durumlarını tanımlayın.\n1.  **`Patrol` (Devriye):** Belirli yollar üzerinde hareket eder.\n2.  **`Chase` (Kovalamaca):** Oyuncuyu görüş alanına girince takip eder.\n3.  **`Attack` (Saldırı):** Oyuncu menzile girince saldırır.\n4.  **Geçiş Koşulları:** `PlayerDetected`, `PlayerLost`, `AttackRangeReached` gibi koşulları belirleyin.\nBu, düşmanların öngörülebilir ve mantıklı davranmasını sağlar.\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu anlaşması, güvenlik alanında Düşman AI Temel problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Düşman AI Temel akışını type-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 232, "no": "232", "cat": "AI Yönetimi", "name": "DevOps-Ready Algı ve Tepki Düzeneği", "desc": "logging bağlamında Algı ve Tepki için devops-ready bir düzeneği. AI'nın çevresel algılara göre durum değiştirmesini sağlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["algı", "tepki", "sensör", "logging", "devops-ready", "orta"], "badge1": "Orta", "content": "## Algı Tabanlı AI Durumları\nAI'nın çevresel algılara göre davranışını değiştiren durumlar yaratın.\n1.  **`Idle`:** Hiçbir tehdit yokken bekler.\n2.  **`Alert`:** Ses veya görsel bir ipucu aldığında şüphelenir ve araştırır.\n3.  **`Engaged`:** Doğrudan tehdit algıladığında çatışmaya girer.\n4.  **Algı Mekanizmaları:** `SightCone`, `HearRadius` gibi algı sensörlerini durum geçişlerine bağlayın.\nBu, AI'ya dinamik ve gerçekçi tepkiler kazandırır.\n\n## Uygulama Senaryosu (DevOps-Ready)\n\nBu düzeneği, logging alanında Algı ve Tepki problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Algı ve Tepki akışını devops-ready yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 233, "no": "233", "cat": "AI Yönetimi", "name": "Pipeline Hedef Tabanlı AI Optimizasyonu", "desc": "performans bağlamında Hedef Tabanlı AI için pipeline bir optimizasyonu. AI'nın belirli hedeflere ulaşmak için durumlarını yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["hedef", "görev", "NPC", "performans", "pipeline", "başlangıç"], "badge1": "Başlangıç", "content": "## Hedef Odaklı AI Durumları\nAI'nın belirli bir hedefe ulaşmak için durumlar arasında geçiş yapmasını sağlayın.\n1.  **`SeekingObjective`:** Belirlenen bir hedefe doğru hareket eder.\n2.  **`InteractingWithTarget`:** Hedefe ulaştığında belirli bir eylemi gerçekleştirir (örneğin, kapı açma).\n3.  **`ReturningToPost`:** Hedefe ulaşıldıktan sonra başlangıç noktasına döner.\n4.  **Hedef Koşulları:** `TargetReached`, `InteractionComplete` gibi koşulları tanımlayın.\nBu, görev tabanlı AI davranışlarını kolaylaştırır.\n\n## Uygulama Senaryosu (Pipeline)\n\nBu optimizasyonu, performans alanında Hedef Tabanlı AI problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hedef Tabanlı AI akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 234, "no": "234", "cat": "3D Etkileşim", "name": "Bağlamsal Etkileşimli Obje Durumları İskeleti", "desc": "veri bağlamın le yönetin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["kamera", "görünüm", "cinematik", "akış", "bağlamsal", "orta"], "badge1": "Orta", "content": "## Kamera Modları Durum Makinesi\nFarklı kamera görünümleri için durumlar oluşturun.\n1.  **`ThirdPerson`:** Varsayılan oyuncu takibi.\n2.  **`FirstPerson`:** Yakın çekim veya nişan alma modu.\n3.  **`Cinematic`:** Önceden tanımlanmış bir kamera yolu.\n4.  **Geçişler:** `AimButtonPressed`, `CutsceneTriggered`, `ViewModeChange` gibi olayları kullanın.\nBu, kamera geçişlerini akıcı ve kontrol edilebilir hale getirir.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Orta seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Kamera Durumları senaryoları\n- **Avantajları:** Bu doktrini sayesinde Kamera Durumları işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Kamera Durumları ihtiyacını analiz edin.\n  2. Bu doktrini'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** kamera, görünüm, cinematik\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 236, "no": "236", "cat": "3D Etkileşim", "name": "Polyglot Araç Sürüş Durumları Yönergesi", "desc": "akış bağlamında Araç Sürüş Durumları için polyglot bir yönergesi. Araçların hızlanma, frenleme ve dönme gibi sürüş durumlarını kontrol edin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["araç", "sürüş", "fizik", "akış", "polyglot", "uzman"], "badge1": "Uzman", "content": "## Araç Sürüş Durumları\nBir aracın sürüş mekaniklerini state machine ile modelleyin.\n1.  **`Idle`:** Araç duruyor.\n2.  **`Accelerating`:** Gaz pedalı basılı, araç hızlanıyor.\n3.  **`Braking`:** Fren basılı, araç yavaşlıyor.\n4.  **`Turning`:** Direksiyon çevriliyor.\n5.  **Geçişler:** `GasInput`, `BrakeInput`, `SteerInput` gibi girişleri kullanarak durumları değiştirin.\nBu, araç fiziği ve kontrolünü daha modüler yapar.\n\n## Uygulama Senaryosu (Polyglot)\n\nBu yönergesi, akış alanında Araç Sürüş Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Araç Sürüş Durumları akışını polyglot yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 237, "no": "237", "cat": "C++ Entegrasyon", "name": "Headless Temel C++ Sınıf Modeli", "desc": "API bağlamında Temel C++ Sınıf için headless bir modeli. Durum makinesini C++ sınıflarına dönüştürmek için temel bir yapı oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "kod", "şablon", "API", "headless", "orta"], "badge1": "Orta", "content": "## C++ Durum Sınıfı Şablonu\nStateVault'tan C++ kod çıktısı için temel bir sınıf yapısı oluşturun.\n```cpp\nclass IState {\npublic:\n    virtual void Enter() = 0;\n    virtual void Execute() = 0;\n    virtual void Exit() = 0;\n};\n```\nBu arayüz, her durumun belirli bir yaşam döngüsü metoduna sahip olmasını garanti eder ve kodun genişletilebilirliğini artırır.\n\n## Uygulama Senaryosu (Headless)\n\nBu modeli, API alanında Temel C++ Sınıf problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Temel C++ Sınıf akışını headless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 238, "no": "238", "cat": "C++ Entegrasyon", "name": "Yalın Durum Yöneticisi Uygulaması Modeli", "desc": "performans bağlamında Durum Yöneticisi Uygulaması için yalın bir modeli. Durumlar arası geçişleri ve güncellemeleri yöneten bir C++ sınıfı tasarlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "yönetici", "tasarım", "performans", "yalın", "i̇leri"], "badge1": "İleri", "content": "## Durum Yöneticisi C++ Kodu\nDurumlar arası geçişleri ve güncellemeleri yönetecek bir sınıf oluşturun.\n```cpp\nclass StateMachine {\n    IState* currentState;\npublic:\n    void ChangeState(IState* newState);\n    void Update();\n};\n```\n`ChangeState` metodu mevcut durumu sonlandırır ve yeni durumu başlatır. `Update` ise mevcut durumu her karede çalıştırır. Bu, merkezi bir kontrol noktası sağlar.\n\n## Genişletilmiş Notlar (Yalın)\n\n- **Hedef Kitle:** İleri seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Durum Yöneticisi Uygulaması senaryoları\n- **Avantajları:** Bu modeli sayesinde Durum Yöneticisi Uygulaması işlemleri daha yalın hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Durum Yöneticisi Uygulaması ihtiyacını analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, yönetici, tasarım\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 239, "no": "239", "cat": "C++ Entegrasyon", "name": "API-First Olay Bazlı Geçişler Rehberi", "desc": "şablon bağlamında Olay Bazlı Geçişler için api-first bir rehberi. C++'ta olay dinleyicileri kullanarak durum geçişlerini tetikleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "olay", "geçiş", "şablon", "api-first", "başlangıç"], "badge1": "Başlangıç", "content": "## Olay Tabanlı C++ Geçişleri\nDurum geçişlerini C++ olay sistemine bağlayın.\n1.  **Olay Sistemi Entegrasyonu:** Oyun motorunuzun olay dinleme mekanizmalarını (delegates, signals) kullanın.\n2.  **Dinleyici Kaydı:** `CurrentState`'in `Enter()` metodunda ilgili olaylara dinleyici kaydedin.\n3.  **Geçiş Tetikleyicileri:** Olay tetiklendiğinde `StateMachine::ChangeState` metodunu çağırın.\nBu, durum değişimlerini dış olaylara duyarlı hale getirir ve kodu modülerleştirir.\n\n## Genişletilmiş Notlar (API-First)\n\n- **Hedef Kitle:** Başlangıç seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Olay Bazlı Geçişler senaryoları\n- **Avantajları:** Bu rehberi sayesinde Olay Bazlı Geçişler işlemleri daha api-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Olay Bazlı Geçişler ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, olay, geçiş\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 240, "no": "240", "cat": "C++ Entegrasyon", "name": "Hibrit Durum Verisi ve Mimari Yaklaşımı", "desc": "veri bağlamında Durum Verisi ve için hibrit bir mimari yaklaşımı. Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "veri", "bağlam", "hibrit", "başlangıç"], "badge1": "Başlangıç", "content": "## Durumlar Arası Veri Paylaşımı\nDurumlar arasında veri paylaşımını yönetmek için bir bağlam (context) sınıfı kullanın.\n```cpp\nclass PlayerContext {\npublic:\n    float Health;\n    bool IsGrounded;\n};\nclass PlayerState : public IState {\nprotected:\n    PlayerContext* context;\n};\n```\n`PlayerContext` sınıfı, tüm durumların erişebileceği ortak verileri tutar. Her durum bu bağlamı referans alır. Bu, veri tutarlılığını ve erişilebilirliğini artırır.\n\n## Uygulama Senaryosu (Hibrit)\n\nBu mimari yaklaşımı, veri alanında Durum Verisi ve problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Verisi ve akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 241, "no": "241", "cat": "C++ Entegrasyon", "name": "Composable StateVault C++ Entegrasyon Yönergesi", "desc": "ölçeklenme bağlamında StateVault C++ Entegrasyon için composable bir yönergesi. StateVault Pro tarafından üretilen C++ kodunu projenize entegre etme adımları. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "kılavuz", "kurulum", "ölçeklenme", "composable", "pro"], "badge1": "Pro", "content": "## StateVault C++ Entegrasyon Adımları\nStateVault tarafından üretilen C++ kodunu oyun projenize entegre edin.\n1.  **Dosya Ekleme:** Üretilen `.h` ve `.cpp` dosyalarını projenizin kaynak dizinine ekleyin.\n2.  **Derleme Ayarları:** Gerekirse derleyici ayarlarınızı (include yolları) güncelleyin.\n3.  **StateMachine Nesnesi:** Oyun motorunuzun ana döngüsünde (örneğin `Tick()` metodu) bir `StateMachine` nesnesi örneklendirin.\n4.  **Güncelleme Çağrısı:** Her karede `stateMachine->Update()` metodunu çağırın.\nBu, StateVault çıktısını hızla kullanıma almanızı sağlar.\n\n## Genişletilmiş Notlar (Composable)\n\n- **Hedef Kitle:** Pro seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde StateVault C++ Entegrasyon senaryoları\n- **Avantajları:** Bu yönergesi sayesinde StateVault C++ Entegrasyon işlemleri daha composable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde StateVault C++ Entegrasyon ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** entegrasyon, kılavuz, kurulum\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 242, "no": "242", "cat": "Temel Tasarım", "name": "Multi-Tenant Basit Durum Makinesi Pratiği", "desc": "güvenlik bağlamında Basit Durum Makinesi için multi-tenant bir pratiği. Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "mimari", "yapı", "güvenlik", "multi-tenant", "orta"], "badge1": "Orta", "content": "## Yeni State Machine Oluşturma\nBir oyun objesi için temel durum makinesini tanımlayın.\n1.  **Başlangıç Durumu:** `Idle` olarak adlandırın.\n2.  **Geçişler:** `Idle` -> `Moving`, `Idle` -> `Attacking` tanımlayın.\n3.  **Çıkış Koşulları:** Her durumdan `Exit` koşullarını belirleyin.\nBu yapı, karakterin temel davranış akışını netleştirir ve genişletilebilir bir temel sağlar.\n\n## Uygulama Senaryosu (Multi-Tenant)\n\nBu pratiği, güvenlik alanında Basit Durum Makinesi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Basit Durum Makinesi akışını multi-tenant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 243, "no": "243", "cat": "Temel Tasarım", "name": "Type-Safe Durum Geçiş Kuralları Kılavuzu", "desc": "mühendislik bağlamında Durum Geçiş Kuralları için type-safe bir kılavuzu. Durumlar arası geçişleri tetikleyen olayları ve koşulları yapılandırın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["geçiş", "olay", "koşul", "mühendislik", "type-safe", "i̇leri"], "badge1": "İleri", "content": "## Geçiş Kurallarını Belirleme\nGeçişleri tetikleyen olay ve koşulları tanımlayın.\n1.  **Olay Tetikleyiciler:** `OnInput_Move`, `OnEnemyDetected` gibi olaylar oluşturun.\n2.  **Koşullar:** `HasStamina > 0`, `IsGrounded == true` gibi Boolean koşulları ekleyin.\n3.  **Öncelik:** Aynı anda birden fazla geçiş mümkünse öncelik sıralaması belirleyin.\nBu, durum değişimlerinin öngörülebilir ve mantıklı olmasını sağlar.\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu kılavuzu, mühendislik alanında Durum Geçiş Kuralları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Geçiş Kuralları akışını type-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 244, "no": "244", "cat": "Temel Tasarım", "name": "Reactive Hiyerarşik Durumlar Tasarımı", "desc": "veri bağlamında Hiyerarşik Durumlar için reactive bir tasarımı. İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["hiyerarşi", "alt durum", "modüler", "veri", "reactive", "başlangıç"], "badge1": "Başlangıç", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat` durumunu oluşturun.\n2.  **Alt Durumlar:** `Combat` içinde `Attacking`, `Dodging`, `Blocking` gibi alt durumlar ekleyin.\n3.  **Geçiş Kapsamı:** Alt durumların kendi içinde geçişlerini ve ana duruma geri dönüşleri belirleyin.\nBu, karmaşık sistemleri daha okunabilir ve yönetilebilir hale getirir.\n\n## Genişletilmiş Notlar (Reactive)\n\n- **Hedef Kitle:** Başlangıç seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Hiyerarşik Durumlar senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Hiyerarşik Durumlar işlemleri daha reactive hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Hiyerarşik Durumlar ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hiyerarşi, alt durum, modüler\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 245, "no": "245", "cat": "Oyun Mekanikleri", "name": "Ölçeklenebilir Karakter Hareket Durumları Kütüphanesi", "desc": "gözlemlenebilirlik bağlamında Karakter Hareket Durumları için ölçeklenebilir bir kütüphanesi. Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["oyuncu", "hareket", "mekanik", "gözlemlenebilirlik", "ölçeklenebilir", "orta"], "badge1": "Orta", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.\n\n## Uygulama Senaryosu (Ölçeklenebilir)\n\nBu kütüphanesi, gözlemlenebilirlik alanında Karakter Hareket Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Karakter Hareket Durumları akışını ölçeklenebilir yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 246, "no": "246", "cat": "Oyun Mekanikleri", "name": "Bağlamsal Zıplama Durumu Yönetimi Rehberi", "desc": "API bağlamında Zıplama Durumu Yönetimi için bağlamsal bir rehberi. Karakterin zıplama mekaniğini state machine ile uygulayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["zıplama", "fizik", "oyuncu", "API", "bağlamsal", "başlangıç"], "badge1": "Başlangıç", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Başlangıç seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Zıplama Durumu Yönetimi senaryoları\n- **Avantajları:** Bu rehberi sayesinde Zıplama Durumu Yönetimi işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Zıplama Durumu Yönetimi ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zıplama, fizik, oyuncu\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 247, "no": "247", "cat": "Oyun Mekanikleri", "name": "Hibrit Envanter Durumları Rehberi", "desc": "performans bağlamında Envanter Durumları için hibrit bir rehberi. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "performans", "hibrit", "başlangıç"], "badge1": "Başlangıç", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Uygulama Senaryosu (Hibrit)\n\nBu rehberi, performans alanında Envanter Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Envanter Durumları akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 248, "no": "248", "cat": "Animasyon", "name": "Veri-Odaklı Animasyon Durum Grafiği Sistemi", "desc": "gözlemlenebilirlik bağlamında Animasyon Durum Grafiği için veri-odaklı bir sistemi. State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "karakter", "görsel", "gözlemlenebilirlik", "veri-odaklı", "pro"], "badge1": "Pro", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Uygulama Senaryosu (Veri-Odaklı)\n\nBu sistemi, gözlemlenebilirlik alanında Animasyon Durum Grafiği problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Durum Grafiği akışını veri-odaklı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 249, "no": "249", "cat": "Animasyon", "name": "Senkron Animasyon Geçiş Blend'leri Sistemi", "desc": "API bağlamında Animasyon Geçiş Blend'leri için senkron bir sistemi. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "API", "senkron", "pro"], "badge1": "Pro", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** Pro seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Animasyon Geçiş Blend'leri senaryoları\n- **Avantajları:** Bu sistemi sayesinde Animasyon Geçiş Blend'leri işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Animasyon Geçiş Blend'leri ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, geçiş, akıcılık\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 250, "no": "250", "cat": "Animasyon", "name": "Zero-Config Durum Tabanlı Çift Sistemi", "desc": "güvenlik bağlamında Durum Tabanlı Çift için zero-config bir sistemi. Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["katman", "çift animasyon", "karmaşık", "güvenlik", "zero-config", "orta"], "badge1": "Orta", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** Orta seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Durum Tabanlı Çift senaryoları\n- **Avantajları:** Bu sistemi sayesinde Durum Tabanlı Çift işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Durum Tabanlı Çift ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katman, çift animasyon, karmaşık\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 251, "no": "251", "cat": "AI Yönetimi", "name": "Headless Düşman AI Temel Düzeneği", "desc": "şablon bağlamında Düşman AI Temel için headless bir düzeneği. Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["AI", "düşman", "davranış", "şablon", "headless", "uzman"], "badge1": "Uzman", "content": "## Temel Düşman AI Durumları\nBasit bir düşman AI için ana davranış durumlarını tanımlayın.\n1.  **`Patrol` (Devriye):** Belirli yollar üzerinde hareket eder.\n2.  **`Chase` (Kovalamaca):** Oyuncuyu görüş alanına girince takip eder.\n3.  **`Attack` (Saldırı):** Oyuncu menzile girince saldırır.\n4.  **Geçiş Koşulları:** `PlayerDetected`, `PlayerLost`, `AttackRangeReached` gibi koşulları belirleyin.\nBu, düşmanların öngörülebilir ve mantıklı davranmasını sağlar.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Uzman seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Düşman AI Temel senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Düşman AI Temel işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Düşman AI Temel ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** AI, düşman, davranış\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 252, "no": "252", "cat": "AI Yönetimi", "name": "Polyglot Algı ve Tepki Düzeni", "desc": "test bağlamında Algı ve Tepki için polyglot bir düzeni. AI'nın çevresel algılara göre durum değiştirmesini sağlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["algı", "tepki", "sensör", "test", "polyglot", "uzman"], "badge1": "Uzman", "content": "## Algı Tabanlı AI Durumları\nAI'nın çevresel algılara göre davranışını değiştiren durumlar yaratın.\n1.  **`Idle`:** Hiçbir tehdit yokken bekler.\n2.  **`Alert`:** Ses veya görsel bir ipucu aldığında şüphelenir ve araştırır.\n3.  **`Engaged`:** Doğrudan tehdit algıladığında çatışmaya girer.\n4.  **Algı Mekanizmaları:** `SightCone`, `HearRadius` gibi algı sensörlerini durum geçişlerine bağlayın.\nBu
