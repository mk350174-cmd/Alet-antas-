n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 299, "no": "299", "cat": "C++ Entegrasyon", "name": "Asenkron Olay Bazlı Geçişler Kütüphanesi", "desc": "akış bağlamında Olay Bazlı Geçişler için asenkron bir kütüphanesi. C++'ta olay dinleyicileri kullanarak durum geçişlerini tetikleyin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "olay", "geçiş", "akış", "asenkron", "pro"], "badge1": "Pro", "content": "## Olay Tabanlı C++ Geçişleri\nDurum geçişlerini C++ olay sistemine bağlayın.\n1.  **Olay Sistemi Entegrasyonu:** Oyun motorunuzun olay dinleme mekanizmalarını (delegates, signals) kullanın.\n2.  **Dinleyici Kaydı:** `CurrentState`'in `Enter()` metodunda ilgili olaylara dinleyici kaydedin.\n3.  **Geçiş Tetikleyicileri:** Olay tetiklendiğinde `StateMachine::ChangeState` metodunu çağırın.\nBu, durum değişimlerini dış olaylara duyarlı hale getirir ve kodu modülerleştirir.\n\n## Uygulama Senaryosu (Asenkron)\n\nBu kütüphanesi, akış alanında Olay Bazlı Geçişler problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Olay Bazlı Geçişler akışını asenkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 300, "no": "300", "cat": "C++ Entegrasyon", "name": "Ölçeklenebilir Durum Verisi ve Düzeneği", "desc": "mühendislik bağlamında Durum Verisi ve için ölçeklenebilir bir düzeneği. Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "veri", "bağlam", "mühendislik", "ölçeklenebilir", "orta"], "badge1": "Orta", "content": "## Durumlar Arası Veri Paylaşımı\nDurumlar arasında veri paylaşımını yönetmek için bir bağlam (context) sınıfı kullanın.\n```cpp\nclass PlayerContext {\npublic:\n    float Health;\n    bool IsGrounded;\n};\nclass PlayerState : public IState {\nprotected:\n    PlayerContext* context;\n};\n```\n`PlayerContext` sınıfı, tüm durumların erişebileceği ortak verileri tutar. Her durum bu bağlamı referans alır. Bu, veri tutarlılığını ve erişilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Ölçeklenebilir)\n\n- **Hedef Kitle:** Orta seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Durum Verisi ve senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Durum Verisi ve işlemleri daha ölçeklenebilir hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Durum Verisi ve ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, veri, bağlam\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 301, "no": "301", "cat": "C++ Entegrasyon", "name": "Resilient StateVault C++ Entegrasyon Kalıbı", "desc": "şablon bağlamında StateVault C++ Entegrasyon için resilient bir kalıbı. StateVault Pro tarafından üretilen C++ kodunu projenize entegre etme adımları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "kılavuz", "kurulum", "şablon", "resilient", "orta"], "badge1": "Orta", "content": "## StateVault C++ Entegrasyon Adımları\nStateVault tarafından üretilen C++ kodunu oyun projenize entegre edin.\n1.  **Dosya Ekleme:** Üretilen `.h` ve `.cpp` dosyalarını projenizin kaynak dizinine ekleyin.\n2.  **Derleme Ayarları:** Gerekirse derleyici ayarlarınızı (include yolları) güncelleyin.\n3.  **StateMachine Nesnesi:** Oyun motorunuzun ana döngüsünde (örneğin `Tick()` metodu) bir `StateMachine` nesnesi örneklendirin.\n4.  **Güncelleme Çağrısı:** Her karede `stateMachine->Update()` metodunu çağırın.\nBu, StateVault çıktısını hızla kullanıma almanızı sağlar.\n\n## Uygulama Senaryosu (Resilient)\n\nBu kalıbı, şablon alanında StateVault C++ Entegrasyon problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** StateVault C++ Entegrasyon akışını resilient yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 302, "no": "302", "cat": "Temel Tasarım", "name": "Production-Grade Basit Durum Makinesi Yönergesi", "desc": "dağıtım bağlamında Basit Durum Makinesi için production-grade bir yönergesi. Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "mimari", "yapı", "dağıtım", "production-grade", "orta"], "badge1": "Orta", "content": "## Yeni State Machine Oluşturma\nBir oyun objesi için temel durum makinesini tanımlayın.\n1.  **Başlangıç Durumu:** `Idle` olarak adlandırın.\n2.  **Geçişler:** `Idle` -> `Moving`, `Idle` -> `Attacking` tanımlayın.\n3.  **Çıkış Koşulları:** Her durumdan `Exit` koşullarını belirleyin.\nBu yapı, karakterin temel davranış akışını netleştirir ve genişletilebilir bir temel sağlar.\n\n## Genişletilmiş Notlar (Production-Grade)\n\n- **Hedef Kitle:** Orta seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Basit Durum Makinesi senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Basit Durum Makinesi işlemleri daha production-grade hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Basit Durum Makinesi ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** temel, mimari, yapı\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 303, "no": "303", "cat": "Temel Tasarım", "name": "Hibrit-Cloud Durum Geçiş Kuralları Standartı", "desc": "akış bağlamında Durum Geçiş Kuralları için hibrit-cloud bir standartı. Durumlar arası geçişleri tetikleyen olayları ve koşulları yapılandırın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["geçiş", "olay", "koşul", "akış", "hibrit-cloud", "orta"], "badge1": "Orta", "content": "## Geçiş Kurallarını Belirleme\nGeçişleri tetikleyen olay ve koşulları tanımlayın.\n1.  **Olay Tetikleyiciler:** `OnInput_Move`, `OnEnemyDetected` gibi olaylar oluşturun.\n2.  **Koşullar:** `HasStamina > 0`, `IsGrounded == true` gibi Boolean koşulları ekleyin.\n3.  **Öncelik:** Aynı anda birden fazla geçiş mümkünse öncelik sıralaması belirleyin.\nBu, durum değişimlerinin öngörülebilir ve mantıklı olmasını sağlar.\n\n## Uygulama Senaryosu (Hibrit-Cloud)\n\nBu standartı, akış alanında Durum Geçiş Kuralları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Geçiş Kuralları akışını hibrit-cloud yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 304, "no": "304", "cat": "Temel Tasarım", "name": "Adaptif Hiyerarşik Durumlar Sistemi", "desc": "yapay zeka bağlamında Hiyerarşik Durumlar için adaptif bir sistemi. İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["hiyerarşi", "alt durum", "modüler", "yapay zeka", "adaptif", "uzman"], "badge1": "Uzman", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat` durumunu oluşturun.\n2.  **Alt Durumlar:** `Combat` içinde `Attacking`, `Dodging`, `Blocking` gibi alt durumlar ekleyin.\n3.  **Geçiş Kapsamı:** Alt durumların kendi içinde geçişlerini ve ana duruma geri dönüşleri belirleyin.\nBu, karmaşık sistemleri daha okunabilir ve yönetilebilir hale getirir.\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** Uzman seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Hiyerarşik Durumlar senaryoları\n- **Avantajları:** Bu sistemi sayesinde Hiyerarşik Durumlar işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Hiyerarşik Durumlar ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hiyerarşi, alt durum, modüler\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 305, "no": "305", "cat": "Oyun Mekanikleri", "name": "Reaktif Karakter Hareket Durumları Algoritması", "desc": "caching bağlamında Karakter Hareket Durumları için reaktif bir algoritması. Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["oyuncu", "hareket", "mekanik", "caching", "reaktif", "orta"], "badge1": "Orta", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Orta seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Karakter Hareket Durumları senaryoları\n- **Avantajları:** Bu algoritması sayesinde Karakter Hareket Durumları işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Karakter Hareket Durumları ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** oyuncu, hareket, mekanik\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 306, "no": "306", "cat": "Oyun Mekanikleri", "name": "Idempotent Zıplama Durumu Yönetimi Kalıbı", "desc": "test bağlamında Zıplama Durumu Yönetimi için idempotent bir kalıbı. Karakterin zıplama mekaniğini state machine ile uygulayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["zıplama", "fizik", "oyuncu", "test", "idempotent", "i̇leri"], "badge1": "İleri", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** İleri seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Zıplama Durumu Yönetimi senaryoları\n- **Avantajları:** Bu kalıbı sayesinde Zıplama Durumu Yönetimi işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Zıplama Durumu Yönetimi ihtiyacını analiz edin.\n  2. Bu kalıbı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zıplama, fizik, oyuncu\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 307, "no": "307", "cat": "Oyun Mekanikleri", "name": "AI-Augmented Envanter Durumları İskeleti", "desc": "monitoring bağlamında Envanter Durumları için ai-augmented bir i̇skeleti. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "monitoring", "ai-augmented", "i̇leri"], "badge1": "İleri", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Genişletilmiş Notlar (AI-Augmented)\n\n- **Hedef Kitle:** İleri seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Envanter Durumları senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Envanter Durumları işlemleri daha ai-augmented hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Envanter Durumları ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** UI, envanter, oyuncu\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 308, "no": "308", "cat": "Animasyon", "name": "Reactive Animasyon Durum Grafiği Kalıbı", "desc": "gözlemlenebilirlik bağlamında Animasyon Durum Grafiği için reactive bir kalıbı. State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "karakter", "görsel", "gözlemlenebilirlik", "reactive", "başlangıç"], "badge1": "Başlangıç", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Uygulama Senaryosu (Reactive)\n\nBu kalıbı, gözlemlenebilirlik alanında Animasyon Durum Grafiği problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Durum Grafiği akışını reactive yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 309, "no": "309", "cat": "Animasyon", "name": "Yalın Animasyon Geçiş Blend'leri Sistemi", "desc": "mühendislik bağlamında Animasyon Geçiş Blend'leri için yalın bir sistemi. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "mühendislik", "yalın", "uzman"], "badge1": "Uzman", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Genişletilmiş Notlar (Yalın)\n\n- **Hedef Kitle:** Uzman seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Animasyon Geçiş Blend'leri senaryoları\n- **Avantajları:** Bu sistemi sayesinde Animasyon Geçiş Blend'leri işlemleri daha yalın hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Animasyon Geçiş Blend'leri ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, geçiş, akıcılık\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 310, "no": "310", "cat": "Animasyon", "name": "Performant Durum Tabanlı Çift Mimari Yaklaşımı", "desc": "API bağlamında Durum Tabanlı Çift için performant bir mimari yaklaşımı. Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["katman", "çift animasyon", "karmaşık", "API", "performant", "i̇leri"], "badge1": "İleri", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.\n\n## Uygulama Senaryosu (Performant)\n\nBu mimari yaklaşımı, API alanında Durum Tabanlı Çift problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Tabanlı Çift akışını performant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 311, "no": "311", "cat": "AI Yönetimi", "name": "Layered Düşman AI Temel Anlaşması", "desc": "entegrasyon bağlamında Düşman AI Temel için layered bir anlaşması. Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["AI", "düşman", "davranış", "entegrasyon", "layered", "orta"], "badge1": "Orta", "content": "## Temel Düşman AI Durumları\nBasit bir düşman AI için ana davranış durumlarını tanımlayın.\n1.  **`Patrol` (Devriye):** Belirli yollar üzerinde hareket eder.\n2.  **`Chase` (Kovalamaca):** Oyuncuyu görüş alanına girince takip eder.\n3.  **`Attack` (Saldırı):** Oyuncu menzile girince saldırır.\n4.  **Geçiş Koşulları:** `PlayerDetected`, `PlayerLost`, `AttackRangeReached` gibi koşulları belirleyin.\nBu, düşmanların öngörülebilir ve mantıklı davranmasını sağlar.\n\n## Genişletilmiş Notlar (Layered)\n\n- **Hedef Kitle:** Orta seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Düşman AI Temel senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Düşman AI Temel işlemleri daha layered hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Düşman AI Temel ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** AI, düşman, davranış\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 312, "no": "312", "cat": "AI Yönetimi", "name": "Senkron Algı ve Tepki Standartı", "desc": "logging bağlamında Algı ve Tepki için senkron bir standartı. AI'nın çevresel algılara göre durum değiştirmesini sağlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["algı", "tepki", "sensör", "logging", "senkron", "başlangıç"], "badge1": "Başlangıç", "content": "## Algı Tabanlı AI Durumları\nAI'nın çevresel algılara göre davranışını değiştiren durumlar yaratın.\n1.  **`Idle`:** Hiçbir tehdit yokken bekler.\n2.  **`Alert`:** Ses veya görsel bir ipucu aldığında şüphelenir ve araştırır.\n3.  **`Engaged`:** Doğrudan tehdit algıladığında çatışmaya girer.\n4.  **Algı Mekanizmaları:** `SightCone`, `HearRadius` gibi algı sensörlerini durum geçişlerine bağlayın.\nBu, AI'ya dinamik ve gerçekçi tepkiler kazandırır.\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** Başlangıç seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Algı ve Tepki senaryoları\n- **Avantajları:** Bu standartı sayesinde Algı ve Tepki işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Algı ve Tepki ihtiyacını analiz edin.\n  2. Bu standartı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** algı, tepki, sensör\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 313, "no": "313", "cat": "AI Yönetimi", "name": "Serverless Hedef Tabanlı AI Önerisi", "desc": "monitoring bağlamında Hedef Tabanlı AI için serverless bir önerisi. AI'nın belirli hedeflere ulaşmak için durumlarını yönetin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["hedef", "görev", "NPC", "monitoring", "serverless", "uzman"], "badge1": "Uzman", "content": "## Hedef Odaklı AI Durumları\nAI'nın belirli bir hedefe ulaşmak için durumlar arasında geçiş yapmasını sağlayın.\n1.  **`SeekingObjective`:** Belirlenen bir hedefe doğru hareket eder.\n2.  **`InteractingWithTarget`:** Hedefe ulaştığında belirli bir eylemi gerçekleştirir (örneğin, kapı açma).\n3.  **`ReturningToPost`:** Hedefe ulaşıldıktan sonra başlangıç noktasına döner.\n4.  **Hedef Koşulları:** `TargetReached`, `InteractionComplete` gibi koşulları tanımlayın.\nBu, görev tabanlı AI davranışlarını kolaylaştırır.\n\n## Uygulama Senaryosu (Serverless)\n\nBu önerisi, monitoring alanında Hedef Tabanlı AI problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hedef Tabanlı AI akışını serverless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 314, "no": "314", "cat": "3D Etkileşim", "name": "Yalın Etkileşimli Obje Durumları Mimari Yaklaşımı", "desc": "mühendislik bağlamında Etkileşimli Obje Durumları için yalın bir mimari yaklaşımı. Kapı, düğme gibi 3D objelerin etkileşim durumlarını modelleyin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["objeler", "etkileşim", "çevre", "mühendislik", "yalın", "uzman"], "badge1": "Uzman", "content": "## Etkileşimli Objelerin Durumları\nBir kapı veya düğme gibi objelerin etkileşim durumlarını tanımlayın.\n1.  **`Closed` / `Locked`:** Objenin varsayılan kapalı veya kilitli durumu.\n2.  **`Open` / `Unlocked`:** Objenin etkileşim sonucu açılmış veya kilitsiz durumu.\n3.  **`Interacting`:** Oyuncunun objeyle etkileşimde olduğu kısa süreli durum (animasyon oynatma).\n4.  **Geçişler:** `UseKey`, `PlayerProximity`, `ButtonPressed` gibi olayları kullanın.\nBu, çevre etkileşimlerini düzenler.\n\n## Genişletilmiş Notlar (Yalın)\n\n- **Hedef Kitle:** Uzman seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Etkileşimli Obje Durumları senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Etkileşimli Obje Durumları işlemleri daha yalın hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Etkileşimli Obje Durumları ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** objeler, etkileşim, çevre\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 315, "no": "315", "cat": "3D Etkileşim", "name": "Veri-Odaklı Kamera Durumları Düzeni", "desc": "monitoring bağlamında Kamera Durumları için veri-odaklı bir düzeni. Oyun içi kamera açısı ve mod değişimlerini durum makinesi ile yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["kamera", "görünüm", "cinematik", "monitoring", "veri-odaklı", "başlangıç"], "badge1": "Başlangıç", "content": "## Kamera Modları Durum Makinesi\nFarklı kamera görünümleri için durumlar oluşturun.\n1.  **`ThirdPerson`:** Varsayılan oyuncu takibi.\n2.  **`FirstPerson`:** Yakın çekim veya nişan alma modu.\n3.  **`Cinematic`:** Önceden tanımlanmış bir kamera yolu.\n4.  **Geçişler:** `AimButtonPressed`, `CutsceneTriggered`, `ViewModeChange` gibi olayları kullanın.\nBu, kamera geçişlerini akıcı ve kontrol edilebilir hale getirir.\n\n## Genişletilmiş Notlar (Veri-Odaklı)\n\n- **Hedef Kitle:** Başlangıç seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Kamera Durumları senaryoları\n- **Avantajları:** Bu düzeni sayesinde Kamera Durumları işlemleri daha veri-odaklı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Kamera Durumları ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** kamera, görünüm, cinematik\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 316, "no": "316", "cat": "3D Etkileşim", "name": "Adaptif Araç Sürüş Durumları Önerisi", "desc": "veri bağlamında Araç Sürüş Durumları için adaptif bir önerisi. Araçların hızlanma, frenleme ve dönme gibi sürüş durumlarını kontrol edin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["araç", "sürüş", "fizik", "veri", "adaptif", "orta"], "badge1": "Orta", "content": "## Araç Sürüş Durumları\nBir aracın sürüş mekaniklerini state machine ile modelleyin.\n1.  **`Idle`:** Araç duruyor.\n2.  **`Accelerating`:** Gaz pedalı basılı, araç hızlanıyor.\n3.  **`Braking`:** Fren basılı, araç yavaşlıyor.\n4.  **`Turning`:** Direksiyon çevriliyor.\n5.  **Geçişler:** `GasInput`, `BrakeInput`, `SteerInput` gibi girişleri kullanarak durumları değiştirin.\nBu, araç fiziği ve kontrolünü daha modüler yapar.\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** Orta seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Araç Sürüş Durumları senaryoları\n- **Avantajları:** Bu önerisi sayesinde Araç Sürüş Durumları işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Araç Sürüş Durumları ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** araç, sürüş, fizik\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 317, "no": "317", "cat": "C++ Entegrasyon", "name": "Type-Safe Temel C++ Sınıf Sistemi", "desc": "şablon bağlamında Temel C++ Sınıf için type-safe bir sistemi. Durum makinesini C++ sınıflarına dönüştürmek için temel bir yapı oluşturun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "kod", "şablon", "type-safe", "uzman"], "badge1": "Uzman", "content": "## C++ Durum Sınıfı Şablonu\nStateVault'tan C++ kod çıktısı için temel bir sınıf yapısı oluşturun.\n```cpp\nclass IState {\npublic:\n    virtual void Enter() = 0;\n    virtual void Execute() = 0;\n    virtual void Exit() = 0;\n};\n```\nBu arayüz, her durumun belirli bir yaşam döngüsü metoduna sahip olmasını garanti eder ve kodun genişletilebilirliğini artırır.\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu sistemi, şablon alanında Temel C++ Sınıf problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Temel C++ Sınıf akışını type-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 318, "no": "318", "cat": "C++ Entegrasyon", "name": "Multi-Tenant Durum Yöneticisi Uygulaması İskeleti", "desc": "yapay zeka bağlamında Durum Yöneticisi Uygulaması için multi-tenant bir i̇skeleti. Durumlar arası geçişleri ve güncellemeleri yöneten bir C++ sınıfı tasarlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "yönetici", "tasarım", "yapay zeka", "multi-tenant", "başlangıç"], "badge1": "Başlangıç", "content": "## Durum Yöneticisi C++ Kodu\nDurumlar arası geçişleri ve güncellemeleri yönetecek bir sınıf oluşturun.\n```cpp\nclass StateMachine {\n    IState* currentState;\npublic:\n    void ChangeState(IState* newState);\n    void Update();\n};\n```\n`ChangeState` metodu mevcut durumu sonlandırır ve yeni durumu başlatır. `Update` ise mevcut durumu her karede çalıştırır. Bu, merkezi bir kontrol noktası sağlar.\n\n## Uygulama Senaryosu (Multi-Tenant)\n\nBu i̇skeleti, yapay zeka alanında Durum Yöneticisi Uygulaması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Yöneticisi Uygulaması akışını multi-tenant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 319, "no": "319", "cat": "C++ Entegrasyon", "name": "Veri-Odaklı Olay Bazlı Geçişler İskeleti", "desc": "veri bağlamında Olay Bazlı Geçişler için veri-odaklı bir i̇skeleti. C++'ta olay dinleyicileri kullanarak durum geçişlerini tetikleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "olay", "geçiş", "veri", "veri-odaklı", "başlangıç"], "badge1": "Başlangıç", "content": "## Olay Tabanlı C++ Geçişleri\nDurum geçişlerini C++ olay sistemine bağlayın.\n1.  **Olay Sistemi Entegrasyonu:** Oyun motorunuzun olay dinleme mekanizmalarını (delegates, signals) kullanın.\n2.  **Dinleyici Kaydı:** `CurrentState`'in `Enter()` metodunda ilgili olaylara dinleyici kaydedin.\n3.  **Geçiş Tetikleyicileri:** Olay tetiklendiğinde `StateMachine::ChangeState` metodunu çağırın.\nBu, durum değişimlerini dış olaylara duyarlı hale getirir ve kodu modülerleştirir.\n\n## Genişletilmiş Notlar (Veri-Odaklı)\n\n- **Hedef Kitle:** Başlangıç seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Olay Bazlı Geçişler senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Olay Bazlı Geçişler işlemleri daha veri-odaklı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Olay Bazlı Geçişler ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, olay, geçiş\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 320, "no": "320", "cat": "C++ Entegrasyon", "name": "Edge-Optimize Durum Verisi ve Anlaşması", "desc": "API bağlamında Durum Verisi ve için edge-optimize bir anlaşması. Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "veri", "bağlam", "API", "edge-optimize", "orta"], "badge1": "Orta", "content": "## Durumlar Arası Veri Paylaşımı\nDurumlar arasında veri paylaşımını yönetmek için bir bağlam (context) sınıfı kullanın.\n```cpp\nclass PlayerContext {\npublic:\n    float Health;\n    bool IsGrounded;\n};\nclass PlayerState : public IState {\nprotected:\n    PlayerContext* context;\n};\n```\n`PlayerContext` sınıfı, tüm durumların erişebileceği ortak verileri tutar. Her durum bu bağlamı referans alır. Bu, veri tutarlılığını ve erişilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Edge-Optimize)\n\n- **Hedef Kitle:** Orta seviye API kullanıcıları\n- **Uygulama A 20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** geçiş, olay, koşul\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 324, "no": "324", "cat": "Temel Tasarım", "name": "Memory-Safe Hiyerarşik Durumlar Metodu", "desc": "mikroservis bağlamında Hiyerarşik Durumlar için memory-safe bir metodu. İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["hiyerarşi", "alt durum", "modüler", "mikroservis", "memory-safe", "uzman"], "badge1": "Uzman", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat` durumunu oluşturun.\n2.  **Alt Durumlar:** `Combat` içinde `Attacking`, `Dodging`, `Blocking` gibi alt durumlar ekleyin.\n3.  **Geçiş Kapsamı:** Alt durumların kendi içinde geçişlerini ve ana duruma geri dönüşleri belirleyin.\nBu, karmaşık sistemleri daha okunabilir ve yönetilebilir hale getirir.\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** Uzman seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Hiyerarşik Durumlar senaryoları\n- **Avantajları:** Bu metodu sayesinde Hiyerarşik Durumlar işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Hiyerarşik Durumlar ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hiyerarşi, alt durum, modüler\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 325, "no": "325", "cat": "Oyun Mekanikleri", "name": "Kanıt-Tabanlı Karakter Hareket Durumları Standartı", "desc": "test bağlamında Karakter Hareket Durumları için kanıt-tabanlı bir standartı. Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["oyuncu", "hareket", "mekanik", "test", "kanıt-tabanlı", "orta"], "badge1": "Orta", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu standartı, test alanında Karakter Hareket Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Karakter Hareket Durumları akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 326, "no": "326", "cat": "Oyun Mekanikleri", "name": "Adaptif Zıplama Durumu Yönetimi Doktrini", "desc": "test bağlamında Zıplama Durumu Yönetimi için adaptif bir doktrini. Karakterin zıplama mekaniğini state machine ile uygulayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["zıplama", "fizik", "oyuncu", "test", "adaptif", "i̇leri"], "badge1": "İleri", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** İleri seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Zıplama Durumu Yönetimi senaryoları\n- **Avantajları:** Bu doktrini sayesinde Zıplama Durumu Yönetimi işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Zıplama Durumu Yönetimi ihtiyacını analiz edin.\n  2. Bu doktrini'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zıplama, fizik, oyuncu\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 327, "no": "327", "cat": "Oyun Mekanikleri", "name": "Memory-Safe Envanter Durumları Düzeni", "desc": "akış bağlamında Envanter Durumları için memory-safe bir düzeni. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "akış", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu düzeni, akış alanında Envanter Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Envanter Durumları akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 328, "no": "328", "cat": "Animasyon", "name": "Senkron Animasyon Durum Grafiği Önerisi", "desc": "dağıtım bağlamında Animasyon Durum Grafiği için senkron bir önerisi. State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "karakter", "görsel", "dağıtım", "senkron", "i̇leri"], "badge1": "İleri", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Uygulama Senaryosu (Senkron)\n\nBu önerisi, dağıtım alanında Animasyon Durum Grafiği problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Durum Grafiği akışını senkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 329, "no": "329", "cat": "Animasyon", "name": "Kullanıcı-Merkezli Animasyon Geçiş Blend'leri Doktrini", "desc": "entegrasyon bağlamında Animasyon Geçiş Blend'leri için kullanıcı-merkezli bir doktrini. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "entegrasyon", "kullanıcı-merkezli", "orta"], "badge1": "Orta", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu doktrini, entegrasyon alanında Animasyon Geçiş Blend'leri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Geçiş Blend'leri akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 330, "no": "330", "cat": "Animasyon", "name": "API-First Durum Tabanlı Çift Çekirdeği", "desc": "test bağlamında Durum Tabanlı Çift için api-first bir çekirdeği. Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["katman", "çift animasyon", "karmaşık", "test", "api-first", "pro"], "badge1": "Pro", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.\n\n## Genişletilmiş Notlar (API-First)\n\n- **Hedef Kitle:** Pro seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Durum Tabanlı Çift senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Durum Tabanlı Çift işlemleri daha api-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Durum Tabanlı Çift ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayı ı analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hiyerarşi, alt durum, modüler\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 345, "no": "345", "cat": "Oyun Mekanikleri", "name": "Container-Native Karakter Hareket Durumları Düzeneği", "desc": "monitoring bağlamında Karakter Hareket Durumları için container-native bir düzeneği. Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["oyuncu", "hareket", "mekanik", "monitoring", "container-native", "i̇leri"], "badge1": "İleri", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.\n\n## Uygulama Senaryosu (Container-Native)\n\nBu düzeneği, monitoring alanında Karakter Hareket Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Karakter Hareket Durumları akışını container-native yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri ir Envanter Durumları Yönergesi", "desc": "performans bağlamında Envanter Durumları için ölçeklenebilir bir yönergesi. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "performans", "ölçeklenebilir", "i̇leri"], "badge1": "İleri", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Genişletilmiş Notlar (Ölçeklenebilir)\n\n- **Hedef Kitle:** İleri seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Envanter Durumları senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Envanter Durumları işlemleri daha ölçeklenebilir hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Envanter Durumları ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** UI, envanter, oyuncu\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 348, "no": "348", "cat": "Animasyon", "name": "Kullanıcı-Merkezli Animasyon Durum Grafiği Çekirdeği", "desc": "ölçeklenme bağlamında Animasyon Durum Grafiği için kullanıcı-merkezli bir çekirdeği. State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "karakter", "görsel", "ölçeklenme", "kullanıcı-merkezli", "i̇leri"], "badge1": "İleri", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu çekirdeği, ölçeklenme alanında Animasyon Durum Grafiği problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Durum Grafiği akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 349, "no": "349", "cat": "Animasyon", "name": "Pipeline Animasyon Geçiş Blend'leri Şablonu", "desc": "API bağlamında Animasyon Geçiş Blend'leri için pipeline bir şablonu. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "API", "pipeline", "uzman"], "badge1": "Uzman", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Uygulama Senaryosu (Pipeline)\n\nBu şablonu, API alanında Animasyon Geçiş Blend'leri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Geçiş Blend'leri akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 350, "no": "350", "cat": "Animasyon", "name": "Kanıt-Tabanlı Durum Tabanlı Çift Optimizasyonu", "desc": "akış bağlamında Durum Tabanlı Çift için kanıt-tabanlı bir optimizasyonu. Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["katman", "çift animasyon", "karmaşık", "akış", "kanıt-tabanlı", "pro"], "badge1": "Pro", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.\n\n## Genişletilmiş Notlar (Kanıt-Tabanlı)\n\n- **Hedef Kitle:** Pro seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Durum Tabanlı Çift senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde Durum Tabanlı Çift işlemleri daha kanıt-tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Durum Tabanlı Çift ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katman, çift animasyon, karmaşık\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 351, "no": "351", "cat": "AI Yönetimi", "name": "Otonom Düşman AI Temel Modeli", "desc": "gözlemlenebilirlik bağlamında Düşman AI Temel için otonom bir modeli. Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["AI", "düşman", "davranış", "gözlemlenebilirlik", "otonom", "başlangıç"], "badge1": "Başlangıç", "content": "## Temel Düşman AI Durumları\nBasit bir düşman AI için ana davranış durumlarını tanımlayın.\n1.  **`Patrol` (Devriye):** Belirli yollar üzerinde hareket eder.\n2.  **`Chase` (Kovalamaca):** Oyuncuyu görüş alanına girince takip eder.\n3.  **`Attack` (Saldırı):** Oyuncu menzile girince saldırır.\n4.  **Geçiş Koşulları:** `PlayerDetected`, `PlayerLost`, `AttackRangeReached` gibi koşulları belirleyin.\nBu, düşmanların öngörülebilir ve mantıklı davranmasını sağlar.\n\n## Genişletilmiş Notlar (Otonom)\n\n- **Hedef Kitle:** Başlangıç seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Düşman AI Temel senaryoları\n- **Avantajları:** Bu modeli sayesinde Düşman AI Temel işlemleri daha otonom hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Düşman AI Temel ihtiyacını analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** AI, düşman, davranış\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 352, "no": "352", "cat": "AI Yönetimi", "name": "Composable Algı ve Tepki Doktrini", "desc": "dağıtım bağlamında Algı ve Tepki için composable bir doktrini. AI'nın çevresel algılara göre durum değiştirmesini sağlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["algı", "tepki", "sensör", "dağıtım", "composable", "pro"], "badge1": "Pro", "content": "## Algı Tabanlı AI Durumları\nAI'nın çevresel algılara göre davranışını değiştiren durumlar yaratın.\n1.  **`Idle`:** Hiçbir tehdit yokken bekler.\n2.  **`Alert`:** Ses veya görsel bir ipucu aldığında şüphelenir ve araştırır.\n3.  **`Engaged`:** Doğrudan tehdit algıladığında çatışmaya girer.\n4.  **Algı Mekanizmaları:** `SightCone`, `HearRadius` gibi algı sensörlerini durum geçişlerine bağlayın.\nBu, AI'ya dinamik ve gerçekçi tepkiler kazandırır.\n\n## Genişletilmiş Notlar (Composable)\n\n- **Hedef Kitle:** Pro seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Algı ve Tepki senaryoları\n- **Avantajları:** Bu doktrini sayesinde Algı ve Tepki işlemleri daha composable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Algı ve Tepki ihtiyacını analiz edin.\n  2. Bu doktrini'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** algı, tepki, sensör\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 353, "no": "353", "cat": "AI Yönetimi", "name": "Stream Tabanlı Hedef Tabanlı AI Önerisi", "desc": "API bağlamında Hedef Tabanlı AI için stream tabanlı bir önerisi. AI'nın belirli hedeflere ulaşmak için durumlarını yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["hedef", "görev", "NPC", "API", "stream tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Hedef Odaklı AI Durumları\nAI'nın belirli bir hedefe ulaşmak için durumlar arasında geçiş yapmasını sağlayın.\n1.  **`SeekingObjective`:** Belirlenen bir hedefe doğru hareket eder.\n2.  **`InteractingWithTarget`:** Hedefe ulaştığında belirli bir eylemi gerçekleştirir (örneğin, kapı açma).\n3.  **`ReturningToPost`:** Hedefe ulaşıldıktan sonra başlangıç noktasına döner.\n4.  **Hedef Koşulları:** `TargetReached`, `InteractionComplete` gibi koşulları tanımlayın.\nBu, görev tabanlı AI davranışlarını kolaylaştırır.\n\n## Uygulama Senaryosu (Stream Tabanlı)\n\nBu önerisi, API alanında Hedef Tabanlı AI problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hedef Tabanlı AI akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 354, "no": "354", "cat": "3D Etkileşim", "name": "Yalın Etkileşimli Obje Durumları Protokolü", "desc": "mikroservis bağlamında Etkileşimli Obje Durumları için yalın bir protokolü. Kapı, düğme gibi 3D objelerin etkileşim durumlarını modelleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["objeler", "etkileşim", "çevre", "mikroservis", "yalın", "i̇leri"], "badge1": "İleri", "content": "## Etkileşimli Objelerin Durumları\nBir kapı veya düğme gibi objelerin etkileşim durumlarını tanımlayın.\n1.  **`Closed` / `Locked`:** Objenin varsayılan kapalı veya kilitli durumu.\n2.  **`Open` / `Unlocked`:** Objenin etkileşim sonucu açılmış veya kilitsiz durumu.\n3.  **`Interacting`:** Oyuncunun objeyle etkileşimde olduğu kısa süreli durum (animasyon oynatma).\n4.  **Geçişler:** `UseKey`, `PlayerProximity`, `ButtonPressed` gibi olayları kullanın.\nBu, çevre etkileşimlerini düzenler.\n\n## Uygulama Senaryosu (Yalın)\n\nBu protokolü, mikroservis alanında Etkileşimli Obje Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Etkileşimli Obje Durumları akışını yalın yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 355, "no": "355", "cat": "3D Etkileşim", "name": "Olay-Güdümlü Kamera Durumları Mimari Yaklaşımı", "desc": "test bağlamında Kamera Durumları için olay-güdümlü bir mimari yaklaşımı. Oyun içi kamera açısı ve mod değişimlerini durum makinesi ile yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["kamera", "görünüm", "cinematik", "test", "olay-güdümlü", "başlangıç"], "badge1": "Başlangıç", "content": "## Kamera Modları Durum Makinesi\nFarklı kamera görünümleri için durumlar oluşturun.\n1.  **`ThirdPerson`:** Varsayılan oyuncu takibi.\n2.  **`FirstPerson`:** Yakın çekim veya nişan alma modu.\n3.  **`Cinematic`:** Önceden tanımlanmış bir kamera yolu.\n4.  **Geçişler:** `AimButtonPressed`, `CutsceneTriggered`, `ViewModeChange` gibi olayları kullanın.\nBu, kamera geçişlerini akıcı ve kontrol edilebilir hale getirir.\n\n## Uygulama Senaryosu (Olay-Güdümlü)\n\nBu mimari yaklaşımı, test alanında Kamera Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Kamera Durumları akışını olay-güdümlü yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 356, "no": "356", "cat": "3D Etkileşim", "name": "Kullanıcı-Merkezli Araç Sürüş Durumları Rehberi", "desc": "test bağlamında Araç Sürüş Durumları için kullanıcı-merkezli bir rehberi. Araçların hızlanma, frenleme ve dönme gibi sürüş durumlarını kontrol edin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["araç", "sürüş", "fizik", "test", "kullanıcı-merkezli", "uzman"], "badge1": "Uzman", "content": "## Araç Sürüş Durumları\nBir aracın sürüş mekaniklerini state machine ile modelleyin.\n1.  **`Idle`:** Araç duruyor.\n2.  **`Accelerating`:** Gaz pedalı basılı, araç hızlanıyor.\n3.  **`Braking`:** Fren basılı, araç yavaşlıyor.\n4.  **`Turning`:** Direksiyon çevriliyor.\n5.  **Geçişler:** `GasInput`, `BrakeInput`, `SteerInput` gibi girişleri kullanarak durumları değiştirin.\nBu, araç fiziği ve kontrolünü daha modüler yapar.\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu rehberi, test alanında Araç Sürüş Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Araç Sürüş Durumları akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 357, "no": "357", "cat": "C++ Entegrasyon", "name": "Edge-Optimize Temel C++ Sınıf Rehberi", "desc": "ölçeklenme bağlamında Temel C++ Sınıf için edge-optimize bir rehberi. Durum makinesini C++ sınıflarına dönüştürmek için temel bir yapı oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "kod", "şablon", "ölçeklenme", "edge-optimize", "orta"], "badge1": "Orta", "content": "## C++ Durum Sınıfı Şablonu\nStateVault'tan C++ kod çıktısı için temel bir sınıf yapısı oluşturun.\n```cpp\nclass IState {\npublic:\n    virtual void Enter() = 0;\n    virtual void Execute() = 0;\n    virtual void Exit() = 0;\n};\n```\nBu arayüz, her durumun belirli bir yaşam döngüsü metoduna sa ip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 360, "no": "360", "cat": "C++ Entegrasyon", "name": "Modüler Durum Verisi ve Çekirdeği", "desc": "test bağlamında Durum Verisi ve için modüler bir çekirdeği. Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "veri", "bağlam", "test", "modüler", "başlangıç"], "badge1": "Başlangıç", "content": "## Durumlar Arası Veri Paylaşımı\nDurumlar arasında veri paylaşımını yönetmek için bir bağlam (context) sınıfı kullanın.\n```cpp\nclass PlayerContext {\npublic:\n    float Health;\n    bool IsGrounded;\n};\nclass PlayerState : public IState {\nprotected:\n    PlayerContext* context;\n};\n```\n`PlayerContext` sınıfı, tüm durumların erişebileceği ortak verileri tutar. Her durum bu bağlamı referans alır. Bu, veri tutarlılığını ve erişilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Modüler)\n\n- **Hedef Kitle:** Başlangıç seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Durum Verisi ve senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Durum Verisi ve işlemleri daha modüler hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Durum Verisi ve ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yap  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** entegrasyon, kılavuz, kurulum\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 362, "no": "362", "cat": "Temel Tasarım", "name": "Ölçeklenebilir Basit Durum Makinesi Çerçevesi", "desc": "gözlemlenebilirlik bağlamında Basit Durum Makinesi için ölçeklenebilir bir çerçevesi. Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "mimari", "yapı", "gözlemlenebilirlik", "ölçeklenebilir", "pro"], "badge1": "Pro", "content": "## Yeni State Machine Oluşturma\nBir oyun objesi için temel durum makinesini tanımlayın.\n1.  **Başlangıç Durumu:** `Idle` olarak adlandırın.\n2.  **Geçişler:** `Idle` -> `Moving`, `Idle` -> `Attacking` tanımlayın.\n3.  **Çıkış Koşulları:** Her durumdan `Exit` koşullarını belirleyin.\nBu yapı, karakterin temel davranış akışını netleştirir ve genişletilebilir bir temel sağlar.\n\n## Uygulama Senaryosu (Ölçeklenebilir)\n\nBu çerçevesi, gözlemlenebilirlik alanında Basit Durum Makinesi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Basit Durum Makinesi akışını ölçeklenebilir yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 363, "no": "363", "cat": "Temel Tasarım", "name": "Atomic Durum Geçiş Kuralları Şablonu", "desc": "performans bağlamında Durum Geçiş Kuralları için atomic bir şablonu. Durumlar arası geçişleri tetikleyen olayları ve koşulları yapılandırın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["geçiş", "olay", "koşul", "performans", "atomic", "orta"], "badge1": "Orta", "content": "## Geçiş Kurallarını Belirleme\nGeçişleri tetikleyen olay ve koşulları tanımlayın.\n1.  **Olay Tetikleyiciler:** `OnInput_Move`, `OnEnemyDetected` gibi olaylar oluşturun.\n2.  **Koşullar:** `HasStamina > 0`, `IsGrounded == true` gibi Boolean koşulları ekleyin.\n3.  **Öncelik:** Aynı anda birden fazla geçiş mümkünse öncelik sıralaması belirleyin.\nBu, durum değişimlerinin öngörülebilir ve mantıklı olmasını sağlar.\n\n## Uygulama Senaryosu (Atomic)\n\nBu şablonu, performans alanında Durum Geçiş Kuralları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Geçiş Kuralları akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 364, "no": "364", "cat": "Temel Tasarım", "name": "Yalın Hiyerarşik Durumlar Pratiği", "desc": "entegrasyon bağlamında Hiyerarşik Durumlar için yalın bir pratiği. İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["hiyerarşi", "alt durum", "modüler", "entegrasyon", "yalın", "orta"], "badge1": "Orta", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat`
