<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">S</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">State<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Karmaşık state-machine (durum makinesi) yapılarını modelleyen ve C++ çıktı veren araç.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>20</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="State ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">20</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

<script>

const CATS = [{"id":"Temel Tasarım","name":"Temel State Machine Tasarımı","color":"#4CAF50"},{"id":"Oyun Mekanikleri","name":"Oyun Mekaniği Uygulamaları","color":"#FFC107"},{"id":"Animasyon","name":"Karakter Animasyon Durumları","color":"#2196F3"},{"id":"AI Yönetimi","name":"AI Durum Yönetimi","color":"#E91E63"},{"id":"3D Etkileşim","name":"3D Sahne Etkileşimleri","color":"#9C27B0"},{"id":"C++ Entegrasyon","name":"C++ Kod Üretimi","color":"#FF5722"}];
const ITEMS = [{"id":1,"no":"001","cat":"Temel Tasarım","name":"Basit Durum Makinesi","desc":"Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın.","tags":["temel","mimari","yapı"],"badge1":"Başlangıç","content":"## Basit Durum Makinesi Oluşturma\n\nBir oyun objesi için temel durum makinesini C++ ve Unity C# ile tanımlayın.\n\n**C++ IState Arayüzü:**\n```cpp\nclass IState {\npublic:\n    virtual ~IState() = default;\n    virtual void Enter() = 0;     // Duruma girildiğinde bir kez\n    virtual void Execute() = 0;   // Her frame çağrılır\n    virtual void Exit() = 0;      // Durumdan çıkılırken bir kez\n};\n\nclass IdleState : public IState {\n    Character* owner;\npublic:\n    IdleState(Character* c) : owner(c) {}\n    void Enter() override { owner->PlayAnimation(\"Idle\"); }\n    void Execute() override {\n        if (owner->HasMoveInput()) owner->SM()->ChangeState(new MovingState(owner));\n    }\n    void Exit() override {}\n};\n```\n\n**Unity C# Basit Örnek:**\n```csharp\npublic abstract class State {\n    protected StateMachine sm;\n    public State(StateMachine sm) { this.sm = sm; }\n    public abstract void Enter();\n    public abstract void Execute();\n    public abstract void Exit();\n}\n\n// Idle State\npublic class IdleState : State {\n    public IdleState(StateMachine sm) : base(sm) {}\n    public override void Enter() => sm.Animator.Play(\"Idle\");\n    public override void Execute() {\n        if (Input.GetAxisRaw(\"Horizontal\") != 0)\n            sm.ChangeState(new MovingState(sm));\n    }\n    public override void Exit() {}\n}\n```\n\n**Temel Geçişler:** `Idle → Moving` (hareket input'u), `Idle → Attacking` (saldırı input'u). Her durum tek sorumluluk prensibi ile ayrı sınıfta tutulur.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":2,"no":"002","cat":"Temel Tasarım","name":"Durum Geçiş Kuralları","desc":"Durumlar arası geçişleri tetikleyen olayları ve koşulları yapılandırın.","tags":["geçiş","olay","koşul"],"badge1":"Orta","content":"## Durum Geçiş Kuralları Belirleme\n\nGeçişleri tetikleyen olay ve koşulları sistematik biçimde tanımlayın.\n\n**Koşul Tabanlı Geçiş (C++):**\n```cpp\nstruct TransitionRule {\n    std::function<bool()> condition;\n    IState* targetState;\n};\n\nclass State {\n    std::vector<TransitionRule> transitions;\npublic:\n    void AddTransition(std::function<bool()> cond, IState* target) {\n        transitions.push_back({cond, target});\n    }\n    IState* CheckTransitions() {\n        for (auto& t : transitions)\n            if (t.condition()) return t.targetState;\n        return nullptr;\n    }\n};\n\n// Kullanım:\nidleState.AddTransition([&]{ return HasStamina() && IsGrounded(); }, movingState);\nidleState.AddTransition([&]{ return EnemyInRange(); }, attackState);\n```\n\n**Öncelik Sıralaması:**\n```\nÖncelik 1 (En Yüksek): Ölüm durumu (her an tetiklenebilir)\nÖncelik 2: Hasar alma (hareket sırasında da geçerli)\nÖncelik 3: Saldırı (zemindeyken)\nÖncelik 4: Zıplama (duruyorken/yürüyorken)\nÖncelik 5: Yürüme (varsayılan hareket)\n```\n\n**Olay Tetikleyiciler:**\n```cpp\n// Event-driven geçiş\nenum class GameEvent { MoveInput, JumpInput, AttackInput, TakeDamage, Die };\n\nvoid OnEvent(GameEvent e) {\n    switch(e) {\n        case GameEvent::TakeDamage: SM->ChangeState(HurtState); break;\n        case GameEvent::Die:        SM->ChangeState(DeadState);  break;\n        case GameEvent::JumpInput:  if(IsGrounded) SM->ChangeState(JumpState); break;\n    }\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":3,"no":"003","cat":"Temel Tasarım","name":"Hiyerarşik Durumlar","desc":"İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin.","tags":["hiyerarşi","alt durum","modüler"],"badge1":"İleri","content":"## Hiyerarşik Durum Makinesi (HSM)\n\nDaha büyük bir durum içinde alt durumlar tanımlayarak karmaşıklığı yönetin. Combat sistemi örneği:\n\n**Hiyerarşi Yapısı:**\n```\nRoot\n├─ Alive\n│   ├─ Locomotion\n│   │   ├─ Idle\n│   │   ├─ Walking\n│   │   └─ Running\n│   └─ Combat\n│       ├─ Attacking\n│       ├─ Blocking\n│       └─ Dodging\n└─ Dead\n```\n\n**C++ Hiyerarşik State:**\n```cpp\nclass HierarchicalState : public IState {\nprotected:\n    IState* currentSubState = nullptr;\n    IState* defaultSubState = nullptr;\npublic:\n    void Enter() override {\n        if (defaultSubState) currentSubState = defaultSubState;\n        if (currentSubState) currentSubState->Enter();\n    }\n    void Execute() override {\n        if (currentSubState) currentSubState->Execute();\n        // Üst durum da her frame çalışabilir\n        OnExecute();\n    }\n    void ChangeSubState(IState* newState) {\n        if (currentSubState) currentSubState->Exit();\n        currentSubState = newState;\n        currentSubState->Enter();\n    }\n    virtual void OnExecute() {}\n};\n\nclass CombatState : public HierarchicalState {\npublic:\n    CombatState() { defaultSubState = new AttackingState(this); }\n    void OnExecute() override {\n        // Combat'a özgü kontroller (stamina düşüşü vb.)\n    }\n};\n```\n\n**Alt Durumdan Üst Duruma Çıkış:** Alt durum, üst state machine'e sinyal gönderir: `parent->Exit()` çağrılır.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":4,"no":"004","cat":"Oyun Mekanikleri","name":"Karakter Hareket Durumları","desc":"Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin.","tags":["oyuncu","hareket","mekanik"],"badge1":"Başlangıç","content":"## Karakter Hareket Durumu Sistemi\n\nBir karakterin temel hareket durumlarını durum makinesiyle yönetin.\n\n**Durum Geçiş Diyagramı:**\n```\nIdle ←→ Walking ←→ Running\n  ↕          ↕\nJumping ← → Falling\n              ↓\n           Grounded (→ Idle veya Walking)\n```\n\n**Unity Animator Controller Yerine Kod:**\n```csharp\npublic class MovementSM : MonoBehaviour {\n    public float walkSpeed = 3f, runSpeed = 6f;\n    private State currentState;\n    private Rigidbody rb;\n    private bool isGrounded;\n\n    void Start() {\n        rb = GetComponent<Rigidbody>();\n        ChangeState(new IdleMovementState(this));\n    }\n\n    void Update() => currentState?.Execute();\n\n    public void ChangeState(State next) {\n        currentState?.Exit();\n        currentState = next;\n        currentState.Enter();\n    }\n\n    // Hareket durumuna özgü helper:\n    public Vector3 GetMoveInput() {\n        return new Vector3(Input.GetAxisRaw(\"Horizontal\"), 0,\n                          Input.GetAxisRaw(\"Vertical\")).normalized;\n    }\n    public bool IsRunning => Input.GetKey(KeyCode.LeftShift);\n    public bool IsGrounded => isGrounded;\n}\n```\n\n**Koşma Geçişi:**\n```csharp\npublic class WalkingState : State {\n    public override void Execute() {\n        if (sm.IsRunning) sm.ChangeState(new RunningState(sm));\n        // ... hareket logic\n    }\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":5,"no":"005","cat":"Oyun Mekanikleri","name":"Zıplama Durumu Yönetimi","desc":"Karakterin zıplama mekaniğini state machine ile uygulayın.","tags":["zıplama","fizik","oyuncu"],"badge1":"Orta","content":"## Zıplama Durumu Yönetimi\n\nKarakterin zıplama mekaniğini durum makinesi ile modüler biçimde uygulayın.\n\n**Zıplama Durum Akışı:**\n```\nGrounded → [Space] → Jumping → (zirve) → Falling → [isGrounded] → Landing → Idle\n```\n\n**C# Uygulama:**\n```csharp\npublic class JumpingState : State {\n    private float jumpForce;\n    private bool jumpApplied = false;\n\n    public JumpingState(MovementSM sm, float force) : base(sm) {\n        jumpForce = force;\n    }\n\n    public override void Enter() {\n        sm.Animator.SetTrigger(\"Jump\");\n        // Zıplama kuvvetini uygula\n        sm.Rigidbody.AddForce(Vector3.up * jumpForce, ForceMode.Impulse);\n        jumpApplied = true;\n    }\n\n    public override void Execute() {\n        // Yükselen mi alçalan mı?\n        if (sm.Rigidbody.velocity.y < -0.1f)\n            sm.ChangeState(new FallingState(sm));\n\n        // Hava kontrolü (yatay hareket sınırlı)\n        Vector3 horizontal = sm.GetMoveInput() * sm.walkSpeed * 0.7f;\n        sm.Rigidbody.velocity = new Vector3(horizontal.x,\n            sm.Rigidbody.velocity.y, horizontal.z);\n    }\n\n    public override void Exit() {\n        sm.Animator.ResetTrigger(\"Jump\");\n    }\n}\n\npublic class FallingState : State {\n    public override void Execute() {\n        if (sm.IsGrounded)\n            sm.ChangeState(new LandingState(sm));  // veya IdleState\n    }\n}\n```\n\n**Coyote Time (Kenar Zıplama):**\n```csharp\nprivate float coyoteTimer = 0.15f;  // Uçurumdan düşünce 0.15s hâlâ zıplayabilir\nbool CanJump => isGrounded || coyoteTimer > 0;\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":6,"no":"006","cat":"Oyun Mekanikleri","name":"Envanter Durumları","desc":"Envanter açma, kapama ve eşya kullanma durumlarını yönetin.","tags":["UI","envanter","oyuncu"],"badge1":"Orta","content":"## Envanter Arayüzü Durum Sistemi\n\nOyun içi envanter sisteminin açma/kapatma ve seçim durumlarını yönetin.\n\n**Durum Hiyerarşisi:**\n```\nGameplay\n├─ InventoryClosed  (normal oyun)\n└─ InventoryOpen\n    ├─ BrowsingItems  (arayüz açık, seçim yok)\n    ├─ ItemSelected   (bir item seçili)\n    └─ ItemComparison (iki item karşılaştırma)\n```\n\n**C# UI State Machine:**\n```csharp\npublic class InventoryStateMachine : MonoBehaviour {\n    [SerializeField] private GameObject inventoryPanel;\n    private IInventoryState currentState;\n\n    void Start() => ChangeState(new InventoryClosedState(this));\n    void Update() {\n        currentState?.Execute();\n        if (Input.GetKeyDown(KeyCode.I) || Input.GetKeyDown(KeyCode.Escape))\n            currentState?.OnToggle();\n    }\n    public void ChangeState(IInventoryState next) {\n        currentState?.Exit();\n        currentState = next;\n        currentState.Enter();\n    }\n    public void ShowPanel(bool show) => inventoryPanel.SetActive(show);\n}\n\npublic class InventoryOpenState : IInventoryState {\n    private InventoryStateMachine inv;\n    private ItemSlot selectedSlot = null;\n\n    public void Enter() {\n        inv.ShowPanel(true);\n        Time.timeScale = 0.1f;  // Slow-mo efekti\n    }\n    public void OnItemClicked(ItemSlot slot) {\n        selectedSlot = slot;\n        inv.ChangeState(new ItemSelectedState(inv, slot));\n    }\n    public void OnToggle() => inv.ChangeState(new InventoryClosedState(inv));\n    public void Exit() { inv.ShowPanel(false); Time.timeScale = 1f; }\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":7,"no":"007","cat":"Animasyon","name":"Animasyon Durum Grafiği","desc":"State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun.","tags":["animasyon","karakter","görsel"],"badge1":"Başlangıç","content":"## Animasyon Durum Grafiği\n\nDurum makinesi durumlarını animasyon klipleriyle senkronize edin. Unity Animator ve Godot AnimationTree entegrasyonu.\n\n**Unity Animator Parameter Binding:**\n```csharp\npublic class AnimationStateController : MonoBehaviour {\n    private Animator anim;\n    private static readonly int SpeedHash = Animator.StringToHash(\"Speed\");\n    private static readonly int IsGroundedHash = Animator.StringToHash(\"IsGrounded\");\n    private static readonly int AttackTrigger = Animator.StringToHash(\"Attack\");\n\n    void Update() {\n        // State machine'den gelen değerleri animator'a besle\n        float speed = rb.velocity.magnitude;\n        anim.SetFloat(SpeedHash, speed, 0.1f, Time.deltaTime);  // Smooth damp\n        anim.SetBool(IsGroundedHash, isGrounded);\n    }\n\n    // Durum değişince çağrılır\n    public void OnStateChanged(State newState) {\n        if (newState is AttackingState)\n            anim.SetTrigger(AttackTrigger);\n    }\n}\n```\n\n**Godot AnimationTree:**\n```gdscript\n@onready var anim_tree = $AnimationTree\n@onready var anim_state: AnimationNodeStateMachinePlayback = \\\n    anim_tree.get(\"parameters/playback\")\n\nfunc change_state(state_name: String):\n    anim_state.travel(state_name)  # Blend ile geçiş\n\nfunc _physics_process(delta):\n    anim_tree.set(\"parameters/WalkRun/blend_position\",\n        velocity.length() / max_speed)  # 0=walk, 1=run\n```\n\n**Durum-Klip Haritalama Tablosu:**\n```\nState        Clip          Loop  Blend\nIdle       → idle.anim      Yes   0.2s\nWalking    → walk.anim      Yes   0.15s\nRunning    → run.anim       Yes   0.1s\nAttacking  → attack.anim    No    0.05s (hızlı geçiş)\nHurt       → hurt.anim      No    0.0s (anlık)\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":8,"no":"008","cat":"Animasyon","name":"Animasyon Geçiş Blend'leri","desc":"Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın.","tags":["animasyon","geçiş","akıcılık"],"badge1":"Orta","content":"## Akıcı Animasyon Geçişleri (Blend)\n\nDurumlar arası animasyonları yumuşatmak için blend süreleri, eşikler ve interrupt stratejileri.\n\n**Unity Animator Transition Ayarları:**\n```csharp\n// Kod ile geçiş süresi kontrolü:\nanim.CrossFadeInFixedTime(\"Run\", 0.2f);  // 0.2s blend\nanim.CrossFadeInFixedTime(\"Hurt\", 0.0f); // Anlık geçiş\n\n// Animator Controller'da parametreler:\n// Has Exit Time: OFF (koşul sağlanır sağlanmaz geç)\n// Transition Duration: 0.15-0.25s (normal)\n// Transition Offset: 0.0 (genellikle)\n// Interruption Source: Current State Only\n```\n\n**Ağırlıklı Blend (Blend Tree):**\n```csharp\n// 1D Blend Tree: Hıza göre Idle/Walk/Run\n// 2D Blend Tree: X/Y ekseninde 8 yönlü hareket\n\nanim.SetFloat(\"MoveX\", moveDirection.x, 0.1f, Time.deltaTime);\nanim.SetFloat(\"MoveY\", moveDirection.z, 0.1f, Time.deltaTime);\n// Animator'da 2D Freeform Directional Blend Tree\n```\n\n**Interrupt Stratejileri:**\n```\nDarbe/Hasar alma:\n  → Interrupt Source: None (tam geçiş), Duration: 0.0s\n  → Reason: Tepki animasyonu gecikme kabul etmez\n\nWalk → Run:\n  → Interrupt Source: Next State\n  → Duration: 0.15s\n\nAnyState → Death:\n  → Has Exit Time: OFF\n  → Duration: 0.0s\n  → Priority: En yüksek\n```\n\n**Footstep Senkronizasyon:**\n```csharp\n// AnimationEvent ile footstep ses:\npublic void OnFootstep() {  // Animation Event callback\n    AudioSource.PlayClipAtPoint(footstepClip, transform.position);\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":9,"no":"009","cat":"Animasyon","name":"Durum Tabanlı Çift Katman Animasyon","desc":"Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin.","tags":["katman","çift animasyon","karmaşık"],"badge1":"İleri","content":"## Çift Katmanlı Animasyon Yönetimi\n\nÜst vücut (ateş, nişan alma) ve alt vücut (yürüme, koşma) animasyonlarını bağımsız katmanlarda yönetin.\n\n**Unity Animation Layer Kurulumu:**\n```csharp\n// Animator Controller'da:\n// Layer 0: Base Layer — alt vücut (ağırlık: 1.0, mask: LowerBody)\n// Layer 1: Upper Body — üst vücut (ağırlık: 1.0, mask: UpperBody, Additive: OFF)\n// Layer 2: Override — tam vücut geçersiz kılma (ağırlık: 0 başlangıçta)\n\npublic class LayeredAnimationController : MonoBehaviour {\n    private Animator anim;\n    private int upperBodyLayer = 1;\n    private int overrideLayer = 2;\n\n    // Nişan alma modunu aç/kapat\n    public void SetAiming(bool isAiming) {\n        float targetWeight = isAiming ? 1.0f : 0.0f;\n        // Smooth ağırlık geçişi:\n        StartCoroutine(BlendLayerWeight(upperBodyLayer, targetWeight, 0.2f));\n    }\n\n    IEnumerator BlendLayerWeight(int layer, float target, float duration) {\n        float start = anim.GetLayerWeight(layer);\n        float t = 0;\n        while (t < duration) {\n            t += Time.deltaTime;\n            anim.SetLayerWeight(layer, Mathf.Lerp(start, target, t / duration));\n            yield return null;\n        }\n        anim.SetLayerWeight(layer, target);\n    }\n}\n```\n\n**Godot Alternatifi:**\n```gdscript\n# AnimationTree'de AnimationNodeBlendTree kullan\n# Üst vücut maskeleri: BoneAttachment + SkeletonModification\nvar upper_body_blend = anim_tree.get(\"parameters/UpperBlend/blend_amount\")\nanim_tree.set(\"parameters/UpperBlend/blend_amount\", 1.0 if is_aiming else 0.0)\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":10,"no":"010","cat":"AI Yönetimi","name":"Düşman AI Temel Davranışı","desc":"Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin.","tags":["AI","düşman","davranış"],"badge1":"Başlangıç","content":"## Düşman AI Durum Makinesi\n\nBasit bir düşman AI için devriye, kovalama ve saldırı durumlarını uygulayın.\n\n**C++ AI State Machine:**\n```cpp\nclass EnemyAI {\n    enum class State { Patrol, Chase, Attack, Dead };\n    State currentState = State::Patrol;\n    Character* target = nullptr;\n    float sightRange = 10.0f, attackRange = 2.0f;\n\n    void Update(float dt) {\n        switch (currentState) {\n        case State::Patrol:\n            MoveAlongPath();\n            if (CanSeePlayer()) {\n                target = player;\n                currentState = State::Chase;\n                AlertNearbyEnemies();  // Komşuları uyar\n            }\n            break;\n        case State::Chase:\n            MoveTowards(target->Position());\n            if (DistanceTo(target) <= attackRange)\n                currentState = State::Attack;\n            else if (!CanSeePlayer())\n                currentState = State::Patrol;  // Gözden kaybedince devriyeye dön\n            break;\n        case State::Attack:\n            if (AttackCooldownElapsed())\n                PerformAttack(target);\n            if (DistanceTo(target) > attackRange * 1.5f)\n                currentState = State::Chase;  // Hedef kaçtıysa takip et\n            break;\n        case State::Dead:\n            PlayDeathAnimation();\n            ScheduleDestroy(3.0f);\n            break;\n        }\n    }\n};\n```\n\n**Görüş Konisi Tespiti:**\n```cpp\nbool CanSeePlayer() {\n    Vector3 dir = (player->Pos() - pos).Normalized();\n    float angle = Vector3::Angle(forward, dir);\n    if (angle > 45.0f) return false;  // 90° görüş konisi\n    float dist = Vector3::Distance(pos, player->Pos());\n    return dist < sightRange && !Physics::Raycast(pos, dir, dist, obstacles);\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":11,"no":"011","cat":"AI Yönetimi","name":"Algı ve Tepki Durumları","desc":"AI'nın çevresel algılara göre durum değiştirmesini sağlayın.","tags":["algı","tepki","sensör"],"badge1":"Orta","content":"## Algı Tabanlı AI Durum Sistemi\n\nAI'nın ses, görme ve temas algılarına göre durum değiştirdiği gelişmiş davranış sistemi.\n\n**Üç Seviyeli Algı Sistemi:**\n```cpp\nstruct PerceptionData {\n    bool canSeeTarget;          // Görsel algı\n    bool heardSound;            // İşitsel algı\n    float lastKnownTargetDist;  // Son bilinen pozisyon\n    float suspicionLevel;       // 0.0 (normal) - 1.0 (tam alarm)\n};\n\nclass AlertState : public AIState {\n    float investigateTimer = 5.0f;\n    Vector3 lastSoundPos;\n\n    void Execute() override {\n        // Sesi araştır\n        MoveTowards(lastSoundPos);\n        investigateTimer -= deltaTime;\n\n        if (CanSeeTarget())\n            stateMachine->ChangeState(new EngagedState());\n        else if (investigateTimer <= 0)\n            stateMachine->ChangeState(new PatrolState());  // Aramaktan vazgeç\n    }\n};\n```\n\n**Şüphe Metre (Suspicion System):**\n```csharp\nvoid UpdateSuspicion() {\n    if (PlayerInSightCone && !PlayerInStealth) {\n        suspicion += Time.deltaTime * 2.0f;  // Hızlı artış\n    } else {\n        suspicion -= Time.deltaTime * 0.5f;  // Yavaş azalma\n    }\n    suspicion = Mathf.Clamp01(suspicion);\n\n    if (suspicion > 0.5f && currentState is PatrolState)\n        ChangeState(new AlertState());\n    if (suspicion > 0.9f && currentState is AlertState)\n        ChangeState(new EngagedState());\n    if (suspicion < 0.1f && currentState is AlertState)\n        ChangeState(new PatrolState());\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":12,"no":"012","cat":"AI Yönetimi","name":"Hedef Tabanlı AI Durumları","desc":"AI'nın belirli hedeflere ulaşmak için durumlarını yönetin.","tags":["hedef","görev","NPC"],"badge1":"İleri","content":"## Hedef Odaklı AI Durumları\nAI'nın belirli bir hedefe ulaşmak için durumlar arasında geçiş yapmasını sağlayın.\n1.  **`SeekingObjective`:** Belirlenen bir hedefe doğru hareket eder.\n2.  **`InteractingWithTarget`:** Hedefe ulaştığında belirli bir eylemi gerçekleştirir (örneğin, kapı açma).\n3.  **`ReturningToPost`:** Hedefe ulaşıldıktan sonra başlangıç noktasına döner.\n4.  **Hedef Koşulları:** `TargetReached`, `InteractionComplete` gibi koşulları tanımlayın.\nBu, görev tabanlı AI davranışlarını kolaylaştırır.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":13,"no":"013","cat":"3D Etkileşim","name":"Etkileşimli Obje Durumları","desc":"Kapı, düğme gibi 3D objelerin etkileşim durumlarını modelleyin.","tags":["objeler","etkileşim","çevre"],"badge1":"Başlangıç","content":"## Etkileşimli Obje Durum Makinesi\n\nKapı, kasa, düğme gibi çevre objelerinin etkileşim durumlarını durum makinesiyle yönetin.\n\n**Generic Interactable State Machine:**\n```csharp\npublic abstract class InteractableState {\n    protected Interactable owner;\n    public InteractableState(Interactable o) { owner = o; }\n    public abstract void Enter();\n    public abstract void OnInteract(Player player);\n    public virtual void Update() {}\n    public abstract void Exit();\n}\n\n// Kapı örneği:\npublic class DoorClosedState : InteractableState {\n    public override void Enter() {\n        owner.SetCollider(true);   // Geçişi engelle\n        owner.PlayAnimation(\"DoorClose\");\n    }\n    public override void OnInteract(Player player) {\n        if (player.HasKey(owner.RequiredKey))\n            owner.ChangeState(new DoorOpeningState(owner));\n        else\n            owner.PlaySound(\"LockedDoor\");  // Hata sesi\n    }\n}\n\npublic class DoorOpeningState : InteractableState {\n    private float duration = 1.2f;\n    public override void Enter() {\n        owner.PlayAnimation(\"DoorOpen\");\n        owner.SetCollider(false);  // Geçişe izin ver\n    }\n    public override void Update() {\n        duration -= Time.deltaTime;\n        if (duration <= 0)\n            owner.ChangeState(new DoorOpenState(owner));\n    }\n}\n```\n\n**Proximity Trigger:**\n```csharp\nvoid OnTriggerEnter(Collider other) {\n    if (other.CompareTag(\"Player\"))\n        UIManager.ShowPrompt(\"[E] Kullan\");\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":14,"no":"014","cat":"3D Etkileşim","name":"Kamera Durumları","desc":"Oyun içi kamera açısı ve mod değişimlerini durum makinesi ile yönetin.","tags":["kamera","görünüm","cinematik"],"badge1":"Orta","content":"## Kamera Durumu Makinesi\n\nFarklı kamera modları için durum makinesi — üçüncü şahıs, birinci şahıs ve sinematik modlar.\n\n**Camera State Machine (C#):**\n```csharp\npublic abstract class CameraState {\n    protected CameraController cam;\n    public CameraState(CameraController c) { cam = c; }\n    public abstract void Enter();\n    public abstract void Execute();\n    public abstract void Exit();\n}\n\npublic class ThirdPersonState : CameraState {\n    private float distance = 5f, height = 2f;\n    public override void Enter() {\n        cam.cinemachineBrain.enabled = true;\n        cam.thirdPersonVCam.Priority = 10;\n        cam.firstPersonVCam.Priority = 0;\n    }\n    public override void Execute() {\n        // Kamerayı oyuncunun arkasına konumla\n        Vector3 targetPos = cam.target.position\n            - cam.target.forward * distance\n            + Vector3.up * height;\n        cam.transform.position = Vector3.Lerp(\n            cam.transform.position, targetPos, Time.deltaTime * 5f);\n        cam.transform.LookAt(cam.target.position + Vector3.up * 1.5f);\n    }\n}\n\npublic class FirstPersonState : CameraState {\n    public override void Enter() {\n        cam.thirdPersonVCam.Priority = 0;\n        cam.firstPersonVCam.Priority = 10;\n        Cursor.lockState = CursorLockMode.Locked;\n    }\n    public override void Exit() { Cursor.lockState = CursorLockMode.None; }\n}\n```\n\n**Geçiş Tetikleyicileri:**\n```csharp\nvoid Update() {\n    if (Input.GetKeyDown(KeyCode.V))  // Kamera geçişi\n        currentState is ThirdPersonState\n            ? ChangeState(new FirstPersonState(this))\n            : ChangeState(new ThirdPersonState(this));\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":15,"no":"015","cat":"3D Etkileşim","name":"Araç Sürüş Durumları","desc":"Araçların hızlanma, frenleme ve dönme gibi sürüş durumlarını kontrol edin.","tags":["araç","sürüş","fizik"],"badge1":"İleri","content":"## Araç Sürüş Durum Makinesi\n\nBir aracın sürüş mekaniğini modüler durum makinesiyle modelleyin.\n\n**Araç Durum Hiyerarşisi:**\n```\nVehicle\n├─ Parked (park halinde)\n├─ Driving\n│   ├─ Accelerating\n│   ├─ Cruising (sabit hız)\n│   ├─ Braking\n│   └─ Reversing\n└─ Airborne (tümsek, rampa)\n```\n\n**C# Araç State Machine:**\n```csharp\npublic class VehicleStateMachine : MonoBehaviour {\n    private IVehicleState currentState;\n    public Rigidbody rb { get; private set; }\n    public float maxSpeed = 20f, acceleration = 10f;\n    public bool IsGrounded { get; set; }\n\n    void Start() {\n        rb = GetComponent<Rigidbody>();\n        ChangeState(new ParkedState(this));\n    }\n    void Update() => currentState?.Execute(Time.deltaTime);\n    void FixedUpdate() => currentState?.FixedExecute();\n\n    public void ChangeState(IVehicleState newState) {\n        currentState?.Exit();\n        currentState = newState;\n        currentState.Enter();\n    }\n}\n\npublic class AcceleratingState : IVehicleState {\n    private VehicleStateMachine vsm;\n    public void Execute(float dt) {\n        float gas = Input.GetAxis(\"Vertical\");\n        vsm.rb.AddForce(vsm.transform.forward * gas * vsm.acceleration);\n        // Hız sınırı:\n        if (vsm.rb.velocity.magnitude > vsm.maxSpeed)\n            vsm.rb.velocity = vsm.rb.velocity.normalized * vsm.maxSpeed;\n        if (gas < 0.01f) vsm.ChangeState(new CruisingState(vsm));\n    }\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":16,"no":"016","cat":"C++ Entegrasyon","name":"Temel C++ Sınıf Yapısı","desc":"Durum makinesini C++ sınıflarına dönüştürmek için temel bir yapı oluşturun.","tags":["C++","kod","şablon"],"badge1":"Başlangıç","content":"## C++ Durum Makinesi Sınıf Yapısı\n\nStateVault'tan C++ kod çıktısı için CRTP tabanlı, zero-overhead durum makinesi.\n\n**Modern C++17 State Machine:**\n```cpp\n#include <variant>\n#include <functional>\n\n// State'ler struct olarak:\nstruct IdleState {};\nstruct WalkingState { float speed; };\nstruct AttackingState { int comboCount = 0; };\n\n// std::variant tabanlı state machine:\nusing CharacterState = std::variant<IdleState, WalkingState, AttackingState>;\n\nstruct Character {\n    CharacterState state = IdleState{};\n\n    void Update(float dt) {\n        std::visit([&](auto& s) { OnUpdate(s, dt); }, state);\n    }\n\n    void OnUpdate(IdleState& s, float dt) {\n        if (HasMoveInput()) state = WalkingState{3.0f};\n    }\n    void OnUpdate(WalkingState& s, float dt) {\n        Move(s.speed * dt);\n        if (!HasMoveInput()) state = IdleState{};\n    }\n    void OnUpdate(AttackingState& s, float dt) {\n        if (AttackInputPressed() && s.comboCount < 3)\n            s.comboCount++;\n    }\n};\n```\n\n**Klasik Polimorfik Yaklaşım:**\n```cpp\nstruct IState {\n    virtual ~IState() = default;\n    virtual void Enter() = 0;\n    virtual void Execute(float dt) = 0;\n    virtual void Exit() = 0;\n    virtual std::string Name() const = 0;\n};\n\nstruct StateMachine {\n    std::unique_ptr<IState> current;\n    void ChangeState(std::unique_ptr<IState> next) {\n        if (current) current->Exit();\n        current = std::move(next);\n        current->Enter();\n    }\n    void Update(float dt) { if (current) current->Execute(dt); }\n};\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":17,"no":"017","cat":"C++ Entegrasyon","name":"Durum Yöneticisi Uygulaması","desc":"Durumlar arası geçişleri ve güncellemeleri yöneten bir C++ sınıfı tasarlayın.","tags":["C++","yönetici","tasarım"],"badge1":"Orta","content":"## Durum Yöneticisi C++ Tam Uygulaması\n\nDurumlar arası geçişleri, geçmiş yığınını (history stack) ve hata ayıklamayı yöneten kapsamlı state machine.\n\n**History Stack'li StateMachine:**\n```cpp\n#include <stack>\n#include <memory>\n#include <stdexcept>\n\nclass StateMachine {\n    std::unique_ptr<IState> currentState;\n    std::stack<std::unique_ptr<IState>> history;  // Geri dönüş yığını\n    bool debugMode = false;\n\npublic:\n    void ChangeState(std::unique_ptr<IState> newState) {\n        if (currentState) {\n            if (debugMode)\n                printf(\"[SM] %s -> %s\\n\", currentState->Name(), newState->Name());\n            currentState->Exit();\n        }\n        currentState = std::move(newState);\n        currentState->Enter();\n    }\n\n    // Durumu stacke it, sonra yeni duruma geç\n    void PushState(std::unique_ptr<IState> newState) {\n        if (currentState) {\n            currentState->Pause();  // Duraklat ama yok etme\n            history.push(std::move(currentState));\n        }\n        currentState = std::move(newState);\n        currentState->Enter();\n    }\n\n    // Stack'ten önceki duruma dön\n    void PopState() {\n        if (history.empty()) throw std::runtime_error(\"History stack boş\");\n        currentState->Exit();\n        currentState = std::move(history.top());\n        history.pop();\n        currentState->Resume();\n    }\n\n    void Update(float dt) {\n        if (currentState) currentState->Execute(dt);\n    }\n\n    IState* Current() { return currentState.get(); }\n    template<typename T>\n    bool IsInState() { return dynamic_cast<T*>(currentState.get()) != nullptr; }\n};\n```\n\n**Kullanım:**\n```cpp\nStateMachine sm;\nsm.ChangeState(std::make_unique<IdleState>(&character));\nsm.PushState(std::make_unique<PauseMenuState>(&ui));  // Oyun duraklatıldı\nsm.PopState();  // Menüden çıkınca Idle'a dön\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":18,"no":"018","cat":"C++ Entegrasyon","name":"Olay Bazlı Geçişler","desc":"C++'ta olay dinleyicileri kullanarak durum geçişlerini tetikleyin.","tags":["C++","olay","geçiş"],"badge1":"Orta","content":"## Olay Tabanlı C++ Durum Geçişleri\n\nDurum geçişlerini olay sistemi (event bus / delegate) ile tetikleyin. Durumlar birbirini doğrudan çağırmaz.\n\n**Event Bus Entegrasyonu:**\n```cpp\n#include <functional>\n#include <unordered_map>\n#include <vector>\n\nenum class GameEvent {\n    PlayerMoved, PlayerAttacked, EnemyDetected,\n    TookDamage, Died, ItemPickedUp, SceneLoaded\n};\n\nstruct EventBus {\n    using Handler = std::function<void()>;\n    std::unordered_map<GameEvent, std::vector<Handler>> listeners;\n\n    void Subscribe(GameEvent ev, Handler h) {\n        listeners[ev].push_back(h);\n    }\n    void Publish(GameEvent ev) {\n        if (listeners.count(ev))\n            for (auto& h : listeners[ev]) h();\n    }\n};\n\n// AI State: Enemy Detected olayına abone ol\nclass PatrolState : public IState {\n    EventBus& bus;\n    std::function<void()> subscription;\n\npublic:\n    PatrolState(EventBus& b) : bus(b) {}\n\n    void Enter() override {\n        subscription = [this]() {\n            stateMachine->ChangeState(std::make_unique<AlertState>(bus));\n        };\n        bus.Subscribe(GameEvent::EnemyDetected, subscription);\n        StartPatrolRoute();\n    }\n\n    void Exit() override {\n        // Aboneliği kaldır (memory leak önleme)\n        bus.Unsubscribe(GameEvent::EnemyDetected, subscription);\n    }\n};\n```\n\n**Thread-Safe Versiyon:**\n```cpp\n#include <mutex>\nstd::mutex eventMutex;\nvoid SafePublish(GameEvent ev) {\n    std::lock_guard<std::mutex> lock(eventMutex);\n    Publish(ev);\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":19,"no":"019","cat":"C++ Entegrasyon","name":"Durum Verisi ve Paylaşım","desc":"Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın.","tags":["C++","veri","bağlam"],"badge1":"İleri","content":"## Durumlar Arası Veri Paylaşımı (Blackboard Pattern)\n\nDurumlar arasında veri paylaşımı için bağlam nesnesi (Context/Blackboard) kullanın.\n\n**Blackboard Pattern:**\n```cpp\nstruct CharacterBlackboard {\n    // Fizik\n    float health = 100.0f;\n    float stamina = 100.0f;\n    bool isGrounded = true;\n    glm::vec3 velocity;\n\n    // Algı\n    Entity* nearestEnemy = nullptr;\n    float distToEnemy = FLT_MAX;\n    bool canSeeEnemy = false;\n\n    // Geçici durum verisi\n    float stateDuration = 0.0f;  // Bu durumda ne kadar geçti\n\n    // Yardımcı metodlar\n    bool HasStamina(float amount) const { return stamina >= amount; }\n    bool IsLowHealth() const { return health < 25.0f; }\n};\n\nclass CharacterState : public IState {\nprotected:\n    CharacterBlackboard* bb;  // Paylaşımlı veri\n    StateMachine* sm;\n\npublic:\n    CharacterState(CharacterBlackboard* b, StateMachine* s)\n        : bb(b), sm(s) {}\n\n    void Enter() override { bb->stateDuration = 0.0f; }\n    void Execute(float dt) override {\n        bb->stateDuration += dt;\n        // Ölüm kontrolü tüm durumlarda geçerli:\n        if (bb->health <= 0.0f)\n            sm->ChangeState(std::make_unique<DeadState>(bb, sm));\n    }\n};\n\nclass AttackState : public CharacterState {\n    void Execute(float dt) override {\n        CharacterState::Execute(dt);\n        // Stamina kontrolü:\n        if (!bb->HasStamina(10.0f))\n            sm->ChangeState(std::make_unique<ExhaustedState>(bb, sm));\n    }\n};\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":20,"no":"020","cat":"C++ Entegrasyon","name":"StateVault C++ Entegrasyon Kılavuzu","desc":"StateVault Pro tarafından üretilen C++ kodunu projenize entegre etme adımları.","tags":["entegrasyon","kılavuz","kurulum"],"badge1":"İleri","content":"## StateVault C++ Entegrasyon Adımları\nStateVault tarafından üretilen C++ kodunu oyun projenize entegre edin.\n1.  **Dosya Ekleme:** Üretilen `.h` ve `.cpp` dosyalarını projenizin kaynak dizinine ekleyin.\n2.  **Derleme Ayarları:** Gerekirse derleyici ayarlarınızı (include yolları) güncelleyin.\n3.  **StateMachine Nesnesi:** Oyun motorunuzun ana döngüsünde (örneğin `Tick()` metodu) bir `StateMachine` nesnesi örneklendirin.\n4.  **Güncelleme Çağrısı:** Her karede `stateMachine->Update()` metodunu çağırın.\nBu, StateVault çıktısını hızla kullanıma almanızı sağlar.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}}];

// ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'statevault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
