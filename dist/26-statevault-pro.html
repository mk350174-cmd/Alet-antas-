özer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hedef Tabanlı AI akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 254, "no": "254", "cat": "3D Etkileşim", "name": "AI-Augmented Etkileşimli Obje Durumları Kütüphanesi", "desc": "güvenlik bağlamında Etkileşimli Obje Durumları için ai-augmented bir kütüphanesi. Kapı, düğme gibi 3D objelerin etkileşim durumlarını modelleyin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["objeler", "etkileşim", "çevre", "güvenlik", "ai-augmented", "uzman"], "badge1": "Uzman", "content": "## Etkileşimli Objelerin Durumları\nBir kapı veya düğme gibi objelerin etkileşim durumlarını tanımlayın.\n1.  **`Closed` / `Locked`:** Objenin varsayılan kapalı veya kilitli durumu.\n2.  **`Open` / `Unlocked`:** Objenin etkileşim sonucu açılmış veya kilitsiz durumu.\n3.  **`Interacting`:** Oyuncunun objeyle etkileşimde olduğu kısa süreli durum (animasyon oynatma).\n4.  **Geçişler:** `UseKey`, `PlayerProximity`, `ButtonPressed` gibi olayları kullanın.\nBu, çevre etkileşimlerini düzenler.\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu kütüphanesi, güvenlik alanında Etkileşimli Obje Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Etkileşimli Obje Durumları akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 255, "no": "255", "cat": "3D Etkileşim", "name": "Senkron Kamera Durumları Düzeneği", "desc": "güvenlik bağlamında Kamera Durumları için senkron bir düzeneği. Oyun içi kamera açısı ve mod değişimlerini durum makinesi ile yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["kamera", "görünüm", "cinematik", "güvenlik", "senkron", "i̇leri"], "badge1": "İleri", "content": "## Kamera Modları Durum Makinesi\nFarklı kamera görünümleri için durumlar oluşturun.\n1.  **`ThirdPerson`:** Varsayılan oyuncu takibi.\n2.  **`FirstPerson`:** Yakın çekim veya nişan alma modu.\n3.  **`Cinematic`:** Önceden tanımlanmış bir kamera yolu.\n4.  **Geçişler:** `AimButtonPressed`, `CutsceneTriggered`, `ViewModeChange` gibi olayları kullanın.\nBu, kamera geçişlerini akıcı ve kontrol edilebilir hale getirir.\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** İleri seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Kamera Durumları senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Kamera Durumları işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Kamera Durumları ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** kamera, görünüm, cinematik\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 256, "no": "256", "cat": "3D Etkileşim", "name": "DevOps-Ready Araç Sürüş Durumları Optimizasyonu", "desc": "mimari bağlamında Araç Sürüş Durumları için devops-ready bir optimizasyonu. Araçların hızlanma, frenleme ve dönme gibi sürüş durumlarını kontrol edin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["araç", "sürüş", "fizik", "mimari", "devops-ready", "başlangıç"], "badge1": "Başlangıç", "content": "## Araç Sürüş Durumları\nBir aracın sürüş mekaniklerini state machine ile modelleyin.\n1.  **`Idle`:** Araç duruyor.\n2.  **`Accelerating`:** Gaz pedalı basılı, araç hızlanıyor.\n3.  **`Braking`:** Fren basılı, araç yavaşlıyor.\n4.  **`Turning`:** Direksiyon çevriliyor.\n5.  **Geçişler:** `GasInput`, `BrakeInput`, `SteerInput` gibi girişleri kullanarak durumları değiştirin.\nBu, araç fiziği ve kontrolünü daha modüler yapar.\n\n## Uygulama Senaryosu (DevOps-Ready)\n\nBu optimizasyonu, mimari alanında Araç Sürüş Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Araç Sürüş Durumları akışını devops-ready yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 257, "no": "257", "cat": "C++ Entegrasyon", "name": "Yalın Temel C++ Sınıf Sistemi", "desc": "performans bağlamında Temel C++ Sınıf için yalın bir sistemi. Durum makinesini C++ sınıflarına dönüştürmek için temel bir yapı oluşturun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "kod", "şablon", "performans", "yalın", "uzman"], "badge1": "Uzman", "content": "## C++ Durum Sınıfı Şablonu\nStateVault'tan C++ kod çıktısı için temel bir sınıf yapısı oluşturun.\n```cpp\nclass IState {\npublic:\n    virtual void Enter() = 0;\n    virtual void Execute() = 0;\n    virtual void Exit() = 0;\n};\n```\nBu arayüz, her durumun belirli bir yaşam döngüsü metoduna sahip olmasını garanti eder ve kodun genişletilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Yalın)\n\n- **Hedef Kitle:** Uzman seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Temel C++ Sınıf senaryoları\n- **Avantajları:** Bu sistemi sayesinde Temel C++ Sınıf işlemleri daha yalın hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Temel C++ Sınıf ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, kod, şablon\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 258, "no": "258", "cat": "C++ Entegrasyon", "name": "Sezgisel Durum Yöneticisi Uygulaması Pratiği", "desc": "caching bağlamında Durum Yöneticisi Uygulaması için sezgisel bir pratiği. Durumlar arası geçişleri ve güncellemeleri yöneten bir C++ sınıfı tasarlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "yönetici", "tasarım", "caching", "sezgisel", "başlangıç"], "badge1": "Başlangıç", "content": "## Durum Yöneticisi C++ Kodu\nDurumlar arası geçişleri ve güncellemeleri yönetecek bir sınıf oluşturun.\n```cpp\nclass StateMachine {\n    IState* currentState;\npublic:\n    void ChangeState(IState* newState);\n    void Update();\n};\n```\n`ChangeState` metodu mevcut durumu sonlandırır ve yeni durumu başlatır. `Update` ise mevcut durumu her karede çalıştırır. Bu, merkezi bir kontrol noktası sağlar.\n\n## Uygulama Senaryosu (Sezgisel)\n\nBu pratiği, caching alanında Durum Yöneticisi Uygulaması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Yöneticisi Uygulaması akışını sezgisel yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 259, "no": "259", "cat": "C++ Entegrasyon", "name": "Observable Olay Bazlı Geçişler Doktrini", "desc": "monitoring bağlamında Olay Bazlı Geçişler için observable bir doktrini. C++'ta olay dinleyicileri kullanarak durum geçişlerini tetikleyin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "olay", "geçiş", "monitoring", "observable", "uzman"], "badge1": "Uzman", "content": "## Olay Tabanlı C++ Geçişleri\nDurum geçişlerini C++ olay sistemine bağlayın.\n1.  **Olay Sistemi Entegrasyonu:** Oyun motorunuzun olay dinleme mekanizmalarını (delegates, signals) kullanın.\n2.  **Dinleyici Kaydı:** `CurrentState`'in `Enter()` metodunda ilgili olaylara dinleyici kaydedin.\n3.  **Geçiş Tetikleyicileri:** Olay tetiklendiğinde `StateMachine::ChangeState` metodunu çağırın.\nBu, durum değişimlerini dış olaylara duyarlı hale getirir ve kodu modülerleştirir.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Uzman seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Olay Bazlı Geçişler senaryoları\n- **Avantajları:** Bu doktrini sayesinde Olay Bazlı Geçişler işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Olay Bazlı Geçişler ihtiyacını analiz edin.\n  2. Bu doktrini'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, olay, geçiş\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 260, "no": "260", "cat": "C++ Entegrasyon", "name": "Pipeline Durum Verisi ve Düzeneği", "desc": "monitoring bağlamında Durum Verisi ve için pipeline bir düzeneği. Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "veri", "bağlam", "monitoring", "pipeline", "i̇leri"], "badge1": "İleri", "content": "## Durumlar Arası Veri Paylaşımı\nDurumlar arasında veri paylaşımını yönetmek için bir bağlam (context) sınıfı kullanın.\n```cpp\nclass PlayerContext {\npublic:\n    float Health;\n    bool IsGrounded;\n};\nclass PlayerState : public IState {\nprotected:\n    PlayerContext* context;\n};\n```\n`PlayerContext` sınıfı, tüm durumların erişebileceği ortak verileri tutar. Her durum bu bağlamı referans alır. Bu, veri tutarlılığını ve erişilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Pipeline)\n\n- **Hedef Kitle:** İleri seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Durum Verisi ve senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Durum Verisi ve işlemleri daha pipeline hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Durum Verisi ve ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, veri, bağlam\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 261, "no": "261", "cat": "C++ Entegrasyon", "name": "Edge-Optimize StateVault C++ Entegrasyon Yönergesi", "desc": "test bağlamında StateVault C++ Entegrasyon için edge-optimize bir yönergesi. StateVault Pro tarafından üretilen C++ kodunu projenize entegre etme adımları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "kılavuz", "kurulum", "test", "edge-optimize", "i̇leri"], "badge1": "İleri", "content": "## StateVault C++ Entegrasyon Adımları\nStateVault tarafından üretilen C++ kodunu oyun projenize entegre edin.\n1.  **Dosya Ekleme:** Üretilen `.h` ve `.cpp` dosyalarını projenizin kaynak dizinine ekleyin.\n2.  **Derleme Ayarları:** Gerekirse derleyici ayarlarınızı (include yolları) güncelleyin.\n3.  **StateMachine Nesnesi:** Oyun motorunuzun ana döngüsünde (örneğin `Tick()` metodu) bir `StateMachine` nesnesi örneklendirin.\n4.  **Güncelleme Çağrısı:** Her karede `stateMachine->Update()` metodunu çağırın.\nBu, StateVault çıktısını hızla kullanıma almanızı sağlar.\n\n## Genişletilmiş Notlar (Edge-Optimize)\n\n- **Hedef Kitle:** İleri seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde StateVault C++ Entegrasyon senar n.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 263, "no": "263", "cat": "Temel Tasarım", "name": "Production-Grade Durum Geçiş Kuralları Kütüphanesi", "desc": "API bağlamında Durum Geçiş Kuralları için production-grade bir kütüphanesi. Durumlar arası geçişleri tetikleyen olayları ve koşulları yapılandırın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["geçiş", "olay", "koşul", "API", "production-grade", "orta"], "badge1": "Orta", "content": "## Geçiş Kurallarını Belirleme\nGeçişleri tetikleyen olay ve koşulları tanımlayın.\n1.  **Olay Tetikleyiciler:** `OnInput_Move`, `OnEnemyDetected` gibi olaylar oluşturun.\n2.  **Koşullar:** `HasStamina > 0`, `IsGrounded == true` gibi Boolean koşulları ekleyin.\n3.  **Öncelik:** Aynı anda birden fazla geçiş mümkünse öncelik sıralaması belirleyin.\nBu, durum değişimlerinin öngörülebilir ve mantıklı olmasını sağlar.\n\n## Uygulama Senaryosu (Production-Grade)\n\nBu kütüphanesi, API alanında Durum Geçiş Kuralları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Geçiş Kuralları akışını production-grade yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 264, "no": "264", "cat": "Temel Tasarım", "name": "Pipeline Hiyerarşik Durumlar Düzeni", "desc": "caching bağlamında Hiyerarşik Durumlar için pipeline bir düzeni. İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["hiyerarşi", "alt durum", "modüler", "caching", "pipeline", "başlangıç"], "badge1": "Başlangıç", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat` durumunu oluşturun.\n2.  **Alt Durumlar:** `Combat` içinde `Attacking`, `Dodging`, `Blocking` gibi alt durumlar ekleyin.\n3.  **Geçiş Kapsamı:** Alt durumların kendi içinde geçişlerini ve ana duruma geri dönüşleri belirleyin.\nBu, karmaşık sistemleri daha okunabilir ve yönetilebilir hale getirir.\n\n## Uygulama Senaryosu (Pipeline)\n\nBu düzeni, caching alanında Hiyerarşik Durumlar problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hiyerarşik Durumlar akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 265, "no": "265", "cat": "Oyun Mekanikleri", "name": "Modüler Karakter Hareket Durumları Çerçevesi", "desc": "CI/CD bağlamında Karakter Hareket Durumları için modüler bir çerçevesi. Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["oyuncu", "hareket", "mekanik", "CI/CD", "modüler", "i̇leri"], "badge1": "İleri", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.\n\n## Uygulama Senaryosu (Modüler)\n\nBu çerçevesi, CI/CD alanında Karakter Hareket Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Karakter Hareket Durumları akışını modüler yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 266, "no": "266", "cat": "Oyun Mekanikleri", "name": "Memory-Safe Zıplama Durumu Yönetimi Sözleşmesi", "desc": "mimari bağlamında Zıplama Durumu Yönetimi için memory-safe bir sözleşmesi. Karakterin zıplama mekaniğini state machine ile uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["zıplama", "fizik", "oyuncu", "mimari", "memory-safe", "orta"], "badge1": "Orta", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu sözleşmesi, mimari alanında Zıplama Durumu Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zıplama Durumu Yönetimi akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 267, "no": "267", "cat": "Oyun Mekanikleri", "name": "Layered Envanter Durumları Anlaşması", "desc": "caching bağlamında Envanter Durumları için layered bir anlaşması. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "caching", "layered", "orta"], "badge1": "Orta", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Uygulama Senaryosu (Layered)\n\nBu anlaşması, caching alanında Envanter Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Envanter Durumları akışını layered yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 268, "no": "268", "cat": "Animasyon", "name": "Event-Sourced Animasyon Durum Grafiği Tasarımı", "desc": "logging bağlamında Animasyon Durum Grafiği için event-sourced bir tasarımı. State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "karakter", "görsel", "logging", "event-sourced", "orta"], "badge1": "Orta", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Genişletilmiş Notlar (Event-Sourced)\n\n- **Hedef Kitle:** Orta seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Animasyon Durum Grafiği senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Animasyon Durum Grafiği işlemleri daha event-sourced hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Animasyon Durum Grafiği ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, karakter, görsel\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 269, "no": "269", "cat": "Animasyon", "name": "Bağlamsal Animasyon Geçiş Blend'leri Doktrini", "desc": "mühendislik bağlamında Animasyon Geçiş Blend'leri için bağlamsal bir doktrini. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "mühendislik", "bağlamsal", "uzman"], "badge1": "Uzman", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Uygulama Senaryosu (Bağlamsal)\n\nBu doktrini, mühendislik alanında Animasyon Geçiş Blend'leri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Geçiş Blend'leri akışını bağlamsal yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 270, "no": "270", "cat": "Animasyon", "name": "Ölçeklenebilir Durum Tabanlı Çift İskeleti", "desc": "mimari bağlamında Durum Tabanlı Çift için ölçeklenebilir bir i̇skeleti. Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["katman", "çift animasyon", "karmaşık", "mimari", "ölçeklenebilir", "pro"], "badge1": "Pro", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.\n\n## Genişletilmiş Notlar (Ölçeklenebilir)\n\n- **Hedef Kitle:** Pro seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Durum Tabanlı Çift senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Durum Tabanlı Çift işlemleri daha ölçeklenebilir hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde Durum Tabanlı Çift ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katman, çift animasyon, karmaşık\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 271, "no": "271", "cat": "AI Yönetimi", "name": "Kanıt-Tabanlı Düşman AI Temel Yapısı", "desc": "monitoring bağlamında Düşman AI Temel için kanıt-tabanlı bir yapısı. Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["AI", "düşman", "davranış", "monitoring", "kanıt-tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Temel Düşman AI Durumları\nBasit bir düşman AI için ana davranış durumlarını tanımlayın.\n1.  **`Patrol` (Devriye):** Belirli yollar üzerinde hareket eder.\n2.  **`Chase` (Kovalamaca):** Oyuncuyu görüş alanına girince takip eder.\n3.  **`Attack` (Saldırı):** Oyuncu menzile girince saldırır.\n4.  **Geçiş Koşulları:** `PlayerDetected`, `PlayerLost`, `AttackRangeReached` gibi koşulları belirleyin.\nBu, düşmanların öngörülebilir ve mantıklı davranmasını sağlar.\n\n## Genişletilmiş Notlar (Kanıt-Tabanlı)\n\n- **Hedef Kitle:** İleri seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Düşman AI Temel senaryoları\n- **Avantajları:** Bu yapısı sayesinde Düşman AI Temel işlemleri daha kanıt-tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Düşman AI Temel ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** AI, düşman, davranış\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 272, "no": "272", "cat": "AI Yönetimi", "name": "Type-Safe Algı ve Tepki Şablonu", "desc": "API bağlamında Algı ve Tepki için type-safe bir şablonu. AI'nın çevresel algılara göre durum değiştirmesini sağlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["algı", "tepki", "sensör", "API", "type-safe", "i̇leri"], "badge1": "İleri", "content": "## Algı Tabanlı AI Durumları\nAI'nın çevresel algılara göre davranışını değiştiren durumlar yaratın.\n1.  **`Idle`:** Hiçbir tehdit yokken bekler.\n2.  **`Alert`:** Ses veya görsel bir ipucu aldığında şüphelenir ve araştırır.\n3.  **`Engaged`:** Doğrudan tehdit algıladığında çatışmaya girer.\n4.  **Algı Mekanizmaları:** `SightCone`, `HearRadius` gibi algı sensörlerini durum geçişlerine bağlayın.\nBu, AI'ya dinamik ve gerçekçi tepkiler kazandırır.\n\n## Genişletilmiş Notlar (Type-Safe)\n\n- **Hedef Kitle:** İleri seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Algı ve Tepki senaryoları\n- **Avantajları:** Bu şablonu sayesinde Algı ve Tepki işlemleri daha type-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Algı ve Tepki ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** algı, tepki, sensör\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 273, "no": "273", "cat": "AI Yönetimi", "name": "Edge-Optimize Hedef Tabanlı AI Yönergesi", "desc": "monitoring bağlamında Hedef Tabanlı AI için edge-optimize bir yönergesi. AI'nın belirli hedeflere ulaşmak için durumlarını yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["hedef", "görev", "NPC", "monitoring", "edge-optimize", "i̇leri"], "badge1": "İleri", "content": "## Hedef Odaklı AI Durumları\nAI'nın belirli bir hedefe ulaşmak için durumlar arasında geçiş yapmasını sağlayın.\n1.  **`SeekingObjective`:** Belirlenen bir hedefe doğru hareket eder.\n2.  **`InteractingWithTarget`:** Hedefe ulaştığında belirli bir eylemi gerçekleştirir (örneğin, kapı açma).\n3.  **`ReturningToPost`:** Hedefe ulaşıldıktan sonra başlangıç noktasına döner.\n4.  **Hedef Koşulları:** `TargetReached`, `InteractionComplete` gibi koşulları tanımlayın.\nBu, görev tabanlı AI davranışlarını kolaylaştırır.\n\n## Uygulama Senaryosu (Edge-Optimize)\n\nBu yönergesi, monitoring alanında Hedef Tabanlı AI problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hedef Tabanlı AI akışını edge-optimize yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 274, "no": "274", "cat": "3D Etkileşim", "name": "Pluggable Etkileşimli Obje Durumları Düzeneği", "desc": "performans bağlamında Etkileşimli Obje Durumları için pluggable bir düzeneği. Kapı, düğme gibi 3D objelerin etkileşim durumlarını modelleyin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["objeler", "etkileşim", "çevre", "performans", "pluggable", "uzman"], "badge1": "Uzman", "content": "## Etkileşimli Objelerin Durumları\nBir kapı veya düğme gibi objelerin etkileşim durumlarını tanımlayın.\n1.  **`Closed` / `Locked`:** Objenin varsayılan kapalı veya kilitli durumu.\n2.  **`Open` / `Unlocked`:** Objenin etkileşim sonucu açılmış veya kilitsiz durumu.\n3.  **`Interacting`:** Oyuncunun objeyle etkileşimde olduğu kısa süreli durum (animasyon oynatma).\n4.  **Geçişler:** `UseKey`, `PlayerProximity`, `ButtonPressed` gibi olayları kullanın.\nBu, çevre etkileşimlerini düzenler.\n\n## Uygulama Senaryosu (Pluggable)\n\nBu düzeneği, performans alanında Etkileşimli Obje Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Etkileşimli Obje Durumları akışını pluggable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 275, "no": "275", "cat": "3D Etkileşim", "name": "Type-Safe Kamera Durumları Düzeni", "desc": "performans bağlamında Kamera Durumları için type-safe bir düzeni. Oyun içi kamera açısı ve mod değişimlerini durum makinesi ile yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["kamera", "görünüm", "cinematik", "performans", "type-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Kamera Modları Durum Makinesi\nFarklı kamera görünümleri için durumlar oluşturun.\n1.  **`ThirdPerson`:** Varsayılan oyuncu takibi.\n2.  **`FirstPerson`:** Yakın çekim veya nişan alma modu.\n3.  **`Cinematic`:** Önceden tanımlanmış bir kamera yolu.\n4.  **Geçişler:** `AimButtonPressed`, `CutsceneTriggered`, `ViewModeChange` gibi olayları kullanın.\nBu, kamera geçişlerini akıcı ve kontrol edilebilir hale getirir.\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu düzeni, performans alanında Kamera Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Kamera Durumları akışını type-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük n, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** araç, sürüş, fizik\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 277, "no": "277", "cat": "C++ Entegrasyon", "name": "Polyglot Temel C++ Sınıf Algoritması", "desc": "veri bağlamında Temel C++ Sınıf için polyglot bir algoritması. Durum makinesini C++ sınıflarına dönüştürmek için temel bir yapı oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "kod", "şablon", "veri", "polyglot", "başlangıç"], "badge1": "Başlangıç", "content": "## C++ Durum Sınıfı Şablonu\nStateVault'tan C++ kod çıktısı için temel bir sınıf yapısı oluşturun.\n```cpp\nclass IState {\npublic:\n    virtual void Enter() = 0;\n    virtual void Execute() = 0;\n    virtual void Exit() = 0;\n};\n```\nBu arayüz, her durumun belirli bir yaşam döngüsü metoduna sahip olmasını garanti eder ve kodun genişletilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** Başlangıç seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Temel C++ Sınıf senaryoları\n- **Avantajları:** Bu algoritması sayesinde Temel C++ Sınıf işlemleri daha polyglot hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Temel C++ Sınıf ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, kod, şablon\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 278, "no": "278", "cat": "C++ Entegrasyon", "name": "Memory-Safe Durum Yöneticisi Uygulaması Stratejisi", "desc": "güvenlik bağlamında Durum Yöneticisi Uygulaması için memory-safe bir stratejisi. Durumlar arası geçişleri ve güncellemeleri yöneten bir C++ sınıfı tasarlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "yönetici", "tasarım", "güvenlik", "memory-safe", "i̇leri"], "badge1": "İleri", "content": "## Durum Yöneticisi C++ Kodu\nDurumlar arası geçişleri ve güncellemeleri yönetecek bir sınıf oluşturun.\n```cpp\nclass StateMachine {\n    IState* currentState;\npublic:\n    void ChangeState(IState* newState);\n    void Update();\n};\n```\n`ChangeState` metodu mevcut durumu sonlandırır ve yeni durumu başlatır. `Update` ise mevcut durumu her karede çalıştırır. Bu, merkezi bir kontrol noktası sağlar.\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** İleri seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Durum Yöneticisi Uygulaması senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Durum Yöneticisi Uygulaması işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Durum Yöneticisi Uygulaması ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, yönetici, tasarım\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 279, "no": "279", "cat": "C++ Entegrasyon", "name": "Olay-Güdümlü Olay Bazlı Geçişler Yapısı", "desc": "şablon bağlamında Olay Bazlı Geçişler için olay-güdümlü bir yapısı. C++'ta olay dinleyicileri kullanarak durum geçişlerini tetikleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "olay", "geçiş", "şablon", "olay-güdümlü", "başlangıç"], "badge1": "Başlangıç", "content": "## Olay Tabanlı C++ Geçişleri\nDurum geçişlerini C++ olay sistemine bağlayın.\n1.  **Olay Sistemi Entegrasyonu:** Oyun motorunuzun olay dinleme mekanizmalarını (delegates, signals) kullanın.\n2.  **Dinleyici Kaydı:** `CurrentState`'in `Enter()` metodunda ilgili olaylara dinleyici kaydedin.\n3.  **Geçiş Tetikleyicileri:** Olay tetiklendiğinde `StateMachine::ChangeState` metodunu çağırın.\nBu, durum değişimlerini dış olaylara duyarlı hale getirir ve kodu modülerleştirir.\n\n## Uygulama Senaryosu (Olay-Güdümlü)\n\nBu yapısı, şablon alanında Olay Bazlı Geçişler problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Olay Bazlı Geçişler akışını olay-güdümlü yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 280, "no": "280", "cat": "C++ Entegrasyon", "name": "Ölçeklenebilir Durum Verisi ve Önerisi", "desc": "mühendislik bağlamında Durum Verisi ve için ölçeklenebilir bir önerisi. Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "veri", "bağlam", "mühendislik", "ölçeklenebilir", "orta"], "badge1": "Orta", "content": "## Durumlar Arası Veri Paylaşımı\nDurumlar arasında veri paylaşımını yönetmek için bir bağlam (context) sınıfı kullanın.\n```cpp\nclass PlayerContext {\npublic:\n    float Health;\n    bool IsGrounded;\n};\nclass PlayerState : public IState {\nprotected:\n    PlayerContext* context;\n};\n```\n`PlayerContext` sınıfı, tüm durumların erişebileceği ortak verileri tutar. Her durum bu bağlamı referans alır. Bu, veri tutarlılığını ve erişilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Ölçeklenebilir)\n\n- **Hedef Kitle:** Orta seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Durum Verisi ve senaryoları\n- **Avantajları:** Bu önerisi sayesinde Durum Verisi ve işlemleri daha ölçeklenebilir hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Durum Verisi ve ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, veri, bağlam\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 281, "no": "281", "cat": "C++ Entegrasyon", "name": "Otonom StateVault C++ Entegrasyon Optimizasyonu", "desc": "test bağlamında StateVault C++ Entegrasyon için otonom bir optimizasyonu. StateVault Pro tarafından üretilen C++ kodunu projenize entegre etme adımları. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "kılavuz", "kurulum", "test", "otonom", "başlangıç"], "badge1": "Başlangıç", "content": "## StateVault C++ Entegrasyon Adımları\nStateVault tarafından üretilen C++ kodunu oyun projenize entegre edin.\n1.  **Dosya Ekleme:** Üretilen `.h` ve `.cpp` dosyalarını projenizin kaynak dizinine ekleyin.\n2.  **Derleme Ayarları:** Gerekirse derleyici ayarlarınızı (include yolları) güncelleyin.\n3.  **StateMachine Nesnesi:** Oyun motorunuzun ana döngüsünde (örneğin `Tick()` metodu) bir `StateMachine` nesnesi örneklendirin.\n4.  **Güncelleme Çağrısı:** Her karede `stateMachine->Update()` metodunu çağırın.\nBu, StateVault çıktısını hızla kullanıma almanızı sağlar.\n\n## Uygulama Senaryosu (Otonom)\n\nBu optimizasyonu, test alanında StateVault C++ Entegrasyon problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** StateVault C++ Entegrasyon akışını otonom yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 282, "no": "282", "cat": "Temel Tasarım", "name": "Serverless Basit Durum Makinesi Stratejisi", "desc": "caching bağlamında Basit Durum Makinesi için serverless bir stratejisi. Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "mimari", "yapı", "caching", "serverless", "başlangıç"], "badge1": "Başlangıç", "content": "## Yeni State Machine Oluşturma\nBir oyun objesi için temel durum makinesini tanımlayın.\n1.  **Başlangıç Durumu:** `Idle` olarak adlandırın.\n2.  **Geçişler:** `Idle` -> `Moving`, `Idle` -> `Attacking` tanımlayın.\n3.  **Çıkış Koşulları:** Her durumdan `Exit` koşullarını belirleyin.\nBu yapı, karakterin temel davranış akışını netleştirir ve genişletilebilir bir temel sağlar.\n\n## Uygulama Senaryosu (Serverless)\n\nBu st  Konular:** hiyerarşi, alt durum, modüler\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 285, "no": "285", "cat": "Oyun Mekanikleri", "name": "Container-Native Karakter Hareket Durumları Kalıbı", "desc": "API bağlamında Karakter Hareket Durumları için container-native bir kalıbı. Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["oyuncu", "hareket", "mekanik", "API", "container-native", "başlangıç"], "badge1": "Başlangıç", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.\n\n## Uygulama Senaryosu (Container-Native)\n\nBu kalıbı, API alanında Karakter Hareket Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Karakter Hareket Durumları akışını container-native yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 286, "no": "286", "cat": "Oyun Mekanikleri", "name": "Sıfır-Trust Zıplama Durumu Yönetimi Yapısı", "desc": "API bağlamında Zıplama Durumu Yönetimi için sıfır-trust bir yapısı. Karakterin zıplama mekaniğini state machine ile uygulayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["zıplama", "fizik", "oyuncu", "API", "sıfır-trust", "i̇leri"], "badge1": "İleri", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.\n\n## Uygulama Senaryosu (Sıfır-Trust)\n\nBu yapısı, API alanında Zıplama Durumu Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zıplama Durumu Yönetimi akışını sıfır-trust yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 287, "no": "287", "cat": "Oyun Mekanikleri", "name": "Memory-Safe Envanter Durumları Sözleşmesi", "desc": "test bağlamında Envanter Durumları için memory-safe bir sözleşmesi. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "test", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu sözleşmesi, test alanında Envanter Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Envanter Durumları akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 288, "no": "288", "cat": "Animasyon", "name": "Container-Native Animasyon Durum Grafiği Kalıbı", "desc": "dağıtım bağlamında Animasyon Durum Grafiği için container-native bir kalıbı. State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "karakter", "görsel", "dağıtım", "container-native", "başlangıç"], "badge1": "Başlangıç", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Genişletilmiş Notlar (Container-Native)\n\n- **Hedef Kitle:** Başlangıç seviye dağıtım kullanı ir.", "tags": ["hedef", "görev", "NPC", "yapay zeka", "bağlamsal", "uzman"], "badge1": "Uzman", "content": "## Hedef Odaklı AI Durumları\nAI'nın belirli bir hedefe ulaşmak için durumlar arasında geçiş yapmasını sağlayın.\n1.  **`SeekingObjective`:** Belirlenen bir hedefe doğru hareket eder.\n2.  **`InteractingWithTarget`:** Hedefe ulaştığında belirli bir eylemi gerçekleştirir (örneğin, kapı açma).\n3.  **`ReturningToPost`:** Hedefe ulaşıldıktan sonra başlangıç noktasına döner.\n4.  **Hedef Koşulları:** `TargetReached`, `InteractionComplete` gibi koşulları tanımlayın.\nBu, görev tabanlı AI davranışlarını kolaylaştırır.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Uzman seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Hedef Tabanlı AI senaryoları\n- **Avantajları:** Bu modeli sayesinde Hedef Tabanlı AI işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Hedef Tabanlı AI ihtiyacını analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hedef, görev, NPC\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 294, "no": "294", "cat": "3D Etkileşim", "name": "Container-Native Etkileşimli Obje Durumları Algoritması", "desc": "şablon bağlamında Etkileşimli Obje Durumları için container-native bir algoritması. Kapı, düğme gibi 3D objelerin etkileşim durumlarını modelleyin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["objeler", "etkileşim", "çevre", "şablon", "container-native", "pro"], "badge1": "Pro"
