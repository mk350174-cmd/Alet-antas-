lanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Zıplama Durumu Yönetimi senaryoları\n- **Avantajları:** Bu önerisi sayesinde Zıplama Durumu Yönetimi işlemleri daha composable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Zıplama Durumu Yönetimi ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zıplama, fizik, oyuncu\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 367, "no": "367", "cat": "Oyun Mekanikleri", "name": "Reaktif Envanter Durumları Metodu", "desc": "caching bağlamında Envanter Durumları için reaktif bir metodu. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "caching", "reaktif", "pro"], "badge1": "Pro", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Uygulama Senaryosu (Reaktif)\n\nBu metodu, caching alanında Envanter Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Envanter Durumları akışını reaktif yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 368, "no": "368", "cat": "Animasyon", "name": "Polyglot Animasyon Durum Grafiği Rehberi", "desc": "performans bağlamında Animasyon Durum Grafiği için polyglot bir rehberi. State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "karakter", "görsel", "performans", "polyglot", "başlangıç"], "badge1": "Başlangıç", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Uygulama Senaryosu (Polyglot)\n\nBu rehberi, performans alanında Animasyon Durum Grafiği problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Durum Grafiği akışını polyglot yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 369, "no": "369", "cat": "Animasyon", "name": "Adaptif Animasyon Geçiş Blend'leri Şablonu", "desc": "caching bağlamında Animasyon Geçiş Blend'leri için adaptif bir şablonu. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "caching", "adaptif", "uzman"], "badge1": "Uzman", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** Uzman seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Animasyon Geçiş Blend'leri senaryoları\n- **Avantajları:** Bu şablonu sayesinde Animasyon Geçiş Blend'leri işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Animasyon Geçiş Blend'leri ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, geçiş, akıcılık\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 370, "no": "370", "cat": "Animasyon", "name": "Federe Durum Tabanlı Çift Anlaşması", "desc": "gözlemlenebilirlik bağlamında Durum Tabanlı Çift için federe bir anlaşması. Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["katman", "çift animasyon", "karmaşık", "gözlemlenebilirlik", "federe", "orta"], "badge1": "Orta", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.\n\n## Genişletilmiş Notlar (Federe)\n\n- **Hedef Kitle:** Orta seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Durum Tabanlı Çift senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Durum Tabanlı Çift işlemleri daha federe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Durum Tabanlı Çift ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katman, çift animasyon, karmaşık\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 371, "no": "371", "cat": "AI Yönetimi", "name": "Hibrit Düşman AI Temel Şablonu", "desc": "test bağlamında ale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde StateVault C++ Entegrasyon ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** entegrasyon, kılavuz, kurulum\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 382, "no": "382", "cat": "Temel Tasarım", "name": "Composable Basit Durum Makinesi Modeli", "desc": "şablon bağlamında Basit Durum Makinesi için composable bir modeli. Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "mimari", "yapı", "şablon", "composable", "uzman"], "badge1": "Uzman", "content": "## Yeni State Machine Oluşturma\nBir oyun objesi için temel durum makinesini tanımlayın.\n1.  **Başlangıç Durumu:** `Idle` olarak adlandırın.\n2.  **Geçişler:** `Idle` -> `Moving`, `Idle` -> `Attacking` tanımlayın.\n3.  **Çıkış Koşulları:** Her durumdan `Exit` koşullarını belirleyin.\nBu yapı, karakterin temel davranış akışını netleştirir ve genişletilebilir bir temel sağlar.\n\n## Genişletilmiş Notlar (Composable)\n\n- **Hedef Kitle:** Uzman seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Basit Durum Makinesi senaryoları\n- **Avantajları:** Bu modeli sayesinde Basit Durum Makinesi işlemleri daha composable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Basit Durum Makinesi ihtiyacını analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** temel, mimari, yapı\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 383, "no": "383", "cat": "Temel Tasarım", "name": "Mikroservis Durum Geçiş Kuralları Sistemi", "desc": "CI/CD bağlamında Durum Geçiş Kuralları için mikroservis bir sistemi. Durumlar arası geçişleri tetikleyen olayları ve koşulları yapılandırın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["geçiş", "olay", "koşul", "CI/CD", "mikroservis", "başlangıç"], "badge1": "Başlangıç", "content": "## Geçiş Kurallarını Belirleme\nGeçişleri tetikleyen olay ve koşulları tanımlayın.\n1.  **Olay Tetikleyiciler:** `OnInput_Move`, `OnEnemyDetected` gibi olaylar oluşturun.\n2.  **Koşullar:** `HasStamina > 0`, `IsGrounded == true` gibi Boolean koşulları ekleyin.\n3.  **Öncelik:** Aynı anda birden fazla geçiş mümkünse öncelik sıralaması belirleyin.\nBu, durum değişimlerinin öngörülebilir ve mantıklı olmasını sağlar.\n\n## Genişletilmiş Notlar (Mikroservis)\n\n- **Hedef Kitle:** Başlangıç seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Durum Geçiş Kuralları senaryoları\n- **Avantajları:** Bu sistemi sayesinde Durum Geçiş Kuralları işlemleri daha mikroservis hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Durum Geçiş Kuralları ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** geçiş, olay, koşul\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 384, "no": "384", "cat": "Temel Tasarım", "name": "Composable Hiyerarşik Durumlar Protokolü", "desc": "arayüz bağlamında Hiyerarşik Durumlar için composable bir protokolü. İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["hiyerarşi", "alt durum", "modüler", "arayüz", "composable", "i̇leri"], "badge1": "İleri", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat` durumunu oluşturun.\n2.  **Alt Durumlar:** `Combat` içinde `Attacking`, `Dodging`, `Blocking` gibi alt durumlar ekleyin.\n3.  **Geçiş Kapsamı:** Alt durumların kendi içinde geçişlerini ve ana duruma geri dönüşleri belirleyin.\nBu, karmaşık sistemleri daha okunabilir ve yönetilebilir hale getirir.\n\n## Uygulama Senaryosu (Composable)\n\nBu protokolü, arayüz alanında Hiyerarşik Durumlar problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hiyerarşik Durumlar akışını composable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 385, "no": "385", "cat": "Oyun Mekanikleri", "name": "Senkron Karakter Hareket Durumları Kalıbı", "desc": "CI/CD bağlamında Karakter Hareket Durumları için senkron bir kalıbı. Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["oyuncu", "hareket", "mekanik", "CI/CD", "senkron", "uzman"], "badge1": "Uzman", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.\n\n## Uygulama Senaryosu (Senkron)\n\nBu kalıbı, CI/CD alanında Karakter Hareket Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Karakter Hareket Durumları akışını senkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 386, "no": "386", "cat": "Oyun Mekanikleri", "name": "Performant Zıplama Durumu Yönetimi Düzeni", "desc": "arayüz bağlamında Zıplama Durumu Yönetimi için performant bir düzeni. Karakterin zıplama mekaniğini state machine ile uygulayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["zıplama", "fizik", "oyuncu", "arayüz", "performant", "i̇leri"], "badge1": "İleri", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.\n\n## Genişletilmiş Notlar (Performant)\n\n- **Hedef Kitle:** İleri seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Zıplama Durumu Yönetimi senaryoları\n- **Avantajları:** Bu düzeni sayesinde Zıplama Durumu Yönetimi işlemleri daha performant hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Zıplama Durumu Yönetimi ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zıplama, fizik, oyuncu\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 387, "no": "387", "cat": "Oyun Mekanikleri", "name": "Şeffaf Envanter Durumları Pratiği", "desc": "API bağlamında Envanter Durumları için şeffaf bir pratiği. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "API", "şeffaf", "i̇leri"], "badge1": "İleri", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected` m durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Durum Tabanlı Çift ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katman, çift animasyon, karmaşık\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 391, "no": "391", "cat": "AI Yönetimi", "name": "Otonom Düşman AI Temel Metodu", "desc": "gözlemlenebilirlik bağlamında Düşman AI Temel için otonom bir metodu. Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["AI", "düşman", "davranış", "gözlemlenebilirlik", "otonom", "pro"], "badge1": "Pro", "content": "## Temel Düşman AI Durumları\nBasit bir düşman AI için ana davranış durumlarını tanımlayın.\n1.  **`Patrol` (Devriye):** Belirli yollar üzerinde hareket eder.\n2.  **`Chase` (Kovalamaca):** Oyuncuyu görüş alanına girince takip eder.\n3.  **`Attack` (Saldırı):** Oyuncu menzile girince saldırır.\n4.  **Geçiş Koşulları:** `PlayerDetected`, `PlayerLost`, `AttackRangeReached` gibi koşulları belirleyin.\nBu, düşmanların öngörülebilir ve mantıklı davranmasını sağlar.\n\n## Uygulama Senaryosu (Otonom)\n\nBu metodu, gözlemlenebilirlik alanında Düşman AI Temel problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Düşman AI Temel akışını otonom yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 392, "no": "392", "cat": "AI Yönetimi", "name": "Dağıtık Algı ve Tepki Kütüphanesi", "desc": "test bağlamında Algı ve Tepki için dağıtık bir kütüphanesi. AI'nın çevresel algılara göre durum değiştirmesini sağlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["algı", "tepki", "sensör", "test", "dağıtık", "orta"], "badge1": "Orta", "content": "## Algı Tabanlı AI Durumları\nAI'nın çevresel algılara göre davranışını değiştiren durumlar yaratın.\n1.  **`Idle`:** Hiçbir tehdit yokken bekler.\n2.  **`Alert`:** Ses veya görsel bir ipucu aldığında şüphelenir ve araştırır.\n3.  **`Engaged`:** Doğrudan tehdit algıladığında çatışmaya girer.\n4.  **Algı Mekanizmaları:** `SightCone`, `HearRadius` gibi algı sensörlerini durum geçişlerine bağlayın.\nBu, AI'ya dinamik ve gerçekçi tepkiler kazandırır.\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu kütüphanesi, test alanında Algı ve Tepki problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Algı ve Tepki akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 393, "no": "393", "cat": "AI Yönetimi", "name": "Federe Hedef Tabanlı AI Şablonu", "desc": "veri bağlamında Hedef Tabanlı AI için federe bir şablonu. AI'nın belirli hedeflere ulaşmak için durumlarını yönetin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["hedef", "görev", "NPC", "veri", "federe", "uzman"], "badge1": "Uzman", "content": "## Hedef Odaklı AI Durumları\nAI'nın belirli bir hedefe ulaşmak için durumlar arasında geçiş yapmasını sağlayın.\n1.  **`SeekingObjective`:** Belirlenen bir hedefe doğru hareket eder.\n2.  **`InteractingWithTarget`:** Hedefe ulaştığında belirli bir eylemi gerçekleştirir (örneğin, kapı açma).\n3.  **`ReturningToPost`:** Hedefe ulaşıldıktan sonra başlangıç noktasına döner.\n4.  **Hedef Koşulları:** `TargetReached`, `InteractionComplete` gibi koşulları tanımlayın.\nBu, görev tabanlı AI davranışlarını kolaylaştırır.\n\n## Genişletilmiş Notlar (Federe)\n\n- **Hedef Kitle:** Uzman seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Hedef Tabanlı AI senaryoları\n- **Avantajları:** Bu şablonu sayesinde Hedef Tabanlı AI işlemleri daha federe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Hedef Tabanlı AI ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hedef, görev, NPC\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 394, "no": "394", "cat": "3D Etkileşim", "name": "Pluggable Etkileşimli Obje Durumları Metodu", "desc": "mühendislik bağlamında Etkileşimli Obje Durumları için pluggable bir metodu. Kapı, düğme gibi 3D objelerin etkileşim durumlarını modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["objeler", "etkileşim", "çevre", "mühendislik", "pluggable", "orta"], "badge1": "Orta", "content": "## Etkileşimli Objelerin Durumları\nBir kapı veya düğme gibi objelerin etkileşim durumlarını tanımlayın.\n1.  **`Closed` / `Locked`:** Objenin varsayılan kapalı veya kilitli durumu.\n2.  **`Open` / `Unlocked`:** Objenin etkileşim sonucu açılmış veya kilitsiz durumu.\n3.  **`Interacting`:** Oyuncunun objeyle etkileşimde olduğu kısa süreli durum (animasyon oynatma).\n4.  **Geçişler:** `UseKey`, `PlayerProximity`, `ButtonPressed` gibi olayları kullanın.\nBu, çevre etkileşimlerini düzenler.\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Orta seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Etkileşimli Obje Durumları senaryoları\n- **Avantajları:** Bu metodu sayesinde Etkileşimli Obje Durumları işlemleri daha pluggable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Etkileşimli Obje Durumları ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** objeler, etkileşim, çevre\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 395, "no": "395", "cat": "3D Etkileşim", "name": "Kanıt-Tabanlı Kamera Durumları Tasarımı", "desc": "veri bağlamında Kamera Durumları için kanıt-tabanlı bir tasarımı. Oyun içi kamera açısı ve mod değişimlerini durum makinesi ile yönetin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["kamera", "görünüm", "cinematik", "veri", "kanıt-tabanlı", "orta"], "badge1": "Orta", "content": "## Kamera Modları Durum Makinesi\nFarklı kamera görünümleri için durumlar oluşturun.\n1.  **`ThirdPerson`:** Varsayılan oyuncu takibi.\n2.  **`FirstPerson`:** Yakın çekim veya nişan alma modu.\n3.  **`Cinematic`:** Önceden tanımlanmış bir kamera yolu.\n4.  **Geçişler:** `AimButtonPressed`, `CutsceneTriggered`, `ViewModeChange` gibi olayları kullanın.\nBu, kamera geçişlerini akıcı ve kontrol edilebilir hale getirir.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu tasarımı, veri alanında Kamera Durumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Kamera Durumları akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 396, "no": "396", "cat": "3D Etkileşim", "name": "Atomic Araç Sürüş Durumları Kılavuzu", "desc": "performans bağlamında Araç Sürüş Durumları için atomic bir kılavuzu. Araçların hızlanma, frenleme ve dönme gibi sürüş durumlarını kontrol edin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["araç", "sürüş", "fizik", "performans", "atomic", "orta"], "badge1": "Orta", "content": "## Araç Sürüş Durumları\nBir aracın sürüş mekaniklerini state machine ile modelleyin.\n1.  **`Idle`:** Araç duruyor.\n2.  **`Accelerating`:** Gaz pedalı basılı, araç hızlanıyor.\n3.  **`Braking`:** Fren basılı, araç yavaşlıyor.\n4.  **`Turning`:** Direksiyon çevriliyor.\n5.  **Geçişler:** `GasInput`, `BrakeInput`, `SteerInput` gibi girişleri kullanarak durumları değiştirin.\nBu, araç fiziği ve kontrolünü daha modüler yapar.\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Orta seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Araç Sürüş Durumları senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde Araç Sürüş Durumları işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Araç Sürüş Durumları ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** araç, sürüş, fizik\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 397, "no": "397", "cat": "C++ Entegrasyon", "name": "Olay-Güdümlü Temel C++ Sınıf Modeli", "desc": "mühendislik bağlamında Temel C++ Sınıf için olay-güdümlü bir modeli. Durum makinesini C++ sınıflarına dönüştürmek için temel bir yapı oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "kod", "şablon", "mühendislik", "olay-güdümlü", "başlangıç"], "badge1": "Başlangıç", "content": "## C++ Durum Sınıfı Şablonu\nStateVault'tan C++ kod çıktısı için temel bir sınıf yapısı oluşturun.\n```cpp\nclass IState {\npublic:\n    virtual void Enter() = 0;\n    virtual void Execute() = 0;\n    virtual void Exit() = 0;\n};\n```\nBu arayüz, her durumun belirli bir yaşam döngüsü metoduna sahip olmasını garanti eder ve kodun genişletilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Olay-Güdümlü)\n\n- **Hedef Kitle:** Başlangıç seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Temel C++ Sınıf senaryoları\n- **Avantajları:** Bu modeli sayesinde Temel C++ Sınıf işlemleri daha olay-güdü  edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, olay, geçiş\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 400, "no": "400", "cat": "C++ Entegrasyon", "name": "Dağıtık Durum Verisi ve Sözleşmesi", "desc": "performans bağlamında Durum Verisi ve için dağıtık bir sözleşmesi. Durumlar arasında veri paylaşımını ve bağlam yönetimini C++'ta uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "veri", "bağlam", "performans", "dağıtık", "orta"], "badge1": "Orta", "content": "## Durumlar Arası Veri Paylaşımı\nDurumlar arasında veri paylaşımını yönetmek için bir bağlam (context) sınıfı kullanın.\n```cpp\nclass PlayerContext {\npublic:\n    float Health;\n    bool IsGrounded;\n};\nclass PlayerState : public IState {\nprotected:\n    PlayerContext* context;\n};\n```\n`PlayerContext` sınıfı, tüm durumların erişebileceği ortak verileri tutar. Her durum bu bağlamı referans alır. Bu, veri tutarlılığını ve erişilebilirliğini artırır.\n\n## Genişletilmiş Notlar (Dağıtık)\n\n- **Hedef Kitle:** Orta seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Durum Verisi ve senaryoları\n- **Avantajları:** Bu sözleşmesi sayesinde Durum Verisi ve işlemleri daha dağıtık hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Durum Verisi ve ihtiyacını analiz edin.\n  2. Bu sözleşmesi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** C++, veri, bağlam\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 401, "no": "401", "cat": "C++ Entegrasyon", "name": "Edge-Optimize StateVault C++ Entegrasyon Kuralı", "desc": "gözlemlenebilirlik bağlamında StateVault C++ Entegrasyon için edge-optimize bir kuralı. StateVault Pro tarafından üretilen C++ kodunu projenize entegre etme adımları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "kılavuz", "kurulum", "gözlemlenebilirlik", "edge-optimize", "orta"], "badge1": "Orta", "content": "## StateVault C++ Entegrasyon Adımları\nStateVault tarafından üretilen C++ kodunu oyun projenize entegre edin.\n1.  **Dosya Ekleme:** Üretilen `.h` ve `.cpp` dosyalarını projenizin kaynak dizinine ekleyin.\n2.  **Derleme Ayarları:** Gerekirse derleyici ayarlarınızı (include yolları) güncelleyin.\n3.  **StateMachine Nesnesi:** Oyun motorunuzun ana döngüsünde (örneğin `Tick()` metodu) bir `StateMachine` nesnesi örneklendirin.\n4.  **Güncelleme Çağrısı:** Her karede `stateMachine->Update()` metodunu çağırın.\nBu, StateVault çıktısını hızla kullanıma almanızı sağlar.\n\n## Genişletilmiş Notlar (Edge-Optimize)\n\n- **Hedef Kitle:** Orta seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde StateVault C++ Entegrasyon senaryoları\n- **Avantajları:** Bu kuralı sayesinde StateVault C++ Entegrasyon işlemleri daha edge-optimize hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde StateVault C++ Entegrasyon ihtiyacını analiz edin.\n  2. Bu kuralı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** entegrasyon, kılavuz, kurulum\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 402, "no": "402", "cat": "AI Prompt Kütüphanesi", "name": "Sistem Promptu — State Machine", "desc": "State Machine alanı için orijinal sistem promptu promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "system-prompt", "state", "orijinal"], "badge1": "Orijinal AI", "content": "## SİSTEM PROMPTU — State Machine Uzmanı\n\nSen kıdemli bir **State Machine** uzmanısın. Görevin: FSM, behavior trees.\n\n### Davranış Kuralları\n1. **Net ve doğrulanabilir** yanıtlar ver; spekülasyondan kaçın.\n2. Her iddiayı kaynak veya somut örnekle destekle.\n3. Belirsizlik varsa açıkça **\"emin değilim\"** de — yanlış cevap verme.\n4. Kullanıcıya **adım adım** rehberlik et; tek seferde fazla yükleme.\n5. Yanıt formatı: önce TL;DR (2 cümle), sonra detaylar, sonra sonraki adım önerisi.\n\n### Yasak Davranışlar\n- Üretilmiş istatistik veya uydurma kaynak verme\n- Konu dışına çıkma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru State Machine kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — State Machine", "desc": "State Machine alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "state", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — State Machine\n\nAşağıda State Machine alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** FSM, behavior trees konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** FSM, behavior trees alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** FSM, behavior trees için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — State Machine", "desc": "State Machine alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "state", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — State Machine\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının State Machine ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) FSM, behavior trees ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — State Machine", "desc": "State Machine alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "state", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — State Machine Mentörü\n\n**Kimsin:** 15+ yıl State Machine deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** FSM, behavior trees\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün State Machine ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — State Machine", "desc": "State Machine alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "state", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — State Machine\n\nState Machine alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"State Machine\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 407, "no": "407", "cat": "Temel Tasarım", "name": "Headless Basit Durum Makinesi Standartı", "desc": "gözlemlenebilirlik bağlamında Basit Durum Makinesi için headless bir standartı. Bir oyun objesi için temel durum makinesini ve ilk geçişleri tanımlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "mimari", "yapı", "gözlemlenebilirlik", "headless", "pro"], "badge1": "Pro", "content": "## Yeni State Machine Oluşturma\nBir oyun objesi için temel durum makinesini tanımlayın.\n1.  **Başlangıç Durumu:** `Idle` olarak adlandırın.\n2.  **Geçişler:** `Idle` -> `Moving`, `Idle` -> `Attacking` tanımlayın.\n3.  **Çıkış Koşulları:** Her durumdan `Exit` koşullarını belirleyin.\nBu yapı, karakterin temel davranış akışını netleştirir ve genişletilebilir bir temel sağlar.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Pro seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Basit Durum Makinesi senaryoları\n- **Avantajları:** Bu standartı sayesinde Basit Durum Makinesi işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Basit Durum Makinesi ihtiyacını analiz edin.\n  2. Bu standartı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** temel, mimari, yapı\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 408, "no": "408", "cat": "Temel Tasarım", "name": "Sezgisel Durum Geçiş Kuralları Akışı", "desc": "şablon bağlamında Durum Geçiş Kuralları için sezgisel bir akışı. Durumlar arası geçişleri tetikleyen olayları ve koşulları yapılandırın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["geçiş", "olay", "koşul", "şablon", "sezgisel", "pro"], "badge1": "Pro", "content": "## Geçiş Kurallarını Belirleme\nGeçişleri tetikleyen olay ve koşulları tanımlayın.\n1.  **Olay Tetikleyiciler:** `OnInput_Move`, `OnEnemyDetected` gibi olaylar oluşturun.\n2.  **Koşullar:** `HasStamina > 0`, `IsGrounded == true` gibi Boolean koşulları ekleyin.\n3.  **Öncelik:** Aynı anda birden fazla geçiş mümkünse öncelik sıralaması belirleyin.\nBu, durum değişimlerinin öngörülebilir ve mantıklı olmasını sağlar.\n\n## Uygulama Senaryosu (Sezgisel)\n\nBu akışı, şablon alanında Durum Geçiş Kuralları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Geçiş Kuralları akışını sezgisel yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 409, "no": "409", "cat": "Temel Tasarım", "name": "Yalın Hiyerarşik Durumlar Düzeni", "desc": "dağıtım bağlamında Hiyerarşik Durumlar için yalın bir düzeni. İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["hiyerarşi", "alt durum", "modüler", "dağıtım", "yalın", "başlangıç"], "badge1": "Başlangıç", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat` durumunu oluşturun.\n2.  **Alt Durumlar:** `Combat` içinde `Attacking`, `Dodging`, `Blocking` gibi alt durumlar ekleyin.\n3.  **Geçiş Kapsamı:** Alt durumların kendi içinde geçişlerini ve ana duruma geri dönüşleri belirleyin.\nBu, karmaşık sistemleri daha okunabilir ve yönetilebilir hale getirir.\n\n## Uygulama Senaryosu (Yalın)\n\nBu düzeni, dağıtım alanında Hiyerarşik Durumlar problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hiyerarşik Durumlar akışını yalın yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 410, "no": "410", "cat": "Oyun Mekanikleri", "name": "AI-Augmented Karakter Hareket Durumları Pratiği", "desc": "akış bağlamında Karakter Hareket Durumları için ai-augmented bir pratiği. Oyun karakterinin yürüme, koşma ve zıplama durumlarını modelleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["oyuncu", "hareket", "mekanik", "akış", "ai-augmented", "i̇leri"], "badge1": "İleri", "content": "## Hareket Durumlarını Tasarlama\nBir karakterin temel hareket durumlarını tanımlayın.\n1.  **Durumlar:** `Idle`, `Walking`, `Running`, `Jumping`, `Falling` durumlarını oluşturun.\n2.  **Geçişler:** `Walking` -> `Running` (Shift basılı), `Idle` -> `Jumping` (Space basılı ve yerde).\n3.  **Fizik Etkileşimi:** Her durumda uygun fiziksel kuvvetleri ve hızları uygulayın.\nBu yapı, karakter hareketlerinin akıcı ve tutarlı olmasını sağlar.\n\n## Genişletilmiş Notlar (AI-Augmented)\n\n- **Hedef Kitle:** İleri seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Karakter Hareket Durumları senaryoları\n- **Avantajları:** Bu pratiği sayesinde Karakter Hareket Durumları işlemleri daha ai-augmented hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Karakter Hareket Durumları ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** oyuncu, hareket, mekanik\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 411, "no": "411", "cat": "Oyun Mekanikleri", "name": "Kanıt-Tabanlı Zıplama Durumu Yönetimi Kalıbı", "desc": "monitoring bağlamında Zıplama Durumu Yönetimi için kanıt-tabanlı bir kalıbı. Karakterin zıplama mekaniğini state machine ile uygulayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["zıplama", "fizik", "oyuncu", "monitoring", "kanıt-tabanlı", "başlangıç"], "badge1": "Başlangıç", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu kalıbı, monitoring alanında Zıplama Durumu Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zıplama Durumu Yönetimi akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 412, "no": "412", "cat": "Oyun Mekanikleri", "name": "Modüler Envanter Durumları Önerisi", "desc": "mimari bağlamında Envanter Durumları için modüler bir önerisi. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "mimari", "modüler", "pro"], "badge1": "Pro", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Genişletilmiş Notlar (Modüler)\n\n- **Hedef Kitle:** Pro seviye mimari kullanıcıları\n- **Uygulama Alanı:** d yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 414, "no": "414", "cat": "Animasyon", "name": "Multi-Tenant Animasyon Geçiş Blend'leri Protokolü", "desc": "dağıtım bağlamında Animasyon Geçiş Blend'leri için multi-tenant bir protokolü. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "dağıtım", "multi-tenant", "i̇leri"], "badge1": "İleri", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Uygulama Senaryosu (Multi-Tenant)\n\nBu protokolü, dağıtım alanında Animasyon Geçiş Blend'leri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Geçiş Blend'leri akışını multi-tenant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma n optimize edilmiştir.", "tags": ["C++", "yönetici", "tasarım", "mikroservis", "ai-augmented", "uzman"], "badge1": "Uzman", "content": "## Durum Yöneticisi C++ Kodu\nDurumlar arası geçişleri ve güncellemeleri yönetecek bir sınıf oluşturun.\n```cpp\nclass StateMachine {\n    IState* currentState;\npublic:\n    void ChangeState(IState* newState);\n    void Update();\n};\n```\n`ChangeState` metodu mevcut durumu sonlandırır ve yeni durumu başlatır. `Update` ise mevcut durumu her karede çalıştırır. Bu, merkezi bir kontrol noktası sağlar.\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu anlaşması, mikroservis alanında Durum Yöneticisi Uygulaması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Durum Yöneticisi Uygulaması akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-450-final"}}, {"id": 424, "no": "424", "cat": "C++ Entegrasyon", "name": "Mobile-First Olay Bazlı Geçişler Rehberi", "desc": "CI/CD bağlamında Olay Bazlı Geçişler için mobile-first bir rehberi. C++'ta olay dinleyicileri kullanarak durum geçişlerini tetikleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["C++", "olay", "geçiş", "CI/CD", "mobile-first", "i̇leri"], "badge1": "İleri", "content": "## Olay Tabanlı C++ Geçişleri\nDurum geçişlerini C++ olay sistemine bağlayın.\n1.  **Olay Sistemi Entegrasyonu:** Oyun motorunuzun olay dinleme mekanizmalarını (delegates, signals) kullanın.\n2.  **Dinleyici Kaydı:** `CurrentState`'in `Enter()` me alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 429, "no": "429", "cat": "Temel Tasarım", "name": "Headless Hiyerarşik Durumlar Doktrini", "desc": "dağıtım bağlamında Hiyerarşik Durumlar için headless bir doktrini. İç içe geçmiş durum makineleri oluşturarak karmaşıklığı yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["hiyerarşi", "alt durum", "modüler", "dağıtım", "headless", "i̇leri"], "badge1": "İleri", "content": "## Alt Durum Yapılandırma\nDaha büyük bir durum içinde alt durumlar tanımlayarak hiyerarşi oluşturun.\n1.  **Ana Durum:** `Combat` durumunu oluşturun.\n2.  **Alt Durumlar:** `Combat` içinde `Attacking`, `Dodging`, `Blocking` gibi alt durumlar ekleyin.\n3.  **Geçiş Kapsamı:** Alt durumların kendi içinde geçişlerini ve ana duruma geri dönüşleri belirleyin.\nBu, karmaşık sistemleri daha okunabilir ve yönetilebilir hale getirir.\n\n## Uygulama Senaryosu (Headless)\n\nBu doktrini, dağıtım alanında Hiyerarşik Durumlar problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hiyerarşik Durumlar akışını headless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 430, "no": "430", "cat": "Oyun Mekanikleri", "name": "Polyglot Karakter Hareket Durumları Çekirdeği", "desc": "arayüz bağlamında Karakter Hareket Durumları için polyglot bir çekirdeği. Oyun karakter itoring", "ai-augmented", "orta"], "badge1": "Orta", "content": "## Zıplama Durumu Yönetimi\nKarakterin zıplama mekaniğini state machine ile uygulayın.\n1.  **`Jumping` Durumu:** Zıplama animasyonunu tetikleyin.\n2.  **Giriş Koşulu:** `IsGrounded` false iken `Jump` tuşu basıldığında.\n3.  **Çıkış Koşulu:** Animasyon bitince ve `IsGrounded` true olunca `Idle` veya `Falling` durumuna geçiş.\n4.  **Hava Kontrolü:** Zıplama sırasında hareket kabiliyetini kısıtlayın.\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu kuralı, monitoring alanında Zıplama Durumu Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zıplama Durumu Yönetimi akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 432, "no": "432", "cat": "Oyun Mekanikleri", "name": "Serverless Envanter Durumları Anlaşması", "desc": "entegrasyon bağlamında Envanter Durumları için serverless bir anlaşması. Envanter açma, kapama ve eşya kullanma durumlarını yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["UI", "envanter", "oyuncu", "entegrasyon", "serverless", "i̇leri"], "badge1": "İleri", "content": "## Envanter Arayüzü Durumları\nOyun içi envanter sisteminin durumlarını modelleyin.\n1.  **`InventoryClosed`:** Oyunun normal akışı.\n2.  **`InventoryOpen`:** Envanter arayüzünün aktif olduğu durum.\n3.  **`ItemSelected` (Alt Durum):** Envanter açıkken bir eşyanın seçilmesi.\n4.  **Geçişler:** ESC ile `Open`->`Closed`, `UseItem` ile `Selected`->`Closed`.\nBu, kullanıcı arayüzü etkileşimlerini düzenler.\n\n## Genişletilmiş Notlar (Serverless)\n\n- **Hedef Kitle:** İleri seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Envanter Durumları senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Envanter Durumları işlemleri daha serverless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Envanter Durumları ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** UI, envanter, oyuncu\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 433, "no": "433", "cat": "Animasyon", "name": "Quantum-Hazır Animasyon Durum Grafiği Düzeneği", "desc": "test bağlamında Animasyon Durum Grafiği için quantum-hazır bir düzeneği. State makine durumlarını animasyon klipleriyle eşleştirerek dinamik animasyonlar oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "karakter", "görsel", "test", "quantum-hazır", "başlangıç"], "badge1": "Başlangıç", "content": "## Animasyon State'lerini Eşleştirme\nDurum makinesi state'lerini ilgili animasyon klipleriyle bağlayın.\n1.  **Durum-Klip Haritalama:** Her `Idle`, `Walk`, `Run` durumu için uygun animasyon klip adlarını tanımlayın.\n2.  **Geçiş Eşleşmeleri:** State geçişleriyle animasyon geçişlerini (blend süreleri dahil) senkronize edin.\n3.  **Hız Parametreleri:** `WalkSpeed` gibi değişkenleri animasyon hızına bağlayın.\nBu, karakterin görsel olarak canlı görünmesini sağlar.\n\n## Genişletilmiş Notlar (Quantum-Hazır)\n\n- **Hedef Kitle:** Başlangıç seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Animasyon Durum Grafiği senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Animasyon Durum Grafiği işlemleri daha quantum-hazır hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Animasyon Durum Grafiği ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, karakter, görsel\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 434, "no": "434", "cat": "Animasyon", "name": "Layered Animasyon Geçiş Blend'leri Yapısı", "desc": "performans bağlamında Animasyon Geçiş Blend'leri için layered bir yapısı. Akıcı animasyon geçişleri için blend sürelerini ve koşullarını ayarlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "geçiş", "akıcılık", "performans", "layered", "pro"], "badge1": "Pro", "content": "## Akıcı Animasyon Geçişleri\nDurumlar arası geçişlerde animasyonların yumuşak bir şekilde harmanlanmasını sağlayın.\n1.  **Blend Süreleri:** Her geçiş için (örneğin `Walk`'tan `Run`'a) uygun blend süreleri tanımlayın (0.2-0.5 saniye).\n2.  **Blend Koşulları:** Hız veya giriş yönü gibi parametrelere göre dinamik blend kararları alın.\n3.  **Kesintili Geçişler:** Darbe veya düşme gibi acil durumlar için anında geçişler belirleyin.\nBu, animasyonların doğal görünmesini sağlar.\n\n## Uygulama Senaryosu (Layered)\n\nBu yapısı, performans alanında Animasyon Geçiş Blend'leri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Animasyon Geçiş Blend'leri akışını layered yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 435, "no": "435", "cat": "Animasyon", "name": "Headless Durum Tabanlı Çift Önerisi", "desc": "gözlemlenebilirlik bağlamında Durum Tabanlı Çift için headless bir önerisi. Farklı vücut bölgeleri için bağımsız animasyon durumlarını yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["katman", "çift animasyon", "karmaşık", "gözlemlenebilirlik", "headless", "pro"], "badge1": "Pro", "content": "## Çift Katmanlı Animasyon Yönetimi\nÜst vücut ve alt vücut için ayrı animasyon state'leri yönetin.\n1.  **Katman Tanımı:** `UpperBody` ve `LowerBody` gibi iki animasyon katmanı oluşturun.\n2.  **Bağımsız State'ler:** `LowerBody` için `Walk`, `Run` ve `UpperBody` için `Aim`, `Reload` durumları tanımlayın.\n3.  **Senkronizasyon:** Gerekirse katmanlar arası senkronizasyon noktalarını veya olayları belirleyin.\nBu, zengin ve dinamik karakter animasyonları oluşturur.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Pro seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Durum Tabanlı Çift senaryoları\n- **Avantajları:** Bu önerisi sayesinde Durum Tabanlı Çift işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Durum Tabanlı Çift ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katman, çift animasyon, karmaşık\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 436, "no": "436", "cat": "AI Yönetimi", "name": "Dağıtık Düşman AI Temel Şablonu", "desc": "mikroservis bağlamında Düşman AI Temel için dağıtık bir şablonu. Düşman AI için temel devriye, kovalamaca ve saldırı durumlarını modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["AI", "düşman", "davranış", "mikroservis", "dağıtık", "orta"], "badge1": "Orta", "content": "## Temel Düşman AI Durumları\nBasit bir düşman AI için ana davranış durumlarını tanımlayın.\n1.  **`Patrol` (Devriye):** Belirli yollar üzerinde hareket eder.\n2.  **`Chase` (Kovalamaca):** Oyuncuyu görüş alanına girince takip eder.\n3.  **`Attack` (Saldırı):** Oyuncu menzile girince saldırır.\n4.  **Geçiş Koşulları:** `PlayerDetected`, `PlayerLost`, `AttackRangeReached` gibi koşulları belirleyin.\nBu, düşmanların öngörülebilir ve mantıklı davranmasını sağlar.\n\n## Genişletilmiş Notlar (Dağıtık)\n\n- **Hedef Kitle:** Orta seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Düşman AI Temel senaryoları\n- **Avantajları:** Bu şablonu sayesinde Düşman AI Temel işlemleri daha dağıtık hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Düşman AI Temel ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'statevault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
