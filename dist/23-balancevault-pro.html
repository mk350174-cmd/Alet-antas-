<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>

<body>

<header class="hero">
  <div class="hero-corner">B</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Balance<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Oyun içi ekonomi ve güç dengesini (skill cooldown, hasar formülleri) simüle eden hesaplama aracı.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>20</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Balance ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">20</span>
      </button>
    </div>
    <div id="catBtns"></div>

ızı ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** savaş, can, yenileme\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 250, "no": "250", "cat": "Yetenek Mekanikleri", "name": "Federe Beceri Bekleme Süresi Anlaşması", "desc": "entegrasyon bağlamında Beceri Bekleme Süresi için federe bir anlaşması. Bir yeteneğin tekrar kullanılabilmesi için geçmesi gereken süreyi belirler. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["yetenek", "bekleme", "süre", "entegrasyon", "federe", "pro"], "badge1": "Pro", "content": "## Yetenek Bekleme Süresi\n1.  **Temel Süre:** `Bekleme Süresi = Yeteneğin Temel Süresi`\n2.  **Azaltma:** `Nihai Süre = Bekleme Süresi * (1 - Bekleme Azaltma %)`\n3.  **Minimum Süre:** Asla 1 saniyenin altına düşmemesini sağla.\nYeteneklerin temel bekleme sürelerini ve oyuncu yeteneklerinin sağladığı azaltmaları dikkate alarak nihai süreyi belirleyin.\n\n## Genişletilmiş Notlar (Federe)\n\n- **Hedef Kitle:** Pro seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Beceri Bekleme Süresi senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Beceri Bekleme Süresi işlemleri daha federe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Beceri Bekleme Süresi ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- * a:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Denge İterasyon Protokolü akışını serverless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 279, "no": "279", "cat": "Denge Ayarları ve Testleri", "name": "Stream Tabanlı Oyuncu Geri Bildirimi Çekirdeği", "desc": "test bağlamında Oyuncu Geri Bildirimi için stream tabanlı bir çekirdeği. Dengeleme kararları için oyuncu geri bildirimlerini etkin bir şekilde toplar ve değerlendirir. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["denge", "geri bildirim", "analiz", "test", "stream tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Oyuncu Geri Bildirimi Analizi\n1.  **Toplama Kanalları:** Forumlar, anketler, oyun içi raporlama.\n2.  **Kategorize Et:** Geri bildirimleri konularına göre gruplandır (örn. yetenek gücü, ekonomi).\n3.  **Önceliklendir:** Etki ve sıklığa göre sorunları sırala.\n4.  **Doğrula:** Geri bildirimleri oyun içi verilerle karşılaştır.\n5.  **Raporla:** Dengeleme ekibine somut öneriler sun.\n\n## Genişletilmiş Notlar (Stream Tabanlı)\n\n- **Hedef Kitle:** İleri seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Oyuncu Geri Bildirimi senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Oyuncu Geri Bildirimi işlemleri daha stream tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Oyuncu Geri Bildirimi ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** denge, geri bildirim, analiz\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 280, "no": "280", "cat": "Envanter & Ticaret", "name": "Event-Sourced Eşya Düşürme Oranları Algoritması", "desc": "performans bağlamında Eşya Düşürme Oranları için event-sourced bir algoritması. Düşmanlardan veya sandıklardan eşya düşürme olasılığını belirleyen sistem. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["envanter", "düşürme", "olasılık", "performans", "event-sourced", "başlangıç"], "badge1": "Başlangıç", "content": "## Eşya Düşürme Oranları\n1.  **Havuz Oluştur:** Düşebilecek eşyaların bir listesini ve nadirliklerini tanımla.\n2.  **Genel Oran:** `Düşme Şansı = Canavar Zorluğu * Temel Oran`\n3.  **Ağırlıklı Seçim:** `Nadir Eşya Şansı = Eşya Ağırlığı / Toplam Ağırlık`.\nDüşmanların zorluğuna ve eşyaların nadirliğine göre düşürme oranlarını ayarlayarak oyuncu ödüllerini dengele.\n\n## Uygulama Senaryosu (Event-Sourced)\n\nBu algoritması, performans alanında Eşya Düşürme Oranları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Eşya Düşürme Oranları akışını event-sourced yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 281, "no": "281", "cat": "Envanter & Ticaret", "name": "Ölçeklenebilir Pazar Fiyat Dinamikleri Rehberi", "desc": "veri bağlamında Pazar Fiyat Dinamikleri için ölçeklenebilir bir rehberi. Oyun içi pazar yerindeki eşya fiyatlarının arz ve talebe göre nasıl değiştiğini simüle eder. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["envanter", "pazar", "fiyat", "veri", "ölçeklenebilir", "pro"], "badge1": "Pro", "content": "## Pazar Fiyat Dinamikleri\n1.  **Arz-Talep:** `Fiyat = Temel Fiyat * (Talep / Arz)`\n2.  **Limitler:** Fiyatların belirli bir aralıkta kalmasını sağla (min/max).\n3.  **Enflasyon/Deflasyon:** Sistemden çıkan/giren para miktarını izle.\nOyuncuların alım-satım davranışlarını ve eşya arzını/talebi takip ederek pazar fiyatlarını dinamik olarak ayarla.\n\n## Genişletilmiş Notlar (Ölçeklenebilir)\n\n- **Hedef Kitle:** Pro seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Pazar Fiyat Dinamikleri senaryoları\n- **Avantajları:** Bu rehberi sayesinde Pazar Fiyat Dinamikleri işlemleri daha ölçeklenebilir hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Pazar Fiyat Dinamikleri ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** envanter, pazar, fiyat\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 282, "no": "282", "cat": "Ekonomi Simülasyonu", "name": "Sıfır-Trust Kaynak Üretim Oranı Kütüphanesi", "desc": "test bağlamında K Enflasyon Takip Modeli\n1.  **Para Arzı:** `Toplam Para = Oyuncuların Sahip Olduğu + Sistemdeki`\n2.  **Harcama Oranı:** `Harcama = Satın Alımlar / Toplam Para`\n3.  **İdeal Oran:** Hedeflenen harcama/kazanç oranını belirle.\nDolaşımdaki para miktarını ve harcama alışkanlıklarını izleyerek enflasyonu kontrol altında tutun.\n\n## Genişletilmiş Notlar (Layered)\n\n- **Hedef Kitle:** Uzman seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Oyun İçi Para senaryoları\n- **Avantajları:** Bu standartı sayesinde Oyun İçi Para işlemleri daha layered hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Oyun İçi Para ihtiyacını analiz edin.\n  2. Bu standartı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ekonomi, enflasyon, para\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 284, "no": "284", "cat": "Ekonomi Simülasyonu", "name": "Dağıtık Harcama Simülasyonu Doktrini", "desc": "şablon bağlamında Harcama Simülasyonu için dağıtık bir doktrini. Oyuncuların belirli eşyalara veya hizmetlere ne kadar harcayacağını tahmin eder. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["ekonomi", "harcama", "tüketim", "şablon", "dağıtık", "orta"], "badge1": "Orta", "content": "## Harcama Tahmin Modeli\n1.  **Fiyat Etkisi:** `Harcama İhtimali = Temel Oran / Eşya Fiyatı`\n2.  **İhtiyaç Faktörü:** `Harcama İhtimali * (1 + İhtiyaç Bonusu)`\n3.  **Geri Bildirim:** Oyuncu davranışlarını gözlemle.\nBu model, eşyanın fiyatı ve oyuncunun o eşyaya olan ihtiyacına göre harcama olasılığın t formatı: önce TL;DR (2 cümle), sonra detaylar, sonra sonraki adım önerisi.\n\n### Yasak Davranışlar\n- Üretilmiş istatistik veya uydurma kaynak verme\n- Konu dışına çıkma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru Oyun Dengesi kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — Oyun Dengesi", "desc": "Oyun Dengesi alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "oyun", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Oyun Dengesi\n\nAşağıda Oyun Dengesi alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** game balancing, economy tuning konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** game balancing, economy tuning alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** game balancing, economy tuning için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Oyun Dengesi", "desc": "Oyun Dengesi alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "oyun", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Oyun Dengesi\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Oyun Dengesi ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) game balancing, economy tuning ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Oyun Dengesi", "desc": "Oyun Dengesi alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "oyun", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Oyun Dengesi Mentörü\n\n**Kimsin:** 15+ yıl Oyun Dengesi deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** game balancing, economy tuning\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün Oyun Dengesi ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — Oyun Dengesi", "desc": "Oyun Dengesi alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "oyun", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — Oyun Dengesi\n\nOyun Dengesi alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"Oyun Dengesi\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 407, "no": "407", "cat": "Ekonomi Simülasyonu", "name": "Self-Healing Kaynak Üretim Oranı Düzeneği", "desc": "entegrasyon bağlamında Kaynak Üretim Oranı için self-healing bir düzeneği. Oyuncuların zamanla nasıl kaynak kazanacağını belirleyen matematiksel model. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["ekonomi", "kaynak", "üretim", "entegrasyon", "self-healing", "orta"], "badge1": "Orta", "content": "## Kaynak Üretim Formülü\n1.  **Temel Üretim:** `Üretim = Temel Oran * (1 + Bonus Yüzdesi)`\n2.  **Zaman Faktörü:** `Toplam Kaynak = Üretim * Geçen Süre (dakika)`\n3.  **Sınırlandırma:** Maksimum envanter kapasitesini kontrol et.\nBu formül, oyuncunun sahip olduğu bonusları ve geçen süreyi dikkate alarak kaynak üretimini hesaplar.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu düzeneği, entegrasyon alanında Kaynak Üretim Oranı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Kaynak Üretim Oranı akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 408, "no": "408", "cat": "Ekonomi Simülasyonu", "name": "Federe Oyun İçi Para Tasarımı", "desc": "akış bağlamında Oyun İçi Para için federe bir tasarımı. Oyun içi para biriminin değerini ve dolaşımını simüle eden model. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ekonomi", "enflasyon", "para", "akış", "federe", "başlangıç"], "badge1": "Başlangıç", "content": "## Enflasyon Takip Modeli\n1.  **Para Arzı:** `Toplam Para = Oyuncuların Sahip Olduğu + Sistemdeki`\n2.  **Harcama Oranı:** `Harcama = Satın Alımlar / Toplam Para`\n3.  **İdeal Oran:** Hedeflenen harcama/kazanç oranını belirle.\nDolaşımdaki para miktarını ve harcama alışkanlıklarını izleyerek enflasyonu kontrol altında tutun.\n\n## Uygulama Senaryosu (Federe)\n\nBu tasarımı, akış alanında Oyun İçi Para problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Oyun İçi Para akışını federe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 409, "no": "409", "cat": "Ekonomi Simülasyonu", "name": "Pipeline Harcama Simülasyonu Doktrini", "desc": "yapay zeka bağlamında Harcama Simülasyonu için pipeline bir doktrini. Oyuncuların belirli eşyalara veya hizmetlere ne kadar harcayacağını tahmin eder. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["ekonomi", "harcama", "tüketim", "yapay zeka", "pipeline", "uzman"], "badge1": "Uzman", "content": "## Harcama Tahmin Modeli\n1.  **Fiyat Etkisi:** `Harcama İhtimali = Temel Oran / Eşya Fiyatı`\n2.  **İhtiyaç Faktörü:** `Harcama İhtimali * (1 + İhtiyaç Bonusu)`\n3.  **Geri Bildirim:** Oyuncu davranışlarını gözlemle.\nBu model, eşyanın fiyatı ve oyuncunun o eşyaya olan ihtiyacına göre harcama olasılığını simüle eder.\n\n## Uygulama Senaryosu (Pipeline)\n\nBu doktrini, yapay zeka alanında Harcama Simülasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Harcama Simülasyonu akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 410, "no": "410", "cat": "Ekonomi Simülasyonu", "name": "Dağıtık Fiyatlandırma Modeli Sistemi", "desc": "dağıtım bağlamında Fiyatlandırma Modeli için dağıtık bir sistemi. Oyun içi eşyaların veya hizmetlerin adil ve dengeli fiyatlarını belirler. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["ekonomi", "fiyat", "denge", "dağıtım", "dağıtık", "i̇leri"], "badge1": "İleri", "content": "## Eşya Fiyatlandırma Stratejisi\n1.  **Üretim Maliyeti:** `Temel Fiyat = Kaynak Maliyeti + İşçilik`\n2.  **Nadirik Çarpanı:** `Nihai Fiyat = Temel Fiyat * Nadirlik Çarpanı`\n3.  **Pazar Dinamiği:** Talebe göre fiyatları ayarla.\nEşyanın üretim maliyetini, nadirliğini ve pazar talebini göz önünde bulundurarak dengeli bir fiyat belirleyin.\n\n## Genişletilmiş Notlar (Dağıtık)\n\n- **Hedef Kitle:** İleri seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Fiyatlandırma Modeli senaryoları\n- **Avantajları:** Bu sistemi sayesinde Fiyatlandırma Modeli işlemleri daha dağıtık hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Fiyatlandırma Modeli ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ekonomi, fiyat, denge\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 411, "no": "411", "cat": "Savaş Dengesi", "name": "Pipeline Temel Hasar Formülü Pratiği", "desc": "mikroservis bağlamında Temel Hasar Formülü için pipeline bir pratiği. Bir saldırının hedef üzerindeki hasarını hesaplamak için kullanılan temel denklem. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["savaş", "hasar", "matematik", "mikroservis", "pipeline", "pro"], "badge1": "Pro", "content": "## Temel Hasar Hesaplama\n1.  **Ham Hasar:** `Ham Hasar = Saldırganın Gücü * Yetenek Çarpanı`\n2.  **Savunma Etkisi:** `Nihai Hasar = Ham Hasar - (Hedefin Savunması * Azaltma)`\n3.  **Minimum Hasar:** Hasarın asla 1'den az olmamasını sağla.\nBu formül, saldırganın gücü ve hedefin savunmasını dikkate alarak nihai hasarı belirler.\n\n## Uygulama Senaryosu (Pipeline)\n\nBu pratiği, mikroservis alanında Temel Hasar Formülü problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Temel Hasar Formülü akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 412, "no": "412", "cat": "Savaş Dengesi", "name": "Idempotent Zırh Azaltma Hesaplama Düzeneği", "desc": "gözlemlenebilirlik bağlamında Zırh Azaltma Hesaplama için idempotent bir düzeneği. Zırhın gelen hasarı yüzde olarak ne kadar azalttığını belirleyen formül. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["savaş", "zırh", "azaltma", "gözlemlenebilirlik", "idempotent", "başlangıç"], "badge1": "Başlangıç", "content": "## Zırh Hasar Azaltma\n1.  **Azaltma Yüzdesi:** `Azal rinizde Eşya Düşürme Oranları ihtiyacını analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** envanter, düşürme, olasılık\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-450-final"}}, {"id": 426, "no": "426", "cat": "Envanter & Ticaret", "name": "Composable Pazar Fiyat Dinamikleri Kuralı", "desc": "entegrasyon bağlamında Pazar Fiyat Dinamikleri için composable bir kuralı. Oyun içi pazar yerindeki eşya fiyatlarının arz ve talebe göre nasıl değiştiğini simüle eder. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["envanter", "pazar", "fiyat", "entegrasyon", "composable", "pro"], "badge1": "Pro", "content": "## Pazar Fiyat Dinamikleri\n1.  **Arz-Talep:** `Fiyat = Temel Fiyat * (Talep / Arz)`\n2.  **Limitler:** Fiyatların belirli bir aralıkta kalmasını sağla (min/max).\n3.  **Enflasyon/Deflasyon:** Sistemden çıkan/giren para miktarını izle.\nOyuncuların alım-satım davranışlarını ve eşya arzını/talebi takip ederek pazar fiyatlarını dinamik olarak ayarla.\n\n## Genişletilmiş Notlar (Composable)\n\n- **Hedef Kitle:** Pro seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Pazar Fiyat Dinamikleri senaryoları\n- **Avantajları:** Bu kuralı sayesinde Pazar Fiyat Dinamikleri işlemleri daha composable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Pazar Fiyat Dinamikleri ihtiyacını analiz edin.\n  2. Bu kuralı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, ger _of": 1, "wave": "v3-450-final"}}, {"id": 428, "no": "428", "cat": "Ekonomi Simülasyonu", "name": "Quantum-Hazır Oyun İçi Para Kuralı", "desc": "mühendislik bağlamında Oyun İçi Para için quantum-hazır bir kuralı. Oyun içi para biriminin değerini ve dolaşımını simüle eden model. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ekonomi", "enflasyon", "para", "mühendislik", "quantum-hazır", "başlangıç"], "badge1": "Başlangıç", "content": "## Enflasyon Takip Modeli\n1.  **Para Arzı:** `Toplam Para = Oyuncuların Sahip Olduğu + Sistemdeki`\n2.  **Harcama Oranı:** `Harcama = Satın Alımlar / Toplam Para`\n3.  **İdeal Oran:** Hedeflenen harcama/kazanç oranını belirle.\nDolaşımdaki para miktarını ve harcama alışkanlıklarını izleyerek enflasyonu kontrol altında tutun.\n\n## Uygulama Senaryosu (Quantum-Hazır)\n\nBu kuralı, mühendislik alanında Oyun İçi Para problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Oyun İçi Para akışını quantum-hazır yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 429, "no": "429", "cat": "Ekonomi Simülasyonu", "name": "Composable Harcama Simülasyonu Stratejisi", "desc": "test bağlamında Harcama Simülasyonu için composable bir stratejisi. Oyuncuların belirli eşyalara veya hizmetlere ne kadar harcayacağını tahmin eder. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["ekonomi", "harcama", "tüketim", "test", "composable", "pro"], "badge1": "Pro", "content" ındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 432, "no": "432", "cat": "Savaş Dengesi", "name": "Federe Zırh Azaltma Hesaplama Kılavuzu", "desc": "CI/CD bağlamında Zırh Azaltma Hesaplama için federe bir kılavuzu. Zırhın gelen hasarı yüzde olarak ne kadar azalttığını belirleyen formül. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["savaş", "zırh", "azaltma", "CI/CD", "federe", "başlangıç"], "badge1": "Başlangıç", "content": "## Zırh Hasar Azaltma\n1.  **Azaltma Yüzdesi:** `Azaltma % = Zırh / (Zırh + Sabit Değer)`\n2.  **Uygulama:** `Alınan Hasar = Gelen Hasar * (1 - Azaltma %)`\n3.  **Doygunluk:** Zırhın çok güçlü hale gelmesini engelle.\nZırh değerini kullanarak gelen hasarın ne kadarının azaltılacağını hesaplayın. Sabit değer denge için kritiktir.\n\n## Uygulama Senaryosu (Federe)\n\nBu kılavuzu, CI/CD alanında Zırh Azaltma Hesaplama problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zırh Azaltma Hesaplama akışını federe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 433, "no": "433", "cat": "Savaş Dengesi", "name": "Polyglot Kritik Vuruş Oranı Algoritması", "desc": "şablon bağlamında Kritik Vuruş Oranı için polyglot bir algoritması. Bir saldırının kritik vuruş yapma olasılığını ve verdiği ekstra hasarı belirler. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["savaş", "kritik", "şans", "şablon", "polyglot", "pro"], "badge1": "Pro", "content": "## Kritik Vuruş Mekaniği\n1.  **Kritik Şans:** `Kritik Şans % = Temel Şans + Bonus Şans`\n2.  **Kritik Hasar:** `Kritik Hasar = Normal Hasar * Kritik Çarpan`\n3.  **Rastgelelik:** `Random(0-100) < Kritik Şans %` ise kritik vuruş.\nOyuncunun kritik vuruş yapma olasılığını ve kritik vuruşun vereceği ekstra hasarı bu formülle yönetin.\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** Pro seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Kritik Vuruş Oranı senaryoları\n- **Avantajları:** Bu algoritması sayesinde Kritik Vuruş Oranı işlemleri daha polyglot hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Kritik Vuruş Oranı ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** savaş, kritik, şans\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 434, "no": "434", "cat": "Savaş Dengesi", "name": "Type-Safe Can Yenileme Hızı Önerisi", "desc": "monitoring bağlamında Can Yenileme Hızı için type-safe bir önerisi. Bir karakterin zamanla ne kadar can puanı yenileyeceğini hesaplar. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["savaş", "can", "yenileme", "monitoring", "type-safe", "uzman"], "badge1": "Uzman", "content": "## Can Yenileme Hızı Formülü\n1.  **Temel Yenileme:** `Yenileme = Temel Yenileme Değeri + Bonus`\n2.  **Periyot:** `Saniye Başına Yenileme = Yenileme / Yenileme Sıklığı`\n3.  **Maksimum Can:** Yen eme Süresi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Beceri Bekleme Süresi akışını container-native yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 436, "no": "436", "cat": "Yetenek Mekanikleri", "name": "Production-Grade Enerji/Mana Maliyeti Optimizasyonu", "desc": "mühendislik bağlamında Enerji/Mana Maliyeti için production-grade bir optimizasyonu. Bir yeteneği kullanmak için harcanması gereken enerji veya mana miktarını belirler. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["yetenek", "mana", "enerji", "mühendislik", "production-grade", "başlangıç"], "badge1": "Başlangıç", "content": "## Yetenek Maliyet Formülü\n1.  **Temel Maliyet:** `Maliyet = Yeteneğin Temel Maliyeti`\n2.  **İndirim:** `Nihai Maliyet = Maliyet * (1 - Maliyet İndirimi %)`\n3.  **Maksimum:** Yeteneğin, oyuncunun mevcut kaynağını aşmamasını sağla.\nYeteneklerin temel maliyetlerini ve oyuncunun sahip olduğu maliyet indirimlerini kullanarak nihai harcama miktarını hesaplayın.\n\n## Genişletilmiş Notlar (Production-Grade)\n\n- **Hedef Kitle:** Başlangıç seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Enerji/Mana Maliyeti senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde Enerji/Mana Maliyeti işlemleri daha production-grade hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\ // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'balancevault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
