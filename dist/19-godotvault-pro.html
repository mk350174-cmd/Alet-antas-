<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>

<body>

<header class="hero">
  <div class="hero-corner">G</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Godot<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Godot Engine ve GDScript entegrasyonları için yapay zeka destekli kod parçacıkları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>40</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Godot ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">40</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

const ITEMS = [{"id":1,"cat":"GDScript","name":"Pixelorama","desc":"Unleash your creativity with Pixelorama, a powerful and accessible open-source pixel art multitool. Whether you want to ","tags":["animation","art","draw","game-development","★9663"],"badge1":"GDScript","badge2":"★ 9.663","content":"Orama-Interactive/Pixelorama\n\nUnleash your creativity with Pixelorama, a powerful and accessible open-source pixel art multitool. Whether you want to create sprites, tiles, animations, or just express yourself in the language of pixel art, this software will realize your pixel-perfect dreams with a vast toolbox of features. Available on Windows, Linux, macOS and the Web!\n\n⭐ Yıldız: 9663\n🍴 Fork: 505\n📅 Güncelleme: 2026-06-03\n🔗 https://github.com/Orama-Interactive/Pixelorama","meta":{"Yıldız":9663,"Dil":"GDScript","Fork":505},"source":{"url":"https://github.com/Orama-Interactive/Pixelorama","license":"MIT","author":"Orama-Interactive"},"no":"001"},{"id":2,"cat":"GDScript","name":"dialogic","desc":"💬 Create Dialogs, Visual Novels, RPGs, and manage Characters with Godot to create your Game!","tags":["addon","dialogic","dialogue","game","★5652"],"badge1":"GDScript","badge2":"★ 5.652","content":"## Dialogic: Godot İçin Diyalog Sistemi Eklentisi\n\nDialogic, Godot'ta görsel novel ve RPG diyalog sistemleri oluşturmak için kullanılan gelişmiş eklentidir.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/dialogic-godot/dialogic\n# Eklentiyi addons/ dizinine kopyala\n# Proje > Eklentiler > Dialogic aktif et\n```\n\n**Temel kullanım (GDScript):**\n```gdscript\n# Diyalog başlat\nDialogic.start('dialogue_file')\n# Veya node olarak\nvar dialog = Dialogic.new_timeline('main_story')\nadd_child(dialog)\n\n# Sinyaller\nDialogic.timeline_ended.connect(_on_dialogue_ended)\nDialogic.signal_event.connect(_on_signal_received)\n```\n\n**Özellikler:** Görsel timeline editörü, şartlı dallar, değişken sistemi, çoklu dil desteği, karakter portreleri\n\n**Prompt:** \"Dialogic ile 3 karakterli, şarta bağlı sonuç değiştiren ve oyuncunun seçimini kaydeden RPG diyalog sistemi kur.\"","meta":{"Yıldız":5652,"Dil":"GDScript","Fork":329},"source":{"url":"https://github.com/dialogic-godot/dialogic","license":"MIT","author":"dialogic-godot"},"no":"002"},{"id":3,"cat":"GDScript","name":"godot_dialogue_manager","desc":"A powerful nonlinear dialogue system for Godot","tags":["addon","csharp","dialogue","editor","★3612"],"badge1":"GDScript","badge2":"★ 3.612","content":"## Godot Dialogue Manager: Ink Tabanlı Diyalog\n\nInk scripting dili ile entegre çalışan güçlü Godot 4 diyalog yönetim eklentisi.\n\n**Kurulum:**\n```gdscript\n# Plugin Asset Library'den yükle\n# Dialogue Manager > Yeni diyalog dosyası oluştur (.dialogue)\n```\n\n**Dialogue dosya syntax:**\n```\n~ start\nNPC: Seni bekliyordum.\n- [Evet, geldim.]\n    Kahraman: İşte buradayım.\n    => quest_briefing\n- [Hayır, gelmedim.]\n    Kahraman: Ben kimim?\n    => identity_crisis\n\n~ quest_briefing\nNPC: Ejderhayı öldürmeni istiyorum.\n=> END\n```\n\n**GDScript entegrasyonu:**\n```gdscript\nvar dialogue = DialogueManager.get_next_dialogue_line(resource, 'start')\nawait DialogueManager.dialogue_ended\n```\n\n**Prompt:** \"Dialogue Manager ile ana hikayeye bağlanan 5 yan görev diyalog sistemi kur; görev durumu flag'leri ile dallanma.\"","meta":{"Yıldız":3612,"Dil":"GDScript","Fork":256},"source":{"url":"https://github.com/nathanhoad/godot_dialogue_manager","license":"MIT","author":"nathanhoad"},"no":"003"},{"id":4,"cat":"GDScript","name":"beehave","desc":"🐝 behavior tree AI for Godot Engine","tags":["ai","behavior-tree","game-development","gamedev","★3114"],"badge1":"GDScript","badge2":"★ 3.114","content":"## Beehave: Godot Behavior Tree Eklentisi\n\nBeehave, Godot için görsel ve kod tabanlı AI davranış ağacı eklentisidir. NPC AI'ını modüler, anlaşılır şekilde yapılandırır.\n\n**Kurulum:**\n```\nAsset Library > Beehave > İndir ve aktifleştir\n```\n\n**Temel yapı:**\n```gdscript\n# Behavior Tree Node'ları:\n# Selector: Birisi başarılı olana kadar dener\n# Sequence: Hepsi başarılı olmak zorunda\n# Leaf: Gerçek aksiyon/koşul\n\nclass_name AttackAction extends BTAction:\n    func tick(actor, blackboard):\n        actor.attack()\n        return SUCCESS\n\nclass_name IsPlayerNearCondition extends BTCondition:\n    func tick(actor, blackboard):\n        var player = actor.get_node('Player')\n        if actor.global_position.distance_to(player.global_position) < 200:\n            return SUCCESS\n        return FAILURE\n```\n\n**Prompt:** \"Beehave ile düşman AI davranış ağacı kur: devriye, oyuncuyu fark etme, kovalama, saldırı ve geri çekilme state'leri.\"","meta":{"Yıldız":3114,"Dil":"GDScript","Fork":163},"source":{"url":"https://github.com/bitbrain/beehave","license":"MIT","author":"bitbrain"},"no":"004"},{"id":5,"cat":"GDScript","name":"godot-open-rpg","desc":"Learn to create turn-based combat with this Open Source RPG demo ⚔","tags":["combat","game","game-development","gamedev","★2800"],"badge1":"GDScript","badge2":"★ 2.800","content":"## Godot Open RPG: Açık Kaynak RPG Şablon Projesi\n\nTopdown RPG oyun mekanikleri için tam çalışan referans implementasyon — Godot 4 ile.\n\n**Özellikler:**\n- Izometric/topdown hareket sistemi\n- Turn-based savaş sistemi\n- Envanter ve ekipman yönetimi\n- Diyalog ve görev sistemi\n- Kaydetme/yükleme sistemi\n\n**Başlangıç:**\n```bash\ngit clone https://github.com/GDQuest/godot-open-rpg\ngodot4 project.godot\n```\n\n**Öğrenme yolu:**\n1. `battle_system/` → savaş mekanikleri\n2. `quest/` → görev takip sistemi\n3. `inventory/` → item yönetimi\n4. `save_system/` → JSON serialization\n\n**Prompt:** \"Godot Open RPG'nin savaş sistemine yeni bir silah tipi (yay) ekle: menzil hesabı, ok animasyonu ve çoklu hedef mechanic.\"","meta":{"Yıldız":2800,"Dil":"GDScript","Fork":339},"source":{"url":"https://github.com/gdquest-demos/godot-open-rpg","license":"MIT","author":"gdquest-demos"},"no":"005"},{"id":6,"cat":"GDScript","name":"learn-gdscript","desc":"Learn Godot's GDScript programming language from zero, right in your browser, for free.","tags":["app","education","game-development","gdscript","★2680"],"badge1":"GDScript","badge2":"★ 2.680","content":"## Learn GDScript: Etkileşimli GDScript Öğrenme Platformu\n\nGDScript sözdizimini tarayıcıda etkileşimli olarak öğreten araç — Godot kurulumu gerektirmez.\n\n**İçerik kategorileri:**\n1. Değişkenler ve temel tipler (int, float, String, bool)\n2. Kontrol akışı (if/elif/else, for, while, match)\n3. Fonksiyonlar ve scope\n4. Node'lara erişim (`$NodeName`, `get_node()`)\n5. Sinyaller ve bağlantılar\n6. Diziler ve Dictionary\n7. Nesne yönelimli: class, extends, super\n\n**GDScript temel kalıplar:**\n```gdscript\n# Onready değişken (node erişimi)\n@onready var player = $Player\n\n# Sinyal tanımlama ve emit\nsignal item_collected(item_name)\nemit_signal(item_collected, 'sword')\n\n# Tween ile animasyon\nvar tween = create_tween()\ntween.tween_property($Sprite2D, 'scale', Vector2(2,2), 0.3)\n```\n\n**Prompt:** \"GDScript'te polymorphism kullanarak farklı düşman tipleri için temel sınıf ve alt sınıflar oluştur; ortak attack() ve move() metodları.\"","meta":{"Yıldız":2680,"Dil":"GDScript","Fork":225},"source":{"url":"https://github.com/GDQuest/learn-gdscript","license":"NOASSERTION","author":"GDQuest"},"no":"006"},{"id":7,"cat":"GDScript","name":"GodSVG","desc":"A vector graphics application for structured SVG editing, available on all major desktop platforms and on web. Currently","tags":["gdscript","godot","godot-engine","godotengine","★2516"],"badge1":"GDScript","badge2":"★ 2.516","content":"## GodSVG: Godot İçin SVG Editörü\n\nGodot motoru üzerine inşa edilmiş, tamamen Godot ile yazılmış SVG düzenleme aracı.\n\n**Kullanım alanları:**\n- Oyun için ikon ve UI asset üretimi\n- Vektör grafik düzenleme (Godot içinden)\n- SVG animasyonu için path düzenleme\n\n**Başlangıç:**\n```bash\ngit clone https://github.com/MewPurPur/GodSVG\ngodot4 project.godot\n```\n\n**SVG'yi Godot projesinde kullanma:**\n```gdscript\n# SVG dosyasını yükle ve kullan\nvar svg_texture = load('res://assets/icon.svg') as Texture2D\n$Sprite2D.texture = svg_texture\n\n# SVG boyutunu çalışma zamanında değiştir\n# Import settings > Scale: 2.0 (Retina için)\n```\n\n**Prompt:** \"Godot projesinde SVG ikonları tile atlas olarak organize et; farklı çözünürlükler için import ayarları ve @export ile tema değiştirilebilir ikon sistemi.\"","meta":{"Yıldız":2516,"Dil":"GDScript","Fork":116},"source":{"url":"https://github.com/MewPurPur/GodSVG","license":"MIT","author":"MewPurPur"},"no":"007"},{"id":8,"cat":"GDScript","name":"godot_heightmap_plugin","desc":"HeightMap terrain for Godot implemented in GDScript","tags":["game-development","godot-engine","heightmap","terrain","★2188"],"badge1":"GDScript","badge2":"★ 2.188","content":"## Godot HeightMap Plugin: 3D Arazi Editörü\n\nGodot'ta heightmap tabanlı 3D arazi oluşturmak için görsel editör eklentisi.\n\n**Kurulum:**\n```\nAsset Library > HeightMap Terrain > İndir\naddons/zylann.hterrain/plugin.gd\nProje > Eklentiler > aktifleştir\n```\n\n**Arazi oluşturma:**\n1. `HTerrain` node ekle\n2. Data klasörü oluştur (heightmap, textures saklanır)\n3. Brushlar ile yükseklik boyama\n4. Texture painting: zemin, kaya, çimen katmanları\n5. Detay nesneler: ot, taş otomatik dağıt\n\n**GDScript API:**\n```gdscript\nvar terrain = $HTerrain\n# Yükseklik değeri al\nvar height = terrain.get_height_at(100, 200)\n# Normal vektörü al\nvar normal = terrain.get_normal_at(100, 200)\n```\n\n**Prompt:** \"HeightMap Plugin ile prosedürel arazi üret: noise tabanlı heightmap, otomatik biome texture painting ve çimen dağılımı.\"","meta":{"Yıldız":2188,"Dil":"GDScript","Fork":181},"source":{"url":"https://github.com/Zylann/godot_heightmap_plugin","license":"NOASSERTION","author":"Zylann"},"no":"008"},{"id":9,"cat":"GDScript","name":"godot-3-demos","desc":"Dozens of free and open source demos for the Godot game engine, version 3. Head to the link below for newer demos for Go","tags":["2d-game","2d-game-engine","gdscript","godot","★1949"],"badge1":"GDScript","badge2":"★ 1.949","content":"## GDQuest Godot 3 Demo Koleksiyonu\n\n2000'e yakın yıldıza sahip, GDQuest'in Godot 3 için hazırladığı resmi açık kaynak demo koleksiyonu. Godot 4'e geçerken referans olarak da kullanılabilir.\n\n**İçerik kategorileri:**\n- 2D: platformer, top-down, metroidvania\n- 3D: birinci şahıs, üçüncü şahıs, arazi\n- Fizik: yumuşak cisimler, kısıtlamalar\n- Shader: glow, outline, dissolve\n- UI: inventory, skill tree, minimap\n\n**Godot 3 → 4 migrasyon notları:**\n```gdscript\n# Godot 3\nkinematic_body.move_and_slide(velocity, Vector3.UP)\n# Godot 4\ncharacter_body_3d.velocity = velocity\ncharacter_body_3d.move_and_slide()\n\n# Godot 3: yield\nyield(get_tree().create_timer(1.0), 'timeout')\n# Godot 4: await\nawait get_tree().create_timer(1.0).timeout\n```\n\n**Prompt:** \"Bu Godot 3 demo projesini Godot 4'e port et; migrasyon rehberini izleyerek KinematicBody, yield ve sinyal syntax değişikliklerini uygula.\"","meta":{"Yıldız":1949,"Dil":"GDScript","Fork":963},"source":{"url":"https://github.com/gdquest-demos/godot-3-demos","license":"MIT","author":"gdquest-demos"},"no":"009"},{"id":10,"cat":"GDScript","name":"godot-4-procedural-generation","desc":"Procedural generation algorithms and demos for the Godot game engine","tags":["gdscript","godot-engine","godot-procedural","pcg","★1852"],"badge1":"GDScript","badge2":"★ 1.852","content":"## Prosedürel İçerik Üretimi: Godot 4\n\nNoise fonksiyonları, L-sistemleri ve grammar tabanlı algoritmalarla Godot 4'te prosedürel içerik üretimi.\n\n**FastNoiseLite ile arazi:**\n```gdscript\nvar noise = FastNoiseLite.new()\nnoise.noise_type = FastNoiseLite.TYPE_SIMPLEX\nnoise.frequency = 0.01\nnoise.fractal_octaves = 5\n\nfunc generate_tile(x, y) -> String:\n    var height = noise.get_noise_2d(x, y)\n    if height > 0.5: return 'mountain'\n    elif height > 0.1: return 'grass'\n    elif height > -0.1: return 'beach'\n    else: return 'water'\n```\n\n**Dungeon generation (BSP):**\n```gdscript\nfunc split_room(rect: Rect2, depth: int) -> Array:\n    if depth == 0 or rect.size.x < 10 or rect.size.y < 10:\n        return [rect]\n    var split_h = randf() > 0.5\n    # Yatay veya dikey böl\n    ...\n```\n\n**Prompt:** \"Godot 4'te Wave Function Collapse algoritması ile tileset tabanlı prosedürel level generator yaz.\"","meta":{"Yıldız":1852,"Dil":"GDScript","Fork":99},"source":{"url":"https://github.com/gdquest-demos/godot-4-procedural-generation","license":"NOASSERTION","author":"gdquest-demos"},"no":"010"},{"id":11,"cat":"GDScript","name":"Cogito","desc":"Immersive Sim Template Project for GODOT 4","tags":["first-person","fps","game-development","gamedev","★1707"],"badge1":"GDScript","badge2":"★ 1.707","content":"## COGITO: Godot 4 Immersive Sim Framework\n\nDeus Ex ve Thief tarzı immersive sim oyunları için Godot 4 framework'ü.\n\n**İçerdiği sistemler:**\n- Fizik tabanlı etkileşim (grab, carry, throw)\n- İnventory ve item management\n- Crafting sistemi\n- Stamina, sağlık, hunger mekanikleri\n- Ses propagation ve dikkat sistemi\n- Kapı, kilit, anahtar sistemi\n\n**Başlangıç:**\n```bash\ngit clone https://github.com/Phazorknight/Cogito\ngodot4 project.godot\n# Örnek sahneyi çalıştır: scenes/cogito_scene_template.tscn\n```\n\n**Özelleştirme:**\n```gdscript\n# Kendi item'ını ekle\nclass_name MedKit extends ConsumableItem:\n    @export var heal_amount: float = 25.0\n    \n    func use(player):\n        player.health += heal_amount\n        queue_free()\n```\n\n**Prompt:** \"COGITO framework üzerine stealth mechanic ekle: shadow detection, noise radius ve düşman alert sistemi.\"","meta":{"Yıldız":1707,"Dil":"GDScript","Fork":197},"source":{"url":"https://github.com/Phazorknight/Cogito","license":"MIT","author":"Phazorknight"},"no":"011"},{"id":12,"cat":"GDScript","name":"Godot-GameTemplate","desc":"Template for top-down shooter, with solutions for tough problems.","tags":["async","gdscript","godot","loading","★1588"],"badge1":"GDScript","badge2":"★ 1.588","content":"## Godot 4 Game Template: Proje Başlangıç Şablonu\n\nAyarlar, kayıt, ses, dil, UI geçişleri içeren hazır proje şablonu.\n\n**Şablonun içerdiği sistemler:**\n- Ana menü ve pause screen\n- Settings (ses, tam ekran, çözünürlük, dil)\n- Save/Load sistemi (JSON tabanlı)\n- Scene transition (fade, slide)\n- Uluslararasılaştırma (i18n) desteği\n\n**Kullanım:**\n```bash\ngit clone https://github.com/crystal-bit/godot-game-template\n# Kendi oyun sahneni GameState.gd'ye kaydet\n# AUTOLOAD: GameState, AudioManager, TransitionManager\n```\n\n**Kayıt sistemi entegrasyonu:**\n```gdscript\n# Kaydet\nGameState.save_game()\n# Yükle\nGameState.load_game()\n# Kayıt verisine eriş\nvar level = GameState.save_data.current_level\n```\n\n**Prompt:** \"Godot Game Template'e achievement sistemi ekle: JSON'da achievement tanımları, kilitleme koşulları ve bildirim popup'ı.\"","meta":{"Yıldız":1588,"Dil":"GDScript","Fork":103},"source":{"url":"https://github.com/nezvers/Godot-GameTemplate","license":"MIT","author":"nezvers"},"no":"012"},{"id":13,"cat":"Python","name":"godot-gdscript-toolkit","desc":"Independent set of GDScript tools - parser, linter, formatter, and more","tags":["formatter","gdscript","godot","godot-engine","★1549"],"badge1":"Python","badge2":"★ 1.549","content":"## GDScript Toolkit: Lint ve Format Araçları\n\nGDScript için gdtoolkit — kod formatter (gdformat) ve linter (gdlint) içerir.\n\n**Kurulum:**\n```bash\npip install gdtoolkit\n# veya\npipx install gdtoolkit\n```\n\n**Kullanım:**\n```bash\n# Format tüm GDScript dosyaları\ngdformat .\n# Tek dosya\ngdformat player.gd\n# Sadece kontrol et (değiştirme)\ngdformat --check player.gd\n\n# Lint\ngdlint player.gd\n# Özelleştir .gdlintrc dosyasıyla\n```\n\n**.gdlintrc örneği:**\n```ini\n[gdlint]\ndisable = class-definitions-order\nmax-line-length = 120\n```\n\n**CI/CD entegrasyonu:**\n```yaml\n# .github/workflows/lint.yml\n- run: pip install gdtoolkit && gdlint **/*.gd\n```\n\n**Prompt:** \"GDScript Toolkit ile Godot projesine pre-commit hook ekle; commit öncesi otomatik gdformat ve gdlint çalıştır.\"","meta":{"Yıldız":1549,"Dil":"Python","Fork":105},"source":{"url":"https://github.com/Scony/godot-gdscript-toolkit","license":"MIT","author":"Scony"},"no":"013"},{"id":14,"cat":"GDScript","name":"godot-steering-ai-framework","desc":"A complete framework for Godot to create beautiful and complex AI motion. Works both in 2D and in 3D.","tags":["agents","ai","algorithms","artificial-intelligence","★1509"],"badge1":"GDScript","badge2":"★ 1.509","content":"## Godot Steering AI Framework: Ajan Navigasyonu\n\nReynolds steering behaviors ile akıcı AI hareketi sağlayan Godot framework'ü.\n\n**Kurulum:**\n```\ngit clone https://github.com/GDQuest/godot-steering-ai-framework\naddons/ klasörüne kopyala\n```\n\n**Temel steering davranışları:**\n```gdscript\n# Seek (hedefe git)\nvar seek = GSTSeek.new()\nseek.target = player_proxy\n\n# Flee (hedeften kaç)\nvar flee = GSTFlee.new()\nflee.target = threat_proxy\n\n# Wander (rastgele dolaş)\nvar wander = GSTWander.new()\nwander.wander_rate = 0.5\n\n# Combine\nvar blender = GSTBlend.new()\nblender.add(seek, 1.0)\nblender.add(flee_walls, 1.5)\n```\n\n**Prompt:** \"Steering AI ile 50 boid flocking simülasyonu yaz: separation, alignment ve cohesion davranışları; parametre UI ile gerçek zamanlı ayarlama.\"","meta":{"Yıldız":1509,"Dil":"GDScript","Fork":91},"source":{"url":"https://github.com/GDQuest/godot-steering-ai-framework","license":"MIT","author":"GDQuest"},"no":"014"},{"id":15,"cat":"GDScript","name":"PankuConsole","desc":"Feature-packed real-time debugging toolkit for Godot Engine.","tags":["game-console","game-development","gamedev","gdscript","★1411"],"badge1":"GDScript","badge2":"★ 1.411","content":"## PankuConsole: Godot 4 Geliştirici Konsolu\n\nOyun içi hata ayıklama konsolu — komut çalıştırma, loglama ve değişken izleme.\n\n**Kurulum:**\n```\nAsset Library > PankuConsole veya GitHub'dan ekle\nAddons'dan etkinleştir\nPankuConsole autoload olarak eklenir\n```\n\n**Özel komut ekleme:**\n```gdscript\nfunc _ready():\n    Console.add_command('give_gold', self, '_give_gold')\n    Console.add_command('teleport', self, '_teleport', ['x', 'y'])\n\nfunc _give_gold(args):\n    var amount = int(args[0])\n    player.gold += amount\n    Console.log_output(str(amount) + ' altın verildi.')\n\nfunc _teleport(args):\n    player.position = Vector2(float(args[0]), float(args[1]))\n```\n\n**Kullanım:** Oyun içinde tilde (~) tuşuna basarak konsolu aç.\n\n**Prompt:** \"PankuConsole'a oyun state debug komutları ekle: tüm aktif NPC'leri listele, belirli bir sahnete ışınlan, oyun hızını değiştir.\"","meta":{"Yıldız":1411,"Dil":"GDScript","Fork":51},"source":{"url":"https://github.com/Ark2000/PankuConsole","license":"MIT","author":"Ark2000"},"no":"015"},{"id":16,"cat":"GDScript","name":"the-mirror","desc":"V1, Mirror Classic. V2, Mirror Engine: Join Discord for access.","tags":["game-development","gaming","gdscript","godot","★1296"],"badge1":"GDScript","badge2":"★ 1.296","content":"## The Mirror: Godot Tabanlı Metaverse Oyun Motoru\n\nThe Mirror, Godot 4 üzerine inşa edilmiş ve gerçek zamanlı çok oyunculu deneyim oluşturmak için tasarlanmış açık kaynak bir oyun geliştirme platformudur.\n\n**Temel özellikler:**\n- Gerçek zamanlı çok kullanıcılı ortam düzenleme\n- Roblox benzeri oyun deneyimi oluşturma\n- GDScript tabanlı gameplay scripting\n- Karakter ve varlık kütüphanesi\n\n**Kurulum:**\n```bash\ngit clone https://github.com/mirror-engine/the-mirror\ngodot4 --editor project.godot\n```\n\n**Kullanım senaryoları:**\n- Eğitim simülasyonları\n- Sanal etkinlikler ve toplantılar\n- Çok oyunculu oyun prototipi\n- Metaverse deneyim geliştirme\n\n**Prompt:** \"The Mirror'da birden fazla kullanıcının aynı anda düzenleyebildiği etkileşimli bir eğitim odası oluştur; nesne kilit sistemi ve senkronize değişkenler ile çakışma önle.\"","meta":{"Yıldız":1296,"Dil":"GDScript","Fork":129},"source":{"url":"https://github.com/mirror-engine/the-mirror","license":"NOASSERTION","author":"mirror-engine"},"no":"016"},{"id":17,"cat":"GDScript","name":"godot_spatial_gardener","desc":"A Godot plugin for painting plants and props on arbitrary 3D surfaces implemented in GDScript","tags":["foliage","godot-engine","painting","surface","★1272"],"badge1":"GDScript","badge2":"★ 1.272","content":"## Godot Spatial Gardener: 3D Bitki ve Nesne Dağıtımı\n\nAraziye doğal bitki, ot, taş ve dekorasyon dağıtımı için görsel fırça aracı.\n\n**Başlangıç:**\n```\nGitHub'dan eklentiyi indir\naddons/spatial_gardener/ ekle ve aktifleştir\n```\n\n**Workflow:**\n1. `Gardener` node ekle sahneye\n2. Terrain node'unu referans göster\n3. Yeni planting type ekle (çimen, ağaç, taş)\n4. Her tip için mesh, maksimum örnek sayısı, çakışma ayarla\n5. `Add instances` fırçasıyla boyar gibi çiz\n6. `Scale variance`, `rotation` ile doğallık ekle\n\n**Performans:** MultiMeshInstance3D kullanır → binlerce nesne GPU instancing ile çizilir.\n\n**Prompt:** \"Spatial Gardener ile ormanlık arazi oluştur: 3 farklı ağaç tipi, ot örtüsü ve kaya grupları; LOD ile uzaktan basitleştirme.\"","meta":{"Yıldız":1272,"Dil":"GDScript","Fork":62},"source":{"url":"https://github.com/dreadpon/godot_spatial_gardener","license":"MIT","author":"dreadpon"},"no":"017"},{"id":18,"cat":"GDScript","name":"godot-make-pro-2d-games","desc":"A-RPG demo made with Godot, MIT-licensed, from our Godot course","tags":["game","game-development","gdscript","godot","★1211"],"badge1":"GDScript","badge2":"★ 1.211","content":"## Godot 2D Oyun Geliştirme: Profesyonel Teknikler\n\nGDQuest'in Godot 4 ile 2D oyun geliştirme eğitim serisi kaynak kodu.\n\n**İçerdiği projeler:**\n- Platformer hareket sistemi (coyote time, jump buffering)\n- Topdown oyun mekanikleri\n- 2D combat sistemi\n- UI/UX tasarım kalıpları\n- Shader efektleri (outline, flash)\n\n**Platformer coyote time:**\n```gdscript\nvar coyote_timer: float = 0.0\nconst COYOTE_TIME = 0.15\n\nfunc _physics_process(delta):\n    if is_on_floor():\n        coyote_timer = COYOTE_TIME\n    else:\n        coyote_timer -= delta\n    \n    if Input.is_action_just_pressed('jump'):\n        if coyote_timer > 0 or is_on_floor():\n            velocity.y = JUMP_VELOCITY\n            coyote_timer = 0\n```\n\n**Prompt:** \"Godot 4 platformer için jump buffering (coyote time + input buffer) ve wall jump mekanikleri ekle; her parametreyi @export ile inspector'dan ayarlanabilir yap.\"","meta":{"Yıldız":1211,"Dil":"GDScript","Fork":126},"source":{"url":"https://github.com/gdquest-demos/godot-make-pro-2d-games","license":"MIT","author":"gdquest-demos"},"no":"018"},{"id":19,"cat":"C#","name":"godot-3d-mannequin","desc":"An Open Source 3d character and character controller for the Godot game engine","tags":["3d-character","character-controller","games","gdscript","★1100"],"badge1":"C#","badge2":"★ 1.100","content":"## Godot 3D Mannequin: Karakter Animasyon Sistemi\n\nGodot 4 için rigged 3D karakter ve animasyon yönetim sistemi referans projesi.\n\n**Özellikler:**\n- Blendspace ile hareket interpolasyonu\n- IK (Inverse Kinematics) desteği\n- Silah ve eşya tutma socket'leri\n- Animasyon layer'leri (alt vücut hareket + üst vücut atış)\n\n**AnimationTree kurulumu:**\n```gdscript\n@onready var anim_tree = $AnimationTree\n@onready var anim_state = anim_tree.get('parameters/playback')\n\nfunc update_animation(velocity: Vector2, is_jumping: bool):\n    anim_tree.set('parameters/move_blend/blend_position', velocity)\n    if is_jumping:\n        anim_state.travel('jump')\n    else:\n        anim_state.travel('ground')\n```\n\n**Prompt:** \"Godot 3D Mannequin'e ADS (Aim Down Sight) mekaniği ekle: kamera zoom, üst vücut aim IK ve ateş animasyon layer'ı.\"","meta":{"Yıldız":1100,"Dil":"C#","Fork":85},"source":{"url":"https://github.com/gdquest-demos/godot-3d-mannequin","license":"NOASSERTION","author":"gdquest-demos"},"no":"019"},{"id":20,"cat":"GDScript","name":"gdUnit4","desc":"Embedded unit testing framework for Godot 4 supporting GDScript and C#. Features test-driven development, embedded test ","tags":["game-development","gdscript","gdunit4","godot4","★1090"],"badge1":"GDScript","badge2":"★ 1.090","content":"## gdUnit4: Godot 4 Test Framework\n\nGodot 4 için kapsamlı unit ve entegrasyon test framework'ü.\n\n**Kurulum:**\n```bash\n# plugin.cfg'yi addons/gdUnit4/ altına ekle\n# Proje > Eklentiler > gdUnit4 aktif et\n```\n\n**Test yazma:**\n```gdscript\nclass_name InventoryTest extends GdUnitTestSuite\n\nvar inventory: Inventory\n\nfunc before_test():\n    inventory = Inventory.new()\n    inventory.max_slots = 10\n\nfunc test_add_item():\n    var sword = Item.new()\n    sword.id = 'sword'\n    var result = inventory.add_item(sword)\n    assert_bool(result).is_true()\n    assert_int(inventory.item_count()).is_equal(1)\n\nfunc test_full_inventory():\n    for i in 10:\n        inventory.add_item(Item.new())\n    var extra = inventory.add_item(Item.new())\n    assert_bool(extra).is_false()\n```\n\n**Çalıştırma:**\n```bash\ngodot4 --headless -s addons/gdUnit4/bin/GdUnitCmdTool.gd -- -a res://test/\n```\n\n**Prompt:** \"gdUnit4 ile karmaşık bir oyun sistemini (crafting, quest) test et; mock nesneler ve async test kullanarak entegrasyon testleri yaz.\"","meta":{"Yıldız":1090,"Dil":"GDScript","Fork":65},"source":{"url":"https://github.com/godot-gdunit-labs/gdUnit4","license":"MIT","author":"godot-gdunit-labs"},"no":"020"},{"id":21,"cat":"GDScript","name":"godot_input_helper","desc":"A simple input helper for the Godot Engine","tags":["addon","csharp","gdscript","godot","★1071"],"badge1":"GDScript","badge2":"★ 1.071","content":"## Godot Input Helper: Giriş Yönetimi Kolaylaştırıcı\n\nGirdi cihazı tespiti, action remapping ve controller/klavye uyumluluğu için yardımcı kütüphane.\n\n**Özellikler:**\n- Otomatik girdi cihazı tespiti (klavye, gamepad)\n- Çalışma zamanında action remapping\n- Hint metni güncelleme (\"E tuşuna bas\" ↔ \"A butonuna bas\")\n\n**Kullanım:**\n```gdscript\n# Cihaz tipini al\nvar device_type = InputHelper.device_type  # 'keyboard', 'xbox', 'ps', 'switch'\n\n# Action için buton ikonu\nvar icon = InputHelper.get_action_icon('jump')\n$JumpHint.texture = icon\n\n# Remapping\nInputHelper.start_remapping('jump')\nawait InputHelper.remapping_completed\n```\n\n**Prompt:** \"Godot Input Helper ile ayarlar ekranı yap: her aksiyon için remap butonu, mevcut atamayı göster, çakışma uyarısı ve varsayılanlara sıfırla.\"","meta":{"Yıldız":1071,"Dil":"GDScript","Fork":42},"source":{"url":"https://github.com/nathanhoad/godot_input_helper","license":"MIT","author":"nathanhoad"},"no":"021"},{"id":22,"cat":"GDScript","name":"godot-2d-space-game","desc":"A 2D space exploration and mining game made with Godot and our AI framework","tags":["ai","artificial-intelligence","game-development","gdscript","★1066"],"badge1":"GDScript","badge2":"★ 1.066","content":"## Godot 2D Uzay Oyunu: Starter Projesi\n\nTop-down uzay nişancı oyunu mekaniği referans projesi — Godot 4.\n\n**İçerdiği sistemler:**\n- Spacecraft hareket (acceleration + drag)\n- Silah sistemi: farklı mermi tipleri\n- Düşman AI: patrol, chase, attack\n- Asteroid spawner ve fizik\n\n**Uzay hareketi:**\n```gdscript\nextends CharacterBody2D\n\nconst THRUST = 500.0\nconst ROTATION_SPEED = 3.0\nconst DRAG = 0.98\n\nfunc _physics_process(delta):\n    if Input.is_action_pressed('thrust'):\n        var direction = Vector2.UP.rotated(rotation)\n        velocity += direction * THRUST * delta\n    velocity *= DRAG  # Uzayda sürtünme azalt\n    rotation += Input.get_axis('rotate_left', 'rotate_right') * ROTATION_SPEED * delta\n    move_and_slide()\n```\n\n**Prompt:** \"Bu uzay oyununa shield mechanic ekle: hasar absorbe eden kalkan, shield charge bar, kalkan yenilenme delay ve kalkan çarpışma efekti.\"","meta":{"Yıldız":1066,"Dil":"GDScript","Fork":134},"source":{"url":"https://github.com/gdquest-demos/godot-2d-space-game","license":"NOASSERTION","author":"gdquest-demos"},"no":"022"},{"id":23,"cat":"GDScript","name":"godot-start","desc":"godot start is godot engine utils and sample","tags":["gdscript","godot","godot-course","godot-demo","★1051"],"badge1":"GDScript","badge2":"★ 1.051","content":"## godot-start: Godot Yardımcı Araçlar ve Örnekler\n\nGodot oyun geliştirmeyi hızlandıran yardımcı util scripter ve örnek koleksiyonu.\n\n**İçerik:**\n- Singleton yardımcıları (EventBus, SceneManager)\n- Matematik yardımcıları (Vector işlemleri, interpolasyon)\n- Save/Load altyapısı\n- Localization yardımcıları\n- Debug araçları\n\n**SceneManager örneği:**\n```gdscript\n# scenes/scene_manager.gd (AutoLoad)\nextends Node\n\nfunc change_scene(scene_path: String, transition: String = 'fade'):\n    if transition == 'fade':\n        await _fade_out()\n    get_tree().change_scene_to_file(scene_path)\n    if transition == 'fade':\n        await _fade_in()\n\nfunc _fade_out():\n    var tween = create_tween()\n    tween.tween_property($FadeRect, 'color:a', 1.0, 0.3)\n    await tween.finished\n```\n\n**Prompt:** \"Bu util koleksiyonunu kullanarak Godot projesine global EventBus, SceneManager ve SaveManager entegre et; her sistem için bir kullanım örneği yaz.\"","meta":{"Yıldız":1051,"Dil":"GDScript","Fork":195},"source":{"url":"https://github.com/zfoo-project/godot-start","license":"MIT","author":"zfoo-project"},"no":"023"},{"id":24,"cat":"GDScript","name":"gdmaim","desc":"GDMaim is a GDScript obfuscation plugin for the Godot Engine.","tags":["★1046"],"badge1":"GDScript","badge2":"★ 1.046","content":"## gdmaim: Godot Aim Assist Sistemi\n\nGodot 4 için gamepad oyuncularına yönelik aim assist kütüphanesi.\n\n**Kullanım:**\n```gdscript\n# AimAssist node ekle\n@onready var aim_assist = $AimAssist\n\nfunc _ready():\n    aim_assist.target_group = 'enemies'\n    aim_assist.snap_radius = 100.0\n    aim_assist.snap_strength = 0.7  # 0=yok, 1=tam snap\n    aim_assist.slowdown_radius = 200.0\n\nfunc _process(delta):\n    var raw_aim = Input.get_vector('aim_left','aim_right','aim_up','aim_down')\n    var assisted_aim = aim_assist.assist(raw_aim, player.position)\n    aim_direction = assisted_aim\n```\n\n**Tasarım prensipleri:**\n- Snap radius: düşman etrafında büyüttür\n- Slowdown: geçerken yavaşlatır\n- Magnetism: hedefe doğru çeker\n\n**Prompt:** \"Çok düşmanlı sahnede aim assist önceliklendirme algoritması tasarla: en yakın hedef mi, en düşük sağlığı olan mı, ekran merkezine en yakın mı?\"","meta":{"Yıldız":1046,"Dil":"GDScript","Fork":62},"source":{"url":"https://github.com/cherriesandmochi/gdmaim","license":"MIT","author":"cherriesandmochi"},"no":"024"},{"id":25,"cat":"C++","name":"godot_debug_draw_3d","desc":"Draw 3D debug graphics and 2D overlays with this add-on.","tags":["csharp","gdextension","gdnative","gdscript","★1012"],"badge1":"C++","badge2":"★ 1.012","content":"## Debug Draw 3D: Godot Görsel Debug Aracı\n\nGodot 4'te geometri, vektör ve text debug çizimi için runtime araç.\n\n**Kurulum:**\n```bash\n# GitHub'dan indirip addons/ altına ekle\nplugin.gd aktifleştir\n```\n\n**Kullanım:**\n```gdscript\nfunc _process(_delta):\n    # Çizgi çiz\n    DebugDraw3D.draw_line(start_pos, end_pos, Color.RED)\n    \n    # Küre göster (hitbox debug)\n    DebugDraw3D.draw_sphere(enemy.position, 1.5, Color.YELLOW)\n    \n    # Metin göster\n    DebugDraw3D.draw_text(enemy.position, str(enemy.health))\n    \n    # Arrow (velocity görsel)\n    DebugDraw3D.draw_arrow(position, position + velocity, Color.GREEN)\n```\n\n**Kullanım senaryoları:** Pathfinding yol görselleştirme, hitbox debug, AI vision cone çizimi, fizik debug.\n\n**Prompt:** \"Debug Draw 3D ile düşman AI debug HUD yap: vision cone, aggro radius, pathfinding yolu ve her düşmanın state'ini gerçek zamanlı göster.\"","meta":{"Yıldız":1012,"Dil":"C++","Fork":40},"source":{"url":"https://github.com/DmitriySalnikov/godot_debug_draw_3d","license":"NOASSERTION","author":"DmitriySalnikov"},"no":"025"},{"id":26,"cat":"GDScript","name":"script-ide","desc":"Script-IDE is a plugin for Godot. It transforms the Script UI into an IDE like UI. Multiline Tabs are used for navigatin","tags":["addon","gdscript","godot","godot-addon","★999"],"badge1":"GDScript","badge2":"★ 999","content":"Maran23/script-ide\n\nScript-IDE is a plugin for Godot. It transforms the Script UI into an IDE like UI. Multiline Tabs are used for navigating between scripts. The default Outline got an overhaul and now shows all members of the script. Quick Open and Override Dialog.\n\n⭐ Yıldız: 999\n🍴 Fork: 35\n📅 Güncelleme: 2026-06-03\n🔗 https://github.com/Maran23/script-ide","meta":{"Yıldız":999,"Dil":"GDScript","Fork":35},"source":{"url":"https://github.com/Maran23/script-ide","license":"MIT","author":"Maran23"},"no":"026"},{"id":27,"cat":"GDScript","name":"godot-next","desc":"Godot Node Extensions - Basic Node Extensions for Godot Engine","tags":["gdscript","godot","godot-engine","plugins","★997"],"badge1":"GDScript","badge2":"★ 997","content":"## godot-next: Yeniden Kullanılabilir Godot Bileşenleri\n\nGodot topluluğunun oluşturduğu hazır, test edilmiş bileşen koleksiyonu.\n\n**İçerik kategorileri:**\n- **Fizik:** Custom rigidbody controller, KinematicBody yardımcıları\n- **Veri:** TypedArray, LinkedList, Graph veri yapıları\n- **Grafik:** Şekil çizimi, gizmo araçları\n- **Math:** Vector yardımcıları, easing fonksiyonları\n\n**Kullanım örneği (State Machine):**\n```gdscript\nextends StateMachine\n\nfunc _ready():\n    add_state('idle', IdleState.new())\n    add_state('walk', WalkState.new())\n    add_state('attack', AttackState.new())\n    set_state('idle')\n\n# State geçişi\n_on_player_near.connect(func(): set_state('attack'))\n```\n\n**Prompt:** \"godot-next State Machine ile karmaşık boss AI state sistemi kur: idle, aggro, attack, phase_transition, retreat state'leri.\"","meta":{"Yıldız":997,"Dil":"GDScript","Fork":61},"source":{"url":"https://github.com/godot-extended-libraries/godot-next","license":"MIT","author":"godot-extended-libraries"},"no":"027"},{"id":28,"cat":"GDScript","name":"Virtual-Joystick-Godot","desc":"A simple virtual joystick for touchscreens, for both 2D and 3D games, with useful options.","tags":["gdscript","godot","joystick","touchscreen","★969"],"badge1":"GDScript","badge2":"★ 969","content":"## Virtual Joystick: Mobil Dokunmatik Kontrol\n\nGodot 4 mobil oyunları için dokunmatik ekran joystick bileşeni.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/MarcoFazioRandom/Virtual-Joystick-Godot\n```\n\n**Sahneye ekleme:**\n```gdscript\n# VirtualJoystick node ekle\n# Mode: Fixed (sabit konum) / Dynamic (dokunulan yerde çıkar)\n\n@onready var joystick = $CanvasLayer/VirtualJoystick\n\nfunc _process(_delta):\n    var direction = joystick.output  # Vector2 (-1 ile 1 arası)\n    if direction.length() > 0.1:\n        velocity = direction * SPEED\n        $Sprite2D.flip_h = direction.x < 0\n```\n\n**Çoklu joystick (hareket + ateş):**\n```gdscript\n@onready var move_stick = $UI/MoveJoystick\n@onready var aim_stick = $UI/AimJoystick\n```\n\n**Prompt:** \"Dual joystick twin-stick shooter kontrol şeması kur; sol joystick hareket, sağ joystick nişan; otomatik ateş seçeneği ile.\"","meta":{"Yıldız":969,"Dil":"GDScript","Fork":98},"source":{"url":"https://github.com/MarcoFazioRandom/Virtual-Joystick-Godot","license":"MIT","author":"MarcoFazioRandom"},"no":"028"},{"id":29,"cat":"GDScript","name":"godot-FirstPersonStarter","desc":"FPS (First Person Shooter) controller template for Godot 4 to give starter content for a new or already existing project","tags":["fps-template","gamedev","gdscript","godot","★969"],"badge1":"GDScript","badge2":"★ 969","content":"## Godot First Person Starter: FPS Başlangıç Kiti\n\nGodot 4 için tam çalışan birinci şahıs perspektif hareket ve kamera sistemi.\n\n**İçerikler:**\n- Mouse look (yatay + dikey, limit)\n- WASD hareket + zıplama\n- Koşma ve çömelme\n- Baş titreme (headbob)\n- Silah sway\n\n**FPS karakter controller:**\n```gdscript\nextends CharacterBody3D\n\nconst SPEED = 5.0\nconst SPRINT_SPEED = 8.0\nconst JUMP_VELOCITY = 5.0\nconst MOUSE_SENSITIVITY = 0.003\n\nfunc _input(event):\n    if event is InputEventMouseMotion:\n        rotate_y(-event.relative.x * MOUSE_SENSITIVITY)\n        $Head.rotate_x(-event.relative.y * MOUSE_SENSITIVITY)\n        $Head.rotation.x = clamp($Head.rotation.x, -PI/2, PI/2)\n\nfunc _physics_process(delta):\n    var dir = Input.get_vector('left','right','forward','backward')\n    var wish_dir = (transform.basis * Vector3(dir.x, 0, dir.y)).normalized()\n    velocity.x = wish_dir.x * SPEED\n    velocity.z = wish_dir.z * SPEED\n    if not is_on_floor(): velocity.y -= 9.8 * delta\n    if is_on_floor() and Input.is_action_just_pressed('jump'):\n        velocity.y = JUMP_VELOCITY\n    move_and_slide()\n```\n\n**Prompt:** \"FPS starter'a lean/peek mekaniği ekle: Q/E ile duvara yaslanma, kameranın kayması, collision kontrolü.\"","meta":{"Yıldız":969,"Dil":"GDScript","Fork":58},"source":{"url":"https://github.com/Whimfoome/godot-FirstPersonStarter","license":"MIT","author":"Whimfoome"},"no":"029"},{"id":30,"cat":"Diğer","name":"godot-powerful","desc":"List of plugins to turn godot into a most powerful engine that already is.","tags":["addon","game-engine","gdscript","godot","★953"],"badge1":"—","badge2":"★ 953","content":"## godot-powerful: Faydalı Godot Extension Koleksiyonu\n\nGodot 4'te sık ihtiyaç duyulan işlevleri genişleten yardımcı node ve script koleksiyonu.\n\n**İçerik:**\n- `AutoLoad` yardımcıları\n- Genişletilmiş `Timer` (callable ile)\n- `Tween` kısayolları\n- Node arama ve yönetim yardımcıları\n- Type-safe event bus\n\n**Event bus örneği:**\n```gdscript\n# Sinyal tanımla\nEventBus.register_event('player_died')\n\n# Yay\nEventBus.emit('player_died', {score: 1500})\n\n# Dinle\nEventBus.subscribe('player_died', self._on_player_died)\nfunc _on_player_died(data):\n    ui.show_death_screen(data.score)\n```\n\n**Prompt:** \"godot-powerful Event Bus kullanarak gevşek bağlı oyun sistemi tasarla: skor, can, görev olayları diğer sistemleri doğrudan referans almadan birbirine bağlanır.\"","meta":{"Yıldız":953,"Dil":"—","Fork":21},"source":{"url":"https://github.com/nonunknown/godot-powerful","license":"MIT","author":"nonunknown"},"no":"030"},{"id":31,"cat":"GDScript","name":"gloot","desc":"A universal inventory system for the Godot game engine.","tags":["gdscript","godot","godot-engine","godotengine","★925"],"badge1":"GDScript","badge2":"★ 925","content":"## Gloot: Godot Envanter Sistemi\n\nGodot 4 için esnek, özelleştirilebilir envanter yönetim sistemi.\n\n**Envanter türleri:**\n- `Inventory`: Sınırsız kapasite\n- `InventoryStacked`: Stackable items\n- `InventoryGrid`: 2D grid envanter (Resident Evil tarzı)\n\n**Kullanım:**\n```gdscript\n@onready var inventory = $Inventory\n\nfunc pickup_item(item_protoset: InventoryItem):\n    if inventory.add_item(item_protoset):\n        print('Item alındı: ', item_protoset.get_property('name'))\n    else:\n        print('Envanter dolu!')\n\nfunc drop_item(item):\n    if inventory.remove_item(item):\n        var pickup = pickup_scene.instantiate()\n        pickup.item = item\n        get_parent().add_child(pickup)\n```\n\n**Prompt:** \"Gloot ile Diablo tarzı item loot sistemi kur: item rarity (common/rare/legendary), item stats generate etme ve envanter UI bağlantısı.\"","meta":{"Yıldız":925,"Dil":"GDScript","Fork":43},"source":{"url":"https://github.com/peter-kish/gloot","license":"MIT","author":"peter-kish"},"no":"031"},{"id":32,"cat":"GDScript","name":"godot-tactical-rpg","desc":"A tactical role-playing game demo for the Godot Engine","tags":["game","game-development","gamedev","gdscript","★916"],"badge1":"GDScript","badge2":"★ 916","content":"## Godot Tactical RPG: Sıra Tabanlı Strateji Şablonu\n\nFire Emblem tarzı tactical RPG için sıra yönetimi, grid hareket ve savaş sistemi şablonu.\n\n**Temel sistemler:**\n- Hex veya kare grid\n- Turn sırası (initiative bazlı)\n- Hareket range hesabı (BFS/Dijkstra)\n- Saldırı range ve line-of-sight\n- HP/hasar sistemi\n\n**Grid hareket hesabı:**\n```gdscript\nfunc get_reachable_tiles(unit: Unit) -> Array:\n    var reachable = []\n    var frontier = [unit.grid_position]\n    var visited = {unit.grid_position: 0}\n    \n    while not frontier.is_empty():\n        var current = frontier.pop_front()\n        for neighbor in get_neighbors(current):\n            var cost = visited[current] + get_move_cost(neighbor)\n            if cost <= unit.movement and not visited.has(neighbor):\n                visited[neighbor] = cost\n                frontier.append(neighbor)\n                reachable.append(neighbor)\n    return reachable\n```\n\n**Prompt:** \"Tactical RPG'ye class sistemi ekle: savaşçı, büyücü, okçu — her class farklı hareket mesafesi, saldırı menzili ve yeteneklere sahip.\"","meta":{"Yıldız":916,"Dil":"GDScript","Fork":107},"source":{"url":"https://github.com/ramaureirac/godot-tactical-rpg","license":"MIT","author":"ramaureirac"},"no":"032"},{"id":33,"cat":"GDScript","name":"unidot_importer","desc":"Import .unitypackage and other assets designed for Unity Engine as a GDScript addon for vanilla Godot 4.x","tags":["game-development","godot","godot-engine","unity","★914"],"badge1":"GDScript","badge2":"★ 914","content":"## Unidot: Unity Projelerini Godot'a Taşıma\n\nUnity .unitypackage ve scene dosyalarını Godot'a dönüştüren importer eklentisi.\n\n**Desteklenen Unity varlıkları:**\n- Prefab → Godot Sahne (.tscn)\n- Material → Godot Material\n- Mesh → MeshInstance3D\n- Animator → AnimationPlayer/Tree\n- Scripts: CSharp → Manuel çeviri gerekli\n\n**Kurulum ve kullanım:**\n```bash\ngit clone https://github.com/V-Sekai/unidot_importer\n# addons/ altına kopyala\n# Proje > Eklentiler > Unidot aktif et\n# .unitypackage dosyasını res:// altına sürükle-bırak\n```\n\n**Beklentiler:** %100 otomatik çeviri mümkün değil. Shader, C# script ve custom component'lar manuel port gerektirir.\n\n**Prompt:** \"Unity'den Godot 4'e geçişte en sık karşılaşılan teknik sorunları listele ve her biri için Godot eşdeğeri pattern öner.\"","meta":{"Yıldız":914,"Dil":"GDScript","Fork":41},"source":{"url":"https://github.com/V-Sekai/unidot_importer","license":"MIT","author":"V-Sekai"},"no":"033"},{"id":34,"cat":"GDScript","name":"godot-tiled-importer","desc":"Plugin for Godot Engine to import Tiled Map Editor tilemaps and tilesets","tags":["gdscript","godot","godot-engine","tiled","★895"],"badge1":"GDScript","badge2":"★ 895","content":"## Godot Tiled Importer: Tilemap Editör Entegrasyonu\n\nTiled Map Editor'da oluşturulan haritaları Godot'a aktaran eklenti.\n\n**Workflow:**\n1. Tiled'da harita oluştur (.tmx)\n2. Tileset tanımla (.tsx)\n3. Katmanlar: ground, obstacles, entities\n4. Godot'a aktarma:\n```bash\n# eklentiyi aktif et\n# .tmx dosyasını res:// altına kopyala\n# Godot otomatik import eder → .tscn oluşturur\n```\n\n**Object layer → Godot node:**\n```gdscript\n# Tiled'daki 'spawn_point' objesini Godot node'una çevir\n# Importer > Object Types > CustomClass bağla\n```\n\n**Katman yapısı:**\n- `background` → StaticBody2D değil\n- `collision` → StaticBody2D + CollisionPolygon\n- `entities` → spawn noktaları\n\n**Prompt:** \"Tiled ile büyük dünya haritası oluştur: biome bazlı tileset'ler, düşman spawn bölgeleri ve event trigger objeleri; Godot'a seamless aktarım.\"","meta":{"Yıldız":895,"Dil":"GDScript","Fork":91},"source":{"url":"https://github.com/vnen/godot-tiled-importer","license":"MIT","author":"vnen"},"no":"034"},{"id":35,"cat":"GDScript","name":"Godello","desc":"Trello inspired kanban board made with the Godot Engine and GDScript, with a real-time collaborative backend (Elixir and","tags":["elixir","elixir-lang","elixir-phoenix","gdscript","★880"],"badge1":"GDScript","badge2":"★ 880","content":"## Godello: Trello Benzeri Kanban — Godot ile\n\nGodot ve GDScript ile yapılmış gerçek zamanlı Kanban panosu. Elixir/Phoenix backend ile çevrimiçi işbirliği destekler.\n\n**Mimari:**\n- Frontend: Godot + GDScript UI bileşenleri\n- Backend (çevrimiçi): Elixir + Phoenix Channels (WebSocket)\n- Backend (çevrimdışı): Godot Custom Resources (yerel kayıt)\n\n**Öğrenme değeri:**\n- Godot ile gerçek bir üretkenlik uygulaması nasıl yapılır?\n- GDScript ile WebSocket iletişimi\n- Godot UI'da drag-drop, liste yönetimi\n- Custom Resource ile yerel veri kalıcılığı\n\n```gdscript\n# Phoenix WebSocket bağlantısı\nvar socket = WebSocketClient.new()\nsocket.connect_to_url('wss://server/socket/websocket')\n\n# Kart oluşturma\nfunc create_card(list_id: int, title: String):\n    channel.push('new_card', {list_id: list_id, title: title})\n```\n\n**Prompt:** \"Godello'nun mimari yapısından ilham alarak Godot ile basit bir görev yönetim uygulaması yap; yerel ve çevrimiçi kayıt arasında geçiş yapabilsin.\"","meta":{"Yıldız":880,"Dil":"GDScript","Fork":59},"source":{"url":"https://github.com/alfredbaudisch/Godello","license":"MIT","author":"alfredbaudisch"},"no":"035"},{"id":36,"cat":"GDScript","name":"godot-port","desc":"Unknown Horizons Godot Engine Port","tags":["game","game-development","gdscript","godot","★877"],"badge1":"GDScript","badge2":"★ 877","content":"## godot-port: Ağ ve Multiplayer Yardımcıları\n\nGodot 4 multiplayer projeler için bağlantı yönetimi ve ağ yardımcı kütüphanesi.\n\n**ENet ile peer-to-peer:**\n```gdscript\n# Sunucu\nvar peer = ENetMultiplayerPeer.new()\npeer.create_server(4242, max_clients=10)\nmultiplayer.multiplayer_peer = peer\nmultiplayer.peer_connected.connect(_on_peer_connected)\n\n# İstemci\nvar peer = ENetMultiplayerPeer.new()\npeer.create_client('localhost', 4242)\nmultiplayer.multiplayer_peer = peer\n```\n\n**RPC kullanımı:**\n```gdscript\n@rpc('any_peer', 'call_local')\nfunc sync_position(pos: Vector2):\n    position = pos\n\nfunc _process(delta):\n    if is_multiplayer_authority():\n        sync_position.rpc(position)\n```\n\n**Prompt:** \"Godot 4'te basit oda tabanlı multiplayer bulmaca oyunu kur: lobi, hazır olma sistemi, tüm oyuncular hazır olunca sahne geçişi.\"","meta":{"Yıldız":877,"Dil":"GDScript","Fork":111},"source":{"url":"https://github.com/unknown-horizons/godot-port","license":"GPL-2.0","author":"unknown-horizons"},"no":"036"},{"id":37,"cat":"GDScript","name":"godot_little_camera_preview","desc":"🎥 Picture-in-picture style preview for both 2D and 3D cameras","tags":["gdscript","godot-addon","godotengine","★756"],"badge1":"GDScript","badge2":"★ 756","content":"## Little Camera Preview: Godot Kamera Editör Aracı\n\nGodot editörünün sağ alt köşesinde kamera önizlemesi gösteren küçük ama çok işe yarayan eklenti.\n\n**Kurulum:**\n```\nAsset Library > LittleCameraPreview > İndir ve aktifleştir\n```\n\n**Özellikler:**\n- Editörde sahneyi düzenlerken kamera görüşünü gösterir\n- Yanlış pozisyona koyulan kamerayı anında fark ettirir\n- Birden fazla kamerayı toggle et\n- Aspect ratio görsel kontrol\n\n**Kullanım senaryoları:**\n- Cutscene kamera yerleşimi\n- Split-screen kamera kurulumu\n- UI elemanlarının kamera view'da doğru görünümü\n- Camera2D boundary ve limit kontrolü\n\n**Prompt:** \"Godot 2D oyununda dinamik kamera sistemi kur: oyuncuyu takip etme, odak noktası geçişi (tween), shake efekti ve bakış yönüne göre önyükleme (camera lookahead).\"","meta":{"Yıldız":756,"Dil":"GDScript","Fork":14},"source":{"url":"https://github.com/anthonyec/godot_little_camera_preview","license":"MIT","author":"anthonyec"},"no":"037"},{"id":38,"cat":"C#","name":"godot-ink","desc":"Ink integration for Godot Engine.","tags":["csharp","game-development","gamedev","gdscript","★756"],"badge1":"C#","badge2":"★ 756","content":"## godot-ink: Ink Scripting Dili Entegrasyonu\n\nInkle Studios'un Ink hikaye scriptini Godot 4'e entegre eden eklenti.\n\n**Ink nedir?** İnteraktif hikaye yazımı için tasarlanmış, zengin dallanma desteğine sahip scripting dili.\n\n**Kurulum:**\n```bash\npip install inky  # veya Inky uygulamasını indir\ngit clone https://github.com/paulloz/godot-ink\naddons/ altına ekle\n```\n\n**GDScript entegrasyonu:**\n```gdscript\n@onready var story = $InkStory\n\nfunc _ready():\n    story.ink_file = preload('res://story/main.ink.json')\n    continue_story()\n\nfunc continue_story():\n    while story.can_continue:\n        var line = story.continue_story()\n        $DialogueLabel.text = line\n    \n    for choice in story.current_choices:\n        var btn = Button.new()\n        btn.text = choice.text\n        btn.pressed.connect(story.choose_choice_index.bind(choice.index))\n        $ChoiceContainer.add_child(btn)\n```\n\n**Prompt:** \"Ink ile 3 farklı sonucu olan kısa interaktif hikaye yaz; Godot'ta bu hikayeyi oynatacak visual novel UI oluştur.\"","meta":{"Yıldız":756,"Dil":"C#","Fork":45},"source":{"url":"https://github.com/paulloz/godot-ink","license":"MIT","author":"paulloz"},"no":"038"},{"id":39,"cat":"GDScript","name":"nakama-godot","desc":"Nakama Godot Client SDK","tags":["chat","client","game","gamedev","★752"],"badge1":"GDScript","badge2":"★ 752","content":"## Nakama Godot: Gerçek Zamanlı Multiplayer Backend\n\nHeroic Labs'ın açık kaynak oyun sunucusu Nakama'nın Godot 4 istemci SDK'sı.\n\n**Özellikler:**\n- Kimlik doğrulama (email, device, sosyal)\n- Leaderboard ve sıralama tabloları\n- Multiplayer match\n- Depolama (kayıt sistemi)\n- Gerçek zamanlı socket (presence, chat)\n\n**Kurulum:**\n```bash\ngit clone https://github.com/heroiclabs/nakama-godot\naddons/ altına kopyala\n```\n\n**Kimlik doğrulama:**\n```gdscript\nvar client = Nakama.create_client('defaultkey', '127.0.0.1', 7350, 'http')\nvar session = await client.authenticate_device_async('device-id-1234')\nprint('Giriş yapıldı: ', session.username)\n```\n\n**Leaderboard:**\n```gdscript\nawait client.write_leaderboard_record_async(session, 'highscores', 1500)\nvar records = await client.list_leaderboard_records_async(session, 'highscores')\n```\n\n**Prompt:** \"Nakama ile çevrimiçi skor tablosu ve haftalık lig sistemi kur; Godot 4 UI entegrasyonu ile sıralamaları göster.\"","meta":{"Yıldız":752,"Dil":"GDScript","Fork":91},"source":{"url":"https://github.com/heroiclabs/nakama-godot","license":"Apache-2.0","author":"heroiclabs"},"no":"039"},{"id":40,"cat":"C++","name":"inventory-system","desc":"Modular inventory system for godot 4 with nodes, compatible with multiplayer, separate logic from the UI, Using items as","tags":["gdscript","godot","godot4","inventory","★719"],"badge1":"C++","badge2":"★ 719","content":"## Godot Inventory System: Grid Tabanlı Envanter\n\nGodot 4 için tam özellikli, drag-drop destekli 2D grid envanter sistemi.\n\n**Özellikler:**\n- Farklı boyutlarda item (1×1, 2×1, 2×2)\n- Drag and drop ile item yerleştirme\n- Stack sistemi (aynı item birleşir)\n- Tooltip sistemi\n- Hızlı erişim çubuğu (hotbar)\n\n**Entegrasyon:**\n```gdscript\n@onready var inventory = $InventoryUI\n\nfunc pickup_item(item_resource: ItemResource):\n    if inventory.add_item(item_resource):\n        SoundManager.play('pickup')\n    else:\n        show_message('Envanter dolu!')\n\n# Sinyaller\ninventory.item_used.connect(_on_item_used)\ninventory.item_dropped.connect(_on_item_dropped)\n\nfunc _on_item_used(item: ItemResource):\n    match item.type:\n        ItemResource.Type.HEAL: player.heal(item.value)\n        ItemResource.Type.WEAPON: player.equip(item)\n```\n\n**Prompt:** \"Bu envanter sistemine item crafting ekle: 2 veya 3 item kombinasyonu yeni item üretir, tarif listesi JSON'da tanımlanır.\"","meta":{"Yıldız":719,"Dil":"C++","Fork":60},"source":{"url":"https://github.com/expressobits/inventory-system","license":"MIT","author":"expressobits"},"no":"040"}];

// ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'godotvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
