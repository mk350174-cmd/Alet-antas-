<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">P</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">PGC<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Prosedürel içerik (harita, zindan, arazi) üretimi için matematiksel algoritmalar.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>20</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="PGC ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">20</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

const ITEMS = [{"id": 1, "no": "001", "cat": "Gürültü Algoritmaları", "name": "Perlin Gürültüsü Temelleri", "desc": "Temel Perlin gürültüsü fonksiyonunu uygulayarak pürüzsüz rastgele değerler üretin.", "tags": ["gürültü", "perlin", "rastgele"], "badge1": "Başlangıç", "content": "## Perlin Gürültüsü Fonksiyonu\n1.  Rastgele gradyan vektörleri oluşturun.\n2.  Giriş koordinatlarını köşelere ayırın.\n3.  Her köşeden nokta-gradyan çarpımlarını hesaplayın.\n4.  Kübik interpolasyon kullanarak nihai gürültü değerini elde edin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 2, "no": "002", "cat": "Gürültü Algoritmaları", "name": "Simplex Gürültüsü Uygulaması", "desc": "Simplex gürültüsü ile Perlin'den daha hızlı ve artifactsız gürültü haritaları oluşturun.", "tags": ["gürültü", "simplex", "performans"], "badge1": "Orta", "content": "## Simplex Gürültüsü Adımları\n1.  Giriş koordinatlarını çarpıtarak skew faktörünü uygulayın.\n2.  Bölgeyi bir simpleks (üçgen/tetrahedron) içine yerleştirin.\n3.  Köşe noktalarına göre gradyan hesaplayın.\n4.  Gürültü değerlerini toplamak için ağırlıklı toplam kullanın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 3, "no": "003", "cat": "Gürültü Algoritmaları", "name": "Worley Gürültüsü (Voronoi)", "desc": "Hücresel desenler ve kenarlar için Worley (Voronoi) gürültüsü kullanarak doğal görünümler elde edin.", "tags": ["worley", "voronoi", "hücresel"], "badge1": "Orta", "content": "## Worley Gürültüsü Oluşturma\n1.  Rastgele dağılmış \"özellik noktaları\" tanımlayın.\n2.  Her bir piksel için en yakın özellik noktasını bulun.\n3.  Pikselin bu noktaya olan uzaklığını gürültü değeri olarak atayın.\n4.  Çeşitli desenler için ikinci en yakın noktayı da kullanabilirsiniz.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 4, "no": "004", "cat": "Gürültü Algoritmaları", "name": "Çok Katmanlı Gürültü (Octave)", "desc": "Birden fazla gürültü katmanını birleştirerek karmaşık ve doğal görünümlü desenler yaratın.", "tags": ["gürültü", "fraktal", "karmaşık"], "badge1": "İleri", "content": "## Fraktal Gürültü Katmanlama\n1.  Temel gürültü fonksiyonunu (örn. Perlin/Simplex) seçin.\n2.  Farklı frekans (octave) ve genlik (amplitude) değerleri tanımlayın.\n3.  Her octave için gürültü değerini hesaplayın.\n4.  Tüm octave değerlerini toplayarak nihai gürültüyü elde edin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 5, "no": "005", "cat": "Arazi & Yükseklik Haritaları", "name": "Yükseklik Haritası Oluşturma", "desc": "Perlin/Simplex gürültüsü kullanarak gerçekçi yükseklik haritaları ve araziler üretin.", "tags": ["arazi", "yükseklik", "harita"], "badge1": "Başlangıç", "content": "## Yükseklik Haritası Oluşturma\n1.  Gürültü fonksiyonunu (örn. Perlin) seçin.\n2.  Harita koordinatlarını bu fonksiyona girdi olarak verin.\n3.  Gürültü çıkışını 0-1 aralığında normalize edin.\n4.  Normalize edilmiş değeri yükseklik olarak kullanın.\n5.  Birden fazla gürültü katmanı ekleyerek detayları artırın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 6, "no": "006", "cat": "Arazi & Yükseklik Haritaları", "name": "Hidrolik Erozyon Simülasyonu", "desc": "Su akışını simüle ederek arazide gerçekçi erozyon izleri ve birikintiler oluşturun.", "tags": ["erozyon", "hidrolik", "arazi"], "badge1": "İleri", "content": "## Hidrolik Erozyon Adımları\n1.  Arazide rastgele su damlaları bırakın.\n2.  Her damlanın eğim boyunca akış yolunu simüle edin.\n3.  Akarken toprağı aşındırın ve tortuyu taşıyın.\n4.  Damla durduğunda tortuyu biriktirin veya buharlaştırın.\n5.  Bu işlemi binlerce damla için tekrarlayın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 7, "no": "007", "cat": "Arazi & Yükseklik Haritaları", "name": "Termal Erozyon Simülasyonu", "desc": "Eğimli yamaçlarda toprak kaymasını simüle ederek araziyi yumuşatın ve gerçekçiliği artırın.", "tags": ["erozyon", "termal", "arazi"], "badge1": "Orta", "content": "## Termal Erozyon Uygulaması\n1.  Her piksel için komşularıyla olan yükseklik farkını hesaplayın.\n2.  Belirli bir eşik değerinden (sürekli yamaç açısı) fazla olan farkları tespit edin.\n3.  Bu farkı aşan bölgelerde toprağı aşağıya doğru taşıyarak dağıtın.\n4.  İşlemi yeterli gerçekçilik elde edene kadar yineleyin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 8, "no": "008", "cat": "Zindan & Mekan Düzenleri", "name": "Oda-Koridor Zindan Üretimi", "desc": "Rastgele odalar ve bunları birbirine bağlayan koridorlar ile klasik zindan düzenleri oluşturun.", "tags": ["zindan", "oda-koridor", "harita"], "badge1": "Başlangıç", "content": "## Zindan Oluşturma Algoritması\n1.  Rastgele boyutlarda ve konumlarda odalar yerleştirin (çakışmasın).\n2.  Odaları minimum Spanning Tree (MST) ile bağlayın.\n3.  MST'deki her kenar için iki odayı birleştiren koridorlar çizin.\n4.  Zindan duvarlarını ve zemini oluşturun.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 9, "no": "009", "cat": "Zindan & Mekan Düzenleri", "name": "Hücresel Otomat Haritası", "desc": "Hücresel otomat kurallarıyla doğal mağara sistemleri veya organik duvar desenleri üretin.", "tags": ["hücresel", "mağara", "otomat"], "badge1": "Orta", "content": "## Hücresel Otomat Adımları\n1.  Haritayı rastgele doldurun (örn. %45 duvar, %55 boş).\n2.  Her hücre için komşularının sayısını kontrol edin.\n3.  Belirli kurallara göre hücrenin durumunu değiştirin (örn. 4+ komşu duvar ise duvar ol).\n4.  Bu adımları birkaç kez yineleyerek pürüzsüzleştirin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 10, "no": "010", "cat": "Zindan & Mekan Düzenleri", "name": "İkili Ağaç Bölme (BSP) ile Oda Üretimi", "desc": "Bir alanı ikili ağaç bölme kullanarak hiyerarşik odalara ayırın, sonra bunları bağlayın.", "tags": ["bsp", "oda", "bölme"], "badge1": "İleri", "content": "## BSP Oda Üretimi\n1.  Ana alanı rastgele bir yönde (yatay/dikey) ikiye bölün.\n2.  Her alt alanı tekrar bölme eşiğine ulaşana kadar yineleyin.\n3.  Her yaprak düğüme (en küçük alan) bir oda yerleştirin.\n4.  Komşu odaları koridorlarla birleştirin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 11, "no": "011", "cat": "Zindan & Mekan Düzenleri", "name": "Dinamik Labirent Üretimi (DFS)", "desc": "Derinlik Öncelikli Arama (DFS) kullanarak karmaşık ve çözülebilir labirentler oluşturun.", "tags": ["labirent", "dfs", "algoritma"], "badge1": "Orta", "content": "## DFS Labirent Algoritması\n1.  Bir başlangıç hücresi seçin ve ziyaret edildi olarak işaretleyin.\n2.  Geçerli hücreden rastgele bir komşu hücre seçin.\n3.  Eğer komşu hücre ziyaret edilmemişse, aradaki duvarı yıkın.\n4.  Komşu hücreyi mevcut hücre yapıp adıma devam edin.\n5.  Çıkmaza ulaşıldığında geri dönün ve farklı bir yol deneyin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 12, "no": "012", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Poisson Diski Dağılımı", "desc": "Detayları (ağaç, kaya) düzenli ama rastgele bir şekilde dağıtarak görsel uyumu sağlayın.", "tags": ["dağılım", "poisson", "detay"], "badge1": "Orta", "content": "## Poisson Diski Dağılımı\n1.  İlk noktayı rastgele yerleştirin.\n2.  Her yeni nokta için, mevcut noktaların minimum yarıçapından daha uzak olmasını sağlayın.\n3.  Mevcut noktaların etrafına \"aday halkaları\" çizin.\n4.  Bu halkalardan rastgele noktalar seçerek yeni geçerli noktalar ekleyin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 13, "no": "013", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Düşey Ağaç Yerleşimi", "desc": "Yükseklik haritası ve eğim verilerini kullanarak ağaçları gerçekçi konumlara yerleştirin.", "tags": ["ağaç", "bitki", "yerleşim"], "badge1": "Başlangıç", "content": "## Ağaç Yerleşimi Kuralları\n1.  Yükseklik haritası üzerinde belirli bir yükseklik aralığı tanımlayın (örn. deniz seviyesi üstü).\n2.  Eğim haritası üzerinde çok dik yamaçlardan kaçının.\n3.  Perlin gürültüsü kullanarak ağaç yoğunluğunu belirleyin.\n4.  Belirlenen uygun alanlara ağaç modellerini rastgele yerleştirin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 14, "no": "014", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Rastgele Kaya Dağılımı", "desc": "Arazide rastgele boyutlarda ve yönlerde kaya modellerini estetik olarak dağıtın.", "tags": ["kaya", "dağılım", "detay"], "badge1": "Başlangıç", "content": "## Kaya Dağılımı Yöntemi\n1.  Arazi üzerinde rastgele noktalar seçin.\n2.  Bu noktaların arazi eğimini kontrol edin; çok dik yerlerden kaçının.\n3.  Her kaya için rastgele bir ölçek ve dönüş değeri atayın.\n4.  Kaya modellerini seçilen noktalara yerleştirin.\n5.  Gürültü kullanarak kaya yoğunluğunu kontrol edin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 15, "no": "015", "cat": "Fraktal & Organik Modeller", "name": "L-Sistem Ağaç Oluşturma", "desc": "L-Sistem kuralları kullanarak organik ve dallı ağaç yapılarını prosedürel olarak üretin.", "tags": ["l-sistem", "fraktal", "ağaç"], "badge1": "İleri", "content": "## L-Sistem Ağaç Algoritması\n1.  Başlangıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 16, "no": "016", "cat": "Fraktal & Organik Modeller", "name": "Mandelbrot Fraktalı Görselleştirme", "desc": "Mandelbrot kümesini görselleştirerek karmaşık ve sonsuz detaylara sahip fraktal desenler oluşturun.", "tags": ["fraktal", "mandelbrot", "görsel"], "badge1": "Orta", "content": "## Mandelbrot Kümesi Çizimi\n1.  Ekrandaki her pikseli bir kompleks sayıya (c) dönüştürün.\n2.  z = z^2 + c formülünü z=0'dan başlayarak tekrarla.\n3.  Eğer |z| belirli bir eşiği (örn. 2) aşarsa, iterasyon sayısına göre pikseli renklendir.\n4.  Aşmazsa, siyah renkle çizerek kümenin içini gösterin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 17, "no": "017", "cat": "Fraktal & Organik Modeller", "name": "Fraktal Bulut Modelleme", "desc": "Çok katmanlı gürültü fonksiyonlarını kullanarak gerçekçi ve dinamik bulut şekilleri üretin.", "tags": ["bulut", "fraktal", "atmosfer"], "badge1": "İleri", "content": "## Fraktal Bulut Modelleme\n1.  3D Perlin veya Simplex gürültüsü kullanın.\n2.  Farklı frekans ve genliklerde birden fazla katmanı birleştirin (fbm).\n3.  Gürültü hacmini bir eşik değeri ile filtreleyerek bulutların yoğunluğunu belirleyin.\n4.  Bulutların hareketini simüle etmek için zamanla gürültü ofsetini değiştirin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 18, "no": "018", "cat": "Doku & Malzeme Üretimi", "name": "Prosedürel Taş Dokusu", "desc": "Gürültü fonksiyonlarını birleştirerek benzersiz ve tekrar etmeyen taş dokuları oluşturun.", "tags": ["doku", "taş", "malzeme"], "badge1": "Orta", "content": "## Prosedürel Taş Dokusu\n1.  Temel olarak Perlin gürültüsü kullanın.\n2.  Worley gürültüsünü (Voronoi) ekleyerek çatlak ve hücre efektleri yaratın.\n3.  Farklı ölçeklerde gürültüleri karıştırarak yüzey detaylarını artırın.\n4.  Normal harita için gürültü değerlerinin türevlerini kullanın.\n5.  Renk paletini taş tonlarına göre ayarlayın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 19, "no": "019", "cat": "Doku & Malzeme Üretimi", "name": "Normal Harita Üretimi (Gürültüden)", "desc": "Yükseklik veya gürültü h azı belirleyin.\n2. **Modelleme:** Oda-Koridor Zindan Üretimi akışını reactive yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 230, "no": "230", "cat": "Zindan & Mekan Düzenleri", "name": "API-First Hücresel Otomat Haritası Sözleşmesi", "desc": "mühendislik bağlamında Hücresel Otomat Haritası için api-first bir sözleşmesi. Hücresel otomat kurallarıyla doğal mağara sistemleri veya organik duvar desenleri üretin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["hücresel", "mağara", "otomat", "mühendislik", "api-first", "i̇leri"], "badge1": "İleri", "content": "## Hücresel Otomat Adımları\n1.  Haritayı rastgele doldurun (örn. %45 duvar, %55 boş).\n2.  Her hücre için komşularının sayısını kontrol edin.\n3.  Belirli kurallara göre hücrenin durumunu değiştirin (örn. 4+ komşu duvar ise duvar ol).\n4.  Bu adımları birkaç kez yineleyerek pürüzsüzleştirin.\n\n## Uygulama Senaryosu (API-First)\n\nBu sözleşmesi, mühendislik alanında Hücresel Otomat Haritası problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hücresel Otomat Haritası akışını api-first yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 231, "no": "231", "cat": "Zindan & Mekan Düzenleri", "name": "Federe İkili Ağaç Bölme Mimari Yaklaşımı", "desc": "gözlemlenebilirlik bağlamında İkili Ağaç Bölme için federe bir mimari yaklaşımı. Bir alanı ikili ağaç bölme kullanarak hiyerarşik odalara ayırın, sonra bunları bağlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["bsp", "oda", "bölme", "gözlemlenebilirlik", "federe", "i̇leri"], "badge1": "İleri", "content": "## BSP Oda Üretimi\n1.  Ana alanı rastgele bir yönde (yatay/dikey) ikiye bölün.\n2.  Her alt alanı tekrar bölme eşiğine ulaşana kadar yineleyin.\n3.  Her yaprak düğüme (en küçük alan) bir oda yerleştirin.\n4.  Komşu odaları koridorlarla birleştirin.\n\n## Uygulama Senaryosu (Federe)\n\nBu mimari yaklaşımı, gözlemlenebilirlik alanında İkili Ağaç Bölme problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İkili Ağaç Bölme akışını federe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 232, "no": "232", "cat": "Zindan & Mekan Düzenleri", "name": "Modüler Dinamik Labirent Üretimi Şablonu", "desc": "entegrasyon bağlamında Dinamik Labirent Üretimi için modüler bir şablonu. Derinlik Öncelikli Arama (DFS) kullanarak karmaşık ve çözülebilir labirentler oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["labirent", "dfs", "algoritma", "entegrasyon", "modüler", "orta"], "badge1": "Orta", "content": "## DFS Labirent Algoritması\n1.  Bir başlangıç hücresi seçin ve ziyaret edildi olarak işaretleyin.\n2.  Geçerli hücreden rastgele bir komşu hücre seçin.\n3.  Eğer komşu hücre ziyaret edilmemişse, aradaki duvarı yıkın.\n4.  Komşu hücreyi mevcut hücre yapıp adıma devam edin.\n5.  Çıkmaza ulaşıldığında geri dönün ve farklı bir yol deneyin.\n\n## Genişletilmiş Notlar (Modüler)\n\n- **Hedef Kitle:** Orta seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Dinamik Labirent Üretimi senaryoları\n- **Avantajları:** Bu şablonu sayesinde Dinamik Labirent Üretimi işlemleri daha modüler hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Dinamik Labirent Üretimi ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** labirent, dfs, algoritma\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 233, "no": "233", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Adaptif Poisson Diski Dağılımı Rehberi", "desc": "ölçeklenme bağlamında Poisson Diski Dağılımı için adaptif bir rehberi. Detayları (ağaç, kaya) düzenli ama rastgele bir şekilde dağıtarak görsel uyumu sağlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["dağılım", "poisson", "detay", "ölçeklenme", "adaptif", "başlangıç"], "badge1": "Başlangıç", "content": "## Poisson Diski Dağılımı\n1.  İlk noktayı rastgele yerleştirin.\n2.  Her yeni nokta için, mevcut noktaların minimum yarıçapından daha uzak olmasını sağlayın.\n3.  Mevcut noktaların etrafına \"aday halkaları\" çizin.\n4.  Bu halkalardan rastgele noktalar seçerek yeni geçerli noktalar ekleyin.\n\n## Uygulama Senaryosu (Adaptif)\n\nBu rehberi, ölçeklenme alanında Poisson Diski Dağılımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Poisson Diski Dağılımı akışını adaptif yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 234, "no": "234", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Veri-Odaklı Düşey Ağaç Yerleşimi Çerçevesi", "desc": "monitoring bağlamında Düşey Ağaç Yerleşimi için veri-odaklı bir çerçevesi. Yükseklik haritası ve eğim verilerini kullanarak ağaçları gerçekçi konumlara yerleştirin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "bitki", "yerleşim", "monitoring", "veri-odaklı", "başlangıç"], "badge1": "Başlangıç", "content": "## Ağaç Yerleşimi Kuralları\n1.  Yükseklik haritası üzerinde belirli bir yükseklik aralığı tanımlayın (örn. deniz seviyesi üstü).\n2.  Eğim haritası üzerinde çok dik yamaçlardan kaçının.\n3.  Perlin gürültüsü kullanarak ağaç yoğunluğunu belirleyin.\n4.  Belirlenen uygun alanlara ağaç modellerini rastgele yerleştirin.\n\n## Genişletilmiş Notlar (Veri-Odaklı)\n\n- **Hedef Kitle:** Başlangıç seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Düşey Ağaç Yerleşimi senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Düşey Ağaç Yerl e": "v3-400"}}, {"id": 239, "no": "239", "cat": "Doku & Malzeme Üretimi", "name": "Self-Healing Prosedürel Taş Dokusu Önerisi", "desc": "logging bağlamında Prosedürel Taş Dokusu için self-healing bir önerisi. Gürültü fonksiyonlarını birleştirerek benzersiz ve tekrar etmeyen taş dokuları oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "taş", "malzeme", "logging", "self-healing", "i̇leri"], "badge1": "İleri", "content": "## Prosedürel Taş Dokusu\n1.  Temel olarak Perlin gürültüsü kullanın.\n2.  Worley gürültüsünü (Voronoi) ekleyerek çatlak ve hücre efektleri yaratın.\n3.  Farklı ölçeklerde gürültüleri karıştırarak yüzey detaylarını artırın.\n4.  Normal harita için gürültü değerlerinin türevlerini kullanın.\n5.  Renk paletini taş tonlarına göre ayarlayın.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu önerisi, logging alanında Prosedürel Taş Dokusu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Prosedürel Taş Dokusu akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 240, "no": "240", "cat": "Doku & Malzeme Üretimi", "name": "Container-Native Normal Harita Üretimi Düzeni", "desc": "test bağlamında Normal Harita Üretimi için container-native bir düzeni. Yükseklik veya gürültü haritalarından otomatik olarak normal haritalar oluşturarak detayları artırın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["normal", "harita", "doku", "test", "container-native", "başlangıç"], "badge1": "Başlangıç", "content": "## Normal Harita Oluşturma\n1.  Gri tonlamalı yükseklik/gürültü haritasını alın.\n2.  Her piksel için komşu piksellerle yükseklik farklarını hesaplayın (dx, dy).\n3.  Normal vektörünü (-dx, -dy, 1) formülüyle oluşturun.\n4.  Vektörü normalize edin ve RGB renklerine dönüştürün (x->R, y->G, z->B).\n5.  Görselleştirmek için 0.5 ile toplayıp 0.5 ile çarpın.\n\n## Uygulama Senaryosu (Container-Native)\n\nBu düzeni, test alanında Normal Harita Üretimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Normal Harita Üretimi akışını container-native yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 241, "no": "241", "cat": "Doku & Malzeme Üretimi", "name": "Dağıtık Renk Paleti Oluşturma Yapısı", "desc": "caching bağlamında Renk Paleti Oluşturma için dağıtık bir yapısı. Yükseklik veya gürültü değerlerine göre dinamik ve uyumlu renk paletleri oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["renk", "palet", "gradient", "caching", "dağıtık", "i̇leri"], "badge1": "İleri", "content": "## Dinamik Renk Paleti\n1.  Arazi veya gürültü değerlerini 0-1 aralığına normalize edin.\n2.  Belirli eşik değerleri ve bu eşiklere karşılık gelen renkler tanımlayın (örn. 0.2:mavi, 0.4:yeşil, 0.7:kahverengi).\n3.  Normalize edilmiş değere göre bu renkler arasında enterpolasyon yapın.\n4.  Gürültü varyasyonlarına göre ince renk geçişleri ekleyin.\n\n## Uygulama Senar ", "fraktal", "karmaşık", "akış", "pratik", "orta"], "badge1": "Orta", "content": "## Fraktal Gürültü Katmanlama\n1.  Temel gürültü fonksiyonunu (örn. Perlin/Simplex) seçin.\n2.  Farklı frekans (octave) ve genlik (amplitude) değerleri tanımlayın.\n3.  Her octave için gürültü değerini hesaplayın.\n4.  Tüm octave değerlerini toplayarak nihai gürültüyü elde edin.\n\n## Uygulama Senaryosu (Pratik)\n\nBu modeli, akış alanında Çok Katmanlı Gürültü problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çok Katmanlı Gürültü akışını pratik yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 246, "no": "246", "cat": "Arazi & Yükseklik Haritaları", "name": "Bağlamsal Yükseklik Haritası Oluşturma Stratejisi", "desc": "mimari bağlamında Yükseklik Haritası Oluşturma için bağlamsal bir stratejisi. Perlin/Simplex gürültüsü kullanarak gerçekçi yükseklik haritaları ve araziler üretin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["arazi", "yükseklik", "harita", "mimari", "bağlamsal", "pro"], "badge1": "Pro", "content": "## Yükseklik Haritası Oluşturma\n1.  Gürültü fonksiyonunu (örn. Perlin) seçin.\n2.  Harita koordinatlarını bu fonksiyona girdi olarak verin.\n3.  Gürültü çıkışını 0-1 aralığında normalize edin.\n4.  Normalize edilmiş değeri yükseklik olarak kullanın.\n5.  Birden fazla gürültü katmanı ekleyerek detayları artırın.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Pro seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Yükseklik Haritası Oluşturma senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Yükseklik Haritası Oluşturma işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde Yükseklik Haritası Oluşturma ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** arazi, yükseklik, harita\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 247, "no": "247", "cat": "Arazi & Yükseklik Haritaları", "name": "Composable Hidrolik Erozyon Simülasyonu Akışı", "desc": "mühendislik bağlamında Hidrolik Erozyon Simülasyonu için composable bir akışı. Su akışını simüle ederek arazide gerçekçi erozyon izleri ve birikintiler oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["erozyon", "hidrolik", "arazi", "mühendislik", "composable", "başlangıç"], "badge1": "Başlangıç", "content": "## Hidrolik Erozyon Adımları\n1.  Arazide rastgele su damlaları bırakın.\n2.  Her damlanın eğim boyunca akış yolunu simüle edin.\n3.  Akarken toprağı aşındırın ve tortuyu taşıyın.\n4.  Damla durduğunda tortuyu biriktirin veya buharlaştırın.\n5.  Bu işlemi binlerce damla için tekrarlayın.\n\n## Genişletilmiş Notlar (Composable)\n\n- **Hedef Kitle:** Başlangıç seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Hidrolik Erozyon Simülasyonu senaryoları\n- **Avantajları:** Bu akışı sayesinde Hidrolik Erozyon Simülasyonu işlemleri daha composable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yan ashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 249, "no": "249", "cat": "Zindan & Mekan Düzenleri", "name": "Event-Sourced Oda-Koridor Zindan Üretimi Yönergesi", "desc": "mikroservis bağlamında Oda-Koridor Zindan Üretimi için event-sourced bir yönergesi. Rastgele odalar ve bunları birbirine bağlayan koridorlar ile klasik zindan düzenleri oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["zindan", "oda-koridor", "harita", "mikroservis", "event-sourced", "başlangıç"], "badge1": "Başlangıç", "content": "## Zindan Oluşturma Algoritması\n1.  Rastgele boyutlarda ve konumlarda odalar yerleştirin (çakışmasın).\n2.  Odaları minimum Spanning Tree (MST) ile bağlayın.\n3.  MST'deki her kenar için iki odayı birleştiren koridorlar çizin.\n4.  Zindan duvarlarını ve zemini oluşturun.\n\n## Genişletilmiş Notlar (Event-Sourced)\n\n- **Hedef Kitle:** Başlangıç seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Oda-Koridor Zindan Üretimi senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Oda-Koridor Zindan Üretimi işlemleri daha event-sourced hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Oda-Koridor Zindan Üretimi ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zindan, oda-koridor, harita\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 250, "no": "250", "cat": "Zindan & Mekan Düzenleri", "name": "Kullanıcı-Merkezli Hücresel Otomat Haritası Kalıbı", "desc": "mikroservis bağlamında Hücresel Otomat Haritası için kullanıcı-merkezli bir kalıbı. Hücresel otomat kurallarıyla doğal mağara sistemleri veya organik duvar desenleri üretin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["hücresel", "mağara", "otomat", "mikroservis", "kullanıcı-merkezli", "pro"], "badge1": "Pro", "content": "## Hücresel Otomat Adımları\n1.  Haritayı rastgele doldurun (örn. %45 duvar, %55 boş).\n2.  Her hücre için komşularının sayısını kontrol edin.\n3.  Belirli kurallara göre hücrenin durumunu değiştirin (örn. 4+ komşu duvar ise duvar ol).\n4.  Bu adımları birkaç kez yineleyerek pürüzsüzleştirin.\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu kalıbı, mikroservis alanında Hücresel Otomat Haritası problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Hücresel Otomat Haritası akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 251, "no": "251", "cat": "Zindan & Mekan Düzenleri", "name": "Edge-Optimize İkili Ağaç Bölme Mimari Yaklaşımı", "desc": "logging bağlamında İkili Ağaç Bölme için edge-optimize bir mimari yaklaşımı. Bir alanı ikili ağaç bölme kullanarak hiyerarşik odalara ayırın, sonra bunları bağlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["bsp", "oda", "bölme", "logging", "edge-optimize", "orta"], "badge1": "Orta", "content": "## BSP Oda Üretimi\n1.  Ana alanı rastgele bir yönde (yatay/dikey) ikiye bölün.\n2.  Her alt alanı tekrar bölme eşiğine ulaşana kadar yineleyin.\n3.  Her yaprak düğüme (en küçük alan) bir oda yerleştirin.\n4.  Komşu odaları koridorlarla birleştirin.\n\n## Uygulama Senaryosu (Edge-Optimize)\n\nBu mimari yaklaşımı, logging alanında İkili Ağaç Bölme problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İkili Ağaç Bölme akışını edge-optimize yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 252, "no": "252", "cat": "Zindan & Mekan Düzenleri", "name": "Self-Healing Dinamik Labirent Üretimi Çerçevesi", "desc": "arayüz bağlamında Dinamik Labirent Üretimi için self-healing bir çerçevesi. Derinlik Öncelikli Arama (DFS) kullanarak karmaşık ve çözülebilir labirentler oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["labirent", "dfs", "algoritma", "arayüz", "self-healing", "orta"], "badge1": "Orta", "content": "## DFS Labirent Algoritması\n1.  Bir başlangıç hücresi seçin ve ziyaret edildi olarak işaretleyin.\n2.  Geçerli hücreden rastgele bir komşu hücre seçin.\n3.  Eğer komşu hücre ziyaret edilmemişse, aradaki duvarı yıkın.\n4.  Komşu hücreyi mevcut hücre yapıp adıma devam edin.\n5.  Çıkmaza ulaşıldığında geri dönün ve farklı bir yol deneyin.\n\n## Genişletilmiş Notlar (Self-Healing)\n\n- **Hedef Kitle:** Orta seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Dinamik Labirent Üretimi senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Dinamik Labirent Üretimi işlemleri daha self-healing hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Dinamik Labirent Üretimi ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** labirent, dfs, algoritma\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 253, "no": "253", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Observable Poisson Diski Dağılımı Çerçevesi", "desc": "performans bağlamında Poisson Diski Dağılımı için observable bir çerçevesi. Detayları (ağaç, kaya) düzenli ama rastgele bir şekilde dağıtarak görsel uyumu sağlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["dağılım", "poisson", "detay", "performans", "observable", "başlangıç"], "badge1": "Başlangıç", "content": "## Poisson Diski Dağılımı\n1.  İlk noktayı rastgele yerleştirin.\n2.  Her yeni nokta için, mevcut noktaların minimum yarıçapından daha uzak olmasını sağlayın.\n3.  Mevcut noktaların etrafına \"aday halkaları\" çizin.\n4.  Bu halkalardan rastgele noktalar seçerek yeni geçerli noktalar ekleyin.\n\n## Uygulama Senaryosu (Observable)\n\nBu çerçevesi, performans alanında Poisson Diski Dağılımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Poisson Diski Dağılımı akışını observable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 254, "no": "254", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Zero-Config Düşey Ağaç Yerleşimi Kılavuzu", "desc": "arayüz bağlamında Düşey Ağaç Yerleşimi için zero-config bir kılavuzu. Yükseklik haritası ve eğim verilerini kullanarak ağaçları gerçekçi konumlara yerleştirin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "bitki", "yerleşim", "arayüz", "zero-config", "uzman"], "badge1": "Uzman", "content": "## Ağaç Yerleşimi Kuralları\n1.  Yükseklik haritası üzerinde belirli bir yükseklik aralığı tanımlayın (örn. deniz seviyesi üstü).\n2.  Eğim haritası üzerinde çok dik yamaçlardan kaçının.\n3.  Perlin gürültüsü kullanarak ağaç yoğunluğunu belirleyin.\n4.  Belirlenen uygun alanlara ağaç modellerini rastgele yerleştirin.\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** Uzman seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Düşey Ağaç Yerleşimi senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde Düşey Ağaç Yerleşimi işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Düşey Ağaç Yerleşimi ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ağaç, bitki, yerleşim\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 255, "no": "255", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Sıfır-Trust Rastgele Kaya Dağılımı Sözleşmesi", "desc": "mühendislik bağlamında Rastgele Kaya Dağılımı için sıfır-trust bir sözleşmesi. Arazide rastgele boyutlarda ve yönlerde kaya modellerini estetik olarak dağıtın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["kaya", "dağılım", "detay", "mühendislik", "sıfır-trust", "pro"], "badge1": "Pro", "content": "## Kaya Dağılımı Yöntemi\n1.  Arazi üzerinde rastgele noktalar seçin.\n2.  Bu noktaların arazi eğimini kontrol edin; çok dik yerlerden kaçının.\n3.  Her kaya için rastgele bir ölçek ve dönüş değeri atayın.\n4.  Kaya modellerini seçilen noktalara yerleştirin.\n5.  Gürültü kullanarak kaya yoğunluğunu kontrol edin.\n\n## Uygulama Senaryosu (Sıfır-Trust)\n\nBu sözleşmesi, mühendislik alanında Rastgele Kaya Dağılımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Rastgele Kaya Dağılımı akışını sıfır-trust yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 256, "no": "256", "cat": "Fraktal & Organik Modeller", "name": "Mikroservis L-Sistem Ağaç Oluşturma Kalıbı", "desc": "performans bağlamında L-Sistem Ağaç Oluşturma için mikroservis bir kalıbı. L-Sistem kuralları kullanarak organik ve dallı ağaç yapılarını prosedürel olarak üretin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["l-sistem", "fraktal", "ağaç", "performans", "mikroservis", "pro"], "badge1": "Pro", "content": "## L-Sistem Ağaç Algoritması\n1.  Başlangıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.\n\n## Uygulama Senaryosu (Mikroservis)\n\nBu kalıbı, performans alanında L-Sistem Ağaç Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** L-Sistem Ağaç Oluşturma akışını mikroservis yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 257, "no": "257", "cat": "Fraktal & Organik Modeller", "name": "Reactive Mandelbrot Fraktalı Görselleştirme Şablonu", "desc": "entegrasyon bağlamında Mandelbrot Fraktalı Görselleştirme için reactive bir şablonu. Mandelbrot kümesini görselleştirerek karmaşık ve sonsuz detaylara sahip fraktal desenler oluşturun. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["fraktal", "mandelbrot", "görsel", "entegrasyon", "reactive", "pro"], "badge1": "Pro", "content": "## Mandelbrot Kümesi Çizimi\n1.  Ekrandaki her pikseli bir kompleks sayıya (c) dönüştürün.\n2.  z = z^2 + c formülünü z=0'dan başlayarak tekrarla.\n3.  Eğer |z| belirli bir eşiği (örn. 2) aşarsa, iterasyon sayısına göre pikseli renklendir.\n4.  Aşmazsa, siyah renkle çizerek kümenin içini gösterin.\n\n## Genişletilmiş Notlar (Reactive)\n\n- **Hedef Kitle:** Pro seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Mandelbrot Fraktalı Görselleştirme senaryoları\n- **Avantajları:** Bu şablonu sayesinde Mandelbrot Fraktalı Görselleştirme işlemleri daha reactive hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Mandelbrot Fraktalı Görselleştirme ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** fraktal, mandelbrot, görsel\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 258, "no": "258", "cat": "Fraktal & Organik Modeller", "name": "Production-Grade Fraktal Bulut Modelleme Anlaşması", "desc": "logging bağlamında Fraktal Bulut Modelleme için production-grade bir anlaşması. Çok katmanlı gürültü fonksiyonlarını kullanarak gerçekçi ve dinamik bulut şekilleri üretin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["bulut", "fraktal", "atmosfer", "logging", "production-grade", "uzman"], "badge1": "Uzman", "content": "## Fraktal Bulut Modelleme\n1.  3D Perlin veya Simplex gürültüsü kullanın.\n2.  Farklı frekans ve genliklerde birden fazla katmanı birleştirin (fbm).\n3.  Gürültü hacmini bir eşik değeri ile filtreleyerek bulutların yoğunluğunu belirleyin.\n4.  Bulutların hareketini simüle etmek için zamanla gürültü ofsetini değiştirin.\n\n## Genişletilmiş Notlar (Production-Grade)\n\n- **Hedef Kitle:** Uzman seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Fraktal Bulut Modelleme senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Fraktal Bulut Modelleme işlemleri daha production-grade hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Fraktal Bulut Modelleme ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** bulut, fraktal, atmosfer\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 259, "no": "259", "cat": "Doku & Malzeme Üretimi", "name": "Kullanıcı-Merkezli Prosedürel Taş Dokusu Mimari Yaklaşımı", "desc": "akış bağlamında Prosedürel Taş Dokusu için kullanıcı-merkezli bir mimari yaklaşımı. Gürültü fonksiyonlarını birleştirerek benzersiz ve tekrar etmeyen taş dokuları oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "taş", "malzeme", "akış", "kullanıcı-merkezli", "i̇leri"], "badge1": "İleri", "content": "## Prosedürel Taş Dokusu\n1.  Temel olarak Perlin gürültüsü kullanın.\n2.  Worley gürültüsünü (Voronoi) ekleyerek çatlak ve hücre efektleri yaratın.\n3.  Farklı ölçeklerde gürültüleri karıştırarak yüzey detaylarını artırın.\n4.  Normal harita için gürültü değerlerinin türevlerini kullanın.\n5.  Renk paletini taş tonlarına göre ayarlayın.\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu mimari yaklaşımı, akış alanında Prosedürel Taş Dokusu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Prosedürel Taş Dokusu akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ö ure flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** normal, harita, doku\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 261, "no": "261", "cat": "Doku & Malzeme Üretimi", "name": "Kanıt-Tabanlı Renk Paleti Oluşturma Kalıbı", "desc": "ölçeklenme bağlamında Renk Paleti Oluşturma için kanıt-tabanlı bir kalıbı. Yükseklik veya gürültü değerlerine göre dinamik ve uyumlu renk paletleri oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["renk", "palet", "gradient", "ölçeklenme", "kanıt-tabanlı", "orta"], "badge1": "Orta", "content": "## Dinamik Renk Paleti\n1.  Arazi veya gürültü değerlerini 0-1 aralığına normalize edin.\n2.  Belirli eşik değerleri ve bu eşiklere karşılık gelen renkler tanımlayın (örn. 0.2:mavi, 0.4:yeşil, 0.7:kahverengi).\n3.  Normalize edilmiş değere göre bu renkler arasında enterpolasyon yapın.\n4.  Gürültü varyasyonlarına göre ince renk geçişleri ekleyin.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu kalıbı, ölçeklenme alanında Renk Paleti Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Renk Paleti Oluşturma akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 262, "no": "262", "cat": "Gürültü Algoritmaları", "name": "Hibrit Perlin Gürültüsü Temelleri Standartı", "desc": "test bağlamında Perlin Gürültüsü Temelleri içi man seviye kullanıcılar için optimize edilmiştir.", "tags": ["dağılım", "poisson", "detay", "dağıtım", "container-native", "uzman"], "badge1": "Uzman", "content": "## Poisson Diski Dağılımı\n1.  İlk noktayı rastgele yerleştirin.\n2.  Her yeni nokta için, mevcut noktaların minimum yarıçapından daha uzak olmasını sağlayın.\n3.  Mevcut noktaların etrafına \"aday halkaları\" çizin.\n4.  Bu halkalardan rastgele noktalar seçerek yeni geçerli noktalar ekleyin.\n\n## Uygulama Senaryosu (Container-Native)\n\nBu tasarımı, dağıtım alanında Poisson Diski Dağılımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Poisson Diski Dağılımı akışını container-native yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 274, "no": "274", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Idempotent Düşey Ağaç Yerleşimi Standartı", "desc": "logging bağlamında Düşey Ağaç Yerleşimi için idempotent bir standartı. Yükseklik haritası ve eğim verilerini kullanarak ağaçları gerçekçi konumlara yerleştirin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "bitki", "yerleşim", "logging", "idempotent", "pro"], "badge1": "Pro", "content": "## Ağaç Yerleşimi Kuralları\n1.  Yükseklik haritası üzerinde belirli bir yükseklik aralığı tanımlayın (örn. deniz seviyesi üstü).\n2.  Eğim haritası üzerinde çok dik yamaçlardan kaçının.\n3.  Perlin gürültüsü kullanarak ağaç yoğunluğunu belirleyin.\n4.  Belirlenen uygun alanlara ağaç modellerini rastgele y  "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 283, "no": "283", "cat": "Gürültü Algoritmaları", "name": "Adaptif Simplex Gürültüsü Uygulaması Düzeneği", "desc": "entegrasyon bağlamında Simplex Gürültüsü Uygulaması için adaptif bir düzeneği. Simplex gürültüsü ile Perlin'den daha hızlı ve artifactsız gürültü haritaları oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["gürültü", "simplex", "performans", "entegrasyon", "adaptif", "i̇leri"], "badge1": "İleri", "content": "## Simplex Gürültüsü Adımları\n1.  Giriş koordinatlarını çarpıtarak skew faktörünü uygulayın.\n2.  Bölgeyi bir simpleks (üçgen/tetrahedron) içine yerleştirin.\n3.  Köşe noktalarına göre gradyan hesaplayın.\n4.  Gürültü değerlerini toplamak için ağırlıklı toplam kullanın.\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** İleri seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Simplex Gürültüsü Uygulaması senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Simplex Gürültüsü Uygulaması işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Simplex Gürültüsü Uygulaması ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** gürültü, simplex, performans\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 284, "no": "284", "cat": "Gürültü Algoritmaları", "name": "Bağlamsal Worley Gürültüsü (Voronoi) Sözleşmesi", "desc": "ölçeklenme bağlamında Worley Gürültüsü (Voronoi) için bağlamsal bir söz pılarını prosedürel olarak üretin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["l-sistem", "fraktal", "ağaç", "dağıtım", "self-healing", "pro"], "badge1": "Pro", "content": "## L-Sistem Ağaç Algoritması\n1.  Başlangıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.\n\n## Genişletilmiş Notlar (Self-Healing)\n\n- **Hedef Kitle:** Pro seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde L-Sistem Ağaç Oluşturma senaryoları\n- **Avantajları:** Bu algoritması sayesinde L-Sistem Ağaç Oluşturma işlemleri daha self-healing hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde L-Sistem Ağaç Oluşturma ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** l-sistem, fraktal, ağaç\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 297, "no": "297", "cat": "Fraktal & Organik Modeller", "name": "Container-Native Mandelbrot Fraktalı Görselleştirme Önerisi", "desc": "API bağlamında Mandelbrot Fraktalı Görselleştirme için container-native bir önerisi. Mandelbrot kümesini görselleştirerek karmaşık ve sonsuz detaylara sahip fraktal desenler oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["fraktal", "mandelbrot", "görsel", "API", "contai "Idempotent L-Sistem Ağaç Oluşturma Düzeni", "desc": "logging bağlamında L-Sistem Ağaç Oluşturma için idempotent bir düzeni. L-Sistem kuralları kullanarak organik ve dallı ağaç yapılarını prosedürel olarak üretin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["l-sistem", "fraktal", "ağaç", "logging", "idempotent", "orta"], "badge1": "Orta", "content": "## L-Sistem Ağaç Algoritması\n1.  Başlangıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Orta seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde L-Sistem Ağaç Oluşturma senaryoları\n- **Avantajları:** Bu düzeni sayesinde L-Sistem Ağaç Oluşturma işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde L-Sistem Ağaç Oluşturma ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** l-sistem, fraktal, ağaç\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 317, "no": "317", "cat": "Fraktal & Organik Modeller", "name": "Event-Sourced Mandelbrot Fraktalı Görselleştirme Önerisi", "desc": "caching bağlamında Mandelbrot Fraktalı Görselleştirme için event-sourced bir önerisi. Mandelbrot kümesini görselleştirerek karmaşık ve sonsuz de etimi için production-grade bir şablonu. Yükseklik veya gürültü haritalarından otomatik olarak normal haritalar oluşturarak detayları artırın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["normal", "harita", "doku", "arayüz", "production-grade", "uzman"], "badge1": "Uzman", "content": "## Normal Harita Oluşturma\n1.  Gri tonlamalı yükseklik/gürültü haritasını alın.\n2.  Her piksel için komşu piksellerle yükseklik farklarını hesaplayın (dx, dy).\n3.  Normal vektörünü (-dx, -dy, 1) formülüyle oluşturun.\n4.  Vektörü normalize edin ve RGB renklerine dönüştürün (x->R, y->G, z->B).\n5.  Görselleştirmek için 0.5 ile toplayıp 0.5 ile çarpın.\n\n## Uygulama Senaryosu (Production-Grade)\n\nBu şablonu, arayüz alanında Normal Harita Üretimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Normal Harita Üretimi akışını production-grade yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 341, "no": "341", "cat": "Doku & Malzeme Üretimi", "name": "Kanıt-Tabanlı Renk Paleti Oluşturma Rehberi", "desc": "akış bağlamında Renk Paleti Oluşturma için kanıt-tabanlı bir rehberi. Yükseklik veya gürültü değerlerine göre dinamik ve uyumlu renk paletleri oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["renk", "palet", "gradient", "akış", "kanıt-tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Dinamik Renk Paleti\n1.  Arazi veya gürültü değerlerini 0-1 aralığına normalize edin.\n2.  Belirli
