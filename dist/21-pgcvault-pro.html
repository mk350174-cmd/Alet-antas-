<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">P</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">PGC<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Prosedürel içerik (harita, zindan, arazi) üretimi için matematiksel algoritmalar.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>20</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="PGC ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">20</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

const CATS = [{"id":"Gürültü Algoritmaları","name":"Gürültü Algoritmaları","color":"#4CAF50"},{"id":"Arazi & Yükseklik Haritaları","name":"Arazi & Yükseklik Haritaları","color":"#8BC34A"},{"id":"Zindan & Mekan Düzenleri","name":"Zindan & Mekan Düzenleri","color":"#FFC107"},{"id":"Bitki Örtüsü & Detay Dağılımı","name":"Bitki Örtüsü & Detay Dağılımı","color":"#009688"},{"id":"Fraktal & Organik Modeller","name":"Fraktal & Organik Modeller","color":"#2196F3"},{"id":"Doku & Malzeme Üretimi","name":"Doku & Malzeme Üretimi","color":"#9C27B0"}];
const ITEMS = [{"id":1,"no":"001","cat":"Gürültü Algoritmaları","name":"Perlin Gürültüsü Temelleri","desc":"Temel Perlin gürültüsü fonksiyonunu uygulayarak pürüzsüz rastgele değerler üretin.","tags":["gürültü","perlin","rastgele"],"badge1":"Başlangıç","content":"**Perlin Gürültüsü Temelleri**\n\nKen Perlin'in 1983'te geliştirdiği smooth (yumuşak) prosedürel gürültü algoritması:\n\n```python\nimport numpy as np\nfrom noise import pnoise2  # pip install noise\nimport matplotlib.pyplot as plt\n\n# Temel Perlin gürültüsü haritası\nwidth, height = 256, 256\nscale = 100.0  # Büyük ölçek = daha yumuşak\n\nharita = np.zeros((height, width))\nfor y in range(height):\n    for x in range(width):\n        harita[y][x] = pnoise2(x/scale, y/scale, octaves=6)\n\nplt.imshow(harita, cmap='gray')\nplt.colorbar()\nplt.title('Perlin Noise')\nplt.show()\n```\n\n**Parametreler:**\n| Parametre | Etki | Değer Aralığı |\n|-----------|------|---------------|\n| scale | Zoom seviyesi | 50-200 |\n| octaves | Detay katmanı | 1-8 |\n| persistence | Alt katman etkisi | 0.3-0.7 |\n| lacunarity | Frekans artışı | 1.5-3.0 |\n\n**Özellikler:** Klasik `random()` aksine, Perlin gürültüsü komşu pikseller arasında yumuşak geçiş sağlar. Bu yüzden arazi, bulut, duman gibi organik yapılar için idealdir.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":2,"no":"002","cat":"Gürültü Algoritmaları","name":"Simplex Gürültüsü Uygulaması","desc":"Simplex gürültüsü ile Perlin'den daha hızlı ve artifactsız gürültü haritaları oluşturun.","tags":["gürültü","simplex","performans"],"badge1":"Orta","content":"**Simplex Gürültüsü Uygulaması**\n\nKen Perlin'in Perlin gürültüsünü geliştirdiği daha hızlı, daha az yapay görünümlü versiyon:\n\n```python\nfrom opensimplex import OpenSimplex  # pip install opensimplex\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nsimplex = OpenSimplex(seed=42)\n\ndef simplex_harita(genislik, yukseklik, olcek=0.02, oktav=4):\n    harita = np.zeros((yukseklik, genislik))\n    amp, freq = 1.0, olcek\n    toplam_amp = 0\n    for _ in range(oktav):\n        for y in range(yukseklik):\n            for x in range(genislik):\n                harita[y][x] += simplex.noise2(x * freq, y * freq) * amp\n        toplam_amp += amp\n        amp *= 0.5\n        freq *= 2.0\n    return harita / toplam_amp  # Normalize et\n\nharita = simplex_harita(256, 256)\nplt.imshow(harita, cmap='terrain')\nplt.show()\n```\n\n**Perlin vs. Simplex:**\n| Özellik | Perlin | Simplex |\n|---------|--------|----------|\n| Yön yanlılığı | Yüksek | Düşük |\n| 3D hız | Orta | Hızlı |\n| Görsel kalite | İyi | Daha iyi |\n| Lisans | Açık | Dikkatli (patent) |\n\nMobil oyunlar için Simplex tercih edin.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":3,"no":"003","cat":"Gürültü Algoritmaları","name":"Worley Gürültüsü (Voronoi)","desc":"Hücresel desenler ve kenarlar için Worley (Voronoi) gürültüsü kullanarak doğal görünümler elde edin.","tags":["worley","voronoi","hücresel"],"badge1":"Orta","content":"**Worley Gürültüsü (Voronoi/Cellular Noise)**\n\nSteven Worley'nin hücresel gürültüsü organik, taş, deri, su yüzeyi dokuları için kullanılır:\n\n```python\nimport numpy as np\nimport random\nfrom PIL import Image\n\ndef worley_noise(width, height, n_points=50, seed=42):\n    random.seed(seed)\n    # Rastgele özellik noktaları\n    points = [(random.randint(0, width-1), random.randint(0, height-1))\n              for _ in range(n_points)]\n    \n    harita = np.zeros((height, width))\n    max_dist = np.sqrt(width**2 + height**2)\n    \n    for y in range(height):\n        for x in range(width):\n            # En yakın noktaya olan mesafe\n            distances = [np.sqrt((x-px)**2 + (y-py)**2) for px,py in points]\n            harita[y][x] = sorted(distances)[0] / max_dist\n    \n    return harita\n\n# NumPy vektörizasyonlu (çok daha hızlı)\ndef worley_fast(width, height, n_points=50):\n    points = np.random.rand(n_points, 2) * [width, height]\n    xs, ys = np.meshgrid(np.arange(width), np.arange(height))\n    grid = np.stack([xs, ys], axis=-1)  # (H, W, 2)\n    dists = np.sqrt(((grid[:,:,None,:] - points[None,None,:,:])**2).sum(-1))\n    return dists.min(axis=-1) / np.sqrt(width**2 + height**2)\n\nharita = worley_fast(256, 256)\nImage.fromarray((harita * 255).astype(np.uint8)).save('worley.png')\n```\n\n**Uygulama:** F1-F2 kombinasyonu ile kaya, beton, deri, su yüzeyi ve hücre dokuları üretilir.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":4,"no":"004","cat":"Gürültü Algoritmaları","name":"Çok Katmanlı Gürültü (Octave)","desc":"Birden fazla gürültü katmanını birleştirerek karmaşık ve doğal görünümlü desenler yaratın.","tags":["gürültü","fraktal","karmaşık"],"badge1":"İleri","content":"**Çok Katmanlı Gürültü (Fractal Brownian Motion)**\n\nBirden fazla gürültü katmanını farklı frekans ve amplitüdde bindirerek gerçekçi arazi ve bulut oluşturma:\n\n```python\nfrom noise import pnoise2\nimport numpy as np\n\ndef fbm(x, y, oktav=8, kalicilik=0.5, lakunarite=2.0, olcek=100):\n    \"\"\"\n    Fractal Brownian Motion\n    oktav: Katman sayısı (detay)\n    kalicilik: Her katmanın bir öncekine oranı (0-1)\n    lakunarite: Her katmanın frekans artışı\n    \"\"\"\n    deger = 0.0\n    amplitut = 1.0\n    frekans = 1.0\n    max_deger = 0.0\n    \n    for _ in range(oktav):\n        deger += pnoise2(x * frekans / olcek, y * frekans / olcek) * amplitut\n        max_deger += amplitut\n        amplitut *= kalicilik\n        frekans *= lakunarite\n    \n    return deger / max_deger\n\n# Arazi yükseklik haritası\nwidth, height = 512, 512\narazi = np.array([[fbm(x, y, oktav=8) for x in range(width)] for y in range(height)])\n\n# Karasal/denizsel sınır\nkarabel = np.where(arazi > 0, arazi, 0)  # Kara\ndeniz = np.where(arazi <= 0, arazi, 0)   # Deniz\n```\n\n**Parametre etkisi:** Oktav 1 = yumuşak tümsek, Oktav 8 = detaylı dağ silsilesi.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":5,"no":"005","cat":"Arazi & Yükseklik Haritaları","name":"Yükseklik Haritası Oluşturma","desc":"Perlin/Simplex gürültüsü kullanarak gerçekçi yükseklik haritaları ve araziler üretin.","tags":["arazi","yükseklik","harita"],"badge1":"Başlangıç","content":"**Prosedürel Yükseklik Haritası Oluşturma**\n\n```python\nimport numpy as np\nfrom noise import pnoise2\nfrom PIL import Image\nimport matplotlib.pyplot as plt\nfrom matplotlib.colors import LightSource\n\ndef yukseklik_haritasi(genislik=512, yukseklik=512, olcek=200,\n                        oktav=8, kalicilik=0.5):\n    harita = np.zeros((yukseklik, genislik))\n    for y in range(yukseklik):\n        for x in range(genislik):\n            nx, ny = x / olcek, y / olcek\n            harita[y][x] = pnoise2(nx, ny, octaves=oktav,\n                                    persistence=kalicilik,\n                                    repeatx=genislik, repeaty=yukseklik)\n    # -1..1 aralığından 0..1'e normalize et\n    harita = (harita - harita.min()) / (harita.max() - harita.min())\n    return harita\n\ndef gorselleştir_3d(harita):\n    ls = LightSource(azdeg=315, altdeg=45)\n    rgb = ls.shade(harita, cmap=plt.cm.terrain,\n                   vert_exag=2, blend_mode='soft')\n    plt.figure(figsize=(10, 10))\n    plt.imshow(rgb)\n    plt.axis('off')\n    plt.title('Prosedürel Arazi')\n    plt.show()\n\nharita = yukseklik_haritasi()\ngorselleştir_3d(harita)\n\n# PNG olarak kaydet (16-bit — Unity/UE için)\nImage.fromarray((harita * 65535).astype(np.uint16)).save('heightmap.png')\n```\n\nUnity'de kullanım: Terrain → Import Heightmap → heightmap.png","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":6,"no":"006","cat":"Arazi & Yükseklik Haritaları","name":"Hidrolik Erozyon Simülasyonu","desc":"Su akışını simüle ederek arazide gerçekçi erozyon izleri ve birikintiler oluşturun.","tags":["erozyon","hidrolik","arazi"],"badge1":"İleri","content":"**Hidrolik Erozyon Simülasyonu**\n\nSu akışının arazi üzerindeki aşındırma etkisini simüle ederek gerçekçi vadi ve nehir yatak dokuları oluşturun:\n\n```python\nimport numpy as np\n\ndef hidrolik_erozyon(harita, iterasyon=50000, \n                     inertia=0.05, kapasite=4, erozyon=0.3, depolama=0.3):\n    harita = harita.copy().astype(float)\n    yukseklik, genislik = harita.shape\n    \n    for _ in range(iterasyon):\n        # Rastgele damla konumu\n        x = np.random.randint(1, genislik-1)\n        y = np.random.randint(1, yukseklik-1)\n        hiz_x, hiz_y = 0.0, 0.0\n        su = 1.0\n        tortu = 0.0\n        \n        for adim in range(30):  # Damla ömrü\n            # Eğim hesabı (Sobel benzeri)\n            dx = (harita[y, x+1] - harita[y, x-1]) / 2\n            dy = (harita[y+1, x] - harita[y-1, x]) / 2\n            egim = np.sqrt(dx**2 + dy**2) + 1e-6\n            \n            # Hız güncelleme\n            hiz_x = hiz_x * (1-inertia) - dx / egim * inertia\n            hiz_y = hiz_y * (1-inertia) - dy / egim * inertia\n            \n            # Sediment taşıma kapasitesi\n            kapasite_max = max(egim * su * np.sqrt(hiz_x**2+hiz_y**2), 0.01) * kapasite\n            \n            if tortu > kapasite_max:\n                deposit = (tortu - kapasite_max) * depolama\n                harita[y, x] += deposit\n                tortu -= deposit\n            else:\n                erode = min((kapasite_max - tortu) * erozyon, egim)\n                harita[y, x] -= erode\n                tortu += erode\n            \n            x = int(np.clip(x + hiz_x, 1, genislik-2))\n            y = int(np.clip(y + hiz_y, 1, yukseklik-2))\n    \n    return harita\n```\n\n50.000 iterasyon tipik 256×256 harita için yeterli.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":7,"no":"007","cat":"Arazi & Yükseklik Haritaları","name":"Termal Erozyon Simülasyonu","desc":"Eğimli yamaçlarda toprak kaymasını simüle ederek araziyi yumuşatın ve gerçekçiliği artırın.","tags":["erozyon","termal","arazi"],"badge1":"Orta","content":"**Termal Erozyon Simülasyonu**\n\nDağlarda kayaların kırılıp aşağı düşmesi (talus formation) etkisini simüle eder — köşeli yamaçları yumuşatır:\n\n```python\nimport numpy as np\n\ndef termal_erozyon(harita, iterasyon=100, esik=4.0/256, oran=0.5):\n    \"\"\"\n    harita: 2D numpy array (normalize 0-1)\n    esik: Erozyon başlangıç açısı (eğim)\n    oran: Material aktarım oranı\n    \"\"\"\n    harita = harita.copy()\n    yukseklik, genislik = harita.shape\n    \n    # 4 komşu yön: sağ, sol, aşağı, yukarı\n    yonler = [(0,1),(0,-1),(1,0),(-1,0)]\n    \n    for _ in range(iterasyon):\n        yeni_harita = harita.copy()\n        for y in range(1, yukseklik-1):\n            for x in range(1, genislik-1):\n                max_fark = 0\n                max_yön = None\n                for dy, dx in yonler:\n                    fark = harita[y,x] - harita[y+dy, x+dx]\n                    if fark > max_fark:\n                        max_fark = fark\n                        max_yön = (dy, dx)\n                \n                if max_fark > esik and max_yön:\n                    aktarim = oran * (max_fark - esik)\n                    yeni_harita[y, x] -= aktarim\n                    yeni_harita[y+max_yön[0], x+max_yön[1]] += aktarim\n        \n        harita = yeni_harita\n    \n    return harita\n\n# Hidrolik + Termal kombinasyonu gerçekçi arazi verir\nfrom noise import pnoise2\narazi = yukseklik_haritasi()  # Önceki fonksiyon\narazi_erozyon = termal_erozyon(hidrolik_erozyon(arazi))\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":8,"no":"008","cat":"Zindan & Mekan Düzenleri","name":"Oda-Koridor Zindan Üretimi","desc":"Rastgele odalar ve bunları birbirine bağlayan koridorlar ile klasik zindan düzenleri oluşturun.","tags":["zindan","oda-koridor","harita"],"badge1":"Başlangıç","content":"**Oda-Koridor Zindan Üretimi (Dungeon Generation)**\n\nRoguelike oyunlar için klasik oda + koridor prosedürel harita:\n\n```python\nimport numpy as np\nimport random\n\nclass Oda:\n    def __init__(self, x, y, genislik, yukseklik):\n        self.x, self.y = x, y\n        self.g, self.y2 = genislik, yukseklik\n        self.merkez = (x + genislik//2, y + yukseklik//2)\n    \n    def kesisiyor_mu(self, diger, margin=1):\n        return (self.x - margin <= diger.x + diger.g and\n                self.x + self.g + margin >= diger.x and\n                self.y - margin <= diger.y + diger.y2 and\n                self.y + self.y2 + margin >= diger.y)\n\ndef zindan_uret(genislik=80, yukseklik=50, oda_sayisi=20):\n    harita = np.ones((yukseklik, genislik), dtype=int)  # 1=duvar\n    odalar = []\n    \n    for _ in range(oda_sayisi * 3):\n        oda_g = random.randint(5, 12)\n        oda_y = random.randint(4, 10)\n        x = random.randint(1, genislik - oda_g - 1)\n        y = random.randint(1, yukseklik - oda_y - 1)\n        yeni = Oda(x, y, oda_g, oda_y)\n        \n        if not any(yeni.kesisiyor_mu(o) for o in odalar):\n            odalar.append(yeni)\n            harita[y:y+oda_y, x:x+oda_g] = 0  # 0=zemin\n        \n        if len(odalar) >= oda_sayisi:\n            break\n    \n    # Odaları koridorlarla bağla\n    for i in range(len(odalar)-1):\n        mx1, my1 = odalar[i].merkez\n        mx2, my2 = odalar[i+1].merkez\n        # L-şekli koridor\n        harita[min(my1,my2):max(my1,my2)+1, mx1] = 0  # Dikey\n        harita[my2, min(mx1,mx2):max(mx1,mx2)+1] = 0  # Yatay\n    \n    return harita, odalar\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":9,"no":"009","cat":"Zindan & Mekan Düzenleri","name":"Hücresel Otomat Haritası","desc":"Hücresel otomat kurallarıyla doğal mağara sistemleri veya organik duvar desenleri üretin.","tags":["hücresel","mağara","otomat"],"badge1":"Orta","content":"**Hücresel Otomat ile Mağara Haritası**\n\nConway Oyunu benzeri kural seti ile organik mağara oluşturma:\n\n```python\nimport numpy as np\nimport random\n\ndef magara_uret(genislik=100, yukseklik=60,\n                doldurma_orani=0.45, iterasyon=5):\n    \"\"\"\n    0 = zemin (açık), 1 = duvar\n    \"\"\"\n    # Rastgele başlangıç\n    harita = np.zeros((yukseklik, genislik), dtype=int)\n    harita[1:-1, 1:-1] = np.random.choice(\n        [0, 1], size=(yukseklik-2, genislik-2),\n        p=[1-doldurma_orani, doldurma_orani]\n    )\n    harita[0,:] = harita[-1,:] = harita[:,0] = harita[:,-1] = 1  # Kenar\n    \n    def komsu_duvar_say(h, x, y):\n        sayi = 0\n        for dy in range(-1, 2):\n            for dx in range(-1, 2):\n                if dy == 0 and dx == 0: continue\n                ny, nx = y+dy, x+dx\n                if 0 <= ny < yukseklik and 0 <= nx < genislik:\n                    sayi += h[ny, nx]\n                else:\n                    sayi += 1  # Kenar = duvar\n        return sayi\n    \n    # Smoothing iterasyonları\n    for _ in range(iterasyon):\n        yeni = harita.copy()\n        for y in range(1, yukseklik-1):\n            for x in range(1, genislik-1):\n                komsu = komsu_duvar_say(harita, x, y)\n                yeni[y, x] = 1 if komsu >= 5 else 0\n        harita = yeni\n    \n    return harita\n```\n\n4-5 iterasyon organik mağara şekli için ideal.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":10,"no":"010","cat":"Zindan & Mekan Düzenleri","name":"İkili Ağaç Bölme (BSP) ile Oda Üretimi","desc":"Bir alanı ikili ağaç bölme kullanarak hiyerarşik odalara ayırın, sonra bunları bağlayın.","tags":["bsp","oda","bölme"],"badge1":"İleri","content":"**İkili Uzay Bölme (BSP) ile Oda Üretimi**\n\nMekânı özyinelemeli olarak ikiye bölerek birbirine yakın ama çakışmayan odalar üretin:\n\n```python\nimport random\nfrom dataclasses import dataclass\nfrom typing import Optional, List\n\n@dataclass\nclass BSPNode:\n    x: int; y: int; w: int; h: int\n    sol: Optional['BSPNode'] = None\n    sag: Optional['BSPNode'] = None\n    oda: Optional[tuple] = None\n\ndef bsp_bol(node, min_boyut=8, maksimum_derinlik=5, derinlik=0):\n    if derinlik >= maksimum_derinlik:\n        return\n    \n    # Yatay mı dikey mi böl?\n    if node.w > node.h:\n        # Dikey bölme\n        bolme = random.randint(min_boyut, node.w - min_boyut)\n        node.sol = BSPNode(node.x, node.y, bolme, node.h)\n        node.sag = BSPNode(node.x + bolme, node.y, node.w - bolme, node.h)\n    else:\n        # Yatay bölme\n        bolme = random.randint(min_boyut, node.h - min_boyut)\n        node.sol = BSPNode(node.x, node.y, node.w, bolme)\n        node.sag = BSPNode(node.x, node.y + bolme, node.w, node.h - bolme)\n    \n    bsp_bol(node.sol, min_boyut, maksimum_derinlik, derinlik+1)\n    bsp_bol(node.sag, min_boyut, maksimum_derinlik, derinlik+1)\n\ndef yaprak_oda_uret(node):\n    \"\"\"Yaprak node'lara oda yerleştir\"\"\"\n    if node.sol is None and node.sag is None:\n        # Yaprak — oda ekle\n        pad = 2\n        rx = node.x + pad\n        ry = node.y + pad\n        rw = max(4, node.w - pad*2)\n        rh = max(4, node.h - pad*2)\n        node.oda = (rx, ry, rw, rh)\n        return\n    if node.sol: yaprak_oda_uret(node.sol)\n    if node.sag: yaprak_oda_uret(node.sag)\n\nkok = BSPNode(0, 0, 80, 50)\nbsp_bol(kok)\nyaprak_oda_uret(kok)\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":11,"no":"011","cat":"Zindan & Mekan Düzenleri","name":"Dinamik Labirent Üretimi (DFS)","desc":"Derinlik Öncelikli Arama (DFS) kullanarak karmaşık ve çözülebilir labirentler oluşturun.","tags":["labirent","dfs","algoritma"],"badge1":"Orta","content":"**Dinamik Labirent Üretimi (DFS / Recursive Backtracking)**\n\nDerinlik öncelikli arama ile mükemmel (çıkmaz olmayan, tek yol) labirent üretimi:\n\n```python\nimport numpy as np\nimport random\nfrom collections import deque\n\ndef labirent_uret(satir, sutun):\n    \"\"\"\n    2*satir+1 x 2*sutun+1 boyutunda labirent\n    0=yol, 1=duvar\n    \"\"\"\n    y_boyut = 2 * satir + 1\n    x_boyut = 2 * sutun + 1\n    labirent = np.ones((y_boyut, x_boyut), dtype=int)\n    \n    # Hücre koordinatları (labirent grid = (2i+1, 2j+1))\n    def hucre(r, c):\n        return 2*r+1, 2*c+1\n    \n    def duvar_kaldir(r1, c1, r2, c2):\n        # İki hücre arasındaki duvarı kaldır\n        duvar_r = r1 + r2 + 2  # Orta satır\n        duvar_c = c1 + c2 + 2  # Orta sütun\n        labirent[duvar_r, duvar_c] = 0\n    \n    ziyaret = set()\n    yigin = [(0, 0)]\n    \n    while yigin:\n        r, c = yigin[-1]\n        cr, cc = hucre(r, c)\n        labirent[cr, cc] = 0\n        \n        if (r, c) not in ziyaret:\n            ziyaret.add((r, c))\n        \n        # Ziyaret edilmemiş komşular\n        komsu = []\n        for dr, dc in [(-1,0),(1,0),(0,-1),(0,1)]:\n            nr, nc = r+dr, c+dc\n            if 0 <= nr < satir and 0 <= nc < sutun and (nr,nc) not in ziyaret:\n                komsu.append((nr, nc))\n        \n        if komsu:\n            nr, nc = random.choice(komsu)\n            # Aralarındaki duvarı kaldır\n            labirent[r+nr+2, c+nc+2] = 0  # (Basitleştirilmiş)\n            yigin.append((nr, nc))\n        else:\n            yigin.pop()  # Backtrack\n    \n    return labirent\n\nprint(labirent_uret(10, 15))\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":12,"no":"012","cat":"Bitki Örtüsü & Detay Dağılımı","name":"Poisson Diski Dağılımı","desc":"Detayları (ağaç, kaya) düzenli ama rastgele bir şekilde dağıtarak görsel uyumu sağlayın.","tags":["dağılım","poisson","detay"],"badge1":"Orta","content":"**Poisson Disk Sampling ile Doğal Nesne Dağılımı**\n\nBirbirinden minimum mesafede, rastgele görünümlü ama örtüşmeyen noktalar üretme:\n\n```python\nimport numpy as np\nimport random\nimport math\n\ndef poisson_disk(genislik, yukseklik, min_mesafe=20, max_deneme=30):\n    \"\"\"\n    Bridson algoritması O(n) karmaşıklığı\n    \"\"\"\n    hucre_boyut = min_mesafe / math.sqrt(2)\n    ızgara_g = math.ceil(genislik / hucre_boyut)\n    ızgara_y = math.ceil(yukseklik / hucre_boyut)\n    ızgara = [[-1] * ızgara_g for _ in range(ızgara_y)]\n    \n    def izgara_indeks(p):\n        return int(p[0] / hucre_boyut), int(p[1] / hucre_boyut)\n    \n    def gecerli_mi(p):\n        if p[0] < 0 or p[0] >= genislik or p[1] < 0 or p[1] >= yukseklik:\n            return False\n        gx, gy = izgara_indeks(p)\n        for dy in range(-2, 3):\n            for dx in range(-2, 3):\n                nx, ny = gx+dx, gy+dy\n                if 0 <= ny < ızgara_y and 0 <= nx < ızgara_g:\n                    if ızgara[ny][nx] != -1:\n                        mevcut = noktalar[ızgara[ny][nx]]\n                        d = math.hypot(p[0]-mevcut[0], p[1]-mevcut[1])\n                        if d < min_mesafe: return False\n        return True\n    \n    baslangic = (genislik/2, yukseklik/2)\n    noktalar = [baslangic]\n    aktif = [0]\n    gx, gy = izgara_indeks(baslangic)\n    ızgara[gy][gx] = 0\n    \n    while aktif:\n        idx = random.choice(aktif)\n        p = noktalar[idx]\n        ekle = False\n        for _ in range(max_deneme):\n            a = random.uniform(0, 2*math.pi)\n            r = random.uniform(min_mesafe, 2*min_mesafe)\n            yeni = (p[0]+r*math.cos(a), p[1]+r*math.sin(a))\n            if gecerli_mi(yeni):\n                gx, gy = izgara_indeks(yeni)\n                ızgara[gy][gx] = len(noktalar)\n                noktalar.append(yeni)\n                aktif.append(len(noktalar)-1)\n                ekle = True\n                break\n        if not ekle:\n            aktif.remove(idx)\n    \n    return noktalar\n\nnokta_listesi = poisson_disk(800, 600, min_mesafe=25)\nprint(f'{len(nokta_listesi)} nesne yerleştirildi')\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":13,"no":"013","cat":"Bitki Örtüsü & Detay Dağılımı","name":"Düşey Ağaç Yerleşimi","desc":"Yükseklik haritası ve eğim verilerini kullanarak ağaçları gerçekçi konumlara yerleştirin.","tags":["ağaç","bitki","yerleşim"],"badge1":"Başlangıç","content":"**Prosedürel Ağaç Yerleşimi (Dağılım Sistemi)**\n\nPoisson disk + yükseklik haritası + biyom kuralları ile gerçekçi ağaç dağılımı:\n\n```python\nimport numpy as np\nimport random\nimport math\n\ndef agac_dagit(yukseklik_haritasi, yogunluk=0.01,\n               min_yukseklik=0.3, maks_yukseklik=0.85,\n               min_mesafe=8):\n    \"\"\"\n    Yükseklik + eğim bazlı biyom kuralları ile ağaç yerleştir\n    \"\"\"\n    yh, xh = yukseklik_haritasi.shape\n    agaclar = []\n    \n    # Eğim hesabı\n    egim = np.hypot(\n        np.gradient(yukseklik_haritasi, axis=1),\n        np.gradient(yukseklik_haritasi, axis=0)\n    )\n    \n    # Kanditat noktaları oluştur\n    for y in range(min_mesafe, yh - min_mesafe):\n        for x in range(min_mesafe, xh - min_mesafe):\n            h = yukseklik_haritasi[y, x]\n            slope = egim[y, x]\n            \n            # Biyom kuralı: yükseklik ve eğim filtresi\n            if not (min_yukseklik <= h <= maks_yukseklik): continue\n            if slope > 0.3: continue  # Çok dik\n            \n            # Olasılıksal yerleşim\n            agac_olasiligi = yogunluk * (1 - slope/0.3)\n            if random.random() > agac_olasiligi: continue\n            \n            # Minimum mesafe kontrolü\n            cok_yakin = any(\n                math.hypot(x-ax, y-ay) < min_mesafe\n                for ax, ay in agaclar\n            )\n            if not cok_yakin:\n                agaclar.append((x, y))\n    \n    return agaclar\n```\n\nUnity'de her ağaç koordinatına `Instantiate(ağaçPrefab, Vector3(x, h*yükseklik, y), ...)` ile yerleştirin.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":14,"no":"014","cat":"Bitki Örtüsü & Detay Dağılımı","name":"Rastgele Kaya Dağılımı","desc":"Arazide rastgele boyutlarda ve yönlerde kaya modellerini estetik olarak dağıtın.","tags":["kaya","dağılım","detay"],"badge1":"Başlangıç","content":"**Prosedürel Kaya ve Prop Dağılımı**\n\nFarklı prop türlerini biyom ve eğim kurallarına göre dağıtın:\n\n```python\nimport numpy as np\nimport random\nfrom enum import Enum\n\nclass Biyom(Enum):\n    DERIN_SU = 0\n    SIGA = 1\n    KUMSAL = 2\n    OVA = 3\n    ORMAN = 4\n    DAG = 5\n    KAR = 6\n\ndef biyom_belirle(yukseklik, egim):\n    if yukseklik < 0.2: return Biyom.DERIN_SU\n    if yukseklik < 0.3: return Biyom.SIGA\n    if yukseklik < 0.35: return Biyom.KUMSAL\n    if egim > 0.4: return Biyom.DAG\n    if yukseklik > 0.85: return Biyom.KAR\n    if yukseklik < 0.6: return Biyom.OVA\n    return Biyom.ORMAN\n\n# Biyom başına prop kuralları\nPROP_KURALLARI = {\n    Biyom.KUMSAL: {'kaya': 0.02, 'kabuk': 0.05, 'agac': 0.001},\n    Biyom.OVA:    {'ot': 0.15, 'cicek': 0.05, 'kaya': 0.01},\n    Biyom.ORMAN:  {'agac': 0.1, 'ot': 0.2, 'kaya': 0.02},\n    Biyom.DAG:    {'kaya': 0.15, 'kar': 0.05},\n    Biyom.KAR:    {'kar': 0.3, 'kaya': 0.05},\n}\n\ndef prop_dagit(yukseklik_haritasi):\n    egim = np.hypot(np.gradient(yukseklik_haritasi, axis=1),\n                    np.gradient(yukseklik_haritasi, axis=0))\n    proplar = []\n    yh, xh = yukseklik_haritasi.shape\n    \n    for y in range(yh):\n        for x in range(xh):\n            biyom = biyom_belirle(yukseklik_haritasi[y,x], egim[y,x])\n            kurallar = PROP_KURALLARI.get(biyom, {})\n            for prop_turu, olasilik in kurallar.items():\n                if random.random() < olasilik:\n                    proplar.append({'tip': prop_turu, 'x': x, 'y': y,\n                                   'biyom': biyom.name})\n                    break  # Konuma tek prop\n    return proplar\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":15,"no":"015","cat":"Fraktal & Organik Modeller","name":"L-Sistem Ağaç Oluşturma","desc":"L-Sistem kuralları kullanarak organik ve dallı ağaç yapılarını prosedürel olarak üretin.","tags":["l-sistem","fraktal","ağaç"],"badge1":"İleri","content":"## L-Sistem Ağaç Algoritması\n1.  Başlangıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":16,"no":"016","cat":"Fraktal & Organik Modeller","name":"Mandelbrot Fraktalı Görselleştirme","desc":"Mandelbrot kümesini görselleştirerek karmaşık ve sonsuz detaylara sahip fraktal desenler oluşturun.","tags":["fraktal","mandelbrot","görsel"],"badge1":"Orta","content":"**Mandelbrot Fraktalı Görselleştirme**\n\n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom matplotlib.colors import LinearSegmentedColormap\n\ndef mandelbrot_hesapla(c, maks_iter=256):\n    z = 0\n    for i in range(maks_iter):\n        if abs(z) > 2:\n            return i\n        z = z*z + c\n    return maks_iter\n\ndef mandelbrot_harita(xmin=-2.5, xmax=1.0, ymin=-1.25, ymax=1.25,\n                      genislik=800, yukseklik=600, maks_iter=256):\n    x = np.linspace(xmin, xmax, genislik)\n    y = np.linspace(ymin, ymax, yukseklik)\n    C = x[np.newaxis, :] + 1j * y[:, np.newaxis]\n    \n    # NumPy vektörizasyonu ile hızlı hesaplama\n    Z = np.zeros_like(C)\n    M = np.zeros(C.shape, dtype=int)\n    \n    for i in range(maks_iter):\n        maske = np.abs(Z) <= 2\n        Z[maske] = Z[maske]**2 + C[maske]\n        M[maske & (np.abs(Z) > 2)] = i\n    \n    return M\n\nM = mandelbrot_harita(maks_iter=100)\n\n# Renklendirme\nrenkler = ['#000000', '#1a1a6e', '#4a4ae6', '#f0f0ff', '#ffaa00', '#ff4400']\ncmap = LinearSegmentedColormap.from_list('mandel', renkler)\n\nplt.figure(figsize=(12, 8))\nplt.imshow(M, cmap=cmap, extent=[-2.5, 1.0, -1.25, 1.25])\nplt.colorbar(label='İterasyon')\nplt.title('Mandelbrot Fraktalı')\nplt.axis('off')\nplt.show()\n```\n\n**Yakınlaştırma:** `xmin/xmax/ymin/ymax` değerlerini daraltarak sonsuz detaya girin.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":17,"no":"017","cat":"Fraktal & Organik Modeller","name":"Fraktal Bulut Modelleme","desc":"Çok katmanlı gürültü fonksiyonlarını kullanarak gerçekçi ve dinamik bulut şekilleri üretin.","tags":["bulut","fraktal","atmosfer"],"badge1":"İleri","content":"**Fraktal Bulut Modelleme (Diamond-Square Algoritması)**\n\nElmas-Kare algoritması ile gerçekçi bulut ve duman dokuları:\n\n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\n\ndef elmas_kare(n=8, roughness=0.5):\n    \"\"\"\n    2^n + 1 boyutunda fraktal arazi/bulut haritası\n    roughness: Pürüzlülük katsayısı (0.1-0.9)\n    \"\"\"\n    boyut = 2**n + 1\n    harita = np.zeros((boyut, boyut))\n    \n    # Köşeleri başlat\n    harita[0, 0] = harita[0, -1] = harita[-1, 0] = harita[-1, -1] = np.random.uniform(-1, 1)\n    \n    adim = boyut - 1\n    olcek = 1.0\n    \n    while adim > 1:\n        yarim = adim // 2\n        # Diamond adımı\n        for y in range(0, boyut-1, adim):\n            for x in range(0, boyut-1, adim):\n                ort = (harita[y,x] + harita[y+adim,x] +\n                       harita[y,x+adim] + harita[y+adim,x+adim]) / 4\n                harita[y+yarim, x+yarim] = ort + np.random.uniform(-olcek, olcek)\n        \n        # Square adımı\n        for y in range(0, boyut, yarim):\n            for x in range((y + yarim) % adim, boyut, adim):\n                n_count = 0; toplam = 0\n                for dy, dx in [(-yarim,0),(yarim,0),(0,-yarim),(0,yarim)]:\n                    ny, nx = y+dy, x+dx\n                    if 0 <= ny < boyut and 0 <= nx < boyut:\n                        toplam += harita[ny, nx]; n_count += 1\n                harita[y, x] = toplam/n_count + np.random.uniform(-olcek, olcek)\n        \n        adim = yarim\n        olcek *= roughness\n    \n    return harita\n\nbulut = elmas_kare(8, roughness=0.6)\nplt.imshow(bulut, cmap='Blues')\nplt.show()\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":18,"no":"018","cat":"Doku & Malzeme Üretimi","name":"Prosedürel Taş Dokusu","desc":"Gürültü fonksiyonlarını birleştirerek benzersiz ve tekrar etmeyen taş dokuları oluşturun.","tags":["doku","taş","malzeme"],"badge1":"Orta","content":"**Prosedürel Taş Dokusu Üretimi**\n\nWorley + FBM kombinasyonu ile taş, beton, mermer gibi doğal doku:\n\n```python\nimport numpy as np\nfrom noise import pnoise2\nfrom PIL import Image\n\ndef tas_dokusu(genislik=256, yukseklik=256, n_points=30, seed=42):\n    np.random.seed(seed)\n    nokta_x = np.random.rand(n_points) * genislik\n    nokta_y = np.random.rand(n_points) * yukseklik\n    \n    # Voronoi mesafe haritası\n    xs, ys = np.meshgrid(np.arange(genislik), np.arange(yukseklik))\n    dists = np.sqrt(\n        (xs[:,:,None] - nokta_x)**2 + (ys[:,:,None] - nokta_y)**2\n    )\n    f1 = dists.min(axis=2)  # En yakın mesafe\n    f2 = np.sort(dists, axis=2)[:,:,1]  # İkinci yakın\n    \n    # F2-F1 = çatlak kenarları\n    voronoi = (f2 - f1) / (f2 + f1 + 1e-6)\n    voronoi = voronoi / voronoi.max()\n    \n    # FBM gürültüsü ile birleştir\n    gürültü = np.array([[pnoise2(x/80, y/80, octaves=4)\n                         for x in range(genislik)]\n                        for y in range(yukseklik)])\n    gürültü = (gürültü - gürültü.min()) / (gürültü.max() - gürültü.min())\n    \n    # Karıştır\n    doku = 0.7 * voronoi + 0.3 * gürültü\n    \n    # Renklendirme (gri taş tonları)\n    r = np.clip(150 + 60 * doku, 80, 220).astype(np.uint8)\n    g = np.clip(145 + 55 * doku, 75, 210).astype(np.uint8)\n    b = np.clip(140 + 50 * doku, 70, 200).astype(np.uint8)\n    \n    doku_rgb = np.stack([r, g, b], axis=-1)\n    img = Image.fromarray(doku_rgb)\n    img.save('tas_doku.png')\n    return img\n\ntas_dokusu()\n```","source":{"generated":true,"provider":"g adient\"\"\"\n    r1, g1, b1 = renk1\n    r2, g2, b2 = renk2\n    gradient = []\n    for t in range(adim):\n        oran = t / (adim-1)\n        r = int(r1 + (r2-r1) * oran)\n        g = int(g1 + (g2-g1) * oran)\n        b = int(b1 + (b2-b1) * oran)\n        gradient.append((r, g, b))\n    return gradient\n\n# Örnek: Gün batımı paleti\npalet = uyumlu_palet((0.05, 0.8, 0.95), tur='analogous')\nprint('Palet:', ['#{:02x}{:02x}{:02x}'.format(*r) for r in palet])\n\n# Gradient görüntü üret\ngrad = gradient_olustur(palet[0], palet[-1], 512)\nimg_data = np.array([grad]*100, dtype=np.uint8)\nImage.fromarray(img_data).save('gradient.png')\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}}];

// ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'pgcvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
