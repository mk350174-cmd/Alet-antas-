mory-Safe)\n\n- **Hedef Kitle:** Orta seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Poisson Diski Dağılımı senaryoları\n- **Avantajları:** Bu yapısı sayesinde Poisson Diski Dağılımı işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Poisson Diski Dağılımı ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** dağılım, poisson, detay\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 354, "no": "354", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Reaktif Düşey Ağaç Yerleşimi Önerisi", "desc": "yapay zeka bağlamında Düşey Ağaç Yerleşimi için reaktif bir önerisi. Yükseklik haritası ve eğim verilerini kullanarak ağaçları gerçekçi konumlara yerleştirin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "bitki", "yerleşim", "yapay zeka", "reaktif", "uzman"], "badge1": "Uzman", "content": "## Ağaç Yerleşimi Kuralları\n1.  Yükseklik haritası üzerinde belirli bir yükseklik aralığı tanımlayın (örn. deniz seviyesi üstü).\n2.  Eğim haritası üzerinde çok dik yamaçlardan kaçının.\n3.  Perlin gürültüsü kullanarak ağaç yoğunluğunu belirleyin.\n4.  Belirlenen uygun alanlara ağaç modellerini rastgele yerleştirin.\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Uzman seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Düşey Ağaç Yerleşimi senaryoları\n- **Avantajları:** Bu önerisi sayesinde Düşey Ağaç Yerleşimi işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Düşey Ağaç Yerleşimi ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ağaç, bitki, yerleşim\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 355, "no": "355", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Atomic Rastgele Kaya Dağılımı Kalıbı", "desc": "mikroservis bağlamında Rastgele Kaya Dağılımı için atomic bir kalıbı. Arazide rastgele boyutlarda ve yönlerde kaya modellerini estetik olarak dağıtın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["kaya", "dağılım", "detay", "mikroservis", "atomic", "orta"], "badge1": "Orta", "content": "## Kaya Dağılımı Yöntemi\n1.  Arazi üzerinde rastgele noktalar seçin.\n2.  Bu noktaların arazi eğimini kontrol edin; çok dik yerlerden kaçının.\n3.  Her kaya için rastgele bir ölçek ve dönüş değeri atayın.\n4.  Kaya modellerini seçilen noktalara yerleştirin.\n5.  Gürültü kullanarak kaya yoğunluğunu kontrol edin.\n\n## Uygulama Senaryosu (Atomic)\n\nBu kalıbı, mikroservis alanında Rastgele Kaya Dağılımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Rastgele Kaya Dağılımı akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 356, "no": "356", "cat": "Fraktal & Organik Modeller", "name": "Modüler L-Sistem Ağaç Oluşturma Yönergesi", "desc": "test bağlamında L-Sistem Ağaç Oluşturma için modüler bir yönergesi. L-Sistem kuralları kullanarak organik ve dallı ağaç yapılarını prosedürel olarak üretin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["l-sistem", "fraktal", "ağaç", "test", "modüler", "pro"], "badge1": "Pro", "content": "## L-Sistem Ağaç Algoritması\n1.  Başlangıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.\n\n## Uygulama Senaryosu (Modüler)\n\nBu yönergesi, test alanında L-Sistem Ağaç Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** L-Sistem Ağaç Oluşturma akışını modüler yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 357, "no": "357", "cat": "Fraktal & Organik Modeller", "name": "Hibrit Mandelbrot Fraktalı Görselleştirme Kütüphanesi", "desc": "test bağlamında Mandelbrot Fraktalı Görselleştirme için hibrit bir kütüphanesi. Mandelbrot kümesini görselleştirerek karmaşık ve sonsuz detaylara sahip fraktal desenler oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["fraktal", "mandelbrot", "görsel", "test", "hibrit", "başlangıç"], "badge1": "Başlangıç", "content": "## Mandelbrot Kümesi Çizimi\n1.  Ekrandaki her pikseli bir kompleks sayıya (c) dönüştürün.\n2.  z = z^2 + c formülünü z=0'dan başlayarak tekrarla.\n3.  Eğer |z| belirli bir eşiği (örn. 2) aşarsa, iterasyon sayısına göre pikseli renklendir.\n4.  Aşmazsa, siyah renkle çizerek kümenin içini gösterin.\n\n## Uygulama Senaryosu (Hibrit)\n\nBu kütüphanesi, test alanında Mandelbrot Fraktalı Görselleştirme problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Mandelbrot Fraktalı Görselleştirme akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 358, "no": "358", "cat": "Fraktal & Organik Modeller", "name": "Zero-Config Fraktal Bulut Modelleme Anlaşması", "desc": "mikroservis bağlamında Fraktal Bulut Modelleme için zero-config bir anlaşması. Çok katmanlı gürültü fonksiyonlarını kullanarak gerçekçi ve dinamik bulut şekilleri üretin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["bulut", "fraktal", "atmosfer", "mikroservis", "zero-config", "i̇leri"], "badge1": "İleri", "content": "## Fraktal Bulut Modelleme\n1.  3D Perlin veya Simplex gürültüsü kullanın.\n2.  Farklı frekans ve genliklerde birden fazla katmanı birleştirin (fbm).\n3.  Gürültü hacmini bi amında Poisson Diski Dağılımı için federe bir mimari yaklaşımı. Detayları (ağaç, kaya) düzenli ama rastgele bir şekilde dağıtarak görsel uyumu sağlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["dağılım", "poisson", "detay", "yapay zeka", "federe", "pro"], "badge1": "Pro", "content": "## Poisson Diski Dağılımı\n1.  İlk noktayı rastgele yerleştirin.\n2.  Her yeni nokta için, mevcut noktaların minimum yarıçapından daha uzak olmasını sağlayın.\n3.  Mevcut noktaların etrafına \"aday halkaları\" çizin.\n4.  Bu halkalardan rastgele noktalar seçerek yeni geçerli noktalar ekleyin.\n\n## Genişletilmiş Notlar (Federe)\n\n- **Hedef Kitle:** Pro seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Poisson Diski Dağılımı senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Poisson Diski Dağılımı işlemleri daha federe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Poisson Diski Dağılımı ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** dağılım, poisson, detay\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 374, "no": "374", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Pluggable Düşey Ağaç Yerleşimi Protokolü", "desc": "akış bağlamında Düşey Ağaç Yerleşimi için pluggable bir protokolü. Yükseklik haritası ve eğim verilerini kullanarak ağaçları gerçekçi konumlara yerleştirin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "bitki", "yerleşim", "akış", "pluggable", "uzman"], "badge1": "Uzman", "content": "## Ağaç Yerleşimi Kuralları\n1.  Yükseklik haritası üzerinde belirli bir yükseklik aralığı tanımlayın (örn. deniz seviyesi üstü).\n2.  Eğim haritası üzerinde çok dik yamaçlardan kaçının.\n3.  Perlin gürültüsü kullanarak ağaç yoğunluğunu belirleyin.\n4.  Belirlenen uygun alanlara ağaç modellerini rastgele yerleştirin.\n\n## Uygulama Senaryosu (Pluggable)\n\nBu protokolü, akış alanında Düşey Ağaç Yerleşimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Düşey Ağaç Yerleşimi akışını pluggable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 375, "no": "375", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Type-Safe Rastgele Kaya Dağılımı Kuralı", "desc": "API bağlamında Rastgele Kaya Dağılımı için type-safe bir kuralı. Arazide rastgele boyutlarda ve yönlerde kaya modellerini estetik olarak dağıtın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["kaya", "dağılım", "detay", "API", "type-safe", "pro"], "badge1": "Pro", "content": "## Kaya Dağılımı Yöntemi\n1.  Arazi üzerinde rastgele noktalar seçin.\n2.  Bu noktaların arazi eğimini kontrol edin; çok dik yerlerden kaçının.\n3.  Her kaya için rastgele bir ölçek ve dönüş değeri atayın.\n4.  Kaya modellerini seçilen noktalara yerleştirin.\n5.  Gürültü kullanarak kaya yoğunluğunu kontrol edin.\n\n## Genişletilmiş Notlar (Type-Safe)\n\n- **Hedef Kitle:** Pro seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Rastgele Kaya Dağılımı senaryoları\n- **Avantajları:** Bu kuralı sayesinde Rastgele Kaya Dağılımı işlemleri daha type-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Rastgele Kaya Dağılımı ihtiyacını analiz edin.\n  2. Bu kuralı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** kaya, dağılım, detay\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 376, "no": "376", "cat": "Fraktal & Organik Modeller", "name": "Reaktif L-Sistem Ağaç Oluşturma Yapısı", "desc": "güvenlik bağlamında L-Sistem Ağaç Oluşturma için reaktif bir yapısı. L-Sistem kuralları kullanarak organik ve dallı ağaç yapılarını prosedürel olarak üretin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["l-sistem", "fraktal", "ağaç", "güvenlik", "reaktif", "orta"], "badge1": "Orta", "content": "## L-Sistem Ağaç Algoritması\n1.  Başlangıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Orta seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde L-Sistem Ağaç Oluşturma senaryoları\n- **Avantajları:** Bu yapısı sayesinde L-Sistem Ağaç Oluşturma işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karm ı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 378, "no": "378", "cat": "Fraktal & Organik Modeller", "name": "Hibrit Fraktal Bulut Modelleme Çerçevesi", "desc": "mimari bağlamında Fraktal Bulut Modelleme için hibrit bir çerçevesi. Çok katmanlı gürültü fonksiyonlarını kullanarak gerçekçi ve dinamik bulut şekilleri üretin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["bulut", "fraktal", "atmosfer", "mimari", "hibrit", "başlangıç"], "badge1": "Başlangıç", "content": "## Fraktal Bulut Modelleme\n1.  3D Perlin veya Simplex gürültüsü kullanın.\n2.  Farklı frekans ve genliklerde birden fazla katmanı birleştirin (fbm).\n3.  Gürültü hacmini bir eşik değeri ile filtreleyerek bulutların yoğunluğunu belirleyin.\n4.  Bulutların hareketini simüle etmek için zamanla gürültü ofsetini değiştirin.\n\n## Genişletilmiş Notlar (Hibrit)\n\n- **Hedef Kitle:** Başlangıç seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Fraktal Bulut Modelleme senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Fraktal Bulut Modelleme işlemleri daha hibrit hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde Fraktal Bulut Modelleme ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** bulut, fraktal, atmosfer\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 379, "no": "379", "cat": "Doku & Malzeme Üretimi", "name": "Layered Prosedürel Taş Dokusu Çekirdeği", "desc": "test bağlamında Prosedürel Taş Dokusu için layered bir çekirdeği. Gürültü fonksiyonlarını birleştirerek benzersiz ve tekrar etmeyen taş dokuları oluşturun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "taş", "malzeme", "test", "layered", "uzman"], "badge1": "Uzman", "content": "## Prosedürel Taş Dokusu\n1.  Temel olarak Perlin gürültüsü kullanın.\n2.  Worley gürültüsünü (Voronoi) ekleyerek çatlak ve hücre efektleri yaratın.\n3.  Farklı ölçeklerde gürültüleri karıştırarak yüzey detaylarını artırın.\n4.  Normal harita için gürültü değerlerinin türevlerini kullanın.\n5.  Renk paletini taş tonlarına göre ayarlayın.\n\n## Uygulama Senaryosu (Layered)\n\nBu çekirdeği, test alanında Prosedürel Taş Dokusu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Prosedürel Taş Dokusu akışını layered yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 380, "no": "380", "cat": "Doku & Malzeme Üretimi", "name": "Edge-Optimize Normal Harita Üretimi Kütüphanesi", "desc": "yapay zeka bağlamında Normal Harita Üretimi için edge-optimize bir kütüphanesi. Yükseklik veya gürültü haritalarından otomatik olarak normal haritalar oluşturarak detayları artırın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["normal", "harita", "doku", "yapay zeka", "edge-optimize", "pro"], "badge1": "Pro", "content": "## Normal Harita Oluşturma\n1.  Gri tonlamalı yükseklik/gürültü haritasını alın.\n2.  Her piksel için komşu piksellerle yükseklik farklarını hesaplayın (dx, dy).\n3.  Normal vektörünü (-dx, -dy, 1) formülüyle oluşturun.\n4.  Vektörü normalize edin ve RGB renklerine dönüştürün (x->R, y->G, z->B).\n5.  Görselleştirmek için 0.5 ile toplayıp 0.5 ile çarpın.\n\n## Genişletilmiş Notlar (Edge-Optimize)\n\n- **Hedef Kitle:** Pro seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Normal Harita Üretimi senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Normal Harita Üretimi işlemleri daha edge-optimize hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Normal Harita Üretimi ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** normal, harita, doku\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 381, "no": "381", "cat": "Doku & Malzeme Üretimi", "name": "Yalın Renk Paleti Oluşturma Stratejisi", "desc": "dağıtım bağlamında Renk Paleti Oluşturma için yalın bir stratejisi. Yükseklik veya gürültü değerlerine göre dinamik ve uyumlu renk paletleri oluşturun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["renk", "palet", "gradient", "dağıtım", "yalın", "uzman"], "badge1": "Uzman", "content": "## Dinamik Renk Paleti\n1.  Arazi veya gürültü değerlerini 0-1 aralığına normalize edin.\n2.  Belirli eşik değerleri ve bu eşiklere karşılık gelen renkler tanımlayın (örn. 0.2:mavi, 0.4:yeşil, 0.7:kahverengi).\n3.  Normalize edilmiş değere göre bu renkler arasında enterpolasyon yapın.\n4.  Gürültü varyasyonlarına göre ince renk geçişleri ekleyin.\n\n## Uygulama Senaryosu (Yalın)\n\nBu stratejisi, dağıtım alanında Renk Paleti Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Renk Paleti Oluşturma akışını yalın yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 382, "no": "382", "cat": "Gürültü Algoritmaları", "name": "Sıfır-Trust Perlin Gürültüsü Temelleri Kütüphanesi", "desc": "akış bağlamında Perlin Gürültüsü Temelleri için sıfır-trust bir kütüphanesi. Temel Perlin gürültüsü fonksiyonunu uygulayarak pürüzsüz rastgele değerler üretin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["gürültü", "perlin", "rastgele", "akış", "sıfır-trust", "pro"], "badge1": "Pro", "content": "## Perlin Gürültüsü Fonksiyonu\n1.  Rastgele gradyan vektörleri oluşturun.\n2.  Giriş koordinatlarını köşelere ayırın.\n3.  Her köşeden nokta-gradyan çarpımlarını hesaplayın.\n4.  Kübik interpolasyon kullanarak nihai gürültü değerini elde edin.\n\n## Genişletilmiş Notlar (Sıfır-Trust)\n\n- **Hedef Kitle:** Pro seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Perlin Gürültüsü Temelleri senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Perlin Gürültüsü Temelleri işlemleri daha sıfır-trust hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimari  tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 393, "no": "393", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Headless Poisson Diski Dağılımı Refactor Yöntemi", "desc": "gözlemlenebilirlik bağlamında Poisson Diski Dağılımı için headless bir refactor yöntemi. Detayları (ağaç, kaya) düzenli ama rastgele bir şekilde dağıtarak görsel uyumu sağlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["dağılım", "poisson", "detay", "gözlemlenebilirlik", "headless", "i̇leri"], "badge1": "İleri", "content": "## Poisson Diski Dağılımı\n1.  İlk noktayı rastgele yerleştirin.\n2.  Her yeni nokta için, mevcut noktaların minimum yarıçapından daha uzak olmasını sağlayın.\n3.  Mevcut noktaların etrafına \"aday halkaları\" çizin.\n4.  Bu halkalardan rastgele noktalar seçerek yeni geçerli noktalar ekleyin.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** İleri seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Poisson Diski Dağılımı senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Poisson Diski Dağılımı işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Poisson Diski Dağılımı ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** dağılım, poisson, detay\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 394, "no": "394", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Kanıt-Tabanlı Düşey Ağaç Yerleşimi Doktrini", "desc": "API bağlamında Düşey Ağaç Yerleşimi için kanıt-tabanlı bir doktrini. Yükseklik haritası ve eğim verilerini kullanarak ağaçları gerçekçi konumlara yerleştirin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "bitki", "yerleşim", "API", "kanıt-tabanlı", "başlangıç"], "badge1": "Başlangıç", "content": "## Ağaç Yerleşimi Kuralları\n1.  Yükseklik haritası üzerinde belirli bir yükseklik aralığı tanımlayın (örn. deniz seviyesi üstü).\n2.  Eğim haritası üzerinde çok dik yamaçlardan kaçının.\n3.  Perlin gürültüsü kullanarak ağaç yoğunluğunu belirleyin.\n4.  Belirlenen uygun alanlara ağaç modellerini rastgele yerleştirin.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu doktrini, API alanında Düşey Ağaç Yerleşimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Düşey Ağaç Yerleşimi akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 395, "no": "395", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Polyglot Rastgele Kaya Dağılımı Standartı", "desc": "monitoring bağlamında Rastgele Kaya Dağılımı için polyglot bir standartı. Arazide rastgele boyutlarda ve yönl ngıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.\n\n## Genişletilmiş Notlar (Asenkron)\n\n- **Hedef Kitle:** Başlangıç seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde L-Sistem Ağaç Oluşturma senaryoları\n- **Avantajları:** Bu pratiği sayesinde L-Sistem Ağaç Oluşturma işlemleri daha asenkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde L-Sistem Ağaç Oluşturma ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** l-sistem, fraktal, ağaç\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 397, "no": "397", "cat": "Fraktal & Organik Modeller", "name": "AI-Augmented Mandelbrot Fraktalı Görselleştirme Yönergesi", "desc": "entegrasyon bağlamında Mandelbrot Fraktalı Görselleştirme için ai-augmented bir yönergesi. Mandelbrot kümesini görselleştirerek karmaşık ve sonsuz detaylara sahip fraktal desenler oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["fraktal", "mandelbrot", "görsel", "entegrasyon", "ai-augmented", "orta"], "badge1": "Orta", "content": "## Mandelbrot Kümesi Çizimi\n1.  Ekrandaki her pikseli bir kompleks sayıya (c) dönüştürün.\n2.  z = z^2 + c formülünü z=0'dan başlayarak tekrarla.\n3.  Eğer |z| belirli bir eşiği (örn. 2) in orijinal sistem promptu promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "system-prompt", "procedural", "orijinal"], "badge1": "Orijinal AI", "content": "## SİSTEM PROMPTU — Procedural Content Uzmanı\n\nSen kıdemli bir **Procedural Content** uzmanısın. Görevin: procedural generation, level design.\n\n### Davranış Kuralları\n1. **Net ve doğrulanabilir** yanıtlar ver; spekülasyondan kaçın.\n2. Her iddiayı kaynak veya somut örnekle destekle.\n3. Belirsizlik varsa açıkça **\"emin değilim\"** de — yanlış cevap verme.\n4. Kullanıcıya **adım adım** rehberlik et; tek seferde fazla yükleme.\n5. Yanıt formatı: önce TL;DR (2 cümle), sonra detaylar, sonra sonraki adım önerisi.\n\n### Yasak Davranışlar\n- Üretilmiş istatistik veya uydurma kaynak verme\n- Konu dışına çıkma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru Procedural Content kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — Procedural Content", "desc": "Procedural Content alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "procedural", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Procedural Content\n\nAşağıda Procedural Content alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** procedural generation, level design konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** procedural generation, level design alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** procedural generation, level design için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Procedural Content", "desc": "Procedural Content alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "procedural", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Procedural Content\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Procedural Content ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) procedural generation, level design ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — atmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 414, "no": "414", "cat": "Zindan & Mekan Düzenleri", "name": "Layered Oda-Koridor Zindan Üretimi Pratiği", "desc": "performans bağlamında Oda-Koridor Zindan Üretimi için layered bir pratiği. Rastgele odalar ve bunları birbirine bağlayan koridorlar ile klasik zindan düzenleri oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["zindan", "oda-koridor", "harita", "performans", "layered", "orta"], "badge1": "Orta", "content": "## Zindan Oluşturma Algoritması\n1.  Rastgele boyutlarda ve konumlarda odalar yerleştirin (çakışmasın).\n2.  Odaları minimum Spanning Tree (MST) ile bağlayın.\n3.  MST'deki her kenar için iki odayı birleştiren koridorlar çizin.\n4.  Zindan duvarlarını ve zemini oluşturun.\n\n## Uygulama Senaryosu (Layered)\n\nBu pratiği, performans alanında Oda-Koridor Zindan Üretimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Oda-Koridor Zindan Üretimi akışını layered yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 415, "no": "415", "cat": "Zindan & Mekan Düzenleri", "name": "Dağıtık Hücresel Otomat Haritası Algoritması", "desc": "şablon bağlamında Hücresel Otomat Haritası için dağıtık bir algoritması. Hücresel otomat kurallarıyla doğal mağara sistemleri veya organik duvar desenleri üretin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["hücresel", " llanarak ağaçları gerçekçi konumlara yerleştirin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "bitki", "yerleşim", "logging", "stream tabanlı", "orta"], "badge1": "Orta", "content": "## Ağaç Yerleşimi Kuralları\n1.  Yükseklik haritası üzerinde belirli bir yükseklik aralığı tanımlayın (örn. deniz seviyesi üstü).\n2.  Eğim haritası üzerinde çok dik yamaçlardan kaçının.\n3.  Perlin gürültüsü kullanarak ağaç yoğunluğunu belirleyin.\n4.  Belirlenen uygun alanlara ağaç modellerini rastgele yerleştirin.\n\n## Genişletilmiş Notlar (Stream Tabanlı)\n\n- **Hedef Kitle:** Orta seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Düşey Ağaç Yerleşimi senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Düşey Ağaç Yerleşimi işlemleri daha stream tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Düşey Ağaç Yerleşimi ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ağaç, bitki, yerleşim\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-450-final"}}, {"id": 420, "no": "420", "cat": "Bitki Örtüsü & Detay Dağılımı", "name": "Veri-Odaklı Rastgele Kaya Dağılımı Standartı", "desc": "logging bağlamında Rastgele Kaya Dağılımı için veri-odaklı bir standartı. Arazide rastgele boyutlarda ve yönlerde kaya modellerini estetik olarak dağıtın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["kaya", "dağılım", "detay", "logging", "veri-odaklı", "i̇leri"], "badge1": "İleri", "content": "## Kaya Dağılımı Yöntemi\n1.  Araz oblemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** L-Sistem Ağaç Oluşturma akışını observable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-450-final"}}, {"id": 422, "no": "422", "cat": "Fraktal & Organik Modeller", "name": "Edge-Optimize Mandelbrot Fraktalı Görselleştirme Kılavuzu", "desc": "gözlemlenebilirlik bağlamında Mandelbrot Fraktalı Görselleştirme için edge-optimize bir kılavuzu. Mandelbrot kümesini görselleştirerek karmaşık ve sonsuz detaylara sahip fraktal desenler oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["fraktal", "mandelbrot", "görsel", "gözlemlenebilirlik", "edge-optimize", "orta"], "badge1": "Orta", "content": "## Mandelbrot Kümesi Çizimi\n1.  Ekrandaki her pikseli bir kompleks sayıya (c) dönüştürün.\n2.  z = z^2 + c formülünü z=0'dan başlayarak tekrarla.\n3.  Eğer |z| belirli bir eşiği (örn. 2) aşarsa, iterasyon sayısına göre pikseli renklendir.\n4.  Aşmazsa, siyah renkle çizerek kümenin içini gösterin.\n\n## Uygulama Senaryosu (Edge-Optimize)\n\nBu kılavuzu, gözlemlenebilirlik alanında Mandelbrot Fraktalı Görselleştirme problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Mandelbrot Fraktalı Görselleştirme akışını edge-optimize yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n##  verim artışı raporlanmıştır.\n- **İlgili Konular:** bulut, fraktal, atmosfer\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-450-final"}}, {"id": 424, "no": "424", "cat": "Doku & Malzeme Üretimi", "name": "AI-Augmented Prosedürel Taş Dokusu Yapısı", "desc": "mimari bağlamında Prosedürel Taş Dokusu için ai-augmented bir yapısı. Gürültü fonksiyonlarını birleştirerek benzersiz ve tekrar etmeyen taş dokuları oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "taş", "malzeme", "mimari", "ai-augmented", "orta"], "badge1": "Orta", "content": "## Prosedürel Taş Dokusu\n1.  Temel olarak Perlin gürültüsü kullanın.\n2.  Worley gürültüsünü (Voronoi) ekleyerek çatlak ve hücre efektleri yaratın.\n3.  Farklı ölçeklerde gürültüleri karıştırarak yüzey detaylarını artırın.\n4.  Normal harita için gürültü değerlerinin türevlerini kullanın.\n5.  Renk paletini taş tonlarına göre ayarlayın.\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu yapısı, mimari alanında Prosedürel Taş Dokusu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Prosedürel Taş Dokusu akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-450-final"}}, {"id": 425, "no": "425", "cat": "Doku & Malzeme Üretimi", "name": "Idempotent Normal Harita Üretimi Önerisi", "desc": "veri bağlamında Normal Harita Üretimi için idempotent bir önerisi. Yükseklik veya gürültü haritalarından otomatik olarak normal haritalar oluşturarak detayları artırı aştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** kaya, dağılım, detay\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-450-final"}}, {"id": 441, "no": "441", "cat": "Fraktal & Organik Modeller", "name": "Type-Safe L-Sistem Ağaç Oluşturma Modeli", "desc": "API bağlamında L-Sistem Ağaç Oluşturma için type-safe bir modeli. L-Sistem kuralları kullanarak organik ve dallı ağaç yapılarını prosedürel olarak üretin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["l-sistem", "fraktal", "ağaç", "API", "type-safe", "i̇leri"], "badge1": "İleri", "content": "## L-Sistem Ağaç Algoritması\n1.  Başlangıç aksiyomu (örn. \"F\") ve üretim kuralları (örn. F -> FF-[-F+F+F]+[+F-F-F]) tanımlayın.\n2.  Kuralları belirli sayıda iterasyon boyunca uygulayarak bir dize oluşturun.\n3.  Bu dizeyi bir \"kaplumbağa grafiği\" yorumlayıcısı ile çizerek ağaç geometrisini oluşturun.\n4.  Açıları ve segment uzunluklarını dinamik olarak değiştirin.\n\n## Genişletilmiş Notlar (Type-Safe)\n\n- **Hedef Kitle:** İleri seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde L-Sistem Ağaç Oluşturma senaryoları\n- **Avantajları:** Bu modeli sayesinde L-Sistem Ağaç Oluşturma işlemleri daha type-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde L-Sistem Ağaç Oluşturma ihtiyacını analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** l-sistem, fraktal, ağaç\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-450-final"}}, {"id": 442, "no": "442", "cat": " // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'pgcvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
