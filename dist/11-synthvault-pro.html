<style>
:root{
  --bg:#08060e;--bg2:#0c0a12;--bg3:#100e16;--bg4:#14121a;
  --border:#18161e;--border2:#201e26;--border3:#2c2a32;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#a375ff;--primary2:#a375ff;
  --primary-dim:#a375ff15;--primary-glow:#a375ff30;
  --accent:#ff6b9d;--accent2:#ff6b9d;
  --accent-dim:#ff6b9d18;--accent-glow:#ff6b9d30;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#a375ff08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#ff6b9d06 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0c0a12 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#a375ff0a 0%,#a375ff03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #a375ff30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#a375ff03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#a375ff06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#8557e1);color:#08060e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #a375ff20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #a375ff35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0c0a12,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#8557e1);color:#08060e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #a375ff20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #a375ff35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">S</div>
  <div class="hero-eyebrow">AI & Prompt Mühendisliği · Alet Çantası</div>
  <h1 class="hero-title">Synth<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Özel veri setleri oluşturmak için sentetik veri üretimi otomasyon şablonları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>21</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Synth ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">21</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

ndas as pd\nimport matplotlib.pyplot as plt\n\n# İkili sınıflandırma\nX, y = make_classification(\n    n_samples=1000,\n    n_features=20,\n    n_informative=10,     # Gerçekten bilgilendirici özellik\n    n_redundant=5,        # Gereksiz özellik (gerçek dünyayı taklit)\n    n_clusters_per_class=2,\n    class_sep=1.0,        # Sınıf ayrışma güçlüğü (düşük = zor)\n    flip_y=0.05,          # %5 gürültü etiketi\n    random_state=42\n)\ndf = pd.DataFrame(X, columns=[f'feat_{i}' for i in range(20)])\ndf['label'] = y\n\n# Çok sınıflı veri\nX_multi, y_multi = make_classification(\n    n_samples=2000, n_classes=5, n_informative=10,\n    n_clusters_per_class=1, random_state=42\n)\n```\n\n**Dengesiz veri seti (gerçekçi senaryo):**\n```python\nfrom sklearn.datasets import make_classification\nimport numpy as np\n\n# %5 pozitif sınıf (fraud detection gibi)\nX, y = make_classification(\n    n_samples=10000,\n    weights=[0.95, 0.05],  # %95 negatif, %5 pozitif\n    n_informative=8, random_state=42\n)\nprint(f'Pozitif: {y.sum()}, Negatif: {(y==0).sum()}')\n\n# SMOTE ile dengeleme\nfrom imblearn.over_sampling import SMOTE\nX_res, y_res = SMOTE(random_state=42).fit_resample(X, y)\n```\n\n**Prompt:** \"Bu fraud tespiti modeli için 50.000 kayıtlık sentetik veri üret; %2 fraud oranı, 15 özellik (6 kategorik, 9 sayısal), gerçekçi dağılımlar ve müşteri davranış örüntüsü yansıt.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":3,"no":"003","cat":"Veri Üretimi","name":"Zaman Serisi Veri Oluşturucu","desc":"Zaman serisi analizi için sentetik veriler.","tags":["zaman serisi","analiz","trend"],"badge1":"Orta","content":"## Zaman Serisi Sentetik Veri Üretimi\n\nTrend, mevsimsellik ve gürültü içeren gerçekçi zaman serisi veri setleri oluşturma.\n\n**Temel bileşenler:**\n```python\nimport numpy as np\nimport pandas as pd\nimport matplotlib.pyplot as plt\n\ndef generate_time_series(n=365, freq='D'):\n    dates = pd.date_range('2023-01-01', periods=n, freq=freq)\n    \n    # Trend (yukarı eğilim)\n    trend = np.linspace(100, 150, n)\n    \n    # Mevsimsellik (yıllık döngü)\n    seasonality = 20 * np.sin(2 * np.pi * np.arange(n) / 365)\n    \n    # Haftalık pattern (iş günleri daha yüksek)\n    weekly = 10 * np.sin(2 * np.pi * np.arange(n) / 7)\n    \n    # Gürültü\n    noise = np.random.normal(0, 5, n)\n    \n    # Anomaliler (%1 aykırı değer)\n    anomaly_idx = np.random.choice(n, size=int(n*0.01), replace=False)\n    anomalies = np.zeros(n)\n    anomalies[anomaly_idx] = np.random.choice([-50, 50], len(anomaly_idx))\n    \n    return pd.DataFrame({\n        'date': dates,\n        'value': trend + seasonality + weekly + noise + anomalies\n    })\n\ndf = generate_time_series(730)  # 2 yıl\ndf.plot(x='date', y='value', title='Sentetik Satış Verisi')\n```\n\n**Çok değişkenli zaman serisi:**\n```python\n# Birbirleriyle ilişkili 3 değişken\nn = 365\nX1 = np.cumsum(np.random.randn(n)) + 100\nX2 = 0.7 * X1 + 0.3 * np.random.randn(n) * 10  # X1'e bağlı\nX3 = np.sin(np.arange(n) / 30) * 20 + 50       # Bağımsız mevsimsel\n\nmultivariate = pd.DataFrame({'X1': X1, 'X2': X2, 'X3': X3})\n```\n\n**Prompt:** \"E-ticaret için 3 yıllık günlük satış zaman serisi üret; Bayram/özel gün spike'ları, haftalık örüntü, yıllık büyüme trendi ve COVID benzeri anomali dönemini dahil et.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":4,"no":"004","cat":"Metin Üretimi","name":"Ürün Açıklaması Şablonu","desc":"Çekici ürün açıklamaları oluşturun.","tags":["metin","ürün","pazarlama"],"badge1":"Başlangıç","content":"## AI ile Ürün Açıklaması Oluşturma Şablonu\n\nFarklı platformlar için ikna edici, SEO uyumlu ürün açıklamaları üretme rehberi.\n\n**Temel şablon:**\n```\nÜrün açıklaması yaz:\n\nÜrün: [ürün adı]\nKategori: [kategori]\nHedef kitle: [kim için]\nAna özellikler:\n- [Özellik 1]\n- [Özellik 2]\n- [Özellik 3]\nAnahtar kelimeler: [SEO terimleri]\nTon: [profesyonel/samimi/heyecanlı]\nUzunluk: [kısa 50 ,'fırladı','bağırdı']),\n        'duyusal_detay': any(w in text for w in ['koku','ses','dokunuş','tat','ışık']),\n    }\n    return checks\n```\n\n**Tür + Hook Kombinasyonları:** Gerilim + In Medias Res, Fantezi + Ortam Kurma, Aşk + Karakter Sesi kombinasyonlarını dene.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":8,"no":"008","cat":"Görüntü Üretimi","name":"Soyut Sanat Görüntü Oluşturucu","desc":"Benzersiz soyut sanat eserleri üretin.","tags":["görüntü","sanat","soyut"],"badge1":"Başlangıç","content":"**Soyut Sanat Görüntü Promptu: AI Görüntü Üreteci için Estetik Şablon**\n\nMidjourney, DALL-E, Stable Diffusion için güçlü soyut sanat promptları oluşturma sistemi.\n\n**Master Soyut Sanat Prompt Şablonu:**\n```\nTemel unsurlar:\n{renk_paleti} renk paleti,\n{kompozisyon} kompozisyon,\n{doku} doku,\n{isik} ışıklandırma,\n{referans_sanatci} tarzında\n\nÖrnek doldurulmuş:\n\"Derin mavi ve altın renk paleti,\n merkeze doğru çekilen spiral kompozisyon,\n parlak metalik ve mat karşıtı doku,\n iç ışık kaynaklı parıltı,\n Wassily Kandinsky ve Mark Rothko tarzında\"\n\nTeknik ekler:\n--ar 16:9  (oran)\n--style raw  (daha az AI yorumu)\n--stylize 750  (yüksek estetik)\n--v 6  (Midjourney sürüm)\n```\n\n**Renk Paleti Kategorileri:**\n```python\npalettes = {\n    'güneş_batımı': 'coral, amber, deep purple, magenta gradient',\n    'okyanus_derinlik': 'midnight blue, teal, silver, phosphorescent green',\n    'orman_şafak': 'emerald, moss, golden light, shadow',\n    'monokrom_güç': 'pure black, charcoal, silver, white',\n    'neon_karanlık': 'electric blue, hot pink, lime, void black'\n}\n```\n\n**Negatif Prompt:** `--no text, watermark, realistic faces, photograph, blurry, low quality`\n\n**Iterative Refinement:** İlk çıktıyı `--seed [numara]` ile sabitleyin, ardından renk veya kompozisyon değişkeni tek tek güncelleyin.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":9,"no":"009","cat":"Görüntü Üret Zaman Dilimi: {zaman}  (sabah/gece/alacakaranlık)\n- Hava: {hava}  (fırtına/sis/güneşli/yağmur)\n- Kültürel Referans: {kultur}  (Japon/Gotik/Endüstriyel)\n\nÇıktı:\n1. **Tasarım Brief** (100 kelime)\n   - Mimari/fiziksel özellikler\n   - Ortamsal hikayecilik (bu yerde neler olmuş?)\n   - Oyuncu/izleyici deneyimi hedefi\n\n2. **Renk ve Işık Yönetimi**\n   - Dominant renk paleti (3-4 renk + hex)\n   - Ana ışık kaynağı ve yönü\n   - Gölge ve kontrast özellikleri\n\n3. **AI Görüntü Promptu** (Midjourney/SD)\n   [Platform-ready prompt, tüm teknik parametreler dahil]\n```\n\n**Ortam Anlatıcılığı (Environmental Storytelling):** Mekanın geçmişini nesne yerleşimi ile anlat — kırık sandalye, terk edilmiş mektup, silinmiş yazı.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":11,"no":"011","cat":"Kod Üretimi","name":"Python Fonksiyon Üretici","desc":"Belirli görevler için Python fonksiyonları yazın.","tags":["kod","python","fonksiyon"],"badge1":"Başlangıç","content":"## AI ile Python Fonksiyon Üretimi\n\nBelirli bir göreve özel, dokümantasyonlu, test edilebilir Python fonksiyonları üretme rehberi.\n\n**Fonksiyon üretim şablonu:**\n```\nPython fonksiyonu yaz:\n\nAmaç: [ne yapacak]\nGirdi parametreleri:\n  - [parametre_adı]: [tip], [açıklama]\nDönüş değeri: [tip ve açıklama]\nKöseli durumlar: [edge cases]\nÖrnek kullanım: [nasıl çağrılacak]\nTest senaryoları: [3-5 test case]\nStil: PEP 8, type hints, docstring\n```\n\n**Örnek çıktı:**\n```python\nfrom typing import Optional\nfrom datetime import datetime, date\n\ndef calculate_business_days(\n    start_date: date,\n    end_date: date,\n    holidays: Optional[list[date]] = None\n) -> int:\n    \"\"\"\n    İki tarih arasındaki iş günlerini hesaplar.\n    \n    Args:\n        start_date: Başlangıç tarihi (dahil)\n        end_date: Bitiş tarihi (dahil)\n        holidays: Tatil günleri listesi (varsayılan: boş)\n    \n    Returns:\n        İş günü sayısı (0 veya pozitif)\n    \n    Raises:\n        ValueError: end_date < start_date ise\n    \"\"\"\n    if end_date < start_date:\n        raise ValueError('end_date must be >= start_date')\n    \n    holidays = set(holidays or [])\n    count = 0\n    current = start_date\n    \n    while current <= end_date:\n        if current.weekday() < 5 and current not in holidays:  # Pazartesi-Cuma\n            count += 1\n        current = date.fromordinal(current.toordinal() + 1)\n    \n    return count\n\n# Test\nassert calculate_business_days(date(2024,1,1), date(2024,1,5)) == 5  # Pzt-Cum\nassert calculate_business_days(date(2024,1,1), date(2024,1,7)) == 5  # Hafta sonu hariç\n```\n\n**Prompt:** \"E-ticaret siparişleri için kargo süre hesaplayıcı fonksiyon yaz; şehir bazlı teslimat süresi, hafta sonu/tatil gün kontrolü, kargo firması bazlı süre tablosu parametre olarak al.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":12,"no":"012","cat":"Kod Üretimi","name":"SQL Sorgu Oluşturucu","desc":"Veritabanı sorguları için SQL kodları üretin.","tags":["kod","sql","veritabanı"],"badge1":"Orta","content":"## AI ile SQL Sorgu Üretimi\n\nKarmaşık veritabanı sorgularını doğal dil açıklamasından SQL'e dönüştürme şablonları.\n\n**SQL üretim şablonu:**\n```\nSQL sorgusu yaz:\n\nVeritabanı: [PostgreSQL/MySQL/SQLite]\nŞema:\n  [tablo1] (sütun1 TİP, sütun2 TİP, ...)\n  [tablo2] (sütun1 TİP, sütun2 TİP, ...)\n  İlişki: [FK açıklaması]\n\nİstenen: [ne istiyorum]\nÖzellikler:\n  - Filtreleme: [koşullar]\n  - Gruplama: [varsa]\n  - Sıralama: [varsa]\n  - Limit: [varsa]\n  - Performans: [büyük tablo uyarısı]\n```\n\n**Karmaşık örnek:**\n```sql\n-- İstek: Son 30 günde en az 3 sipariş veren, \n-- toplam harcaması 500 USD üzeri müşteriler\nSELECT \n    c.id,\n    c.name,\n    c.email,\n    COUNT(o.id) AS order_count,\n    SUM(o.total_amount) AS total_spent,\n    MAX(o.created_at) AS last_order\nFROM customers c\nINNER JOIN orders o ON c.id = o.customer_id\nWHERE \n    o.created_at >= CURRENT_DATE - INTERVAL '30 days'\n    AND o.status = 'completed'\nGROUP BY c.id, c.name, c.email\nHAVING \n    COUNT(o.id) >= 3\n    AND SUM(o.total_amount) > 500\nORDER BY total_spent DESC\nLIMIT 100;\n\n-- Performans için index:\nCREATE INDEX idx_orders_customer_date \nON orders(customer_id, created_at) WHERE status = 'completed';\n```\n\n**Prompt:** \"Bu e-ticaret şemasında aylık cohort analizi için SQL yaz; hangi ay kayıt olan müşteriler aylık olarak ne kadar aktif kaldı, retention oranını hesapla.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":13,"no":"013","cat":"Kod Üretimi","name":"API İstek Şablonu","desc":"Farklı API'ler için istek kodları oluşturun.","tags":["kod","api","istek"],"badge1":"Orta","content":"**AI API Entegrasyon Şablonu: Hızlı Prototipleme**\n\nFarklı AI API'leri için hazır istek şablonları ve hızlı entegrasyon kılavuzu.\n\n**Anthropic Claude API Şablonu:**\n```python\nimport anthropic\n\ndef claude_request(\n    prompt: str,\n    system: str = \"\",\n    model: str = \"claude-sonnet-4-6\",\n    max_tokens: int = 1024,\n    temperature: float = 1.0\n) -> str:\n    client = anthropic.Anthropic()\n    \n    kwargs = {\n        'model': model,\n        'max_tokens': max_tokens,\n        'messages': [{\"role\": \"user\", \"content\": prompt}]\n    }\n    if system:\n        kwargs['system'] = system\n    if temperature != 1.0:  # Claude varsayılan 1.0\n        kwargs['temperature'] = temperature\n    \n    response = client.messages.create(**kwargs)\n    return response.content[0].text\n\n# Kullanım\nresult = claude_request(\n    prompt=\"Python'da quicksort yaz\",\n    system=\"Sen bir kıdemli yazılım mühendisisin.\",\n    max_tokens=500\n)\nprint(result)\n```\n\n**Streaming Yanıt:**\n```python\nwith client.messages.stream(\n    model=\"claude-sonnet-4-6\",\n    max_tokens=1024,\n    messages=[{\"role\": \"user\", \"content\": prompt}]\n) as stream:\n    for text_chunk in stream.text_stream:\n        print(text_chunk, end=\"\", flush=True)\n```\n\n**Vision (Görüntü Analizi):**\n```python\nimport base64\n\nwith open('image.jpg', 'rb') as f:\n    img_data = base64.standard_b64encode(f.read()).decode('utf-8')\n\nresponse = client.messages.create(\n    model=\"claude-sonnet-4-6\",\n    max_tokens=1024,\n    messages=[{\"role\": \"user\", \"content\": [\n        {\"type\": \"image\", \"source\": {\"type\": \"base64\", \"media_type\": \"image/jpeg\", \"data\": img_data}},\n        {\"type\": \"text\", \"text\": \"Bu görseli açıkla\"}\n    ]}]\n)\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":14,"no":"014","cat":"Prompt Optimizasyonu","name":"Detaylı Prompt Oluşturucu","desc":"AI modelleri için daha etkili prompt'lar tasarlayın.","tags":["prompt","optimizasyon","metin"],"badge1":"Orta","content":"**Detaylı Prompt Oluşturucu: Görev Bazlı Prompt Mühendisliği**\n\nKarmaşık görevler için adım adım yapılandırılmış prompt oluşturma metodolojisi.\n\n**CRISP Prompt Çerçevesi:**\n```\nC - Context (Bağlam): Kim, ne, neden?\nR - Role (Rol): Model hangi uzmanlıkta yanıt vermeli?\nI - Instructions (Talimatlar): Adım adım görev\nS - Style (Stil): Format, ton, uzunluk\nP - Parameters (Parametreler): Kısıtlamalar, kurallar\n```\n\n**CRISP Uygulama Örneği:**\n```\nC: Bir startup'ın ilk 6 ay pazarlama stratejisini planlamam gerekiyor.\n   Hedef: B2B SaaS, SME segment, Türkiye pazarı.\n   Bütçe: 50.000 TL/ay\n\nR: 10 yıllık B2B pazarlama deneyimi olan, Growth Hacking ve\n   içerik pazarlamasında uzman bir strateji danışmanısın.\n\nI: Aşağıdaki adımları sırayla gerçekleştir:\n   1. Türkiye B2B SaaS pazarının 3 ana kanalını değerlendir\n   2. 50K TL bütçeyi kanallara dağıt\n   3. İlk 3 ay için haftalık aktivite planı oluştur\n   4. Temel KPI'ları ve ölçüm yöntemlerini listele\n\nS: Tablolar ve maddeler kullan. Akademik değil, aksiyonel.\n\nP: Genel tavsiye değil, spesifik Türkiye pazarına özel. Dijital odak.\n```\n\n**Chain-of-Thought Ekleme:**\n```\n\"Adım adım düşün: Önce [X] analiz et, sonra [Y] değerlendir,\nen son [Z] öner. Her adımda gerekçeni göster.\"\n```\n\n**Few-Shot Örnek Ekleme:** En karmaşık görevlerde 1-3 örnek çifti (input/output) ekle — modelin format ve derinliği hemen anlayacağı en etkili teknik.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":15,"no":"015","cat":"Prompt Optimizasyonu","name":"Negatif Prompt Üretici","desc":"İstenmeyen sonuçları engellemek için negatif prompt'lar.","tags":["prompt","negatif","görüntü"],"badge1":"Orta","content":"**Negatif Prompt Üretici: AI Görsel için Kalite Artırma**\n\nNegatif promptlar AI görüntü üretiminde istenmeyen unsurları dışlarken kaliteyi yüksek tutmak için kritik araçtır.\n\n**Kategori Bazlı Negatif Prompt Kütüphanesi:**\n```python\nneg_prompts = {\n    'kalite': [\n        'blurry', 'low quality', 'jpeg artifacts',\n        'noise', 'grainy', 'pixelated', 'low resolution',\n        'overexposed', 'underexposed'\n    ],\n    'anatomi': [\n        'extra limbs', 'deformed hands', 'bad anatomy',\n        'missing fingers', 'extra fingers', 'distorted face',\n        'malformed', 'disfigured'\n    ],\n    'stil_kirligi': [\n        'watermark', 'text', 'signature', 'logo',\n        'border', 'frame', 'username'\n    ],\n    'istemeyenler': [\n        'cartoon', 'anime', 'painting', 'illustration'\n        # (gerçekçi fotoğraf istiyorsan)\n    ]\n}\n\ndef build_negative_prompt(*categories):\n    neg = []\n    for cat in categories:\n        neg.extend(neg_prompts.get(cat, []))\n    return ', '.join(neg)\n\n# Kullanım\nsd_negative = build_negative_prompt('kalite', 'anatomi', 'stil_kirligi')\nprint(sd_negative)\n```\n\n**Platform Farkları:**\n```\nStable Diffusion: negative_prompt parametresinde\nMidjourney: --no keyword, keyword2\nDALL-E 3: Sistem promptuna entegre et\nFirefly: Style exclusions panel\n```\n\n**Bağlama Özel Negatif Promptlar:**\n- Portre: `bag under eyes, double chin, uneven skin, clown makeup`\n- Manzara: `power lines, cars, people, plastic, modern buildings`\n- Ürün fotoğrafı: `shadows on product, reflection glare, dust, fingerprints`","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":16,"no":"016","cat":"Prompt Optimizasyonu","name":"Prompt Zincirleme Sihirbazı","desc":"Karmaşık görevler için çok adımlı prompt'lar.","tags":["prompt","zincirleme","karmaşık"],"badge1":"İleri","content":"**Prompt Zincirleme (Prompt Chaining): Karmaşık Görev Otomasyonu**\n\nBir görevi birden fazla API çağrısına bölerek her adımın çıktısı bir sonraki adımın girdisi olur. Uzun bağlam limitlerini aşar ve kalite artar.\n\n**Zincirleme Desenleri:**\n```python\nimport anthropic\nclient = anthropic.Anthropic()\n\ndef chain_prompt(initial_input: str, steps: list) -> dict:\n    \"\"\"steps: [{system, prompt_template, transform}, ...]\"\"\"\n    results = {'input': initial_input}\n    current = initial_input\n    \n    for i, step in enumerate(steps):\n        prompt = step['prompt_template'].format(input=current, **results)\n        response = client.messages.create(\n            model='claude-sonnet-4-6',\n            max_tokens=step.get('max_tokens', 1024),\n            system=step.get('system', ''),\n            messages=[{'role': 'user', 'content': prompt}]\n        )\n        result = response.content[0].text\n        if 'transform' in step:\n            result = step['transform'](result)\n        results[f'step_{i}'] = result\n        current = result\n    \n    return results\n\n# Örnek: Makale yazma zinciri\nsteps = [\n    {'prompt_template': '{input} konusunda 5 başlık öner', 'max_tokens': 200},\n    {'prompt_template': 'Bu başlıklardan en iyisini seç ve açıkla: {input}', 'max_tokens': 100},\n    {'prompt_template': 'Seçilen başlık için taslak çıkar: {input}', 'max_tokens': 300},\n    {'prompt_template': 'Taslağa göre makale yaz: {input}', 'max_tokens': 2000}\n]\nresult = chain_prompt('Python performans optimizasyonu', steps)\nprint(result['step_3'])\n```\n\n**Dallanma (Branching):** Bir çıktıya göre farklı zincir yolları seç — eğer yanıt X içeriyorsa A zinciri, değilse B zinciri.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":17,"no":"017","cat":"Sentetik Veri Analizi","name":"Veri Kalitesi Değerlendirici","desc":"Üretilen sentetik verinin kalitesini kontrol edin.","tags":["veri","analiz","kalite"],"badge1":"Orta","content":"## AI ile Veri Kalitesi Değerlendirme\n\nVeri setindeki kalite sorunlarını tespit etme, ölçme ve düzeltme stratejisi.\n\n**Veri kalitesi boyutları:**\n```python\nimport pandas as pd\nimport numpy as np\nfrom scipy import stats\n\ndef assess_data_quality(df):\n    \"\"\"Kapsamlı veri kalitesi raporu üretir.\"\"\"\n    report = {}\n    \n    # 1. Eksiklik analizi\n    missing = df.isnull().sum()\n    missing_pct = (missing / len(df) * 100).round(2)\n    report['missing'] = missing_pct[missing_pct > 0].to_dict()\n    \n    # 2. Tekrarlayan kayıtlar\n    duplicates = df.duplicated().sum()\n    report['duplicate_rows'] = int(duplicates)\n    report['duplicate_pct'] = round(duplicates / len(df) * 100, 2)\n    \n    # 3. Veri tipi tutarsızlıkları (sayısal sütun kontrolü)\n    for col in df.select_dtypes(include='object'):\n        numeric_like = pd.to_numeric(df[col], errors='coerce').notna().sum()\n        if numeric_like > len(df) * 0.5:\n            report.setdefault('type_issues', {})[col] = 'Sayısal veriler string olarak saklanmış'\n    \n    # 4. Aykırı değerler (IQR yöntemi)\n    for col in df.select_dtypes(include=['number']):\n        Q1, Q3 = df[col].quantile([0.25, 0.75])\n        IQR = Q3 - Q1\n        outliers = df[(df[col] < Q1 - 1.5*IQR) | (df[col] > Q3 + 1.5*IQR)]\n        if len(outliers) > 0:\n            report.setdefault('outliers', {})[col] = {\n                'count': len(outliers),\n                'pct': round(len(outliers)/len(df)*100, 2)\n            }\n    \n    # 5. Kardinalite\n    for col in df.select_dtypes(include='object'):\n        unique_ratio = df[col].nunique() / len(df)\n        if unique_ratio > 0.95:\n            report.setdefault('high_cardinality', []).append(col)\n    \n    return report\n\nreport = assess_data_quality(df)\nprint(pd.DataFrame(report).to_string())\n```\n\n**Prompt:** \"Bu CSV veri setinin kalite raporunu çıkar; eksik değer stratejisi (silme/doldurma/imputation), aykırı değer kararı ve ML'e hazır hale getirmek için gerekli temizleme adımlarını listele.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":18,"no":"018","cat":"Sentetik Veri Analizi","name":"Model Performans Simülatörü","desc":"Sentetik verilerle model performansını tahmin edin.","tags":["veri","model","performans"],"badge1":"İleri","content":"## ML Model Performans Simülatörü\n\nFarklı model konfigürasyonlarını ve hiperparametreleri simüle ederek performans beklentilerini tahmin etme.\n\n**Model karşılaştırma çerçevesi:**\n```python\nfrom sklearn.model_selection import cross_val_score, StratifiedKFold\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.ensemble import RandomForestClassifier, GradientBoostingClassifier\nfrom sklearn.svm import SVC\nimport xgboost as xgb\nimport pandas as pd\n\nmodels = {\n    'Logistic Regression': Pipeline([('scaler', StandardScaler()), ('clf', LogisticRegression(max_iter=1000))]),\n    'Random Forest': RandomForestClassifier(n_estimators=100, random_state=42),\n    'Gradient Boosting': GradientBoostingClassifier(n_estimators=100, random_state=42),\n    'XGBoost': xgb.XGBClassifier(n_estimators=100, random_state=42, eval_metric='logloss'),\n    'SVM': Pipeline([('scaler', StandardScaler()), ('clf', SVC(probability=True))])\n}\n\ncv = StratifiedKFold(n_splits=5, shuffle=True, random_state=42)\nresults = []\n\nfor name, model in models.items():\n    scores = cross_val_score(model, X, y, cv=cv, scoring='f1_weighted', n_job // ── STATE ──

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';

    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
