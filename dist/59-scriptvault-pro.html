<style>
:root{
  --bg:#06080e;--bg2:#0a0c12;--bg3:#0e1016;--bg4:#12141a;
  --border:#16181e;--border2:#1e2026;--border3:#2a2c32;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#4a9eff;--primary2:#4a9eff;
  --primary-dim:#4a9eff15;--primary-glow:#4a9eff30;
  --accent:#a78bfa;--accent2:#a78bfa;
  --accent-dim:#a78bfa18;--accent-glow:#a78bfa30;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#4a9eff08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#a78bfa06 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a0c12 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#4a9eff0a 0%,#4a9eff03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #4a9eff30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#4a9eff03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#4a9eff06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#2c80e1);color:#06080e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #4a9eff20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #4a9eff35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a0c12,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#2c80e1);color:#06080e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #4a9eff20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #4a9eff35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">S</div>
  <div class="hero-eyebrow">Yazılım Mimarisi & DevOps · Alet Çantası</div>
  <h1 class="hero-title">Script<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Bash ve PowerShell üzerinden terminal tabanlı iş akışı otomasyonu komut dizileri.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>15</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Script ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">15</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">
    <div class="empty" id="emptyState">
      <div class="glyph">◈</div>

bash\n#!/usr/bin/env bash\nset -euo pipefail  # Hata, tanımsız değişken, pipe hata\ntrap 'echo \"Hata satır $LINENO\"' ERR\n\n# Değişkenler\nSCRIPT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\"; pwd)\"\nLOG_FILE=\"${SCRIPT_DIR}/script.log\"\n\nlog() { echo \"[$(date '+%Y-%m-%d %H:%M:%S')] $*\" | tee -a \"$LOG_FILE\"; }\n\n# Argüman kontrolü\nif [[ $# -lt 1 ]]; then\n    echo \"Kullanım: $0 <ortam>\"\n    exit 1\nfi\n\nENV=\"$1\"\nlog \"Script başladı: ortam=$ENV\"\n```\n\n## Uygulama Senaryosu (Composable)\n\nBu algoritması, API alanında Bash Script Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Bash Script Şablonu akışını composable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 182, "no": "182", "cat": "Bash Scripting", "name": "Hibrit Döngü ve Dizi Doktrini", "desc": "ölçeklenme bağlamında Döngü ve Dizi için hibrit bir doktrini. Bash'te for, while, until döngüleri ve dizi işleme şablonları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["döngü", "dizi", "for", "ölçeklenme", "hibrit", "i̇leri"], "badge1": "İleri", "content": "## Bash Döngüleri\n```bash\n# Dosya listesi\nfor f in *.log; do\n    echo \"İşleniyor: $f\"\ndone\n\n# Dizi\ndirs=('src' 'tests' 'docs')\nfor dir in \"${dirs[@]}\"; do\n    mkdir -p \"$dir\"\ndone\n\n# Sayaç döngüsü\nfor i in {1..10}; do echo \"$i\"; done\nfor ((i=0; i<10; i++)); do echo \"$i\"; done\n\n# While read\nwhile IFS= read -r line; do\n    echo \"Satır: $line\"\ndone < input.txt\n```\n\n## Genişletilmiş Notlar (Hibrit)\n\n- **Hedef Kitle:** İleri seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Döngü ve Dizi senaryoları\n- **Avantajları:** Bu doktrini sayesinde Döngü ve Dizi işlemleri daha hibrit hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde Döngü ve Dizi ihtiyacını analiz edin.\n  2. Bu doktrini'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** döngü, dizi, for\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 183, "no": "183", "cat": "Bash Scripting", "name": "Hibrit-Cloud Argüman Parse (getopts) Stratejisi", "desc": "mimari bağlamında Argüman Parse (getopts) için hibrit-cloud bir stratejisi. getopts ile kısa ve uzun bayrak argümanları işleyen script şablonu. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["getopts", "argüman", "bayrak", "mimari", "hibrit-cloud", "i̇leri"], "badge1": "İleri", "content": "## getopts Şablonu\n```bash\nusage() { echo \"Kullanım: $0 [-e ortam] [-d] [-h]\"; exit 1; }\n\nDEBUG=false ENV=prod\nwhile getopts ':e:dh' opt; do\n    case $opt in\n        e) ENV=\"$OPTARG\" ;;\n        d) DEBUG=true ;;\n        h) usage ;;\n        :) echo \"$OPTARG argüman gerektirir\"; usage ;;\n        \\?) echo \"Bilinmeyen: -$OPTARG\"; usage ;;\n    esac\ndone\nshift $((OPTIND-1))\n\n$DEBUG && set -x  # Debug modu\necho \"Ortam: $ENV\"\n```\n\n## Uygulama Senaryosu (Hibrit-Cloud)\n\nBu stratejisi, mimari alanında Argüman Parse (getopts) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut \"\nPGPASSWORD=\"$DB_PASS\" pg_dump -h localhost -U \"$DB_USER\" \"$DB_NAME\" | gzip > \"$BACKUP_FILE\"\n\n# SHA256 checksum\nsha256sum \"$BACKUP_FILE\" > \"$BACKUP_FILE.sha256\"\n\n# S3'e yükle\naws s3 cp \"$BACKUP_FILE\" \"s3://$S3_BUCKET/db/\"\naws s3 cp \"$BACKUP_FILE.sha256\" \"s3://$S3_BUCKET/db/\"\n\n# Yerel temizlik\nfind \"$BACKUP_DIR\" -mtime +7 -delete\necho \"Yedek tamamlandı: $BACKUP_FILE\"\n```\n\n## Uygulama Senaryosu (Reaktif)\n\nBu kuralı, test alanında Yedekleme Script Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yedekleme Script Şablonu akışını reaktif yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 255, "no": "255", "cat": "Dosya İşlemleri", "name": "Pipeline Metin Şablonu Doldurma Rehberi", "desc": "şablon bağlamında Metin Şablonu Doldurma için pipeline bir rehberi. envsubst veya sed ile ortam değişkenlerini template dosyalarına enjekte edin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["envsubst", "template", "env", "şablon", "pipeline", "orta"], "badge1": "Orta", "content": "## Template Doldurma\n```bash\n# nginx.conf.template\n# server_name ${DOMAIN};\n# listen ${PORT};\n\n# envsubst ile doldur\nexport DOMAIN=example.com PORT=443\nenvsubst < nginx.conf.template > nginx.conf\n\n# Sadece belirli değişkenleri değiştir\nenvsubst '${DOMAIN} ${PORT}' < template.conf > output.conf\n\n# Python ile daha güçlü template\nimport string, os\ntpl = string.Template(open('config.tpl').r ", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 271, "no": "271", "cat": "Bash Scripting", "name": "Mobile-First Bash Script Şablonu Anlaşması", "desc": "gözlemlenebilirlik bağlamında Bash Script Şablonu için mobile-first bir anlaşması. Hata yönetimi, argüman parse ve logging içeren sağlam Bash script iskeleti. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["bash", "şablon", "hata", "gözlemlenebilirlik", "mobile-first", "başlangıç"], "badge1": "Başlangıç", "content": "## Bash Şablonu\n```bash\n#!/usr/bin/env bash\nset -euo pipefail  # Hata, tanımsız değişken, pipe hata\ntrap 'echo \"Hata satır $LINENO\"' ERR\n\n# Değişkenler\nSCRIPT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\"; pwd)\"\nLOG_FILE=\"${SCRIPT_DIR}/script.log\"\n\nlog() { echo \"[$(date '+%Y-%m-%d %H:%M:%S')] $*\" | tee -a \"$LOG_FILE\"; }\n\n# Argüman kontrolü\nif [[ $# -lt 1 ]]; then\n    echo \"Kullanım: $0 <ortam>\"\n    exit 1\nfi\n\nENV=\"$1\"\nlog \"Script başladı: ortam=$ENV\"\n```\n\n## Uygulama Senaryosu (Mobile-First)\n\nBu anlaşması, gözlemlenebilirlik alanında Bash Script Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Bash Script Şablonu akışını mobile-first yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 272, "no": "272", "cat": "Bash Scripting", "name": "Stream Tabanlı Döngü ve Dizi Çerçevesi", "desc": "logging bağlamında Döngü ve Dizi için stream tabanlı bir çerçeve blonu\n```bash\nusage() { echo \"Kullanım: $0 [-e ortam] [-d] [-h]\"; exit 1; }\n\nDEBUG=false ENV=prod\nwhile getopts ':e:dh' opt; do\n    case $opt in\n        e) ENV=\"$OPTARG\" ;;\n        d) DEBUG=true ;;\n        h) usage ;;\n        :) echo \"$OPTARG argüman gerektirir\"; usage ;;\n        \\?) echo \"Bilinmeyen: -$OPTARG\"; usage ;;\n    esac\ndone\nshift $((OPTIND-1))\n\n$DEBUG && set -x  # Debug modu\necho \"Ortam: $ENV\"\n```\n\n## Uygulama Senaryosu (Bağlamsal)\n\nBu çekirdeği, API alanında Argüman Parse (getopts) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Argüman Parse (getopts) akışını bağlamsal yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 274, "no": "274", "cat": "Otomasyon", "name": "DevOps-Ready Cron Job Şablonları Modeli", "desc": "dağıtım bağlamında Cron Job Şablonları için devops-ready bir modeli. Yaygın cron ifadeleri ve zamanlama rehberi ile örnek cron job konfigürasyonları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["cron", "zamanlama", "otomatik", "dağıtım", "devops-ready", "orta"], "badge1": "Orta", "content": "## Cron İfadeleri\n```\n# dakika saat gün ay haftanın-günü komut\n0 2 * * *    /backup.sh      # Her gece 02:00\n0 9 * * 1-5  /report.sh      # Hafta içi 09:00\n*/15 * * * * /health.sh      # Her 15 dakika\n0 0 1 * *    /monthly.sh     # Her ayın 1'i\n0 0 * * 0    /weekly.sh      # Her Pazar gece yarısı\n\n# crontab düzenle\ncrontab -e\n# Listele\ncrontab -l\n```\nLo :** süreç, port, ps\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 278, "no": "278", "cat": "Sistem Yönetimi", "name": "Pipeline Disk ve Log Düzeni", "desc": "test bağlamında Disk ve Log için pipeline bir düzeni. Eski logları, geçici dosyaları ve büyük dosyaları temizleyen bakım scriptleri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["disk", "log", "temizleme", "test", "pipeline", "orta"], "badge1": "Orta", "content": "## Disk Temizleme\n```bash\n#!/bin/bash\n# Eski logları sıkıştır\nfind /var/log -name '*.log' -mtime +7 -exec gzip {} \\;\n\n# 30 günden eski sıkıştırılmış loglar sil\nfind /var/log -name '*.gz' -mtime +30 -delete\n\n# /tmp temizle\nfind /tmp -mtime +1 -delete 2>/dev/null\n\n# Docker kullanılmayan kaynaklar\ndocker system prune -af --volumes\n\n# Büyük dosyalar bul\ndu -ah / | sort -rh | head -20\n\n# Boş disk uyarısı\ndf_out=$(df -h / | awk 'NR==2 {print $5}' | tr -d '%')\n[[ $df_out -gt 80 ]] && echo \"UYARI: Disk $df_out% dolu\"\n```\n\n## Genişletilmiş Notlar (Pipeline)\n\n- **Hedef Kitle:** Orta seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Disk ve Log senaryoları\n- **Avantajları:** Bu düzeni sayesinde Disk ve Log işlemleri daha pipeline hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Disk ve Log ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** disk, log, temizleme\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 279, "no": "279", "cat": "Ağ Araçları", "name": "Idempotent curl Şablonları Metodu", "desc": "veri bağlamında curl Şablonları için idempotent bir metodu. API test, dosya indirme ve HTTP başlık analizi için curl komutları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["curl", "HTTP", "API test", "veri", "idempotent", "orta"], "badge1": "Orta", "content": "## curl Şablonları\n```bash\n# GET\ncurl -s https://api.example.com/users | jq '.data[]'\n\n# POST JSON\ncurl -X POST https://api.example.com/users \\\n  -H 'Content-Type: application/json' \\\n  -H 'Authorization: Bearer TOKEN' \\\n  -d '{\"name\":\"Ali\",\"email\":\"ali@example.com\"}'\n\n# Başlıkları gör\ncurl -I https://example.com\n\n# Süre ölç\ncurl -w '%{time_total}' -o /dev/null -s https://example.com\n\n# Dosya indir (devam)\ncurl -C - -O https://example.com/largefile.zip\n\n# Proxy\ncurl -x http://proxy:8080 https://target.com\n```\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Orta seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde curl Şablonları senaryoları\n- **Avantajları:** Bu metodu sayesinde curl Şablonları işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde curl Şablonları ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** curl, HTTP, API test\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 280, "no": "280", "cat": "Ağ Araçları", "name": "Bağlamsal SSH Konfigürasyonu Kalıbı", "desc": "caching bağlamında SSH Konfigürasyonu için bağlamsal bir kalıbı. ~/.ssh/config ile çoklu sunucu yö | Select-Object -First 5\n\n# Servis yönetimi\nGet-Service | Where-Object Status -eq 'Running'\nRestart-Service -Name nginx -Force\n\n# Süreç\nGet-Process | Sort-Object CPU -Descending | Select-Object -First 10\n\n# JSON\n$data = Get-Content config.json | ConvertFrom-Json\n$data.servers | ForEach-Object { Write-Host $_.name }\n\n# REST API\n$response = Invoke-RestMethod -Uri 'https://api.example.com/data' -Method GET\n```\n\n## Genişletilmiş Notlar (API-First)\n\n- **Hedef Kitle:** Orta seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde PowerShell Temel Komutlar senaryoları\n- **Avantajları:** Bu metodu sayesinde PowerShell Temel Komutlar işlemleri daha api-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde PowerShell Temel Komutlar ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** PowerShell, Windows, cmdlet\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 282, "no": "282", "cat": "Bash Scripting", "name": "Kanıt-Tabanlı Fonksiyon ve Kütüphane Şablonu", "desc": "dağıtım bağlamında Fonksiyon ve Kütüphane için kanıt-tabanlı bir şablonu. Yeniden kullanılabilir Bash fonksiyonları ve kaynak dahil etme yöntemi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["fonksiyon", "kaynak", "kütüphane", "dağıtım", "kanıt-tabanlı", "uzman"], "badge1": "Uzman", "content": "## Bash Fonksiyonlar\n```bash\n# lib/common.sh\nretry() {\n    local max=$1; shift\n    local delay=2\n    local attempt=1\n    while (( attempt <= max )); do\n        \"$@\" && return 0\n        echo \"Deneme $attempt başarısız; ${delay}s bekleniyor...\"\n        sleep $delay\n        delay=$((delay * 2))\n        ((attempt++))\n    done\n    return 1\n}\n\n# Ana script\nsource lib/common.sh\nretry 3 curl -f https://api.example.com/health\n```\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu şablonu, dağıtım alanında Fonksiyon ve Kütüphane problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Fonksiyon ve Kütüphane akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 283, "no": "283", "cat": "Sistem Yönetimi", "name": "Olay-Güdümlü Systemd Servis Şablonu Düzeni", "desc": "güvenlik bağlamında Systemd Servis Şablonu için olay-güdümlü bir düzeni. Özel uygulamayı systemd servisi olarak kaydetme ve yönetme. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["systemd", "servis", "daemon", "güvenlik", "olay-güdümlü", "i̇leri"], "badge1": "İleri", "content": "## Systemd Unit Dosyası\n```ini\n# /etc/systemd/system/myapp.service\n[Unit]\nDescription=My Application\nAfter=network.target postgresql.service\n\n[Service]\nType=simple\nUser=deploy\nWorkingDirectory=/opt/myapp\nExecStart=/opt/myapp/venv/bin/python app.py\nRestart=always\nRestartSec=5\nEnvironmentFile=/opt/myapp/.env\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n```\n```bash\nsystemctl enable myapp\nsystemctl start myapp\njournalctl -u myapp -f  # Log izle\n```\n\n## Uygula .\n2. **Modelleme:** Yedekleme Script Şablonu akışını sıfır-trust yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 285, "no": "285", "cat": "Dosya İşlemleri", "name": "Type-Safe Metin Şablonu Doldurma Çerçevesi", "desc": "gözlemlenebilirlik bağlamında Metin Şablonu Doldurma için type-safe bir çerçevesi. envsubst veya sed ile ortam değişkenlerini template dosyalarına enjekte edin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["envsubst", "template", "env", "gözlemlenebilirlik", "type-safe", "pro"], "badge1": "Pro", "content": "## Template Doldurma\n```bash\n# nginx.conf.template\n# server_name ${DOMAIN};\n# listen ${PORT};\n\n# envsubst ile doldur\nexport DOMAIN=example.com PORT=443\nenvsubst < nginx.conf.template > nginx.conf\n\n# Sadece belirli değişkenleri değiştir\nenvsubst '${DOMAIN} ${PORT}' < template.conf > output.conf\n\n# Python ile daha güçlü template\nimport string, os\ntpl = string.Template(open('config.tpl').read())\nresult = tpl.substitute(os.environ)\nopen('config.conf','w').write(result)\n```\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu çerçevesi, gözlemlenebilirlik alanında Metin Şablonu Doldurma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Metin Şablonu Doldurma akışını type-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### ilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** find, arama, dosya\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 306, "no": "306", "cat": "Dosya İşlemleri", "name": "Sezgisel sed ve awk Optimizasyonu", "desc": "mimari bağlamında sed ve awk için sezgisel bir optimizasyonu. Metin dönüşümü için sed ile satır düzenleme ve awk ile alanlarla çalışma. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["sed", "awk", "metin", "mimari", "sezgisel", "uzman"], "badge1": "Uzman", "content": "## sed & awk\n```bash\n# sed: Metin değiştirme\nsed 's/eski/yeni/g' dosya.txt\nsed -i.bak 's/localhost/prod-server/g' config.env\nsed -n '10,20p' dosya.txt  # 10-20. satırlar\nsed '/^#/d' config.txt     # Yorum satırları sil\n\n# awk: Alan işleme\nawk '{print $1, $3}' log.txt  # 1. ve 3. alanlar\nawk -F: '{print $1}' /etc/passwd  # : ayraç\nawk 'NR>1 {sum+=$4} END {print \"Toplam:\", sum}' data.csv\nawk '/ERROR/ {count++} END {print count}' app.log\n```\n\n## Uygulama Senaryosu (Sezgisel)\n\nBu optimizasyonu, mimari alanında sed ve awk problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** sed ve awk akışını sezgisel yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 307, "no": "307", "cat": "Sistem Yönetimi", "name": "Pipeline Süreç ve Port Rehberi", "desc": "dağıtım bağlamında Süreç ve Port için pipeline bir rehberi. Çalışan süreçleri bulma, port kontrolü ve süreç yönetimi komutları. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["süreç", "port", "ps", "dağıtım", "pipeline", "pro"], "badge1": "Pro", "content": "## Süreç & Port Komutları\n```bash\n# Süreç listesi\nps aux | grep python\npgrep -fl nginx\n\n# Port kullanımı\nss -tlnp | grep :8080\nlsof -i :8080\nnetstat -tuln\n\n# Süreç öldürme\nkill -15 PID    # Nazik (SIGTERM)\nkill -9 PID     # Zorla (SIGKILL)\npkill -f 'python app.py'\n\n# Kaynak kullanımı\nhtop  # interaktif\nps aux --sort=-%mem | head -10\ndf -h  # Disk\nfree -h  # RAM\n```\n\n## Genişletilmiş Notlar (Pipeline)\n\n- **Hedef Kitle:** Pro seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Süreç ve Port senaryoları\n- **Avantajları:** Bu rehberi sayesinde Süreç ve Port işlemleri daha pipeline hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Süreç ve Port ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** süreç, port, ps\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 308, "no": "308", "cat": "Sistem Yönetimi", "name": "Pratik Disk ve Log Yapısı", "desc": "mikroservis bağlamında Disk ve Log için pratik bir yapısı. Eski logları, geçici dosyaları ve büyük dosyaları temizleyen bakım scriptleri. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tag ı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** systemd, servis, daemon\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 314, "no": "314", "cat": "Otomasyon", "name": "Event-Sourced Yedekleme Script Şablonu Düzeneği", "desc": "dağıtım bağlamında Yedekleme Script Şablonu için event-sourced bir düzeneği. PostgreSQL veya dosya sistemini günlük yedekleyip S3'e yükleyen script. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["yedekleme", "S3", "backup", "dağıtım", "event-sourced", "i̇leri"], "badge1": "İleri", "content": "## Yedekleme Script\n```bash\n#!/bin/bash\nset -euo pipefail\nDATE=$(date +%Y%m%d_%H%M%S)\nBACKUP_DIR=/tmp/backups\nmkdir -p \"$BACKUP_DIR\"\n\n# PostgreSQL dump\nBACKUP_FILE=\"$BACKUP_DIR/db_$DATE.sql.gz\"\nPGPASSWORD=\"$DB_PASS\" pg_dump -h localhost -U \"$DB_USER\" \"$DB_NAME\" | gzip > \"$BACKUP_FILE\"\n\n# SHA256 checksum\nsha256sum \"$BACKUP_FILE\" > \"$BACKUP_FILE.sha256\"\n\n# S3'e yükle\naws s3 cp \"$BACKUP_FILE\" \"s3://$S3_BUCKET/db/\"\naws s3 cp \"$BACKUP_FILE.sha256\" \"s3://$S3_BUCKET/db/\"\n\n# Yerel temizlik\nfind \"$BACKUP_DIR\" -mtime +7 -delete\necho \"Yedek tamamlandı: $BACKUP_FILE\"\n```\n\n## Uygulama Senaryosu (Event-Sourced)\n\nBu düzeneği, dağıtım alanında Yedekleme Script Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yedekleme Script Şablonu akışını event-sourced yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma pla r.\n5. **Rollout:** Kademeli olarak tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokümantasyon: ekip dışı kullanıcılar zorlanır.\n- Metrik eksikliği: başarıyı ölçemezsen iyileştiremezsin.\n- Eskimiş bağımlılıklar: güvenlik açıklarına davetiye.\n\n### Anahtar Metrikler\n\n| Metrik | Hedef | Kritik Eşik |\n|---|---|---|\n| Latency (p95) | < 200ms | > 500ms |\n| Hata oranı | < %0.1 | > %1 |\n| Throughput | > 1000 rps | < 500 rps |\n| Uptime | %99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi ScriptVault dokümantasyonu\n- Dosya İşlemleri topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Orta seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Dayanıklı ScriptVault Çerçevesi senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Dayanıklı ScriptVault Çerçevesi işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Dayanıklı ScriptVault Çerçevesi ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** dosya i̇şlemleri, scriptvault, dayanıklı\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 331, "no": "331", "cat": "Bash Scripting", "name": "Idempotent Bash Script Şablonu Rehberi", "desc": "test bağlamında Bash Script Şablonu için idempotent bir rehberi. Hata yönetimi, argüman parse ve logging içeren sağlam Bash script iskeleti. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["bash", "şablon", "hata", "test", "idempotent", "orta"], "badge1": "Orta", "content": "## Bash Şablonu\n```bash\n#!/usr/bin/env bash\nset -euo pipefail  # Hata, tanımsız değişken, pipe hata\ntrap 'echo \"Hata satır $LINENO\"' ERR\n\n# Değişkenler\nSCRIPT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\"; pwd)\"\nLOG_FILE=\"${SCRIPT_DIR}/script.log\"\n\nlog() { echo \"[$(date '+%Y-%m-%d %H:%M:%S')] $*\" | tee -a \"$LOG_FILE\"; }\n\n# Argüman kontrolü\nif [[ $# -lt 1 ]]; then\n    echo \"Kullanım: $0 <ortam>\"\n    exit 1\nfi\n\nENV=\"$1\"\nlog \"Script başladı: ortam=$ENV\"\n```\n\n## Uygulama Senaryosu (Idempotent)\n\nBu rehberi, test alanında Bash Script Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Bash Script Şablonu akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 332, "no": "332", "cat": "Bash Scripting", "name": "Senkron Döngü ve Dizi Kütüphanesi", "desc": "akış bağlamında Döngü ve Dizi için senkron bir kütüphanesi. Bash'te for, while, until döngüleri ve dizi işleme şablonları. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["döngü", "dizi", "for", "akış", "senkron", "başlangıç"], "badge1": "Başlangıç", "content": "## Bash Döngüleri\n```bash\n# Dosya listesi\nfor f in *.log; do\n    echo \"İşleniyor: $f\"\ndone\n\n# Dizi\ndirs=('src' an Parse (getopts) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Argüman Parse (getopts) akışını polyglot yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 334, "no": "334", "cat": "Otomasyon", "name": "Olay-Güdümlü Cron Job Şablonları Sistemi", "desc": "veri bağlamında Cron Job Şablonları için olay-güdümlü bir sistemi. Yaygın cron ifadeleri ve zamanlama rehberi ile örnek cron job konfigürasyonları. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["cron", "zamanlama", "otomatik", "veri", "olay-güdümlü", "başlangıç"], "badge1": "Başlangıç", "content": "## Cron İfadeleri\n```\n# dakika saat gün ay haftanın-günü komut\n0 2 * * *    /backup.sh      # Her gece 02:00\n0 9 * * 1-5  /report.sh      # Hafta içi 09:00\n*/15 * * * * /health.sh      # Her 15 dakika\n0 0 1 * *    /monthly.sh     # Her ayın 1'i\n0 0 * * 0    /weekly.sh      # Her Pazar gece yarısı\n\n# crontab düzenle\ncrontab -e\n# Listele\ncrontab -l\n```\nLog: `2>&1 | tee -a /var/log/cron.log`\n\n## Genişletilmiş Notlar (Olay-Güdümlü)\n\n- **Hedef Kitle:** Başlangıç seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Cron Job Şablonları senaryoları\n- **Avantajları:** Bu sistemi sayesinde Cron Job Şablonları işlemleri daha olay-güdümlü hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n önetimi komutları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["süreç", "port", "ps", "güvenlik", "zero-config", "orta"], "badge1": "Orta", "content": "## Süreç & Port Komutları\n```bash\n# Süreç listesi\nps aux | grep python\npgrep -fl nginx\n\n# Port kullanımı\nss -tlnp | grep :8080\nlsof -i :8080\nnetstat -tuln\n\n# Süreç öldürme\nkill -15 PID    # Nazik (SIGTERM)\nkill -9 PID     # Zorla (SIGKILL)\npkill -f 'python app.py'\n\n# Kaynak kullanımı\nhtop  # interaktif\nps aux --sort=-%mem | head -10\ndf -h  # Disk\nfree -h  # RAM\n```\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** Orta seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Süreç ve Port senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Süreç ve Port işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Süreç ve Port ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** süreç, port, ps\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 338, "no": "338", "cat": "Sistem Yönetimi", "name": "Polyglot Disk ve Log Sözleşmesi", "desc": "CI/CD bağlamında Disk ve Log için polyglot bir sözleşmesi. Eski logları, geçici dosyaları ve büyük dosyaları temizleyen bakım scriptleri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["disk", "log", "temizleme", "CI/CD", "polyglot", "orta"], "badge1": "Orta", "content": "## Disk Temizleme\n```bash\n#!/bin/bash\n# Eski logları sıkıştır\nfind /var/log iz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** fonksiyon, kaynak, kütüphane\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 343, "no": "343", "cat": "Sistem Yönetimi", "name": "Memory-Safe Systemd Servis Şablonu Rehberi", "desc": "CI/CD bağlamında Systemd Servis Şablonu için memory-safe bir rehberi. Özel uygulamayı systemd servisi olarak kaydetme ve yönetme. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["systemd", "servis", "daemon", "CI/CD", "memory-safe", "i̇leri"], "badge1": "İleri", "content": "## Systemd Unit Dosyası\n```ini\n# /etc/systemd/system/myapp.service\n[Unit]\nDescription=My Application\nAfter=network.target postgresql.service\n\n[Service]\nType=simple\nUser=deploy\nWorkingDirectory=/opt/myapp\nExecStart=/opt/myapp/venv/bin/python app.py\nRestart=always\nRestartSec=5\nEnvironmentFile=/opt/myapp/.env\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n```\n```bash\nsystemctl enable myapp\nsystemctl start myapp\njournalctl -u myapp -f  # Log izle\n```\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu rehberi, CI/CD alanında Systemd Servis Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Systemd Servis Şablonu akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyall mple\nUser=deploy\nWorkingDirectory=/opt/myapp\nExecStart=/opt/myapp/venv/bin/python app.py\nRestart=always\nRestartSec=5\nEnvironmentFile=/opt/myapp/.env\nStandardOutput=journal\nStandardError=journal\n\n[Install]\nWantedBy=multi-user.target\n```\n```bash\nsystemctl enable myapp\nsystemctl start myapp\njournalctl -u myapp -f  # Log izle\n```\n\n## Uygulama Senaryosu (Quantum-Hazır)\n\nBu düzeneği, logging alanında Systemd Servis Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Systemd Servis Şablonu akışını quantum-hazır yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 374, "no": "374", "cat": "Otomasyon", "name": "Container-Native Yedekleme Script Şablonu Anlaşması", "desc": "mimari bağlamında Yedekleme Script Şablonu için container-native bir anlaşması. PostgreSQL veya dosya sistemini günlük yedekleyip S3'e yükleyen script. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["yedekleme", "S3", "backup", "mimari", "container-native", "orta"], "badge1": "Orta", "content": "## Yedekleme Script\n```bash\n#!/bin/bash\nset -euo pipefail\nDATE=$(date +%Y%m%d_%H%M%S)\nBACKUP_DIR=/tmp/backups\nmkdir -p \"$BACKUP_DIR\"\n\n# PostgreSQL dump\nBACKUP_FILE=\"$BACKUP_DIR/db_$DATE.sql.gz\"\nPGPASSWORD=\"$DB_PASS\" pg_dump -h localhost -U \"$DB_USER\" \"$DB_NAME\" | gzip > \"$BACKUP_FILE\"\n\n# SHA256 checksum\nsha256sum \"$BACKUP_FILE\" > \"$BACKUP_FILE.sha256\"\n\n# S3'e yükle\naws s3 cp \"$BACKUP_FILE\" \"s3://$S3_B 080\nnetstat -tuln\n\n# Süreç öldürme\nkill -15 PID    # Nazik (SIGTERM)\nkill -9 PID     # Zorla (SIGKILL)\npkill -f 'python app.py'\n\n# Kaynak kullanımı\nhtop  # interaktif\nps aux --sort=-%mem | head -10\ndf -h  # Disk\nfree -h  # RAM\n```\n\n## Uygulama Senaryosu (Polyglot)\n\nBu sistemi, mimari alanında Süreç ve Port problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Süreç ve Port akışını polyglot yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 398, "no": "398", "cat": "Sistem Yönetimi", "name": "Resilient Disk ve Log Optimizasyonu", "desc": "gözlemlenebilirlik bağlamında Disk ve Log için resilient bir optimizasyonu. Eski logları, geçici dosyaları ve büyük dosyaları temizleyen bakım scriptleri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["disk", "log", "temizleme", "gözlemlenebilirlik", "resilient", "orta"], "badge1": "Orta", "content": "## Disk Temizleme\n```bash\n#!/bin/bash\n# Eski logları sıkıştır\nfind /var/log -name '*.log' -mtime +7 -exec gzip {} \\;\n\n# 30 günden eski sıkıştırılmış loglar sil\nfind /var/log -name '*.gz' -mtime +30 -delete\n\n# /tmp temizle\nfind /tmp -mtime +1 -delete 2>/dev/null\n\n# Docker kullanılmayan kaynaklar\ndocker system prune -af --volumes\n\n# Büyük dosyalar bul\ndu -ah / | sort -rh | head -20\n\n# Boş disk uyarısı\ndf_out=$(df -h / | awk 'NR==2 {print $5}' | tr -d '%')\n[[ $df_out -gt 80 ]] && echo \"UYARI: Disk $df_out% dolu\"\n```\n\n## Uygulama Senaryosu (Resilient)\n\nBu optimizasyonu, gözlemlenebilirlik alanında Disk ve Log problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Disk ve Log akışını resilient yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 399, "no": "399", "cat": "Ağ Araçları", "name": "Zero-Config curl Şablonları Mimari Yaklaşımı", "desc": "API bağlamında curl Şablonları için zero-config bir mimari yaklaşımı. API test, dosya indirme ve HTTP başlık analizi için curl komutları. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["curl", "HTTP", "API test", "API", "zero-config", "pro"], "badge1": "Pro", "content": "## curl Şablonları\n```bash\n# GET\ncurl -s https://api.example.com/users | jq '.data[]'\n\n# POST JSON\ncurl -X POST https://api.example.com/users \\\n  -H 'Content-Type: application/json' \\\n  -H 'Authorization: Bearer TOKEN' \\\n  -d '{\"name\":\"Ali\",\"email\":\"ali@example.com\"}'\n\n# Başlıkları gör\ncurl -I https://example.com\n\n# Süre ölç\ncurl -w '%{time_total}' -o /dev/null -s https://example.com\n\n# Dosya indir (devam)\ncurl -C - -O https://example.com/largefile.zip\n\n# Proxy\ncurl -x http://proxy:8080 https://target.com\n```\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** Pro seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde curl Şablonları senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde curl Şablonları işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hi aryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** Bash, PowerShell, automation alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** Bash, PowerShell, automation için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Scripting", "desc": "Scripting alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "scripting", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Scripting\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Scripting ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) Bash, PowerShell, automation ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Scripting", "desc": "Scripting alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "scripting", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Scripting Mentörü\n\n**Kimsin:** 15+ yıl Scripting deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** Bash, PowerShell, automation\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün Scripting ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — Scripting", "desc": "Scripting alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "scripting", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — Scripting\n\nScripting alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"Scripting\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "Bash Scripting", "name": "Kanıt-Tabanlı Bash Script Şablonu Çekirdeği", "desc": "API bağlamında Bash Script Şablonu için kanıt-tabanlı bir çekirdeği. Hata yönetimi, argüman parse ve logging içeren sağlam Bash script iskeleti. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["bash", "şablon", "hata", "API", "kanıt-tabanlı", "orta"], "badge1": "Orta", "content": "## Bash Şablonu\n```bash\n#!/usr/bin/env bash\nset -euo pipefail  # Hata, tanımsız değişken, pipe hata\ntrap 'echo \"Hata satır $LINENO\"' ERR\n\n# Değişkenler\nSCRIPT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\"; pwd)\"\nLOG_FILE=\"${SCRIPT_DIR}/script.log\"\n\nlog() { echo \"[$(date '+%Y-%m-%d %H:%M:%S')] $*\" | tee -a \"$LOG_FILE\"; }\n\n# Argüman kontrolü\nif [[ $# -lt 1 ]]; then\n    echo \"Kullanım: $0 <ortam>\"\n    exit 1\nfi\n\nENV=\"$1\"\nlog \"Script başladı: ortam=$ENV\"\n```\n\n## Genişletilmiş Notlar (Kanıt-Tabanlı)\n\n- **Hedef Kitle:** Orta seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Bash Script Şablonu senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Bash Script Şablonu işlemleri daha kanıt-tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adı s, argüman, bayrak\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 409, "no": "409", "cat": "Otomasyon", "name": "Idempotent Cron Job Şablonları Kütüphanesi", "desc": "arayüz bağlamında Cron Job Şablonları için idempotent bir kütüphanesi. Yaygın cron ifadeleri ve zamanlama rehberi ile örnek cron job konfigürasyonları. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["cron", "zamanlama", "otomatik", "arayüz", "idempotent", "başlangıç"], "badge1": "Başlangıç", "content": "## Cron İfadeleri\n```\n# dakika saat gün ay haftanın-günü komut\n0 2 * * *    /backup.sh      # Her gece 02:00\n0 9 * * 1-5  /report.sh      # Hafta içi 09:00\n*/15 * * * * /health.sh      # Her 15 dakika\n0 0 1 * *    /monthly.sh     # Her ayın 1'i\n0 0 * * 0    /weekly.sh      # Her Pazar gece yarısı\n\n# crontab düzenle\ncrontab -e\n# Listele\ncrontab -l\n```\nLog: `2>&1 | tee -a /var/log/cron.log`\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Başlangıç seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Cron Job Şablonları senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Cron Job Şablonları işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Cron Job Şablonları ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** cron, zamanlama, otomatik\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 410, "no": "410", "cat": "Dosya İşlemleri", "name": "Mobile-First find Komutu Şablonları Çerçevesi", "desc": "monitoring bağlamında find Komutu Şablonları için mobile-first bir çerçevesi. Dosya arama, filtreleme ve toplu işlem için find komutunun yaygın kalıpları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["find", "arama", "dosya", "monitoring", "mobile-first", "i̇leri"], "badge1": "İleri", "content": "## find Şablonları\n```bash\n# Son 7 günde değişen dosyalar\nfind . -mtime -7 -type f\n\n# Boyutu 100MB'dan büyük\nfind / -size +100M -type f\n\n# İzin araması\nfind . -perm /a+x -type f\n\n# Toplu işlem\nfind . -name '*.log' -exec gzip {} \\;\nfind . -name '*.tmp' -delete\n\n# Hariç tutma\nfind . -path ./node_modules -prune -o -name '*.js' -print\n\n# 30 günden eski silinmiş loglar\nfind /var/log -name '*.log' -mtime +30 -delete\n```\n\n## Genişletilmiş Notlar (Mobile-First)\n\n- **Hedef Kitle:** İleri seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde find Komutu Şablonları senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde find Komutu Şablonları işlemleri daha mobile-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde find Komutu Şablonları ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** find, arama, dosya\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 411, "no": "411", "cat": "Dosya İşlemleri", "name": "Sezgisel sed ve awk Refactor Yöntemi", "desc": "logging bağlamında sed ve awk için sezgisel bir refactor yöntemi. Metin dönüşümü için sed ile satır düzenleme ve awk ile alanlarla çalışma. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["sed", "awk", "metin", "logging", "sezgisel", "uzman"], "badge1": "Uzman", "content": "## sed & awk\n```bash\n# sed: Metin değiştirme\nsed 's/eski/yeni/g' dosya.txt\nsed -i.bak 's/localhost/prod-server/g' config.env\nsed -n '10,20p' dosya.txt  # 10-20. satırlar\nsed '/^#/d' config.txt     # Yorum satırları sil\n\n# awk: Alan işleme\nawk '{print $1, $3}' log.txt  # 1. ve 3. alanlar\nawk -F: '{print $1}' /etc/passwd  # : ayraç\nawk 'NR>1 {sum+=$4} END {print \"Toplam:\", sum}' data.csv\nawk '/ERROR/ {count++} END {print count}' app.log\n```\n\n## Uygulama Senaryosu (Sezgisel)\n\nBu refactor yöntemi, logging alanında sed ve awk problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** sed ve awk akışını sezgisel yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 412, "no": "412", "cat": "Sistem Yönetimi", "name": "Zero-Config Süreç ve Port Rehberi", "desc": "mimari bağlamında Süreç ve Port için zero-config bir rehberi. Çalışan süreçleri bulma, port kontrolü ve süreç yönetimi komutları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["süreç", "port", "ps", "mimari", "zero-config", "orta"], "badge1": "Orta", "content": "## Süreç & Port Komutları\n```bash\n# Süreç listesi\nps aux | grep python\npgrep -fl nginx\n\n# Port kullanımı\nss -tlnp | grep :8080\nlsof -i :8080\nnetstat -tuln\n\n# Süreç öldürme\nkill -15 PID
