<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">E</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Engine<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Özel oyun motoru mimarileri için bellek yönetimi, render pipeline ve component sistemi taslakları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>20</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Engine ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">20</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

<script>

const CATS = [{"id":"Bellek Yönetimi","name":"Bellek Yönetimi","color":"#FF6347"},{"id":"Render Pipeline","name":"Render Pipeline","color":"#4682B4"},{"id":"Component Sistemi","name":"Component Sistemi","color":"#32CD32"},{"id":"Asset Yönetimi","name":"Asset Yönetimi","color":"#FFD700"},{"id":"Fizik Motoru","name":"Fizik Motoru","color":"#DA70D6"},{"id":"Giriş Sistemi","name":"Giriş Sistemi","color":"#8A2BE2"}];
const ITEMS = [{"id":1,"no":"001","cat":"Bellek Yönetimi","name":"Havuzlama (Pooling)","desc":"Tekrar kullanılan nesneler için bellek ön-tahsis.","tags":["bellek","optimizasyon","performans"],"badge1":"Başlangıç","content":"**Nesne Havuzlama (Object Pooling): Oyun Motoru Performans Optimizasyonu**\n\nNesne oluşturma/yok etme maliyetlidir. Havuzlama, sık kullanılan nesneleri tekrar kullanarak GC baskısını ve bellek parçalanmasını azaltır.\n\n**C++ Nesne Havuzu Implementasyonu:**\n```cpp\n#include <vector>\n#include <memory>\n#include <functional>\n\ntemplate<typename T>\nclass ObjectPool {\npublic:\n    ObjectPool(size_t initial_size = 32) {\n        for (size_t i = 0; i < initial_size; ++i)\n            pool_.emplace_back(new T());\n    }\n    \n    T* acquire() {\n        if (pool_.empty()) {\n            return new T();  // Genişlet\n        }\n        T* obj = pool_.back().release();\n        pool_.pop_back();\n        return obj;\n    }\n    \n    void release(T* obj) {\n        obj->reset();  // T::reset() ile temizle\n        pool_.emplace_back(obj);\n    }\n\nprivate:\n    std::vector<std::unique_ptr<T>> pool_;\n};\n\n// Kullanım örneği: Mermi havuzu\nObjectPool<Bullet> bulletPool(100);\n\nvoid fireBullet(Vector2 pos, Vector2 dir) {\n    Bullet* b = bulletPool.acquire();\n    b->init(pos, dir, 10.0f);\n    activeBullets_.push_back(b);\n}\n\nvoid onBulletExpired(Bullet* b) {\n    activeBullets_.erase(b);\n    bulletPool.release(b);  // Geri al, yok etme!\n}\n```\n\n**Havuz Boyutlandırma Kılavuzu:**\n```\nMermi/Partikül: 200-500 (burst anlarda yeterli)\nNPC: 50-100 (aynı anda ekranda maksimum)\nSes efekti: 32-64 (simultane ses limiti)\nUI Element: 20-50 (liste kaydırma için)\n```\n\n**Profiling Kontrolü:** `valgrind --tool=massif` veya Unity Profiler ile havuz boyutunu optimize et.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":2,"no":"002","cat":"Bellek Yönetimi","name":"Akıllı İşaretçiler","desc":"Otomatik bellek yönetimi için C++ işaretçileri.","tags":["bellek","c++","ptr"],"badge1":"Orta","content":"**C++ Akıllı İşaretçiler: Bellek Güvenliği**\n\nAkıllı işaretçiler otomatik bellek yönetimi sağlayarak use-after-free ve bellek sızıntısını önler.\n\n**unique_ptr, shared_ptr, weak_ptr Kullanımı:**\n```cpp\n#include <memory>\n\n// unique_ptr: Tekil sahiplik\nauto player = std::make_unique<Player>(\"Ahmet\", 100);\n// player skoptan çıkınca otomatik silinir\n// Kopyalanamaz, yalnızca taşınabilir\nauto movedPlayer = std::move(player);  // sahiplik devri\n\n// shared_ptr: Paylaşılan sahiplik\nauto texture = std::make_shared<Texture>(\"hero.png\");\n{\n    auto sprite1 = texture;  // ref_count = 2\n    auto sprite2 = texture;  // ref_count = 3\n}  // Blok çıkışında sprite1, sprite2 yok → ref_count = 1\n// texture hâlâ yaşıyor\n\n// weak_ptr: Döngüsel referans kırıcı\nclass Entity {\npublic:\n    std::shared_ptr<Entity> parent;  // ❌ Döngüsel!\n    std::weak_ptr<Entity> parent;    // ✓ weak ile kır\n    \n    void use_parent() {\n        if (auto p = parent.lock()) {  // Güvenli erişim\n            p->do_something();\n        }\n    }\n};\n```\n\n**Oyun Motorunda Tipik Kullanım:**\n```cpp\n// Scene: unique_ptr ile nesne sahipliği\nclass Scene {\n    std::vector<std::unique_ptr<Entity>> entities_;\n\npublic:\n    Entity* addEntity(std::unique_ptr<Entity> e) {\n        entities_.push_back(std::move(e));\n        return entities_.back().get();  // Ham pointer gözlem için\n    }\n};\n\n// Resource Cache: shared_ptr ile paylaşılan asset\nstd::unordered_map<std::string, std::shared_ptr<Texture>> textureCache_;\n```\n\n**Performans Notu:** `shared_ptr` atomik ref count nedeniyle `unique_ptr`'den yavaş. Performans-kritik döngülerde ham pointer veya `unique_ptr` tercih et.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":3,"no":"003","cat":"Bellek Yönetimi","name":"Bellek Ayırıcı","desc":"Özel bellek ayırma ve toplama stratejileri.","tags":["bellek","performans","strateji"],"badge1":"İleri","content":"**Özel Bellek Ayırıcılar: Arena ve Stack Allocator**\n\nStandart `malloc/new` genel amaçlıdır ve oyun için yavaş olabilir. Özel ayırıcılar cache-friendly ve belirlenimli zamanlı erişim sağlar.\n\n**Stack (Linear) Allocator:**\n```cpp\nclass StackAllocator {\npublic:\n    explicit StackAllocator(size_t size)\n        : buffer_(new uint8_t[size]), size_(size), top_(0) {}\n    \n    void* allocate(size_t bytes, size_t alignment = 8) {\n        // Hizalama ayarı\n        size_t padding = (alignment - (top_ % alignment)) % alignment;\n        size_t newTop = top_ + padding + bytes;\n        \n        if (newTop > size_) return nullptr;  // Yetersiz alan\n        \n        void* ptr = buffer_.get() + top_ + padding;\n        top_ = newTop;\n        return ptr;\n    }\n    \n    // Marker ile geri alma\n    size_t getMarker() { return top_; }\n    void rollback(size_t marker) { top_ = marker; }  // Hızlı serbest bırak\n    void reset() { top_ = 0; }  // Tüm frame'i temizle\n\nprivate:\n    std::unique_ptr<uint8_t[]> buffer_;\n    size_t size_, top_;\n};\n\n// Frame allocator: Her frame başında sıfırla\nStackAllocator frameAllocator(1024 * 1024);  // 1MB\n\nvoid gameLoop() {\n    size_t frameStart = frameAllocator.getMarker();\n    \n    // Frame içinde geçici bellek kullan\n    auto* tempData = static_cast<float*>(\n        frameAllocator.allocate(sizeof(float) * 1000));\n    \n    // ... işlem ...\n    \n    frameAllocator.rollback(frameStart);  // Frame bitişinde temizle\n}\n```\n\n**Pool vs Stack vs Heap Karşılaştırması:**\n```\nHeap (new/malloc): Genel, yavaş, parçalanma riski\nStack Alloc: O(1) ayır/serbest, frame içi geçici veri\nPool Alloc: Sabit boyut nesneler, cache-friendly\nArena: Büyük blok → hızlı sub-alloc, toplu serbest bırak\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":4,"no":"004","cat":"Render Pipeline","name":"Temel Render Döngüsü","desc":"Sahne çizimi için temel adımlar.","tags":["render","pipeline","grafik"],"badge1":"Başlangıç","content":"**Oyun Motoru Render Döngüsü: Frame Pipeline Mimarisi**\n\nRender döngüsü oyun motorunun kalbidir. Her frame'de sabit sırayla çalışır ve timing doğruluğu kritiktir.\n\n**Temel Render Loop:**\n```cpp\n#include <chrono>\n\nclass GameEngine {\n    bool running_ = true;\n    float fixedTimeStep_ = 1.0f / 60.0f;  // 60 Hz fizik\n    float accumulator_ = 0.0f;\n    \npublic:\n    void run() {\n        auto lastTime = std::chrono::high_resolution_clock::now();\n        \n        while (running_) {\n            auto now = std::chrono::high_resolution_clock::now();\n            float deltaTime = std::chrono::duration<float>(now - lastTime).count();\n            lastTime = now;\n            deltaTime = std::min(deltaTime, 0.1f);  // Spike sınırı\n            \n            // 1. Giriş İşle\n            inputSystem_.processEvents();\n            \n            // 2. Sabit Adım Fizik (Fixed Update)\n            accumulator_ += deltaTime;\n            while (accumulator_ >= fixedTimeStep_) {\n                physicsSystem_.update(fixedTimeStep_);\n                accumulator_ -= fixedTimeStep_;\n            }\n            \n            // 3. Oyun Mantığı Güncelle (Variable Update)\n            entitySystem_.update(deltaTime);\n            \n            // 4. Render\n            float alpha = accumulator_ / fixedTimeStep_;  // Interpolasyon\n            renderer_.render(alpha);\n            \n            // 5. FPS Ölçümü\n            fpsCounter_.tick(deltaTime);\n        }\n    }\n};\n```\n\n**Interpolasyon Neden Önemli:**\nFizik 60Hz'de çalışsa da ekran 144Hz olabilir. `alpha` değeriyle önceki ve mevcut fizik durumu arasında interpolasyon yapılır → smooth görüntü.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":5,"no":"005","cat":"Render Pipeline","name":"Deferred Shading","desc":"Işık hesaplamasını sonradan yapan render tekniği.","tags":["render","lighting","teknik"],"badge1":"Orta","content":"## Deferred Shading Render Pipeline\n\nGeometry ve lighting pass'ları ayırarak binlerce ışık kaynağını verimli render etme.\n\n**G-Buffer yapısı:**\n```cpp\n// Deferred Shading için G-Buffer\nstruct GBuffer {\n    GLuint albedoSpecular;    // RGB=albedo, A=specular intensity\n    GLuint normalRoughness;   // RGB=world normal, A=roughness\n    GLuint positionMetallic;  // RGB=world pos, A=metallic\n    GLuint emissive;          // RGB=emission\n    GLuint depth;             // Depth stencil\n    GLuint fbo;\n    \n    void create(int width, int height) {\n        glGenFramebuffers(1, &fbo);\n        glBindFramebuffer(GL_FRAMEBUFFER, fbo);\n        // Her buffer için texture oluştur ve FBO'ya attach et\n        createColorAttachment(albedoSpecular, GL_RGBA8, width, height, GL_COLOR_ATTACHMENT0);\n        createColorAttachment(normalRoughness, GL_RGBA16F, width, height, GL_COLOR_ATTACHMENT1);\n        createColorAttachment(positionMetallic, GL_RGBA32F, width, height, GL_COLOR_ATTACHMENT2);\n    }\n};\n```\n\n**Geometry pass (G-Pass):**\n```glsl\n// Fragment shader: G-buffer'a yaz\nlayout (location = 0) out vec4 gAlbedoSpec;\nlayout (location = 1) out vec4 gNormalRough;\nlayout (location = 2) out vec4 gPositionMetal;\n\nvoid main() {\n    gAlbedoSpec = vec4(material.albedo, material.specular);\n    gNormalRough = vec4(normalize(fs_in.Normal), material.roughness);\n    gPositionMetal = vec4(fs_in.FragPos, material.metallic);\n}\n```\n\n**Lighting pass:**\n```glsl\n// G-buffer'ı oku, tüm ışıkları hesapla\nvec3 FragPos  = texture(gPositionMetal, TexCoords).rgb;\nvec3 Normal   = texture(gNormalRough, TexCoords).rgb;\nvec3 Albedo   = texture(gAlbedoSpec, TexCoords).rgb;\n\nvec3 lighting = vec3(0.0);\nfor(int i = 0; i < NR_LIGHTS; ++i) {\n    lighting += CalcPointLight(lights[i], FragPos, Normal, Albedo);\n}\n```\n\n**Prompt:** \"Bu forward render motoruna deferred shading pipeline ekle; 1000+ ışık kaynağı desteklesin, G-buffer layout'unu PBR materyallere göre tasarla.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":6,"no":"006","cat":"Render Pipeline","name":"MSAA (Çoklu Örnekleme)","desc":"Kenar yumuşatma için gelişmiş örnekleme tekniği.","tags":["render","aa","kalite"],"badge1":"Orta","content":"## MSAA Anti-Aliasing Implementasyonu\n\nÇoklu örnekleme ile kenar pürüzlüğünü giderme ve render kalitesini artırma.\n\n**OpenGL MSAA kurulumu:**\n```cpp\n// MSAA framebuffer oluşturma\nGLuint msaaFBO, msaaColorBuffer, msaaDepthBuffer;\n\nglGenFramebuffers(1, &msaaFBO);\nglBindFramebuffer(GL_FRAMEBUFFER, msaaFBO);\n\n// Multisample color buffer\nglGenRenderbuffers(1, &msaaColorBuffer);\nglBindRenderbuffer(GL_RENDERBUFFER, msaaColorBuffer);\nglRenderbufferStorageMultisample(GL_RENDERBUFFER, 4, GL_RGB8, width, height); // 4x MSAA\nglFramebufferRenderbuffer(GL_FRAMEBUFFER, GL_COLOR_ATTACHMENT0, GL_RENDERBUFFER, msaaColorBuffer);\n\n// Multisample depth buffer\nglGenRenderbuffers(1, &msaaDepthBuffer);\nglBindRenderbuffer(GL_RENDERBUFFER, msaaDepthBuffer);\nglRenderbufferStorageMultisample(GL_RENDERBUFFER, 4, GL_DEPTH24_STENCIL8, width, height);\nglFramebufferRenderbuffer(GL_FRAMEBUFFER, GL_DEPTH_STENCIL_ATTACHMENT, GL_RENDERBUFFER, msaaDepthBuffer);\n```\n\n**MSAA'dan normal FBO'ya resolve:**\n```cpp\n// MSAA FBO'yu intermediate FBO'ya blit\nglBindFramebuffer(GL_READ_FRAMEBUFFER, msaaFBO);\nglBindFramebuffer(GL_DRAW_FRAMEBUFFER, intermediateFBO);\nglBlitFramebuffer(0, 0, width, height, 0, 0, width, height,\n                  GL_COLOR_BUFFER_BIT, GL_NEAREST);\n```\n\n**Kalite/performans dengesi:**\n| MSAA Seviyesi | Kalite | Maliyet |\n|--------------|--------|----------|\n| 2x | Belirgin iyileşme | %30 yavaş |\n| 4x | İyi (önerilen) | %60 yavaş |\n| 8x | Çok iyi | %120 yavaş |\n\n**Prompt:** \"Bu OpenGL motoruna 4x MSAA ekle; deferred rendering ile MSAA çelişkisi var, nasıl çözeceğini açıkla ve FXAA alternatifini karşılaştır.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":7,"no":"007","cat":"Render Pipeline","name":"Shader Optimizasyonu","desc":"Shader performansını artırma yöntemleri.","tags":["render","shader","optimizasyon"],"badge1":"İleri","content":"## GPU Shader Optimizasyon Teknikleri\n\nGLSL/HLSL shader performansını artırma, branch azaltma ve bellek erişimi optimizasyonu.\n\n**Yaygın shader performans tuzakları:**\n```glsl\n// KÖTÜ: Dynamic branching — GPU warp divergence'a neden olur\nvoid main() {\n    if (material.type == 0) {      // Farklı thread'ler farklı dalda\n        color = diffuseShading();  // Her iki dal da execute edilir\n    } else {\n        color = specularShading();\n    }\n}\n\n// İYİ: Branchless — mix/step ile seç\nvoid main() {\n    float isDiffuse = step(0.5, float(material.type == 0));\n    vec3 diffuse = diffuseShading();\n    vec3 specular = specularShading();\n    color = mix(specular, diffuse, isDiffuse);  // Her zaman ikisini de hesapla\n}\n```\n\n**Texture sampling optimizasyonu:**\n```glsl\n// KÖTÜ: Her fragment'ta hesapla\nvec2 uv = gl_FragCoord.xy / vec2(screenWidth, screenHeight);\n\n// İYİ: Vertex shader'da hesapla, interpolate et\n// vertex shader:\nout vec2 vTexCoord;\nvoid main() {\n    vTexCoord = (position.xy + 1.0) * 0.5;  // Bir kez hesaplanır\n}\n```\n\n**Uniform/constant buffer kullanımı:**\n```glsl\n// KÖTÜ: Ayrı ayrı uniform'lar → sık GPU-CPU veri transferi\nuniform mat4 model;\nuniform mat4 view;\nuniform mat4 projection;\n\n// İYİ: Uniform Buffer Object (UBO)\nlayout(std140, binding = 0) uniform Matrices {\n    mat4 model;\n    mat4 view;\n    mat4 projection;\n    mat4 mvp;  // Önceden hesaplanmış\n} matrices;\n```\n\n**Prompt:** \"Bu PBR fragment shader'ını profille; en maliyetli operasyonları tespit et, branchless alternatifleri yaz ve texture lookup sayısını azalt.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":8,"no":"008","cat":"Component Sistemi","name":"Temel Entity-Component","desc":"Oyun nesneleri için modüler yapı.","tags":["ecs","component","mimari"],"badge1":"Başlangıç","content":"**Entity-Component-System (ECS): Oyun Motoru Mimarisinin Temeli**\n\nECS, inheritance zinciri yerine bileşim (composition) kullanarak esneklik ve cache verimliliği sağlar.\n\n**Minimal ECS Implementasyonu:**\n```cpp\n#include <cstdint>\n#include <unordered_map>\n#include <typeindex>\n#include <any>\n#include <vector>\n\nusing EntityID = uint32_t;\n\nclass World {\n    EntityID nextID_ = 1;\n    std::unordered_map<EntityID, std::unordered_map<std::type_index, std::any>> components_;\n\npublic:\n    EntityID createEntity() { return nextID_++; }\n    \n    template<typename T>\n    void addComponent(EntityID entity, T component) {\n        components_[entity][std::type_index(typeid(T))] = std::move(component);\n    }\n    \n    template<typename T>\n    T* getComponent(EntityID entity) {\n        auto it = components_[entity].find(std::type_index(typeid(T)));\n        if (it == components_[entity].end()) return nullptr;\n        return std::any_cast<T>(&it->second);\n    }\n    \n    template<typename T>\n    std::vector<EntityID> getEntitiesWith() {\n        std::vector<EntityID> result;\n        for (auto& [id, comps] : components_)\n            if (comps.count(std::type_index(typeid(T))))\n                result.push_back(id);\n        return result;\n    }\n};\n\n// Bileşenler (saf veri)\nstruct Transform { float x, y, z; float rotation; float scale; };\nstruct Velocity { float vx, vy; };\nstruct Health { int current, max; };\n\n// Kullanım\nWorld world;\nEntityID player = world.createEntity();\nworld.addComponent(player, Transform{0, 0, 0, 0, 1.0f});\nworld.addComponent(player, Health{100, 100});\n```\n\n**Production ECS:** EnTT (C++), FLECS, Unity DOTS — bunlar cache-friendly SoA (Structure of Arrays) düzeni kullanır.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":9,"no":"009","cat":"Component Sistemi","name":"Veri Odaklı Tasarım","desc":"ECS'de veri yerleşimi ve önbellek dostu erişim.","tags":["ecs","veri","performans"],"badge1":"Orta","content":"## Veri Odaklı Tasarım (Data-Oriented Design)\n\nCPU önbellek verimliliği için bellek yerleşimini optimize eden oyun motoru mimari yaklaşımı.\n\n**AoS vs SoA karşılaştırması:**\n```cpp\n// Array of Structures (AoS) — kötü önbellek kullanımı\nstruct Entity {\n    Vector3 position;  // 12 byte\n    Vector3 velocity;  // 12 byte\n    float health;      // 4 byte\n    bool active;       // 1 byte\n    // padding: 3 byte\n};\nEntity entities[10000];  // Sıralı güncelleme önbellekten atlar\n\n// Structure of Arrays (SoA) — iyi önbellek kullanımı\nstruct EntityArrays {\n    Vector3 positions[10000];  // Tümü bellek sıralı\n    Vector3 velocities[10000];\n    float   healths[10000];\n    bool    actives[10000];\n};\n// positions boyunca iterate = SIMD dostu, önbellek-sıcak\n```\n\n**Performans farkı:**\n```cpp\n// AoS: her entity için 32 byte stride — önbellek atlama\nfor (auto& e : entities) {\n    e.position += e.velocity * dt;  // 32 byte aralıklı erişim\n}\n\n// SoA: ardışık bellek — önbellek satırı verimli\nfor (int i = 0; i < count; i++) {\n    data.positions[i] += data.velocities[i] * dt;  // Sıralı\n}\n// SoA tipik olarak 2-8x daha hızlı büyük entity sayısında\n```\n\n**Prompt:** \"Bu ECS sistemindeki entity güncelleme döngüsünü AoS'tan SoA'ya dönüştür; benchmark ekle ve önbellek miss oranını karşılaştır.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":10,"no":"010","cat":"Component Sistemi","name":"Sistem Bağımlılıkları","desc":"Sistemlerin birbirleriyle etkileşimini yönetme.","tags":["ecs","sistem","mimari"],"badge1":"Orta","content":"## ECS Sistem Bağımlılık Yönetimi\n\nEntity Component System'de sistem çalışma sırası ve bağımlılık çözümlemesi.\n\n**Sistem öncelik ve bağımlılık:**\n```cpp\nstruct SystemInfo {\n    std::string name;\n    int         priority;      // Düşük = önce çalışır\n    std::vector<std::string> dependencies; // Önce çalışması gerekenler\n    std::vector<std::string> reads;  // Okunan bileşen tipleri\n    std::vector<std::string> writes; // Yazılan bileşen tipleri\n};\n\nclass SystemScheduler {\npublic:\n    void addSystem(ISystem* system, const SystemInfo& info) {\n        m_systems.push_back({system, info});\n    }\n    \n    std::vector<ISystem*> buildExecutionOrder() {\n        // Topological sort (Kahn algoritması)\n        return topoSort(m_systems);\n    }\n    \n    void detectConflicts() {\n        // Aynı bileşeni iki sistem de yazıyorsa uyar\n        for (auto& [sysA, infoA] : m_systems)\n        for (auto& [sysB, infoB] : m_systems)\n            for (auto& compA : infoA.writes)\n                for (auto& compB : infoB.writes)\n                    if (compA == compB && sysA != sysB)\n                        logWarning(\"Write conflict: \" + compA);\n    }\n};\n```\n\n**Paralel yürütme:**\n```cpp\n// Bağımsız sistemleri paralel çalıştır\nstd::vector<std::future<void>> futures;\nfor (auto& group : parallelGroups) {\n    for (auto* sys : group)\n        futures.push_back(std::async(std::launch::async,\n            [sys]{ sys->update(); }));\n    for (auto& f : futures) f.get();\n    futures.clear();\n}\n```\n\n**Prompt:** \"Bu ECS motoruna bağımlılık tabanlı sistem zamanlaması ekle; PhysicsSystem InputSystem'dan sonra, RenderSystem tümünden sonra çalışsın; paralel grupları otomatik tespit et.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":11,"no":"011","cat":"Component Sistemi","name":"Event Sistemi Entegrasyonu","desc":"ECS içinde olay tabanlı iletişim.","tags":["ecs","event","iletişim"],"badge1":"İleri","content":"**Olay Sistemi (Event System): Gevşek Bağlı Oyun Mimarisi**\n\nEvent sistemi, oyun bileşenlerini doğrudan referanslamadan haberleştirir. Bağımlılık azaltır, modülerliği artırır.\n\n**Type-Safe Event Bus:**\n```cpp\n#include <functional>\n#include <unordered_map>\n#include <typeindex>\n#include <vector>\n#include <any>\n\nclass EventBus {\n    using Handler = std::function<void(const std::any&)>;\n    std::unordered_map<std::type_index, std::vector<Handler>> handlers_;\n\npublic:\n    template<typename EventType>\n    void subscribe(std::function<void(const EventType&)> handler) {\n        handlers_[typeid(EventType)].push_back(\n            [handler](const std::any& event) {\n                handler(std::any_cast<const EventType&>(event));\n            }\n        );\n    }\n    \n    template<typename EventType>\n    void publish(const EventType& event) {\n        auto it = handlers_.find(typeid(EventType));\n        if (it != handlers_.end())\n            for (auto& handler : it->second)\n                handler(event);\n    }\n};\n\n// Olay tanımları\nstruct PlayerDied { EntityID entityId; int score; };\nstruct EnemySpawned { EntityID id; Vector2 position; };\nstruct ItemCollected { ItemType type; int quantity; };\n\n// Kullanım\nEventBus bus;\n\n// Abonelik\nbus.subscribe<PlayerDied>([](const PlayerDied& e) {\n    gameUI.showDeathScreen(e.score);\n    achievementSystem.check(\"first_death\");\n    leaderboard.submit(e.score);\n});\n\n// Yayınlama\nbus.publish(PlayerDied{playerId, currentScore});\n```\n\n**Deferred Events:** Olay işleme sırasında yeni olay yayınlamaktan kaçın (sonsuz döngü riski). `queue` tabanlı deferred sistem kullan.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":12,"no":"012","cat":"Asset Yönetimi","name":"Asset Yükleyici","desc":"Farklı formatlardaki varlıkları yükleme arayüzü.","tags":["asset","yükleme","arayüz"],"badge1":"Başlangıç","content":"**Asenkron Asset Yükleyici: Oyun Motoru Resource Yönetimi**\n\nAsset yükleme bloke edici olmamalı. Asenkron yükleme ile oyun akışı ve yükleme ekranları sorunsuz çalışır.\n\n**Asset Manager Implementasyonu:**\n```cpp\n#include <future>\n#include <unordered_map>\n#include <memory>\n#include <string>\n\ntemplate<typename AssetType>\nclass AssetManager {\n    std::unordered_map<std::string, std::shared_ptr<AssetType>> cache_;\n    std::unordered_map<std::string, std::future<std::shared_ptr<AssetType>>> pending_;\n\npublic:\n    // Asenkron yükleme başlat\n    void loadAsync(const std::string& path) {\n        if (cache_.count(path) || pending_.count(path)) return;\n        \n        pending_[path] = std::async(std::launch::async, [path]() {\n            return AssetType::loadFromDisk(path);  // IO thread'de\n        });\n    }\n    \n    // Hazır mı kontrol et (non-blocking)\n    bool isReady(const std::string& path) const {\n        return cache_.count(path) > 0;\n    }\n    \n    // Ana thread'de transfer et\n    void processCompleted() {\n        for (auto it = pending_.begin(); it != pending_.end(); ) {\n            if (it->second.wait_for(std::chrono::seconds(0)) == std::future_status::ready) {\n                cache_[it->first] = it->second.get();  // GPU upload ana thread'de\n                it = pending_.erase(it);\n            } else {\n                ++it;\n            }\n        }\n    }\n    \n    std::shared_ptr<AssetType> get(const std::string& path) {\n        return cache_.at(path);\n    }\n};\n\n// Kullanım: Sahne geçişinde yükle\nAssetManager<Texture> texMgr;\ntexMgr.loadAsync(\"textures/hero.png\");\ntexMgr.loadAsync(\"textures/enemy.png\");\n// Oyun döngüsünde her frame processCompleted() çağır\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":13,"no":"013","cat":"Asset Yönetimi","name":"Asenkron Yükleme","desc":"Arka planda varlık yükleyerek takılmaları önleme.","tags":["asset","asenkron","performans"],"badge1":"Orta","content":"## Asenkron Asset Yükleme Sistemi\n\nOyun motorunda loading screen sırasında arka planda varlık yükleme.\n\n**Thread-safe asset yükleyici:**\n```cpp\n#include <future>\n#include <queue>\n#include <mutex>\n\nclass AsyncAssetLoader {\npublic:\n    template<typename T>\n    std::future<std::shared_ptr<T>> loadAsync(const std::string& path) {\n        return std::async(std::launch::async, [this, path]() {\n            return load<T>(path);\n        });\n    }\n    \n    void processMainThreadQueue() {\n        // GPU upload gibi main thread gerektiren işler\n        std::lock_guard<std::mutex> lock(m_mainQueueMutex);\n        while (!m_mainThreadQueue.empty()) {\n            auto task = std::move(m_mainThreadQueue.front());\n            m_mainThreadQueue.pop();\n            task();  // OpenGL call vs.\n        }\n    }\n\nprivate:\n    std::queue<std::function<void()>> m_mainThreadQueue;\n    std::mutex m_mainQueueMutex;\n};\n```\n\n**Yükleme ilerleme takibi:**\n```cpp\nstruct LoadingProgress {\n    std::atomic<int> totalItems{0};\n    std::atomic<int> loadedItems{0};\n    \n    float getProgress() const {\n        if (totalItems == 0) return 1.0f;\n        return static_cast<float>(loadedItems) / totalItems;\n    }\n};\n\n// UI'da:\nfloat progress = loader.getProgress();\nrenderLoadingBar(progress);  // 0.0 - 1.0\n```\n\n**Öncelik sırası:**\n```cpp\nenum class LoadPriority { Critical=0, High=1, Normal=2, Background=3 };\n// Kamera yakınındaki assetler Critical, uzaktakiler Background\n```\n\n**Prompt:** \"Bu oyuna level geçişlerinde asenkron yükleme sistemi ekle; kritik assetler önce yüklensin, %50'ye geldiğinde oyun başlayabilsin.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":14,"no":"014","cat":"Asset Yönetimi","name":"Asset Veritabanı","desc":"Projedeki tüm varlıkları yöneten indeks.","tags":["asset","veritabanı","yönetim"],"badge1":"Orta","content":"## Oyun Motoru Asset Veritabanı Tasarımı\n\nAsset yönetim sistemi: kayıt, indeksleme, bağımlılık takibi ve sürüm yönetimi.\n\n**Asset kayıt sistemi:**\n```cpp\n#include <unordered_map>\n#include <filesystem>\n\nstruct AssetRecord {\n    std::string guid;          // UUID benzeri benzersiz ID\n    std::string path;          // Diskteki yol\n    std::string type;          // 'texture', 'mesh', 'audio', 'shader'\n    uint64_t    lastModified;  // Dosya değişim zaman damgası\n    size_t      fileSize;      // Byte\n    std::vector<std::string> dependencies; // Bağımlı assetler\n};\n\nclass AssetDatabase {\npublic:\n    void scan(const std::filesystem::path& root) {\n        for (auto& entry : std::filesystem::recursive_directory_iterator(root)) {\n            if (entry.is_regular_file()) {\n                registerAsset(entry.path());\n            }\n        }\n    }\n\n    AssetRecord* findByGuid(const std::string& guid) {\n        auto it = m_records.find(guid);\n        return it != m_records.end() ? &it->second : nullptr;\n    }\n\nprivate:\n    std::unordered_map<std::string, AssetRecord> m_records;\n    void registerAsset(const std::filesystem::path& path);\n};\n```\n\n**Değişiklik tespiti:**\n```cpp\nbool AssetDatabase::hasChanged(const AssetRecord& record) {\n    auto current = std::filesystem::last_write_time(record.path);\n    auto stored = std::filesystem::file_time_type(record.lastModified);\n    return current != stored;  // Yeniden import gerekiyor\n}\n```\n\n**Prompt:** \"Bu oyun motoruna asset veritabanı ekle; GUID bazlı referans sistemi, değişiklik tespiti ve bağımlılık grafiği kur, dead asset uyarısı ver.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":15,"no":"015","cat":"Asset Yönetimi","name":"Paketleme (Packaging)","desc":"Varlıkları dağıtım için tek dosyalarda birleştirme.","tags":["asset","paket","dağıtım"],"badge1":"İleri","content":"**Oyun Paketleme: Platform Dağıtım Sürecini Otomatize Etme**\n\nBuild sürecini otomatize etmek sürekli kalite garantisi ve hızlı yayın sağlar.\n\n**CMake ile Cross-Platform Build:**\n```cmake\ncmake_minimum_required(VERSION 3.20)\nproject(MyGame VERSION 1.0.0)\n\nset(CMAKE_CXX_STANDARD 17)\n\n# Platform tespiti\nif(WIN32)\n    add_compile_definitions(PLATFORM_WINDOWS)\nelseif(APPLE)\n    add_compile_definitions(PLATFORM_MACOS)\nelseif(UNIX)\n    add_compile_definitions(PLATFORM_LINUX)\nendif()\n\n# Executable\nadd_executable(${PROJECT_NAME}\n    src/main.cpp\n    src/engine/GameEngine.cpp\n    # ...\n)\n\n# Asset paketleme\nadd_custom_command(TARGET ${PROJECT_NAME} POST_BUILD\n    COMMAND ${CMAKE_COMMAND} -E copy_directory\n        ${CMAKE_SOURCE_DIR}/assets\n        $<TARGET_FILE_DIR:${PROJECT_NAME}>/assets\n    COMMENT \"Asset'leri kopyalıyor...\"\n)\n```\n\n**CI/CD Build Pipeline (GitHub Actions):**\n```yaml\njobs:\n  build:\n    strategy:\n      matrix:\n        os: [ubuntu-latest, windows-latest, macos-latest]\n    runs-on: ${{ matrix.os }}\n    steps:\n      - uses: actions/checkout@v3\n      - name: CMake Build\n        run: |\n          cmake -B build -DCMAKE_BUILD_TYPE=Release\n          cmake --build build\n      - name: Test\n        run: ./build/MyGameTests\n      - name: Package\n        run: cpack --config build/CPackConfig.cmake\n```\n\n**Asset Paketleme (ZIP/PAK dosyası):** Tüm asset'leri tek PAK dosyasına paketle → load time azalır, asset gizleme sağlanır.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":16,"no":"016","cat":"Fizik Motoru","name":"Katı Cisim Dinamiği","desc":"Nesnelerin kütle, hız ve çarpışma simülasyonu.","tags":["fizik","katı cisim","simülasyon"],"badge1":"Orta","content":"**Katı Cisim Fizik Simülasyonu: Pozisyon ve Hız Entegrasyonu**\n\nKatı cisim dinamiği Euler veya daha hassas RK4 entegrasyon yöntemiyle hesaplanır.\n\n**RigidBody Simülatörü:**\n```cpp\nstruct RigidBody {\n    Vector2 position;\n    Vector2 velocity;\n    float rotation;       // Radyan\n    float angularVel;     // Rad/s\n    float mass;\n    float invMass;        // 0 = sonsuz kütle (statik)\n    float inertia;\n    float restitution;    // 0-1: Geri sekme katsayısı\n    float friction;       // 0-1: Sürtünme\n    \n    // Kuvvet birikimi\n    Vector2 forceAccum;\n    float torqueAccum;\n    \n    void applyForce(Vector2 force, Vector2 point = {0,0}) {\n        forceAccum += force;\n        // Tork: r × F\n        torqueAccum += point.x * force.y - point.y * force.x;\n    }\n    \n    void integrate(float dt) {\n        if (invMass == 0) return;  // Statik cisim\n        \n        // Doğrusal entegrasyon\n        Vector2 acceleration = forceAccum * invMass;\n        velocity += acceleration * dt;\n        position += velocity * dt;\n        \n        // Açısal entegrasyon\n        float angularAcc = torqueAccum / inertia;\n        angularVel += angularAcc * dt;\n        rotation += angularVel * dt;\n        \n        // Kuvvetleri sıfırla\n        forceAccum = {0, 0};\n        torqueAccum = 0;\n    }\n};\n\n// Yerçekimi uygulaması\nvoid applyGravity(RigidBody& rb, float g = 9.81f) {\n    if (rb.invMass > 0)  // Yalnızca dinamik cisimlere\n        rb.applyForce({0, -g * rb.mass});\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":17,"no":"017","cat":"Fizik Motoru","name":"Çarpışma Tespiti (Broadphase)","desc":"Potansiyel çarpışan nesne çiftlerini hızlıca bulma.","tags":["fizik","çarpışma","optimizasyon"],"badge1":"Orta","content":"## Broad-Phase Çarpışma Tespiti\n\nFizik motorunda potansiyel çarpışmaları hızlı elemek için geniş faz algoritmaları.\n\n**AABB tree (Bounding Volume Hierarchy):**\n```cpp\nstruct AABB {\n    Vector3 min, max;\n    \n    bool overlaps(const AABB& other) const {\n        return (min.x <= other.max.x && max.x >= other.min.x) &&\n               (min.y <= other.max.y && max.y >= other.min.y) &&\n               (min.z <= other.max.z && max.z >= other.min.z);\n    }\n    \n    AABB merge(const AABB& other) const {\n        return { Vector3::min(min, other.min), Vector3::max(max, other.max) };\n    }\n};\n\nstruct BVHNode {\n    AABB  bounds;\n    int   left = -1, right = -1;  // Alt ağaçlar (-1 = yaprak)\n    int   entityId = -1;           // Yaprak ise entity ID'si\n};\n```\n\n**Sweep and Prune (SAP) algoritması:**\n```cpp\n// X ekseninde sırala, örtüşen AABB çiftleri bul\nstruct SAPEndpoint {\n    float value;\n    int   entityId;\n    bool  isMax;  // true=max endpoint, false=min endpoint\n};\n\nvoid broadphaseSAP(std::vector<Entity>& entities) {\n    std::vector<SAPEndpoint> xAxis;\n    for (auto& e : entities) {\n        xAxis.push_back({e.aabb.min.x, e.id, false});\n        xAxis.push_back({e.aabb.max.x, e.id, true});\n    }\n    std::sort(xAxis.begin(), xAxis.end(),\n              [](auto& a, auto& b){ return a.value < b.value; });\n    // Aktif set ile potansiyel çiftle bul\n}\n```\n\n**Prompt:** \"Bu fizik motoruna BVH broad-phase ekle; statik ve dinamik nesneleri ayır, dinamik AABB yeniden inşa stratejisini açıkla.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":18,"no":"018","cat":"Fizik Motoru","name":"Çarpışma Çözümü (Narrowphase)","desc":"Tespit edilen çiftlerin kesin kesişimini hesaplama.","tags":["fizik","çarpışma","narrowphase"],"badge1":"İleri","content":"**Çarpışma Çözümü: Impuls Tabanlı Fizik**\n\nNarrowphase, iki cismin çakışıp çakışmadığını ve ne kadar çakıştığını hesaplar; çözüm ise onları iter.\n\n**AABB-AABB Çarpışma Tespiti:**\n```cpp\nstruct AABB {\n    Vector2 min, max;\n    \n    bool intersects(const AABB& other) const {\n        return min.x < other.max.x && max.x > other.min.x &&\n               min.y < other.max.y && max.y > other.min.y;\n    }\n    \n    Vector2 overlap(const AABB& other) const {\n        float ox = std::min(max.x, other.max.x) - std::max(min.x, other.min.x);\n        float oy = std::min(max.y, other.max.y) - std::max(min.y, other.min.y);\n        return {ox, oy};\n    }\n};\n\nvoid resolveCollision(RigidBody& a, RigidBody& b, Vector2 normal, float penetration) {\n    // Bağıl hız\n    Vector2 rv = b.velocity - a.velocity;\n    float velAlongNormal = dot(rv, normal);\n    \n    // Birbirinden uzaklaşıyorlarsa çöz\n    if (velAlongNormal > 0) return;\n    \n    float e = std::min(a.restitution, b.restitution);\n    float j = -(1 + e) * velAlongNormal;\n    j /= a.invMass + b.invMass;\n    \n    // Impuls uygula\n    Vector2 impulse = normal * j;\n    a.velocity -= impulse * a.invMass;\n    b.velocity += impulse * b.invMass;\n    \n    // Nüfuziyet düzeltme\n    const float percent = 0.2f;\n    Vector2 correction = normal * (penetration / (a.invMass + b.invMass)) * percent;\n    a.position -= correction * a.invMass;\n    b.position += correction * b.invMass;\n}\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":19,"no":"019","cat":"Giriş Sistemi","name":"Giriş Eşleme","desc":"Farklı donanımları soyutlayarak komut atama.","tags":["giriş","kontrol","eşleme"],"badge1":"Başlangıç","content":"## Giriş Eşleme Sistemi (Input Mapping)\n\nOyun motorunda soyutlama katmanı ile yeniden eşlenebilir girdi sistemi tasarımı.\n\n**Eylem tabanlı girdi soyutlama:**\n```cpp\nenum class GameAction {\n    Jump, Attack, MoveLeft, MoveRight, MoveForward, MoveBack,\n    Interact, Pause, InventoryOpen\n};\n\nstruct InputBinding {\n    GameAction action;\n    int        keyCode;      // SDL_SCANCODE_* veya GLFW_KEY_*\n    int        gamepadButton; // Gamepad karşılığı\n    int        mouseButton;   // -1 = yok\n};\n\nclass InputMapper {\npublic:\n    void bind(GameAction action, int keyCode) {\n        m_bindings[action] = keyCode;\n    }\n    \n    bool isActionPressed(GameAction action) const {\n        auto it = m_bindings.find(action);\n        if (it == m_bindings.end()) return false;\n        return isKeyDown(it->second);\n    }\n    \n    void loadFromConfig(const std::string& path) {\n        // JSON/INI dosyasından eşleme yükle\n    }\n\nprivate:\n    std::unordered_map<GameAction, int> m_bindings;\n};\n```\n\n**Kullanım:**\n```cpp\nif (input.isActionPressed(GameAction::Jump)) {\n    player.jump();  // W, Space veya Gamepad A tuşu — aynı kod\n}\n\n// Kullanıcı keybinding değiştirdiğinde:\ninput.bind(GameAction::Jump, GLFW_KEY_X);\ninput.saveToConfig(\"keybindings.json\");\n```\n\n**Prompt:** \"Bu oyun motoruna rebind destekli input mapping ekle; klavye/gamepad/fare soyutlaması, preset profilleri (WASD/ESDF/gamepad) ve JSON ile kaydetme.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}},{"id":20,"no":"020","cat":"Giriş Sistemi","name":"Girdi Yönetimi","desc":"Girdi olaylarını işleme ve yönlendirme.","tags":["giriş","yönetim","olay"],"badge1":"Orta","content":"**Girdi Yönetimi: Soyutlanmış Input Sistemi**\n\nDoğrudan klavye/kontroller yerine soyutlanmış action mapping oyunu port etmeyi kolaylaştırır ve rebinding sağlar.\n\n**Eylem Tabanlı Input Manager:**\n```cpp\n#include <unordered_map>\n#include <functional>\n#include <string>\n\nenum class InputAction { MOVE_LEFT, MOVE_RIGHT, JUMP, ATTACK, PAUSE };\n\nclass InputManager {\n    // Eylem → Klavye kodu eşlemesi\n    std::unordered_map<InputAction, int> keyBindings_ = {\n        {InputAction::MOVE_LEFT, KEY_A},\n        {InputAction::MOVE_RIGHT, KEY_D},\n        {InputAction::JUMP, KEY_SPACE},\n        {InputAction::ATTACK, KEY_J},\n        {InputAction::PAUSE, KEY_ESCAPE}\n    };\n    \n    std::unordered_map<int, bool> currentKeys_, previousKeys_;\n    \npublic:\n    void update() {\n        previousKeys_ = currentKeys_;\n        // Platform-specific key state polling\n        for (auto& [action, key] : keyBindings_)\n            currentKeys_[key] = IsKeyDown(key);\n    }\n    \n    bool isHeld(InputAction action) {\n        return currentKeys_[keyBindings_[action]];\n    }\n    \n    bool isPressed(InputAction action) {  // Bu frame basıldı mı?\n        int key = keyBindings_[action];\n        return currentKeys_[key] && !previousKeys_[key];\n    }\n    \n    bool isReleased(InputAction action) {\n        int key = keyBindings_[action];\n        return !currentKeys_[key] && previousKeys_[key];\n    }\n    \n    void rebind(InputAction action, int newKey) {\n        keyBindings_[action] = newKey;\n        // Kaydet: settings dosyasına yaz\n    }\n};\n```\n\n**Analog Input (Gamepad):** Thumbstick için deadzone uygula: `if (abs(value) < 0.15f) value = 0;` — küçük titremeleri filtrele.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash-lite"}}];

  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
