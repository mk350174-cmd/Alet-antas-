c": "gözlemlenebilirlik bağlamında Damla Sulama Tasarımı için layered bir düzeni. Damla sulama sisteminin debisi, boru çapı ve lateraller için hesap rehberi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["damla sulama", "debi", "tasarım", "gözlemlenebilirlik", "layered", "pro"], "badge1": "Pro", "content": "## Damla Sulama Hesabı\n1. Bitkinin günlük su ihtiyacı: ET₀ × Kc (mm/gün).\n2. Damlama aralığı: 30-50cm bitki aralığına göre.\n3. Damlatıcı debisi: 1-4 L/saat tipik.\n4. Lateral boru: 16mm PE, max 100m.\n5. Bölge debisi = Bitki sayısı × damlatıcı adedi × debi.\n6. Pompa basıncı: 0.5-2 bar lateral + yükseklik.\n\n## Genişletilmiş Notlar (Layered)\n\n- **Hedef Kitle:** Pro seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Damla Sulama Tasarımı senaryoları\n- **Avantajları:** Bu düzeni sayesinde Damla Sulama Tasarımı işlemleri daha layered hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Damla Sulama Tasarımı ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** damla sulama, debi, tasarım\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 411, "no": "411", "cat": "Sulama Yönetimi", "name": "Edge-Optimize ET Bazlı Sulama Çekirdeği", "desc": "caching bağlamında ET Bazlı Sulama için edge-optimize bir çekirdeği. Evapotranspirasyon verisini kullanarak sulama miktarı ve zamanlamasını optimize edin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ET", "sulama", "verimlilik", "caching", "edge-optimize", "başlangıç"], "badge1": "Başlangıç", "content": "## ET Bazlı Sulama\nNet sulama = ET₀ × Kc × Alan - Yağış\n\nKc değerleri (buğday örneği):\n- Çıkış: 0.3\n- Kardeşlenme: 0.7\n- Başaklanma: 1.1\n- Olgunluk: 0.4\n\nAraç: FAO CLIMWAT, meteo verisi.\nSmartphone: ET uygulamaları (IrrigationApp, FarmHQ).\nHedef: %30 su tasarrufu vs. geleneksel.\n\n## Uygulama Senaryosu (Edge-Optimize)\n\nBu çekirdeği, caching alanında ET Bazlı Sulama problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** ET Bazlı Sulama akışını edge-optimize yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 412, "no": "412", "cat": "Tarım Teknolojisi", "name": "Layered Tarımsal Drone Kullanımı Mimari Yaklaşımı", "desc": "monitoring bağlamında Tarımsal Drone Kullanımı için layered bir mimari yaklaşımı. Dron ile tarla taraması, ilaçlama ve hasar tespiti iş akışı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["drone", "tarama", "ilaçlama", "monitoring", "layered", "uzman"], "badge1": "Uzman", "content": "## Tarım Drone Kullanımı\n1. Görev planlama: DJI Agras/Field Planner.\n2. Sürüş hızı: ilaçlama 5-7 m/s, haritalama 10-15 m/s.\n3. İrtifa: ilaçlama 2-3m, haritalama 50-120m.\n4. Örtüşme: fotoğraf %75-80 kenar örtüşmesi.\n5. Lisans: Türkiye'de SHY 6B/1 sertifikası gerekli.\n6. Çıktı: ortofoto, NDVI haritası, ilaçlama raporu.\n\n## Genişletilmiş Notlar (Layered)\n\n- **Hedef Kitle:** Uzman seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Tarımsal Drone Kullanımı senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Tarımsal Drone Kullanımı işlemleri daha layered hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Tarımsal Drone Kullanımı ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** drone, tarama, ilaçlama\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 413, "no": "413", "cat": "Tarım Teknolojisi", "name": "Hibrit Toprak Nem Sensörü Protokolü", "desc": "logging bağlamında Toprak Nem Sensörü için hibrit bir protokolü. IoT toprak nem sensörlerini sahaya yayarak sulama kararlarını otomatikleştirin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["sensör", "nem", "IoT", "logging", "hibrit", "orta"], "badge1": "Orta", "content": "## Sensör Ağı Kurulumu\n1. Sensör tipi: Capacitive (EC-5, 5TE) veya Tensiometer.\n2. Derinlik: 15cm ve 30cm → kök bölgesi.\n3. Bağlantı: LoRa gateway (1-2km menzil) → bulut.\n4. Alarm: FC% tarla kapasitesinin %50'si → sulama başlat.\n5. Otomasyon: MQTT → Node-RED → sulama vanası.\n6. Kalibrasyon: toprak tipine göre yıllık güncelle.\n\n## Genişletilmiş Notlar (Hibrit)\n\n- **Hedef Kitle:** Orta seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Toprak Nem Sensörü senaryoları\n- **Avantajları:** Bu protokolü sayesinde Toprak Nem Sensörü işlemleri daha hibrit hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Toprak Nem Sensörü ihtiyacını analiz edin.\n  2. Bu protokolü'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sensör, nem, IoT\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 414, "no": "414", "cat": "Hasat & Depolama", "name": "Memory-Safe Tahıl Nem Kontrolü Mimari Yaklaşımı", "desc": "entegrasyon bağlamında Tahıl Nem Kontrolü için memory-safe bir mimari yaklaşımı. Hasatta ve depolamada kritik olan nem içeriğini ölçme ve kuruma yönetimi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["nem", "depolama", "tahıl", "entegrasyon", "memory-safe", "orta"], "badge1": "Orta", "content": "## Tahıl Nem Yönetimi\nGüvenli depolama nem sınırları:\n- Buğday: <%14\n- Mısır: <%14\n- Arpa: <%13\n- Ayçiçeği: <%8\n\nOlçüm: el tipi nem ölçer (Dickey-john, PM-300).\nKuruma maliyeti: 1 nem noktası düşürme ≈ 70 kWh/ton.\nİpucu: Tarlada <%15 olunca hasat → depo maliyetini azalt.\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** Orta seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Tahıl Nem Kontrolü senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Tahıl Nem Kontrolü işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Tahıl Nem Kontrolü ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** nem, depolama, tahıl\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 415, "no": "415", "cat": "Hasat & Depolama", "name": "Mikroservis Soğuk Zincir Yönetimi İskeleti", "desc": "yapay zeka bağlamında Soğuk Zincir Yönetimi için mikroservis bir i̇skeleti. Yaş meyve-sebze için soğuk zincir kırılmalarını önleyen lojistik protokol. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["soğuk zincir", "raf ömrü", "lojistik", "yapay zeka", "mikroservis", "pro"], "badge1": "Pro", "content": "## Soğuk Zincir\nTarla → Ön soğutma → Soğuk depo → Araç → Market\n\nKritik adımlar:\n1. Ön soğutma: hasattan 2 saat içinde ürünü soğut.\n2. Zincir kırılması: her 10°C artış raf ömrünü 2-3x kısaltır.\n3. Sıcaklık kaydı: datalogger ile tüm zincirde izle.\n4. Muz/domates: 12-15°C (soğuk hasarı riski).\n5. Elma: 0-2°C → 6 ay depolama.\n\n## Uygulama Senaryosu (Mikroservis)\n\nBu i̇skeleti, yapay zeka alanında Soğuk Zincir Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Soğuk Zincir Yönetimi akışını mikroservis yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 416, "no": "416", "cat": "Sürdürülebilir Tarım", "name": "Event-Sourced Örtü Bitkisi Faydaları Pratiği", "desc": "gözlemlenebilirlik bağlamında Örtü Bitkisi Faydaları için event-sourced bir pratiği. Kış örtü bitkilerinin toprak erozyonu, azot ve biyolojik çeşitlilik üzerindeki etkileri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["örtü bitkisi", "rotasyon", "azot", "gözlemlenebilirlik", "event-sourced", "orta"], "badge1": "Orta", "content": "## Örtü Bitkisi Seçimi\n| Bitki | Fayda |\n|-------|-------|\n| Fiğ | Biyolojik azot bağlama (80-100 kg N/ha) |\n| Çavdar | Erozyon koruması, yabancı ot baskısı |\n| Turp | Sıkışık toprağı deler, nematod azaltır |\n| Yonca | Uzun ömürlü azot, toprak organik maddesi |\n\nEkim zamanı: Ana hasattan sonra Ağustos-Eylül.\n\n## Genişletilmiş Notlar (Event-Sourced)\n\n- **Hedef Kitle:** Orta seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Örtü Bitkisi Faydaları senaryoları\n- **Avantajları:** Bu pratiği sayesinde Örtü Bitkisi Faydaları işlemleri daha event-sourced hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Örtü Bitkisi Faydaları ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** örtü bitkisi, rotasyon, azot\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-450-final"}}, {"id": 417, "no": "417", "cat": "Hassas Tarım", "name": "Container-Native Verim Haritası Analizi Şablonu", "desc": "entegrasyon bağlamında Verim Haritası Analizi için container-native bir şablonu. Biçerdöver GPS verisiyle oluşturulan verim haritasını yönetim kararına dönüştürün. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["verim", "harita", "analiz", "entegrasyon", "container-native", "pro"], "badge1": "Pro", "content": "## Verim Haritası Adımları\n1. Biçerdövere yield monitor + DGPS tak.\n2. Hasat verisi: SMS, John Deere Operations Center vb.\n3. Ham veriyi temizle: baş/son geçiş hataları, aykırı değerler.\n4. Yazılım: QGIS + VESPER, Ag Leader SMS Basic.\n5. Düşük verimli alanlar: toprak örneği al, neden araştır.\n6. Yönetim bölgesi: 3-5 yıl kümülatif harita → kararlı bölgeler.\n\n## Genişletilmiş Notlar (Container-Native)\n\n- **Hedef Kitle:** Pro seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Verim Haritası Analizi senaryoları\n- **Avantajları:** Bu şablonu sayesinde Verim Haritası Analizi işlemleri daha container-native hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Verim Haritası Analizi ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** verim, harita, analiz\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-450-final"}}, {"id": 418, "no": "418", "cat": "Tarım Teknolojisi", "name": "Polyglot Tarım Muhasebe Yazılımları Refactor Yöntemi", "desc": "güvenlik bağlamında Tarım Muhasebe Yazılımları için polyglot bir refactor yöntemi. Türkiye'de kullanılan tarım muhasebe ve kayıt yazılımlarının karşılaştırması. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["muhasebe", "kayıt", "yazılım", "güvenlik", "polyglot", "uzman"], "badge1": "Uzman", "content": "## Tarım Kayıt Sistemleri\n- **ÇKS (Çiftçi Kayıt Sistemi):**  tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokümantasyon: ekip dışı kullanıcılar zorlanır.\n- Metrik eksikliği: başarıyı ölçemezsen iyileştiremezsin.\n- Eskimiş bağımlılıklar: güvenlik açıklarına davetiye.\n\n### Anahtar Metrikler\n\n| Metrik | Hedef | Kritik Eşik |\n|---|---|---|\n| Latency (p95) | < 200ms | > 500ms |\n| Hata oranı | < %0.1 | > %1 |\n| Throughput | > 1000 rps | < 500 rps |\n| Uptime | %99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi AgriVault dokümantasyonu\n- Sulama Yönetimi topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Genişletilmiş Notlar (Sezgisel)\n\n- **Hedef Kitle:** Pro seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Dayanıklı AgriVault Çerçevesi senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Dayanıklı AgriVault Çerçevesi işlemleri daha sezgisel hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Dayanıklı AgriVault Çerçevesi ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sulama yönetimi, agrivault, dayanıklı\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-450-final"}}, {"id": 436, "no": "436", "cat": "Hassas Tarım", "name": "Headless NDVI ile Bitki Kütüphanesi", "desc": "veri bağlamında NDVI ile Bitki için headless bir kütüphanesi. Uydu görüntüsünden hesaplanan NDVI indeksi ile bitki stresini tespit edin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["NDVI", "uydu", "vejetasyon", "veri", "headless", "pro"], "badge1": "Pro", "content": "## NDVI Analizi\nNDVI = (NIR - Red) / (NIR + Red)\n- NDVI > 0.6: Sağlıklı bitki\n- NDVI 0.2-0.6: Orta yoğunluk\n- NDVI < 0.2: Çıplak toprak/stres\n\nÜcretsiz araçlar:\n- Sentinel Hub (ESA) → 10m çözünürlük\n- Google Earth Engine → Python API\n\n```python\nimport ee\nndvi = image.normalizedDifference(['B8','B4'])\n```\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Pro seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde NDVI ile Bitki senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde NDVI ile Bitki işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde NDVI ile Bitki ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** NDVI, uydu, vejetasyon\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 437, "no": "437", "cat": "Hassas Tarım", "name": "Reactive Değişken Oran Gübre Kütüphanesi", "desc": "güvenlik bağlamında Değişken Oran Gübre için reactive bir kütüphanesi. Tarla içindeki verimlilik haritasına göre değişken miktarda gübre uygulayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["VRA", "gübre", "hassas", "güvenlik", "reactive", "uzman"], "badge1": "Uzman", "content": "## VRA Süreci\n1. Toprak örnekleme: 2.5 dönüm ızgara → lab analizi.\n2. Verim haritası: GPS + yield monitor verisi.\n3. Yönetim bölgeleri: kümeleme analizi ile 3-5 bölge.\n4. Reçete haritası: her bölge için N-P-K miktarı.\n5. Uygulama: VRA özellikli ekici/dağıtıcı + ISOBUS.\n6. Doğrulama: sonraki sezon verim karşılaştırması.\n\n## Genişletilmiş Notlar (Reactive)\n\n- **Hedef Kitle:** Uzman seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Değişken Oran Gübre senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Değişken Oran Gübre işlemleri daha reactive hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Değişken Oran Gübre ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** VRA, gübre, hassas\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 438, "no": "438", "cat": "Toprak & Gübre", "name": "Adaptif Toprak pH ve Refactor Yöntemi", "desc": "test bağlamında Toprak pH ve için adaptif bir refactor yöntemi. pH aralıklarının bitki beslenmesine etkisi ve kireçleme ile düzeltme. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["pH", "kireçleme", "toprak", "test", "adaptif", "uzman"], "badge1": "Uzman", "content": "## Toprak pH Rehberi\n| pH | Durum | Aksiyon |\n|----|-------|---------|\n| <5.5 | Asit | Kireçleme: CaCO3 |\n| 5.5-7 | Optimal | Bitki besinleri en verimli |\n| 7-8 | Alkali | Kükürt veya asit gübre |\n| >8 | Aşırı alkali | Drene etme, alçı |\n\nEn yaygın sorun: asit topraklarda Al/Mn toksisitesi.\nKireç ihtiyacı: lab raporuna göre ton/da hesapla.\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** Uzman seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Toprak pH ve senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Toprak pH ve işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Toprak pH ve ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** pH, kireçleme, toprak\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 439, "no": "439", "cat": "Toprak & Gübre", "name": "Multi-Tenant Organik Madde Yönetimi Akışı", "desc": "mühendislik bağlamında Organik Madde Yönetimi için multi-tenant bir akışı. Ahır gübresi, kompost ve yeşil gübre uygulamaları ile toprak organik maddesini artırın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["organik", "kompost", "humus", "mühendislik", "multi-tenant", "başlangıç"], "badge1": "Başlangıç", "content": "## Organik Madde Artırma\n1. **Ahır gübresi:** 3-5 ton/da → tarlaya sonbahar dağıt, işle.\n2. **Kompost:** C:N oranı 25-30:1 → 3 ay beklet.\n3. **Yeşil gübre:** Fiğ, yonca, bakla → çiçek öncesi işle.\n4. **Sap geri dönüşümü:** Hasattan sap bırak, parçala.\n5. **No-till:** Toprak işlememeyi azalt → organik madde korur.\n\n## Genişletilmiş Notlar (Multi-Tenant)\n\n- **Hedef Kitle:** Başlangıç seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Organik Madde Yönetimi senaryoları\n- **Avantajları:** Bu akışı sayesinde Organik Madde Yönetimi işlemleri daha multi-tenant hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Organik Madde Yönetimi ihtiyacını analiz edin.\n  2. Bu akışı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** organik, kompost, humus\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 440, "no": "440", "cat": "Sulama Yönetimi", "name": "Senkron Damla Sulama Tasarımı Tasarımı", "desc": "ölçeklenme bağlamında Damla Sulama Tasarımı için senkron bir tasarımı. Damla sulama sisteminin debisi, boru çapı ve lateraller için hesap rehberi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["damla sulama", "debi", "tasarım", "ölçeklenme", "senkron", "i̇leri"], "badge1": "İleri", "content": "## Damla Sulama Hesabı\n1. Bitkinin günlük su ihtiyacı: ET₀ × Kc (mm/gün).\n2. Damlama aralığı: 30-50cm bitki aralığına göre.\n3. Damlatıcı debisi: 1-4 L/saat tipik.\n4. Lateral boru: 16mm PE, max 100m.\n5. Bölge debisi = Bitki sayısı × damlatıcı adedi × debi.\n6. Pompa basıncı: 0.5-2 bar lateral + yükseklik.\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** İleri seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Damla Sulama Tasarımı senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Damla Sulama Tasarımı işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde Damla Sulama Tasarımı ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** damla sulama, debi, tasarım\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 441, "no": "441", "cat": "Sulama Yönetimi", "name": "Modüler ET Bazlı Sulama Mimari Yaklaşımı", "desc": "CI/CD bağlamında ET Bazlı Sulama için modüler bir mimari yaklaşımı. Evapotranspirasyon verisini kullanarak sulama miktarı ve zamanlamasını optimize edin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["ET", "sulama", "verimlilik", "CI/CD", "modüler", "i̇leri"], "badge1": "İleri", "content": "## ET Bazlı Sulama\nNet sulama = ET₀ × Kc × Alan - Yağış\n\nKc değerleri (buğday örneği):\n- Çıkış: 0.3\n- Kardeşlenme: 0.7\n- Başaklanma: 1.1\n- Olgunluk: 0.4\n\nAraç: FAO CLIMWAT, meteo verisi.\nSmartphone: ET uygulamaları (IrrigationApp, FarmHQ).\nHedef: %30 su tasarrufu vs. geleneksel.\n\n## Genişletilmiş Notlar (Modüler)\n\n- **Hedef Kitle:** İleri seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde ET Bazlı Sulama senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde ET Bazlı Sulama işlemleri daha modüler hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde ET Bazlı Sulama ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ET, sulama, verimlilik\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 442, "no": "442", "cat": "Tarım Teknolojisi", "name": "Sezgisel Tarımsal Drone Kullanımı Rehberi", "desc": "güvenlik bağlamında Tarımsal Drone Kullanımı için sezgisel bir rehberi. Dron ile tarla taraması, ilaçlama ve hasar tespiti iş akışı. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["drone", "tarama", "ilaçlama", "güvenlik", "sezgisel", "başlangıç"], "badge1": "Başlangıç", "content": "## Tarım Drone Kullanımı\n1. Görev planlama: DJI Agras/Field Planner.\n2. Sürüş hızı: ilaçlama 5-7 m/s, haritalama 10-15 m/s.\n3. İrtifa: ilaçlama 2-3m, haritalama 50-120m.\n4. Örtüşme: fotoğraf %75-80 kenar örtüşmesi.\n5. Lisans: Türkiye'de SHY 6B/1 sertifikası gerekli.\n6. Çıktı: ortofoto, NDVI haritası, ilaçlama raporu.\n\n## Genişletilmiş Notlar (Sezgisel)\n\n- **Hedef Kitle:** Başlangıç seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Tarımsal Drone Kullanımı senaryoları\n- **Avantajları:** Bu rehberi sayesinde Tarımsal Drone Kullanımı işlemleri daha sezgisel hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Tarımsal Drone Kullanımı ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** drone, tarama, ilaçlama\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 443, "no": "443", "cat": "Tarım Teknolojisi", "name": "Veri-Odaklı Toprak Nem Sensörü Sözleşmesi", "desc": "entegrasyon bağlamında Toprak Nem Sensörü için veri-odaklı bir sözleşmesi. IoT toprak nem sensörlerini sahaya yayarak sulama kara function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
