<style>
:root{
  --bg:#0e0606;--bg2:#120a0a;--bg3:#160e0e;--bg4:#1a1212;
  --border:#1e1616;--border2:#261e1e;--border3:#322a2a;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#ff6b6b;--primary2:#ff6b6b;
  --primary-dim:#ff6b6b15;--primary-glow:#ff6b6b30;
  --accent:#d4a04c;--accent2:#d4a04c;
  --accent-dim:#d4a04c18;--accent-glow:#d4a04c30;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#ff6b6b08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#d4a04c06 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#120a0a 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#ff6b6b0a 0%,#ff6b6b03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #ff6b6b30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#ff6b6b03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#ff6b6b06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#e14d4d);color:#0e0606;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #ff6b6b20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #ff6b6b35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#120a0a,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#e14d4d);color:#0e0606;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #ff6b6b20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #ff6b6b35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">A</div>
  <div class="hero-eyebrow">Spesifik Disiplinler & Analitik · Alet Çantası</div>
  <h1 class="hero-title">Agri<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Algoritmik büyüme modelleri ve kaynak optimizasyonu veri setleri.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>15</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Agri ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">15</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

nmesine etkisi ve kireçleme ile düzeltme. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["pH", "kireçleme", "toprak", "arayüz", "senkron", "orta"], "badge1": "Orta", "content": "## Toprak pH Rehberi\n| pH | Durum | Aksiyon |\n|----|-------|---------|\n| <5.5 | Asit | Kireçleme: CaCO3 |\n| 5.5-7 | Optimal | Bitki besinleri en verimli |\n| 7-8 | Alkali | Kükürt veya asit gübre |\n| >8 | Aşırı alkali | Drene etme, alçı |\n\nEn yaygın sorun: asit topraklarda Al/Mn toksisitesi.\nKireç ihtiyacı: lab raporuna göre ton/da hesapla.\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** Orta seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Toprak pH ve senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Toprak pH ve işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Toprak pH ve ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** pH, kireçleme, toprak\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 184, "no": "184", "cat": "Toprak & Gübre", "name": "Bağlamsal Organik Madde Yönetimi Stratejisi", "desc": "API bağlamında Organik Madde Yönetimi için bağlamsal bir stratejisi. Ahır gübresi, kompost ve yeşil gübre uygulamaları ile toprak organik maddesini artırın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["organik", "kompost", "humus", "API", "bağlamsal", "orta"], "badge1": "Orta", "content": "## Organik Madde Artırma\n1. **Ahır gübresi:** 3-5 ton/da → tarlaya sonbahar dağıt, işle edef Kitle:** Uzman seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Damla Sulama Tasarımı senaryoları\n- **Avantajları:** Bu sözleşmesi sayesinde Damla Sulama Tasarımı işlemleri daha edge-optimize hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Damla Sulama Tasarımı ihtiyacını analiz edin.\n  2. Bu sözleşmesi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** damla sulama, debi, tasarım\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 186, "no": "186", "cat": "Sulama Yönetimi", "name": "Pratik ET Bazlı Sulama Metodu", "desc": "şablon bağlamında ET Bazlı Sulama için pratik bir metodu. Evapotranspirasyon verisini kullanarak sulama miktarı ve zamanlamasını optimize edin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["ET", "sulama", "verimlilik", "şablon", "pratik", "i̇leri"], "badge1": "İleri", "content": "## ET Bazlı Sulama\nNet sulama = ET₀ × Kc × Alan - Yağış\n\nKc değerleri (buğday örneği):\n- Çıkış: 0.3\n- Kardeşlenme: 0.7\n- Başaklanma: 1.1\n- Olgunluk: 0.4\n\nAraç: FAO CLIMWAT, meteo verisi.\nSmartphone: ET uygulamaları (IrrigationApp, FarmHQ).\nHedef: %30 su tasarrufu vs. geleneksel.\n\n## Uygulama Senaryosu (Pratik)\n\nBu metodu, şablon alanında ET Bazlı Sulama problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** ET Bazlı Sulama akışını pratik yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 187, "no": "187", "cat": "Tarım Teknolojisi", "name": "Zero-Config Tarımsal Drone Kullanımı İskeleti", "desc": "gözlemlenebilirlik bağlamında Tarımsal Drone Kullanımı için zero-config bir i̇skeleti. Dron ile tarla taraması, ilaçlama ve hasar tespiti iş akışı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["drone", "tarama", "ilaçlama", "gözlemlenebilirlik", "zero-config", "uzman"], "badge1": "Uzman", "content": "## Tarım Drone Kullanımı\n1. Görev planlama: DJI Agras/Field Planner.\n2. Sürüş hızı: ilaçlama 5-7 m/s, haritalama 10-15 m/s.\n3. İrtifa: ilaçlama 2-3m, haritalama 50-120m.\n4. Örtüşme: fotoğraf %75-80 kenar örtüşmesi.\n5. Lisans: Türkiye'de SHY 6B/1 sertifikası gerekli.\n6. Çıktı: ortofoto, NDVI haritası, ilaçlama raporu.\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** Uzman seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Tarımsal Drone Kullanımı senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Tarımsal Drone Kullanımı işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Tarımsal Drone Kullanımı ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** drone, tarama, ilaçlama\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 188, "no": "188", "cat": "Tarım Teknolojisi", "name": "Reactive Toprak Nem Sensörü Rehberi", "desc": "veri bağlamında Toprak Nem Sensörü için reactive bir rehberi. IoT toprak nem sensörlerini sahaya yayarak sulama kararlarını otomatikleştirin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["sensör", "nem", "IoT", "veri", "reactive", "i̇leri"], "badge1": "İleri", "content": "## Sensör Ağı Kurulumu\n1. Sensör tipi: Capacitive (EC-5, 5TE) veya Tensiometer.\n2. Derinlik: 15cm ve 30cm → kök bölgesi.\n3. Bağlantı: LoRa gateway (1-2km menzil) → bulut.\n4. Alarm: FC% tarla kapasitesinin %50'si → sulama başlat.\n5. Otomasyon: MQTT → Node-RED → sulama vanası.\n6. Kalibrasyon: toprak tipine göre yıllık güncelle.\n\n## Uygulama Senaryosu (Reactive)\n\nBu rehberi, veri alanında Toprak Nem Sensörü problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Toprak Nem Sensörü akışını reactive yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 189, "no": "189", "cat": "Hasat & Depolama", "name": "Ölçeklenebilir Tahıl Nem Kontrolü Çekirdeği", "desc": "mühendislik bağlamında Tahıl Nem Kontrolü için ölçeklenebilir bir çekirdeği. Hasatta ve depolamada kritik olan nem içeriğini ölçme ve kuruma yönetimi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["nem", "depolama", "tahıl", "mühendislik", "ölçeklenebilir", "orta"], "badge1": "Orta", "content": "## Tahıl Nem Yönetimi\nGüvenli depolama nem sınırları:\n- Buğday: <%14\n- Mısır: <%14\n- Arpa: <%13\n- Ayçiçeği: <%8\n\nOlçüm: el tipi nem ölçer (Dickey-john, PM-300).\nKuruma maliyeti: 1 nem noktası düşürme ≈ 70 kWh/ton.\nİpucu: Tarlada <%15 olunca hasat → depo maliyetini azalt.\n\n## Uygulama Senaryosu (Ölçeklenebilir)\n\nBu çekirdeği, mühendislik alanında Tahıl Nem Kontrolü problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Tahıl Nem Kontrolü akışını ölçeklenebilir yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 190, "no": "190", "cat": "Hasat & Depolama", "name": "Modüler Soğuk Zincir Yönetimi Kalıbı", "desc": "CI/CD bağlamında Soğuk Zincir Yönetimi için modüler bir kalıbı. Yaş meyve-sebze için soğuk zincir kırılmalarını önleyen lojistik protokol. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["soğuk zincir", "raf ömrü", "lojistik", "CI/CD", "modüler", "i̇leri"], "badge1": "İleri", "content": "## Soğuk Zincir\nTarla → Ön soğutma → Soğuk depo → Araç → Market\n\nKritik adımlar:\n1. Ön soğutma: hasattan 2 saat içinde ürünü soğut.\n2. Zincir kırılması: her 10°C artış raf ömrünü 2-3x kısaltır.\n3. Sıcaklık kaydı: datalogger ile tüm zincirde izle.\n4. Muz/domates: 12-15°C (soğuk hasarı riski).\n5. Elma: 0-2°C → 6 ay depolama.\n\n## Genişletilmiş Notlar (Modüler)\n\n- **Hedef Kitle:** İleri seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Soğuk Zincir Yönetimi senaryoları\n- **Avantajları:** Bu kalıbı sayesinde Soğuk Zincir Yönetimi işlemleri daha modüler hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Soğuk Zincir Yönetimi ihtiyacını analiz edin.\n  2. Bu kalıbı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** soğuk zincir, raf ömrü, lojistik\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 191, "no": "191", "cat": "Sürdürülebilir Tarım", "name": "Self-Healing Örtü Bitkisi Faydaları Kılavuzu", "desc": "mimari bağlamında Örtü Bitkisi Faydaları için self-healing bir kılavuzu. Kış örtü bitkilerinin toprak erozyonu, azot ve biyolojik çeşitlilik üzerindeki etkileri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["örtü bitkisi", "rotasyon", "azot", "mimari", "self-healing", "orta"], "badge1": "Orta", "content": "## Örtü Bitkisi Seçimi\n| Bitki | Fayda |\n|-------|-------|\n| Fiğ | Biyolojik azot bağlama (80-100 kg N/ha) |\n| Çavdar | Erozyon koruması, yabancı ot baskısı |\n| Turp | Sıkışık toprağı deler, nematod azaltır |\n| Yonca | Uzun ömürlü azot, toprak organik maddesi |\n\nEkim zamanı: Ana hasattan sonra Ağustos-Eylül.\n\n## Genişletilmiş Notlar (Self-Healing)\n\n- **Hedef Kitle:** Orta seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Örtü Bitkisi Faydaları senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde Örtü Bitkisi Faydaları işlemleri daha self-healing hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış k ratik bir yaklaşım sunar.\n\n### Temel Konsept\nSpesifik bağlamında ndvi kavramı, modern hassas tarım pratiğinde merkezi bir rol oynar. Pratik yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım maliyeti düşer.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata oranı azalır.\n\n### Adım Adım Uygulama\n\n1. **Analiz:** Mevcut hassas tarım yapınızdaki spesifik ihtiyaçlarını listele.\n2. **Tasarım:** Bu pattern'i için orta seviyede bir taslak çıkar.\n3. **Pilot:** Küçük bir kapsamda dene, metrik topla.\n4. **Geri Bildirim:** Ekip ve kullanıcı geri bildirimlerini değerlendir.\n5. **Rollout:** Kademeli olarak tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokümantasyon: ekip dışı kullanıcılar zorlanır.\n- Metrik eksikliği: başarıyı ölçemezsen iyileştiremezsin.\n- Eskimiş bağımlılıklar: güvenlik açıklarına davetiye.\n\n### Anahtar Metrikler\n\n| Metrik | Hedef | Kritik Eşik |\n|---|---|---|\n| Latency (p95) | < 200ms | > 500ms |\n| Hata oranı | < %0.1 | > %1 |\n| Throughput | > 1000 rps | < 500 rps |\n| Uptime | %99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi Spesifik dokümantasyonu\n- Hassas Tarım topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Uygulama Senaryosu (Reaktif)\n\nBu şablonu, mikroservis alanında Pratik Spesifik Pattern'i problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Pratik Spesifik Pattern'i akışını reaktif yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı al ated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 218, "no": "218", "cat": "Tarım Teknolojisi", "name": "Pipeline Toprak Nem Sensörü Standartı", "desc": "dağıtım bağlamında Toprak Nem Sensörü için pipeline bir standartı. IoT toprak nem sensörlerini sahaya yayarak sulama kararlarını otomatikleştirin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["sensör", "nem", "IoT", "dağıtım", "pipeline", "başlangıç"], "badge1": "Başlangıç", "content": "## Sensör Ağı Kurulumu\n1. Sensör tipi: Capacitive (EC-5, 5TE) veya Tensiometer.\n2. Derinlik: 15cm ve 30cm → kök bölgesi.\n3. Bağlantı: LoRa gateway (1-2km menzil) → bulut.\n4. Alarm: FC% tarla kapasitesinin %50'si → sulama başlat.\n5. Otomasyon: MQTT → Node-RED → sulama vanası.\n6. Kalibrasyon: toprak tipine göre yıllık güncelle.\n\n## Uygulama Senaryosu (Pipeline)\n\nBu standartı, dağıtım alanında Toprak Nem Sensörü problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Toprak Nem Sensörü akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 219, "no": "219", "cat": "Hasat & Depolama", "name": "Reaktif Tahıl Nem Kontrolü Tasarımı", "desc": "mühendislik bağlamında Tahıl Nem Kontrolü için reaktif bir tasarımı. Hasatta ve depolamada kritik olan nem içeriğini ölçme ve kuruma yönetimi. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["nem", "depolama", "tahıl", "mühendislik", "reaktif", "başlangıç"], "badge1": "Başlangıç", rini sahaya yayarak sulama kararlarını otomatikleştirin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["sensör", "nem", "IoT", "arayüz", "atomic", "uzman"], "badge1": "Uzman", "content": "## Sensör Ağı Kurulumu\n1. Sensör tipi: Capacitive (EC-5, 5TE) veya Tensiometer.\n2. Derinlik: 15cm ve 30cm → kök bölgesi.\n3. Bağlantı: LoRa gateway (1-2km menzil) → bulut.\n4. Alarm: FC% tarla kapasitesinin %50'si → sulama başlat.\n5. Otomasyon: MQTT → Node-RED → sulama vanası.\n6. Kalibrasyon: toprak tipine göre yıllık güncelle.\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Uzman seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Toprak Nem Sensörü senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Toprak Nem Sensörü işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Toprak Nem Sensörü ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sensör, nem, IoT\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 249, "no": "249", "cat": "Hasat & Depolama", "name": "Stream Tabanlı Tahıl Nem Kontrolü Sistemi", "desc": "arayüz bağlamında Tahıl Nem Kontrolü için stream tabanlı bir sistemi. Hasatta ve depolamada kritik olan nem içeriğini ölçme ve kuruma yönetimi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["nem", "depolama", "tahıl", "arayüz", "stream tabanlı", "uzman"], "badge1": "Uzman", "content": "## Tahıl Nem Yönetimi\nGüvenli depolama nem sınırları:\n- Buğday: <%14\n- Mısır: <%14\n- Arpa: <%13\n- Ayçiçeği: <%8\n\nOlçüm: el tipi nem ölçer (Dickey-john, PM-300).\nKuruma maliyeti: 1 nem noktası düşürme ≈ 70 kWh/ton.\nİpucu: Tarlada <%15 olunca hasat → depo maliyetini azalt.\n\n## Uygulama Senaryosu (Stream Tabanlı)\n\nBu sistemi, arayüz alanında Tahıl Nem Kontrolü problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Tahıl Nem Kontrolü akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 250, "no": "250", "cat": "Hasat & Depolama", "name": "Kanıt-Tabanlı Soğuk Zincir Yönetimi Düzeni", "desc": "API bağlamında Soğuk Zincir Yönetimi için kanıt-tabanlı bir düzeni. Yaş meyve-sebze için soğuk zincir kırılmalarını önleyen lojistik protokol. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["soğuk zincir", "raf ömrü", "lojistik", "API", "kanıt-tabanlı", "orta"], "badge1": "Orta", "content": "## Soğuk Zincir\nTarla → Ön soğutma → Soğuk depo → Araç → Market\n\nKritik adımlar:\n1. Ön soğutma: hasattan 2 saat içinde ürünü soğut.\n2. Zincir kırılması: her 10°C artış raf ömrünü 2-3x kısaltır.\n3. Sıcaklık kaydı: datalogger ile tüm zincirde izle.\n4. Muz/domates: 12-15°C (soğuk hasarı riski).\n5. Elma: 0-2°C → 6 ay depolama.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu düzeni, API alanında Soğuk Zincir Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Soğuk Zincir Yönetimi akışını kanıt-tabanlı yaklaşımla mode ed": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 252, "no": "252", "cat": "Hassas Tarım", "name": "Serverless Verim Haritası Analizi Rehberi", "desc": "monitoring bağlamında Verim Haritası Analizi için serverless bir rehberi. Biçerdöver GPS verisiyle oluşturulan verim haritasını yönetim kararına dönüştürün. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["verim", "harita", "analiz", "monitoring", "serverless", "orta"], "badge1": "Orta", "content": "## Verim Haritası Adımları\n1. Biçerdövere yield monitor + DGPS tak.\n2. Hasat verisi: SMS, John Deere Operations Center vb.\n3. Ham veriyi temizle: baş/son geçiş hataları, aykırı değerler.\n4. Yazılım: QGIS + VESPER, Ag Leader SMS Basic.\n5. Düşük verimli alanlar: toprak örneği al, neden araştır.\n6. Yönetim bölgesi: 3-5 yıl kümülatif harita → kararlı bölgeler.\n\n## Genişletilmiş Notlar (Serverless)\n\n- **Hedef Kitle:** Orta seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Verim Haritası Analizi senaryoları\n- **Avantajları:** Bu rehberi sayesinde Verim Haritası Analizi işlemleri daha serverless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Verim Haritası Analizi ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** verim, harita, analiz\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 253, "no": "253", "cat": "Tarım Teknolojisi", "name": "Sezgisel Tarım Muhasebe Yazılımları Doktrini", "desc": "API bağlamında Tarım Muhasebe Yazılımları için sezgisel bir dokt , "content": "## IPM Piramidi\n1. Kültürel: Rotasyon, dayanıklı çeşit, ekim zamanı.\n2. Mekanik: Tuzaklar, bariyer, ışık tuzağı.\n3. Biyolojik: Predatör (Trichogramma, Chrysoperla).\n4. Kimyasal: Son çare, seçici ilaç, eşik bazlı.\n\nEşik: Ekonomik zarar eşiğini geçmeden ilaçlama yapma.\nFaydası: Direnç gecikir, çevre korunur, maliyet düşer.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu optimizasyonu, ölçeklenme alanında Entegre Zararlı Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Entegre Zararlı Yönetimi akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 255, "no": "255", "cat": "Sulama Yönetimi", "name": "API-First Yağmurlama Sistem Tasarımı Çekirdeği", "desc": "mikroservis bağlamında Yağmurlama Sistem Tasarımı için api-first bir çekirdeği. Yağmurlama başlığı seçimi, baskı ve aralık hesapları için tasarım rehberi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["yağmurlama", "sprinkler", "tasarım", "mikroservis", "api-first", "uzman"], "badge1": "Uzman", "content": "## Yağmurlama Tasarımı\n1. Başlık türü: döner (Rainbird, Hunter) veya sabit.\n2. Menzil: yarıçap baskıya göre 6-18m.\n3. Başlık aralığı: menzil × 0.5-0.6 (kare veya üçgen düzen).\n4. Uygulama hızı: <toprak infiltrasyon hızı → sürükleme yok.\n5. Baskı: 2.5-4.5 bar lateral → basınç düzenleyici kullan.\n6. Verimliliği: yağmurlama %70-80, damla %90-95.\n\n## Uygulama Senaryosu (API-First)\n\nBu çekirdeği, mikro  |\n\n### İlgili Kaynaklar\n\n- Resmi AgriVault dokümantasyonu\n- Sulama Yönetimi topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu kalıbı, logging alanında Dayanıklı AgriVault Çerçevesi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Dayanıklı AgriVault Çerçevesi akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 271, "no": "271", "cat": "Hassas Tarım", "name": "Kanıt-Tabanlı NDVI ile Bitki Akışı", "desc": "akış bağlamında NDVI ile Bitki için kanıt-tabanlı bir akışı. Uydu görüntüsünden hesaplanan NDVI indeksi ile bitki stresini tespit edin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["NDVI", "uydu", "vejetasyon", "akış", "kanıt-tabanlı", "orta"], "badge1": "Orta", "content": "## NDVI Analizi\nNDVI = (NIR - Red) / (NIR + Red)\n- NDVI > 0.6: Sağlıklı bitki\n- NDVI 0.2-0.6: Orta yoğunluk\n- NDVI < 0.2: Çıplak toprak/stres\n\nÜcretsiz araçlar:\n- Sentinel Hub (ESA) → 10m çözünürlük\n- Google Earth Engine → Python API\n\n```python\nimport ee\nndvi = image.normalizedDifference(['B8','B4'])\n```\n\n## Genişletilmiş Notlar (Kanıt-Tabanlı)\n\n- **Hedef Kitle:** Orta seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde NDVI ile Bitki senaryoları\n- **Avantajları:** Bu akışı sayesinde NDVI ile Bitki işlemleri daha kanıt-tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** VRA, gübre, hassas\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 273, "no": "273", "cat": "Toprak & Gübre", "name": "Bağlamsal Toprak pH ve Kılavuzu", "desc": "entegrasyon bağlamında Toprak pH ve için bağlamsal bir kılavuzu. pH aralıklarının bitki beslenmesine etkisi ve kireçleme ile düzeltme. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["pH", "kireçleme", "toprak", "entegrasyon", "bağlamsal", "pro"], "badge1": "Pro", "content": "## Toprak pH Rehberi\n| pH | Durum | Aksiyon |\n|----|-------|---------|\n| <5.5 | Asit | Kireçleme: CaCO3 |\n| 5.5-7 | Optimal | Bitki besinleri en verimli |\n| 7-8 | Alkali | Kükürt veya asit gübre |\n| >8 | Aşırı alkali | Drene etme, alçı |\n\nEn yaygın sorun: asit topraklarda Al/Mn toksisitesi.\nKireç ihtiyacı: lab raporuna göre ton/da hesapla.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Pro seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Toprak pH ve senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde Toprak pH ve işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Toprak pH ve ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** pH, kireçleme, toprak\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 274, "no": "274", "cat": "Toprak & Gübre", "name": "Observable Organik Madde Yönetimi Pratiği", "desc": "yapay zeka bağlamında Organik Madde Yönetimi için observable bir pratiği. Ahır gübresi, kompost ve yeşil gübre uygulamaları ile toprak organik maddesini artırın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["organik", "kompost", "humus", "yapay zeka", "observable", "başlangıç"], "badge1": "Başlangıç", "content": "## Organik Madde Artırma\n1. **Ahır gübresi:** 3-5 ton/da → tarlaya sonbahar dağıt, işle.\n2. **Kompost:** C:N oranı 25-30:1 → 3 ay beklet.\n3. **Yeşil gübre:** Fiğ, yonca, bakla → çiçek öncesi işle.\n4. **Sap geri dönüşümü:** Hasattan sap bırak, parçala.\n5. **No-till:** Toprak işlememeyi azalt → organik madde korur.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Başlangıç seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Organik Madde Yönetimi senaryoları\n- **Avantajları:** Bu pratiği sayesinde Organik Madde Yönetimi işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Organik Madde Yönetimi ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** organik, kompost, humus\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 275, "no": "275", "cat": "Sulama Yönetimi", "name": "Hibrit-Cloud Damla Sulama Tasarımı Sözleşmesi", "desc": "akış bağlamında Damla Sulama Tasarımı için hibrit-cloud bir sözleşmesi. Damla sulama sisteminin debisi, boru çapı ve lateraller için hesap rehberi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["damla sulama", "debi", "tasarım", "akış", "hibrit-cloud", "uzman"], "badge1": "Uzman", "content": "## Damla Sulama Hesabı\n1. Bitkinin günlük su ihtiyacı: ET₀ × Kc (mm/gün).\n2. Damlama aralığı: 30-50cm bitki aralığına göre.\n3. Damlatıcı debisi: 1-4 L/saat tipik.\n4. Lateral boru: 16mm PE, max 100m.\n5. Bölge debisi = Bitki sayısı × damlatıcı adedi × debi.\n6. Pompa basıncı: 0.5-2 bar lateral + yükseklik.\n\n## Uygulama Senaryosu (Hibrit-Cloud)\n\nBu sözleşmesi, akış alanında Damla Sulama Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Damla Sulama Tasarımı akışını hibrit-cloud yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 276, "no": "276", "cat": "Sulama Yönetimi", "name": "Veri-Odaklı ET Bazlı Sulama Düzeni", "desc": "yapay zeka bağlamında ET Bazlı Sulama için veri-odaklı bir düzeni. Evapotranspirasyon verisini kullanarak sulama miktarı ve zamanlamasını optimize edin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["ET", "sulama", "verimlilik", "yapay zeka", "veri-odaklı", "pro"], "badge1": "Pro", "content": "## ET Bazlı Sulama\nNet sulama = ET₀ × Kc × Alan - Yağış\n\nKc değerleri (buğday örneği):\n- Çıkış: 0.3\n- Kardeşlenme: 0.7\n- Başaklanma: 1.1\n- Olgunluk: 0.4\n\nAraç: FAO CLIMWAT, meteo verisi.\nSmartphone: ET uygulamaları (IrrigationApp, FarmHQ).\nHedef: %30 su tasarrufu vs. geleneksel.\n\n## Genişlet n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 304, "no": "304", "cat": "Toprak & Gübre", "name": "Layered Organik Madde Yönetimi Tasarımı", "desc": "yapay zeka bağlamında Organik Madde Yönetimi için layered bir tasarımı. Ahır gübresi, kompost ve yeşil gübre uygulamaları ile toprak organik maddesini artırın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["organik", "kompost", "humus", "yapay zeka", "layered", "i̇leri"], "badge1": "İleri", "content": "## Organik Madde Artırma\n1. **Ahır gübresi:** 3-5 ton/da → tarlaya sonbahar dağıt, işle.\n2. **Kompost:** C:N oranı 25-30:1 → 3 ay beklet.\n3. **Yeşil gübre:** Fiğ, yonca, bakla → çiçek öncesi işle.\n4. **Sap geri dönüşümü:** Hasattan sap bırak, parçala.\n5. **No-till:** Toprak işlememeyi azalt → organik madde korur.\n\n## Uygulama Senaryosu (Layered)\n\nBu tasarımı, yapay zeka alanında Organik Madde Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Organik Madde Yönetimi akışını layered yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 305, "no": "305", "cat": "Sulama Yönetimi", "name": "Layered Damla Sulama Tasarımı Düzeni", "desc": "caching bağlamında Damla Sulama Tasarımı için layered bir düzeni. Damla sulama sisteminin debisi, boru çapı ve lateraller için hesap rehberi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["damla sulama", "debi", "tasarım", "caching", "layered", "uzman"], "ba ın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sensör, nem, IoT\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 309, "no": "309", "cat": "Hasat & Depolama", "name": "Bağlamsal Tahıl Nem Kontrolü Kılavuzu", "desc": "ölçeklenme bağlamında Tahıl Nem Kontrolü için bağlamsal bir kılavuzu. Hasatta ve depolamada kritik olan nem içeriğini ölçme ve kuruma yönetimi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["nem", "depolama", "tahıl", "ölçeklenme", "bağlamsal", "i̇leri"], "badge1": "İleri", "content": "## Tahıl Nem Yönetimi\nGüvenli depolama nem sınırları:\n- Buğday: <%14\n- Mısır: <%14\n- Arpa: <%13\n- Ayçiçeği: <%8\n\nOlçüm: el tipi nem ölçer (Dickey-john, PM-300).\nKuruma maliyeti: 1 nem noktası düşürme ≈ 70 kWh/ton.\nİpucu: Tarlada <%15 olunca hasat → depo maliyetini azalt.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** İleri seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Tahıl Nem Kontrolü senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde Tahıl Nem Kontrolü işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde Tahıl Nem Kontrolü ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** nem, depolama, tahıl\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 310, "no": "310", "cat": "Hasat & Depolama", "name": "Multi-Tenant Soğuk Zincir Yönetimi Kütüphanesi", "desc": "yapay zeka bağlamında  Entegre Zararlı Yönetimi ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** IPM, biyolojik, zararlı\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 315, "no": "315", "cat": "Sulama Yönetimi", "name": "Bağlamsal Yağmurlama Sistem Tasarımı Çekirdeği", "desc": "entegrasyon bağlamında Yağmurlama Sistem Tasarımı için bağlamsal bir çekirdeği. Yağmurlama başlığı seçimi, baskı ve aralık hesapları için tasarım rehberi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["yağmurlama", "sprinkler", "tasarım", "entegrasyon", "bağlamsal", "i̇leri"], "badge1": "İleri", "content": "## Yağmurlama Tasarımı\n1. Başlık türü: döner (Rainbird, Hunter) veya sabit.\n2. Menzil: yarıçap baskıya göre 6-18m.\n3. Başlık aralığı: menzil × 0.5-0.6 (kare veya üçgen düzen).\n4. Uygulama hızı: <toprak infiltrasyon hızı → sürükleme yok.\n5. Baskı: 2.5-4.5 bar lateral → basınç düzenleyici kullan.\n6. Verimliliği: yağmurlama %70-80, damla %90-95.\n\n## Uygulama Senaryosu (Bağlamsal)\n\nBu çekirdeği, entegrasyon alanında Yağmurlama Sistem Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yağmurlama Sistem Tasarımı akışını bağlamsal yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşm ıcı-Merkezli Toprak Nem Sensörü Akışı", "desc": "logging bağlamında Toprak Nem Sensörü için kullanıcı-merkezli bir akışı. IoT toprak nem sensörlerini sahaya yayarak sulama kararlarını otomatikleştirin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["sensör", "nem", "IoT", "logging", "kullanıcı-merkezli", "orta"], "badge1": "Orta", "content": "## Sensör Ağı Kurulumu\n1. Sensör tipi: Capacitive (EC-5, 5TE) veya Tensiometer.\n2. Derinlik: 15cm ve 30cm → kök bölgesi.\n3. Bağlantı: LoRa gateway (1-2km menzil) → bulut.\n4. Alarm: FC% tarla kapasitesinin %50'si → sulama başlat.\n5. Otomasyon: MQTT → Node-RED → sulama vanası.\n6. Kalibrasyon: toprak tipine göre yıllık güncelle.\n\n## Genişletilmiş Notlar (Kullanıcı-Merkezli)\n\n- **Hedef Kitle:** Orta seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Toprak Nem Sensörü senaryoları\n- **Avantajları:** Bu akışı sayesinde Toprak Nem Sensörü işlemleri daha kullanıcı-merkezli hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Toprak Nem Sensörü ihtiyacını analiz edin.\n  2. Bu akışı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sensör, nem, IoT\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 339, "no": "339", "cat": "Hasat & Depolama", "name": "Reactive Tahıl Nem Kontrolü Çerçevesi", "desc": "CI/CD bağlamında Tahıl Nem Kontrolü için reactive bir çerçevesi. Hasatta ve depolamada kritik olan nem içeriğini ölçme ve kuruma yönetimi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["nem", "depolama", "tahıl", "CI/CD", "reactive", "orta"], "badge1": "Orta", "content": "## Tahıl Nem Yönetimi\nGüvenli depolama nem sınırları:\n- Buğday: <%14\n- Mısır: <%14\n- Arpa: <%13\n- Ayçiçeği: <%8\n\nOlçüm: el tipi nem ölçer (Dickey-john, PM-300).\nKuruma maliyeti: 1 nem noktası düşürme ≈ 70 kWh/ton.\nİpucu: Tarlada <%15 olunca hasat → depo maliyetini azalt.\n\n## Uygulama Senaryosu (Reactive)\n\nBu çerçevesi, CI/CD alanında Tahıl Nem Kontrolü problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Tahıl Nem Kontrolü akışını reactive yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 340, "no": "340", "cat": "Hasat & Depolama", "name": "Type-Safe Soğuk Zincir Yönetimi Anlaşması", "desc": "şablon bağlamında Soğuk Zincir Yönetimi için type-safe bir anlaşması. Yaş meyve-sebze için soğuk zincir kırılmalarını önleyen lojistik protokol. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["soğuk zincir", "raf ömrü", "lojistik", "şablon", "type-safe", "orta"], "badge1": "Orta", "content": "## Soğuk Zincir\nTarla → Ön soğutma → Soğuk depo → Araç → Market\n\nKritik adımlar:\n1. Ön soğutma: hasattan 2 saat içinde ürünü soğut.\n2. Zincir kırılması: her 10°C artış raf ömrünü 2-3x kısaltır.\n3. Sıcaklık kaydı: datalogger ile tüm zincirde izle.\n4. Muz/domates: 12-15°C (soğuk hasarı riski).\n5. Elma: 0-2°C → 6 ay depolama.\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu anlaşması, şablon alanında Soğuk Zincir Yönetimi problemini şu şekilde çözer:\n\n1. ** 0-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** verim, harita, analiz\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 343, "no": "343", "cat": "Tarım Teknolojisi", "name": "DevOps-Ready Tarım Muhasebe Yazılımları Standartı", "desc": "veri bağlamında Tarım Muhasebe Yazılımları için devops-ready bir standartı. Türkiye'de kullanılan tarım muhasebe ve kayıt yazılımlarının karşılaştırması. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["muhasebe", "kayıt", "yazılım", "veri", "devops-ready", "i̇leri"], "badge1": "İleri", "content": "## Tarım Kayıt Sistemleri\n- **ÇKS (Çiftçi Kayıt Sistemi):** Devlet zorunluluğu — parsel, destekleme.\n- **Tarım ERP:** Logo, Mikro → çiftlik maliyet muhasebesi.\n- **Tarım Kredi Kooperatif:** Gider ve gelir kayıt defteri.\n- **Excel/Google Sheets:** Küçük çiftlik için yeterli.\n\nMinimum kayıt: Arazi, gübre, ilaç, yakıt, işçilik, verim.\n\n## Genişletilmiş Notlar (DevOps-Ready)\n\n- **Hedef Kitle:** İleri seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Tarım Muhasebe Yazılımları senaryoları\n- **Avantajları:** Bu standartı sayesinde Tarım Muhasebe Yazılımları işlemleri daha devops-ready hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Tarım Muhasebe Yazılımları ihtiyacını analiz edin.\n  2. Bu standartı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** muhasebe, kayıt, yazılım\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 344, "no": "344", "cat": "Sürdürülebilir Tarım", "name": "Atomic Entegre Zararlı Yönetimi Sistemi", "desc": "dağıtım bağlamında Entegre Zararlı Yönetimi için atomic bir sistemi. Kimyasal ilaç kullanımını azaltan biyolojik ve kültürel mücadele yöntemleri. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["IPM", "biyolojik", "zararlı", "dağıtım", "atomic", "i̇leri"], "badge1": "İleri", "content": "## IPM Piramidi\n1. Kültürel: Rotasyon, dayanıklı çeşit, ekim zamanı.\n2. Mekanik: Tuzaklar, bariyer, ışık tuzağı.\n3. Biyolojik: Predatör (Trichogramma, Chrysoperla).\n4. Kimyasal: Son çare, seçici ilaç, eşik bazlı.\n\nEşik: Ekonomik zarar eşiğini geçmeden ilaçlama yapma.\nFaydası: Direnç gecikir, çevre korunur, maliyet düşer.\n\n## Uygulama Senaryosu (Atomic)\n\nBu sistemi, dağıtım alanında Entegre Zararlı Yönetimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Entegre Zararlı Yönetimi akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 345, "no": "345", "cat": "Sulama Yönetimi", "name": "Atomic Yağmurlama Sistem Tasarımı Pratiği", "desc": "API bağlamında Yağmurlama Sistem Tasarımı için atomic bir pratiği. Yağmurlama başlığı seçimi, baskı ve aralık hesapları için tasarım rehberi. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["yağmurlama", "sprinkler", "tasarım", "API", "atomic", "başlangıç"], "badge1": "Başlangıç", "content": "## Yağmurlama Tasarımı\n1. Başlık türü: döner (Rainbird, Hunter) veya sabit.\n2. Menzil: yarıçap baskıya göre 6-18m.\n3. Başlık aralığı: menzil × 0.5-0.6 (kare veya üçgen düzen).\n4. Uygulama hızı: <toprak infiltrasyon hızı → sürükleme yok.\n5. Baskı: 2.5-4.5 bar lateral → basınç düzenleyici kullan.\n6. Verimliliği: yağmurlama %70-80, damla %90-95.\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Başlangıç seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Yağmurlama Sistem Tasarımı senaryoları\n- **Avantajları:** Bu pratiği sayesinde Yağmurlama Sistem Tasarımı işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Yağmurlama Sistem Tasarımı ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** yağmurlama, sprinkler, tasarım\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 346, "no": "346", "cat": "Hassas Tarım", "name": "Resilient Pratik Spesifik Pattern'i Yönergesi", "desc": "akış bağlamında Pratik Spesifik Pattern'i için resilient bir yönergesi. Hassas Tarım kategorisinde spesifik odaklı pratik bir pattern'i. Orta seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["hassas tarım", "spesifik", "pratik", "akış", "resilient", "uzman"], "badge1": "Uzman", "content": "## Pratik Spesifik Pattern'i\n\nBu öğe, **Hassas Tarım** kategorisinde spesifik konusuna pratik bir yaklaşım sunar.\n\n### Temel Konsept\nSpesifik bağlamında ndvi kavramı, modern hassas tarım pratiğinde merkezi bir rol oynar. Pratik yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım m ma Hesabı\n1. Bitkinin günlük su ihtiyacı: ET₀ × Kc (mm/gün).\n2. Damlama aralığı: 30-50cm bitki aralığına göre.\n3. Damlatıcı debisi: 1-4 L/saat tipik.\n4. Lateral boru: 16mm PE, max 100m.\n5. Bölge debisi = Bitki sayısı × damlatıcı adedi × debi.\n6. Pompa basıncı: 0.5-2 bar lateral + yükseklik.\n\n## Uygulama Senaryosu (Event-Sourced)\n\nBu yapısı, API alanında Damla Sulama Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Damla Sulama Tasarımı akışını event-sourced yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 366, "no": "366", "cat": "Sulama Yönetimi", "name": "Şeffaf ET Bazlı Sulama Yapısı", "desc": "şablon bağlamında ET Bazlı Sulama için şeffaf bir yapısı. Evapotranspirasyon verisini kullanarak sulama miktarı ve zamanlamasını optimize edin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ET", "sulama", "verimlilik", "şablon", "şeffaf", "başlangıç"], "badge1": "Başlangıç", "content": "## ET Bazlı Sulama\nNet sulama = ET₀ × Kc × Alan - Yağış\n\nKc değerleri (buğday örneği):\n- Çıkış: 0.3\n- Kardeşlenme: 0.7\n- Başaklanma: 1.1\n- Olgunluk: 0.4\n\nAraç: FAO CLIMWAT, meteo verisi.\nSmartphone: ET uygulamaları (IrrigationApp, FarmHQ).\nHedef: %30 su tasarrufu vs. geleneksel.\n\n## Genişletilmiş Notlar (Şeffaf)\n\n- **Hedef Kitle:** Başlangıç seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde ET Bazlı Sulama senaryoları\n- **Avantajları:** Bu yapısı sayesinde ET Bazlı Sulama i ro seviye kullanıcılar için optimize edilmiştir.", "tags": ["nem", "depolama", "tahıl", "dağıtım", "otonom", "pro"], "badge1": "Pro", "content": "## Tahıl Nem Yönetimi\nGüvenli depolama nem sınırları:\n- Buğday: <%14\n- Mısır: <%14\n- Arpa: <%13\n- Ayçiçeği: <%8\n\nOlçüm: el tipi nem ölçer (Dickey-john, PM-300).\nKuruma maliyeti: 1 nem noktası düşürme ≈ 70 kWh/ton.\nİpucu: Tarlada <%15 olunca hasat → depo maliyetini azalt.\n\n## Uygulama Senaryosu (Otonom)\n\nBu kılavuzu, dağıtım alanında Tahıl Nem Kontrolü problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Tahıl Nem Kontrolü akışını otonom yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 370, "no": "370", "cat": "Hasat & Depolama", "name": "Hibrit-Cloud Soğuk Zincir Yönetimi Algoritması", "desc": "yapay zeka bağlamında Soğuk Zincir Yönetimi için hibrit-cloud bir algoritması. Yaş meyve-sebze için soğuk zincir kırılmalarını önleyen lojistik protokol. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["soğuk zincir", "raf ömrü", "lojistik", "yapay zeka", "hibrit-cloud", "orta"], "badge1": "Orta", "content": "## Soğuk Zincir\nTarla → Ön soğutma → Soğuk depo → Araç → Market\n\nKritik adımlar:\n1. Ön soğutma: hasattan 2 saat içinde ürünü soğut.\n2. Zincir kırılması: her 10°C artış raf ömrünü 2-3x kısaltır.\n3. Sıcaklık kaydı: datalogger ile tüm zincirde izle.\n4. Muz/domates: 12-15°C (soğuk hasarı riski).\n5. Elma: 0-2°C → 6 ay depolama.\n\n## Uygulama Senaryosu (Hibrit yered", "i̇leri"], "badge1": "İleri", "content": "## NDVI Analizi\nNDVI = (NIR - Red) / (NIR + Red)\n- NDVI > 0.6: Sağlıklı bitki\n- NDVI 0.2-0.6: Orta yoğunluk\n- NDVI < 0.2: Çıplak toprak/stres\n\nÜcretsiz araçlar:\n- Sentinel Hub (ESA) → 10m çözünürlük\n- Google Earth Engine → Python API\n\n```python\nimport ee\nndvi = image.normalizedDifference(['B8','B4'])\n```\n\n## Uygulama Senaryosu (Layered)\n\nBu düzeni, mikroservis alanında NDVI ile Bitki problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** NDVI ile Bitki akışını layered yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 407, "no": "407", "cat": "Hassas Tarım", "name": "Memory-Safe Değişken Oran Gübre Sistemi", "desc": "gözlemlenebilirlik bağlamında Değişken Oran Gübre için memory-safe bir sistemi. Tarla içindeki verimlilik haritasına göre değişken miktarda gübre uygulayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["VRA", "gübre", "hassas", "gözlemlenebilirlik", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## VRA Süreci\n1. Toprak örnekleme: 2.5 dönüm ızgara → lab analizi.\n2. Verim haritası: GPS + yield monitor verisi.\n3. Yönetim bölgeleri: kümeleme analizi ile 3-5 bölge.\n4. Reçete haritası: her bölge için N-P-K miktarı.\n5. Uygulama: VRA özellikli ekici/dağıtıcı + ISOBUS.\n6. Doğrulama: sonraki sezon verim karşılaştırması.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu sistemi, gözlemlenebilirlik alanında Değiş
