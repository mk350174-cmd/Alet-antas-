oly**: Yüksek detaylı (kaynak) ve optimize edilmiş (hedef) modelinizi hazırlayın.\n2.  **Baking Yazılımı**: Substance Painter, Marmoset Toolbag veya Blender gibi yazılımları kullanarak normal haritayı bake edin.\n3.  **Ayarlar**: Baking ayarlarında 'Cage' veya 'Ray Distance' gibi parametreleri doğru ayarlayarak artefaktları önleyin.\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Pro seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Normal Harita Üretimi senaryoları\n- **Avantajları:** Bu standartı sayesinde Normal Harita Üretimi işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Normal Harita Üretimi ihtiyacını analiz edin.\n  2. Bu standartı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** normal, doku, detay\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 268, "no": "268", "cat": "Dokular & Materyaller", "name": "Idempotent Materyal Örnekleri Atama Düzeni", "desc": "caching bağlamında Materyal Örnekleri Atama için idempotent bir düzeni. 3D objelere ve yüzeylere materyalleri etkili bir şekilde uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["materyal", "kaplama", "uygulama", "caching", "idempotent", "orta"], "badge1": "Orta", "content": "## Objeye Materyal Ataması\n3D objelerinize materyal atayarak görsel kimliklerini belirleyin.\n\n1.  **Materyal Oluşturma**: Oyun motorunuzda yeni bir materyal asseti oluşturun.\n2.  **Doku Bağlantısı**: Oluşturduğunuz materyale Albedo, Normal, Roughness gibi doku haritalarını bağlayın.\n3.  **Objeye Sürükle**: Materyal assetini doğrudan 3D modelinizin üzerine veya modelin materyal slotuna sürükleyerek uygulayın.\n\n## Uygulama Senaryosu (Idempotent)\n\nBu düzeni, caching alanında Materyal Örnekleri Atama problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Materyal Örnekleri Atama akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 269, "no": "269", "cat": "Dokular & Materyaller", "name": "Şeffaf Tiling Doku Ayarları Çerçevesi", "desc": "caching bağlamında Tiling Doku Ayarları için şeffaf bir çerçevesi. Tekrarlayan dokuların sorunsuz görünmesi için ayarları yapın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "tiling", "tekrar", "caching", "şeffaf", "i̇leri"], "badge1": "İleri", "content": "## Tiling Dokuların Ayarlanması\nBüyük yüzeylerde dokuların tekrarlanmasını doğal ve görünmez hale getirin.\n\n1.  **Doku Hazırlığı**: Dokunuzun kenarlarının sorunsuz bir şekilde birleştiğinden (seamless) emin olun.\n2.  **UV Ayarları**: Modelinizin UV haritasında dokunun tiling (tekrarlama) değerlerini ayarlayın. Genellikle UV koordinatlarını büyütmek veya küçültmekle yapılır.\n3.  **Offset & Rotation**: Gerekirse dokunun başlangıç noktasını kaydırın (offset) veya döndürerek tekrarlama desenini kırın.\n\n## Genişletilmiş Notlar (Şeffaf)\n\n- **Hedef Kitle:** İleri seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Tiling Doku Ayarları senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Tiling Doku Ayarları işlemleri daha şeffaf hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Tiling Doku Ayarları ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** doku, tiling, tekrar\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 270, "no": "270", "cat": "Animasyonlar & Rigging", "name": "Zero-Config İskelet Sistemi Kurulumu Çekirdeği", "desc": "güvenlik bağlamında İskelet Sistemi Kurulumu için zero-config bir çekirdeği. Karakterlere veya objelere temel bir iskelet sistemi ekleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["rigging", "iskelet", "animasyon", "güvenlik", "zero-config", "başlangıç"], "badge1": "Başlangıç", "content": "## Temel İskelet Sistemi Kurulumu\nKarakterinizi veya objenizi hareket ettirmek için temel bir iskelet (rig) oluşturun.\n\n1.  **Kemik Ekleme**: Modelin ana eklem noktalarına (kalça, diz, omuz vb.) kemikler ekleyin.\n2.  **Hiyerarşi Oluşturma**: Kemikler arasında doğru üst-alt ilişkilerini kurarak hiyerarşik bir yapı oluşturun.\n3.  **Skinning/Weight Painting**: Kemiklerin modelin hangi bölgelerini etkileyeceğini belirlemek için ağırlık boyama yapın, deformasyonları düzeltin.\n\n## Uygulama Senaryosu (Zero-Config)\n\nBu çekirdeği, güvenlik alanında İskelet Sistemi Kurulumu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İskelet Sistemi Kurulumu akışını zero-config yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 271, "no": "271", "cat": "Animasyonlar & Rigging", "name": "Sezgisel Yürüme Animasyonu Oluşturma Stratejisi", "desc": "CI/CD bağlamında Yürüme Animasyonu Oluşturma için sezgisel bir stratejisi. Karakterler için döngüsel bir yürüme animasyonu oluşturun. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "yürüme", "döngü", "CI/CD", "sezgisel", "pro"], "badge1": "Pro", "content": "## Döngüsel Yürüme Animasyonu\nKarakteriniz için doğal ve döngüsel bir yürüme animasyonu tasarlayın.\n\n1.  **Anahtar Pozlar**: Yürüme döngüsünün kritik pozlarını (ayak basma, ayak kaldırma, ileri adım) belirleyin ve anahtar kareler oluşturun.\n2.  **Döngü Entegrasyonu**: Animasyonun başlangıç ve bitiş karelerinin sorunsuz bir şekilde birleştiğinden emin olun.\n3.  **Hız ve Ağırlık**: Animasyon eğrilerini ayarlayarak yürümenin hızı ve karakterin ağırlık transferini gerçekçi hale getirin.\n\n## Genişletilmiş Notlar (Sezgisel)\n\n- **Hedef Kitle:** Pro seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Yürüme Animasyonu Oluşturma senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Yürüme Animasyonu Oluşturma işlemleri daha sezgisel hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Yürüme Animasyonu Oluşturma ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, yürüme, döngü\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 272, "no": "272", "cat": "Animasyonlar & Rigging", "name": "Veri-Odaklı Ters Kinematik (IK) Rehberi", "desc": "mimari bağlamında Ters Kinematik (IK) için veri-odaklı bir rehberi. Animasyon kontrolünü kolaylaştırmak için IK zincirleri oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["IK", "rigging", "kontrol", "mimari", "veri-odaklı", "orta"], "badge1": "Orta", "content": "## Ters Kinematik (IK) Kurulumu\nAnimasyon sürecini kolaylaştırmak için IK zincirleri oluşturun.\n\n1.  **Zincir Seçimi**: IK uygulamak istediğiniz kemik zincirini belirleyin (örn. bacak veya kol).\n2.  **IK Handle Oluşturma**: Zincirin sonuna bir IK handle veya hedef nesne ekleyin.\n3.  **Poles & Kısıtlamalar**: Diz/dirsek yönünü kontrol etmek için pole vektörleri ekleyin ve kemik rotasyon kısıtlamaları ayarlayarak doğal hareket aralığı sağlayın.\n\n## Genişletilmiş Notlar (Veri-Odaklı)\n\n- **Hedef Kitle:** Orta seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Ters Kinematik (IK) senaryoları\n- **Avantajları:** Bu rehberi sayesinde Ters Kinematik (IK) işlemleri daha veri-odaklı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde Ters Kinematik (IK) ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** IK, rigging, kontrol\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 273, "no": "273", "cat": "Animasyonlar & Rigging", "name": "Type-Safe Blend Shape Animasyon Sistemi", "desc": "yapay zeka bağlamında Blend Shape Animasyon için type-safe bir sistemi. Yüz ifadeleri için blend shape animasyonlarını entegre edin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["blend shape", "yüz", "animasyon", "yapay zeka", "type-safe", "pro"], "badge1": "Pro", "content": "## Blend Shape Uygulaması\nKarakterlerinize yüz ifadeleri ve detaylı deformasyonlar için blend shape (morph target) uygulayın.\n\n1.  **Hedef Şekiller**: Ana modelinize dayanarak farklı yüz ifadelerini temsil eden bir dizi hedef şekil (ör. gülümseme, kaş çatma) oluşturun.\n2.  **Blend Shape Oluşturma**: Bu hedef şekilleri ana modele blend shape olarak bağlayın.\n3.  **Değer Kontrolü**: Oyun motorunuzda veya animasyon yazılımınızda blend shape'lerin ağırlık değerlerini kontrol ederek ifadeler arasında geçiş yapın.\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu sistemi, yapay zeka alanında Blend Shape Animasyon problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Blend Shape Animasyon akışını type-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 274, "no": "274", "cat": "Ortam & Sahne Öğeleri", "name": "Headless Arazi (Terrain) Modelleme Anlaşması", "desc": "entegrasyon bağlamında Arazi (Terrain) Modelleme için headless bir anlaşması. Oyun dünyası için detaylı araziler oluşturun ve şekillendirin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["arazi", "çevre", "modelleme", "entegrasyon", "headless", "pro"], "badge1": "Pro", "content": "## Gerçekçi Arazi Modelleme\nOyununuz için detaylı ve inandırıcı araziler oluşturun.\n\n1.  **Yükseklik Haritası**: Bir yükseklik haritası (heightmap) kullanarak arazinin temel şeklini oluşturun veya manuel olarak yükseltme/alçaltma araçlarını kullanın.\n2.  **Doku Katmanları**: Çimen, toprak, kaya gibi farklı doku katmanları ekleyin ve fırçalarla boyayarak doğal geçişler sağlayın.\n3.  **Detay Ekleme**: Ağaçlar, kayalar, çalılar gibi detay objeleri yerleştirerek araziye gerçekçilik katın.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Pro seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Arazi (Terrain) Modelleme senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Arazi (Terrain) Modelleme işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Arazi (Terrain) Modelleme ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** arazi, çevre, modelleme\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 275, "no": "275", "cat": "Ortam & Sahne Öğeleri", "name": "Pluggable Bitki Örtüsü Yerleşimi Standartı", "desc": "performans bağlamında Bitki Örtüsü Yerleşimi için pluggable bir standartı. Oyun ortamına doğal görünümlü bitki örtüsü ekleyin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["bitki", "çevre", "detay", "performans", "pluggable", "pro"], "badge1": "Pro", "content": "## Doğal Bitki Örtüsü Yerleşimi\nOyun seviyenizi zenginleştirmek için bitki örtüsü (ağaçlar, çalılar, çimenler) yerleştirin.\n\n1.  **Asset Seçimi**: Ortamınıza uygun, optimize edilmiş bitki assetlerini seçin.\n2.  **Yoğunluk Ayarı**: Bitki yerleştirme fırçasının yoğunluğunu ve boyutunu ayarlayarak doğal dağılımlar elde edin.\n3.  **Rüzgar Efektleri**: Bitki örtüsüne rüzgar efektleri ekleyerek dinamik ve canlı bir görünüm kazandırın.\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Pro seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Bitki Örtüsü Yerleşimi senaryoları\n- **Avantajları:** Bu standartı sayesinde Bitki Örtüsü Yerleşimi işlemleri daha pluggable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Bitki Örtüsü Yerleşimi ihtiyacını analiz edin.\n  2. Bu standartı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** bitki, çevre, detay\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 276, "no": "276", "cat": "Ortam & Sahne Öğeleri", "name": "Self-Healing Işıklandırma ve Gölge Anlaşması", "desc": "mikroservis bağlamında Işıklandırma ve Gölge için self-healing bir anlaşması. Sahnenin atmosferini belirlemek için ışık ve gölgeleri ayarlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ışık", "gölge", "atmosfer", "mikroservis", "self-healing", "başlangıç"], "badge1": "Başlangıç", "content": "## Sahne Işıklandırma Prensipleri\nOyun sahnenizin atmosferini ve görsel kalitesini artırmak için ışıklandırmayı ayarlayın.\n\n1.  **Ana Işık (Key Light)**: Sahnedeki ana ışık kaynağını belirleyin (örn. güneş). Yönünü ve yoğunluğunu ayarlayın.\n2.  **Dolgu Işık (Fill Light)**: Ana ışığın yarattığı sert gölgeleri yumuşatmak için daha az yoğun bir dolgu ışığı kullanın.\n3.  **Arka Işık (Rim Light)**: Objeleri arka plandan ayırmak için bir arka ışık ekleyin. Gölge kalitesini ve çözünürlüğünü ayarlayarak performansı dengeleyin.\n\n## Genişletilmiş Notlar (Self-Healing)\n\n- **Hedef Kitle:** Başlangıç seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Işıklandırma ve Gölge senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Işıklandırma ve Gölge işlemleri daha self-healing hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Işıklandırma ve Gölge ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ışık, gölge, atmosfer\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 277, "no": "277", "cat": "Ortam & Sahne Öğeleri", "name": "Self-Healing Çarpışma Kutusu (Collider) Sözleşmesi", "desc": "mühendislik bağlamında Çarpışma Kutusu (Collider) için self-healing bir sözleşmesi. Objelere fiziksel etkileşim için çarpışma kutuları ekleyin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["fizik", "çarpışma", "collider", "mühendislik", "self-healing", "pro"], "badge1": "Pro", "content": "## Collider Ayarları\nOyun içi fiziksel etkileşimler için objelere çarpışma kutuları (colliders) tanımlayın.\n\n1.  **Collider Türü**: Objeye uygun bir collider türü seçin (Box, Sphere, Capsule veya Mesh Collider).\n2.  **Boyut ve Konum**: Collider'ın boyutunu ve konumunu objenin geometrisine uyacak şekilde ayarlayın. Özellikle karmaşık objeler için basitleştirilmiş bir form kullanın.\n3.  **Trigger Ayarı**: Collider'ın sadece tetikleyici olarak mı (geçilebilir) yoksa fiziksel bir engel olarak mı davranacağını belirleyin.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu sözleşmesi, mühendislik alanında Çarpışma Kutusu (Collider) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çarpışma Kutusu (Collider) akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 278, "no": "278", "cat": "Görsel Efektler (VFX)", "name": "Pluggable Patlama Efekti Tasarımı Sözleşmesi", "desc": "gözlemlenebilirlik bağlamında Patlama Efekti Tasarımı için pluggable bir sözleşmesi. Dinamik ve görsel olarak etkileyici patlama efektleri oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "patlama", "parçacık", "gözlemlenebilirlik", "pluggable", "başlangıç"], "badge1": "Başlangıç", "content": "## Dinamik Patlama Efekti\nOyununuz için görsel olarak etkileyici bir patlama efekti tasarlayın ve uygulayın.\n\n1.  **Parçacık Sistemi**: Duman, ateş ve kıvılcım rtışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde LOD (Level of ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** LOD, performans, optimizasyon\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 285, "no": "285", "cat": "3D Modeller & Karakterler", "name": "Memory-Safe Modular Asset Tasarımı Yapısı", "desc": "şablon bağlamında Modular Asset Tasarımı için memory-safe bir yapısı. Oyun dünyası için tekrar kullanılabilir modüler parçalar tasarlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["modüler", "tasarım", "çevre", "şablon", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Modüler Çevre Öğeleri Tasarımı\nOyun seviyeleri oluşturmak için modüler assetler tasarlayın ve uygulayın.\n\n1.  **Grid Sistem**: Tüm assetlerinizi ortak bir grid sistemi (örn. 2x2m, 4x4m) üzerinde tasarlayın.\n2.  **Snap Noktaları**: Assetlerin kolayca birleşmesi için doğru snap noktaları belirleyin.\n3.  **Materyal Tutarlılığı**: Modüller arasında materyal ve doku tutarlılığını sağlayarak görsel bütünlüğü koruyun.\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** Başlangıç seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Modular Asset Tasarımı senaryoları\n- **Avantajları:** Bu yapısı sayesinde Modular Asset Tasarımı işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Modular Asset Tasarımı ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** modüler, tasarım, çevre\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 286, "no": "286", "cat": "Dokular & Materyaller", "name": "Performant PBR Doku Seti Çerçevesi", "desc": "logging bağlamında PBR Doku Seti için performant bir çerçevesi. Fiziksel Tabanlı İşleme (PBR) için doku setleri hazırlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["PBR", "doku", "materyal", "logging", "performant", "orta"], "badge1": "Orta", "content": "## PBR Doku Seti Hazırlığı\nGerçekçi materyaller için PBR doku setlerini doğru şekilde oluşturun.\n\n1.  **Gerekli Haritalar**: Base Color (Albedo), Normal, Roughness, Metallic ve Ambient Occlusion haritalarını üretin.\n2.  **Doğru Değerler**: Her haritanın amacına uygun değerler içerdiğinden emin olun (örn. Metallic haritası siyah/beyaz olmalı).\n3.  **Motor Ayarları**: Oyun motorunuzda PBR materyal ayarlarını kullanarak haritaları doğru slotlara atayın.\n\n## Genişletilmiş Notlar (Performant)\n\n- **Hedef Kitle:** Orta seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde PBR Doku Seti senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde PBR Doku Seti işlemleri daha performant hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde PBR Doku Seti ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** PBR, doku, materyal\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 287, "no": "287", "cat": "Dokular & Materyaller", "name": "Performant Normal Harita Üretimi Sistemi", "desc": "API bağlamında Normal Harita Üretimi için performant bir sistemi. Yüksek detaylı geometriden normal haritalar çıkarın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["normal", "doku", "detay", "API", "performant", "orta"], "badge1": "Orta", "content": "## Normal Harita Oluşturma\nYüksek poligonlu modellerin detaylarını düşük poligonlu modellere normal haritalar ile aktarın.\n\n1.  **High-Poly & Low-Poly**: Yüksek detaylı (kaynak) ve optimize edilmiş (hedef) modelinizi hazırlayın.\n2.  **Baking Yazılımı**: Substance Painter, Marmoset Toolbag veya Blender gibi yazılımları kullanarak normal haritayı bake edin.\n3.  **Ayarlar**: Baking ayarlarında 'Cage' veya 'Ray Distance' gibi parametreleri doğru ayarlayarak artefaktları önleyin.\n\n## Genişletilmiş Notlar (Performant)\n\n- **Hedef Kitle:** Orta seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Normal Harita Üretimi senaryoları\n- **Avantajları:** Bu sistemi sayesinde Normal Harita Üretimi işlemleri daha performant hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Normal Harita Üretimi ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** normal, doku, detay\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 288, "no": "288", "cat": "Dokular & Materyaller", "name": "Idempotent Materyal Örnekleri Atama Çekirdeği", "desc": "arayüz bağlamında Materyal Örnekleri Atama için idempotent bir çekirdeği. 3D objelere ve yüzeylere materyalleri etkili bir şekilde uygulayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["materyal", "kaplama", "uygulama", "arayüz", "idempotent", "pro"], "badge1": "Pro", "content": "## Objeye Materyal Ataması\n3D objelerinize materyal atayarak görsel kimliklerini belirleyin.\n\n1.  **Materyal Oluşturma**: Oyun motorunuzda yeni bir materyal asseti oluşturun.\n2.  **Doku Bağlantısı**: Oluşturduğunuz materyale Albedo, Normal, Roughness gibi doku haritalarını bağlayın.\n3.  **Objeye Sürükle**: Materyal assetini doğrudan 3D modelinizin üzerine veya modelin materyal slotuna sürükleyerek uygulayın.\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Pro seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Materyal Örnekleri Atama senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Materyal Örnekleri Atama işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Materyal Örnekleri Atama ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** materyal, kaplama, uygulama\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 289, "no": "289", "cat": "Dokular & Materyaller", "name": "Mobile-First Tiling Doku Ayarları Yönergesi", "desc": "şablon bağlamında Tiling Doku Ayarları için mobile-first bir yönergesi. Tekrarlayan dokuların sorunsuz görünmesi için ayarları yapın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "tiling", "tekrar", "şablon", "mobile-first", "pro"], "badge1": "Pro", "content": "## Tiling Dokuların Ayarlanması\nBüyük yüzeylerde dokuların tekrarlanmasını doğal ve görünmez hale getirin.\n\n1.  **Doku Hazırlığı**: Dokunuzun kenarlarının sorunsuz bir şekilde birleştiğinden (seamless) emin olun.\n2.  **UV Ayarları**: Modelinizin UV haritasında dokunun tiling (tekrarlama) değerlerini ayarlayın. Genellikle UV koordinatlarını büyütmek veya küçültmekle yapılır.\n3.  **Offset & Rotation**: Gerekirse dokunun başlangıç noktasını kaydırın (offset) veya döndürerek tekrarlama desenini kırın.\n\n## Genişletilmiş Notlar (Mobile-First)\n\n- **Hedef Kitle:** Pro seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Tiling Doku Ayarları senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Tiling Doku Ayarları işlemleri daha mobile-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Tiling Doku Ayarları ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** doku, tiling, tekrar\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 290, "no": "290", "cat": "Animasyonlar & Rigging", "name": "Sıfır-Trust İskelet Sistemi Kurulumu Çerçevesi", "desc": "yapay zeka bağlamında İskelet Sistemi Kurulumu için sıfır-trust bir çerçevesi. Karakterlere veya objelere temel bir iskelet sistemi ekleyin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["rigging", "iskelet", "animasyon", "yapay zeka", "sıfır-trust", "uzman"], "badge1": "Uzman", "content": "## Temel İskelet Sistemi Kurulumu\nKarakterinizi veya objenizi hareket ettirmek için temel bir iskelet (rig) oluşturun.\n\n1.  **Kemik Ekleme**: Modelin ana eklem noktalarına (kalça, diz, omuz vb.) kemikler ekleyin.\n2.  **Hiyerarşi Oluşturma**: Kemikler arasında doğru üst-alt ilişkilerini kurarak hiyerarşik bir yapı oluşturun.\n3.  **Skinning/Weight Painting**: Kemiklerin modelin hangi bölgelerini etkileyeceğini belirlemek için ağırlık boyama yapın, deformasyonları düzeltin.\n\n## Uygulama Senaryosu (Sıfır-Trust)\n\nBu çerçevesi, yapay zeka alanında İskelet Sistemi Kurulumu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İskelet Sistemi Kurulumu akışını sıfır-trust yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 291, "no": "291", "cat": "Animasyonlar & Rigging", "name": "Memory-Safe Yürüme Animasyonu Oluşturma Kütüphanesi", "desc": "ölçeklenme bağlamında Yürüme Animasyonu Oluşturma için memory-safe bir kütüphanesi. Karakterler için döngüsel bir yürüme animasyonu oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "yürüme", "döngü", "ölçeklenme", "memory-safe", "i̇leri"], "badge1": "İleri", "content": "## Döngüsel Yürüme Animasyonu\nKarakteriniz için doğal ve döngüsel bir yürüme animasyonu tasarlayın.\n\n1.  **Anahtar Pozlar**: Yürüme döngüsünün kritik pozlarını (ayak basma, ayak kaldırma, ileri adım) belirleyin ve anahtar kareler oluşturun.\n2.  **Döngü Entegrasyonu**: Animasyonun başlangıç ve bitiş karelerinin sorunsuz bir şekilde birleştiğinden emin olun.\n3.  **Hız ve Ağırlık**: Animasyon eğrilerini ayarlayarak yürümenin hızı ve karakterin ağırlık transferini gerçekçi hale getirin.\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** İleri seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Yürüme Animasyonu Oluşturma senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Yürüme Animasyonu Oluşturma işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde Yürüme Animasyonu Oluşturma ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, yürüme, döngü\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 292, "no": "292", "cat": "Animasyonlar & Rigging", "name": "Event-Sourced Ters Kinematik (IK) Doktrini", "desc": "caching bağlamında Ters Kinematik (IK) için event-sourced bir doktrini. Animasyon kontrolünü kolaylaştırmak için IK zincirleri oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["IK", "rigging", "kontrol", "caching", "event-sourced", "orta"], "badge1": "Orta", "content": "## Ters Kinematik (IK) Kurulumu\nAnimasyon sürecini kolaylaştırmak için IK zincirleri oluşturun.\n\n1.  **Zincir Seçimi**: IK uygulamak istediğiniz kemik zincirini belirleyin (örn. bacak veya kol).\n2.  **IK Handle Oluşturma**: Zincirin sonuna bir IK handle veya hedef nesne ekleyin.\n3.  **Poles & Kısıtlamalar**: Diz/dirsek yönünü kontrol etmek için pole vektörleri ekleyin ve kemik rotasyon kısıtlamaları ayarlayarak doğal hareket aralığı sağlayın.\n\n## Uygulama Senaryosu (Event-Sourced)\n\nBu doktrini, caching alanında Ters Kinematik (IK) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Ters Kinematik (IK) akışını event-sourced yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 293, "no": "293", "cat": "Animasyonlar & Rigging", "name": "Sezgisel Blend Shape Animasyon Kalıbı", "desc": "mühendislik bağlamında Blend Shape Animasyon için sezgisel bir kalıbı. Yüz ifadeleri için blend shape animasyonlarını entegre edin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["blend shape", "yüz", "animasyon", "mühendislik", "sezgisel", "pro"], "badge1": "Pro", "content": "## Blend Shape Uygulaması\nKarakterlerinize yüz ifadeleri ve detaylı deformasyonlar için blend shape (morph target) uygulayın.\n\n1.  **Hedef Şekiller**: Ana modelinize dayanarak farklı yüz ifadelerini temsil eden bir dizi hedef şekil (ör. gülümseme, kaş çatma) oluşturun.\n2.  **Blend Shape Oluşturma**: Bu hedef şekilleri ana modele blend shape olarak bağlayın.\n3.  **Değer Kontrolü**: Oyun motorunuzda veya animasyon yazılımınızda blend shape'lerin ağırlık değerlerini kontrol ederek ifadeler arasında geçiş yapın.\n\n## Genişletilmiş Notlar (Sezgisel)  prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 296, "no": "296", "cat": "Ortam & Sahne Öğeleri", "name": "Observable Işıklandırma ve Gölge Yapısı", "desc": "caching bağlamında Işıklandırma ve Gölge için observable bir yapısı. Sahnenin atmosferini belirlemek için ışık ve gölgeleri ayarlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ışık", "gölge", "atmosfer", "caching", "observable", "başlangıç"], "badge1": "Başlangıç", "content": "## Sahne Işıklandırma Prensipleri\nOyun sahnenizin atmosferini ve görsel kalitesini artırmak için ışıklandırmayı ayarlayın.\n\n1.  **Ana Işık (Key Light)**: Sahnedeki ana ışık kaynağını belirleyin (örn. güneş). Yönünü ve yoğunluğunu ayarlayın.\n2.  **Dolgu Işık (Fill Light)**: Ana ışığın yarattığı sert gölgeleri yumuşatmak için daha az yoğun bir dolgu ışığı kullanın.\n3.  **Arka Işık (Rim Light)**: Objeleri arka plandan ayırmak için bir arka ışık ekleyin. Gölge kalitesini ve çözünürlüğünü ayarlayarak performansı dengeleyin.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Başlangıç seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Işıklandırma ve Gölge senaryoları\n- **Avantajları:** Bu yapısı sayesinde Işıklandırma ve Gölge işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Işıklandırma ve Gölge ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ışık, gölge, atmosfer\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 297, "no": "297", "cat": "Ortam & Sahne Öğeleri", "name": "Hibrit Çarpışma Kutusu (Collider) Düzeneği", "desc": "performans bağlamında Çarpışma Kutusu (Collider) için hibrit bir düzeneği. Objelere fiziksel etkileşim için çarpışma kutuları ekleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["fizik", "çarpışma", "collider", "performans", "hibrit", "i̇leri"], "badge1": "İleri", "content": "## Collider Ayarları\nOyun içi fiziksel etkileşimler için objelere çarpışma kutuları (colliders) tanımlayın.\n\n1.  **Collider Türü**: Objeye uygun bir collider türü seçin (Box, Sphere, Capsule veya Mesh Collider).\n2.  **Boyut ve Konum**: Collider'ın boyutunu ve konumunu objenin geometrisine uyacak şekilde ayarlayın. Özellikle karmaşık objeler için basitleştirilmiş bir form kullanın.\n3.  **Trigger Ayarı**: Collider'ın sadece tetikleyici olarak mı (geçilebilir) yoksa fiziksel bir engel olarak mı davranacağını belirleyin.\n\n## Uygulama Senaryosu (Hibrit)\n\nBu düzeneği, performans alanında Çarpışma Kutusu (Collider) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çarpışma Kutusu (Collider) akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 298, "no": "298", "cat": "Görsel Efektler (VFX)", "name": "Sıfır-Trust Patlama Efekti Tasarımı Tasarımı", "desc": "mühendislik bağlamında Patlama Efekti Tasarımı için sıfır-trust bir tasarımı. Dinamik ve görsel olarak etkileyici patlama efektleri oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "patlama", "parçacık", "mühendislik", "sıfır-trust", "i̇leri"], "badge1": "İleri", "content": "## Dinamik Patlama Efekti\nOyununuz için görsel olarak etkileyici bir patlama efekti tasarlayın ve uygulayın.\n\n1.  **Parçacık Sistemi**: Duman, ateş ve kıvılcım için ayrı parçacık sistemleri oluşturun. Her birine uygun dokular atayın.\n2.  **Yüksek Detay**: Başlangıçta yoğun ve hızlı yayılan parçacıklar, sonra yavaş yavaş azalan duman ve kül efektleri kullanın.\n3.  **Işık ve Ses**: Patlamaya dinamik ışıklandırma ve patlama sesi efektleri ekleyerek etkiyi artırın.\n\n## Uygulama Senaryosu (Sıfır-Trust)\n\nBu tasarımı, mühendislik alanında Patlama Efekti Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Patlama Efekti Tasarımı akışını sıfır-trust yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 299, "no": "299", "cat": "Görsel Efektler (VFX)", "name": "Zero-Config Parçacık Sistemi Oluşturma İskeleti", "desc": "mikroservis bağlamında Parçacık Sistemi Oluşturma için zero-config bir i̇skeleti. Duman, ateş veya büyü gibi parçacık sistemleri tasarlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "parçacık", "sistem", "mikroservis", "zero-config", "i̇leri"], "badge1": "İleri", "content": "## Parçacık Sistemi Tasarımı\nDuman, ateş, su sıçraması gibi dinamik görsel efektler için parçacık sistemleri oluşturun.\n\n1.  **Emitör Ayarları**: Parçacıkların nereden ve nasıl yayılacağını (şekil, hız, yaşam süresi) ayarlayın.\n2.  **Görsel Özellikler**: Parçacıklara uygun dokular (texture), renk geçişleri ve boyut değişimi uygulayın.\n3.  **Fizik ve Etkileşim**: Yerçekimi, rüzgar veya çarpışma gibi fiziksel etkileşimleri etkinleştirerek parçacıkların gerçekçi davranmasını sağlayın.\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** İleri seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Parçacık Sistemi Oluşturma senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Parçacık Sistemi Oluşturma işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Parçacık Sistemi Oluşturma ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** VFX, parçacık, sistem\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 300, "no": "300", "cat": "Görsel Efektler (VFX)", "name": "Headless Post-Process Efektleri Stratejisi", "desc": "yapay zeka bağlamında Post-Process Efektleri için headless bir stratejisi. Oyunun son görsel kalitesini artırmak için ekran sonrası efektler uygulayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "post-process", "görsel", "yapay zeka", "headless", "pro"], "badge1": "Pro", "content": "## Post-Process Efektleri Uygulaması\nOyununuzun görsel atmosferini ve kalitesini artırmak için ekran sonrası (post-process) efektleri uygulayın.\n\n1.  **Profil Oluşturma**: Oyun motorunuzda yeni bir post-process profili oluşturun.\n2.  **Efekt Ekleme**: Bloom, Vignette, Depth of Field, Renk Düzeltme gibi efektleri profile ekleyin.\n3.  **Değer Ayarı**: Her efektin yoğunluğunu ve parametrelerini oyununuzun görsel hedeflerine uygun şekilde ayarlayın. Performans etkisini göz önünde bulundurun.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Pro seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Post-Process Efektleri senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Post-Process Efektleri işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Post-Process Efektleri ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** VFX, post-process, görsel\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 301, "no": "301", "cat": "Ses & Müzik", "name": "Reactive Ortam Sesi Entegrasyonu Algoritması", "desc": "mikroservis bağlamında Ortam Sesi Entegrasyonu için reactive bir algoritması. Oyun dünyasına atmosfer katmak için ortam sesleri ekleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["ses", "ortam", "atmosfer", "mikroservis", "reactive", "i̇leri"], "badge1": "İleri", "content": "## Ortam Sesi Entegrasyonu\nOyun dünyasına derinlik ve gerçekçilik katmak için ortam seslerini entegre edin.\n\n1.  **Ses Seçimi**: Sahnenin atmosferine uygun (orman, şehir, mağara vb.) döngüsel (looping) ortam seslerini seçin.\n2.  **Ses Kaynağı Ekleme**: Oyun motorunuzda bir ses kaynağı (Audio Source) oluşturun ve ses dosyasını atayın.\n3.  **Mesafe ve Hacim**: Sesin yayılma mesafesini (attenuation) ve maksimum hacmini ayarlayarak oyuncunun mesafesine göre sesin değişmesini sağlayın. Döngü modunu etkinleştirin.\n\n## Genişletilmiş Notlar (Reactive)\n\n- **Hedef Kitle:** İleri seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Ortam Sesi Entegrasyonu senaryoları\n- **Avantajları:** Bu algoritması sayesinde Ortam Sesi Entegrasyonu işlemleri daha reactive hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Ortam Sesi Entegrasyonu ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ses, ortam, atmosfer\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 302, "no": "302", "cat": "3D Modeller & Karakterler", "name": "Edge-Optimize Karakter Modeli Optimizasyonu Pratiği", "desc": "arayüz bağlamında Karakter Modeli Optimizasyonu için edge-optimize bir pratiği. Oyun içi performans için 3D karakter modellerini optimize edin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["model", "optimizasyon", "karakter", "arayüz", "edge-optimize", "başlangıç"], "badge1": "Başlangıç", "content": "## Karakter Poligon Optimizasyonu\nOyun performansı için karakter modellerini optimize edin. Gereksiz kenarları ve yüzeyleri azaltarak poligon sayısını düşürün.\n\n1.  **Detay İncelemesi**: Modelin hangi kısımlarının daha az detaya ihtiyaç duyduğunu belirleyin.\n2.  **Decimate Modifikatörü**: Yazılımınızdaki Decimate modifikatörünü kullanarak poligon sayısını kademeli olarak azaltın. Hedef FPS'e uygun değerler bulun.\n3.  **Manuel Temizlik**: Modeldeki küçük, görünmez yüzeyleri manuel olarak silin.\n\n## Uygulama Senaryosu (Edge-Optimize)\n\nBu pratiği, arayüz alanında Karakter Modeli Optimizasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Karakter Modeli Optimizasyonu akışını edge-optimize yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 303, "no": "303", "cat": "3D Modeller & Karakterler", "name": "Reaktif Yüksek Poligonlu Obje Çekirdeği", "desc": "dağıtım bağlamında Yüksek Poligonlu Obje için reaktif bir çekirdeği. Detaylı 3D objeleri oyun motoruna sorunsuz aktarma kılavuzu. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["import", "model", "detay", "dağıtım", "reaktif", "pro"], "badge1": "Pro", "content": "## Yüksek Detaylı Obje İçe Aktarımı\nYüksek poligonlu modelleri oyun motoruna aktarırken performans sorunlarını önleyin.\n\n1.  **Format Seçimi**: FBX veya OBJ gibi yaygın formatları tercih edin, materyal ve animasyon desteği için FBX önerilir.\n2.  **Ölçek ve Birimler**: Modeli dışa aktarırken doğru ölçek ve birim ayarlarını kullanın, genellikle metre veya santimetre.\n3.  **Pivot Noktası**: Modelin pivot noktasının merkezde veya istenilen dönüş noktasında olduğundan emin olun.\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Pro seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Yüksek Poligonlu Obje senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Yüksek Poligonlu Obje işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Yüksek Poligonlu Obje ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** import, model, detay\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 304, "no": "304", "cat": "3D Modeller & Karakterler", "name": "Yalın LOD (Level of Sistemi", "desc": "API bağlamında LOD (Level of için yalın bir sistemi. Farklı mesafeler için model detay seviyeleri oluşturarak performansı artırın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["LOD", "performans", "optimizasyon", "API", "yalın", "başlangıç"], "badge1": "Başlangıç", "content": "## LOD Seti Oluşturma\nPerformansı artırmak için modellerinize LOD (Level of Detail) ekleyin.\n\n1.  **LOD 0 (Full Detay)**: Orijinal yüksek poligonlu modelinizi kullanın.\n2.  **LOD 1, 2, 3**: Modeli kademeli olarak basitleştirin (poligon azaltma, materyal sadeleştirme). Her LOD seviyesi için görünürlük mesafelerini belirleyin.\n3.  **Motor Entegrasyonu**: Oyun motorunuzda LOD gru anı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** normal, doku, detay\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 308, "no": "308", "cat": "Dokular & Materyaller", "name": "Ölçeklenebilir Materyal Örnekleri Atama Kuralı", "desc": "gözlemlenebilirlik bağlamında Materyal Örnekleri Atama için ölçeklenebilir bir kuralı. 3D objelere ve yüzeylere materyalleri etkili bir şekilde uygulayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["materyal", "kaplama", "uygulama", "gözlemlenebilirlik", "ölçeklenebilir", "uzman"], "badge1": "Uzman", "content": "## Objeye Materyal Ataması\n3D objelerinize materyal atayarak görsel kimliklerini belirleyin.\n\n1.  **Materyal Oluşturma**: Oyun motorunuzda yeni bir materyal asseti oluşturun.\n2.  **Doku Bağlantısı**: Oluşturduğunuz materyale Albedo, Normal, Roughness gibi doku haritalarını bağlayın.\n3.  **Objeye Sürükle**: Materyal assetini doğrudan 3D modelinizin üzerine veya modelin materyal slotuna sürükleyerek uygulayın.\n\n## Genişletilmiş Notlar (Ölçeklenebilir)\n\n- **Hedef Kitle:** Uzman seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Materyal Örnekleri Atama senaryoları\n- **Avantajları:** Bu kuralı sayesinde Materyal Örnekleri Atama işlemleri daha ölçeklenebilir hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Materyal Örnekleri Atama ihtiyacını analiz edin.\n  2. Bu kuralı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** materyal, kaplama, uygulama\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 309, "no": "309", "cat": "Dokular & Materyaller", "name": "Yalın Tiling Doku Ayarları Anlaşması", "desc": "şablon bağlamında Tiling Doku Ayarları için yalın bir anlaşması. Tekrarlayan dokuların sorunsuz görünmesi için ayarları yapın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "tiling", "tekrar", "şablon", "yalın", "pro"], "badge1": "Pro", "content": "## Tiling Dokuların Ayarlanması\nBüyük yüzeylerde dokuların tekrarlanmasını doğal ve görünmez hale getirin.\n\n1.  **Doku Hazırlığı**: Dokunuzun kenarlarının sorunsuz bir şekilde birleştiğinden (seamless) emin olun.\n2.  **UV Ayarları**: Modelinizin UV haritasında dokunun tiling (tekrarlama) değerlerini ayarlayın. Genellikle UV koordinatlarını büyütmek veya küçültmekle yapılır.\n3.  **Offset & Rotation**: Gerekirse dokunun başlangıç noktasını kaydırın (offset) veya döndürerek tekrarlama desenini kırın.\n\n## Uygulama Senaryosu (Yalın)\n\nBu anlaşması, şablon alanında Tiling Doku Ayarları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Tiling Doku Ayarları akışını yalın yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 310, "no": "310", "cat": "Animasyonlar & Rigging", "name": "Mobile-First İskelet Sistemi Kurulumu Yönergesi", "desc": "ölçeklenme bağlamında İskelet Sistemi Kurulumu için mobile-first bir yönergesi. Karakterlere veya objelere temel bir iskelet sistemi ekleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["rigging", "iskelet", "animasyon", "ölçeklenme", "mobile-first", "i̇leri"], "badge1": "İleri", "content": "## Temel İskelet Sistemi Kurulumu\nKarakterinizi veya objenizi hareket ettirmek için temel bir iskelet (rig) oluşturun.\n\n1.  **Kemik Ekleme**: Modelin ana eklem noktalarına (kalça, diz, omuz vb.) kemikler ekleyin.\n2.  **Hiyerarşi Oluşturma**: Kemikler arasında doğru üst-alt ilişkilerini kurarak hiyerarşik bir yapı oluşturun.\n3.  **Skinning/Weight Painting**: Kemiklerin modelin hangi bölgelerini etkileyeceğini belirlemek için ağırlık boyama yapın, deformasyonları düzeltin.\n\n## Uygulama Senaryosu (Mobile-First)\n\nBu yönergesi, ölçeklenme alanında İskelet Sistemi Kurulumu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İskelet Sistemi Kurulumu akışını mobile-first yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 311, "no": "311", "cat": "Animasyonlar & Rigging", "name": "Polyglot Yürüme Animasyonu Oluşturma Kılavuzu", "desc": "mikroservis bağlamında Yürüme Animasyonu Oluşturma için polyglot bir kılavuzu. Karakterler için döngüsel bir yürüme animasyonu oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "yürüme", "döngü", "mikroservis", "polyglot", "orta"], "badge1": "Orta", "content": "## Döngüsel Yürüme Animasyonu\nKarakteriniz için doğal ve döngüsel bir yürüme animasyonu tasarlayın.\n\n1.  **Anahtar Pozlar**: Yürüme döngüsünün kritik pozlarını (ayak basma, ayak kaldırma, ileri adım) belirleyin ve anahtar kareler oluşturun.\n2.  **Döngü Entegrasyonu**: Animasyonun başlangıç ve bitiş karelerinin sorunsuz bir şekilde birleştiğinden emin olun.\n3.  **Hız ve Ağırlık**: Animasyon eğrilerini ayarlayarak yürümenin hızı ve karakterin ağırlık transferini gerçekçi hale getirin.\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** Orta seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Yürüme Animasyonu Oluşturma senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde Yürüme Animasyonu Oluşturma işlemleri daha polyglot hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Yürüme Animasyonu Oluşturma ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** animasyon, yürüme, döngü\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 312, "no": "312", "cat": "Animasyonlar & Rigging", "name": "Composable Ters Kinematik (IK) Sistemi", "desc": "mikroservis bağlamında Ters Kinematik (IK) için composable bir sistemi. Animasyon kontrolünü kolaylaştırmak için IK zincirleri oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["IK", "rigging", "kontrol", "mikroservis", "composable", "orta"], "badge1": "Orta", "content": "## Ters Kinematik (IK) Kurulumu\nAnimasyon sürecini kolaylaştırmak için IK zincirleri oluşturun.\n\n1.  **Zincir Seçimi**: IK uygulamak istediğiniz kemik zincirini belirleyin (örn. bacak veya kol).\n2.  **IK Handle Oluşturma**: Zincirin sonuna bir IK handle veya hedef nesne ekleyin.\n3.  **Poles & Kısıtlamalar**: Diz/dirsek yönünü kontrol etmek için pole vektörleri ekleyin ve kemik rotasyon kısıtlamaları ayarlayarak doğal hareket aralığı sağlayın.\n\n## Genişletilmiş Notlar (Composable)\n\n- **Hedef Kitle:** Orta seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Ters Kinematik (IK) senaryoları\n- **Avantajları:** Bu sistemi sayesinde Ters Kinematik (IK) işlemleri daha composable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Ters Kinematik (IK) ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** IK, rigging, kontrol\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 313, "no": "313", "cat": "Animasyonlar & Rigging", "name": "Headless Blend Shape Animasyon Mimari Yaklaşımı", "desc": "entegrasyon bağlamında Blend Shape Animasyon için headless bir mimari yaklaşımı. Yüz ifadeleri için blend shape animasyonlarını entegre edin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["blend shape", "yüz", "animasyon", "entegrasyon", "headless", "orta"], "badge1": "Orta", "content": "## Blend Shape Uygulaması\nKarakterlerinize yüz ifadeleri ve detaylı deformasyonlar için blend shape (morph target) uygulayın.\n\n1.  **Hedef Şekiller**: Ana modelinize dayanarak farklı yüz ifadelerini temsil eden bir dizi hedef u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 318, "no": "318", "cat": "Görsel Efektler (VFX)", "name": "Bağlamsal Patlama Efekti Tasarımı Rehberi", "desc": "gözlemlenebilirlik bağlamında Patlama Efekti Tasarımı için bağlamsal bir rehberi. Dinamik ve görsel olarak etkileyici patlama efektleri oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "patlama", "parçacık", "gözlemlenebilirlik", "bağlamsal", "i̇leri"], "badge1": "İleri", "content": "## Dinamik Patlama Efekti\nOyununuz için görsel olarak etkileyici bir patlama efekti tasarlayın ve uygulayın.\n\n1.  **Parçacık Sistemi**: Duman, ateş ve kıvılcım için ayrı parçacık sistemleri oluşturun. Her birine uygun dokular atayın.\n2.  **Yüksek Detay**: Başlangıçta yoğun ve hızlı yayılan parçacıklar, sonra yavaş yavaş azalan duman ve kül efektleri kullanın.\n3.  **Işık ve Ses**: Patlamaya dinamik ışıklandırma ve patlama sesi efektleri ekleyerek etkiyi artırın.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** İleri seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Patlama Efekti Tasarımı senaryoları\n- **Avantajları:** Bu rehberi sayesinde Patlama Efekti Tasarımı işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Patlama Efekti Tasarımı ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** VFX, patlama, parçacık\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 319, "no": "319", "cat": "Görsel Efektler (VFX)", "name": "Observable Parçacık Sistemi Oluşturma Kuralı", "desc": "dağıtım bağlamında Parçacık Sistemi Oluşturma için observable bir kuralı. Duman, ateş veya büyü gibi parçacık sistemleri tasarlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "parçacık", "sistem", "dağıtım", "observable", "başlangıç"], "badge1": "Başlangıç", "content": "## Parçacık Sistemi Tasarımı\nDuman, ateş, su sıçraması gibi dinamik görsel efektler için parçacık sistemleri oluşturun.\n\n1.  **Emitör Ayarları**: Parçacıkların nereden ve nasıl yayılacağını (şekil, hız, yaşam süresi) ayarlayın.\n2.  **Görsel Özellikler**: Parçacıklara uygun dokular (texture), renk geçişleri ve boyut değişimi uygulayın.\n3.  **Fizik ve Etkileşim**: Yerçekimi, rüzgar veya çarpışma gibi fiziksel etkileşimleri etkinleştirerek parçacıkların gerçekçi davranmasını sağlayın.\n\n## Uygulama Senaryosu (Observable)\n\nBu kuralı, dağıtım alanında Parçacık Sistemi Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Parçacık Sistemi Oluşturma akışını observable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 320, "no": "320", "cat": "Görsel Efektler (VFX)", "name": "Mobile-First Post-Process Efektleri Stratejisi", "desc": "arayüz bağlamında Post-Process Efektleri için mobile-first bir stratejisi. Oyunun son görsel kalitesini artırmak için ekran sonrası efektler uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "post-process", "görsel", "arayüz", "mobile-first", "orta"], "badge1": "Orta", "content": "## Post-Process Efektleri Uygulaması\nOyununuzun görsel atmosferini ve kalitesini artırmak için ekran sonrası (post-process) efektleri uygulayın.\n\n1.  **Profil Oluşturma**: Oyun motorunuzda yeni bir post-process profili oluşturun.\n2.  **Efekt Ekleme**: Bloom, Vignette, Depth of Field, Renk Düzeltme gibi efektleri profile ekleyin.\n3.  **Değer Ayarı**: Her efektin yoğunluğunu ve parametrelerini oyununuzun görsel hedeflerine uygun şekilde ayarlayın. Performans etkisini göz önünde bulundurun.\n\n## Uygulama Senaryosu (Mobile-First)\n\nBu stratejisi, arayüz alanında Post-Process Efektleri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Post-Process Efektleri akışını mobile-first yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 321, "no": "321", "cat": "Ses & Müzik", "name": "Memory-Safe Ortam Sesi Entegrasyonu Kütüphanesi", "desc": "ölçeklenme bağlamında Ortam Sesi Entegrasyonu için memory-safe bir kütüphanesi. Oyun dünyasına atmosfer katmak için ortam sesleri ekleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ses", "ortam", "atmosfer", "ölçeklenme", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Ortam Sesi Entegrasyonu\nOyun dünyasına derinlik ve gerçekçilik katmak için ortam seslerini entegre edin.\n\n1.  **Ses Seçimi**: Sahnenin atmosferine uygun (orman, şehir, mağara vb.) döngüsel (looping) ortam seslerini seçin.\n2.  **Ses Kaynağı Ekleme**: Oyun motorunuzda bir ses kaynağı (Audio Source) oluşturun ve ses dosyasını atayın.\n3.  **Mesafe ve Hacim**: Sesin yayılma mesafesini (attenuation) ve maksimum hacmini ayarlayarak oyuncunun mesafesine göre sesin değişmesini sağlayın. Döngü modunu etkinleştirin.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu kütüphanesi, ölçeklenme alanında Ortam Sesi Entegrasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Ortam Sesi Entegrasyonu akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 322, "no": "322", "cat": "3D Modeller & Karakterler", "name": "Adaptif Karakter Modeli Optimizasyonu Yönergesi", "desc": "akış bağlamında Karakter Modeli Optimizasyonu için adaptif bir yönergesi. Oyun içi performans için 3D karakter modellerini optimize edin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["model", "optimizasyon", "karakter", "akış", "adaptif", "i̇leri"], "badge1": "İleri", "content": "## Karakter Poligon Optimizasyonu\nOyun performansı için karakter modellerini optimize edin. Gereksiz kenarları ve yüzeyleri azaltarak poligon sayısını düşürün.\n\n1.  **Detay İncelemesi**: Modelin hangi kısımlarının daha az detaya ihtiyaç duyduğunu belirleyin.\n2.  **Decimate Modifikatörü**: Yazılımınızdaki Decimate modifikatörünü kullanarak poligon sayısını kademeli olarak azaltın. Hedef FPS'e uygun değerler bulun.\n3.  **Manuel Temizlik**: Modeldeki küçük, görünmez yüzeyleri manuel olarak silin.\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** İleri seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Karakter Modeli Optimizasyonu senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Karakter Modeli Optimizasyonu işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Karakter Modeli Optimizasyonu ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** model, optimizasyon, karakter\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 323, "no": "323", "cat": "3D Modeller & Karakterler", "name": "Sezgisel Yüksek Poligonlu Obje Önerisi", "desc": "mühendislik bağlamında Yüksek Poligonlu Obje için sezgisel bir önerisi. Detaylı 3D objeleri oyun motoruna sorunsuz aktarma kılavuzu. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["import", "model", "detay", "mühendislik", "sezgisel", "başlangıç"], "badge1": "Başlangıç", "content": "## Yüksek Detaylı Obje İçe Aktarımı\nYüksek poligonlu modelleri oyun motoruna aktarırken performans sorunlarını önleyin.\n\n1.  **Format Seçimi**: FBX veya OBJ gibi yaygın formatları tercih edin, materyal ve animasyon desteği için FBX önerilir.\n2.  **Ölçek ve Birimler**: Modeli dışa aktarırken doğru ölçek ve birim ayarlarını kullanın, genellikle metre veya santimetre.\n3.  **Pivot Noktası**: Modelin pivot noktasının merkezde veya istenilen dönüş noktasında olduğundan emin olun.\n\n## Uygulama Senaryosu (Sezgisel)\n\nBu önerisi, mühendislik alanında Yüksek Poligonlu Obje problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yüksek Poligonlu Obje akışını sezgisel yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 324, "no": "324", "cat": "3D Modeller & Karakterler", "name": "Composable LOD (Level of Kütüphanesi", "desc": "gözlemlenebilirlik bağlamında LOD (Level of için composable bir kütüphanesi. Farklı mesafeler için model detay seviyeleri oluşturarak performansı artırın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["LOD", "performans", "optimizasyon", "gözlemlenebilirlik", "composable", "uzman"], "badge1": "Uzman", "content": "## LOD Seti Oluşturma\nPerformansı artırmak için modellerinize LOD (Level of Detail) ekleyin.\n\n1.  **LOD 0 (Full Detay)**: Orijinal yüksek poligonlu modelinizi kullanın.\n2.  **LOD 1, 2, 3**: Modeli kademeli olarak basitleştirin (poligon azaltma, materyal sadeleştirme). Her LOD seviyesi için görünürlük mesafelerini belirleyin.\n3.  **Motor Entegrasyonu**: Oyun motorunuzda LOD grubunu ayarlayın ve her seviyenin ne zaman etkinleşeceğini tanımlayın.\n\n## Uygulama Senaryosu (Composable)\n\nBu kütüphanesi, gözlemlenebilirlik alanında LOD (Level of problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darb din.\n  2. Bu protokolü'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** modüler, tasarım, çevre\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 326, "no": "326", "cat": "Dokular & Materyaller", "name": "Production-Grade PBR Doku Seti Şablonu", "desc": "arayüz bağlamında PBR Doku Seti için production-grade bir şablonu. Fiziksel Tabanlı İşleme (PBR) için doku setleri hazırlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["PBR", "doku", "materyal", "arayüz", "production-grade", "başlangıç"], "badge1": "Başlangıç", "content": "## PBR Doku Seti Hazırlığı\nGerçekçi materyaller için PBR doku setlerini doğru şekilde oluşturun.\n\n1.  **Gerekli Haritalar**: Base Color (Albedo), Normal, Roughness, Metallic ve Ambient Occlusion haritalarını üretin.\n2.  **Doğru Değerler**: Her haritanın amacına uygun değerler içerdiğinden emin olun (örn. Metallic haritası siyah/beyaz olmalı).\n3.  **Motor Ayarları**: Oyun motorunuzda PBR materyal ayarlarını kullanarak haritaları doğru slotlara atayın.\n\n## Genişletilmiş Notlar (Production-Grade)\n\n- **Hedef Kitle:** Başlangıç seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde PBR Doku Seti senaryoları\n- **Avantajları:** Bu şablonu sayesinde PBR Doku Seti işlemleri daha production-grade hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde PBR Doku Seti ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın
