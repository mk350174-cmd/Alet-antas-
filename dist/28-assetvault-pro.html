.\n- **İlgili Konular:** doku, tiling, tekrar\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 390, "no": "390", "cat": "Animasyonlar & Rigging", "name": "Reactive İskelet Sistemi Kurulumu Modeli", "desc": "monitoring bağlamında İskelet Sistemi Kurulumu için reactive bir modeli. Karakterlere veya objelere temel bir iskelet sistemi ekleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["rigging", "iskelet", "animasyon", "monitoring", "reactive", "başlangıç"], "badge1": "Başlangıç", "content": "## Temel İskelet Sistemi Kurulumu\nKarakterinizi veya objenizi hareket ettirmek için temel bir iskelet (rig) oluşturun.\n\n1.  **Kemik Ekleme**: Modelin ana eklem noktalarına (kalça, diz, omuz vb.) kemikler ekleyin.\n2.  **Hiyerarşi Oluşturma**: Kemikler arasında doğru üst-alt ilişkilerini kurarak hiyerarşik bir yapı oluşturun.\n3.  **Skinning/Weight Painting**: Kemiklerin modelin hangi bölgelerini etkileyeceğini belirlemek için ağırlık boyama yapın, deformasyonları düzeltin.\n\n## Uygulama Senaryosu (Reactive)\n\nBu modeli, monitoring alanında İskelet Sistemi Kurulumu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İskelet Sistemi Kurulumu akışını reactive yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 391, "no": "391", "cat": "Animasyonlar & Rigging", "name": "Dağıtık Yürüme Animasyonu Oluşturma Stratejisi", "desc": "CI/CD bağlamında Yürüme Animasyonu Oluşturma için dağıtık bir stratejisi. Karakterler için döngüsel bir yürüme animasyonu oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "yürüme", "döngü", "CI/CD", "dağıtık", "başlangıç"], "badge1": "Başlangıç", "content": "## Döngüsel Yürüme Animasyonu\nKarakteriniz için doğal ve döngüsel bir yürüme animasyonu tasarlayın.\n\n1.  **Anahtar Pozlar**: Yürüme döngüsünün kritik pozlarını (ayak basma, ayak kaldırma, ileri adım) belirleyin ve anahtar kareler oluşturun.\n2.  **Döngü Entegrasyonu**: Animasyonun başlangıç ve bitiş karelerinin sorunsuz bir şekilde birleştiğinden emin olun.\n3.  **Hız ve Ağırlık**: Animasyon eğrilerini ayarlayarak yürümenin hızı ve karakterin ağırlık transferini gerçekçi hale getirin.\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu stratejisi, CI/CD alanında Yürüme Animasyonu Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yürüme Animasyonu Oluşturma akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 392, "no": "392", "cat": "Animasyonlar & Rigging", "name": "Senkron Ters Kinematik (IK) Tasarımı", "desc": "ölçeklenme bağlamında Ters Kinematik (IK) için senkron bir tasarımı. Animasyon kontrolünü kolaylaştırmak için IK zincirleri oluşturun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["IK", "rigging", "kontrol", "ölçeklenme", "senkron", "uzman"], "badge1": "Uzman", "content": "## Ters Kinematik (IK) Kurulumu\nAnimasyon sürecini kolaylaştırmak için IK zincirleri oluşturun.\n\n1.  **Zincir Seçimi**: IK uygulamak istediğiniz kemik zincirini belirleyin (örn. bacak veya kol).\n2.  **IK Handle Oluşturma**: Zincirin sonuna bir IK handle veya hedef nesne ekleyin.\n3.  **Poles & Kısıtlamalar**: Diz/dirsek yönünü kontrol etmek için pole vektörleri ekleyin ve kemik rotasyon kısıtlamaları ayarlayarak doğal hareket aralığı sağlayın.\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** Uzman seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Ters Kinematik (IK) senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Ters Kinematik (IK) işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde Ters Kinematik (IK) ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** IK, rigging, kontrol\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 393, "no": "393", "cat": "Animasyonlar & Rigging", "name": "Hibrit-Cloud Blend Shape Animasyon Sözleşmesi", "desc": "mikroservis bağlamında Blend Shape Animasyon için hibrit-cloud bir sözleşmesi. Yüz ifadeleri için blend shape animasyonlarını entegre edin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["blend shape", "yüz", "animasyon", "mikroservis", "hibrit-cloud", "orta"], "badge1": "Orta", "content": "## Blend Shape Uygulaması\nKarakterlerinize yüz ifadeleri ve detaylı deformasyonlar için blend shape (morph target) uygulayın.\n\n1.  **Hedef Şekiller**: Ana modelinize dayanarak farklı yüz ifadelerini tem k dinamik ve canlı bir görünüm kazandırın.\n\n## Uygulama Senaryosu (Pluggable)\n\nBu algoritması, şablon alanında Bitki Örtüsü Yerleşimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Bitki Örtüsü Yerleşimi akışını pluggable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 396, "no": "396", "cat": "Ortam & Sahne Öğeleri", "name": "Hibrit Işıklandırma ve Gölge Kılavuzu", "desc": "test bağlamında Işıklandırma ve Gölge için hibrit bir kılavuzu. Sahnenin atmosferini belirlemek için ışık ve gölgeleri ayarlayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["ışık", "gölge", "atmosfer", "test", "hibrit", "i̇leri"], "badge1": "İleri", "content": "## Sahne Işıklandırma Prensipleri\nOyun sahnenizin atmosferini ve görsel kalitesini artırmak için ışıklandırmayı ayarlayın.\n\n1.  **Ana Işık (Key Light)**: Sahnedeki ana ışık kaynağını belirleyin (örn. güneş). Yönünü ve yoğunluğunu ayarlayın.\n2.  **Dolgu Işık (Fill Light)**: Ana ışığın yarattığı sert gölgeleri yumuşatmak için daha az yoğun bir dolgu ışığı kullanın.\n3.  **Arka Işık (Rim Light)**: Objeleri arka plandan ayırmak için bir arka ışık ekleyin. Gölge kalitesini ve çözünürlüğünü ayarlayarak performansı dengeleyin.\n\n## Genişletilmiş Notlar (Hibrit)\n\n- **Hedef Kitle:** İleri seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Işıklandırma ve Gölge senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde Işıklandırma ve Gölge işlemleri daha hibrit hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Işıklandırma ve Gölge ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ışık, gölge, atmosfer\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 397, "no": "397", "cat": "Ortam & Sahne Öğeleri", "name": "Dağıtık Çarpışma Kutusu (Collider) Kılavuzu", "desc": "caching bağlamında Çarpışma Kutusu (Collider) için dağıtık bir kılavuzu. Objelere fiziksel etkileşim için çarpışma kutuları ekleyin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["fizik", "çarpışma", "collider", "caching", "dağıtık", "pro"], "badge1": "Pro", "content": "## Collider Ayarları\nOyun içi fiziksel etkileşimler için objelere çarpışma kutuları (colliders) tanımlayın.\n\n1.  **Collider Türü**: Objeye uygun bir collider türü seçin (Box, Sphere, Capsule veya Mesh Collider).\n2.  **Boyut ve Konum**: Collider'ın boyutunu ve konumunu objenin geometrisine uyacak şekilde ayarlayın. Özellikle karmaşık objeler için basitleştirilmiş bir form kullanın.\n3.  **Trigger Ayarı**: Collider'ın sadece tetikleyici olarak mı (geçilebilir) yoksa fiziksel bir engel olarak mı davranacağını belirleyin.\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu kılavuzu, caching alanında Çarpışma Kutusu (Collider) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çarpışma Kutusu (Collider) akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 398, "no": "398", "cat": "Görsel Efektler (VFX)", "name": "Quantum-Hazır Patlama Efekti Tasarımı Yapısı", "desc": "entegrasyon bağlamında Patlama Efekti Tasarımı için quantum-hazır bir yapısı. Dinamik ve görsel olarak etkileyici patlama efektleri oluşturun. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "patlama", "parçacık", "entegrasyon", "quantum-hazır", "pro"], "badge1": "Pro", "content": "## Dinamik Patlama Efekti\nOyununuz için görsel olarak etkileyici bir patlama efekti tasarlayın ve uygulayın.\n\n1.  **Parçacık Sistemi**: Duman, ateş ve kıvılcım için ayrı parçacık sistemleri oluşturun. Her birine uygun dokular atayın.\n2.  **Yüksek Detay**: Başlangıçta yoğun ve hızlı yayılan parçacıklar, sonra yavaş yavaş azalan duman ve kül efektleri kullanın.\n3.  **Işık ve Ses**: Patlamaya dinamik ışıklandırma ve patlama sesi efektleri ekleyerek etkiyi artırın.\n\n## Uygulama Senaryosu (Quantum-Hazır)\n\nBu yapısı, entegrasyon alanında Patlama Efekti Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Patlama Efekti Tasarımı akışını quantum-hazır yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegras 3-400"}}, {"id": 400, "no": "400", "cat": "Görsel Efektler (VFX)", "name": "Atomic Post-Process Efektleri Düzeneği", "desc": "mühendislik bağlamında Post-Process Efektleri için atomic bir düzeneği. Oyunun son görsel kalitesini artırmak için ekran sonrası efektler uygulayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "post-process", "görsel", "mühendislik", "atomic", "i̇leri"], "badge1": "İleri", "content": "## Post-Process Efektleri Uygulaması\nOyununuzun görsel atmosferini ve kalitesini artırmak için ekran sonrası (post-process) efektleri uygulayın.\n\n1.  **Profil Oluşturma**: Oyun motorunuzda yeni bir post-process profili oluşturun.\n2.  **Efekt Ekleme**: Bloom, Vignette, Depth of Field, Renk Düzeltme gibi efektleri profile ekleyin.\n3.  **Değer Ayarı**: Her efektin yoğunluğunu ve parametrelerini oyununuzun görsel hedeflerine uygun şekilde ayarlayın. Performans etkisini göz önünde bulundurun.\n\n## Uygulama Senaryosu (Atomic)\n\nBu düzeneği, mühendislik alanında Post-Process Efektleri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Post-Process Efektleri akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 401, "no": "401", "cat": "Ses & Müzik", "name": "Kanıt-Tabanlı Ortam Sesi Entegrasyonu Stratejisi", "desc": "test bağlamında Ortam Sesi Entegrasyonu için kanıt-tabanlı bir stratejisi. Oyun dünyasına atmosfer katmak için ortam sesleri ekleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["ses", "ortam", "atmosfer", "test", "kanıt-tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Ortam Sesi Entegrasyonu\nOyun dünyasına derinlik ve gerçekçilik katmak için ortam seslerini entegre edin.\n\n1.  **Ses Seçimi**: Sahnenin atmosferine uygun (orman, şehir, mağara vb.) döngüsel (looping) ortam seslerini seçin.\n2.  **Ses Kaynağı Ekleme**: Oyun motorunuzda bir ses kaynağı (Audio Source) oluşturun ve ses dosyasını atayın.\n3.  **Mesafe ve Hacim**: Sesin yayılma mesafesini (attenuation) ve maksimum hacmini ayarlayarak oyuncunun mesafesine göre sesin değişmesini sağlayın. Döngü modunu etkinleştirin.\n\n## Genişletilmiş Notlar (Kanıt-Tabanlı)\n\n- **Hedef Kitle:** İleri seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Ortam Sesi Entegrasyonu senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Ortam Sesi Entegrasyonu işlemleri daha kanıt-tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Ortam Sesi Entegrasyonu ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ses, ortam, atmosfer\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 402, "no": "402", "cat": "AI Prompt Kütüphanesi", "name": "Sistem Promptu — Asset Pipeline", "desc": "Asset Pipeline alanı için orijinal sistem promptu promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "system-prompt", "asset", "orijinal"], "badge1": "Orijinal AI", "content": "## SİSTEM PROMPTU — Asset Pipeline Uzmanı\n\nSen kıdeml retimi işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Normal Harita Üretimi ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** normal, doku, detay\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 413, "no": "413", "cat": "Dokular & Materyaller", "name": "Memory-Safe Materyal Örnekleri Atama Yönergesi", "desc": "şablon bağlamında Materyal Örnekleri Atama için memory-safe bir yönergesi. 3D objelere ve yüzeylere materyalleri etkili bir şekilde uygulayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["materyal", "kaplama", "uygulama", "şablon", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Objeye Materyal Ataması\n3D objelerinize materyal atayarak görsel kimliklerini belirleyin.\n\n1.  **Materyal Oluşturma**: Oyun motorunuzda yeni bir materyal asseti oluşturun.\n2.  **Doku Bağlantısı**: Oluşturduğunuz materyale Albedo, Normal, Roughness gibi doku haritalarını bağlayın.\n3.  **Objeye Sürükle**: Materyal assetini doğrudan 3D modelinizin üzerine veya modelin materyal slotuna sürükleyerek uygulayın.\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** Başlangıç seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Materyal Örnekleri Atama senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Materyal Örnekleri Atama işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Materyal Örnekleri Atama ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** materyal, kaplama, uygulama\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 414, "no": "414", "cat": "Dokular & Materyaller", "name": "AI-Augmented Tiling Doku Ayarları Yönergesi", "desc": "entegrasyon bağlamında Tiling Doku Ayarları için ai-augmented bir yönergesi. Tekrarlayan dokuların sorunsuz görünmesi için ayarları yapın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "tiling", "tekrar", "entegrasyon", "ai-augmented", "başlangıç"], "badge1": "Başlangıç", "content": "## Tiling Dokuların Ayarlanması\nBüyük yüzeylerde dokuların tekrarlanmasını doğal ve görünmez hale getirin.\n\n1.  **Doku Hazırlığı**: Dokunuzun kenarlarının sorunsuz bir şekilde birleştiğinden (seamless) emin olun.\n2.  **UV Ayarları**: Modelinizin UV haritasında dokunun tiling (tekrarlama) değerlerini ayarlayın. Genellikle UV koordinatlarını büyütmek veya küçültmekle yapılır.\n3.  **Offset & Rotation**: Gerekirse dokunun başlangıç noktasını kaydırın (offset) veya döndürerek tekrarlama desenini kırın.\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu yönergesi, entegrasyon alanında Tiling Doku Ayarları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Tiling Doku Ayarları akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n###  "v3-450-final"}}, {"id": 416, "no": "416", "cat": "Animasyonlar & Rigging", "name": "Otonom Yürüme Animasyonu Oluşturma Sistemi", "desc": "gözlemlenebilirlik bağlamında Yürüme Animasyonu Oluşturma için otonom bir sistemi. Karakterler için döngüsel bir yürüme animasyonu oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "yürüme", "döngü", "gözlemlenebilirlik", "otonom", "orta"], "badge1": "Orta", "content": "## Döngüsel Yürüme Animasyonu\nKarakteriniz için doğal ve döngüsel bir yürüme animasyonu tasarlayın.\n\n1.  **Anahtar Pozlar**: Yürüme döngüsünün kritik pozlarını (ayak basma, ayak kaldırma, ileri adım) belirleyin ve anahtar kareler oluşturun.\n2.  **Döngü Entegrasyonu**: Animasyonun başlangıç ve bitiş karelerinin sorunsuz bir şekilde birleştiğinden emin olun.\n3.  **Hız ve Ağırlık**: Animasyon eğrilerini ayarlayarak yürümenin hızı ve karakterin ağırlık transferini gerçekçi hale getirin.\n\n## Uygulama Senaryosu (Otonom)\n\nBu sistemi, gözlemlenebilirlik alanında Yürüme Animasyonu Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yürüme Animasyonu Oluşturma akışını otonom yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 417, "no": "417", "cat": "Animasyonlar & Rigging", "name": "Sıfır-Trust Ters Kinematik (IK) Yapısı", "desc": "dağıtım bağlamında Ters Kinematik (IK) için sıfır-trust bir yapısı. Animasyon kontrolünü kolaylaştırmak için IK zincirleri oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["IK", "rigging", "kontrol", "dağıtım", "sıfır-trust", "i̇leri"], "badge1": "İleri", "content": "## Ters Kinematik (IK) Kurulumu\nAnimasyon sürecini kolaylaştırmak için IK zincirleri oluşturun.\n\n1.  **Zincir Seçimi**: IK uygulamak istediğiniz kemik zincirini belirleyin (örn. bacak veya kol).\n2.  **IK Handle Oluşturma**: Zincirin sonuna bir IK handle veya hedef nesne ekleyin.\n3.  **Poles & Kısıtlamalar**: Diz/dirsek yönünü kontrol etmek için pole vektörleri ekleyin ve kemik rotasyon kısıtlamaları ayarlayarak doğal hareket aralığı sağlayın.\n\n## Genişletilmiş Notlar (Sıfır-Trust)\n\n- **Hedef Kitle:** İleri seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Ters Kinematik (IK) senaryoları\n- **Avantajları:** Bu yapısı sayesinde Ters Kinematik (IK) işlemleri daha sıfır-trust hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Ters Kinematik (IK) ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** IK, rigging, kontrol\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-450-final"}}, {"id": 418, "no": "418", "cat": "Animasyonlar & Rigging", "name": "Reaktif Blend Shape Animasyon Optimizasyonu", "desc": "API bağlamında Blend Shape Animasyon için reaktif bir optimizasyonu. Yüz ifadeleri için blend shape animasyonlarını entegre edin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["blend shape", "yüz", "animasyon", "API", "reaktif", "orta"], "badge1": "Orta", "content": "## Blend Shape Uygulaması\nKarakterlerinize yüz ifadeleri ve detaylı deformasyonlar için blend shape (morph target) uygulayın.\n\n1.  **Hedef Şekiller**: Ana modelinize dayanarak farklı yüz ifadelerini temsil eden bir dizi hedef şekil (ör. gülümseme, kaş çatma) oluşturun.\n2.  **Blend Shape Oluşturma**: Bu hedef şekilleri ana modele blend shape olarak bağlayın.\n3.  **Değer Kontrolü**: Oyun motorunuzda veya animasyon yazılımınızda blend shape'lerin ağırlık değerlerini kontrol ederek ifadeler arasında geçiş yapın.\n\n## Uygulama Senaryosu (Reaktif)\n\nBu optimizasyonu, API alanında Blend Shape Animasyon problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Blend Shape Animasyon akışını reaktif yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-450-final"}}, {"id": 419, "no": "419", "cat": "Ortam & Sahne Öğeleri", "name": "Şeffaf Arazi (Terrain) Modelleme Çekirdeği", "desc": "şablon bağlamında Arazi (Terrain) Modelleme için şeffaf bir çekirdeği. Oyun dünyası için detaylı araziler oluşturun ve şekillendirin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["arazi", "çevre", "modelleme", "şablon", "şeffaf", "orta"], "badge1": "Orta", "content": "## Gerçekçi Arazi Modelleme\nOyununuz için detaylı ve inandırıcı araziler oluşturun.\n\n1.  **Yükseklik Haritası**: Bir yükseklik haritası (heightmap) kullanarak arazinin temel şeklini oluşturun veya manuel olarak yükseltme/alçaltma araçlarını kullanın.\n2.  **Doku Katmanları**: Çimen, toprak, kay - **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Işıklandırma ve Gölge ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ışık, gölge, atmosfer\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-450-final"}}, {"id": 422, "no": "422", "cat": "Ortam & Sahne Öğeleri", "name": "Event-Sourced Çarpışma Kutusu (Collider) Standartı", "desc": "mimari bağlamında Çarpışma Kutusu (Collider) için event-sourced bir standartı. Objelere fiziksel etkileşim için çarpışma kutuları ekleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["fizik", "çarpışma", "collider", "mimari", "event-sourced", "başlangıç"], "badge1": "Başlangıç", "content": "## Collider Ayarları\nOyun içi fiziksel etkileşimler için objelere çarpışma kutuları (colliders) tanımlayın.\n\n1.  **Collider Türü**: Objeye uygun bir collider türü seçin (Box, Sphere, Capsule veya Mesh Collider).\n2.  **Boyut ve Konum**: Collider'ın boyutunu ve konumunu objenin geometrisine uyacak şekilde ayarlayın. Özellikle karmaşık objeler için basitleştirilmiş bir form kullanın.\n3.  **Trigger Ayarı**: Collider'ın sadece tetikleyici olarak mı (geçilebilir) yoksa fiziksel bir engel olarak mı davranacağını belirleyin.\n\n## Uygulama Senaryosu (Event-Sourced)\n\nBu standartı, mimari alanında Çarpışma Kutusu (Collider) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çarpışma Kutusu (Collider) akışını event-sourced yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-450-final"}}, {"id": 423, "no": "423", "cat": "Görsel Efektler (VFX)", "name": "Atomic Patlama Efekti Tasarımı Tasarımı", "desc": "arayüz bağlamında Patlama Efekti Tasarımı için atomic bir tasarımı. Dinamik ve görsel olarak etkileyici patlama efektleri oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "patlama", "parçacık", "arayüz", "atomic", "i̇leri"], "badge1": "İleri", "content": "## Dinamik Patlama Efekti\nOyununuz için görsel olarak etkileyici bir patlama efekti tasarlayın ve uygulayın.\n\n1.  **Parçacık Sistemi**: Duman, ateş ve kıvılcım için ayrı parçacık sistemleri oluşturun. Her birine uygun dokular atayın.\n2.  **Yüksek Detay**: Başlangıçta yoğun ve hızlı yayılan parçacıklar, sonra yavaş yavaş azalan duman ve kül efektleri kullanın.\n3.  **Işık ve Ses**: Patlamaya dinamik ışıklandırma ve patlama sesi efektleri ekleyerek etkiyi artırın.\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** İleri seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Patlama Efekti Tasarımı senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Patlama Efekti Tasarımı işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Patlama Efekti Tasarımı ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** VFX, patlama, parçacık\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-450-final"}}, {"id": 424, "no": "424", "cat": "Görsel Efektler (VFX)", "name": "Event-Sourced Parçacık Sistemi Oluşturma Rehberi", "desc": "ölçeklenme bağlamında Parçacık Sistemi Oluşturma için event-sourced bir rehberi. Duman, ateş veya büyü gibi parçacık sistemleri tasarlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "parçacık", "sistem", "ölçeklenme", "event-sourced", "uzman"], "badge1": "Uzman", "content": "## Parçacık Sistemi Tasarımı\nDuman, ateş, su sıçraması gibi dinamik görsel efektler için parçacık sistemleri oluşturun.\n\n1.  **Emitör Ayarları**: Parçacıkların nereden ve nasıl yayılacağını (şekil, hız, yaşam süresi) ayarlayın.\n2.  **Görsel Özellikler**: Parçacıklara uygun dokular (texture), renk geçişleri ve boyut değişimi uygulayın.\n3.  **Fizik ve Etkileşim**: Yerçekimi, rüzgar veya çarpışma gibi fiziksel etkileşimleri etkinleştirerek parçacıkların gerçekçi davranmasını sağlayın.\n\n## Genişletilmiş Notlar (Event-Sourced)\n\n- **Hedef Kitle:** Uzman seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Parçacık Sistemi Oluşturma senaryoları\n- **Avantajları:** Bu rehberi sayesinde Parçacık Sistemi Oluşturma işlemleri daha event-sourced hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde Parçacık Sistemi Oluşturma ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** VFX, parçacık, sistem\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-450-final"}}, {"id": 425, "no": "425", "cat": "Görsel Efektler (VFX)", "name": "Pluggable Post-Process Efektleri Refactor Yöntemi", "desc": "performans bağlamında Post-Process Efektleri için pluggable bir refactor yöntemi. Oyunun son görsel kalitesini artırmak için ekran sonrası efektler uygulayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "post-process", "görsel", "performans", "pluggable", "pro"], "badge1": "Pro", "content": "## Post-Process Efektleri Uygulaması\nOyununuzun görsel atmosferini ve kalitesini artırmak için ekran sonrası (post-process) efektleri uygulayın.\n\n1.  **Profil Oluşturma**: Oyun motorunuzda yeni bir post-process profili oluşturun.\n2.  **Efekt Ekleme**: Bloom, Vignette, Depth of Field, Renk Düzeltme gibi efektleri profile ekleyin.\n3.  **Değer Ayarı**: Her efektin yoğunluğunu ve parametrelerini oyununuzun görsel hedeflerine uygun şekilde ayarlayın. Performans etkisini göz önünde bulundurun.\n\n## Uygulama Senaryosu (Pluggable)\n\nBu refactor yöntemi, performans alanında Post-Process Efektleri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Post-Process Efektleri akışını pluggable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-450-final"}}, {"id": 426, "no": "426", "cat": "Ses & Müzik", "name": "Pluggable Ortam Sesi Entegrasyonu Sistemi", "desc": "güvenlik bağlamında Ortam Sesi Entegrasyonu için pluggable bir sistemi. Oyun dünyasına atmosfer katmak için ortam sesleri ekleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ses", "ortam", "atmosfer", "güvenlik", "pluggable", "başlangıç"], "badge1": "Başlangıç", "content": "## Ortam Sesi Entegrasyonu\nOyun dünyasına derinlik ve gerçekçilik katmak için ortam seslerini entegre edin.\n\n1.  **Ses Seçimi**: Sahnenin atmosferine uygun (orman, şehir, mağara vb.) döngüsel (looping) ortam seslerini seçin.\n2.  **Ses Kaynağı Ekleme**: Oyun motorunuzda bir ses kaynağı (Audio Source) oluşturun ve ses dosyasını atayın.\n3.  **Mesafe ve Hacim**: Sesin yayılma mesafesini (attenuation) ve maksimum hacmini ayarlayarak oyuncunun mesafesine göre sesin değişmesini sağlayın. Döngü modunu etkinleştirin.\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Başlangıç seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Ortam Sesi Entegrasyonu senaryoları\n- **Avantajları:** Bu sistemi sayesinde Ortam Sesi Entegrasyonu işlemleri daha pluggable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Ortam Sesi Entegrasyonu ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ses, ortam, atmosfer\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-450-final"}}, {"id": 427, "no": "427", "cat": "3D Modeller & Karakterler", "name": "Sezgisel Karakter Modeli Optimizasyonu Akışı", "desc": "gözlemlenebilirlik bağlamında Karakter Modeli Optimizasyonu için sezgisel bir akışı. Oyun içi performans için 3D karakter modelleri ligonlu modelleri oyun motoruna aktarırken performans sorunlarını önleyin.\n\n1.  **Format Seçimi**: FBX veya OBJ gibi yaygın formatları tercih edin, materyal ve animasyon desteği için FBX önerilir.\n2.  **Ölçek ve Birimler**: Modeli dışa aktarırken doğru ölçek ve birim ayarlarını kullanın, genellikle metre veya santimetre.\n3.  **Pivot Noktası**: Modelin pivot noktasının merkezde veya istenilen dönüş noktasında olduğundan emin olun.\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu rehberi, caching alanında Yüksek Poligonlu Obje problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yüksek Poligonlu Obje akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 429, "no": "429", "cat": "3D Modeller & Karakterler", "name": "API-First LOD (Level of Düzeneği", "desc": "veri bağlamında LOD (Level of için api-first bir düzeneği. Farklı mesafeler için model detay seviyeleri oluşturarak performansı artırın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["LOD", "performans", "optimizasyon", "veri", "api-first", "orta"], "badge1": "Orta", "content": "## LOD Seti Oluşturma\nPerformansı artırmak için modellerinize LOD (Level of Detail) ekleyin.\n\n1.  **LOD 0 (Full Detay)**: Orijinal yüksek poligonlu modelinizi kullanın.\n2.  **LOD 1, 2, 3**: Modeli kademeli olarak basitleştirin (poligon azaltma, materyal sadeleştirme). Her LOD seviyesi için görünürlük mesafelerini belirleyin.\n3.  **Motor Entegrasyonu**: Oyun  uygulama\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 434, "no": "434", "cat": "Dokular & Materyaller", "name": "Stream Tabanlı Tiling Doku Ayarları Pratiği", "desc": "entegrasyon bağlamında Tiling Doku Ayarları için stream tabanlı bir pratiği. Tekrarlayan dokuların sorunsuz görünmesi için ayarları yapın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["doku", "tiling", "tekrar", "entegrasyon", "stream tabanlı", "başlangıç"], "badge1": "Başlangıç", "content": "## Tiling Dokuların Ayarlanması\nBüyük yüzeylerde dokuların tekrarlanmasını doğal ve görünmez hale getirin.\n\n1.  **Doku Hazırlığı**: Dokunuzun kenarlarının sorunsuz bir şekilde birleştiğinden (seamless) emin olun.\n2.  **UV Ayarları**: Modelinizin UV haritasında dokunun tiling (tekrarlama) değerlerini ayarlayın. Genellikle UV koordinatlarını büyütmek veya küçültmekle yapılır.\n3.  **Offset & Rotation**: Gerekirse dokunun başlangıç noktasını kaydırın (offset) veya döndürerek tekrarlama desenini kırın.\n\n## Genişletilmiş Notlar (Stream Tabanlı)\n\n- **Hedef Kitle:** Başlangıç seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Tiling Doku Ayarları senaryoları\n- **Avantajları:** Bu pratiği sayesinde Tiling Doku Ayarları işlemleri daha stream tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Tiling Doku Ayarları ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** doku, tiling, tekrar\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 435, "no": "435", "cat": "Animasyonlar & Rigging", "name": "Zero-Config İskelet Sistemi Kurulumu Kalıbı", "desc": "gözlemlenebilirlik bağlamında İskelet Sistemi Kurulumu için zero-config bir kalıbı. Karakterlere veya objelere temel bir iskelet sistemi ekleyin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["rigging", "iskelet", "animasyon", "gözlemlenebilirlik", "zero-config", "pro"], "badge1": "Pro", "content": "## Temel İskelet Sistemi Kurulumu\nKarakterinizi veya objenizi hareket ettirmek için temel bir iskelet (rig) oluşturun.\n\n1.  **Kemik Ekleme**: Modelin ana eklem noktalarına (kalça, diz, omuz vb.) kemikler ekleyin.\n2.  **Hiyerarşi Oluşturma**: Kemikler arasında doğru üst-alt ilişkilerini kurarak hiyerarşik bir yapı oluşturun.\n3.  **Skinning/Weight Painting**: Kemiklerin modelin hangi bölgelerini etkileyeceğini belirlemek için ağırlık boyama yapın, deformasyonları düzeltin.\n\n## Uygulama Senaryosu (Zero-Config)\n\nBu kalıbı, gözlemlenebilirlik alanında İskelet Sistemi Kurulumu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İskelet Sistemi Kurulumu akışını zero-config yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 436, "no": "436", "cat": "Animasyonlar & Rigging", "name": "Federe Yürüme Animasyonu Oluşturma Kılavuzu", "desc": "gözlemlenebilirlik bağlamında Yürüme Animasyonu Oluşturma için federe bir kılavuzu. Karakterler için döngüsel bir yürüme animasyonu oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["animasyon", "yürüme", "döngü", "gözlemlenebilirlik", "federe", "başlangıç"], "badge1": "Başlangıç", "content": "## Döngüsel Yürüme Animasyonu\nKarakteriniz için doğal ve döngüsel bir yürüme animasyonu tasarlayın.\n\n1.  **Anahtar Pozlar**: Yürüme döngüsünün kritik pozlarını (ayak basma, ayak kaldırma, ileri adım) belirleyin ve anahtar kareler oluşturun.\n2.  **Döngü Entegrasyonu**: Animasyonun başlangıç ve bitiş karelerinin sorunsuz bir şekilde birleştiğinden emin olun.\n3.  **Hız ve Ağırlık**: Animasyon eğrilerini ayarlayarak yürümenin hızı ve karakterin ağırlık transferini gerçekçi hale getirin.\n\n## Uygulama Senaryosu (Federe)\n\nBu kılavuzu, gözlemlenebilirlik alanında Yürüme Animasyonu Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yürüme Animasyonu Oluşturma akışını federe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 437, "no": "437", "cat": "Animasyonlar & Rigging", "name": "Headless Ters Kinematik (IK) Düzeni", "desc": "CI/CD bağlamında Ters Kinematik (IK) için headless bir düzeni. Animasyon kontrolünü kolaylaştırmak için IK zincirleri oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["IK", "rigging", "kontrol", "CI/CD", "headless", "orta"], "badge1": "Orta", "content": "## Ters Kinematik (IK) Kurulumu\nAnimasyon sürecini kolaylaştırmak için IK zincirleri oluşturun.\n\n1.  **Zincir Seçimi**: IK uygulamak istediğiniz kemik zincirini belirleyin (örn. bacak veya kol).\n2.  **IK Handle Oluşturma**: Zincirin sonuna bir IK handle veya hedef nesne ekleyin.\n3.  **Poles & Kısıtlamalar**: Diz/dirsek yönünü kontrol etmek için pole vektörleri ekleyin ve kemik rotasyon kısıtlamaları ayarlayarak doğal hareket aralığı sağlayın.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Orta seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Ters Kinematik (IK) senaryoları\n- **Avantajları:** Bu düzeni sayesinde Ters Kinematik (IK) işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Ters Kinematik (IK) ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** IK, rigging, kontrol\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-450-final"}}, {"id": 438, "no": "438", "cat": "Animasyonlar & Rigging", "name": "Observable Blend Shape Animasyon Çerçevesi", "desc": "güvenlik bağlamında Blend Shape Animasyon için observable bir çerçevesi. Yüz ifadeleri için blend shape animasyonlarını entegre edin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["blend shape", "yüz", "animasyon", "güvenlik", "observable", "i̇leri"], "badge1": "İleri", "content": "## Blend Shape Uygulaması\nKarakterlerinize yüz ifadeleri ve detaylı deformasyonlar için blend shape (morph target) uygulayın.\n\n1.  **Hedef Şekiller**: Ana modelinize dayanarak farklı yüz ifadelerini temsil eden bir dizi hedef şekil (ör. gülümseme, kaş çatma) oluşturun.\n2.  **Blend Shape Oluşturma**: Bu hedef şekilleri ana modele blend shape olarak bağlayın.\n3.  **Değer Kontrolü**: Oyun motorunuzda veya animasyon yazılımınızda blend shape'lerin ağırlık değerlerini kontrol ederek ifadeler arasında geçiş yapın.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** İleri seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Blend Shape Animasyon senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Blend Shape Animasyon işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Blend Shape Animasyon ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** blend shape, yüz, animasyon\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-450-final"}}, {"id": 439, "no": "439", "cat": "Ortam & Sahne Öğeleri", "name": "Composable Arazi (Terrain) Modelleme Doktrini", "desc": "yapay zeka bağlamında Arazi (Terrain) Modelleme için composable bir doktrini. Oyun dünyası için detaylı araziler oluşturun ve şekillendirin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["arazi", "çevre", "modelleme", "yapay zeka", "composable", "orta"], "badge1": "Orta", "content": "## Gerçekçi Arazi Modelleme\nOyununuz için detaylı ve inandırıcı araziler oluşturun.\n\n1.  **Yükseklik Haritası**: Bir yükseklik haritası (heightmap) kullanarak arazinin temel şeklini oluşturun veya manuel olarak yükseltme/alçaltma araçlarını kullanın.\n2.  **Doku Katmanları**: Çimen, toprak, kaya gibi farklı doku katmanları ekleyin ve fırçalarla boyayarak doğal geçişler sağlayın.\n3.  **Detay Ekleme**: Ağaçlar, kayalar, çalılar gibi detay objeleri yerleştirerek araziye gerçekçilik katın.\n\n## Genişletilmiş Notlar (Composable)\n\n- **Hedef Kitle:** Orta seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Arazi (Terrain) Modelleme senaryoları\n- **Avantajları:** Bu doktrini sayesinde Arazi (Terrain) Modelleme işlemleri daha composable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Arazi (Terrain) Modelleme ihtiyacını analiz edin.\n  2. Bu doktrini'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** arazi, çevre, modelleme\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-450-final"}}, {"id": 440, "no": "440", "cat": "Ortam & Sahne Öğeleri", "name": "Sıfır-Trust Bitki Örtüsü Yerleşimi Düzeneği", "desc": "gözlemlenebilirlik bağlamında Bitki Örtüsü Yerleşimi için sıfır-trust bir düzeneği. Oyun ortamına doğal görünümlü bitki örtüsü ekleyin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["bitki", "çevre", "detay", "gözlemlenebilirlik", "sıfır-trust", "i̇leri"], "badge1": "İleri", "content": "## Doğal Bitki Örtüsü Yerleşimi\nOyun seviyenizi zenginleştirmek için bitki örtüsü (ağaçlar, çalılar, çimenler) yerleştirin.\n\n1.  **Asset Seçimi**: Ortamınıza uygun, optimize edilmiş bitki assetlerini seçin.\n2.  **Yoğunluk Ayarı**: Bitki yerleştirme fırçasının yoğunluğunu ve boyutunu ayarlayarak doğal dağılımlar elde edin.\n3.  **Rüzgar Efektleri**: Bitki örtüsüne rüzgar efektleri ekleyerek dinamik ve canlı bir görünüm kazandırın.\n\n## Genişletilmiş Notlar (Sıfır-Trust)\n\n- **Hedef Kitle:** İleri seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Bitki Örtüsü Yerleşimi senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Bitki Örtüsü Yerleşimi işlemleri daha sıfır-trust hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Bitki Örtüsü Yerleşimi ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** bitki, çevre, detay\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-450-final"}}, {"id": 441, "no": "441", "cat": "Ortam & Sahne Öğeleri", "name": "Olay-Güdümlü Işıklandırma ve Gölge Metodu", "desc": "ölçeklenme bağlamında Işıklandırma ve Gölge için olay-güdümlü bir metodu. Sahnenin atmosferini belirlemek için ışık ve gölgeleri ayarlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ışık", "gölge", "atmosfer", "ölçeklenme", "olay-güdümlü", "başlangıç"], "badge1": "Başlangıç", "content": "## Sahne Işıklandırma Prensipleri\nOyun sahnenizin atmosferini ve görsel kalitesini artırmak için ışıklandırmayı ayarlayın.\n\n1.  **Ana Işık (Key Light)**: Sahnedeki ana ışık kaynağını belirleyin (örn. güneş). Yönünü ve yoğunluğunu ayarlayın.\n2.  **Dolgu Işık (Fill Light)**: Ana ışığın yarattığı sert gölgeleri yumuşatmak için daha az yoğun bir dolgu ışığı kullanın.\n3.  **Arka Işık (Rim Light)**: Objeleri arka plandan ayırmak için bir arka ışık ekleyin. Gölge kalitesini ve çözünürlüğünü ayarlayarak performansı dengeleyin.\n\n## Uygulama Senaryosu (Olay-Güdümlü)\n\nBu metodu, ölçeklenme alanında Işıklandırma ve Gölge problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Işıklandırma ve Gölge akışını olay-güdümlü yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-450-final"}}, {"id": 442, "no": "442", "cat": "Ortam & Sahne Öğeleri", "name": "Serverless Çarpışma Kutusu (Collider) Mimari Yaklaşımı", "desc": "mimari bağlamında Çarpışma Kutusu (Collider) için serverless bir mimari yaklaşımı. Objelere fiziksel etkileşim için çarpışma kutuları ekleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["fizik", "çarpışma", "collider", "mimari", "serverless", "orta"], "badge1": "Orta", "content": "## Collider Ayarları\nOyun içi fiziksel etkileşimler için objelere çarpışma kutuları (colliders) tanımlayın.\n\n1.  **Collider Türü**: Objeye uygun bir collider türü seçin (Box, Sphere, Capsule veya Mesh Collider).\n2.  **Boyut ve Konum**: Collider'ın boyutunu ve konumunu objenin geometrisine uyacak şekilde ayarlayın. Özellikle karmaşık objeler için basitleştirilmiş bir form kullanın.\n3.  **Trigger Ayarı**: Collider'ın sadece tetikleyici olarak mı (geçilebilir) yoksa fiziksel bir engel olarak mı davranacağını belirleyin.\n\n## Genişletilmiş Notlar (Serverless)\n\n- **Hedef Kitle:** Orta seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Çarpışma Kutusu (Collider) senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Çarpışma Kutusu (Collider) işlemleri daha serverless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde Çarpışma Kutusu (Collider) ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** fizik, çarpışma, collider\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-450-final"}}, {"id": 443, "no": "443", "cat": "Görsel Efektler (VFX)", "name": "Resilient Patlama Efekti Tasarımı Rehberi", "desc": "dağıtım bağlamında Patlama Efekti Tasarımı için resilient bir rehberi. Dinamik ve görsel olarak etkileyici patlama efektleri oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "patlama", "parçacık", "dağıtım", "resilient", "başlangıç"], "badge1": "Başlangıç", "content": "## Dinamik Patlama Efekti\nOyununuz için görsel olarak etkileyici bir patlama efekti tasarlayın ve uygulayın.\n\n1.  **Parçacık Sistemi**: Duman, ateş ve kıvılcım için ayrı parçacık sistemleri oluşturun. Her birine uygun dokular atayın.\n2.  **Yüksek Detay**: Başlangıçta yoğun ve hızlı yayılan parçacıklar, sonra yavaş yavaş azalan duman ve kül efektleri kullanın.\n3.  **Işık ve Ses**: Patlamaya dinamik ışıklandırma ve patlama sesi efektleri ekleyerek etkiyi artırın.\n\n## Uygulama Senaryosu (Resilient)\n\nBu rehberi, dağıtım alanında Patlama Efekti Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Patlama Efekti Tasarımı akışını resilient yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-450-final"}}, {"id": 444, "no": "444", "cat": "Görsel Efektler (VFX)", "name": "Mikroservis Parçacık Sistemi Oluşturma Metodu", "desc": "logging bağlamında Parçacık Sistemi Oluşturma için mikroservis bir metodu. Duman, ateş veya büyü gibi parçacık sistemleri tasarlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "parçacık", "sistem", "logging", "mikroservis", "pro"], "badge1": "Pro", "content": "## Parçacık Sistemi Tasarımı\nDuman, ateş, su sıçraması gibi dinamik görsel efektler için parçacık sistemleri oluşturun.\n\n1.  **Emitör Ayarları**: Parçacıkların nereden ve nasıl yayılacağını (şekil, hız, yaşam süresi) ayarlayın.\n2.  **Görsel Özellikler**: Parçacıklara uygun dokular (texture), renk geçişleri ve boyut değişimi uygulayın.\n3.  **Fizik ve Etkileşim**: Yerçekimi, rüzgar veya çarpışma gibi fiziksel etkileşimleri etkinleştirerek parçacıkların gerçekçi davranmasını sağlayın.\n\n## Genişletilmiş Notlar (Mikroservis)\n\n- **Hedef Kitle:** Pro seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Parçacık Sistemi Oluşturma senaryoları\n- **Avantajları:** Bu metodu sayesinde Parçacık Sistemi Oluşturma işlemleri daha mikroservis hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Parçacık Sistemi Oluşturma ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** VFX, parçacık, sistem\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-450-final"}}, {"id": 445, "no": "445", "cat": "Görsel Efektler (VFX)", "name": "Multi-Tenant Post-Process Efektleri Metodu", "desc": "şablon bağlamında Post-Process Efektleri için multi-tenant bir metodu. Oyunun son görsel kalitesini artırmak için ekran sonrası efektler uygulayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["VFX", "post-process", "görsel", "şablon", "multi-tenant", "i̇leri"], "badge1": "İleri", "content": "## Post-Process Efektleri Uygulaması\nOyununuzun görsel atmosferini ve kalitesini artırmak için ekran sonrası (post-process) efektleri uygulayın.\n\n1.  **Profil Oluşturma**: Oyun motorunuzda yeni bir post-process profili oluşturun.\n2.  **Efekt Ekleme**: Bloom, Vignette, Depth of Field, Renk Düzeltme gibi efektleri profile ekleyin.\n3.  **Değer Ayarı**: Her efektin yoğunluğunu ve parametrelerini oyununuzun görsel hedeflerine uygun şekilde ayarlayın. Performans etkisini göz önünde bulundurun.\n\n## Uygulama Senaryosu (Multi-Tenant)\n\nBu metodu, şablon alanında Post-Process Efektleri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Post-Process Efektleri akışını multi-tenant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "sour // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'assetvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
