<style>
:root{
  --bg:#06080e;--bg2:#0a0c12;--bg3:#0e1016;--bg4:#12141a;
  --border:#16181e;--border2:#1e2026;--border3:#2a2c32;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#4a9eff;--primary2:#4a9eff;
  --primary-dim:#4a9eff15;--primary-glow:#4a9eff30;
  --accent:#a78bfa;--accent2:#a78bfa;
  --accent-dim:#a78bfa18;--accent-glow:#a78bfa30;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#4a9eff08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#a78bfa06 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a0c12 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#4a9eff0a 0%,#4a9eff03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #4a9eff30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#4a9eff03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#4a9eff06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#2c80e1);color:#06080e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #4a9eff20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #4a9eff35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a0c12,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#2c80e1);color:#06080e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #4a9eff20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #4a9eff35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">D</div>
  <div class="hero-eyebrow">Yazılım Mimarisi & DevOps · Alet Çantası</div>
  <h1 class="hero-title">Db<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">SQL ve NoSQL veritabanı şema tasarımı, ilişki haritaları ve sorgu optimizasyonu.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>15</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Db ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">15</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

const ITEMS = [{"id": 1, "no": "001", "cat": "SQL Şablonları", "name": "Window Functions Şablonları", "desc": "ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri.", "tags": ["window", "ROW_NUMBER", "analitik"], "badge1": "Orta", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```", "source": {"generated": true}}, {"id": 2, "no": "002", "cat": "SQL Şablonları", "name": "CTE ile Hiyerarşik Sorgular", "desc": "Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama.", "tags": ["CTE", "hiyerarşi", "recursive"], "badge1": "İleri", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```", "source": {"generated": true}}, {"id": 3, "no": "003", "cat": "SQL Şablonları", "name": "UPSERT Şablonları", "desc": "PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları.", "tags": ["upsert", "conflict", "insert"], "badge1": "Orta", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```", "source": {"generated": true}}, {"id": 4, "no": "004", "cat": "İndeks & Performans", "name": "İndeks Türleri ve Seçimi", "desc": "B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi.", "tags": ["indeks", "B-tree", "GIN"], "badge1": "Orta", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```", "source": {"generated": true}}, {"id": 5, "no": "005", "cat": "İndeks & Performans", "name": "EXPLAIN ANALYZE Okuma", "desc": "PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın.", "tags": ["EXPLAIN", "query plan", "optimizasyon"], "badge1": "Orta", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.", "source": {"generated": true}}, {"id": 6, "no": "006", "cat": "Veri Modelleme", "name": "Soft Delete Tasarımı", "desc": "Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı.", "tags": ["soft delete", "arşiv", "deleted_at"], "badge1": "Başlangıç", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```", "source": {"generated": true}}, {"id": 7, "no": "007", "cat": "Veri Modelleme", "name": "Event Sourcing Schema", "desc": "Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı.", "tags": ["event sourcing", "append-only", "projeksiyon"], "badge1": "İleri", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```", "source": {"generated": true}}, {"id": 8, "no": "008", "cat": "NoSQL Kalıpları", "name": "MongoDB Aggregation Pipeline", "desc": "MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın.", "tags": ["MongoDB", "aggregation", "pipeline"], "badge1": "Orta", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```", "source": {"generated": true}}, {"id": 9, "no": "009", "cat": "NoSQL Kalıpları", "name": "Redis Veri Yapıları Şablonları", "desc": "String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları.", "tags": ["Redis", "hash", "sorted set"], "badge1": "Orta", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```", "source": {"generated": true}}, {"id": 10, "no": "010", "cat": "Migration & Yedek", "name": "Alembic Migration Şablonu", "desc": "SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin.", "tags": ["Alembic", "migration", "SQLAlchemy"], "badge1": "Orta", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`", "source": {"generated": true}}, {"id": 11, "no": "011", "cat": "Migration & Yedek", "name": "Zero-Downtime Migration", "desc": "Büyük tablolarda sütun ekleme/silme için kesintisiz migration stratejisi.", "tags": ["zero-downtime", "migration", "büyük tablo"], "badge1": "İleri", "content": "## Zero-Downtime Strateji\nSütun ekleme (güvenli):\n1. Nullable sütun ekle — tablo kilidi yok.\n2. Arka planda eski satırları doldur (batch).\n3. NOT NULL constraint ekle (default ile).\n4. Uygulama yeni sütunu kullanmaya başlar.\n\nSütun silme:\n1. Uygulama sütunu okumayı bırakır.\n2. Sütunu kaldır.\n\nKısıtlama: PostgreSQL'de `ADD COLUMN ... DEFAULT` büyük tabloda lock alır → nullable ekle, sonra default.", "source": {"generated": true}}, {"id": 12, "no": "012", "cat": "ORM & Query Builder", "name": "SQLAlchemy 2.0 Şablonları", "desc": "SQLAlchemy 2.0 select(), join() ve async session kullanım örnekleri.", "tags": ["SQLAlchemy", "ORM", "async"], "badge1": "Orta", "content": "## SQLAlchemy 2.0\n```python\nfrom sqlalchemy import select, func\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\nasync def get_user_orders(session: AsyncSession, user_id: int):\n    stmt = (\n        select(User, func.count(Order.id).label('order_count'))\n        .join(Order, User.id == Order.user_id, isouter=True)\n        .where(User.id == user_id)\n        .group_by(User.id)\n    )\n    result = await session.execute(stmt)\n    return result.first()\n```", "source": {"generated": true}}, {"id": 13, "no": "013", "cat": "SQL Şablonları", "name": "JSON/JSONB Sorguları", "desc": "PostgreSQL JSONB operatörleri ile esnek yapılandırılmamış veri sorgulama.", "tags": ["JSONB", "JSON", "PostgreSQL"], "badge1": "Orta", "content": "## JSONB Operatörleri\n```sql\n-- Alan erişimi\nSELECT data->>'name', data->'address'->>'city'\nFROM users;\n\n-- Filtre\nSELECT * FROM users\nWHERE data @> '{\"role\": \"admin\"}'::jsonb;\n\n-- Array içinde arama\nSELECT * FROM products\nWHERE tags ? 'electronics';\n\n-- İndeks\nCREATE INDEX idx_user_data ON users USING GIN(data jsonb_path_ops);\n\n-- jsonb_set ile güncelle\nUPDATE users\nSET data = jsonb_set(data, '{address,city}', '\"Ankara\"');\n```", "source": {"generated": true}}, {"id": 14, "no": "014", "cat": "İndeks & Performans", "name": "Bağlantı Havuzu Yönetimi", "desc": "PgBouncer ve SQLAlchemy connection pool ile verimli bağlantı yönetimi.", "tags": ["connection pool", "PgBouncer", "bağlantı"], "badge1": "Orta", "content": "## Connection Pool\n```python\nfrom sqlalchemy.ext.asyncio import create_async_engine\n\nengine = create_async_engine(\n    DATABASE_URL,\n    pool_size=20,          # Min bağlantı\n    max_overflow=10,       # Ek bağlantı\n    pool_timeout=30,       # Bağlantı bekleme süresi\n    pool_recycle=1800,     # Bağlantı yenileme (sn)\n    pool_pre_ping=True,    # Ölü bağlantı tespiti\n)\n```\nPgBouncer: transaction mode → çok daha az bağlantı.", "source": {"generated": true}}, {"id": 15, "no": "015", "cat": "Veri Modelleme", "name": "Çok Kiracılı (Multi-Tenant) Schema", "desc": "Tenant izolasyonu için schema-per-tenant ve tenant_id sütun stratejileri.", "tags": ["multi-tenant", "izolasyon", "schema"], "badge1": "İleri", "content": "## Multi-Tenant Stratejiler\n**Strateji 1 — Ayrı DB:** Tam izolasyon, yüksek maliyet.\n**Strateji 2 — Schema per tenant:**\n```sql\nCREATE SCHEMA tenant_acme;\nCREATE TABLE tenant_acme.orders (id SERIAL, ...);\n```\n**Strateji 3 — Shared table + RLS:**\n```sql\nALTER TABLE orders ENABLE ROW LEVEL SECURITY;\nCREATE POLICY tenant_isolation ON orders\n  USING (tenant_id = current_setting('app.tenant_id')::int);\nSET app.tenant_id = 42;\n```", "source": {"generated": true}}, {"id": 17, "no": "017", "cat": "SQL Şablonları", "name": "Stratejik Window Functions Senaryosu", "desc": "Yazılım bağlamında window functions için stratejik bir senaryosu. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "yazılım", "stratejik", "orta"], "badge1": "Orta", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Genişletilmiş Notlar (Stratejik)\n\n- **Hedef Kitle:** Orta seviye yazılım kullanıcıları\n- **Uygulama Alanı:** Yazılım ekosisteminde window functions senaryoları\n- **Avantajları:** Bu senaryosu sayesinde window functions işlemleri daha stratejik hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yazılım mimarinizde window functions ihtiyacını analiz edin.\n  2. Bu senaryosu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** window, ROW_NUMBER, analitik", "source": {"generated": true, "variant_of": 1}}, {"id": 18, "no": "018", "cat": "SQL Şablonları", "name": "Makro Window Functions Pipeline'ı", "desc": "NoSQL bağlamında window functions için makro bir pipeline'ı. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "nosql", "makro", "i̇leri"], "badge1": "İleri", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RAN ut, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** window, ROW_NUMBER, analitik", "source": {"generated": true, "variant_of": 1}}, {"id": 27, "no": "027", "cat": "SQL Şablonları", "name": "Reaktif CTE ile Kompozisyonu", "desc": "optimizasyonu. bağlamında cte ile için reaktif bir kompozisyonu. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "optimizasyonu.", "reaktif", "orta"], "badge1": "Orta", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Orta seviye optimizasyonu. kullanıcıları\n- **Uygulama Alanı:** optimizasyonu. ekosisteminde cte ile senaryoları\n- **Avantajları:** Bu kompozisyonu sayesinde cte ile işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut optimizasyonu. mimarinizde cte ile ihtiyacını analiz edin.\n  2. Bu kompozisyonu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmış ```\n\n## Genişletilmiş Notlar (Event-Sourced)\n\n- **Hedef Kitle:** Pro seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Window Functions Şablonları senaryoları\n- **Avantajları:** Bu doktrini sayesinde Window Functions Şablonları işlemleri daha event-sourced hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Window Functions Şablonları ihtiyacını analiz edin.\n  2. Bu doktrini'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** window, ROW_NUMBER, analitik\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 182, "no": "182", "cat": "SQL Şablonları", "name": "Senkron CTE ile Hiyerarşik Akışı", "desc": "CI/CD bağlamında CTE ile Hiyerarşik için senkron bir akışı. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "CI/CD", "senkron", "i̇leri"], "badge1": "İleri", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Uygulama Senaryosu (Senkron)\n\nBu akışı, CI/CD alanında CTE ile Hiyerarşik problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** CTE ile Hiyerarşik akışını senkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 183, "no": "183", "cat": "SQL Şablonları", "name": "DevOps-Ready UPSERT Şablonları Tasarımı", "desc": "monitoring bağlamında UPSERT Şablonları için devops-ready bir tasarımı. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "monitoring", "devops-ready", "pro"], "badge1": "Pro", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Genişletilmiş Notlar (DevOps-Ready)\n\n- **Hedef Kitle:** Pro seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde UPSERT Şablonları senaryoları\n- **Avantajları:** Bu tasarımı sayesinde UPSERT Şablonları işlemleri daha devops-ready hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde UPSERT Şablonları ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** upsert, conflict, insert\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 184, "no": "184", "cat": "İndeks & Performans", "name": "Pipeline İndeks Türleri ve Düzeneği", "desc": "caching bağlamında İndeks Türleri ve için pipeline bir düzeneği. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "caching", "pipeline", "pro"], "badge1": "Pro", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Uygulama Senaryosu (Pipeline)\n\nBu düzeneği, caching alanında İndeks Türleri ve problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İndeks Türleri ve akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 185, "no": "185", "cat": "İndeks & Performans", "name": "Idempotent EXPLAIN ANALYZE Okuma Akışı", "desc": "mimari bağlamında EXPLAIN ANALYZE Okuma için idempotent bir akışı. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "mimari", "idempotent", "uzman"], "badge1": "Uzman", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Uygulama Senaryosu (Idempotent)\n\nBu akışı, mimari alanında EXPLAIN ANALYZE Okuma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** EXPLAIN ANALYZE Okuma akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 186, "no": "186", "cat": "Veri Modelleme", "name": "Kanıt-Tabanlı Soft Delete Tasarımı Sistemi", "desc": "logging bağlamında Soft Delete Tasarımı için kanıt-tabanlı bir sistemi. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "logging", "kanıt-tabanlı", "orta"], "badge1": "Orta", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Genişletilmiş Notlar (Kanıt-Tabanlı)\n\n- **Hedef Kitle:** Orta seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Soft Delete Tasarımı senaryoları\n- **Avantajları:** Bu sistemi sayesinde Soft Delete Tasarımı işlemleri daha kanıt-tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Soft Delete Tasarımı ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** soft delete, arşiv, deleted_at\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 187, "no": "187", "cat": "Veri Modelleme", "name": "Pluggable Event Sourcing Schema Çerçevesi", "desc": "entegrasyon bağlamında Event Sourcing Schema için pluggable bir çerçevesi. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "entegrasyon", "pluggable", "orta"], "badge1": "Orta", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Orta seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Event Sourcing Schema senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Event Sourcing Schema işlemleri daha pluggable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Event Sourcing Schema ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** event sourcing, append-only, projeksiyon\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 188, "no": "188", "cat": "NoSQL Kalıpları", "name": "Dağıtık MongoDB Aggregation Pipeline Anlaşması", "desc": "veri bağlamında MongoDB Aggregation Pipeline için dağıtık bir anlaşması. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "veri", "dağıtık", "i̇leri"], "badge1": "İleri", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu anlaşması, veri alanında MongoDB Aggregation Pipeline problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** MongoDB Aggregation Pipeline akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 189, "no": "189", "cat": "NoSQL Kalıpları", "name": "Performant Redis Veri Yapıları Kuralı", "desc": "API bağlamında Redis Veri Yapıları için performant bir kuralı. String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["Redis", "hash", "sorted set", "API", "performant", "uzman"], "badge1": "Uzman", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```\n\n## Uygulama Senaryosu (Performant)\n\nBu kuralı, API alanında Redis Veri Yapıları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Redis Veri Yapıları akışını performant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 190, "no": "190", "cat": "Migration & Yedek", "name": "Reactive Alembic Migration Şablonu Yönergesi", "desc": "CI/CD bağlamında Alembic Migration Şablonu için reactive bir yönergesi. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "CI/CD", "reactive", "uzman"], "badge1": "Uzman", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Genişletilmiş Notlar (Reactive)\n\n- **Hedef Kitle:** Uzman seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Alembic Migration Şablonu senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Alembic Migration Şablonu işlemleri daha reactive hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Alembic Migration Şablonu ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Alembic, migration, SQLAlchemy\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 191, "no": "191", "cat": "Migration & Yedek", "name": "Pluggable Zero-Downtime Migration Akışı", "desc": "mikroservis bağlamında Zero-Downtime Migration için pluggable bir akışı. Büyük tablolarda sütun ekleme/silme için kesintisiz migration stratejisi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["zero-downtime", "migration", "büyük tablo", "mikroservis", "pluggable", "pro"], "badge1": "Pro", "content": "## Zero-Downtime Strateji\nSütun ekleme (güvenli):\n1. Nullable sütun ekle — tablo kilidi yok.\n2. Arka planda eski satırları doldur (batch).\n3. NOT NULL constraint ekle (default ile).\n4. Uygulama yeni sütunu kullanmaya başlar.\n\nSütun silme:\n1. Uygulama sütunu okumayı bırakır.\n2. Sütunu kaldır.\n\nKısıtlama: PostgreSQL'de `ADD COLUMN ... DEFAULT` büyük tabloda lock alır → nullable ekle, sonra default.\n\n## Uygulama Senaryosu (Pluggable)\n\nBu akışı, mikroservis alanında Zero-Downtime Migration problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zero-Downtime Migration akışını pluggable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 192, "no": "192", "cat": "ORM & Query Builder", "name": "Bağlamsal SQLAlchemy 2.0 Şablonları Sistemi", "desc": "mühendislik bağlamında SQLAlchemy 2.0 Şablonları için bağlamsal bir sistemi. SQLAlchemy 2.0 select(), join() ve async session kullanım örnekleri. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["SQLAlchemy", "ORM", "async", "mühendislik", "bağlamsal", "uzman"], "badge1": "Uzman", "content": "## SQLAlchemy 2.0\n```python\nfrom sqlalchemy import select, func\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\nasync def get_user_orders(session: AsyncSession, user_id: int):\n    stmt = (\n        select(User, func.count(Order.id).label('order_count'))\n        .join(Order, User.id == Order.user_id, isouter=True)\n        .where(User.id == user_id)\n        .group_by(User.id)\n    )\n    result = await session.execute(stmt)\n    return result.first()\n```\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Uzman seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde SQLAlchemy 2.0 Şablonları senaryoları\n- **Avantajları:** Bu sistemi sayesinde SQLAlchemy 2.0 Şablonları işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde SQLAlchemy 2.0 Şablonları ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** SQLAlchemy, ORM, async\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 193, "no": "193", "cat": "SQL Şablonları", "name": "Kanıt-Tabanlı JSON/JSONB Sorguları Çerçevesi", "desc": "veri bağlamında JSON/JSONB Sorguları için kanıt-tabanlı bir çerçevesi. PostgreSQL JSONB operatörleri ile esnek yapılandırılmamış veri sorgulama. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["JSONB", "JSON", "PostgreSQL", "veri", "kanıt-tabanlı", "pro"], "badge1": "Pro", "content": "## JSONB Operatörleri\n```sql\n-- Alan erişimi\nSELECT data->>'name', data->'address'->>'city'\nFROM users;\n\n-- Filtre\nSELECT * FROM users\nWHERE data @> '{\"role\": \"admin\"}'::jsonb;\n\n-- Array içinde arama\nSELECT * FROM products\nWHERE tags ? 'electronics';\n\n-- İndeks\nCREATE INDEX idx_user_data ON users USING GIN(data jsonb_path_ops);\n\n-- jsonb_set ile güncelle\nUPDATE users\nSET data = jsonb_set(data, '{address,city}', '\"Ankara\"');\n```\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu çerçevesi, veri alanında JSON/JSONB Sorguları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** JSON/JSONB Sorguları akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 194, "no": "194", "cat": "İndeks & Performans",
