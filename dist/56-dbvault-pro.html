", "name": "Container-Native Window Functions Şablonları Kılavuzu", "desc": "logging bağlamında Window Functions Şablonları için container-native bir kılavuzu. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "logging", "container-native", "i̇leri"], "badge1": "İleri", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Uygulama Senaryosu (Container-Native)\n\nBu kılavuzu, logging alanında Window Functions Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Window Functions Şablonları akışını container-native yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 212, "no": "212", "cat": "SQL Şablonları", "name": "Atomic CTE ile Hiyerarşik Pratiği", "desc": "caching bağlamında CTE ile Hiyerarşik için atomic bir pratiği. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "caching", "atomic", "orta"], "badge1": "Orta", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Uygulama Senaryosu (Atomic)\n\nBu pratiği, caching alanında CTE ile Hiyerarşik problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** CTE ile Hiyerarşik akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 213, "no": "213", "cat": "SQL Şablonları", "name": "Pluggable UPSERT Şablonları Önerisi", "desc": "arayüz bağlamında UPSERT Şablonları için pluggable bir önerisi. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "arayüz", "pluggable", "başlangıç"], "badge1": "Başlangıç", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Başlangıç seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde UPSERT Şablonları senaryoları\n- **Avantajları:** Bu önerisi sayesinde UPSERT Şablonları işlemleri daha pluggable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde UPSERT Şablonları ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** upsert, conflict, insert\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 214, "no": "214", "cat": "İndeks & Performans", "name": "Observable İndeks Türleri ve Rehberi", "desc": "CI/CD bağlamında İndeks Türleri ve için observable bir rehberi. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "CI/CD", "observable", "pro"], "badge1": "Pro", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Pro seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde İndeks Türleri ve senaryoları\n- **Avantajları:** Bu rehberi sayesinde İndeks Türleri ve işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde İndeks Türleri ve ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** indeks, B-tree, GIN\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 215, "no": "215", "cat": "İndeks & Performans", "name": "Type-Safe EXPLAIN ANALYZE Okuma Çerçevesi", "desc": "ölçeklenme bağlamında EXPLAIN ANALYZE Okuma için type-safe bir çerçevesi. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "ölçeklenme", "type-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Genişletilmiş Notlar (Type-Safe)\n\n- **Hedef Kitle:** Başlangıç seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde EXPLAIN ANALYZE Okuma senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde EXPLAIN ANALYZE Okuma işlemleri daha type-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde EXPLAIN ANALYZE Okuma ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** EXPLAIN, query plan, optimizasyon\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 216, "no": "216", "cat": "Veri Modelleme", "name": "Otonom Soft Delete Tasarımı Önerisi", "desc": "akış bağlamında Soft Delete Tasarımı için otonom bir önerisi. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "akış", "otonom", "orta"], "badge1": "Orta", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Genişletilmiş Notlar (Otonom)\n\n- **Hedef Kitle:** Orta seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Soft Delete Tasarımı senaryoları\n- **Avantajları:** Bu önerisi sayesinde Soft Delete Tasarımı işlemleri daha otonom hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Soft Delete Tasarımı ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** soft delete, arşiv, deleted_at\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 217, "no": "217", "cat": "Veri Modelleme", "name": "Atomic Event Sourcing Schema Optimizasyonu", "desc": "CI/CD bağlamında Event Sourcing Schema için atomic bir optimizasyonu. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "CI/CD", "atomic", "i̇leri"], "badge1": "İleri", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Uygulama Senaryosu (Atomic)\n\nBu optimizasyonu, CI/CD alanında Event Sourcing Schema problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Event Sourcing Schema akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 218, "no": "218", "cat": "NoSQL Kalıpları", "name": "Polyglot MongoDB Aggregation Pipeline Optimizasyonu", "desc": "gözlemlenebilirlik bağlamında MongoDB Aggregation Pipeline için polyglot bir optimizasyonu. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "gözlemlenebilirlik", "polyglot", "orta"], "badge1": "Orta", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** Orta seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde MongoDB Aggregation Pipeline senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde MongoDB Aggregation Pipeline işlemleri daha polyglot hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde MongoDB Aggregation Pipeline ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** MongoDB, aggregation, pipeline\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 219, "no": "219", "cat": "NoSQL Kalıpları", "name": "Composable Redis Veri Yapıları Çekirdeği", "desc": "monitoring bağlamında Redis Veri Yapıları için composable bir çekirdeği. String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["Redis", "hash", "sorted set", "monitoring", "composable", "i̇leri"], "badge1": "İleri", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```\n\n## Uygulama Senaryosu (Composable)\n\nBu çekirdeği, monitoring alanında Redis Veri Yapıları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Redis Veri Yapıları akışını composable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 220, "no": "220", "cat": "Migration & Yedek", "name": "Edge-Optimize Alembic Migration Şablonu Refactor Yöntemi", "desc": "mühendislik bağlamında Alembic Migration Şablonu için edge-optimize bir refactor yöntemi. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "mühendislik", "edge-optimize", "orta"], "badge1": "Orta", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Genişletilmiş Notlar (Edge-Optimize)\n\n- **Hedef Kitle:** Orta seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Alembic Migration Şablonu senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Alembic Migration Şablonu işlemleri daha edge-optimize hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Alembic Migration Şablonu ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Alembic, migration, SQLAlchemy\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 221, "no": "221", "cat": "Migration & Yedek", "name": "Hibrit-Cloud Zero-Downtime Migration Sistemi", "desc": "CI/CD bağlamında Zero-Downtime Migration için hibrit-cloud bir sistemi. Büyük tablolarda sütun ekleme/silme için kesintisiz migration stratejisi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["zero-downtime", "migration", "büyük tablo", "CI/CD", "hibrit-cloud", "pro"], "badge1": "Pro", "content": "## Zero-Downtime Strateji\nSütun ekleme (güvenli):\n1. Nullable sütun ekle — tablo kilidi yok.\n2. Arka planda eski satırları doldur (batch).\n3. NOT NULL constraint ekle (default ile).\n4. Uygulama yeni sütunu kullanmaya başlar.\n\nSütun silme:\n1. Uygulama sütunu okumayı bırakır.\n2. Sütunu kaldır.\n\nKısıtlama: PostgreSQL'de `ADD COLUMN ... DEFAULT` büyük tabloda lock alır → nullable ekle, sonra default.\n\n## Genişletilmiş Notlar (Hibrit-Cloud)\n\n- **Hedef Kitle:** Pro seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Zero-Downtime Migration senaryoları\n- **Avantajları:** Bu sistemi sayesinde Zero-Downtime Migration işlemleri daha hibrit-cloud hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Zero-Downtime Migration ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zero-downtime, migration, büyük tablo\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 222, "no": "222", "cat": "ORM & Query Builder", "name": "Otonom SQLAlchemy 2.0 Şablonları Yapısı", "desc": "API bağlamında SQLAlchemy 2.0 Şablonları için otonom bir yapısı. SQLAlchemy 2.0 select(), join() ve async session kullanım örnekleri. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["SQLAlchemy", "ORM", "async", "API", "otonom", "uzman"], "badge1": "Uzman", "content": "## SQLAlchemy 2.0\n```python\nfrom sqlalchemy import select, func\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\nasync def get_user_orders(session: AsyncSession, user_id: int):\n    stmt = (\n        select(User, func.count(Order.id).label('order_count'))\n        .join(Order, User.id == Order.user_id, isouter=True)\n        .where(User.id == user_id)\n        .group_by(User.id)\n    )\n    result = await session.execute(stmt)\n    return result.first()\n```\n\n## Genişletilmiş Notlar (Otonom)\n\n- **Hedef Kitle:** Uzman seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde SQLAlchemy 2.0 Şablonları senaryoları\n- **Avantajları:** Bu yapısı sayesinde SQLAlchemy 2.0 Şablonları işlemleri daha otonom hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde SQLAlchemy 2.0 Şablonları ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** SQLAlchemy, ORM, async\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 223, "no": "223", "cat": "SQL Şablonları", "name": "Mobile-First JSON/JSONB Sorguları Kılavuzu", "desc": "mikroservis bağlamında JSON/JSONB Sorguları için mobile-first bir kılavuzu. PostgreSQL JSONB operatörleri ile esnek yapılandırılmamış veri sorgulama. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["JSONB", "JSON", "PostgreSQL", "mikroservis", "mobile-first", "orta"], "badge1": "Orta", "content": "## JSONB Operatörleri\n```sql\n-- Alan erişimi\nSELECT data->>'name', data->'address'->>'city'\nFROM users;\n\n-- Filtre\nSELECT * FROM users\nWHERE data @> '{\"role\": \"admin\"}'::jsonb;\n\n-- Array içinde arama\nSELECT * FROM products\nWHERE tags ? 'electronics';\n\n-- İndeks\nCREATE INDEX idx_user_data ON users USING GIN(data jsonb_path_ops);\n\n-- jsonb_set ile güncelle\nUPDATE users\nSET data = jsonb_set(data, '{address,city}', '\"Ankara\"');\n```\n\n## Genişletilmiş Notlar (Mobile-First)\n\n- **Hedef Kitle:** Orta seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde JSON/JSONB Sorguları senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde JSON/JSONB Sorguları işlemleri daha mobile-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde JSON/JSONB Sorguları ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** JSONB, JSON, PostgreSQL\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 224, "no": "224", "cat": "İndeks & Performans", "name": "Reactive Bağlantı Havuzu Yönetimi Metodu", "desc": "caching bağlamında Bağlantı Havuzu Yönetimi için reactive bir metodu. PgBouncer ve SQLAlchemy connection pool ile verimli bağlantı yönetimi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["connection pool", "PgBouncer", "bağlantı", "caching", "reactive", "pro"], "badge1": "Pro", "content": "## Connection Pool\n```python\nfrom sqlalchemy.ext.asyncio import create_async_engine\n\nengine = create_async_engine(\n    DATABASE_URL,\n    pool_size=20,          # Min bağlantı\n    max_overflow=10,       # Ek bağlantı\n    pool_timeout=30,       # Bağlantı bekleme süresi\n    pool_recycle=1800,     # Bağlantı yenileme (sn)\n    pool_pre_ping=True,    # Ölü bağlantı tespiti\n)\n```\nPgBouncer: transaction mode → çok daha az bağlantı.\n\n## Genişletilmiş Notlar (Reactive)\n\n- **Hedef Kitle:** Pro seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Bağlantı Havuzu Yönetimi senaryoları\n- **Avantajları:** Bu metodu sayesinde Bağlantı Havuzu Yönetimi işlemleri daha reactive hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Bağlantı Havuzu Yönetimi ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** connection pool, PgBouncer, bağlantı\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 225, "no": "225", "cat": "Veri Modelleme", "name": "Resilient Çok Kiracılı (Multi-Tenant) Doktrini", "desc": "dağıtım bağlamında Çok Kiracılı (Multi-Tenant) için resilient bir doktrini. Tenant izolasyonu için schema-per-tenant ve tenant_id sütun stratejileri. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["multi-tenant", "izolasyon", "schema", "dağıtım", "resilient", "i̇leri"], "badge1": "İleri", "content": "## Multi-Tenant Stratejiler\n**Strateji 1 — Ayrı DB:** Tam izolasyon, yüksek maliyet.\n**Strateji 2 — Schema per tenant:**\n```sql\nCREATE SCHEMA tenant_acme;\nCREATE TABLE tenant_acme.orders (id SERIAL, ...);\n```\n**Strateji 3 — Shared table + RLS:**\n```sql\nALTER TABLE orders ENABLE ROW LEVEL SECURITY;\nCREATE POLICY tenant_isolation ON orders\n  USING (tenant_id = current_setting('app.tenant_id')::int);\nSET app.tenant_id = 42;\n```\n\n## Uygulama Senaryosu (Resilient)\n\nBu doktrini, dağıtım alanında Çok Kiracılı (Multi-Tenant) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çok Kiracılı (Multi-Tenant) akışını resilient yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 226, "no": "226", "cat": "SQL Şablonları", "name": "AI-Augmented Pratik Yazılım Pattern'i Düzeni", "desc": "API bağlamında Pratik Yazılım Pattern'i için ai-augmented bir düzeni. SQL Şablonları kategorisinde yazılım odaklı pratik bir pattern'i. Orta seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["sql şablonları", "yazılım", "pratik", "API", "ai-augmented", "pro"], "badge1": "Pro", "content": "## Pratik Yazılım Pattern'i\n\nBu öğe, **SQL Şablonları** kategorisinde yazılım konusuna pratik bir yaklaşım sunar.\n\n### Temel Konsept\nYazılım bağlamında window kavramı, modern sql şablonları pratiğinde merkezi bir rol oynar. Pratik yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım maliyeti düşer.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata me topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Uygulama Senaryosu (Federe)\n\nBu kuralı, akış alanında Dayanıklı DbVault Çerçevesi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Dayanıklı DbVault Çerçevesi akışını federe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 241, "no": "241", "cat": "SQL Şablonları", "name": "DevOps-Ready Window Functions Şablonları Kütüphanesi", "desc": "performans bağlamında Window Functions Şablonları için devops-ready bir kütüphanesi. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "performans", "devops-ready", "i̇leri"], "badge1": "İleri", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Genişletilmiş Notlar (DevOps-Ready)\n\n- **Hedef Kitle:** İleri seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Window Functions Şablonları senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Window Functions Şablonları işlemleri daha devops-ready hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Window Functions Şablonları ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** window, ROW_NUMBER, analitik\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 242, "no": "242", "cat": "SQL Şablonları", "name": "Veri-Odaklı CTE ile Hiyerarşik Çerçevesi", "desc": "caching bağlamında CTE ile Hiyerarşik için veri-odaklı bir çerçevesi. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "caching", "veri-odaklı", "başlangıç"], "badge1": "Başlangıç", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Uygulama Senaryosu (Veri-Odaklı)\n\nBu çerçevesi, caching alanında CTE ile Hiyerarşik problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** CTE ile Hiyerarşik akışını veri-odaklı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 243, "no": "243", "cat": "SQL Şablonları", "name": "Headless UPSERT Şablonları Kılavuzu", "desc": "güvenlik bağlamında UPSERT Şablonları için headless bir kılavuzu. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "güvenlik", "headless", "uzman"], "badge1": "Uzman", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Uzman seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde UPSERT Şablonları senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde UPSERT Şablonları işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde UPSERT Şablonları ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** upsert, conflict, insert\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 244, "no": "244", "cat": "İndeks & Performans", "name": "Multi-Tenant İndeks Türleri ve Tasarımı", "desc": "güvenlik bağlamında İndeks Türleri ve için multi-tenant bir tasarımı. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "güvenlik", "multi-tenant", "uzman"], "badge1": "Uzman", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Uygulama Senaryosu (Multi-Tenant)\n\nBu tasarımı, güvenlik alanında İndeks Türleri ve problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İndeks Türleri ve akışını multi-tenant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 245, "no": "245", "cat": "İndeks & Performans", "name": "Dağıtık EXPLAIN ANALYZE Okuma Sistemi", "desc": "mimari bağlamında EXPLAIN ANALYZE Okuma için dağıtık bir sistemi. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "mimari", "dağıtık", "başlangıç"], "badge1": "Başlangıç", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu sistemi, mimari alanında EXPLAIN ANALYZE Okuma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** EXPLAIN ANALYZE Okuma akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 246, "no": "246", "cat": "Veri Modelleme", "name": "Container-Native Soft Delete Tasarımı Metodu", "desc": "gözlemlenebilirlik bağlamında Soft Delete Tasarımı için container-native bir metodu. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "gözlemlenebilirlik", "container-native", "uzman"], "badge1": "Uzman", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Genişletilmiş Notlar (Container-Native)\n\n- **Hedef Kitle:** Uzman seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Soft Delete Tasarımı senaryoları\n- **Avantajları:** Bu metodu sayesinde Soft Delete Tasarımı işlemleri daha container-native hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Soft Delete Tasarımı ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** soft delete, arşiv, deleted_at\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 247, "no": "247", "cat": "Veri Modelleme", "name": "Idempotent Event Sourcing Schema İskeleti", "desc": "mimari bağlamında Event Sourcing Schema için idempotent bir i̇skeleti. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "mimari", "idempotent", "uzman"], "badge1": "Uzman", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Uygulama Senaryosu (Idempotent)\n\nBu i̇skeleti, mimari alanında Event Sourcing Schema problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Event Sourcing Schema akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 248, "no": "248", "cat": "NoSQL Kalıpları", "name": "Layered MongoDB Aggregation Pipeline Rehberi", "desc": "güvenlik bağlamında MongoDB Aggregation Pipeline için layered bir rehberi. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "güvenlik", "layered", "başlangıç"], "badge1": "Başlangıç", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n }}, {"id": 253, "no": "253", "cat": "SQL Şablonları", "name": "Observable JSON/JSONB Sorguları Kalıbı", "desc": "akış bağlamında JSON/JSONB Sorguları için observable bir kalıbı. PostgreSQL JSONB operatörleri ile esnek yapılandırılmamış veri sorgulama. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["JSONB", "JSON", "PostgreSQL", "akış", "observable", "başlangıç"], "badge1": "Başlangıç", "content": "## JSONB Operatörleri\n```sql\n-- Alan erişimi\nSELECT data->>'name', data->'address'->>'city'\nFROM users;\n\n-- Filtre\nSELECT * FROM users\nWHERE data @> '{\"role\": \"admin\"}'::jsonb;\n\n-- Array içinde arama\nSELECT * FROM products\nWHERE tags ? 'electronics';\n\n-- İndeks\nCREATE INDEX idx_user_data ON users USING GIN(data jsonb_path_ops);\n\n-- jsonb_set ile güncelle\nUPDATE users\nSET data = jsonb_set(data, '{address,city}', '\"Ankara\"');\n```\n\n## Uygulama Senaryosu (Observable)\n\nBu kalıbı, akış alanında JSON/JSONB Sorguları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** JSON/JSONB Sorguları akışını observable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 254, "no": "254", "cat": "İndeks & Performans", "name": "Hibrit-Cloud Bağlantı Havuzu Yönetimi İskeleti", "desc": "logging bağlamında Bağlantı Havuzu Yönetimi için hibrit-cloud bir i̇skeleti. PgBouncer ve SQLAlchemy connection pool ile verimli bağlantı yönetimi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["con abilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Dayanıklı DbVault Çerçevesi ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** veri modelleme, dbvault, dayanıklı\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 271, "no": "271", "cat": "SQL Şablonları", "name": "Serverless Window Functions Şablonları Algoritması", "desc": "monitoring bağlamında Window Functions Şablonları için serverless bir algoritması. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "monitoring", "serverless", "orta"], "badge1": "Orta", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Genişletilmiş Notlar (Serverless)\n\n- **Hedef Kitle:** Orta seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Window Functions Şablonları senaryoları\n- **Avantajları:** Bu algoritması sayesinde Window Functions Şablonları işlemleri daha serverless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Window Functions Şablonları ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** window, ROW_NUMBER, analitik\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 272, "no": "272", "cat": "SQL Şablonları", "name": "Kullanıcı-Merkezli CTE ile Hiyerarşik Anlaşması", "desc": "performans bağlamında CTE ile Hiyerarşik için kullanıcı-merkezli bir anlaşması. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "performans", "kullanıcı-merkezli", "orta"], "badge1": "Orta", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu anlaşması, performans alanında CTE ile Hiyerarşik problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** CTE ile Hiyerarşik akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 273, "no": "273", "cat": "SQL Şablonları", "name": "Dağıtık UPSERT Şablonları Sözleşmesi", "desc": "mikroservis bağlamında UPSERT Şablonları için dağıtık bir sözleşmesi. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "mikroservis", "dağıtık", "uzman"], "badge1": "Uzman", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu sözleşmesi, mikroservis alanında UPSERT Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** UPSERT Şablonları akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 274, "no": "274", "cat": "İndeks & Performans", "name": "Pratik İndeks Türleri ve Pratiği", "desc": "arayüz bağlamında İndeks Türleri ve için pratik bir pratiği. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "arayüz", "pratik", "orta"], "badge1": "Orta", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Uygulama Senaryosu (Pratik)\n\nBu pratiği, arayüz alanında İndeks Türleri ve problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İndeks Türleri ve akışını pratik yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 275, "no": "275", "cat": "İndeks & Performans", "name": "Hibrit-Cloud EXPLAIN ANALYZE Okuma Kalıbı", "desc": "test bağlamında EXPLAIN ANALYZE Okuma için hibrit-cloud bir kalıbı. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "test", "hibrit-cloud", "orta"], "badge1": "Orta", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Uygulama Senaryosu (Hibrit-Cloud)\n\nBu kalıbı, test alanında EXPLAIN ANALYZE Okuma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** EXPLAIN ANALYZE Okuma akışını hibrit-cloud yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 276, "no": "276", "cat": "Veri Modelleme", "name": "Type-Safe Soft Delete Tasarımı Kalıbı", "desc": "test bağlamında Soft Delete Tasarımı için type-safe bir kalıbı. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "test", "type-safe", "i̇leri"], "badge1": "İleri", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Uygulama Senaryosu (Type-Safe)\n\nBu kalıbı, test alanında Soft Delete Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Soft Delete Tasarımı akışını type-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 277, "no": "277", "cat": "Veri Modelleme", "name": "Container-Native Event Sourcing Schema Pratiği", "desc": "mimari bağlamında Event Sourcing Schema için container-native bir pratiği. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "mimari", "container-native", "i̇leri"], "badge1": "İleri", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Uygulama Senaryosu (Container-Native)\n\nBu pratiği, mimari alanında Event Sourcing Schema problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Event Sourcing Schema akışını container-native yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 278, "no": "278", "cat": "NoSQL Kalıpları", "name": "Container-Native MongoDB Aggregation Pipeline Algoritması", "desc": "performans bağlamında MongoDB Aggregation Pipeline için container-native bir algoritması. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "performans", "container-native", "pro"], "badge1": "Pro", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```\n\n## Genişletilmiş Notlar (Container-Native)\n\n- **Hedef Kitle:** Pro seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde MongoDB Aggregation Pipeline senaryoları\n- **Avantajları:** Bu algoritması sayesinde MongoDB Aggregation Pipeline işlemleri daha container-native hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde MongoDB Aggregation Pipeline ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** MongoDB, aggregation, pipeline\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 279, "no": "279", "cat": "NoSQL Kalıpları", "name": "Memory-Safe Redis Veri Yapıları Yapısı", "desc": "monitoring bağlamında Redis Veri Yapıları için memory-safe bir yapısı. String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["Redis", "hash", "sorted set", "monitoring", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu yapısı, monitoring alanında Redis Veri Yapıları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Redis Veri Yapıları akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 280, "no": "280", "cat": "Migration & Yedek", "name": "Zero-Config Alembic Migration Şablonu Düzeneği", "desc": "mikroservis bağlamında Alembic Migration Şablonu için zero-config bir düzeneği. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "mikroservis", "zero-config", "başlangıç"], "badge1": "Başlangıç", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** Başlangıç seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Alembic Migration Şablonu senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Alembic Migration Şablonu işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Alembic Migration Şablonu ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Alembic, migration, SQLAlchemy\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 281, "no": "281", "cat": "Migration & Yedek", "name": "Event-Sourced Zero-Downtime Migration Kalıbı", "desc": "dağıtım bağlamında Zero-Downtime Migration için event-sourced bir kalıbı. Büyük tablolarda sütun ekleme/silme için kesintisiz migration stratejisi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["zero-downtime", "migration", "büyük tablo", "dağıtım", "event-sourced", "i̇leri"], "badge1": "İleri", "content": "## Zero-Downtime Strateji\nSütun ekleme (güvenli):\n1. Nullable sütun ekle — tablo kilidi yok.\n2. Arka planda eski satırları doldur (batch).\n3. NOT NULL constraint ekle (default ile).\n4. Uygulama yeni sütunu kullanmaya başlar.\n\nSütun silme:\n1. Uygulama sütunu okumayı bırakır.\n2. Sütunu kaldır.\n\nKısıtlama: PostgreSQL'de `ADD COLUMN ... DEFAULT` büyük tabloda lock alır → nullable ekle, sonra default.\n\n## Uygulama Senaryosu (Event-Sourced)\n\nBu kalıbı, dağıtım alanında Zero-Downtime Migration problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zero-Downtime Migration akışını event-sourced yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 282, "no": "282", "cat": "ORM & Query Builder", "name": "Sıfır-Trust SQLAlchemy 2.0 Şablonları Akışı", "desc": "akış bağlamında SQLAlchemy 2.0 Şablonları için sıfır-trust bir akışı. SQLAlchemy 2.0 select(), join() ve async session kullanım örnekleri. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["SQLAlchemy", "ORM", "async", "akış", "sıfır-trust", "başlangıç"], "badge1": "Başlangıç", "content": "## SQLAlchemy 2.0\n```python\nfrom sqlalchemy import select, func\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\nasync def get_user_orders(session: AsyncSession, user_id: int):\n    stmt = (\n        select(User, func.count(Order.id).label('order_count'))\n        .join(Order, User.id == Order.user_id, isouter=True)\n        .where(User.id == user_id)\n        .group_by(User.id)\n    )\n    result = await session.execute(stmt)\n    return result.first()\n```\n\n## Genişletilmiş Notlar (Sıfır-Trust)\n\n- **Hedef Kitle:** Başlangıç seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde SQLAlchemy 2.0 Şablonları senaryoları\n- **Avantajları:** Bu akışı sayesinde SQLAlchemy 2.0 Şablonları işlemleri daha sıfır-trust hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde SQLAlchemy 2.0 Şablonları ihtiyacını analiz edin.\n  2. Bu akışı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** SQLAlchemy, ORM, async\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 283, "no": "283", "cat": "SQL Şablonları", "name": "Mikroservis JSON/JSONB Sorguları Yapısı", "desc": "mikroservis bağlamında JSON/JSONB Sorguları için mikroservis bir yapısı. PostgreSQL JSONB operatörleri ile esnek yapılandırılmamış veri sorgulama. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["JSONB", "JSON", "PostgreSQL", "mikroservis", "i̇leri"], "badge1": "İleri", "content": "## JSONB Operatörleri\n```sql\n-- Alan erişimi\nSELECT data->>'name', data->'address'->>'city'\nFROM users;\n\n-- Filtre\nSELECT * FROM users\nWHERE data @> '{\"role\": \"admin\"}'::jsonb;\n\n-- Array içinde arama\nSELECT * FROM products\nWHERE tags ? 'electronics';\n\n-- İndeks\nCREATE INDEX idx_user_data ON users USING GIN(data jsonb_path_ops);\n\n-- jsonb_set ile güncelle\nUPDATE users\nSET data = jsonb_set(data, '{address,city}', '\"Ankara\"');\n```\n\n## Genişletilmiş Notlar (Mikroservis)\n\n- **Hedef Kitle:** İleri seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde JSON/JSONB Sorguları senaryoları\n- **Avantajları:** Bu yapısı sayesinde JSON/JSONB Sorguları işlemleri daha mikroservis hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde JSON/JSONB Sorguları ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** JSONB, JSON, PostgreSQL\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 284, "no": "284", "cat": "İndeks & Performans", "name": "Pratik Bağlantı Havuzu Yönetimi Yapısı", "desc": "monitoring bağlamında Bağlantı Havuzu Yönetimi için pratik bir yapısı. PgBouncer ve SQLAlchemy connection pool ile verimli bağlantı yönetimi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["connection pool", "PgBouncer", "bağlantı", "monitoring", "pratik", "pro"], "badge1": "Pro", "content": "##
