 DbVault Çerçevesi ihtiyacını analiz edin.\n  2. Bu protokolü'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** veri modelleme, dbvault, dayanıklı\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 301, "no": "301", "cat": "SQL Şablonları", "name": "Şeffaf Window Functions Şablonları Pratiği", "desc": "API bağlamında Window Functions Şablonları için şeffaf bir pratiği. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "API", "şeffaf", "pro"], "badge1": "Pro", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Uygulama Senaryosu (Şeffaf)\n\nBu pratiği, API alanında Window Functions Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Window Functions Şablonları akışını şeffaf yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 302, "no": "302", "cat": "SQL Şablonları", "name": "Self-Healing CTE ile Hiyerarşik Düzeni", "desc": "şablon bağlamında CTE ile Hiyerarşik için self-healing bir düzeni. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "şablon", "self-healing", "uzman"], "badge1": "Uzman", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu düzeni, şablon alanında CTE ile Hiyerarşik problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** CTE ile Hiyerarşik akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 303, "no": "303", "cat": "SQL Şablonları", "name": "Veri-Odaklı UPSERT Şablonları Rehberi", "desc": "monitoring bağlamında UPSERT Şablonları için veri-odaklı bir rehberi. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "monitoring", "veri-odaklı", "pro"], "badge1": "Pro", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Genişletilmiş Notlar (Veri-Odaklı)\n\n- **Hedef Kitle:** Pro seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde UPSERT Şablonları senaryoları\n- **Avantajları:** Bu rehberi sayesinde UPSERT Şablonları işlemleri daha veri-odaklı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde UPSERT Şablonları ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** upsert, conflict, insert\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 304, "no": "304", "cat": "İndeks & Performans", "name": "Idempotent İndeks Türleri ve Akışı", "desc": "API bağlamında İndeks Türleri ve için idempotent bir akışı. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "API", "idempotent", "i̇leri"], "badge1": "İleri", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** İleri seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde İndeks Türleri ve senaryoları\n- **Avantajları:** Bu akışı sayesinde İndeks Türleri ve işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde İndeks Türleri ve ihtiyacını analiz edin.\n  2. Bu akışı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** indeks, B-tree, GIN\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 305, "no": "305", "cat": "İndeks & Performans", "name": "Composable EXPLAIN ANALYZE Okuma Düzeni", "desc": "güvenlik bağlamında EXPLAIN ANALYZE Okuma için composable bir düzeni. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "güvenlik", "composable", "i̇leri"], "badge1": "İleri", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Uygulama Senaryosu (Composable)\n\nBu düzeni, güvenlik alanında EXPLAIN ANALYZE Okuma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** EXPLAIN ANALYZE Okuma akışını composable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 306, "no": "306", "cat": "Veri Modelleme", "name": "Mikroservis Soft Delete Tasarımı İskeleti", "desc": "arayüz bağlamında Soft Delete Tasarımı için mikroservis bir i̇skeleti. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "arayüz", "mikroservis", "pro"], "badge1": "Pro", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Uygulama Senaryosu (Mikroservis)\n\nBu i̇skeleti, arayüz alanında Soft Delete Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Soft Delete Tasarımı akışını mikroservis yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 307, "no": "307", "cat": "Veri Modelleme", "name": "Hibrit-Cloud Event Sourcing Schema İskeleti", "desc": "arayüz bağlamında Event Sourcing Schema için hibrit-cloud bir i̇skeleti. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "arayüz", "hibrit-cloud", "pro"], "badge1": "Pro", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Uygulama Senaryosu (Hibrit-Cloud)\n\nBu i̇skeleti, arayüz alanında Event Sourcing Schema problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Event Sourcing Schema akışını hibrit-cloud yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 308, "no": "308", "cat": "NoSQL Kalıpları", "name": "Idempotent MongoDB Aggregation Pipeline Rehberi", "desc": "yapay zeka bağlamında MongoDB Aggregation Pipeline için idempotent bir rehberi. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "yapay zeka", "idempotent", "orta"], "badge1": "Orta", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```\n\n## Uygulama Senaryosu (Idempotent)\n\nBu rehberi, yapay zeka alanında MongoDB Aggregation Pipeline problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** MongoDB Aggregation Pipeline akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 309, "no": "309", "cat": "NoSQL Kalıpları", "name": "Otonom Redis Veri Yapıları Mimari Yaklaşımı", "desc": "dağıtım bağlamında Redis Veri Yapıları için otonom bir mimari yaklaşımı. String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["Redis", "hash", "sorted set", "dağıtım", "otonom", "pro"], "badge1": "Pro", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```\n\n## Genişletilmiş Notlar (Otonom)\n\n- **Hedef Kitle:** Pro seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Redis Veri Yapıları senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Redis Veri Yapıları işlemleri daha otonom hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Redis Veri Yapıları ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Redis, hash, sorted set\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 310, "no": "310", "cat": "Migration & Yedek", "name": "Atomic Alembic Migration Şablonu Şablonu", "desc": "akış bağlamında Alembic Migration Şablonu için atomic bir şablonu. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "akış", "atomic", "pro"], "badge1": "Pro", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Pro seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Alembic Migration Şablonu senaryoları\n- **Avantajları:** Bu şablonu sayesinde Alembic Migration Şablonu işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Alembic Migration Şablonu ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Alembic, migration, SQLAlchemy\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 311, "no": "311", "cat": "Migration & Yedek", "name": "Quantum-Hazır Zero-Downtime Migration Kalıbı", "desc": "API bağlamında Zero-Downtime Migration için quantum-hazır bir kalıbı. Büyük tablolarda sütun ekleme/silme için kesintisiz migration stratejisi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["zero-downtime", "migration", "büyük tablo", "API", "quantum-hazır", "i̇leri"], "badge1": "İleri", "content": "## Zero-Downtime Strateji\nSütun ekleme (güvenli):\n1. Nullable sütun ekle — tablo kilidi yok.\n2. Arka planda eski satırları doldur (batch).\n3. NOT NULL constraint ekle (default ile).\n4. Uygulama yeni sütunu kullanmaya başlar.\n\nSütun silme:\n1. Uygulama sütunu okumayı bırakır.\n2. Sütunu kaldır.\n\nKısıtlama: PostgreSQL'de `ADD COLUMN ... DEFAULT` büyük tabloda lock alır → nullable ekle, sonra default.\n\n## Uygulama Senaryosu (Quantum-Hazır)\n\nBu kalıbı, API alanında Zero-Downtime Migration problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zero-Downtime Migration akışını quantum-hazır yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 312, "no": "312", "cat": "ORM & Query Builder", "name": "Resilient SQLAlchemy 2.0 Şablonları Mimari Yaklaşımı", "desc": "CI/CD bağlamında SQLAlchemy 2.0 Şablonları için resilient bir mimari yaklaşımı. SQLAlchemy 2.0 select(), join() ve async session kullanım örnekleri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["SQLAlchemy", "ORM", "async", "CI/CD", "resilient", "orta"], "badge1": "Orta", "content": "## SQLAlchemy 2.0\n```python\nfrom sqlalchemy import select, func\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\nasync def get_user_orders(session: AsyncSession, user_id: int):\n    stmt = (\n        select(User, func.count(Order.id).label('order_count'))\n        .join(Order, User.id == Order.user_id, isouter=True)\n        .where(User.id == user_id)\n        .group_by(User.id)\n    )\n    result = await session.execute(stmt)\n    return result.first()\n```\n\n## Genişletilmiş Notlar (Resilient)\n\n- **Hedef Kitle:** Orta seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde SQLAlchemy 2.0 Şablonları senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde SQLAlchemy 2.0 Şablonları işlemleri daha resilient hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde SQLAlchemy 2.0 Şablonları ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** SQLAlchemy, ORM, async\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 313, "no": "313", "cat": "SQL Şablonları", "name": "Performant JSON/JSONB Sorguları Algoritması", "desc": "mikroservis bağlamında JSON/JSONB Sorguları için performant bir algoritması. PostgreSQL JSONB operatörleri ile esnek yapılandırılmamış veri sorgulama. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["JSONB", "JSON", "PostgreSQL", "mikroservis", "performant", "orta"], "badge1": "Orta", "content": "## JSONB Operatörleri\n```sql\n-- Alan erişimi\nSELECT data->>'name', data->'address'->>'city'\nFROM users;\n\n-- Filtre\nSELECT * FROM users\nWHERE data @> '{\"role\": \"admin\"}'::jsonb;\n\n-- Array içinde arama\nSELECT * FROM products\nWHERE tags ? 'electronics';\n\n-- İndeks\nCREATE INDEX idx_user_data ON users USING GIN(data jsonb_path_ops);\n\n-- jsonb_set ile güncelle\nUPDATE users\nSET data = jsonb_set(data, '{address,city}', '\"Ankara\"');\n```\n\n## Uygulama Senaryosu (Performant)\n\nBu algoritması, mikroservis alanında JSON/JSONB Sorguları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** JSON/JSONB Sorguları akışını performant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 314, "no": "314", "cat": "İndeks & Performans", "name": "Layered Bağlantı Havuzu Yönetimi Optimizasyonu", "desc": "arayüz bağlamında Bağlantı Havuzu Yönetimi için layered bir optimizasyonu. PgBouncer ve SQLAlchemy connection pool ile verimli bağlantı yönetimi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["connection pool", "PgBouncer", "bağlantı", "arayüz", "layered", "uzman"], "badge1": "Uzman", "content": "## Connection Pool\n```python\nfrom sqlalchemy.ext.asyncio import create_async_engine\n\nengine = create_async_engine(\n    DATABASE_URL,\n    pool_size=20,          # Min bağlantı\n    max_overflow=10,       # Ek bağlantı\n    pool_timeout=30,       # Bağlantı bekleme süresi\n    pool_recycle=1800,     # Bağlantı yenileme (sn)\n    pool_pre_ping=True,    # Ö ) akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 316, "no": "316", "cat": "SQL Şablonları", "name": "Quantum-Hazır Pratik Yazılım Pattern'i Pratiği", "desc": "logging bağlamında Pratik Yazılım Pattern'i için quantum-hazır bir pratiği. SQL Şablonları kategorisinde yazılım odaklı pratik bir pattern'i. Orta seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["sql şablonları", "yazılım", "pratik", "logging", "quantum-hazır", "uzman"], "badge1": "Uzman", "content": "## Pratik Yazılım Pattern'i\n\nBu öğe, **SQL Şablonları** kategorisinde yazılım konusuna pratik bir yaklaşım sunar.\n\n### Temel Konsept\nYazılım bağlamında window kavramı, modern sql şablonları pratiğinde merkezi bir rol oynar. Pratik yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım maliyeti düşer.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata oranı azalır.\n\n### Adım Adım Uygulama\n\n1. **Analiz:** Mevcut sql şablonları yapınızdaki yazılım ihtiyaçlarını listele.\n2. **Tasarım:** Bu pattern'i için orta seviyede bir taslak çıkar.\n3. **Pilot:** Küçük bir kapsamda dene, metrik topla.\n4. **Geri Bildirim:** Ekip ve kullanıcı geri bildirimlerini değerlendir.\n5. **Rollout:** Kademeli olarak tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokü * başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 331, "no": "331", "cat": "SQL Şablonları", "name": "Hibrit Window Functions Şablonları İskeleti", "desc": "monitoring bağlamında Window Functions Şablonları için hibrit bir i̇skeleti. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "monitoring", "hibrit", "uzman"], "badge1": "Uzman", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Uygulama Senaryosu (Hibrit)\n\nBu i̇skeleti, monitoring alanında Window Functions Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Window Functions Şablonları akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 332, "no": "332", "cat": "SQL Şablonları", "name": "Memory-Safe CTE ile Hiyerarşik Tasarımı", "desc": "API bağlamında CTE ile Hiyerarşik için memory-safe bir tasarımı. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "API", "memory-safe", "i̇leri"], "badge1": "İleri", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** İleri seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde CTE ile Hiyerarşik senaryoları\n- **Avantajları:** Bu tasarımı sayesinde CTE ile Hiyerarşik işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde CTE ile Hiyerarşik ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** CTE, hiyerarşi, recursive\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 333, "no": "333", "cat": "SQL Şablonları", "name": "Production-Grade UPSERT Şablonları Sistemi", "desc": "güvenlik bağlamında UPSERT Şablonları için production-grade bir sistemi. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "güvenlik", "production-grade", "uzman"], "badge1": "Uzman", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Uygulama Senaryosu (Production-Grade)\n\nBu sistemi, güvenlik alanında UPSERT Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** UPSERT Şablonları akışını production-grade yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 334, "no": "334", "cat": "İndeks & Performans", "name": "Atomic İndeks Türleri ve Şablonu", "desc": "logging bağlamında İndeks Türleri ve için atomic bir şablonu. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "logging", "atomic", "başlangıç"], "badge1": "Başlangıç", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Uygulama Senaryosu (Atomic)\n\nBu şablonu, logging alanında İndeks Türleri ve problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İndeks Türleri ve akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 335, "no": "335", "cat": "İndeks & Performans", "name": "Observable EXPLAIN ANALYZE Okuma Şablonu", "desc": "mikroservis bağlamında EXPLAIN ANALYZE Okuma için observable bir şablonu. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "mikroservis", "observable", "pro"], "badge1": "Pro", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index ghput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Redis, hash, sorted set\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 340, "no": "340", "cat": "Migration & Yedek", "name": "Kullanıcı-Merkezli Alembic Migration Şablonu Stratejisi", "desc": "caching bağlamında Alembic Migration Şablonu için kullanıcı-merkezli bir stratejisi. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "caching", "kullanıcı-merkezli", "orta"], "badge1": "Orta", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Genişletilmiş Notlar (Kullanıcı-Merkezli)\n\n- **Hedef Kitle:** Orta seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Alembic Migration Şablonu senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Alembic Migration Şablonu işlemleri daha kullanıcı-merkezli hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Alembic Migration Şablonu ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Alembic, migration, SQLAlchemy\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 341, "no": "341", "cat": "Migration & Yedek", "name": "Container-Native Zero-Downtime Migration Metodu", "desc": "CI/CD bağlamında Zero-Downtime Migration için container-native bir metodu. Büyük tablolarda sütun ekleme/silme için kesintisiz migration stratejisi. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["zero-downtime", "migration", "büyük tablo", "CI/CD", "container-native", "başlangıç"], "badge1": "Başlangıç", "content": "## Zero-Downtime Strateji\nSütun ekleme (güvenli):\n1. Nullable sütun ekle — tablo kilidi yok.\n2. Arka planda eski satırları doldur (batch).\n3. NOT NULL constraint ekle (default ile).\n4. Uygulama yeni sütunu kullanmaya başlar.\n\nSütun silme:\n1. Uygulama sütunu okumayı bırakır.\n2. Sütunu kaldır.\n\nKısıtlama: PostgreSQL'de `ADD COLUMN ... DEFAULT` büyük tabloda lock alır → nullable ekle, sonra default.\n\n## Genişletilmiş Notlar (Container-Native)\n\n- **Hedef Kitle:** Başlangıç seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Zero-Downtime Migration senaryoları\n- **Avantajları:** Bu metodu sayesinde Zero-Downtime Migration işlemleri daha container-native hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Zero-Downtime Migration ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zero-downtime, migration, büyük tablo\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 342, "no": "342", "cat": "ORM & Query Builder", "name": "AI-Augmented SQLAlchemy 2.0 Şablonları Standartı", "desc": "dağıtım bağlamında SQLAlchemy 2.0 Şablonları için ai-augmented bir standartı. SQLAlchemy 2.0 select(), join() ve async session kullanım örnekleri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["SQLAlchemy", "ORM", "async", "dağıtım", "ai-augmented", "orta"], "badge1": "Orta", "content": "## SQLAlchemy 2.0\n```python\nfrom sqlalchemy import select, func\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\nasync def get_user_orders(session: AsyncSession, user_id: int):\n    stmt = (\n        select(User, func.count(Order.id).label('order_count'))\n        .join(Order, User.id == Order.user_id, isouter=True)\n        .where(User.id == user_id)\n        .group_by(User.id)\n    )\n    result = await session.execute(stmt)\n    return result.first()\n```\n\n## Uygulama Senaryosu (AI-Augmented)\n\nBu standartı, dağıtım alanında SQLAlchemy 2.0 Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** SQLAlchemy 2.0 Şablonları akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 343, "no": "343", "cat": "SQL Şablonları", "name": "Dağıtık JSON/JSONB Sorguları Optimizasyonu", "desc": "ölçeklenme bağlamında JSON/JSONB Sorguları için dağıtık bir optimizasyonu. PostgreSQL JSONB operatörleri ile esnek yapılandırılmamış veri sorgulama. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["JSONB", "JSON", "PostgreSQL", "ölçeklenme", "dağıtık", "pro"], "badge1": "Pro", "content": "## JSONB Operatörleri\n```sql\n-- Alan erişimi\nSELECT data->>'name', data->'address'->>'city'\nFROM users;\n\n-- Filtre\nSELECT * FROM users\nWHERE data @> '{\"role\": \"admin\"}'::jsonb;\n\n-- Array içinde arama\nSELECT * FROM products\nWHERE tags ? 'electronics';\n\n-- İndeks\nCREATE INDEX idx_user_data ON users USING GIN(data jsonb_path_ops);\n\n-- jsonb_set ile güncelle\nUPDATE users\nSET data = jsonb_set(data, '{address,city}', '\"Ankara\"');\n```\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu optimizasyonu, ölçeklenme alanında JSON/JSONB Sorguları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** JSON/JSONB Sorguları akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 344, "no": "344", "cat": "İndeks & Performans", "name": "Sezgisel Bağlantı Havuzu Yönetimi Stratejisi", "desc": "şablon bağlamında Bağlantı Havuzu Yönetimi için sezgisel bir stratejisi. PgBouncer ve SQLAlchemy connection pool ile verimli bağlantı yönetimi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["connection pool", "PgBouncer", "bağlantı", "şablon", "sezgisel", "orta"], "badge1": "Orta", "content": "## Connection Pool\n```python\nfrom sqlalchemy.ext.as ndow", "ROW_NUMBER", "analitik", "monitoring", "adaptif", "pro"], "badge1": "Pro", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Genişletilmiş Notlar (Adaptif)\n\n- **Hedef Kitle:** Pro seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Window Functions Şablonları senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde Window Functions Şablonları işlemleri daha adaptif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Window Functions Şablonları ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** window, ROW_NUMBER, analitik\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 362, "no": "362", "cat": "SQL Şablonları", "name": "Ölçeklenebilir CTE ile Hiyerarşik Kütüphanesi", "desc": "ölçeklenme bağlamında CTE ile Hiyerarşik için ölçeklenebilir bir kütüphanesi. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "ölçeklenme", "ölçeklenebilir", "pro"], "badge1": "Pro", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Uygulama Senaryosu (Ölçeklenebilir)\n\nBu kütüphanesi, ölçeklenme alanında CTE ile Hiyerarşik problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** CTE ile Hiyerarşik akışını ölçeklenebilir yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 363, "no": "363", "cat": "SQL Şablonları", "name": "Performant UPSERT Şablonları Şablonu", "desc": "yapay zeka bağlamında UPSERT Şablonları için performant bir şablonu. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "yapay zeka", "performant", "uzman"], "badge1": "Uzman", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Uygulama Senaryosu (Performant)\n\nBu şablonu, yapay zeka alanında UPSERT Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** UPSERT Şablonları akışını performant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 364, "no": "364", "cat": "İndeks & Performans", "name": "Self-Healing İndeks Türleri ve Yapısı", "desc": "güvenlik bağlamında İndeks Türleri ve için self-healing bir yapısı. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "güvenlik", "self-healing", "uzman"], "badge1": "Uzman", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Genişletilmiş Notlar (Self-Healing)\n\n- **Hedef Kitle:** Uzman seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde İndeks Türleri ve senaryoları\n- **Avantajları:** Bu yapısı sayesinde İndeks Türleri ve işlemleri daha self-healing hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde İndeks Türleri ve ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** indeks, B-tree, GIN\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 365, "no": "365", "cat": "İndeks & Performans", "name": "Pluggable EXPLAIN ANALYZE Okuma Pratiği", "desc": "güvenlik bağlamında EXPLAIN ANALYZE Okuma için pluggable bir pratiği. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "güvenlik", "pluggable", "pro"], "badge1": "Pro", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Pro seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde EXPLAIN ANALYZE Okuma senaryoları\n- **Avantajları:** Bu pratiği sayesinde EXPLAIN ANALYZE Okuma işlemleri daha pluggable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde EXPLAIN ANALYZE Okuma ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** EXPLAIN, query plan, optimizasyon\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 366, "no": "366", "cat": "Veri Modelleme", "name": "Reactive Soft Delete Tasarımı Sözleşmesi", "desc": "mikroservis bağlamında Soft Delete Tasarımı için reactive bir sözleşmesi. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "mikroservis", "reactive", "i̇leri"], "badge1": "İleri", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Genişletilmiş Notlar (Reactive)\n\n- **Hedef Kitle:** İleri seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Soft Delete Tasarımı senaryoları\n- **Avantajları:** Bu sözleşmesi sayesinde Soft Delete Tasarımı işlemleri daha reactive hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Soft Delete Tasarımı ihtiyacını analiz edin.\n  2. Bu sözleşmesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** soft delete, arşiv, deleted_at\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 367, "no": "367", "cat": "Veri Modelleme", "name": "Atomic Event Sourcing Schema Akışı", "desc": "yapay zeka bağlamında Event Sourcing Schema için atomic bir akışı. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "yapay zeka", "atomic", "pro"], "badge1": "Pro", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Uygulama Senaryosu (Atomic)\n\nBu akışı, yapay zeka alanında Event Sourcing Schema problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Event Sourcing Schema akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 368, "no": "368", "cat": "NoSQL Kalıpları", "name": "Idempotent MongoDB Aggregation Pipeline Standartı", "desc": "monitoring bağlamında MongoDB Aggregation Pipeline için idempotent bir standartı. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "monitoring", "idempotent", "orta"], "badge1": "Orta", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```\n\n## Uygulama Senaryosu (Idempotent)\n\nBu standartı, monitoring alanında MongoDB Aggregation Pipeline problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** MongoDB Aggregation Pipeline akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 369, "no": "369", "cat": "NoSQL Kalıpları", "name": "Atomic Redis Veri Yapıları Çerçevesi", "desc": "mimari bağlamında Redis Veri Yapıları için atomic bir çerçevesi. String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["Redis", "hash", "sorted set", "mimari", "atomic", "uzman"], "badge1": "Uzman", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```\n\n## Uygulama Senaryosu (Atomic)\n\nBu çerçevesi, mimari alanında Redis Veri Yapıları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Redis Veri Yapıları akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 370, "no": "370", "cat": "Migration & Yedek", "name": "Resilient Alembic Migration Şablonu Kalıbı", "desc": "arayüz bağlamında Alembic Migration Şablonu için resilient bir kalıbı. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "arayüz", "resilient", "i̇leri"], "badge1": "İleri", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Uygulama Senaryosu (Resilient)\n\nBu kalıbı, arayüz alanında Alembic Migration Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Alembic Migration Şablonu akışını resilient yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 371, "no": "371", "cat": "Migration & Yedek", "name": "Idempotent Zero-Downtime Migration Çekirdeği", "desc": "akış bağlamında Zero-Downtime Migration için idempotent bir çekirdeği. Büyük tablolarda sütun ekleme/silme için kesintisiz migration stratejisi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["zero-downtime", "migration", "büyük tablo", "akış", "idempotent", "orta"], "badge1": "Orta", "content": "## Zero-Downtime Strateji\nSütun ekleme (güvenli):\n1. Nullable sütun ekle — tablo kilidi yok.\n2. Arka planda eski satırları doldur (batch).\n3. NOT NULL constraint ekle (default ile).\n4. Uygulama yeni sütunu kullanmaya başlar.\n\nSütun silme:\n1. Uygulama sütunu okumayı bırakır.\n2. Sütunu kaldır.\n\nKısıtlama: PostgreSQL'de `ADD COLUMN ... DEFAULT` büyük tabloda lock alır → nullable ekle, sonra default.\n\n## Uygulama Senaryosu (Idempotent)\n\nBu çekirdeği, akış alanında Zero-Downtime Migration problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zero-Downtime Migration akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 372, "no": "372", "cat": "ORM & Query Builder", "name": "Pratik SQLAlchemy 2.0 Şablonları Çekirdeği", "desc": "akış bağlamında SQLAlchemy 2.0 Şablonları için pratik bir çekirdeği. SQLAlchemy 2.0 select(), join() ve async session kullanım örnekleri. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["SQLAlchemy", "ORM", "async", "akış", "pratik", "başlangıç"], "badge1": "Başlangıç", "content": "## SQLAlchemy 2.0\n```python\nfrom sqlalchemy import select, func\nfrom sqlalchemy.ext.asyncio import AsyncSession\n\nasync def get_user_orders(session: AsyncSession, user_id: int):\n    stmt = (\n        select(User, func.count(Order.id).label('order_count'))\n        .join(Order, User.id == Order.user_id, isouter=True)\n        .where(User.id == user_id)\n        .group_by(User.id)\n    )\n    result = await session.execute(stmt)\n    return result.first()\n```\n\n## Uygulama Senaryosu (Pratik)\n\nBu çekirdeği, akış alanında SQLAlchemy 2.0 Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde
