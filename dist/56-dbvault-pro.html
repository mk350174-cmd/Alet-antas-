 Kitle:** İleri seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Dayanıklı DbVault Çerçevesi senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Dayanıklı DbVault Çerçevesi işlemleri daha kullanıcı-merkezli hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Dayanıklı DbVault Çerçevesi ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** veri modelleme, dbvault, dayanıklı\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 391, "no": "391", "cat": "SQL Şablonları", "name": "Quantum-Hazır Window Functions Şablonları Düzeni", "desc": "mikroservis bağlamında Window Functions Şablonları için quantum-hazır bir düzeni. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "mikroservis", "quantum-hazır", "i̇leri"], "badge1": "İleri", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Genişletilmiş Notlar (Quantum-Hazır)\n\n- **Hedef Kitle:** İleri seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Window Functions Şablonları senaryoları\n- **Avantajları:** Bu düzeni sayesinde Window Functions Şablonları işlemleri daha quantum-hazır hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Window Functions Şablonları ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** window, ROW_NUMBER, analitik\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 392, "no": "392", "cat": "SQL Şablonları", "name": "Container-Native CTE ile Hiyerarşik Şablonu", "desc": "güvenlik bağlamında CTE ile Hiyerarşik için container-native bir şablonu. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "güvenlik", "container-native", "uzman"], "badge1": "Uzman", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Genişletilmiş Notlar (Container-Native)\n\n- **Hedef Kitle:** Uzman seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde CTE ile Hiyerarşik senaryoları\n- **Avantajları:** Bu şablonu sayesinde CTE ile Hiyerarşik işlemleri daha container-native hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde CTE ile Hiyerarşik ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** CTE, hiyerarşi, recursive\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 393, "no": "393", "cat": "SQL Şablonları", "name": "Headless UPSERT Şablonları Kütüphanesi", "desc": "entegrasyon bağlamında UPSERT Şablonları için headless bir kütüphanesi. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "entegrasyon", "headless", "uzman"], "badge1": "Uzman", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Uzman seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde UPSERT Şablonları senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde UPSERT Şablonları işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde UPSERT Şablonları ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** upsert, conflict, insert\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 394, "no": "394", "cat": "İndeks & Performans", "name": "Hibrit-Cloud İndeks Türleri ve Pratiği", "desc": "mikroservis bağlamında İndeks Türleri ve için hibrit-cloud bir pratiği. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "mikroservis", "hibrit-cloud", "i̇leri"], "badge1": "İleri", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Genişletilmiş Notlar (Hibrit-Cloud)\n\n- **Hedef Kitle:** İleri seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde İndeks Türleri ve senaryoları\n- **Avantajları:** Bu pratiği sayesinde İndeks Türleri ve işlemleri daha hibrit-cloud hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde İndeks Türleri ve ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** indeks, B-tree, GIN\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 395, "no": "395", "cat": "İndeks & Performans", "name": "Polyglot EXPLAIN ANALYZE Okuma Refactor Yöntemi", "desc": "performans bağlamında EXPLAIN ANALYZE Okuma için polyglot bir refactor yöntemi. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "performans", "polyglot", "pro"], "badge1": "Pro", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** Pro seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde EXPLAIN ANALYZE Okuma senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde EXPLAIN ANALYZE Okuma işlemleri daha polyglot hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde EXPLAIN ANALYZE Okuma ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** EXPLAIN, query plan, optimizasyon\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 396, "no": "396", "cat": "Veri Modelleme", "name": "Sıfır-Trust Soft Delete Tasarımı Metodu", "desc": "ölçeklenme bağlamında Soft Delete Tasarımı için sıfır-trust bir metodu. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "ölçeklenme", "sıfır-trust", "i̇leri"], "badge1": "İleri", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Uygulama Senaryosu (Sıfır-Trust)\n\nBu metodu, ölçeklenme alanında Soft Delete Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Soft Delete Tasarımı akışını sıfır-trust yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 397, "no": "397", "cat": "Veri Modelleme", "name": "Şeffaf Event Sourcing Schema Tasarımı", "desc": "test bağlamında Event Sourcing Schema için şeffaf bir tasarımı. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "test", "şeffaf", "pro"], "badge1": "Pro", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Uygulama Senaryosu (Şeffaf)\n\nBu tasarımı, test alanında Event Sourcing Schema problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Event Sourcing Schema akışını şeffaf yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 398, "no": "398", "cat": "NoSQL Kalıpları", "name": "DevOps-Ready MongoDB Aggregation Pipeline Şablonu", "desc": "mimari bağlamında MongoDB Aggregation Pipeline için devops-ready bir şablonu. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "mimari", "devops-ready", "pro"], "badge1": "Pro", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```\n\n## Genişletilmiş Notlar (DevOps-Ready)\n\n- **Hedef Kitle:** Pro seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde MongoDB Aggregation Pipeline senaryoları\n- **Avantajları:** Bu şablonu sayesinde MongoDB Aggregation Pipeline işlemleri daha devops-ready hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde MongoDB Aggregation Pipeline ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** MongoDB, aggregation, pipeline\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 399, "no": "399", "cat": "NoSQL Kalıpları", "name": "Zero-Config Redis Veri Yapıları Refactor Yöntemi", "desc": "arayüz bağlamında Redis Veri Yapıları için zero-config bir refactor yöntemi. String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["Redis", "hash", "sorted set", "arayüz", "zero-config", "i̇leri"], "badge1": "İleri", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** İleri seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Redis Veri Yapıları senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Redis Veri Yapıları işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Redis Veri Yapıları ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Redis, hash, sorted set\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 400, "no": "400", "cat": "Migration & Yedek", "name": "Veri-Odaklı Alembic Migration Şablonu Anlaşması", "desc": "şablon bağlamında Alembic Migration Şablonu için veri-odaklı bir anlaşması. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "şablon", "veri-odaklı", "pro"], "badge1": "Pro", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Uygulama Senaryosu (Veri-Odaklı)\n\nBu anlaşması, şablon alanında Alembic Migration Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Alembic Migration Şablonu akışını veri-odaklı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 401, "no": "401", "cat": "AI Prompt Kütüphanesi", "name": "Sistem Promptu — Veritabanı", "desc": "Veritabanı alanı için orijinal sistem promptu promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "system-prompt", "veritabanı", "orijinal"], "badge1": "Orijinal AI", "content": "## SİSTEM PROMPTU — Veritabanı Uzmanı\n\nSen kıdemli bir **Veritabanı** uzmanısın. Görevin: SQL optimization, schema design.\n\n### Davranış Kuralları\n1. **Net ve doğrulanabilir** yanıtlar ver; spekülasyondan kaçın.\n2. Her iddiayı kaynak veya somut örnekle destekle.\n3. Belirsizlik varsa açıkça **\"emin değilim\"** de — yanlış cevap verme.\n4. Kullanıcıya **adım adım** rehberlik et; tek seferde fazla yükleme.\n5. Yanıt formatı: önce TL;DR (2 cümle), sonra detaylar, sonra sonraki adım önerisi.\n\n### Yasak Davranışlar\n- Üretilmiş istatistik veya uydurma kaynak verme\n- Konu dışına çıkma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru Veritabanı kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 402, "no": "402", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — Veritabanı", "desc": "Veritabanı alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "veritabanı", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Veritabanı\n\nAşağıda Veritabanı alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** SQL optimization, schema design konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** SQL optimization, schema design alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** SQL optimization, schema design için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Veritabanı", "desc": "Veritabanı alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "veritabanı", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Veritabanı\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Veritabanı ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) SQL optimization, schema design ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Veritabanı", "desc": "Veritabanı alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "veritabanı", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Veritabanı Mentörü\n\n**Kimsin:** 15+ yıl Veritabanı deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** SQL optimization, schema design\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün Veritabanı ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — Veritabanı", "desc": "Veritabanı alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "veritabanı", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — Veritabanı\n\nVeritabanı alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"Veritabanı\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "SQL Şablonları", "name": "Senkron Window Functions Şablonları Refactor Yöntemi", "desc": "akış bağlamında Window Functions Şablonları için senkron bir refactor yöntemi. ROW_NUMBER, RANK, LAG/LEAD ile analitik pencere fonksiyonu örnekleri. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["window", "ROW_NUMBER", "analitik", "akış", "senkron", "orta"], "badge1": "Orta", "content": "## Window Functions\n```sql\n-- ROW_NUMBER: bölüm içi sıralama\nSELECT\n  user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date) AS order_num\nFROM orders;\n\n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Uygulama Senaryosu (Senkron)\n\nBu refactor yöntemi, akış alanında Window Functions Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Window Functions Şablonları akışını senkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 407, "no": "407", "cat": "SQL Şablonları", "name": "Dağıtık CTE ile Hiyerarşik Yapısı", "desc": "şablon bağlamında CTE ile Hiyerarşik için dağıtık bir yapısı. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "şablon", "dağıtık", "başlangıç"], "badge1": "Başlangıç", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu yapısı, şablon alanında CTE ile Hiyerarşik problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** CTE ile Hiyerarşik akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 408, "no": "408", "cat": "SQL Şablonları", "name": "Kullanıcı-Merkezli UPSERT Şablonları İskeleti", "desc": "ölçeklenme bağlamında UPSERT Şablonları için kullanıcı-merkezli bir i̇skeleti. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "ölçeklenme", "kullanıcı-merkezli", "uzman"], "badge1": "Uzman", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu i̇skeleti, ölçeklenme alanında UPSERT Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** UPSERT Şablonları akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 409, "no": "409", "cat": "İndeks & Performans", "name": "Bağlamsal İndeks Türleri ve Mimari Yaklaşımı", "desc": "akış bağlamında İndeks Türleri ve için bağlamsal bir mimari yaklaşımı. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "akış", "bağlamsal", "orta"], "badge1": "Orta", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Uygulama Senaryosu (Bağlamsal)\n\nBu mimari yaklaşımı, akış alanında İndeks Türleri ve problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İndeks Türleri ve akışını bağlamsal yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 410, "no": "410", "cat": "İndeks & Performans", "name": "Reactive EXPLAIN ANALYZE Okuma Optimizasyonu", "desc": "yapay zeka bağlamında EXPLAIN ANALYZE Okuma için reactive bir optimizasyonu. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "yapay zeka", "reactive", "pro"], "badge1": "Pro", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Genişletilmiş Notlar (Reactive)\n\n- **Hedef Kitle:** Pro seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde EXPLAIN ANALYZE Okuma senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde EXPLAIN ANALYZE Okuma işlemleri daha reactive hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde EXPLAIN ANALYZE Okuma ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** EXPLAIN, query plan, optimizasyon\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 411, "no": "411", "cat": "Veri Modelleme", "name": "Stream Tabanlı Soft Delete Tasarımı Protokolü", "desc": "ölçeklenme bağlamında Soft Delete Tasarımı için stream tabanlı bir protokolü. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "ölçeklenme", "stream tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Uygulama Senaryosu (Stream Tabanlı)\n\nBu protokolü, ölçeklenme alanında Soft Delete Tasarımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Soft Delete Tasarımı akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 412, "no": "412", "cat": "Veri Modelleme", "name": "Pipeline Event Sourcing Schema Sözleşmesi", "desc": "logging bağlamında Event Sourcing Schema için pipeline bir sözleşmesi. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "logging", "pipeline", "uzman"], "badge1": "Uzman", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Uygulama Senaryosu (Pipeline)\n\nBu sözleşmesi, logging alanında Event Sourcing Schema problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Event Sourcing Schema akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 413, "no": "413", "cat": "NoSQL Kalıpları", "name": "Polyglot MongoDB Aggregation Pipeline Şablonu", "desc": "logging bağlamında MongoDB Aggregation Pipeline için polyglot bir şablonu. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "logging", "polyglot", "başlangıç"], "badge1": "Başlangıç", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```\n\n## Uygulama Senaryosu (Polyglot)\n\nBu şablonu, logging alanında MongoDB Aggregation Pipeline problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** MongoDB Aggregation Pipeline akışını polyglot yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 414, "no": "414", "cat": "NoSQL Kalıpları", "name": "Bağlamsal Redis Veri Yapıları Doktrini", "desc": "dağıtım bağlamında Redis Veri Yapıları için bağlamsal bir doktrini. String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["Redis", "hash", "sorted set", "dağıtım", "bağlamsal", "başlangıç"], "badge1": "Başlangıç", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```\n\n## Uygulama Senaryosu (Bağlamsal)\n\nBu doktrini, dağıtım alanında Redis Veri Yapıları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Redis Veri Yapıları akışını bağlamsal yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 415, "no": "415", "cat": "Migration & Yedek", "name": "Otonom Alembic Migration Şablonu Düzeni", "desc": "entegrasyon bağlamında Alembic Migration Şablonu için otonom bir düzeni. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "entegrasyon", "otonom", "pro"], "badge1": "Pro", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Uygulama Senaryosu (Otonom)\n\nBu düzeni, entegrasyon alanında Alembic Migration Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Alembic Migration Şablonu akışını otonom yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 416, "no": "416", "cat": "Migration & Yedek", "name": "Reactive Zero-Downtime Migration İskeleti", "desc": "mikroservis bağlamında Zero-Downtime Migration için reactive bir i̇skeleti. Büyük tablolarda sütun ekleme/silme için kesintisiz migration stratejisi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["zero-downtime", "migration", "büyük tablo", "mikroservis", "reactive", "orta"], "badge1": "Orta", "content": "## Zero-Downtime Strateji\nSütun ekleme (güvenli):\n1. Nullable sütun ekle — tablo kilidi yok.\n2. Arka planda eski satırları doldur (batch).\n3. NOT NULL constraint ekle (default ile).\n4. Uygulama yeni sütunu kullanmaya başlar.\n\nSütun silme:\n1. Uygulama sütunu okumayı bırakır.\n2. Sütunu kaldır.\n\nKısıtlama: PostgreSQL'de `ADD COLUMN ... DEFAULT` büyük tabloda lock alır → nullable ekle, sonra default.\n\n## Uygulama Senaryosu (Reactive)\n\nBu i̇skeleti, mikroservis alanında Zero-Downtime Migration problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zero- -final"}}, {"id": 420, "no": "420", "cat": "Veri Modelleme", "name": "Federe Çok Kiracılı (Multi-Tenant) Anlaşması", "desc": "entegrasyon bağlamında Çok Kiracılı (Multi-Tenant) için federe bir anlaşması. Tenant izolasyonu için schema-per-tenant ve tenant_id sütun stratejileri. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["multi-tenant", "izolasyon", "schema", "entegrasyon", "federe", "uzman"], "badge1": "Uzman", "content": "## Multi-Tenant Stratejiler\n**Strateji 1 — Ayrı DB:** Tam izolasyon, yüksek maliyet.\n**Strateji 2 — Schema per tenant:**\n```sql\nCREATE SCHEMA tenant_acme;\nCREATE TABLE tenant_acme.orders (id SERIAL, ...);\n```\n**Strateji 3 — Shared table + RLS:**\n```sql\nALTER TABLE orders ENABLE ROW LEVEL SECURITY;\nCREATE POLICY tenant_isolation ON orders\n  USING (tenant_id = current_setting('app.tenant_id')::int);\nSET app.tenant_id = 42;\n```\n\n## Uygulama Senaryosu (Federe)\n\nBu anlaşması, entegrasyon alanında Çok Kiracılı (Multi-Tenant) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çok Kiracılı (Multi-Tenant) akışını federe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-450-final"}}, {"id": 421, "no": "421", "cat": "SQL Şablonları", "name": "Pipeline Pratik Yazılım Pattern'i Refactor Yöntemi", "desc": "gözlemlenebilirlik bağlamında Pratik Yazılım Pattern'i için pipeline bir refactor yöntemi. SQL Şablonları kategorisinde yazılım odaklı pratik bir pattern'i. Orta seviyesi kullanıcılar için ta n-- LAG: önceki satır değeri\nSELECT\n  date, revenue,\n  LAG(revenue) OVER (ORDER BY date) AS prev_revenue,\n  revenue - LAG(revenue) OVER (ORDER BY date) AS growth\nFROM daily_revenue;\n\n-- RANK vs DENSE_RANK\nSELECT name, score,\n  RANK() OVER (ORDER BY score DESC),       -- 1,2,2,4\n  DENSE_RANK() OVER (ORDER BY score DESC)  -- 1,2,2,3\nFROM scores;\n```\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** Uzman seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Window Functions Şablonları senaryoları\n- **Avantajları:** Bu kalıbı sayesinde Window Functions Şablonları işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Window Functions Şablonları ihtiyacını analiz edin.\n  2. Bu kalıbı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** window, ROW_NUMBER, analitik\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 437, "no": "437", "cat": "SQL Şablonları", "name": "Ölçeklenebilir CTE ile Hiyerarşik Optimizasyonu", "desc": "test bağlamında CTE ile Hiyerarşik için ölçeklenebilir bir optimizasyonu. Özyinelemeli CTE ile ağaç yapısı ve yönetici hiyerarşisi sorgulama. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["CTE", "hiyerarşi", "recursive", "test", "ölçeklenebilir", "orta"], "badge1": "Orta", "content": "## Recursive CTE\n```sql\nWITH RECURSIVE org_chart AS (\n  -- Base case: üst yönetici (manager_id IS NULL)\n  SELECT id, name, manager_id, 1 AS depth, name AS path\n  FROM employees\n  WHERE manager_id IS NULL\n  \n  UNION ALL\n  \n  -- Recursive: alt çalışanlar\n  SELECT e.id, e.name, e.manager_id,\n    oc.depth + 1,\n    oc.path || ' > ' || e.name\n  FROM employees e\n  JOIN org_chart oc ON e.manager_id = oc.id\n)\nSELECT * FROM org_chart ORDER BY depth, path;\n```\n\n## Genişletilmiş Notlar (Ölçeklenebilir)\n\n- **Hedef Kitle:** Orta seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde CTE ile Hiyerarşik senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde CTE ile Hiyerarşik işlemleri daha ölçeklenebilir hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde CTE ile Hiyerarşik ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** CTE, hiyerarşi, recursive\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 438, "no": "438", "cat": "SQL Şablonları", "name": "Pratik UPSERT Şablonları Kütüphanesi", "desc": "mühendislik bağlamında UPSERT Şablonları için pratik bir kütüphanesi. PostgreSQL INSERT ON CONFLICT ve MySQL INSERT ON DUPLICATE KEY şablonları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["upsert", "conflict", "insert", "mühendislik", "pratik", "orta"], "badge1": "Orta", "content": "## UPSERT\n```sql\n-- PostgreSQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON CONFLICT (sku)\nDO UPDATE SET\n  name = EXCLUDED.name,\n  price = EXCLUDED.price,\n  updated_at = NOW();\n\n-- MySQL\nINSERT INTO products (sku, name, price)\nVALUES ('ABC-001', 'Widget', 29.99)\nON DUPLICATE KEY UPDATE\n  name = VALUES(name),\n  price = VALUES(price);\n```\n\n## Uygulama Senaryosu (Pratik)\n\nBu kütüphanesi, mühendislik alanında UPSERT Şablonları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** UPSERT Şablonları akışını pratik yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 439, "no": "439", "cat": "İndeks & Performans", "name": "Senkron İndeks Türleri ve Algoritması", "desc": "güvenlik bağlamında İndeks Türleri ve için senkron bir algoritması. B-tree, hash, GIN ve bitmaps indekslerini doğru sorguda kullanma rehberi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["indeks", "B-tree", "GIN", "güvenlik", "senkron", "uzman"], "badge1": "Uzman", "content": "## İndeks Türleri\n```sql\n-- B-tree: varsayılan, =, <, > için\nCREATE INDEX idx_users_email ON users(email);\n\n-- Kısmi indeks: yalnızca belirli satırlar\nCREATE INDEX idx_active_users ON users(email) WHERE active = true;\n\n-- Bileşik indeks: sütun sırası önemli\nCREATE INDEX idx_orders_user_date ON orders(user_id, created_at DESC);\n\n-- GIN: JSONB, array, full-text\nCREATE INDEX idx_tags ON products USING GIN(tags);\n\n-- Partial indeks maliyetsiz satırları dışlar\n```\n\n## Uygulama Senaryosu (Senkron)\n\nBu algoritması, güvenlik alanında İndeks Türleri ve problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İndeks Türleri ve akışını senkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 440, "no": "440", "cat": "İndeks & Performans", "name": "Olay-Güdümlü EXPLAIN ANALYZE Okuma Kütüphanesi", "desc": "caching bağlamında EXPLAIN ANALYZE Okuma için olay-güdümlü bir kütüphanesi. PostgreSQL EXPLAIN ANALYZE çıktısını yorumlayarak sorgu optimizasyonu yapın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["EXPLAIN", "query plan", "optimizasyon", "caching", "olay-güdümlü", "uzman"], "badge1": "Uzman", "content": "## EXPLAIN ANALYZE\n```sql\nEXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT u.name, COUNT(o.id)\nFROM users u\nJOIN orders o ON u.id = o.user_id\nWHERE u.created_at > '2025-01-01'\nGROUP BY u.id;\n```\nOkuma:\n- `Seq Scan`: tablo taraması → indeks ekle.\n- `Index Scan`: indeks kullanılıyor ✓\n- `Hash Join` vs `Nested Loop`: satır sayısına göre değişir.\n- `actual rows`: tahminden büyük sapma → ANALYZE çalıştır.\n\n## Genişletilmiş Notlar (Olay-Güdümlü)\n\n- **Hedef Kitle:** Uzman seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde EXPLAIN ANALYZE Okuma senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde EXPLAIN ANALYZE Okuma işlemleri daha olay-güdümlü hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde EXPLAIN ANALYZE Okuma ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** EXPLAIN, query plan, optimizasyon\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 441, "no": "441", "cat": "Veri Modelleme", "name": "Pluggable Soft Delete Tasarımı Refactor Yöntemi", "desc": "şablon bağlamında Soft Delete Tasarımı için pluggable bir refactor yöntemi. Deleted_at ile kayıtları fiziksel silmeden arşivleyen soft delete kalıbı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["soft delete", "arşiv", "deleted_at", "şablon", "pluggable", "i̇leri"], "badge1": "İleri", "content": "## Soft Delete\n```sql\nALTER TABLE users ADD COLUMN deleted_at TIMESTAMPTZ;\n\n-- Silme\nUPDATE users SET deleted_at = NOW() WHERE id = 123;\n\n-- Aktif kayıtlar sorgusu\nSELECT * FROM users WHERE deleted_at IS NULL;\n\n-- View ile kolaylaştır\nCREATE VIEW active_users AS\n  SELECT * FROM users WHERE deleted_at IS NULL;\n\n-- PostgreSQL Row Level Security ile zorunlu filtre\nCREATE POLICY no_deleted ON users\n  USING (deleted_at IS NULL);\n```\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** İleri seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Soft Delete Tasarımı senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Soft Delete Tasarımı işlemleri daha pluggable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Soft Delete Tasarımı ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** soft delete, arşiv, deleted_at\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 442, "no": "442", "cat": "Veri Modelleme", "name": "Polyglot Event Sourcing Schema Rehberi", "desc": "caching bağlamında Event Sourcing Schema için polyglot bir rehberi. Veritabanı event sourcing için events tablosu ve projeksiyon kalıbı. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["event sourcing", "append-only", "projeksiyon", "caching", "polyglot", "orta"], "badge1": "Orta", "content": "## Event Sourcing Schema\n```sql\nCREATE TABLE events (\n  id BIGSERIAL PRIMARY KEY,\n  aggregate_type VARCHAR(100) NOT NULL,\n  aggregate_id UUID NOT NULL,\n  event_type VARCHAR(100) NOT NULL,\n  payload JSONB NOT NULL,\n  version INT NOT NULL,\n  occurred_at TIMESTAMPTZ DEFAULT NOW(),\n  UNIQUE (aggregate_id, version)\n);\n\n-- Projeksiyon (materialized view)\nCREATE TABLE user_projections AS\nSELECT aggregate_id AS user_id,\n  MAX(CASE WHEN event_type='NameChanged' THEN payload->>'name' END) AS name\nFROM events WHERE aggregate_type='User'\nGROUP BY aggregate_id;\n```\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** Orta seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Event Sourcing Schema senaryoları\n- **Avantajları:** Bu rehberi sayesinde Event Sourcing Schema işlemleri daha polyglot hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Event Sourcing Schema ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** event sourcing, append-only, projeksiyon\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 443, "no": "443", "cat": "NoSQL Kalıpları", "name": "Atomic MongoDB Aggregation Pipeline Yapısı", "desc": "gözlemlenebilirlik bağlamında MongoDB Aggregation Pipeline için atomic bir yapısı. MongoDB'nin $match, $group, $lookup, $unwind aşamalarını kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["MongoDB", "aggregation", "pipeline", "gözlemlenebilirlik", "atomic", "başlangıç"], "badge1": "Başlangıç", "content": "## Aggregation Pipeline\n```javascript\ndb.orders.aggregate([\n  { $match: { status: 'completed', date: { $gte: ISODate('2026-01-01') } } },\n  { $lookup: {\n      from: 'users',\n      localField: 'user_id',\n      foreignField: '_id',\n      as: 'user'\n  }},\n  { $unwind: '$user' },\n  { $group: {\n      _id: '$user.country',\n      total: { $sum: '$amount' },\n      count: { $sum: 1 }\n  }},\n  { $sort: { total: -1 } },\n  { $limit: 10 }\n]);\n```\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Başlangıç seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde MongoDB Aggregation Pipeline senaryoları\n- **Avantajları:** Bu yapısı sayesinde MongoDB Aggregation Pipeline işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde MongoDB Aggregation Pipeline ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** MongoDB, aggregation, pipeline\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 444, "no": "444", "cat": "NoSQL Kalıpları", "name": "Veri-Odaklı Redis Veri Yapıları Anlaşması", "desc": "API bağlamında Redis Veri Yapıları için veri-odaklı bir anlaşması. String, Hash, List, Set ve Sorted Set kullanım senaryoları ve komutları. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["Redis", "hash", "sorted set", "API", "veri-odaklı", "pro"], "badge1": "Pro", "content": "## Redis Yapıları\n```python\nimport redis\nr = redis.Redis()\n\n# Session (Hash)\nr.hset('session:abc', mapping={'user_id': 1, 'role': 'admin'})\nr.expire('session:abc', 3600)\n\n# Leaderboard (Sorted Set)\nr.zadd('leaderboard', {'user1': 1500, 'user2': 2000})\nrtop = r.zrevrange('leaderboard', 0, 9, withscores=True)\n\n# Rate limit (Incr + Expire)\ncount = r.incr('rate:user1')\nif count == 1: r.expire('rate:user1', 60)\nif count > 100: raise Exception('Rate limit')\n\n# Pub/Sub\npubsub = r.pubsub()\npubsub.subscribe('notifications')\n```\n\n## Uygulama Senaryosu (Veri-Odaklı)\n\nBu anlaşması, API alanında Redis Veri Yapıları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Redis Veri Yapıları akışını veri-odaklı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 445, "no": "445", "cat": "Migration & Yedek", "name": "Sıfır-Trust Alembic Migration Şablonu Rehberi", "desc": "akış bağlamında Alembic Migration Şablonu için sıfır-trust bir rehberi. SQLAlchemy Alembic ile veri tabanı şema değişikliklerini yönetin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["Alembic", "migration", "SQLAlchemy", "akış", "sıfır-trust", "i̇leri"], "badge1": "İleri", "content": "## Alembic Migration\n```python\n# alembic revision --autogenerate -m 'add_user_phone'\n\"\"\"add_user_phone\"\"\"\nfrom alembic import op\nimport sqlalchemy as sa\n\ndef upgrade():\n    op.add_column('users',\n        sa.Column('phone', sa.String(20), nullable=True)\n    )\n    op.create_index('ix_users_phone', 'users', ['phone'])\n\ndef downgrade():\n    op.drop_index('ix_users_phone', 'users')\n    op.drop_column('users', 'phone')\n```\nKomut: `alembic upgrade head` / `alembic downgrade -1`\n\n## Genişletilmiş Notlar (Sıfır-Trust)\n\n- **Hedef Kitle:** İleri seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Alembic Migration Şablonu senaryoları\n- **Avantajları:** Bu rehberi sayesinde Alembic Migration Şablonu işlemleri daha sıfır-trust hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Alembic Migration Şablonu ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** Alembic, migration, SQLAlchemy\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 446, "no": "446", "cat": "Migration & Yedek", "name": "Event-Sourced Zero-Downtime Migration Anlaşması", "desc": "mikroservis bağlamında Zero-Downtime Migration için event-sourced bir anlaşması. Büyük tablolarda sütun ekleme/ // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'dbvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──

    <div class="item-hdr">

        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
