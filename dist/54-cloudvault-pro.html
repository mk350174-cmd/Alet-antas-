<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080e;--bg2:#0a0c12;--bg3:#0e1016;--bg4:#12141a;
  --border:#16181e;--border2:#1e2026;--border3:#2a2c32;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#4a9eff;--primary2:#4a9eff;
  --primary-dim:#4a9eff15;--primary-glow:#4a9eff30;
  --accent:#a78bfa;--accent2:#a78bfa;
  --accent-dim:#a78bfa18;--accent-glow:#a78bfa30;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#4a9eff08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#a78bfa06 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a0c12 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#4a9eff0a 0%,#4a9eff03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #4a9eff30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#4a9eff03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#4a9eff06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#2c80e1);color:#06080e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #4a9eff20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #4a9eff35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a0c12,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#2c80e1);color:#06080e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #4a9eff20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #4a9eff35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">C</div>
  <div class="hero-eyebrow">Yazılım Mimarisi & DevOps · Alet Çantası</div>
  <h1 class="hero-title">Cloud<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Mimari maliyet optimizasyonu ve cloud-native yapılandırma promptları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>15</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Cloud ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">15</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">
    <div class="empty" id="emptyState">
      <div class="glyph">◈</div>
      <p>Sol taraftan bir öğe seç</p>

:\"http\",\n  \"direction\":\"out\"\n}]}\n```\nManaged Identity ile Azure servislerine şifresiz erişim.", "source": {"generated": true}}, {"id": 9, "no": "009", "cat": "Azure Mimarisi", "name": "AKS Cluster Konfigürasyonu", "desc": "Üretim için node pool, autoscaler ve monitoring eklenmiş AKS kurulumu.", "tags": ["aks", "kubernetes", "azure"], "badge1": "İleri", "content": "## AKS Kurulum\n```bash\naz aks create \\\n  --resource-group prod-rg \\\n  --name prod-cluster \\\n  --node-count 3 --min-count 2 --max-count 10 \\\n  --enable-cluster-autoscaler \\\n  --enable-managed-identity \\\n  --enable-addons monitoring\n```", "source": {"generated": true}}, {"id": 10, "no": "010", "cat": "Cloud Native Tasarım", "name": "12 Factor App Kontrol Listesi", "desc": "Buluta hazır uygulama için on iki faktör uyumluluk değerlendirmesi.", "tags": ["12 factor", "cloud native", "checklist"], "badge1": "Orta", "content": "## 12 Factor Kontrol\n1. Config: ortam değişkenlerinde mi?\n2. Backing services: URL ile mi bağlanıyor?\n3. Stateless: dosya sistemi durumu var mı?\n4. Disposability: hızlı başlayıp duruyorlar mı?\n5. Dev/prod eşliği: ortamlar ne kadar benzer?", "source": {"generated": true}}, {"id": 11, "no": "011", "cat": "Cloud Native Tasarım", "name": "Managed Identity ile Sıfır Sır", "desc": "Secret olmadan cloud servislerine erişmek için managed identity kullanımı.", "tags": ["managed identity", "sır yok", "güvenlik"], "badge1": "İleri", "content": "## Sıfır Sır Erişim\n1. Uygulama için managed/service identity etkinleştir.\n2. Hedef kaynağa IAM rolü ata.\n3. Kod içinde sabit şifre kaldır.\n4. SDK'nın credential chain'ini kullan (DefaultAzureCredential vb).", "source": {"generated": true}}, {"id": 12, "no": "012", "cat": "Çoklu Bulut", "name": "Çoklu Bulut Ağ Tasarımı", "desc": "AWS ve GCP/Azure arasında güvenli VPN veya peering mimarisi.", "tags": ["multi-cloud", "vpn", "peering"], "badge1": "İleri", "content": "## Çoklu Bulut Ağ\n1. Her bulutta VPC/VNet IP aralıklarını örtüş ughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** cost explorer, aws, maliyet\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 182, "no": "182", "cat": "Maliyet Optimizasyonu", "name": "Ölçeklenebilir Spot/Preemptible Instance Stratejisi Kalıbı", "desc": "güvenlik bağlamında Spot/Preemptible Instance Stratejisi için ölçeklenebilir bir kalıbı. Durumsuz iş yükleri için spot instance tasarrufu ve risk yönetimi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["spot", "preemptible", "tasarruf", "güvenlik", "ölçeklenebilir", "uzman"], "badge1": "Uzman", "content": "## Spot Stratejisi\n1. Stateless, yeniden başlatılabilir iş yüklerini belirle.\n2. Birden fazla instance tipi ve AZ'yi birleştir.\n3. Spot interruption handler ile graceful shutdown yaz.\n4. On-demand karışımı ile minimum SLA garantile.\n\n## Genişletilmiş Notlar (Ölçeklenebilir)\n\n- **Hedef Kitle:** Uzman seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Spot/Preemptible Instance Stratejisi senaryoları\n- **Avantajları:** Bu kalıbı sayesinde Spot/Preemptible Instance Stratejisi işlemleri daha ölçeklenebilir hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Spot/Preemptible Instance Stratejisi ihtiyacını analiz edin.\n  2. Bu kalıbı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** spot, preemptible, tasarruf\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 183, "no": "183", "cat": "Maliyet Optimizasyonu", "name": "Memory-Safe Rezerve Edilmiş Kapasite Modeli", "desc": "logging bağlamında Rezerve Edilmiş Kapasite için memory-safe bir modeli. 1 ve 3 yıllık reserved instance ROI hesaplama çerçevesi. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["reserved", "roi", "kapasite", "logging", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Reserved Instance ROI\n1. Baseline kullanım (sürekli çalışan) boyutunu belirle.\n2. 1/3 yıllık ön ödeme seçeneklerini karşılaştır.\n3. Break-even süresini hesapla.\n4. Kullanılmayan RI'ları marketplace'e sat.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu modeli, logging alanında Rezerve Edilmiş Kapasite problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Rezerve Edilmiş Kapasite akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 184, "no": "184", "cat": "AWS Mimarisi", "name": "Self-Healing VPC Three-Tier Mimarisi Optimizasyonu", "desc": "mikroservis bağlamında VPC Three-Tier Mimarisi için self-healing bir optimizasyonu. Public, private ve veri katmanlarını izole eden standart VPC tasarımı. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["vpc", "three-tier", "ağ", "mikroservis", "self-healing", "başlangıç"], "badge1": "Başlangıç", "content": "## Three-Tier VPC\n1. Public subnet: ALB, NAT Gateway.\n2. Private subnet: EC2/ECS uygulamaları.\n3. Isolated subnet: RDS, ElastiCache.\n4. Security Group'ları katmanlar arası sıkı tanımla.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu optimizasyonu, mikroservis alanında VPC Three-Tier Mimarisi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** VPC Three-Tier Mimarisi akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 185, "no": "185", "cat": "AWS Mimarisi", "name": "Serverless Lambda Serverless Şablonu Pratiği", "desc": "dağıtım bağlamında Lambda Serverless Şablonu için serverless bir pratiği. API Gateway + Lambda + DynamoDB serverless API şablonu. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["lambda", "serverless", "api gateway", "dağıtım", "orta"], "badge1": "Orta", "content": "## Serverless API\n1. API Gateway → Lambda entegrasyonu kur.\n2. Lambda handler'da cold start için bağlantı önbellekle.\n3. DynamoDB için single-table design değerlendir.\n4. Lambda Powertools ile yapılandırılmış log ve trace ekle.\n\n## Genişletilmiş Notlar (Serverless)\n\n- **Hedef Kitle:** Orta seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Lambda Serverless Şablonu senaryoları\n- **Avantajları:** Bu pratiği sayesinde Lambda Serverless Şablonu işlemleri daha serverless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- *  "resilient", "i̇leri"], "badge1": "İleri", "content": "## Azure Functions\n```json\n{\"bindings\":[{\n  \"authLevel\":\"function\",\n  \"type\":\"httpTrigger\",\n  \"direction\":\"in\",\n  \"methods\":[\"get\",\"post\"]\n},{\n  \"type\":\"http\",\n  \"direction\":\"out\"\n}]}\n```\nManaged Identity ile Azure servislerine şifresiz erişim.\n\n## Uygulama Senaryosu (Resilient)\n\nBu önerisi, API alanında Azure Functions Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Azure Functions Şablonu akışını resilient yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 189, "no": "189", "cat": "Azure Mimarisi", "name": "Pipeline AKS Cluster Konfigürasyonu Stratejisi", "desc": "veri bağlamında AKS Cluster Konfigürasyonu için pipeline bir stratejisi. Üretim için node pool, autoscaler ve monitoring eklenmiş AKS kurulumu. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["aks", "kubernetes", "azure", "veri", "pipeline", "pro"], "badge1": "Pro", "content": "## AKS Kurulum\n```bash\naz aks create \\\n  --resource-group prod-rg \\\n  --name prod-cluster \\\n  --node-count 3 --min-count 2 --max-count 10 \\\n  --enable-cluster-autoscaler \\\n  --enable-managed-identity \\\n  --enable-addons monitoring\n```\n\n## Genişletilmiş Notlar (Pipeline)\n\n- **Hedef Kitle:** Pro seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde AKS Cluster Konfigürasyonu senaryoları\n- **Avantajları:** Bu stratejisi sayesinde AKS Cluster ambda Serverless Şablonu Refactor Yöntemi", "desc": "mühendislik bağlamında Lambda Serverless Şablonu için yalın bir refactor yöntemi. API Gateway + Lambda + DynamoDB serverless API şablonu. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["lambda", "serverless", "api gateway", "mühendislik", "yalın", "uzman"], "badge1": "Uzman", "content": "## Serverless API\n1. API Gateway → Lambda entegrasyonu kur.\n2. Lambda handler'da cold start için bağlantı önbellekle.\n3. DynamoDB için single-table design değerlendir.\n4. Lambda Powertools ile yapılandırılmış log ve trace ekle.\n\n## Genişletilmiş Notlar (Yalın)\n\n- **Hedef Kitle:** Uzman seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Lambda Serverless Şablonu senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Lambda Serverless Şablonu işlemleri daha yalın hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Lambda Serverless Şablonu ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** lambda, serverless, api gateway\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 216, "no": "216", "cat": "GCP Mimarisi", "name": "DevOps-Ready Cloud Run Deployment Kuralı", "desc": "akış bağlamında Cloud Run Deployment için devops-ready bir kuralı. Otomatik ölçeklenen Cloud Run servisi için yapılandırma şablonu. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["cloud run", "gcp", "serverless", "akış", "devops-ready", "uzman"], "badge1": "Uzman" zlemlenebilirlik", "idempotent", "uzman"], "badge1": "Uzman", "content": "## Sıfır Sır Erişim\n1. Uygulama için managed/service identity etkinleştir.\n2. Hedef kaynağa IAM rolü ata.\n3. Kod içinde sabit şifre kaldır.\n4. SDK'nın credential chain'ini kullan (DefaultAzureCredential vb).\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Uzman seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Managed Identity ile senaryoları\n- **Avantajları:** Bu kalıbı sayesinde Managed Identity ile işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Managed Identity ile ihtiyacını analiz edin.\n  2. Bu kalıbı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** managed identity, sır yok, güvenlik\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 222, "no": "222", "cat": "Çoklu Bulut", "name": "Self-Healing Çoklu Bulut Ağ Stratejisi", "desc": "test bağlamında Çoklu Bulut Ağ için self-healing bir stratejisi. AWS ve GCP/Azure arasında güvenli VPN veya peering mimarisi. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["multi-cloud", "vpn", "peering", "test", "self-healing", "başlangıç"], "badge1": "Başlangıç", "content": "## Çoklu Bulut Ağ\n1. Her bulutta VPC/VNet IP aralıklarını örtüşmeyecek seç.\n2. IPSec VPN veya Cloud Interconnect kur.\n3. Merkezi DNS çözümlemesini yapılandır.\n4. Gecikme ve bant genişliği kısıtlarını belgele.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu stratejisi, test alanında Çoklu Bulut Ağ problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çoklu Bulut Ağ akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 223, "no": "223", "cat": "Maliyet Optimizasyonu", "name": "Idempotent Kullanılmayan Kaynak Temizliği Düzeni", "desc": "entegrasyon bağlamında Kullanılmayan Kaynak Temizliği için idempotent bir düzeni. Atıl EBS, EIP, eski snapshot gibi boşa harcanan kaynakları bulun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["atıl", "temizlik", "israf", "entegrasyon", "idempotent", "i̇leri"], "badge1": "İleri", "content": "## Atıl Kaynak Tespiti\n```bash\n# Bağlantısız EBS\naws ec2 describe-volumes --filters Name=status,Values=available\n# Kullanılmayan Elastic IP\naws ec2 describe-addresses --filters Name=domain,Values=vpc \\\n  --query 'Addresses[?AssociationId==null]'\n```\nAWS Trusted Advisor ücretsiz kontrolleri de çalıştır.\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** İleri seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Kullanılmayan Kaynak Temizliği senaryoları\n- **Avantajları:** Bu düzeni sayesinde Kullanılmayan Kaynak Temizliği işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Kullanılmayan Kaynak Temizliği ihtiyacını analiz 99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi CloudVault dokümantasyonu\n- GCP Mimarisi topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Uygulama Senaryosu (Stream Tabanlı)\n\nBu standartı, logging alanında Dayanıklı CloudVault Çerçevesi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Dayanıklı CloudVault Çerçevesi akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 241, "no": "241", "cat": "Maliyet Optimizasyonu", "name": "Headless AWS Cost Explorer Kuralı", "desc": "test bağlamında AWS Cost Explorer için headless bir kuralı. Servis ve etiket bazlı maliyet anomalilerini tespit eden sorgu kalıpları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["cost explorer", "aws", "maliyet", "test", "headless", "uzman"], "badge1": "Uzman", "content": "## Cost Explorer\n1. Önceki aya göre %20 artış gösteren servisleri filtrele.\n2. Etiket (proje/ekip) bazlı maliyet dökümünü çek.\n3. Kullanılmayan kaynak maliyetini (EBS snapshot, EIP) bul.\n4. Savings Plan önerisini değerlendir.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Uzman seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde AWS Cost Explorer senaryoları\n- **Avantajları:** Bu kuralı sayesinde AWS Cost Explorer işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans dü t": "Maliyet Optimizasyonu", "name": "Kullanıcı-Merkezli Rezerve Edilmiş Kapasite Kütüphanesi", "desc": "logging bağlamında Rezerve Edilmiş Kapasite için kullanıcı-merkezli bir kütüphanesi. 1 ve 3 yıllık reserved instance ROI hesaplama çerçevesi. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["reserved", "roi", "kapasite", "logging", "kullanıcı-merkezli", "başlangıç"], "badge1": "Başlangıç", "content": "## Reserved Instance ROI\n1. Baseline kullanım (sürekli çalışan) boyutunu belirle.\n2. 1/3 yıllık ön ödeme seçeneklerini karşılaştır.\n3. Break-even süresini hesapla.\n4. Kullanılmayan RI'ları marketplace'e sat.\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu kütüphanesi, logging alanında Rezerve Edilmiş Kapasite problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Rezerve Edilmiş Kapasite akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 274, "no": "274", "cat": "AWS Mimarisi", "name": "Reaktif VPC Three-Tier Mimarisi Düzeneği", "desc": "veri bağlamında VPC Three-Tier Mimarisi için reaktif bir düzeneği. Public, private ve veri katmanlarını izole eden standart VPC tasarımı. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["vpc", "three-tier", "ağ", "veri", "reaktif", "pro"], "badge1": "Pro", "content": "## Three-Tier VPC\n1. Public subnet: ALB, NAT Gateway.\n2. Private subnet: EC2/ECS uygulamaları.\n3. Isolated subnet: RDS, ElastiCache.\n4. Security G ": "303", "cat": "Maliyet Optimizasyonu", "name": "Otonom Rezerve Edilmiş Kapasite Sistemi", "desc": "yapay zeka bağlamında Rezerve Edilmiş Kapasite için otonom bir sistemi. 1 ve 3 yıllık reserved instance ROI hesaplama çerçevesi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["reserved", "roi", "kapasite", "yapay zeka", "otonom", "i̇leri"], "badge1": "İleri", "content": "## Reserved Instance ROI\n1. Baseline kullanım (sürekli çalışan) boyutunu belirle.\n2. 1/3 yıllık ön ödeme seçeneklerini karşılaştır.\n3. Break-even süresini hesapla.\n4. Kullanılmayan RI'ları marketplace'e sat.\n\n## Uygulama Senaryosu (Otonom)\n\nBu sistemi, yapay zeka alanında Rezerve Edilmiş Kapasite problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Rezerve Edilmiş Kapasite akışını otonom yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 304, "no": "304", "cat": "AWS Mimarisi", "name": "Edge-Optimize VPC Three-Tier Mimarisi Şablonu", "desc": "arayüz bağlamında VPC Three-Tier Mimarisi için edge-optimize bir şablonu. Public, private ve veri katmanlarını izole eden standart VPC tasarımı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["vpc", "three-tier", "ağ", "arayüz", "edge-optimize", "uzman"], "badge1": "Uzman", "content": "## Three-Tier VPC\n1. Public subnet: ALB, NAT Gateway.\n2. Private subnet: EC2/ECS uygulamaları.\n3. Isolated subnet: RDS, ElastiCache.\n4. Security Group'ları katmanlar arası sıkı tan , throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** cloud run, gcp, serverless\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 307, "no": "307", "cat": "GCP Mimarisi", "name": "AI-Augmented BigQuery Maliyet Kontrolü Rehberi", "desc": "arayüz bağlamında BigQuery Maliyet Kontrolü için ai-augmented bir rehberi. Sorgu maliyetini tahmin etme ve veri tarama limitlerini ayarlama. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["bigquery", "maliyet", "sorgu", "arayüz", "ai-augmented", "pro"], "badge1": "Pro", "content": "## BigQuery Maliyet\n1. `--dry-run` ile sorgu maliyetini önce tahmin et.\n2. Tablo partisyonlaması ve kümeleme (clustering) uygula.\n3. Kullanıcı başına günlük tarama limiti ayarla.\n4. BI Engine ile tekrar sorgularda tasarruf yap.\n\n## Genişletilmiş Notlar (AI-Augmented)\n\n- **Hedef Kitle:** Pro seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde BigQuery Maliyet Kontrolü senaryoları\n- **Avantajları:** Bu rehberi sayesinde BigQuery Maliyet Kontrolü işlemleri daha ai-augmented hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde BigQuery Maliyet Kontrolü ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** bigquery, maliyet, sorgu\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 308, "no": "308", "cat": "Azure Mimarisi", "name": "Memory-Safe Azure Functions Şablonu Anlaşması", "desc": "yapay zeka bağlamında Azure Functions Şablonu için memory-safe bir anlaşması. HTTP trigger ile başlayan Azure Function deployment konfigürasyonu. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["azure functions", "serverless", "http", "yapay zeka", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Azure Functions\n```json\n{\"bindings\":[{\n  \"authLevel\":\"function\",\n  \"type\":\"httpTrigger\",\n  \"direction\":\"in\",\n  \"methods\":[\"get\",\"post\"]\n},{\n  \"type\":\"http\",\n  \"direction\":\"out\"\n}]}\n```\nManaged Identity ile Azure servislerine şifresiz erişim.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu anlaşması, yapay zeka alanında Azure Functions Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Azure Functions Şablonu akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 309, "no": "309", "cat": "Azure Mimarisi", "name": "Type-Safe AKS Cluster Konfigürasyonu Düzeni", "desc": "performans bağlamında AKS Cluster Konfigürasyonu için type-safe bir düzeni. Üretim için node pool, autoscaler ve monitoring eklenmiş AKS kurulumu. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["aks", "kubernetes", "azure", "performans", "type-safe", "uzman"], "badge1": "Uzman", "content": "## AKS Kurulum\n```bash\naz aks create \\\n  --resource-group prod-rg \\\n  --n 400"}}, {"id": 312, "no": "312", "cat": "Çoklu Bulut", "name": "Asenkron Çoklu Bulut Ağ Tasarımı", "desc": "mimari bağlamında Çoklu Bulut Ağ için asenkron bir tasarımı. AWS ve GCP/Azure arasında güvenli VPN veya peering mimarisi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["multi-cloud", "vpn", "peering", "mimari", "asenkron", "i̇leri"], "badge1": "İleri", "content": "## Çoklu Bulut Ağ\n1. Her bulutta VPC/VNet IP aralıklarını örtüşmeyecek seç.\n2. IPSec VPN veya Cloud Interconnect kur.\n3. Merkezi DNS çözümlemesini yapılandır.\n4. Gecikme ve bant genişliği kısıtlarını belgele.\n\n## Uygulama Senaryosu (Asenkron)\n\nBu tasarımı, mimari alanında Çoklu Bulut Ağ problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çoklu Bulut Ağ akışını asenkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 313, "no": "313", "cat": "Maliyet Optimizasyonu", "name": "Memory-Safe Kullanılmayan Kaynak Temizliği Kuralı", "desc": "şablon bağlamında Kullanılmayan Kaynak Temizliği için memory-safe bir kuralı. Atıl EBS, EIP, eski snapshot gibi boşa harcanan kaynakları bulun. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["atıl", "temizlik", "israf", "şablon", "memory-safe", "pro"], "badge1": "Pro", "content": "## Atıl Kaynak Tespiti\n```bash\n# Bağlantısız EBS\naws ec2 describe-volumes --filters Name=status,Values=available\n# Kullanılmayan Elastic IP\naws ec2 describe-addresses --filters Name=domain,Values=vpc \\\n  --query 'Addresses[?AssociationId==null]'\n```\nAWS Trusted Advisor ücretsiz kontrolleri de çalıştır.\n\n## Genişletilmiş Notlar (Memory-Safe)\n\n- **Hedef Kitle:** Pro seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Kullanılmayan Kaynak Temizliği senaryoları\n- **Avantajları:** Bu kuralı sayesinde Kullanılmayan Kaynak Temizliği işlemleri daha memory-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Kullanılmayan Kaynak Temizliği ihtiyacını analiz edin.\n  2. Bu kuralı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** atıl, temizlik, israf\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 314, "no": "314", "cat": "Cloud Native Tasarım", "name": "Layered Observability Üçlüsü Mimarisi Yönergesi", "desc": "mühendislik bağlamında Observability Üçlüsü Mimarisi için layered bir yönergesi. Metrik, log ve trace'i birbirine bağlayan gözlemlenebilirlik altyapısı. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["observability", "trace", "metrik", "mühendislik", "layered", "orta"], "badge1": "Orta", "content": "## Observability Üçlüsü\n1. Metrikler: Prometheus + Grafana.\n2. Loglar: Loki veya ELK.\n3. Trace: Jaeger veya Tempo.\n4. OpenTelemetry SDK ile üçünü aynı anda emit et.\n\n## Genişletilmiş Notlar (Layered)\n\n- **Hedef Kitle:** Orta seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Observability Üçlüsü Mimarisi senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Observability Üçlüsü Mimarisi işlemleri daha layered hale 0 rps |\n| Uptime | %99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi CloudVault dokümantasyonu\n- GCP Mimarisi topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Uygulama Senaryosu (Pratik)\n\nBu refactor yöntemi, dağıtım alanında Dayanıklı CloudVault Çerçevesi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Dayanıklı CloudVault Çerçevesi akışını pratik yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 361, "no": "361", "cat": "Maliyet Optimizasyonu", "name": "Self-Healing AWS Cost Explorer Akışı", "desc": "test bağlamında AWS Cost Explorer için self-healing bir akışı. Servis ve etiket bazlı maliyet anomalilerini tespit eden sorgu kalıpları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["cost explorer", "aws", "maliyet", "test", "self-healing", "uzman"], "badge1": "Uzman", "content": "## Cost Explorer\n1. Önceki aya göre %20 artış gösteren servisleri filtrele.\n2. Etiket (proje/ekip) bazlı maliyet dökümünü çek.\n3. Kullanılmayan kaynak maliyetini (EBS snapshot, EIP) bul.\n4. Savings Plan önerisini değerlendir.\n\n## Genişletilmiş Notlar (Self-Healing)\n\n- **Hedef Kitle:** Uzman seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde AWS Cost Explorer senaryoları\n- **Avantajları:** Bu akışı sayesinde AWS Cost Explorer işlemleri daha self-healing hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kul lleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 363, "no": "363", "cat": "Maliyet Optimizasyonu", "name": "Edge-Optimize Rezerve Edilmiş Kapasite Kütüphanesi", "desc": "veri bağlamında Rezerve Edilmiş Kapasite için edge-optimize bir kütüphanesi. 1 ve 3 yıllık reserved instance ROI hesaplama çerçevesi. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["reserved", "roi", "kapasite", "veri", "edge-optimize", "başlangıç"], "badge1": "Başlangıç", "content": "## Reserved Instance ROI\n1. Baseline kullanım (sürekli çalışan) boyutunu belirle.\n2. 1/3 yıllık ön ödeme seçeneklerini karşılaştır.\n3. Break-even süresini hesapla.\n4. Kullanılmayan RI'ları marketplace'e sat.\n\n## Genişletilmiş Notlar (Edge-Optimize)\n\n- **Hedef Kitle:** Başlangıç seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Rezerve Edilmiş Kapasite senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Rezerve Edilmiş Kapasite işlemleri daha edge-optimize hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Rezerve Edilmiş Kapasite ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** reserved, roi, kapasite\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 364, "no": "364", "cat": "AWS Mimarisi", "name": "Event-Sourced VPC Three-Tier Mimarisi Tasarımı", "desc": "CI/CD bağlamında VPC Three-Tier Mimarisi için event-sourced bir tasarımı. Public, private ve veri katmanlarını izole eden standart VPC tasarımı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["vpc", "three-tier", "ağ", "CI/CD", "event-sourced", "i̇leri"], "badge1": "İleri", "content": "## Three-Tier VPC\n1. Public subnet: ALB, NAT Gateway.\n2. Private subnet: EC2/ECS uygulamaları.\n3. Isolated subnet: RDS, ElastiCache.\n4. Security Group'ları katmanlar arası sıkı tanımla.\n\n## Uygulama Senaryosu (Event-Sourced)\n\nBu tasarımı, CI/CD alanında VPC Three-Tier Mimarisi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** VPC Three-Tier Mimarisi akışını event-sourced yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 365, "no": "365", "cat": "AWS Mimarisi", "name": "Dağıtık Lambda Serverless Şablonu Standartı", "desc": "arayüz bağlamında Lambda Serverless Şablonu için dağıtık bir standartı. API Gateway + Lambda + DynamoDB serverless API şablonu. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["lambda", "serverless", "api gateway", "arayüz", "dağıtık", "pro"], "badge1": "Pro", "content": "## Serverless API\n1. API Gateway → Lambda entegrasyonu kur.\n2. Lambda handler'da cold start için bağlantı önbellekle.\n3. DynamoDB için single-table design değerlendir.\n4. Lambda Powertools ile yapılandırılmış log ve trace ekle.\n\n## Genişletilmiş Notlar (Dağıtık)\n\n- **Hedef Kitle:** Pro seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Lambda Serverless Şablonu senaryol AT Gateway.\n2. Private subnet: EC2/ECS uygulamaları.\n3. Isolated subnet: RDS, ElastiCache.\n4. Security Group'ları katmanlar arası sıkı tanımla.\n\n## Uygulama Senaryosu (Resilient)\n\nBu yönergesi, entegrasyon alanında VPC Three-Tier Mimarisi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** VPC Three-Tier Mimarisi akışını resilient yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 395, "no": "395", "cat": "AWS Mimarisi", "name": "Type-Safe Lambda Serverless Şablonu Anlaşması", "desc": "mühendislik bağlamında Lambda Serverless Şablonu için type-safe bir anlaşması. API Gateway + Lambda + DynamoDB serverless API şablonu. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["lambda", "serverless", "api gateway", "mühendislik", "type-safe", "pro"], "badge1": "Pro", "content": "## Serverless API\n1. API Gateway → Lambda entegrasyonu kur.\n2. Lambda handler'da cold start için bağlantı önbellekle.\n3. DynamoDB için single-table design değerlendir.\n4. Lambda Powertools ile yapılandırılmış log ve trace ekle.\n\n## Genişletilmiş Notlar (Type-Safe)\n\n- **Hedef Kitle:** Pro seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Lambda Serverless Şablonu senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Lambda Serverless Şablonu işlemleri daha type-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı vey alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "cloud", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Cloud\n\nAşağıda Cloud alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** AWS/GCP/Azure architecture konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** AWS/GCP/Azure architecture alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** AWS/GCP/Azure architecture için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Cloud", "desc": "Cloud alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "cloud", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Cloud\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Cloud ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) AWS/GCP/Azure architecture ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Cloud", "desc": "Cloud alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "cloud", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Cloud Mentörü\n\n**Kimsin:** 15+ yıl Cloud deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** AWS/GCP/Azure architecture\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün Cloud ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — Cloud", "desc": "Cloud alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "cloud", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — Cloud\n\nCloud alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"Cloud\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "Maliyet Optimizasyonu", "name": "Type-Safe AWS Cost Explorer Yönergesi", "desc": "monitoring bağlamında AWS Cost Explorer için type-safe bir yönergesi. Servis ve etiket bazlı maliyet anomalilerini tespit eden sorgu kalıpları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["cost explorer", "aws", "maliyet", "monitoring", "type-safe", "i̇leri"], "badge1": "İleri", "content": "## Cost Explorer\n1. Önceki aya göre %20 artış gösteren servisleri filtrele.\n2. Etiket (proje/ekip) bazlı maliyet dökümünü çek.\n3. Kullanılmayan kaynak maliyetini (EBS snapshot, EIP) bul.\n4. Savings Plan önerisini değerlendir.\n\n## Genişletilmiş Notlar (Type-Safe)\n\n- **Hedef Kitle:** İleri seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde AWS Cost Explorer senaryoları\n- **Avantajları:** Bu yönergesi sayesinde AWS Cost Explorer işlemleri daha type-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık nında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 408, "no": "408", "cat": "Maliyet Optimizasyonu", "name": "Sezgisel Rezerve Edilmiş Kapasite Kütüphanesi", "desc": "akış bağlamında Rezerve Edilmiş Kapasite için sezgisel bir kütüphanesi. 1 ve 3 yıllık reserved instance ROI hesaplama çerçevesi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["reserved", "roi", "kapasite", "akış", "sezgisel", "uzman"], "badge1": "Uzman", "content": "## Reserved Instance ROI\n1. Baseline kullanım (sürekli çalışan) boyutunu belirle.\n2. 1/3 yıllık ön ödeme seçeneklerini karşılaştır.\n3. Break-even süresini hesapla.\n4. Kullanılmayan RI'ları marketplace'e sat.\n\n## Genişletilmiş Notlar (Sezgisel)\n\n- **Hedef Kitle:** Uzman seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Rezerve Edilmiş Kapasite senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Rezerve Edilmiş Kapasite işlemleri daha sezgisel hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Rezerve Edilmiş Kapasite ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** reserved, roi, kapasite\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 409, "no": "409", "cat": "AWS Mimarisi", "name": "Federe VPC Three-Tier Mimarisi Düzeneği", "desc": "mikroservis bağlamında VPC Three-Tier Mimarisi için federe bir düzeneği. Public, private ve veri katmanlarını izole eden standart VPC tasarımı. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["vpc", "three-tier", "ağ", "mikroservis", "federe", "pro"], "badge1": "Pro", "content": "## Three-Tier VPC\n1. Public subnet: ALB, NAT Gateway.\n2. Private subnet: EC2/ECS uygulamaları.\n3. Isolated subnet: RDS, ElastiCache.\n4. Security Group'ları katmanlar arası sıkı tanımla.\n\n## Genişletilmiş Notlar (Federe)\n\n- **Hedef Kitle:** Pro seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde VPC Three-Tier Mimarisi senaryoları\n- **Avantajları:** Bu düzeneği sayesinde VPC Three-Tier Mimarisi işlemleri daha federe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde VPC Three-Tier Mimarisi ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** vpc, three-tier, ağ\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 410, "no": "410", "cat": "AWS Mimarisi", "name": "Sezgisel Lambda Serverless Şablonu Modeli", "desc": "arayüz bağlamında Lambda Serverless Şablonu için sezgisel bir modeli. API Gateway + Lambda + DynamoDB serverless API şablonu. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["lambda", "serverless", "api gateway", "arayüz", "sezgisel", "i̇leri"], "badge1": "İleri", "content": "## Serverless API\n1. API Gateway → Lambda entegrasyonu kur.\n2. Lambda handler'da cold start için bağlantı önbellekle.\n3. DynamoDB için single-table design değerlendir.\n4. Lambda Powertools ile yapılandırılmış log ve trace ekle.\n\n## Genişletilmiş Notlar (Sezgisel)\n\n- **Hedef Kitle:** İleri seviye arayüz kul ugmented)\n\nBu pratiği, monitoring alanında 12 Factor App problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** 12 Factor App akışını ai-augmented yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 416, "no": "416", "cat": "Cloud Native Tasarım", "name": "Sezgisel Managed Identity ile Kütüphanesi", "desc": "mühendislik bağlamında Managed Identity ile için sezgisel bir kütüphanesi. Secret olmadan cloud servislerine erişmek için managed identity kullanımı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["managed identity", "sır yok", "güvenlik", "mühendislik", "sezgisel", "uzman"], "badge1": "Uzman", "content": "## Sıfır Sır Erişim\n1. Uygulama için managed/service identity etkinleştir.\n2. Hedef kaynağa IAM rolü ata.\n3. Kod içinde sabit şifre kaldır.\n4. SDK'nın credential chain'ini kullan (DefaultAzureCredential vb).\n\n## Genişletilmiş Notlar (Sezgisel)\n\n- **Hedef Kitle:** Uzman seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde Managed Identity ile senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde Managed Identity ile işlemleri daha sezgisel hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde Managed Identity ile ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin. r.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata oranı azalır.\n\n### Adım Adım Uygulama\n\n1. **Analiz:** Mevcut gcp mimarisi yapınızdaki cloudvault ihtiyaçlarını listele.\n2. **Tasarım:** Bu çerçevesi için başlangıç seviyede bir taslak çıkar.\n3. **Pilot:** Küçük bir kapsamda dene, metrik topla.\n4. **Geri Bildirim:** Ekip ve kullanıcı geri bildirimlerini değerlendir.\n5. **Rollout:** Kademeli olarak tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokümantasyon: ekip dışı kullanıcılar zorlanır.\n- Metrik eksikliği: başarıyı ölçemezsen iyileştiremezsin.\n- Eskimiş bağımlılıklar: güvenlik açıklarına davetiye.\n\n### Anahtar Metrikler\n\n| Metrik | Hedef | Kritik Eşik |\n|---|---|---|\n| Latency (p95) | < 200ms | > 500ms |\n| Hata oranı | < %0.1 | > %1 |\n| Throughput | > 1000 rps | < 500 rps |\n| Uptime | %99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi CloudVault dokümantasyonu\n- GCP Mimarisi topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Uygulama Senaryosu (Sıfır-Trust)\n\nBu önerisi, veri alanında Dayanıklı CloudVault Çerçevesi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Dayanıklı CloudVault Çerçevesi akışını sıfır-trust yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 180, "wave": "v3-450-final"}}, {"id": 436, "no": "436", "cat": "Maliyet Optimizasyonu", "name": "Self-Healing AWS Cost Explorer Yönergesi", "desc": "arayüz bağlamında AWS Cost Explorer için self-healing bir yönergesi. Servis ve etiket bazlı maliyet anomalilerini tespit eden sorgu kalıpları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["cost explorer", "aws", "maliyet", "arayüz", "self-healing", "i̇leri"], "badge1": "İleri", "content": "## Cost Explorer\n1. Önceki aya göre %20 artış gösteren servisleri filtrele.\n2. Etiket (proje/ekip) bazlı maliyet dökümünü çek.\n3. Kullanılmayan kaynak maliyetini (EBS snapshot, EIP) bul.\n4. Savings Plan önerisini değerlendir.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu yönergesi, arayüz alanında AWS Cost Explorer problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** AWS Cost Explorer akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 437, "no": "437", "cat": "Maliyet Optimizasyonu", "name": "Reaktif Spot/Preemptible Instance Stratejisi Akışı", "desc": "dağıtım bağlamında Spot/Preemptible Instance Stratejisi için reaktif bir akışı. Durumsuz iş yükleri için spot instance tasarrufu ve risk yönetimi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["spot", "preemptible", "tasarruf", "dağıtım", "reaktif", "i̇leri"], "badge1": "İleri", "content": "## Spot Stratejisi\n1. Stateless, yeniden başlatılabilir iş yüklerini belirle.\n2. Birden fazla instance tipi ve AZ'yi birleştir.\n3. Spot interruption handler ile graceful shutdown yaz.\n4. On-demand karışımı ile minimum SLA garantile.\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** İleri seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Spot/Preemptible Instance Stratejisi senaryoları\n- **Avantajları:** Bu akışı sayesinde Spot/Preemptible Instance Stratejisi işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Spot/Preemptible Instance Stratejisi ihtiyacını analiz edin.\n  2. Bu akışı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** spot, preemptible, tasarruf\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 438, "no": "438", "cat": "Maliyet Optimizasyonu", "name": "Edge-Optimize Rezerve Edilmiş Kapasite Sistemi", "desc": "API bağlamında Rezerve Edilmiş Kapasite için edge-optimize bir sistemi. 1 ve 3 yıllık reserved instance ROI hesaplama çerçevesi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["reserved", "roi", "kapasite", "API", "edge-optimize", "orta"], "badge1": "Orta", "content": "## Reserved Instance ROI\n1. Baseline kullanım (sürekli çalışan) boyutunu belirle.\n2. 1/3 yıllık ön ödeme seçeneklerini karşılaştır.\n3. Break-even süresini hesapla.\n4. Kullanılmayan RI'ları marketplace'e sat.\n\n## Uygulama Senaryosu (Edge-Optimize)\n\nBu sistemi, API alanında Rezerve Edilmiş Kapasite problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Rezerve Edilmiş Kapasite akışını edge-optimize yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 439, "no": "439", "cat": "AWS Mimarisi", "name": "Idempotent VPC Three-Tier Mimarisi Pratiği", "desc": "CI/CD bağlamında VPC Three-Tier Mimarisi için idempotent bir pratiği. Public, private ve veri katmanlarını izole eden standart VPC tasarımı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["vpc", "three-tier", "ağ", "CI/CD", "idempotent", "i̇leri"], "badge1": "İleri", "content": "## Three-Tier VPC\n1. Public subnet: ALB, NAT Gateway.\n2. Private subnet: EC2/ECS uygulamaları.\n3. Isolated subnet: RDS, ElastiCache.\n4. Security Group'ları katmanlar arası sıkı tanımla.\n\n## Uygulama Senaryosu (Idempotent)\n\nBu pratiği, CI/CD alanında VPC Three-Tier Mimarisi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** VPC Three-Tier Mimarisi akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 440, "no": "440", "cat": "AWS Mimarisi", "name": "Headless Lambda Serverless Şablonu Anlaşması", "de
