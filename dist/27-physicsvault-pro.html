<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">P</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Physics<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Özel fizik motoru çarpışma testleri için vektör hesabı ve optimizasyon algoritmaları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>20</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Physics ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">20</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

const ITEMS = [{"id": 1, "no": "001", "cat": "Vektör ve Matris İşlemleri", "name": "Vektör Nokta Çarpımı", "desc": "İki vektör arasındaki açıyı veya yansımayı bulmak için nokta çarpımını kullanın.", "tags": ["vektör", "matematik", "geometri"], "badge1": "Başlangıç", "content": "## Nokta Çarpımı Hesaplama\n1. İki vektör V1(x1, y1, z1) ve V2(x2, y2, z2) tanımlayın.\n2. Nokta çarpımını (V1 ⋅ V2) = (x1*x2) + (y1*y2) + (z1*z2) formülüyle hesaplayın.\n3. Sonuç, vektörlerin göreceli yönü hakkında bilgi verir.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 2, "no": "002", "cat": "Vektör ve Matris İşlemleri", "name": "Vektör Çapraz Çarpımı", "desc": "İki vektöre dik bir vektör oluşturmak için çapraz çarpımını kullanın.", "tags": ["vektör", "normal", "yön"], "badge1": "Başlangıç", "content": "## Çapraz Çarpım Uygulama\n1. V1(x1, y1, z1) ve V2(x2, y2, z2) vektörlerini belirleyin.\n2. Çapraz çarpımı V1 x V2 = (y1z2 - z1y2, z1x2 - x1z2, x1y2 - y1x2) formülüyle hesaplayın.\n3. Sonuç vektörü, her iki orijinal vektöre de diktir.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 3, "no": "003", "cat": "Vektör ve Matris İşlemleri", "name": "Vektör Normalizasyonu", "desc": "Bir vektörün yönünü koruyarak uzunluğunu 1'e ayarlamak için normalleştirin.", "tags": ["birim vektör", "yön", "uzunluk"], "badge1": "Başlangıç", "content": "## Vektörü Normalleştirme\n1. Normalleştirilecek V(x, y, z) vektörünü alın.\n2. Vektörün uzunluğunu (magnitude) ||V|| = sqrt(x^2 + y^2 + z^2) ile bulun.\n3. Her bileşeni uzunluğa bölerek V_normalized = (x/||V||, y/||V||, z/||V||) elde edin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 4, "no": "004", "cat": "Vektör ve Matris İşlemleri", "name": "Dönüşüm Matrisi Oluşturma", "desc": "Bir objenin konumu, dönüşü ve ölçeği için tek bir matris oluşturun.", "tags": ["matris", "transformasyon", "model"], "badge1": "Orta", "content": "## Model Matrisi Oluşturma\n1. Birim matrisle başlayın.\n2. Ölçeklendirme (scale) matrisini uygulayın.\n3. Döndürme (rotation) matrisini (genellikle quaternion'dan) uygulayın.\n4. Öteleme (translation) matrisini uygulayın.\n5. Sonuç, dünya uzayında objenin tam dönüşümüdür.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 5, "no": "005", "cat": "Çarpışma Tespiti", "name": "AABB Çarpışma Testi", "desc": "Axis-Aligned Bounding Box (AABB) kullanarak hızlı ve basit çarpışma testi yapın.", "tags": ["çarpışma", "AABB", "kutu"], "badge1": "Başlangıç", "content": "## AABB Çarpışma Algoritması\n1. İki AABB'nin minimum ve maksimum x, y, z koordinatlarını belirleyin.\n2. Çarpışma var mı kontrol edin: (A.minX < B.maxX && A.maxX > B.minX) ve aynı şekilde y ve z eksenleri için.\n3. Tüm eksenlerde örtüşme varsa çarpışma vardır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 6, "no": "006", "cat": "Çarpışma Tespiti", "name": "Küre-Küre Çarpışma", "desc": "İki kürenin merkezleri arası mesafeyi karşılaştırarak çarpışma tespiti yapın.", "tags": ["küre", "çarpışma", "geometri"], "badge1": "Başlangıç", "content": "## Küre Çarpışma Kontrolü\n1. Küre1'in merkezi C1 ve yarıçapı R1'i, Küre2'nin merkezi C2 ve yarıçapı R2'yi alın.\n2. İki merkez arasındaki mesafeyi (d) hesaplayın: d = ||C1 - C2||.\n3. Eğer d <= (R1 + R2) ise küreler çarpışmaktadır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 7, "no": "007", "cat": "Çarpışma Tespiti", "name": "Ray-AABB Kesişimi", "desc": "Bir ışının AABB ile kesişip kesişmediğini ve kesişme noktasını bulun.", "tags": ["ışın", "kesişim", "geometri"], "badge1": "Orta", "content": "## Ray-AABB Kesişim Algoritması\n1. Işın başlangıç noktası P ve yönü D'yi, AABB'nin min/max köşelerini alın.\n2. Her eksen için kesişim parametrelerini (t_min, t_max) hesaplayın.\n3. Tüm eksenlerin [t_min, t_max] aralıklarının kesişimini bulun.\n4. Kesişim boş değilse ve t_min < t_max ise kesişim vardır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 8, "no": "008", "cat": "Çarpışma Tespiti", "name": "OBB Çarpışma Testi", "desc": "Döndürülmüş Sınır Kutuları (OBB) kullanarak daha doğru çarpışma tespiti yapın.", "tags": ["OBB", "çarpışma", "SAT"], "badge1": "İleri", "content": "## OBB-OBB Çarpışma (SAT)\n1. Ayrılabilir Eksen Teoremi (SAT) prensiplerini uygulayın.\n2. İki OBB'nin tüm yüzey normalleri ve kenar çiftleri için potansiyel ayrılma eksenlerini belirleyin.\n3. Her eksende iki OBB'nin projeksiyonlarının çakışıp çakışmadığını kontrol edin.\n4. Tüm eksenlerde çakışma varsa çarpışma vardır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 9, "no": "009", "cat": "Fizik Motoru Optimizasyonu", "name": "Geniş Faz Optimizasyonu", "desc": "Gereksiz dar faz çarpışma kontrollerini azaltmak için geniş faz algoritmaları kullanın.", "tags": ["optimizasyon", "geniş faz", "performans"], "badge1": "Orta", "content": "## Geniş Faz Stratejileri\n1. Bölgesel Yapılar: Bounding Volume Hiyerarşileri (BVH) veya Uzaysal Bölümleme (Octrees, Grids) kullanın.\n2. Hareketli Objeler: Potansiyel çarpışan çiftleri belirlemek için sweep-and-prune algoritmasını uygulayın.\n3. Yalnızca yakın objeler için dar faz kontrolü yapın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 10, "no": "010", "cat": "Fizik Motoru Optimizasyonu", "name": "Dar Faz Optimizasyonu", "desc": "Doğru çarpışma noktalarını ve normallerini verimli bir şekilde hesaplayın.", "tags": ["optimizasyon", "dar faz", "hassasiyet"], "badge1": "Orta", "content": "## Dar Faz Algoritma Seçimi\n1. Basit şekiller için (küre, AABB) analitik çözümler kullanın.\n2. Karmaşık şekiller için GJK/EPA gibi yinelemeli algoritmaları tercih edin.\n3. Çarpışma bilgilerini (nokta, normal, derinlik) doğru bir şekilde elde edin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 11, "no": "011", "cat": "Fizik Motoru Optimizasyonu", "name": "Çarpışma Katmanları", "desc": "Hangi nesnelerin birbiriyle etkileşime gireceğini kontrol ederek performansı artırın.", "tags": ["katmanlar", "filtreleme", "performans"], "badge1": "Başlangıç", "content": "## Çarpışma Katmanları Kurulumu\n1. Her fizik objesine bir katman ID'si veya bitmask atayın.\n2. Hangi katmanların birbiriyle çarpışacağını belirleyen bir matris veya kural seti oluşturun.\n3. Çarpışma testi sırasında yalnızca eşleşen katmanlara sahip objeleri kontrol edin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 12, "no": "012", "cat": "Fizik Motoru Optimizasyonu", "name": "Veri Yapıları Optimizasyonu", "desc": "Fizik verilerini bellekte verimli bir şekilde depolayarak erişim hızını artırın.", "tags": ["veri", "bellek", "CACHE"], "badge1": "İleri", "content": "## Bellek Dostu Yapılar\n1. Dizi tabanlı (Array of Structs) yerine Yapı tabanlı Diziler (Struct of Arrays) kullanmayı düşünün.\n2. Bağlantılı listelerden kaçının, bitişik bellek bölgelerini tercih edin.\n3. Çarpışma çiftlerini depolamak için hash tabloları veya ikili ağaçlar kullanın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 13, "no": "013", "cat": "Katı Cisim Fiziği", "name": "Euler Entegrasyonu", "desc": "Katı cisimlerin hareketini zaman içinde basit bir şekilde güncellemek için Euler entegrasyonu kullanın.", "tags": ["entegrasyon", "hareket", "fizik"], "badge1": "Başlangıç", "content": "## Euler Entegrasyonu Adımları\n1. Cisimlerin hız ve açısal hızlarını güncelleyin: v += a * dt, ω += α * dt.\n2. Konum ve dönüşü güncelleyin: p += v * dt, q += 0.5 * q_omega * dt.\n3. Küçük zaman adımları (dt) kullanarak kararlılığı artırın, ancak hassasiyet sınırlıdır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 14, "no": "014", "cat": "Katı Cisim Fiziği", "name": "İmpuls Çözümleyicisi", "desc": "Çarpışma sonrası anlık kuvvetleri (impulslar) uygulayarak katı cisimlerin tepkilerini hesaplayın.", "tags": ["impuls", "çarpışma", "kuvvet"], "badge1": "Orta", "content": "## İmpuls Uygulama\n1. Çarpışma noktasını, normalini ve cisimlerin göreceli hızını bulun.\n2. Geri sekme (restitution) ve kütle bilgilerini kullanarak impuls büyüklüğünü hesaplayın.\n3. Bu impulsu çarpışan cisimlere uygulayarak hızlarını ve açısal hızlarını güncelleyin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 15, "no": "015", "cat": "Katı Cisim Fiziği", "name": "Sürtünme Hesaplaması", "desc": "Çarpışma yüzeyleri arasındaki sürtünme kuvvetini doğru bir şekilde modelleyin.", "tags": ["sürtünme", "kuvvet", "fizik"], "badge1": "Orta", "content": "## Sürtünme Uygulama\n1. Normal impulsun büyüklüğünü hesaplayın.\n2. Statik ve kinetik sürtünme katsayılarını (μs, μk) belirleyin.\n3. Yüzeydeki göreceli teğetsel hızı kullanarak sürtünme impulsunu hesaplayın.\n4. Uygulanacak sürtünme impulsunu sınırlamak için normal impulsu kullanın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 16, "no": "016", "cat": "Katı Cisim Fiziği", "name": "Yerçekimi ve Kuvvet Uygulama", "desc": "Cisimlere yerçekimi ve diğer dış kuvvetleri doğru bir şekilde uygulayın.", "tags": ["yerçekimi", "kuvvet", "ivme"], "badge1": "Başlangıç", "content": "## Kuvvetlerin Uygulanması\n1. Her cismin kütlesini (m) ve yerçekimi ivmesini (g) tanımlayın.\n2. Cisimlere etki eden yerçekimi kuvvetini Fg = m * g olarak hesaplayın.\n3. Diğer dış kuvvetleri (rüzgar, itme vb.) F_ext olarak ekleyin.\n4. Toplam kuvveti kullanarak ivmeyi (a = F_total / m) güncelleyin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 17, "no": "017", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "GJK Algoritması", "desc": "Karmaşık dışbükey şekiller arasında çarpışma tespiti için GJK algoritmasını kullanın.", "tags": ["GJK", "dar faz", "dışbükey"], "badge1": "İleri", "content": "## GJK Çarpışma Kontrolü\n1. Minkowski Farkı'nı kullanarak iki cismin fark uzayındaki destek noktalarını bulun.\n2. Simplex adı verilen bir şekil oluşturarak orijini içerip içermediğini kontrol edin.\n3. Orijin simplex içinde ise çarpışma vardır; aksi takdirde yoktur.\n4. Algoritma, yinelemeli olarak simplex'i büyütür veya küçültür.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 18, "no": "018", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "EPA Algoritması", "desc": "GJK ile tespit edilen çarpışmanın derinliğini ve temas noktasını EPA ile bulun.", "tags": ["EPA", "derinlik", "temas"], "badge1": "İleri", "content": "## EPA ile Çarpışma Bilgisi\n1. GJK'dan elde edilen son simplex'i (çarpışma olduğunu varsayarak) kullanın.\n2. Simplex'in orijinaline en yakın yüzeyini bulun.\n3. Bu yüzeyin normali çarpışma normali, orijine olan mesafesi ise çarpışma derinliğidir.\n4. Temas noktasını barycentric koordinatlarla hesaplayın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 19, "no": "019", "cat": "Performans Analizi ve Profilleme", "name": "Fizik Motoru Profilleme", "desc": "Fizik motorunuzun performans darboğazlarını belirlemek için profilleme araçlarını kullanın.", "tags": ["profilleme", "performans", "analiz"], "badge1": "Orta", "content": "## Fizik Motoru Profilleme\n1. Özel profilleyici araçları (örn. Tracy, RenderDoc) veya motorun kendi profilleme API'sini entegre edin.\n2. Çarpışma tespiti, impuls çözme, entegrasyon gibi ana fizik adımlarını ayrı ayrı ölçün.\n3. En çok zaman alan fonksiyonları ve kod bölgelerini belirleyin.\n4. Optimizasyonları bu darboğazlara odaklayın.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 20, "no": "020", "cat": "Performans Analizi ve Profilleme", "name": "Çarpışma Tespiti Performans Metrikleri", "desc": "Çarpışma tespiti algoritm "Başlangıç", "content": "## Nokta Çarpımı Hesaplama\n1. İki vektör V1(x1, y1, z1) ve V2(x2, y2, z2) tanımlayın.\n2. Nokta çarpımını (V1 ⋅ V2) = (x1*x2) + (y1*y2) + (z1*z2) formülüyle hesaplayın.\n3. Sonuç, vektörlerin göreceli yönü hakkında bilgi verir.\n\n## Genişletilmiş Notlar (Layered)\n\n- **Hedef Kitle:** Başlangıç seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Vektör Nokta Çarpımı senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Vektör Nokta Çarpımı işlemleri daha layered hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Vektör Nokta Çarpımı ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** vektör, matematik, geometri\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 223, "no": "223", "cat": "Vektör ve Matris İşlemleri", "name": "Reaktif Vektör Çapraz Çarpımı Refactor Yöntemi", "desc": "entegrasyon bağlamında Vektör Çapraz Çarpımı için reaktif bir refactor yöntemi. İki vektöre dik bir vektör oluşturmak için çapraz çarpımını kullanın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["vektör", "normal", "yön", "entegrasyon", "reaktif", "uzman"], "badge1": "Uzman", "content": "## Çapraz Çarpım Uygulama\n1. V1(x1, y1, z1) ve V2(x2, y2, z2) vektörlerini belirleyin.\n2. Çapraz çarpımı V1 x V2 = (y1z2 - z1y2, z1x2 - x1z2, x1y2 - y1x2) formülüyle hesaplayın.\n3. Sonuç vektörü, her iki orijinal vektöre de diktir.\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Uzman seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Vektör Çapraz Çarpımı senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Vektör Çapraz Çarpımı işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Vektör Çapraz Çarpımı ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** vektör, normal, yön\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 224, "no": "224", "cat": "Vektör ve Matris İşlemleri", "name": "Self-Healing Vektör Normalizasyonu Kuralı", "desc": "arayüz bağlamında Vektör Normalizasyonu için self-healing bir kuralı. Bir vektörün yönünü koruyarak uzunluğunu 1'e ayarlamak için normalleştirin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["birim vektör", "yön", "uzunluk", "arayüz", "self-healing", "pro"], "badge1": "Pro", "content": "## Vektörü Normalleştirme\n1. Normalleştirilecek V(x, y, z) vektörünü alın.\n2. Vektörün uzunluğunu (magnitude) ||V|| = sqrt(x^2 + y^2 + z^2) ile bulun.\n3. Her bileşeni uzunluğa bölerek V_normalized = (x/||V||, y/||V||, z/||V||) elde edin.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu kuralı, arayüz alanında Vektör Normalizasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Vektör Normalizasyonu akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 225, "no": "225", "cat": "Vektör ve Matris İşlemleri", "name": "Observable Dönüşüm Matrisi Oluşturma Şablonu", "desc": "ölçeklenme bağlamında Dönüşüm Matrisi Oluşturma için observable bir şablonu. Bir objenin konumu, dönüşü ve ölçeği için tek bir matris oluşturun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["matris", "transformasyon", "model", "ölçeklenme", "observable", "uzman"], "badge1": "Uzman", "content": "## Model Matrisi Oluşturma\n1. Birim matrisle başlayın.\n2. Ölçeklendirme (scale) matrisini uygulayın.\n3. Döndürme (rotation) matrisini (genellikle quaternion'dan) uygulayın.\n4. Öteleme (translation) matrisini uygulayın.\n5. Sonuç, dünya uzayında objenin tam dönüşümüdür.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Uzman seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Dönüşüm Matrisi Oluşturma senaryoları\n- **Avantajları:** Bu şablonu sayesinde Dönüşüm Matrisi Oluşturma işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde Dönüşüm Matrisi Oluşturma ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** matris, transformasyon, model\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 226, "no": "226", "cat": "Çarpışma Tespiti", "name": "AI-Augmented AABB Çarpışma Testi Şablonu", "desc": "caching bağlamında AABB Çarpışma Testi için ai-augmented bir şablonu. Axis-Aligned Bounding Box (AABB) kullanarak hızlı ve basit çarpışma testi yapın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["çarpışma", "AABB", "kutu", "caching", "ai-augmented", "orta"], "badge1": "Orta", "content": "## AABB Çarpışma Algoritması\n1. İki AABB'nin minimum ve maksimum x, y, z koordinatlarını belirleyin.\n2. Çarpışma var mı kontrol edin: (A.minX < B.maxX && A.maxX > B.minX) ve aynı şekilde y ve z eksenleri için.\n3. Tüm eksenlerde örtüşme varsa çarpışma vardır.\n\n## Genişletilmiş Notlar (AI-Augmented)\n\n- **Hedef Kitle:** Orta seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde AABB Çarpışma Testi senaryoları\n- **Avantajları:** Bu şablonu sayesinde AABB Çarpışma Testi işlemleri daha ai-augmented hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde AABB Çarpışma Testi ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** çarpışma, AABB, kutu\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 227, "no": "227", "cat": "Çarpışma Tespiti", "name": "Stream Tabanlı Küre-Küre Çarpışma Stratejisi", "desc": "şablon bağlamında Küre-Küre Çarpışma için stream tabanlı bir stratejisi. İki kürenin merkezleri arası mesafeyi karşılaştırarak çarpışma tespiti yapın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["küre", "çarpışma", "geometri", "şablon", "stream tabanlı", "orta"], "badge1": "Orta", "content": "## Küre Çarpışma Kontrolü\n1. Küre1'in merkezi C1 ve yarıçapı R1'i, Küre2'nin merkezi C2 ve yarıçapı R2'yi alın.\n2. İki merkez arasındaki mesafeyi (d) hesaplayın: d = ||C1 - C2||.\n3. Eğer d <= (R1 + R2) ise küreler çarpışmaktadır.\n\n## Uygulama Senaryosu (Stream Tabanlı)\n\nBu stratejisi, şablon alanında Küre-Küre Çarpışma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Küre-Küre Çarpışma akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 228, "no": "228", "cat": "Çarpışma Tespiti", "name": "Observable Ray-AABB Kesişimi İskeleti", "desc": "dağıtım bağlamında Ray-AABB Kesişimi için observable bir i̇skeleti. Bir ışının AABB ile kesişip kesişmediğini ve kesişme noktasını bulun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["ışın", "kesişim", "geometri", "dağıtım", "observable", "uzman"], "badge1": "Uzman", "content": "## Ray-AABB Kesişim Algoritması\n1. Işın başlangıç noktası P ve yönü D'yi, AABB'nin min/max köşelerini alın.\n2. Her eksen için kesişim parametrelerini (t_min, t_max) hesaplayın.\n3. Tüm eksenlerin [t_min, t_max] aralıklarının kesişimini bulun.\n4. Kesişim boş değilse ve t_min < t_max ise kesişim vardır.\n\n## Uygulama Senaryosu (Observable)\n\nBu i̇skeleti, dağıtım alanında Ray-AABB Kesişimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Ray-AABB Kesişimi akışını observable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 229, "no": "229", "cat": "Çarpışma Tespiti", "name": "Pluggable OBB Çarpışma Testi Optimizasyonu", "desc": "arayüz bağlamında OBB Çarpışma Testi için pluggable bir optimizasyonu. Döndürülmüş Sınır Kutuları (OBB) kullanarak daha doğru çarpışma tespiti yapın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["OBB", "çarpışma", "SAT", "arayüz", "pluggable", "pro"], "badge1": "Pro", "content": "## OBB-OBB Çarpışma (SAT)\n1. Ayrılabilir Eksen Teoremi (SAT) prensiplerini uygulayın.\n2. İki OBB'nin tüm yüzey normalleri ve kenar çiftleri için potansiyel ayrılma eksenlerini belirleyin.\n3. Her eksende iki OBB'nin projeksiyonlarının çakışıp çakışmadığını kontrol edin.\n4. Tüm eksenlerde çakışma varsa çarpışma vardır.\n\n## Uygulama Senaryosu (Pluggable)\n\nBu optimizasyonu, arayüz alanında OBB Çarpışma Testi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** OBB Çarpışma Testi akışını pluggable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n* n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 235, "no": "235", "cat": "Katı Cisim Fiziği", "name": "Olay-Güdümlü İmpuls Çözümleyicisi Akışı", "desc": "güvenlik bağlamında İmpuls Çözümleyicisi için olay-güdümlü bir akışı. Çarpışma sonrası anlık kuvvetleri (impulslar) uygulayarak katı cisimlerin tepkilerini hesaplayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["impuls", "çarpışma", "kuvvet", "güvenlik", "olay-güdümlü", "başlangıç"], "badge1": "Başlangıç", "content": "## İmpuls Uygulama\n1. Çarpışma noktasını, normalini ve cisimlerin göreceli hızını bulun.\n2. Geri sekme (restitution) ve kütle bilgilerini kullanarak impuls büyüklüğünü hesaplayın.\n3. Bu impulsu çarpışan cisimlere uygulayarak hızlarını ve açısal hızlarını güncelleyin.\n\n## Uygulama Senaryosu (Olay-Güdümlü)\n\nBu akışı, güvenlik alanında İmpuls Çözümleyicisi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İmpuls Çözümleyicisi akışını olay-güdümlü yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 236, "no": "236", "cat": "Katı Cisim Fiziği", "name": "Production-Grade Sürtünme Hesaplaması Tasarımı", "desc": "CI/CD bağlamında Sürtünme Hesaplaması için production-grade bir tasarımı. Çarpışma yüzeyleri arasındaki sürtünme kuvvetini doğru bir şekilde modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["sürtünme", "kuvvet", "fizik", "CI/CD", "production-grade", "orta"], "badge1": "Orta", "content": "## Sürtünme Uygulama\n1. Normal impulsun büyüklüğünü hesaplayın.\n2. Statik ve kinetik sürtünme katsayılarını (μs, μk) belirleyin.\n3. Yüzeydeki göreceli teğetsel hızı kullanarak sürtünme impulsunu hesaplayın.\n4. Uygulanacak sürtünme impulsunu sınırlamak için normal impulsu kullanın.\n\n## Genişletilmiş Notlar (Production-Grade)\n\n- **Hedef Kitle:** Orta seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Sürtünme Hesaplaması senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Sürtünme Hesaplaması işlemleri daha production-grade hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Sürtünme Hesaplaması ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sürtünme, kuvvet, fizik\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 237, "no": "237", "cat": "Katı Cisim Fiziği", "name": "Mikroservis Yerçekimi ve Kuvvet Çekirdeği", "desc": "dağıtım bağlamında Yerçekimi ve Kuvvet için mikroservis bir çekirdeği. Cisimlere yerçekimi ve diğer dış kuvvetleri doğru bir şekilde uygulayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["yerçekimi", "kuvvet", "ivme", "dağıtım", "mikroservis", "i̇leri"], "badge1": "İleri", "content": "## Kuvvetlerin Uygulanması\n1. Her cismin kütlesini (m) ve yerçekimi ivmesini (g) tanımlayın.\n2. Cisimlere etki eden yerçekimi kuvvetini Fg = m * g olarak hesaplayın.\n3. Diğer dış kuvvetleri (rüzgar, itme vb.) F_ext olarak ekleyin.\n4. Toplam kuvveti kullanarak ivmeyi (a = F_total / m) güncelleyin.\n\n## Genişletilmiş Notlar (Mikroservis)\n\n- **Hedef Kitle:** İleri seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Yerçekimi ve Kuvvet senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Yerçekimi ve Kuvvet işlemleri daha mikroservis hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde Yerçekimi ve Kuvvet ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** yerçekimi, kuvvet, ivme\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 238, "no": "238", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Dağıtık GJK Algoritması Yapısı", "desc": "CI/CD bağlamında GJK Algoritması için dağıtık bir yapısı. Karmaşık dışbükey şekiller arasında çarpışma tespiti için GJK algoritmasını kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["GJK", "dar faz", "dışbükey", "CI/CD", "dağıtık", "orta"], "badge1": "Orta", "content": "## GJK Çarpışma Kontrolü\n1. Minkowski Farkı'nı kullanarak iki cismin fark uzayındaki destek noktalarını bulun.\n2. Simplex adı verilen bir şekil oluşturarak orijini içerip içermediğini kontrol edin.\n3. Orijin simplex içinde ise çarpışma vardır; aksi takdirde yoktur.\n4. Algoritma, yinelemeli olarak simplex'i büyütür veya küçültür.\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu yapısı, CI/CD alanında GJK Algoritması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** GJK Algoritması akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 239, "no": "239", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Polyglot EPA Algoritması Stratejisi", "desc": "CI/CD bağlamında EPA Algoritması için polyglot bir stratejisi. GJK ile tespit edilen çarpışmanın derinliğini ve temas noktasını EPA ile bulun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["EPA", "derinlik", "temas", "CI/CD", "polyglot", "uzman"], "badge1": "Uzman", "content": "## EPA ile Çarpışma Bilgisi\n1. GJK'dan elde edilen son simplex'i (çarpışma olduğunu varsayarak) kullanın.\n2. Simplex'in orijinaline en yakın yüzeyini bulun.\n3. Bu yüzeyin normali çarpışma normali, orijine olan mesafesi ise çarpışma derinliğidir.\n4. Temas noktasını barycentric koordinatlarla hesaplayın.\n\n## Uygulama Senaryosu (Polyglot)\n\nBu stratejisi, CI/CD alanında EPA Algoritması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** EPA Algoritması akışını polyglot yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 240, "no": "240", "cat": "Performans Analizi ve Profilleme", "name": "Bağlamsal Fizik Motoru Profilleme Optimizasyonu", "desc": "test bağlamında Fizik Motoru Profilleme için bağlamsal bir optimizasyonu. Fizik motorunuzun performans darboğazlarını belirlemek için profilleme araçlarını kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["profilleme", "performans", "analiz", "test", "bağlamsal", "orta"], "badge1": "Orta", "content": "## Fizik Motoru Profilleme\n1. Özel profilleyici araçları (örn. Tracy, RenderDoc) veya motorun kendi profilleme API'sini entegre edin.\n2. Çarpışma tespiti, impuls çözme, entegrasyon gibi ana fizik adımlarını ayrı ayrı ölçün.\n3. En çok zaman alan fonksiyonları ve kod bölgelerini belirleyin.\n4. Optimizasyonları bu darboğazlara odaklayın.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Orta seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Fizik Motoru Profilleme senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde Fizik Motoru Profilleme işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde Fizik Motoru Profilleme ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** profilleme, performans, analiz\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 241, "no": "241", "cat": "Performans Analizi ve Profilleme", "name": "Self-Healing Çarpışma Tespiti Performans Algoritması", "desc": "veri bağlamında Çarpışma Tespiti Performans için self-healing bir algoritması. Çarpışma tespiti algoritmalarınızın verimliliğini değerlendirmek için metrikler kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["metrik", "çarpışma", "optimizasyon", "veri", "self-healing", "başlangıç"], "badge1": "Başlangıç", "content": "## Performans Metrikleri\n1. **FPS:** Saniyedeki kare sayısı, genel akıcılığı gösterir.\n2. **Çarpışma Süresi:** Bir karedeki toplam çarpışma tespiti süresi.\n3. **Çift Sayısı:** İşlenen potansiyel çarpışma çiftlerinin sayısı (geniş faz).\n4. **Gerçek Çarpışma Sayısı:** Dar fazda tespit edilen çarpışma sayısı.\n5. CPU kullanımını takip edin.\n\n## Uygulama Senaryosu (Self-Healing)\n\nBu algoritması, veri alanında Çarpışma Tespiti Performans problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çarpışma Tespiti Performans akışını self-healing yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 242, "no": "242", "cat": "Vektör ve Matris İşlemleri", "name": "Multi-Tenant Vektör Nokta Çarpımı Pratiği", "desc": "dağıtım bağlamında Vektör Nokta Çarpımı için multi-tenant bir pratiği. İki vektör arasındaki açıyı veya yansımayı bulmak için nokta çarpımını kullanın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["vektör", "matematik", "geometri", "dağıtım", "multi-tenant", "uzman"], "badge1": "Uzman", "content": "## Nokta Çarpımı Hesaplama\n1. İki vektör V1(x1, y1, z1) ve V2(x2, y2, z2) tanımlayın.\n2. Nokta çarpımını (V1 ⋅ V2) = (x1*x2) + (y1*y2) + (z1*z2) formülüyle hesaplayın.\n3. Sonuç, vektörlerin göreceli yönü hakkında bilgi verir.\n\n## Uygulama Senaryosu (Multi-Tenant)\n\nBu pratiği, dağıtım alanında Vektör Nokta Çarpımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Vektör Nokta Çarpımı akışını multi-tenant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 243, "no": "243", "cat": "Vektör ve Matris İşlemleri", "name": "Stream Tabanlı Vektör Çapraz Çarpımı Modeli", "desc": "arayüz bağlamında Vektör Çapraz Çarpımı için stream tabanlı bir modeli. İki vektöre dik bir vektör oluşturmak için çapraz çarpımını kullanın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["vektör", "normal", "yön", "arayüz", "stream tabanlı", "i̇leri"], "badge1": "İleri", "content": "## Çapraz Çarpım Uygulama\n1. V1(x1, y1, z1) ve V2(x2, y2, z2) vektörlerini belirleyin.\n2. Çapraz çarpımı V1 x V2 = (y1z2 - z1y2, z1x2 - x1z2, x1y2 - y1x2) formülüyle hesaplayın.\n3. Sonuç vektörü, her iki orijinal vektöre de diktir.\n\n## Uygulama Senaryosu (Stream Tabanlı)\n\nBu modeli, arayüz alanında Vektör Çapraz Çarpımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Vektör Çapraz Çarpımı akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 244, "no": "244", "cat": "Vektör ve Matris İşlemleri", "name": "Asenkron Vektör Normalizasyonu Anlaşması", "desc": "mühendislik bağlamında Vektör Normalizasyonu için asenkron bir anlaşması. Bir vektörün yönünü koruyarak uzunluğunu 1'e ayarlamak için normalleştirin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["birim vektör", "yön", "uzunluk", "mühendislik", "asenkron", "uzman"], "badge1": "Uzman", "content": "## Vektörü Normalleştirme\n1. Normalleştirilecek V(x, y, z) vektörünü alın.\n2. Vektörün uzunluğunu (magnitude) ||V|| = sqrt(x^2 + y^2 + z^2) ile bulun.\n3. Her bileşeni uzunluğa bölerek V_normalized = (x/||V||, y/||V||, z/||V||) elde edin.\n\n## Uygulama Senaryosu (Asenkron)\n\nBu anlaşması, mühendislik alanında Vektör Normalizasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Vektör Normalizasyonu akışını asenkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 245, "no": "245", "cat": "Vektör ve Matris İşlemleri", "name": "Quantum-Hazır Dönüşüm Matrisi Oluşturma Önerisi", "desc": "mikroservis bağlamında Dönüşüm Matrisi Oluşturma için quantum-hazır bir önerisi. Bir objenin konumu, dönüşü ve ölçeği için tek bir matris oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["matris", "transformasyon", "model", "mikroservis", "quantum-hazır", "i̇leri"], "badge1": "İleri", "content": "## Model Matrisi Oluşturma\n1. Birim matrisle başlayın.\n2. Ölçeklendirme (scale) matrisini uygulayın.\n3. Döndürme (rotation) matrisini (genellikle quaternion'dan) uygulayın.\n4. Öteleme (translation) matrisini uygulayın.\n5. Sonuç, dünya uzayında objenin tam dönüşümüdür.\n\n## Genişletilmiş Notlar (Quantum-Hazır)\n\n- **Hedef Kitle:** İleri seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Dönüşüm Matrisi Oluşturma senaryoları\n- **Avantajları:** Bu önerisi sayesinde Dönüşüm Matrisi Oluşturma işlemleri daha quantum-hazır hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Dönüşüm Matrisi Oluşturma ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** matris, transformasyon, model\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 246, "no": "246", "cat": "Çarpışma Tespiti", "name": "Hibrit AABB Çarpışma Testi Rehberi", "desc": "monitoring bağlamında AABB Çarpışma Testi için hibrit bir rehberi. Axis-Aligned Bounding Box (AABB) kullanarak hızlı ve basit çarpışma testi yapın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["çarpışma", "AABB", "kutu", "monitoring", "hibrit", "orta"], "badge1": "Orta", "content": "## AABB Çarpışma Algoritması\n1. İki AABB'nin minimum ve maksimum x, y, z koordinatlarını belirleyin.\n2. Çarpışma var mı kontrol edin: (A.minX < B.maxX && A.maxX > B.minX) ve aynı şekilde y ve z eksenleri için.\n3. Tüm eksenlerde örtüşme varsa çarpışma vardır.\n\n## Uygulama Senaryosu (Hibrit)\n\nBu rehberi, monitoring alanında AABB Çarpışma Testi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** AABB Çarpışma Testi akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 247, "no": "247", "cat": "Çarpışma Tespiti", "name": "Multi-Tenant Küre-Küre Çarpışma Yapısı", "desc": "güvenlik bağlamında Küre-Küre Çarpışma için multi-tenant bir yapısı. İki kürenin merkezleri arası mesafeyi karşılaştırarak çarpışma tespiti yapın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["küre", "çarpışma", "geometri", "güvenlik", "multi-tenant", "pro"], "badge1": "Pro", "content": "## Küre Çarpışma Kontrolü\n1. Küre1'in merkezi C1 ve yarıçapı R1'i, Küre2'nin merkezi C2 ve yarıçapı R2'yi alın.\n2. İki merkez arasındaki mesafeyi (d) hesaplayın: d = ||C1 - C2||.\n3. Eğer d <= (R1 + R2) ise küreler çarpışmaktadır.\n\n## Uygulama Senaryosu (Multi-Tenant)\n\nBu yapısı, güvenlik alanında Küre-Küre Çarpışma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Küre-Küre Çarpışma akışını multi-tenant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 248, "no": "248", "cat": "Çarpışma Tespiti", "name": "Senkron Ray-AABB Kesişimi Optimizasyonu", "desc": "akış bağlamında Ray-AABB Kesişimi için senkron bir optimizasyonu. Bir ışının AABB ile kesişip kesişmediğini ve kesişme noktasını bulun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["ışın", "kesişim", "geometri", "akış", "senkron", "uzman"], "badge1": "Uzman", "content": "## Ray-AABB Kesişim Algoritması\n1. Işın başlangıç noktası P ve yönü D'yi, AABB'nin min/max köşelerini alın.\n2. Her eksen için kesişim parametrelerini (t_min, t_max) hesaplayın.\n3. Tüm eksenlerin [t_min, t_max] aralıklarının kesişimini bulun.\n4. Kesişim boş değilse ve t_min < t_max ise kesişim vardır.\n\n## Uygulama Senaryosu (Senkron)\n\nBu optimizasyonu, akış alanında Ray-AABB Kesişimi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Ray-AABB Kesişimi akışını senkron yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 249, "no": "249", "cat": "Çarpışma Tespiti", "name": "Sıfır-Trust OBB Çarpışma Testi Modeli", "desc": "veri bağlamında OBB Çarpışma Testi için sıfır-trust bir modeli. sweep-and-prune algoritmasını uygulayın.\n3. Yalnızca yakın objeler için dar faz kontrolü yapın.\n\n## Genişletilmiş Notlar (Multi-Tenant)\n\n- **Hedef Kitle:** Pro seviye logging kullanıcıları\n- **Uygulama Alanı:** logging ekosisteminde Geniş Faz Optimizasyonu senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Geniş Faz Optimizasyonu işlemleri daha multi-tenant hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut logging mimarinizde Geniş Faz Optimizasyonu ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** optimizasyon, geniş faz, performans\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 251, "no": "251", "cat": "Fizik Motoru Optimizasyonu", "name": "Idempotent Dar Faz Optimizasyonu Akışı", "desc": "test bağlamında Dar Faz Optimizasyonu için idempotent bir akışı. Doğru çarpışma noktalarını ve normallerini verimli bir şekilde hesaplayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["optimizasyon", "dar faz", "hassasiyet", "test", "idempotent", "uzman"], "badge1": "Uzman", "content": "## Dar Faz Algoritma Seçimi\n1. Basit şekiller için (küre, AABB) analitik çözümler kullanın.\n2. Karmaşık şekiller için GJK/EPA gibi yinelemeli algoritmaları tercih edin.\n3. Çarpışma bilgilerini (nokta, normal, derinlik) doğru bir şekilde elde edin.\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Uzman seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde Dar Faz Optimizasyonu senaryoları\n- **Avantajları:** Bu akışı sayesinde Dar Faz Optimizasyonu i de test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katmanlar, filtreleme, performans\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 253, "no": "253", "cat": "Fizik Motoru Optimizasyonu", "name": "Dağıtık Veri Yapıları Optimizasyonu Anlaşması", "desc": "akış bağlamında Veri Yapıları Optimizasyonu için dağıtık bir anlaşması. Fizik verilerini bellekte verimli bir şekilde depolayarak erişim hızını artırın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["veri", "bellek", "CACHE", "akış", "dağıtık", "uzman"], "badge1": "Uzman", "content": "## Bellek Dostu Yapılar\n1. Dizi tabanlı (Array of Structs) yerine Yapı tabanlı Diziler (Struct of Arrays) kullanmayı düşünün.\n2. Bağlantılı listelerden kaçının, bitişik bellek bölgelerini tercih edin.\n3. Çarpışma çiftlerini depolamak için hash tabloları veya ikili ağaçlar kullanın.\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu anlaşması, akış alanında Veri Yapıları Optimizasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Veri Yapıları Optimizasyonu akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 254, "no": "254", "cat": "Katı Cisim Fiziği", "name": "Zero-Config Euler Entegrasyonu Yönergesi", "desc": "entegrasyon bağlamında Euler Entegrasyonu için zero-config bir yönergesi. Katı cisimlerin hareketini zaman içinde basit bir şekilde güncellemek için Euler entegrasyonu kullanın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "hareket", "fizik", "zero-config", "i̇leri"], "badge1": "İleri", "content": "## Euler Entegrasyonu Adımları\n1. Cisimlerin hız ve açısal hızlarını güncelleyin: v += a * dt, ω += α * dt.\n2. Konum ve dönüşü güncelleyin: p += v * dt, q += 0.5 * q_omega * dt.\n3. Küçük zaman adımları (dt) kullanarak kararlılığı artırın, ancak hassasiyet sınırlıdır.\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** İleri seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Euler Entegrasyonu senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Euler Entegrasyonu işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Euler Entegrasyonu ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** entegrasyon, hareket, fizik\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 255, "no": "255", "cat": "Katı Cisim Fiziği", "name": "Memory-Safe İmpuls Çözümleyicisi Anlaşması", "desc": "mühendislik bağlamında İmpuls Çözümleyicisi için memory-safe bir anlaşması. Çarpışma sonrası anlık kuvvetleri (impulslar) uygulayarak katı cisimlerin tepkilerini hesaplayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["impuls", "çarpışma", "kuvvet", "mühendislik", "memory-safe", "orta"], "badge1": "Orta", "content": "## İmpuls Uygulama\n1. Çarpışma noktasını, normalini ve cisimlerin göreceli hızını bulun.\n2. Geri sekme (restitution) ve kütle bilgilerini kullanarak impuls büyüklüğünü hesaplayın.\n3. Bu impulsu çarpışan cisimlere uygulayarak hızlarını ve açısal hızlarını güncelleyin.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu anlaşması, mühendislik alanında İmpuls Çözümleyicisi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İmpuls Çözümleyicisi akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 256, "no": "256", "cat": "Katı Cisim Fiziği", "name": "Şeffaf Sürtünme Hesaplaması Stratejisi", "desc": "mimari bağlamında Sürtünme Hesaplaması için şeffaf bir stratejisi. Çarpışma yüzeyleri arasındaki sürtünme kuvvetini doğru bir şekilde modelleyin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["sürtünme", "kuvvet", "fizik", "mimari", "şeffaf", "orta"], "badge1": "Orta", "content": "## Sürtünme Uygulama\n1. Normal impulsun büyüklüğünü hesaplayın.\n2. Statik ve kinetik sürtünme katsayılarını (μs, μk) belirleyin.\n3. Yüzeydeki göreceli teğetsel hızı kullanarak sürtünme impulsunu hesaplayın.\n4. Uygulanacak sürtünme impulsunu sınırlamak için normal impulsu kullanın.\n\n## Genişletilmiş Notlar (Şeffaf)\n\n- **Hedef Kitle:** Orta seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Sürtünme Hesaplaması senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Sürtünme Hesaplaması işlemleri daha şeffaf hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde Sürtünme Hesaplaması ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sürtünme, kuvvet, fizik\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 257, "no": "257", "cat": "Katı Cisim Fiziği", "name": "Hibrit-Cloud Yerçekimi ve Kuvvet Yapısı", "desc": "güvenlik bağlamında Yerçekimi ve Kuvvet için hibrit-cloud bir yapısı. Cisimlere yerçekimi ve diğer dış kuvvetleri doğru bir şekilde uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["yerçekimi", "kuvvet", "ivme", "güvenlik", "hibrit-cloud", "orta"], "badge1": "Orta", "content": "## Kuvvetlerin Uygulanması\n1. Her cismin kütlesini (m) ve yerçekimi ivmesini (g) tanımlayın.\n2. Cisimlere etki eden yerçekimi kuvvetini Fg = m * g olarak hesaplayın.\n3. Diğer dış kuvvetleri (rüzgar, itme vb.) F_ext olarak ekleyin.\n4. Toplam kuvveti kullanarak ivmeyi (a = F_total / m) güncelleyin.\n\n## Uygulama Senaryosu (Hibrit-Cloud)\n\nBu yapısı, güvenlik alanında Yerçekimi ve Kuvvet problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yerçekimi ve Kuvvet akışını hibrit-cloud yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 258, "no": "258", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Kanıt-Tabanlı GJK Algoritması Önerisi", "desc": "entegrasyon bağlamında GJK Algoritması için kanıt-tabanlı bir önerisi. Karmaşık dışbükey şekiller arasında çarpışma tespiti için GJK algoritmasını kullanın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["GJK", "dar faz", "dışbükey", "entegrasyon", "kanıt-tabanlı", "uzman"], "badge1": "Uzman", "content": "## GJK Çarpışma Kontrolü\n1. Minkowski Farkı'nı kullanarak iki cismin fark uzayındaki destek noktalarını bulun.\n2. Simplex adı verilen bir şekil oluşturarak orijini içerip içermediğini kontrol edin.\n3. Orijin simplex içinde ise çarpışma vardır; aksi takdirde yoktur.\n4. Algoritma, yinelemeli olarak simplex'i büyütür veya küçültür.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu önerisi, entegrasyon alanında GJK Algoritması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** GJK Algoritması akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 259, "no": "259", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Yalın EPA Algoritması Protokolü", "desc": "güvenlik bağlamında EPA Algoritması için ya
