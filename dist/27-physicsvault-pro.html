<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">P</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Physics<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Özel fizik motoru çarpışma testleri için vektör hesabı ve optimizasyon algoritmaları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>20</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Physics ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">20</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

const CATS = [{"id":"Vektör ve Matris İşlemleri","name":"Vektör ve Matris İşlemleri","color":"#4CAF50"},{"id":"Çarpışma Tespiti","name":"Çarpışma Tespiti","color":"#2196F3"},{"id":"Fizik Motoru Optimizasyonu","name":"Fizik Motoru Optimizasyonu","color":"#FF9800"},{"id":"Katı Cisim Fiziği","name":"Katı Cisim Fiziği","color":"#9C27B0"},{"id":"Gelişmiş Çarpışma Algoritmaları","name":"Gelişmiş Çarpışma Algoritmaları","color":"#FFC107"},{"id":"Performans Analizi ve Profilleme","name":"Performans Analizi ve Profilleme","color":"#F44336"}];
const ITEMS = [{"id":1,"no":"001","cat":"Vektör ve Matris İşlemleri","name":"Vektör Nokta Çarpımı","desc":"İki vektör arasındaki açıyı veya yansımayı bulmak için nokta çarpımını kullanın.","tags":["vektör","matematik","geometri"],"badge1":"Başlangıç","content":"## Vektör Nokta Çarpımı (Dot Product) — Oyun Fiziği\n\nİki vektör arasındaki açı hesabı ve projeksiyon işlemi için temel matematik operasyonu.\n\n**Formül ve geometrik anlam:**\n```\na · b = |a| × |b| × cos(θ)\n\nBileşen formülü:\na · b = ax×bx + ay×by + az×bz\n\nSonuç > 0 → Açı < 90° (aynı yönde)\nSonuç = 0 → Açı = 90° (dik açı)\nSonuç < 0 → Açı > 90° (zıt yönde)\n```\n\n**C++ implementasyonu:**\n```cpp\n#include <cmath>\n\nstruct Vec3 {\n    float x, y, z;\n    \n    float dot(const Vec3& other) const {\n        return x * other.x + y * other.y + z * other.z;\n    }\n    \n    float magnitude() const {\n        return std::sqrt(x*x + y*y + z*z);\n    }\n    \n    // İki vektör arasındaki açı (radyan)\n    float angleTo(const Vec3& other) const {\n        float d = dot(other);\n        float mag = magnitude() * other.magnitude();\n        return std::acos(std::clamp(d / mag, -1.0f, 1.0f));\n    }\n    \n    // b vektörü üzerine projeksiyon\n    Vec3 projectOnto(const Vec3& b) const {\n        float scalar = dot(b) / b.dot(b);\n        return {b.x * scalar, b.y * scalar, b.z * scalar};\n    }\n};\n```\n\n**Oyun uygulamaları:**\n```cpp\n// 1. Görüş alanı kontrolü (field of view)\nbool isInFieldOfView(Vec3 enemyDir, Vec3 playerForward, float fovAngle) {\n    float cosAngle = enemyDir.normalized().dot(playerForward.normalized());\n    return cosAngle > std::cos(fovAngle * 0.5f);\n}\n\n// 2. Yüzey aydınlatması (Lambert'in Cosine Kanunu)\nfloat diffuseLight = std::max(0.0f, surfaceNormal.dot(lightDir));\ncolor = baseColor * diffuseLight;\n```\n\n**Prompt:** \"Bu AI düşman sisteminde görüş alanı (FOV 120°), arka algı (180°-360°) ve gizli yaklaşma tespitini dot product ile uygula; mesafe ve engel kontrolü de ekle.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":2,"no":"002","cat":"Vektör ve Matris İşlemleri","name":"Vektör Çapraz Çarpımı","desc":"İki vektöre dik bir vektör oluşturmak için çapraz çarpımını kullanın.","tags":["vektör","normal","yön"],"badge1":"Başlangıç","content":"## Vektör Çapraz Çarpımı (Cross Product) — Oyun Fiziği\n\nİki vektörün oluşturduğu düzleme dik yeni vektör üretmek için kullanılan temel 3D matematik.\n\n**Formül:**\n```\na × b = (ay×bz - az×by, az×bx - ax×bz, ax×by - ay×bx)\n\nSonuç vektörü, a ve b'ye dik\n|a × b| = |a| × |b| × sin(θ)\nYön: Sağ el kuralı\n```\n\n**C++ implementasyonu:**\n```cpp\nstruct Vec3 {\n    float x, y, z;\n    \n    Vec3 cross(const Vec3& other) const {\n        return {\n            y * other.z - z * other.y,\n            z * other.x - x * other.z,\n            x * other.y - y * other.x\n        };\n    }\n    \n    Vec3 normalized() const {\n        float mag = std::sqrt(x*x + y*y + z*z);\n        if (mag < 1e-6f) return {0, 0, 0};\n        return {x/mag, y/mag, z/mag};\n    }\n    \n    float dot(const Vec3& other) const {\n        return x*other.x + y*other.y + z*other.z;\n    }\n};\n```\n\n**Oyun uygulamaları:**\n```cpp\n// 1. Yüzey normali hesaplama (mesh oluşturma için)\nVec3 computeNormal(Vec3 v0, Vec3 v1, Vec3 v2) {\n    Vec3 edge1 = {v1.x-v0.x, v1.y-v0.y, v1.z-v0.z};\n    Vec3 edge2 = {v2.x-v0.x, v2.y-v0.y, v2.z-v0.z};\n    return edge1.cross(edge2).normalized();\n}\n\n// 2. Tork (torque) hesaplama — fizik motoru\nVec3 torque = leverArm.cross(force);\nangularAcceleration = torque / momentOfInertia;\n\n// 3. Vektörün yönelim kontrolü (saat yönü mü?)\nfloat orientation = ab.cross(bc).dot(normal);\nbool isClockwise = orientation < 0;\n```\n\n**Prompt:** \"Fizik motoru için impuls hesapla; çarpışma noktasına göre angular velocity değişimini cross product ile uygula, kütle ve inertia tensor kullan.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":3,"no":"003","cat":"Vektör ve Matris İşlemleri","name":"Vektör Normalizasyonu","desc":"Bir vektörün yönünü koruyarak uzunluğunu 1'e ayarlamak için normalleştirin.","tags":["birim vektör","yön","uzunluk"],"badge1":"Başlangıç","content":"## Vektör Normalizasyonu: Birim Vektör Hesaplama\n\nFizik ve grafik hesaplamalarında yön bilgisini büyüklükten bağımsız kullanma tekniği.\n\n**Neden normalizasyon?**\n```\nNormalize: Büyüklüğü 1.0 yapma, yönü koru\n→ Dot product'ta açı hesabı doğru çalışsın\n→ Işık yönü (yalnızca yön önemli, büyüklük değil)\n→ Hareket vektörü (hız ayrı, yön ayrı)\n→ Karşılaştırma ve projeksiyon\n\na_normalized = a / |a|\n```\n\n**Güvenli normalizasyon:**\n```cpp\nstruct Vec3 {\n    float x, y, z;\n    \n    float magnitudeSquared() const {\n        return x*x + y*y + z*z;\n    }\n    \n    float magnitude() const {\n        return std::sqrt(magnitudeSquared());\n    }\n    \n    Vec3 normalized() const {\n        float mag = magnitude();\n        if (mag < 1e-6f) return Vec3{0, 0, 0};  // Sıfır vektör koruma\n        float invMag = 1.0f / mag;  // Bölme yerine çarpma (hız)\n        return {x * invMag, y * invMag, z * invMag};\n    }\n    \n    // Hızlı yaklaşık normalizasyon (Quake III algoritması)\n    Vec3 fastNormalize() const {\n        float mag2 = magnitudeSquared();\n        float invMag = _mm_cvtss_f32(_mm_rsqrt_ss(_mm_set_ss(mag2)));  // Hızlı ters kare kök\n        return {x * invMag, y * invMag, z * invMag};\n    }\n};\n```\n\n**GLSL shader normalizasyon:**\n```glsl\nvec3 normal = normalize(vNormal);  // Built-in GLSL fonksiyon\nvec3 lightDir = normalize(lightPos - fragPos);\n\n// Dot product ile difüzyon\nfloat diff = max(dot(normal, lightDir), 0.0);\nvec3 diffuse = diff * lightColor;\n```\n\n**Prompt:** \"Bu karakter hareket sistemi için normalize hız vektörü kullan; diagonal hareket hız artmasını önle, yumuşak yön geçişi için slerp ile interpolasyon ekle.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":4,"no":"004","cat":"Vektör ve Matris İşlemleri","name":"Dönüşüm Matrisi Oluşturma","desc":"Bir objenin konumu, dönüşü ve ölçeği için tek bir matris oluşturun.","tags":["matris","transformasyon","model"],"badge1":"Orta","content":"## Dönüşüm Matrisi: Translate, Rotate, Scale (TRS)\n\n3D oyun nesneleri için transform hesaplamaları ve matris zinciri oluşturma.\n\n**TRS matris bileşimleri:**\n```cpp\n#include <array>\n#include <cmath>\n\nstruct Mat4 {\n    float m[4][4] = {};\n    \n    // Birim matris\n    static Mat4 identity() {\n        Mat4 m;\n        m.m[0][0] = m.m[1][1] = m.m[2][2] = m.m[3][3] = 1.0f;\n        return m;\n    }\n    \n    // Çeviri matrisi\n    static Mat4 translation(float tx, float ty, float tz) {\n        Mat4 m = identity();\n        m.m[0][3] = tx; m.m[1][3] = ty; m.m[2][3] = tz;\n        return m;\n    }\n    \n    // Ölçek matrisi\n    static Mat4 scale(float sx, float sy, float sz) {\n        Mat4 m = identity();\n        m.m[0][0] = sx; m.m[1][1] = sy; m.m[2][2] = sz;\n        return m;\n    }\n    \n    // Z ekseninde döndürme\n    static Mat4 rotationZ(float angle) {\n        Mat4 m = identity();\n        float c = std::cos(angle), s = std::sin(angle);\n        m.m[0][0] = c;  m.m[0][1] = -s;\n        m.m[1][0] = s;  m.m[1][1] = c;\n        return m;\n    }\n    \n    // Matris çarpma\n    Mat4 operator*(const Mat4& other) const;\n};\n\n// TRS kombinasyonu: Scale → Rotate → Translate (sıra önemli!)\nMat4 transform = Mat4::translation(pos.x, pos.y, pos.z)\n               * Mat4::rotationY(angle)\n               * Mat4::scale(sx, sy, sz);\n```\n\n**Quaternion ile rotasyon (gimbal lock önleme):**\n```cpp\nstruct Quaternion {\n    float w, x, y, z;\n    // Euler açılardan quaternion\n    static Quaternion fromEuler(float pitch, float yaw, float roll);\n    // Quaternion'dan matrise\n    Mat4 toMatrix() const;\n};\n```\n\n**Prompt:** \"Hiyerarşik sahne grafı için transform kalıtım sistemi yaz; parent-child transform zinciri, local ve world space dönüşümleri, dirty flag ile önbellek optimizasyonu.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":5,"no":"005","cat":"Çarpışma Tespiti","name":"AABB Çarpışma Testi","desc":"Axis-Aligned Bounding Box (AABB) kullanarak hızlı ve basit çarpışma testi yapın.","tags":["çarpışma","AABB","kutu"],"badge1":"Başlangıç","content":"## AABB Çarpışma Testi: Hizalı Sınır Kutusu\n\nEksenlerle hizalı dikdörtgen sınır kutularının kesişimini hızlı test eden temel çarpışma algoritması.\n\n**AABB yapısı ve kesişim testi:**\n```cpp\nstruct AABB {\n    Vec3 min;  // Alt-sol-ön köşe\n    Vec3 max;  // Üst-sağ-arka köşe\n    \n    // İki AABB kesişiyor mu?\n    bool intersects(const AABB& other) const {\n        return (min.x <= other.max.x && max.x >= other.min.x) &&\n               (min.y <= other.max.y && max.y >= other.min.y) &&\n               (min.z <= other.max.z && max.z >= other.min.z);\n    }\n    \n    // Nokta AABB içinde mi?\n    bool contains(const Vec3& point) const {\n        return point.x >= min.x && point.x <= max.x &&\n               point.y >= min.y && point.y <= max.y &&\n               point.z >= min.z && point.z <= max.z;\n    }\n    \n    // İki AABB'yi kapsayan büyük AABB\n    AABB merge(const AABB& other) const {\n        return {\n            Vec3{std::min(min.x, other.min.x), std::min(min.y, other.min.y), std::min(min.z, other.min.z)},\n            Vec3{std::max(max.x, other.max.x), std::max(max.y, other.max.y), std::max(max.z, other.max.z)}\n        };\n    }\n    \n    // Merkez ve yarı boyut\n    Vec3 center() const { return {(min.x+max.x)*0.5f, (min.y+max.y)*0.5f, (min.z+max.z)*0.5f}; }\n    Vec3 halfExtents() const { return {(max.x-min.x)*0.5f, (max.y-min.y)*0.5f, (max.z-min.z)*0.5f}; }\n    \n    // Sürekli hareket eden cisim için: sweep test\n    bool sweepTest(const Vec3& velocity, const AABB& other, float& tFirst, float& tLast) const;\n};\n```\n\n**Dinamik AABB güncelleme (hareket eden nesne):**\n```cpp\nAABB computeDynamicAABB(const Mesh& mesh, const Mat4& transform) {\n    Vec3 min = {FLT_MAX, FLT_MAX, FLT_MAX};\n    Vec3 max = {-FLT_MAX, -FLT_MAX, -FLT_MAX};\n    for (auto& vertex : mesh.vertices) {\n        Vec3 transformed = transform * vertex.position;\n        min = Vec3::componentMin(min, transformed);\n        max = Vec3::componentMax(max, transformed);\n    }\n    return {min, max};\n}\n```\n\n**Prompt:** \"Bu platformer oyunu için AABB tabanlı çarpışma sistemi kur; platform üzerine durma, yan çarpma ve yaylanma tepkilerini uygula, dönen platformları da destekle.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":6,"no":"006","cat":"Çarpışma Tespiti","name":"Küre-Küre Çarpışma","desc":"İki kürenin merkezleri arası mesafeyi karşılaştırarak çarpışma tespiti yapın.","tags":["küre","çarpışma","geometri"],"badge1":"Başlangıç","content":"## Küre-Küre Çarpışma Tespiti ve Tepkisi\n\nİki küre arasındaki çarpışma hesabı ve fiziksel tepki vektörü oluşturma.\n\n**Çarpışma testi:**\n```cpp\nstruct Sphere {\n    Vec3 center;\n    float radius;\n    Vec3 velocity;\n    float mass;\n    \n    bool intersects(const Sphere& other) const {\n        Vec3 diff = {\n            center.x - other.center.x,\n            center.y - other.center.y,\n            center.z - other.center.z\n        };\n        float distanceSquared = diff.x*diff.x + diff.y*diff.y + diff.z*diff.z;\n        float radiusSum = radius + other.radius;\n        return distanceSquared <= radiusSum * radiusSum;  // sqrt almaktan kaçın!\n    }\n    \n    float penetrationDepth(const Sphere& other) const {\n        Vec3 diff = {center.x - other.center.x,\n                     center.y - other.center.y,\n                     center.z - other.center.z};\n        float distance = std::sqrt(diff.x*diff.x + diff.y*diff.y + diff.z*diff.z);\n        return (radius + other.radius) - distance;\n    }\n};\n```\n\n**Elastik çarpışma tepkisi:**\n```cpp\nvoid resolveCollision(Sphere& a, Sphere& b) {\n    // Çarpışma normali\n    Vec3 normal = {b.center.x - a.center.x,\n                   b.center.y - a.center.y,\n                   b.center.z - a.center.z};\n    float dist = std::sqrt(normal.x*normal.x + normal.y*normal.y + normal.z*normal.z);\n    normal = {normal.x/dist, normal.y/dist, normal.z/dist};\n    \n    // Göreceli hız\n    Vec3 relVel = {b.velocity.x - a.velocity.x,\n                   b.velocity.y - a.velocity.y,\n                   b.velocity.z - a.velocity.z};\n    float relSpeed = relVel.x*normal.x + relVel.y*normal.y + relVel.z*normal.z;\n    \n    if (relSpeed >= 0) return;  // Ayrılıyorlar, çözüm gerekmez\n    \n    float restitution = 0.8f;  // Esneklik katsayısı (0=plastik, 1=tamamen elastik)\n    float j = -(1 + restitution) * relSpeed;\n    j /= (1/a.mass + 1/b.mass);\n    \n    a.velocity = {a.velocity.x - (j/a.mass)*normal.x, ...};\n    b.velocity = {b.velocity.x + (j/b.mass)*normal.x, ...};\n}\n```\n\n**Prompt:** \"Bilardo oyunu için küre-küre ve küre-duvar çarpışma sistemi yaz; gerçekçi momentum aktarımı, top spin ve yavaşlama (sürtünme) fizik modeli uygula.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":7,"no":"007","cat":"Çarpışma Tespiti","name":"Ray-AABB Kesişimi","desc":"Bir ışının AABB ile kesişip kesişmediğini ve kesişme noktasını bulun.","tags":["ışın","kesişim","geometri"],"badge1":"Orta","content":"## Ray-AABB Kesişim Algoritması\n\nIşın (ray) ile Eksen Hizalı Sınırlayıcı Kutu (AABB) arasındaki kesişimi slab yöntemiyle hesaplayın. Oyunlarda mermi tespiti ve seçim (picking) için temel yapı taşı.\n\n**Algoritma (Slab Method):**\n```cpp\nstruct Ray { glm::vec3 origin, dir; };\nstruct AABB { glm::vec3 min, max; };\n\nbool rayAABBIntersect(const Ray& ray, const AABB& box, float& tMin, float& tMax) {\n    tMin = 0.0f;\n    tMax = FLT_MAX;\n\n    for (int i = 0; i < 3; i++) {\n        if (fabsf(ray.dir[i]) < 1e-8f) {\n            // Işın bu eksene paralel — kutu dışındaysa kesişim yok\n            if (ray.origin[i] < box.min[i] || ray.origin[i] > box.max[i]) return false;\n        } else {\n            float t1 = (box.min[i] - ray.origin[i]) / ray.dir[i];\n            float t2 = (box.max[i] - ray.origin[i]) / ray.dir[i];\n            if (t1 > t2) std::swap(t1, t2);\n            tMin = std::max(tMin, t1);\n            tMax = std::min(tMax, t2);\n            if (tMin > tMax) return false;\n        }\n    }\n    return true;\n}\n```\n\n**Kullanım:**\n```cpp\nRay ray = { {0,0,0}, {0.577f, 0.577f, 0.577f} };\nAABB box = { {-1,-1,-1}, {1,1,1} };\nfloat t0, t1;\nif (rayAABBIntersect(ray, box, t0, t1))\n    printf(\"Kesişim: t=%.2f ile t=%.2f\\n\", t0, t1);\n```\n\n**Optimizasyon:** `invDir = 1/dir` önceden hesaplayarak her frame için division maliyetini azaltın. BVH traversal sırasında aynı ışını yüzlerce AABB'ye karşı test edersiniz.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":8,"no":"008","cat":"Çarpışma Tespiti","name":"OBB Çarpışma Testi","desc":"Döndürülmüş Sınır Kutuları (OBB) kullanarak daha doğru çarpışma tespiti yapın.","tags":["OBB","çarpışma","SAT"],"badge1":"İleri","content":"## OBB-OBB Çarpışma (SAT — Separating Axis Theorem)\n\nDönük (oriented) kutular arasında keskin çarpışma tespiti. SAT, herhangi bir konveks cisim çifti için 15 eksenin hepsinde üst üste binme yoksa objelerin ayrı olduğunu kanıtlar.\n\n**Teori:**\n```\nİki OBB için 15 ayrılma ekseni test edilir:\n- OBB_A'nın 3 yerel ekseni (Ax, Ay, Az)\n- OBB_B'nın 3 yerel ekseni (Bx, By, Bz)\n- Çapraz çarpım çiftleri: Ax×Bx, Ax×By, Ax×Bz,\n                           Ay×Bx, Ay×By, Ay×Bz,\n                           Az×Bx, Az×By, Az×Bz\n```\n\n**C++ Uygulama (Özet):**\n```cpp\nbool obbOverlapOnAxis(const OBB& a, const OBB& b, const glm::vec3& axis) {\n    float ra = glm::abs(glm::dot(a.halfExtents.x * a.axes[0], axis))\n             + glm::abs(glm::dot(a.halfExtents.y * a.axes[1], axis))\n             + glm::abs(glm::dot(a.halfExtents.z * a.axes[2], axis));\n    float rb = glm::abs(glm::dot(b.halfExtents.x * b.axes[0], axis))\n             + glm::abs(glm::dot(b.halfExtents.y * b.axes[1], axis))\n             + glm::abs(glm::dot(b.halfExtents.z * b.axes[2], axis));\n    float d = glm::abs(glm::dot(b.center - a.center, axis));\n    return d <= ra + rb;  // true = üst üste binen (çarpışma var olabilir)\n}\n\nbool obbIntersect(const OBB& a, const OBB& b) {\n    // 15 eksenin tamamını test et — biri false dönerse ayrılmış\n    for (int i = 0; i < 3; i++) {\n        if (!obbOverlapOnAxis(a, b, a.axes[i])) return false;\n        if (!obbOverlapOnAxis(a, b, b.axes[i])) return false;\n        for (int j = 0; j < 3; j++) {\n            glm::vec3 cross = glm::cross(a.axes[i], b.axes[j]);\n            if (glm::length(cross) > 1e-6f && !obbOverlapOnAxis(a, b, cross)) return false;\n        }\n    }\n    return true;\n}\n```\n\n**Dikkat:** Çapraz çarpım eksenleri sıfır vektör olabilir (paralel yüzeyler) — normalize etmeden önce uzunluk kontrolü yapın.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":9,"no":"009","cat":"Fizik Motoru Optimizasyonu","name":"Geniş Faz Optimizasyonu","desc":"Gereksiz dar faz çarpışma kontrollerini azaltmak için geniş faz algoritmaları kullanın.","tags":["optimizasyon","geniş faz","performans"],"badge1":"Orta","content":"## Geniş Faz (Broad Phase) Çarpışma Optimizasyonu\n\nFizik motorlarında her nesne çiftini test etmek O(n²)'dir. Geniş faz, potansiyel çarpışmaları çabuk eleme ile bu maliyeti O(n log n) veya altına indirir.\n\n**Yöntemler ve Karşılaştırma:**\n```\n1. BVH (Bounding Volume Hierarchy):\n   - Her frame: dinamik obje hareketi → BVH güncelle\n   - Query: top-down traversal, AABB overlap testleri\n   - Uygun: orta sayıda dinamik obje (<1000)\n\n2. SAP (Sweep and Prune):\n   - Her eksende sıralı AABB listesi\n   - Ekleme/çıkarma: O(log n), query: O(n + k)\n   - Uygun: küçük harekete sahip çok sayıda obje\n\n3. Spatial Hash Grid:\n   - Dünyayı sabit hücrelere böl: gridCell = floor(pos / cellSize)\n   - Hash: (x*73856093 ^ y*19349663 ^ z*83492791) % bucketCount\n   - Uygun: homojen dağılımlı, benzer boyutlu objeler\n```\n\n**Unity Physics API Eşdeğeri:**\n```csharp\n// Physics.OverlapSphere ile geniş faz sorgusu\nCollider[] nearby = Physics.OverlapSphere(transform.position, 5f, layerMask);\nforeach (var col in nearby) {\n    // Dar faz testi: col ile gerçek çarpışma kontrolü\n}\n```\n\n**BVH Güncelleme Stratejisi:** Her frame refit yerine 'dirty flag' kullanın — sadece hareket eden objeler için AABB yeniden hesapla.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":10,"no":"010","cat":"Fizik Motoru Optimizasyonu","name":"Dar Faz Optimizasyonu","desc":"Doğru çarpışma noktalarını ve normallerini verimli bir şekilde hesaplayın.","tags":["optimizasyon","dar faz","hassasiyet"],"badge1":"Orta","content":"## Dar Faz (Narrow Phase) Çarpışma Optimizasyonu\n\nGeniş fazdan geçen çift sayısı azaldıktan sonra, dar fazda kesin geometrik hesaplama yapılır. Algoritma seçimi şekil türüne göre kritiktir.\n\n**Algoritma Seçim Matrisi:**\n```\nŞekil Çifti          Önerilen Algoritma      Karmaşıklık\nKüre – Küre          Mesafe karşılaştırma    O(1)\nKüre – AABB          Closest point on AABB    O(1)\nAABB – AABB          Eksen üst üste binme     O(1)\nKonveks – Konveks    GJK + EPA               O(n)\nKonveks – Mesh       GJK + HACD              O(n·m)\nMesh – Mesh          BVH traversal + GJK     O(n·m·log)\n```\n\n**Küre-Küre (En Hızlı):**\n```cpp\nbool sphereSphereTest(glm::vec3 posA, float rA, glm::vec3 posB, float rB) {\n    float distSq = glm::dot(posB - posA, posB - posA);\n    float radSum = rA + rB;\n    return distSq <= radSum * radSum;  // sqrt kaçınılır!\n}\n```\n\n**Closest Point on AABB (Küre-AABB):**\n```cpp\nfloat sphereAABBDistance(glm::vec3 spherePos, AABB box) {\n    glm::vec3 closest = glm::clamp(spherePos, box.min, box.max);\n    return glm::length(spherePos - closest);\n}\n```\n\n**Performans İpucu:** Dar faz testlerini multi-thread isle — Bullet/PhysX task dispatcher ile iş parçacığı havuzuna atayın.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":11,"no":"011","cat":"Fizik Motoru Optimizasyonu","name":"Çarpışma Katmanları","desc":"Hangi nesnelerin birbiriyle etkileşime gireceğini kontrol ederek performansı artırın.","tags":["katmanlar","filtreleme","performans"],"badge1":"Başlangıç","content":"## Çarpışma Katmanları (Collision Layers) Kurulumu\n\nFizik simülasyonunda hangi nesne gruplarının birbirleriyle çarpışacağını katman maskesi (bitmask) ile kontrol edin. CPU/GPU maliyetini önemli ölçüde azaltır.\n\n**Bitmask Tasarımı:**\n```\nKatman Tanımları:\n  LAYER_DEFAULT   = 1 << 0  = 0b0001\n  LAYER_PLAYER    = 1 << 1  = 0b0010\n  LAYER_ENEMY     = 1 << 2  = 0b0100\n  LAYER_TRIGGER   = 1 << 3  = 0b1000\n\nMask tablosu (hangi katman hangiyle çarpışır):\n  DEFAULT:  DEFAULT | PLAYER | ENEMY     = 0b0111\n  PLAYER:   DEFAULT | ENEMY | TRIGGER    = 0b1101\n  ENEMY:    DEFAULT | PLAYER             = 0b0011\n  TRIGGER:  PLAYER (sadece)              = 0b0010\n```\n\n**C++ Kullanımı:**\n```cpp\nstruct PhysicsObject {\n    int layer;  int mask;\n};\n\nbool shouldCollide(const PhysicsObject& a, const PhysicsObject& b) {\n    return (a.mask & (1 << b.layer)) != 0\n        && (b.mask & (1 << a.layer)) != 0;\n}\n```\n\n**Unity Eşdeğeri:**\n```csharp\n// Bitmask ile OverlapSphere:\nLayerMask enemyMask = LayerMask.GetMask(\"Enemy\", \"Default\");\nCollider[] hits = Physics.OverlapSphere(pos, 3f, enemyMask);\n\n// Proje ayarları: Edit → Project Settings → Physics → Layer Collision Matrix\n```\n\n**İpucu:** Trigger objeler için ayrı bir katman belirleyin — trigger-trigger çarpışmasını kapatarak gereksiz event flood önleyin.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":12,"no":"012","cat":"Fizik Motoru Optimizasyonu","name":"Veri Yapıları Optimizasyonu","desc":"Fizik verilerini bellekte verimli bir şekilde depolayarak erişim hızını artırın.","tags":["veri","bellek","CACHE"],"badge1":"İleri","content":"## Fizik Motoru Veri Yapıları Optimizasyonu\n\nFizik simülasyonu için bellek erişim örüntüsü optimizasyonu ve cache-friendly veri yapıları.\n\n**SoA (Structure of Arrays) fizik verisi:**\n```cpp\n// AoS — Kötü cache kullanımı\nstruct RigidBodyAoS {\n    Vec3 position;   // 12 byte\n    Vec3 velocity;   // 12 byte\n    Vec3 force;      // 12 byte\n    float mass;      // 4 byte\n    float invMass;   // 4 byte\n    Quaternion rotation;  // 16 byte\n    // Total: 60 byte — güncelleme sırasında cache miss\n};\nstd::vector<RigidBodyAoS> bodies;\n\n// SoA — İyi cache kullanımı\nstruct RigidBodySoA {\n    std::vector<float> posX, posY, posZ;  // Sıralı erişim\n    std::vector<float> velX, velY, velZ;\n    std::vector<float> forceX, forceY, forceZ;\n    std::vector<float> mass, invMass;\n    size_t count;\n    \n    void integrate(float dt) {\n        // Tüm velX dizisi cache'te — çok hızlı!\n        for (size_t i = 0; i < count; ++i) {\n            velX[i] += forceX[i] * invMass[i] * dt;\n            velY[i] += forceY[i] * invMass[i] * dt;\n            velZ[i] += forceZ[i] * invMass[i] * dt;\n        }\n        for (size_t i = 0; i < count; ++i) {\n            posX[i] += velX[i] * dt;\n            posY[i] += velY[i] * dt;\n            posZ[i] += velZ[i] * dt;\n        }\n    }\n};\n```\n\n**SIMD ile vektörleşme:**\n```cpp\n#include <immintrin.h>\n\n// 4 cismi aynı anda güncelle (SSE)\nvoid integrate4(float* velX, float* forceX, float* invMass, float dt, size_t i) {\n    __m128 vel = _mm_load_ps(&velX[i]);\n    __m128 force = _mm_load_ps(&forceX[i]);\n    __m128 inv = _mm_load_ps(&invMass[i]);\n    __m128 dtVec = _mm_set1_ps(dt);\n    \n    vel = _mm_add_ps(vel, _mm_mul_ps(_mm_mul_ps(force, inv), dtVec));\n    _mm_store_ps(&velX[i], vel);\n}\n```\n\n**Prompt:** \"1000+ fizik nesnesinin simülasyonu için SoA düzenine geç; benchmark kur, AoS ile SoA arasındaki performans farkını ölç, SIMD optimizasyonu ekle.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":13,"no":"013","cat":"Katı Cisim Fiziği","name":"Euler Entegrasyonu","desc":"Katı cisimlerin hareketini zaman içinde basit bir şekilde güncellemek için Euler entegrasyonu kullanın.","tags":["entegrasyon","hareket","fizik"],"badge1":"Başlangıç","content":"## Euler Entegrasyonu: Fizik Simülasyon Temeli\n\nHız ve ivmeden konum güncellemesi için sayısal entegrasyon yöntemleri karşılaştırması.\n\n**Temel Euler (Explicit Euler):**\n```cpp\nvoid integrateExplicitEuler(RigidBody& body, float dt) {\n    // Kuvvetten ivme\n    Vec3 acceleration = body.force / body.mass;\n    \n    // Hızı güncelle (eski hız kullanılır)\n    body.velocity += acceleration * dt;\n    \n    // Konumu güncelle (eski konum kullanılır)\n    body.position += body.velocity * dt;  // BUG: yeni hız kullanılmalı symplectic için\n    \n    body.force = Vec3{0,0,0};  // Kuvveti sıfırla\n}\n// Sorun: dt büyükse enerji birikir → patlama!\n```\n\n**Symplectic Euler (daha kararlı):**\n```cpp\nvoid integrateSymplectic(RigidBody& body, float dt) {\n    Vec3 acceleration = body.force / body.mass;\n    \n    // Önce hızı güncelle\n    body.velocity += acceleration * dt;\n    \n    // Sonra YENİ hızla konumu güncelle (fark bu!)\n    body.position += body.velocity * dt;\n    \n    body.force = Vec3{0,0,0};\n}\n// Enerji koruyucu, oyunlar için yeterince iyi\n```\n\n**Runge-Kutta 4 (RK4) — Yüksek doğruluk:**\n```cpp\nstruct State { Vec3 position, velocity; };\nstruct Derivative { Vec3 velocity, acceleration; };\n\nDerivative evaluate(const State& state, float t, float dt, const Derivative& d) {\n    State next = { state.position + d.velocity * dt,\n                   state.velocity + d.acceleration * dt };\n    return { next.velocity, computeAcceleration(next) };\n}\n\nvoid integrateRK4(State& state, float dt) {\n    auto a = evaluate(state, 0, 0, {});\n    auto b = evaluate(state, 0, dt*0.5f, a);\n    auto c = evaluate(state, 0, dt*0.5f, b);\n    auto d = evaluate(state, 0, dt, c);\n    \n    state.velocity += (a.acceleration + 2*(b.acceleration + c.acceleration) + d.acceleration) * (dt/6);\n    state.position += (a.velocity    + 2*(b.velocity    + c.velocity   ) + d.velocity   ) * (dt/6);\n}\n```\n\n**Prompt:** \"Topçu mermisi simülasyonu için RK4 entegrasyonu uygula; hava sürtünmesi, Coriolis etkisi ve rüzgar ekle, farklı entegrasyon yöntemlerinin yörünge farklılığını görselleştir.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":14,"no":"014","cat":"Katı Cisim Fiziği","name":"İmpuls Çözümleyicisi","desc":"Çarpışma sonrası anlık kuvvetleri (impulslar) uygulayarak katı cisimlerin tepkilerini hesaplayın.","tags":["impuls","çarpışma","kuvvet"],"badge1":"Orta","content":"## İmpuls Tabanlı Çarpışma Çözümleyicisi\n\nCisimler arasındaki çarpışma tepkisini impuls (ani kuvvet) yöntemiyle çözme.\n\n**İmpuls hesaplama:**\n```cpp\nvoid resolveCollision(RigidBody& a, RigidBody& b,\n                     const Vec3& contactPoint,\n                     const Vec3& contactNormal,\n                     float restitution) {\n    // Kontak noktasına göre göreceli hız\n    Vec3 rA = contactPoint - a.position;\n    Vec3 rB = contactPoint - b.position;\n    \n    // Lineer + angular (rotasyonel) hız toplamı\n    Vec3 velA = a.velocity + a.angularVelocity.cross(rA);\n    Vec3 velB = b.velocity + b.angularVelocity.cross(rB);\n    Vec3 relativeVelocity = velA - velB;\n    \n    float relVelAlongNormal = relativeVelocity.dot(contactNormal);\n    if (relVelAlongNormal > 0) return;  // Ayrılıyor\n    \n    // İmpuls skaler hesabı\n    float invMassA = 1.0f / a.mass, invMassB = 1.0f / b.mass;\n    float j_numerator = -(1 + restitution) * relVelAlongNormal;\n    \n    Vec3 rAxN = rA.cross(contactNormal);\n    Vec3 rBxN = rB.cross(contactNormal);\n    float j_denominator = invMassA + invMassB\n        + rAxN.dot(a.invInertia * rAxN)\n        + rBxN.dot(b.invInertia * rBxN);\n    \n    float j = j_numerator / j_denominator;\n    \n    // Hız değişimleri\n    a.velocity += contactNormal * (j * invMassA);\n    b.velocity -= contactNormal * (j * invMassB);\n    a.angularVelocity += a.invInertia * rA.cross(contactNormal * j);\n    b.angularVelocity -= b.invInertia * rB.cross(contactNormal * j);\n}\n```\n\n**Çoklu temas noktaları için iteratif çözüm:**\n```cpp\n// Çok temas noktası varsa iteratif yap (10-20 iterasyon)\nfor (int iter = 0; iter < 10; iter++) {\n    for (auto& contact : contacts) {\n        resolveCollision(contact.bodyA, contact.bodyB,\n                         contact.point, contact.normal, 0.5f);\n    }\n}\n```\n\n**Prompt:** \"Box nesnesi zemine düşüyor ve sekiyor; impuls çözümleyicisiyle esneklik katsayısı 0.6, 3 iterasyon ile çözüm yaz, penetrasyon düzeltmesi (Baumgarte stabilization) ekle.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":15,"no":"015","cat":"Katı Cisim Fiziği","name":"Sürtünme Hesaplaması","desc":"Çarpışma yüzeyleri arasındaki sürtünme kuvvetini doğru bir şekilde modelleyin.","tags":["sürtünme","kuvvet","fizik"],"badge1":"Orta","content":"## Sürtünme Hesaplaması: Dinamik ve Statik Sürtünme\n\nCoulomb sürtünme modeli ile yüzeyler arasındaki tangens kuvvetlerini fizik motorunda uygulama.\n\n**Coulomb Sürtünme Modeli:**\n```cpp\nvoid applyFriction(RigidBody& a, RigidBody& b,\n                  const Vec3& contactNormal,\n                  const Vec3& contactPoint,\n                  float normalImpulse,\n                  float staticFriction,\n                  float dynamicFriction) {\n    // Göreceli hız hesapla\n    Vec3 rA = contactPoint - a.position;\n    Vec3 rB = contactPoint - b.position;\n    Vec3 velA = a.velocity + a.angularVelocity.cross(rA);\n    Vec3 velB = b.velocity + b.angularVelocity.cross(rB);\n    Vec3 relVel = velA - velB;\n    \n    // Tanjent hız (normal yönün dışındaki bileşen)\n    Vec3 normalComp = contactNormal * relVel.dot(contactNormal);\n    Vec3 tangentVel = relVel - normalComp;\n    \n    float tangentSpeed = tangentVel.magnitude();\n    if (tangentSpeed < 1e-6f) return;\n    \n    Vec3 tangentDir = tangentVel * (-1.0f / tangentSpeed);\n    \n    // Sürtünme impuls\n    float frictionImpulseMag = ...;  // normal impuls × sürtünme katsayısı\n    \n    // Coulomb kısıtı: |friction| <= mu × |normal|\n    float maxFriction = staticFriction * normalImpulse;\n    if (std::abs(frictionImpulseMag) > maxFriction) {\n        frictionImpulseMag = dynamicFriction * normalImpulse;  // Kinetik sürtünmeye geç\n    }\n    \n    Vec3 frictionImpulse = tangentDir * frictionImpulseMag;\n    a.velocity += frictionImpulse / a.mass;\n    b.velocity -= frictionImpulse / b.mass;\n}\n```\n\n**Malzeme sürtünme tablosu:**\n```cpp\nconst float FRICTION_TABLE[MATERIAL_COUNT][MATERIAL_COUNT] = {\n    //           Beton  Ahşap  Metal  Buz   Kauçuk\n    /* Beton */  {0.6,  0.5,   0.4,  0.05, 0.8},\n    /* Ahşap  */ {0.5,  0.4,   0.3,  0.04, 0.7},\n    /* Metal  */ {0.4,  0.3,   0.15, 0.03, 0.6},\n    /* Buz    */ {0.05, 0.04,  0.03, 0.02, 0.1},\n    /* Kauçuk */ {0.8,  0.7,   0.6,  0.1,  0.9}\n};\n```\n\n**Prompt:** \"Buz pateni oyununda farklı zemin tiplerinde karakter hareketi uygula; kar/buz/beton için farklı statik/dinamik sürtünme katsayıları, ani duruş ve dönüş mekaniklerini fiziksel olarak doğru modelleştir.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":16,"no":"016","cat":"Katı Cisim Fiziği","name":"Yerçekimi ve Kuvvet Uygulama","desc":"Cisimlere yerçekimi ve diğer dış kuvvetleri doğru bir şekilde uygulayın.","tags":["yerçekimi","kuvvet","ivme"],"badge1":"Başlangıç","content":"## Yerçekimi ve Kuvvet Sistemi: Fizik Motoru\n\nRijid cisimler üzerine kuvvet, impuls ve sürekli kuvvet alanları uygulama.\n\n**Kuvvet birikimi sistemi:**\n```cpp\nstruct RigidBody {\n    Vec3 position, velocity;\n    Vec3 accumulatedForce;    // Bu frame biriktirilen kuvvet\n    Vec3 accumulatedTorque;   // Dönme momenti\n    float mass, invMass;\n    Quaternion orientation;\n    Vec3 angularVelocity;\n    Mat3 inertiaTensor, invInertiaTensor;\n    \n    void addForce(const Vec3& force) {\n        accumulatedForce += force;\n    }\n    \n    void addForceAtPoint(const Vec3& force, const Vec3& worldPoint) {\n        accumulatedForce += force;\n        Vec3 torque = (worldPoint - position).cross(force);\n        accumulatedTorque += torque;\n    }\n    \n    void addImpulse(const Vec3& impulse) {\n        velocity += impulse * invMass;\n    }\n    \n    void clearForces() {\n        accumulatedForce = Vec3{0,0,0};\n        accumulatedTorque = Vec3{0,0,0};\n    }\n};\n\n// Yerçekimi uygulama\nfor (auto& body : bodies) {\n    if (!body.isKinematic) {\n        body.addForce({0, -9.81f * body.mass, 0});  // F = mg\n    }\n}\n```\n\n**Kuvvet alanları:**\n```cpp\n// Küresel yerçekimi (gezegen simülasyonu)\nvoid applyGravity(RigidBody& a, RigidBody& b) {\n    const float G = 6.674e-11f;\n    Vec3 dir = b.position - a.position;\n    float distSq = dir.dot(dir);\n    if (distSq < 1.0f) return;  // Singülarity önleme\n    float forceMag = G * a.mass * b.mass / distSq;\n    Vec3 force = dir.normalized() * forceMag;\n    a.addForce(force);\n    b.addForce(-force);\n}\n\n// Rüzgar kuvveti\nvoid applyWind(RigidBody& body, Vec3 windVelocity, float dragCoeff) {\n    Vec3 relativeVel = windVelocity - body.velocity;\n    float speed = relativeVel.magnitude();\n    Vec3 dragForce = relativeVel.normalized() * dragCoeff * speed * speed;\n    body.addForce(dragForce);\n}\n```\n\n**Prompt:** \"Uzay oyunu için n-body yerçekimi simülasyonu yaz; Barnes-Hut ağacı ile O(n log n) karmaşıklık, 1000+ cisimle gerçek zamanlı simülasyon.\"","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":17,"no":"017","cat":"Gelişmiş Çarpışma Algoritmaları","name":"GJK Algoritması","desc":"Karmaşık dışbükey şekiller arasında çarpışma tespiti için GJK algoritmasını kul ç politop olarak kullan\n3. EPA: Politop yüzeyini genişlet, minimum penetrasyon yönünü bul\n4. Çıktı: MTV (normal + derinlik)\n5. Çarpışma yanıtı: impulse = (-(1+e) * relVelocity·n) / (1/mA + 1/mB + ...)\n```\n\n**EPA Pseudocode:**\n```cpp\nstruct Face { glm::vec3 normal; float dist; int idx[3]; };\n\nEPAResult epa(const ConvexShape& a, const ConvexShape& b, Simplex gjkSimplex) {\n    Polytope poly = initFromSimplex(gjkSimplex);\n    \n    while (true) {\n        Face closest = getClosestFace(poly);  // Orijine en yakın yüz\n        glm::vec3 support = minkowskiSupport(a, b, closest.normal);\n        float dist = glm::dot(support, closest.normal);\n        \n        if (dist - closest.dist < 0.001f)  // Yakınsama\n            return { closest.normal, closest.dist };\n        \n        expandPolytope(poly, support);  // Yeni nokta ekle, yüzleri güncelle\n    }\n}\n```\n\n**Çarpışma Yanıtı:**\n```cpp\n// Impulse hesabı (Newton 3. yasa)\nfloat j = -(1 + restitution) * glm::dot(relVel, normal)\n         / (invMassA + invMassB);\nvelA += j * invMassA * normal;\nvelB -= j * invMassB * normal;\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":19,"no":"019","cat":"Performans Analizi ve Profilleme","name":"Fizik Motoru Profilleme","desc":"Fizik motorunuzun performans darboğazlarını belirlemek için profilleme araçlarını kullanın.","tags":["profilleme","performans","analiz"],"badge1":"Orta","content":"## Fizik Motoru Profilleme ve Performans Analizi\n\nFizik darboğazlarını tespit etmek için profil araçları ve metrikler. FPS değil, **ms/frame bazında** ölçümle gerçek maliyeti görün.\n\n**Profil Stratejisi:**\n```\nHer frame bütçesi (60 FPS hedefi = 16.67ms/frame):\n  Render:      ~6ms\n  Fizik:       ~4ms  ← hedef\n  Oyun mantığı: ~3ms\n  Diğer:       ~3ms\n\nFizik alt kategorileri:\n  Geniş faz (BVH/SAP):      <0.5ms\n  Dar faz (GJK/EPA):         <1.5ms\n  Kısıt çözücü (solver):    <1.5ms\n  Entegrasyon:               <0.5ms\n```\n\n**C++ // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'physicsvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
