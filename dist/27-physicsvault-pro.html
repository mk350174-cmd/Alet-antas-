 [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 393, "no": "393", "cat": "Fizik Motoru Optimizasyonu", "name": "Reactive Veri Yapıları Optimizasyonu Stratejisi", "desc": "gözlemlenebilirlik bağlamında Veri Yapıları Optimizasyonu için reactive bir stratejisi. Fizik verilerini bellekte verimli bir şekilde depolayarak erişim hızını artırın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["veri", "bellek", "CACHE", "gözlemlenebilirlik", "reactive", "pro"], "badge1": "Pro", "content": "## Bellek Dostu Yapılar\n1. Dizi tabanlı (Array of Structs) yerine Yapı tabanlı Diziler (Struct of Arrays) kullanmayı düşünün.\n2. Bağlantılı listelerden kaçının, bitişik bellek bölgelerini tercih edin.\n3. Çarpışma çiftlerini depolamak için hash tabloları veya ikili ağaçlar kullanın.\n\n## Uygulama Senaryosu (Reactive)\n\nBu stratejisi, gözlemlenebilirlik alanında Veri Yapıları Optimizasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Veri Yapıları Optimizasyonu akışını reactive yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 394, "no": "394", "cat": "Katı Cisim Fiziği", "name": "Serverless Euler Entegrasyonu Önerisi", "desc": "güvenlik bağlamında Euler Entegrasyonu için serverless bir önerisi. Katı cisimlerin hareketini zaman içinde basit bir şekilde güncellemek için Euler entegrasyonu kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "hareket", "fizik", "güvenlik", "serverless", "orta"], "badge1": "Orta", "content": "## Euler Entegrasyonu Adımları\n1. Cisimlerin hız ve açısal hızlarını güncelleyin: v += a * dt, ω += α * dt.\n2. Konum ve dönüşü güncelleyin: p += v * dt, q += 0.5 * q_omega * dt.\n3. Küçük zaman adımları (dt) kullanarak kararlılığı artırın, ancak hassasiyet sınırlıdır.\n\n## Uygulama Senaryosu (Serverless)\n\nBu önerisi, güvenlik alanında Euler Entegrasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Euler Entegrasyonu akışını serverless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 395, "no": "395", "cat": "Katı Cisim Fiziği", "name": "Sıfır-Trust İmpuls Çözümleyicisi Önerisi", "desc": "API bağlamında İmpuls Çözümleyicisi için sıfır-trust bir önerisi. Çarpışma sonrası anlık kuvvetleri (impulslar) uygulayarak katı cisimlerin tepkilerini hesaplayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["impuls", "çarpışma", "kuvvet", "API", "sıfır-trust", "orta"], "badge1": "Orta", "content": "## İmpuls Uygulama\n1. Çarpışma noktasını, normalini ve cisimlerin göreceli hızını bulun.\n2. Geri sekme (restitution) ve kütle bilgilerini kullanarak impuls büyüklüğünü hesaplayın.\n3. Bu impulsu çarpışan cisimlere uygulayarak hızlarını ve açısal hızlarını güncelleyin.\n\n## Uygulama Senaryosu (Sıfır-Trust)\n\nBu önerisi, API alanında İmpuls Çözümleyicisi problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İmpuls Çözümleyicisi akışını sıfır-trust yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 396, "no": "396", "cat": "Katı Cisim Fiziği", "name": "Şeffaf Sürtünme Hesaplaması Düzeni", "desc": "gözlemlenebilirlik bağlamında Sürtünme Hesaplaması için şeffaf bir düzeni. Çarpışma yüzeyleri arasındaki sürtünme kuvvetini doğru bir şekilde modelleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["sürtünme", "kuvvet", "fizik", "gözlemlenebilirlik", "şeffaf", "başlangıç"], "badge1": "Başlangıç", "content": "## Sürtünme Uygulama\n1. Normal impulsun büyüklüğünü hesaplayın.\n2. Statik ve kinetik sürtünme katsayılarını (μs, μk) belirleyin.\n3. Yüzeydeki göreceli teğetsel hızı kullanarak sürtünme impulsunu hesaplayın.\n4. Uygulanacak sürtünme impulsunu sınırlamak için normal impulsu kullanın.\n\n## Genişletilmiş Notlar (Şeffaf)\n\n- **Hedef Kitle:** Başlangıç seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde Sürtünme Hesaplaması senaryoları\n- **Avantajları:** Bu düzeni sayesinde Sürtünme Hesaplaması işlemleri daha şeffaf hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde Sürtünme Hesaplaması ihtiyacını analiz edin.\n  2. Bu düzeni'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** sürtünme, kuvvet, fizik\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 397, "no": "397", "cat": "Katı Cisim Fiziği", "name": "Atomic Yerçekimi ve Kuvvet Optimizasyonu", "desc": "mimari bağlamında Yerçekimi ve Kuvvet için atomic bir optimizasyonu. Cisimlere yerçekimi ve diğer dış kuvvetleri doğru bir şekilde uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["yerçekimi", "kuvvet", "ivme", "mimari", "atomic", "orta"], "badge1": "Orta", "content": "## Kuvvetlerin Uygulanması\n1. Her cismin kütlesini (m) ve yerçekimi ivmesini (g) tanımlayın.\n2. Cisimlere etki eden yerçekimi kuvvetini Fg = m * g olarak hesaplayın.\n3. Diğer dış kuvvetleri (rüzgar, itme vb.) F_ext olarak ekleyin.\n4. Toplam kuvveti kullanarak ivmeyi (a = F_total / m) güncelleyin.\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Orta seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Yerçekimi ve Kuvvet senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde Yerçekimi ve Kuvvet işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde Yerçekimi ve Kuvvet ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** yerçekimi, kuvvet, ivme\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-400"}}, {"id": 398, "no": "398", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Type-Safe GJK Algoritması Optimizasyonu", "desc": "veri bağlamında GJK Algoritması için type-safe bir optimizasyonu. Karmaşık dışbükey şekiller arasında çarpışma tespiti için GJK algoritmasını kullanın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["GJK", "dar faz", "dışbükey", "veri", "type-safe", "pro"], "badge1": "Pro", "content": "## GJK Çarpışma Kontrolü\n1. Minkowski Farkı'nı kullanarak iki cismin fark uzayındaki destek noktalarını bulun.\n2. Simplex adı verilen bir şekil oluşturarak orijini içerip içermediğini kontrol edin.\n3. Orijin simplex içinde ise çarpışma vardır; aksi takdirde yoktur.\n4. Algoritma, yinelemeli olarak simplex'i büyütür veya küçültür.\n\n## Genişletilmiş Notlar (Type-Safe)\n\n- **Hedef Kitle:** Pro seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde GJK Algoritması senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde GJK Algoritması işlemleri daha type-safe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde GJK Algoritması ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** GJK, dar faz, dışbükey\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-400"}}, {"id": 399, "no": "399", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Reactive EPA Algoritması Rehberi", "desc": "entegrasyon bağlamında EPA Algoritması için reactive bir rehberi. GJK ile tespit edilen çarpışmanın derinliğini ve temas noktasını EPA ile bulun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["EPA", "derinlik", "temas", "entegrasyon", "reactive", "i̇leri"], "badge1": "İleri", "content": "## EPA ile Çarpışma Bilgisi\n1. GJK'dan elde edilen son simplex'i (çarpışma olduğunu varsayarak) kullanın.\n2. Simplex'in orijinaline en yakın yüzeyini bulun.\n3. Bu yüzeyin normali çarpışma normali, orijine olan mesafesi ise çarpışma derinliğidir.\n4. Temas noktasını barycentric koordinatlarla hesaplayın.\n\n## Uygulama Senaryosu (Reactive)\n\nBu rehberi, entegrasyon alanında EPA Algoritması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** EPA Algoritması akışını reactive yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-400"}}, {"id": 400, "no": "400", "cat": "Performans Analizi ve Profilleme", "name": "Şeffaf Fizik Motoru Profilleme Standartı", "desc": "şablon bağlamında Fizik Motoru Profilleme için şeffaf bir standartı. Fizik motorunuzun performans darboğazlarını belirlemek için profilleme araçlarını kullanın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["profilleme", "performans", "analiz", "şablon", "şeffaf", "uzman"], "badge1": "Uzman", "content": "## Fizik Motoru Profilleme\n1. Özel profilleyici araçları (örn. Tracy, RenderDoc) veya motorun kendi profilleme API'sini entegre edin.\n2. Çarpışma tespiti, impuls çözme, entegrasyon gibi ana fizik adımlarını ayrı ayrı ölçün.\n3. En çok zaman alan fonksiyonları ve kod bölgelerini belirleyin.\n4. Optimizasyonları bu darboğazlara odaklayın.\n\n## Uygulama Senaryosu (Şeffaf)\n\nBu standartı, şablon alanında Fizik Motoru Profilleme problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Fizik Motoru Profilleme akışını şeffaf yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-400"}}, {"id": 401, "no": "401", "cat": "Performans Analizi ve Profilleme", "name": "Memory-Safe Çarpışma Tespiti Performans İskeleti", "desc": "logging bağlamında Çarpışma Tespiti Performans için memory-safe bir i̇skeleti. Çarpışma tespiti algoritmalarınızın verimliliğini değerlendirmek için metrikler kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["metrik", "çarpışma", "optimizasyon", "logging", "memory-safe", "başlangıç"], "badge1": "Başlangıç", "content": "## Performans Metrikleri\n1. **FPS:** Saniyedeki kare sayısı, genel akıcılığı gösterir.\n2. **Çarpışma Süresi:** Bir karedeki toplam çarpışma tespiti süresi.\n3. **Çift Sayısı:** İşlenen potansiyel çarpışma çiftlerinin sayısı (geniş faz).\n4. **Gerçek Çarpışma Sayısı:** Dar fazda tespit edilen çarpışma sayısı.\n5. CPU kullanımını takip edin.\n\n## Uygulama Senaryosu (Memory-Safe)\n\nBu i̇skeleti, logging alanında Çarpışma Tespiti Performans problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çarpışma Tespiti Performans akışını memory-safe yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-400"}}, {"id": 402, "no": "402", "cat": "AI Prompt Kütüphanesi", "name": "Sistem Promptu — Fizik", "desc": "Fizik alanı için orijinal sistem promptu promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "system-prompt", "fizik", "orijinal"], "badge1": "Orijinal AI", "content": "## SİSTEM PROMPTU — Fizik Uzmanı\n\nSen kıdemli bir **Fizik** uzmanısın. Görevin: rigid body, physics simulation.\n\n### Davranış Kuralları\n1. **Net ve doğrulanabilir** yanıtlar ver; spekülasyondan kaçın.\n2. Her iddiayı kaynak veya somut örnekle destekle.\n3. Belirsizlik varsa açıkça **\"emin değilim\"** de — yanlış cevap verme.\n4. Kullanıcıya **adım adım** rehberlik et; tek seferde fazla yükleme.\n5. Yanıt formatı: önce TL;DR (2 cümle), sonra detaylar, sonra sonraki adım önerisi.\n\n### Yasak Davranışlar\n- Üretilmiş istatistik veya uydurma kaynak verme\n- Konu dışına çıkma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru Fizik kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — Fizik", "desc": "Fizik alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "fizik", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Fizik\n\nAşağıda Fizik alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** rigid body, physics simulation konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** rigid body, physics simulation alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** rigid body, physics simulation için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Fizik", "desc": "Fizik alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "fizik", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Fizik\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Fizik ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) rigid body, physics simulation ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Fizik", "desc": "Fizik alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "fizik", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Fizik Mentörü\n\n**Kimsin:** 15+ yıl Fizik deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** rigid body, physics simulation\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün Fizik ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — Fizik", "desc": "Fizik alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "fizik", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — Fizik\n\nFizik alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"Fizik\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 407, "no": "407", "cat": "Vektör ve Matris İşlemleri", "name": "Adaptif Vektör Nokta Çarpımı Düzeneği", "desc": "arayüz bağlamında Vektör Nokta Çarpımı için adaptif bir düzeneği. İki vektör arasındaki açıyı veya yansımayı bulmak için nokta çarpımını kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["vektör", "matematik", "geometri", "arayüz", "adaptif", "başlangıç"], "badge1": "Başlangıç", "content": "## Nokta Çarpımı Hesaplama\n1. İki vektör V1(x1, y1, z1) ve V2(x2, y2, z2) tanımlayın.\n2. Nokta çarpımını (V1 ⋅ V2) = (x1*x2) + (y1*y2) + (z1*z2) formülüyle hesaplayın.\n3. Sonuç, vektörlerin göreceli yönü hakkında bilgi verir.\n\n## Uygulama Senaryosu (Adaptif)\n\nBu düzeneği, arayüz alanında Vektör Nokta Çarpımı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Vektör Nokta Çarpımı akışını adaptif yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 408, "no": "408", "cat": "Vektör ve Matris İşlemleri", "name": "Serverless Vektör Çapraz Çarpımı Mimari Yaklaşımı", "desc": "API bağlamında Vektör Çapraz Çarpımı için serverless bir mimari yaklaşımı. İki vektöre dik bir vektör oluşturmak için çapraz çarpımını kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["vektör", "normal", "yön", "API", "serverless", "başlangıç"], "badge1": "Başlangıç", "content": "## Çapraz Çarpım Uygulama\n1. V1(x1, y1, z1) ve V2(x2, y2, z2) vektörlerini belirleyin.\n2. Çapraz çarpımı V1 x V2 = (y1z2 - z1y2, z1x2 - x1z2, x1y2 - y1x2) formülüyle hesaplayın.\n3. Sonuç vektörü, her iki orijinal vektöre de diktir.\n\n## Genişletilmiş Notlar (Serverless)\n\n- **Hedef Kitle:** Başlangıç seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Vektör Çapraz Çarpımı senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Vektör Çapraz Çarpımı işlemleri daha serverless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Vektör Çapraz Çarpımı ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** vektör, normal, yön\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 409, "no": "409", "cat": "Vektör ve Matris İşlemleri", "name": "Atomic Vektör Normalizasyonu Optimizasyonu", "desc": "CI/CD bağlamında Vektör Normalizasyonu için atomic bir optimizasyonu. Bir vektörün yönünü koruyarak uzunluğunu 1'e ayarlamak için normalleştirin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["birim vektör", "yön", "uzunluk", "CI/CD", "atomic", "pro"], "badge1": "Pro", "content": "## Vektörü Normalleştirme\n1. Normalleştirilecek V(x, y, z) vektörünü alın.\n2. Vektörün uzunluğunu (magnitude) ||V|| = sqrt(x^2 + y^2 + z^2) ile bulun.\n3. Her bileşeni uzunluğa bölerek V_normalized = (x/||V||, y/||V||, z/||V||) elde edin.\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Pro seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Vektör Normalizasyonu senaryoları\n- **Avantajları:** Bu optimizasyonu sayesinde Vektör Normalizasyonu işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Vektör Normalizasyonu ihtiyacını analiz edin.\n  2. Bu optimizasyonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** birim vektör, yön, uzunluk\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 410, "no": "410", "cat": "Vektör ve Matris İşlemleri", "name": "Quantum-Hazır Dönüşüm Matrisi Oluşturma Modeli", "desc": "yapay zeka bağlamında Dönüşüm Matrisi Oluşturma için quantum-hazır bir modeli. Bir objenin konumu, dönüşü ve ölçeği için tek bir matris oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["matris", "transformasyon", "model", "yapay zeka", "quantum-hazır", "orta"], "badge1": "Orta", "content": "## Model Matrisi Oluşturma\n1. Birim matrisle başlayın.\n2. Ölçeklendirme (scale) matrisini uygulayın.\n3. Döndürme (rotation) matrisini (genellikle quaternion'dan) uygulayın.\n4. Öteleme (translation) matrisini uygulayın.\n5. Sonuç, dünya uzayında objenin tam dönüşümüdür.\n\n## Uygulama Senaryosu (Quantum-Hazır)\n\nBu modeli, yapay zeka alanında Dönüşüm Matrisi Oluşturma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Dönüşüm Matrisi Oluşturma akışını quantum-hazır yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 411, "no": "411", "cat": "Çarpışma Tespiti", "name": "Reaktif AABB Çarpışma Testi Kütüphanesi", "desc": "mühendislik bağlamında AABB Çarpışma Testi için reaktif bir kütüphanesi. Axis-Aligned Bounding Box (AABB) kullanarak hızlı ve basit çarpışma testi yapın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["çarpışma", "AABB", "kutu", "mühendislik", "reaktif", "orta"], "badge1": "Orta", "content": "## AABB Çarpışma Algoritması\n1. İki AABB'nin minimum ve maksimum x, y, z koordinatlarını belirleyin.\n2. Çarpışma var mı kontrol edin: (A.minX < B.maxX && A.maxX > B.minX) ve aynı şekilde y ve z eksenleri için.\n3. Tüm eksenlerde örtüşme varsa çarpışma vardır.\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Orta seviye mühendislik kullanıcıları\n- **Uygulama Alanı:** mühendislik ekosisteminde AABB Çarpışma Testi senaryoları\n- **Avantajları:** Bu kütüphanesi sayesinde AABB Çarpışma Testi işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mühendislik mimarinizde AABB Çarpışma Testi ihtiyacını analiz edin.\n  2. Bu kütüphanesi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** çarpışma, AABB, kutu\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 412, "no": "412", "cat": "Çarpışma Tespiti", "name": "Idempotent Küre-Küre Çarpışma Akışı", "desc": "güvenlik bağlamında Küre-Küre Çarpışma için idempotent bir akışı. İki kürenin merkezleri arası mesafeyi karşılaştırarak çarpışma tespiti yapın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["küre", "çarpışma", "geometri", "güvenlik", "idempotent", "orta"], "badge1": "Orta", "content": "## Küre Çarpışma Kontrolü\n1. Küre1'in merkezi C1 ve yarıçapı R1'i, Küre2'nin merkezi C2 ve yarıçapı R2'yi alın.\n2. İki merkez arasındaki mesafeyi (d) hesaplayın: d = ||C1 - C2||.\n3. Eğer d <= (R1 + R2) ise küreler çarpışmaktadır.\n\n## Uygulama Senaryosu (Idempotent)\n\nBu akışı, güvenlik alanında Küre-Küre Çarpışma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Küre-Küre Çarpışma akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u k azır Euler Entegrasyonu Rehberi", "desc": "arayüz bağlamında Euler Entegrasyonu için quantum-hazır bir rehberi. Katı cisimlerin hareketini zaman içinde basit bir şekilde güncellemek için Euler entegrasyonu kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "hareket", "fizik", "arayüz", "quantum-hazır", "orta"], "badge1": "Orta", "content": "## Euler Entegrasyonu Adımları\n1. Cisimlerin hız ve açısal hızlarını güncelleyin: v += a * dt, ω += α * dt.\n2. Konum ve dönüşü güncelleyin: p += v * dt, q += 0.5 * q_omega * dt.\n3. Küçük zaman adımları (dt) kullanarak kararlılığı artırın, ancak hassasiyet sınırlıdır.\n\n## Uygulama Senaryosu (Quantum-Hazır)\n\nBu rehberi, arayüz alanında Euler Entegrasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Euler Entegrasyonu akışını quantum-hazır yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-450-final"}}, {"id": 420, "no": "420", "cat": "Katı Cisim Fiziği", "name": "Polyglot İmpuls Çözümleyicisi Metodu", "desc": "akış bağlamında İmpuls Çözümleyicisi için polyglot bir metodu. Çarpışma sonrası anlık kuvvetleri (impulslar) uygulayarak katı cisimlerin tepkilerini hesaplayın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["impuls", "çarpışma", "kuvvet", "akış", "polyglot", "i̇leri"], "badge1": "İleri", "content": "## İmpuls Uygulama\n1. Çarpışma noktasını, normalini ve cisimlerin göreceli hızını bulun.\n2. Geri sekme (restitution) ve kütle I/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-450-final"}}, {"id": 422, "no": "422", "cat": "Katı Cisim Fiziği", "name": "Layered Yerçekimi ve Kuvvet Stratejisi", "desc": "arayüz bağlamında Yerçekimi ve Kuvvet için layered bir stratejisi. Cisimlere yerçekimi ve diğer dış kuvvetleri doğru bir şekilde uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["yerçekimi", "kuvvet", "ivme", "arayüz", "layered", "orta"], "badge1": "Orta", "content": "## Kuvvetlerin Uygulanması\n1. Her cismin kütlesini (m) ve yerçekimi ivmesini (g) tanımlayın.\n2. Cisimlere etki eden yerçekimi kuvvetini Fg = m * g olarak hesaplayın.\n3. Diğer dış kuvvetleri (rüzgar, itme vb.) F_ext olarak ekleyin.\n4. Toplam kuvveti kullanarak ivmeyi (a = F_total / m) güncelleyin.\n\n## Uygulama Senaryosu (Layered)\n\nBu stratejisi, arayüz alanında Yerçekimi ve Kuvvet problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Yerçekimi ve Kuvvet akışını layered yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** arayüz katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-450-final"}}, {"id": 423, "no": "423", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Serverless GJK Algoritması Yapısı", "desc": "gözlemlenebilirlik bağlamında GJK Algoritması için serverless bir yapısı. Karmaşık dışbükey şekiller arasında çarpışma tespiti için GJK algoritmasını kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["GJK", "dar faz", "dışbükey", "gözlemlenebilirlik", "serverless", "orta"], "badge1": "Orta", "content": "## GJK Çarpışma Kontrolü\n1. Minkowski Farkı'nı kullanarak iki cismin fark uzayındaki destek noktalarını bulun.\n2. Simplex adı verilen bir şekil oluşturarak orijini içerip içermediğini kontrol edin.\n3. Orijin simplex içinde ise çarpışma vardır; aksi takdirde yoktur.\n4. Algoritma, yinelemeli olarak simplex'i büyütür veya küçültür.\n\n## Uygulama Senaryosu (Serverless)\n\nBu yapısı, gözlemlenebilirlik alanında GJK Algoritması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** GJK Algoritması akışını serverless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-450-final"}}, {"id": 424, "no": "424", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Production-Grade EPA Algoritması Yönergesi", "desc": "ölçeklenme bağlamında EPA Algoritması için production-grade bir yönergesi. GJK ile tespit edilen çarpışmanın derinliğini ve temas noktasını EPA ile bulun. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["EPA", "derinlik", "temas", "ölçeklenme", "production-grade", "uzman"], "badge1": "Uzman", "content": "## EPA ile Çarpışma Bilgisi\n1. GJK'dan elde edilen son simplex'i inde Fizik Motoru Profilleme senaryoları\n- **Avantajları:** Bu algoritması sayesinde Fizik Motoru Profilleme işlemleri daha modüler hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Fizik Motoru Profilleme ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** profilleme, performans, analiz\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-450-final"}}, {"id": 426, "no": "426", "cat": "Performans Analizi ve Profilleme", "name": "Zero-Config Çarpışma Tespiti Performans Protokolü", "desc": "dağıtım bağlamında Çarpışma Tespiti Performans için zero-config bir protokolü. Çarpışma tespiti algoritmalarınızın verimliliğini değerlendirmek için metrikler kullanın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["metrik", "çarpışma", "optimizasyon", "dağıtım", "zero-config", "pro"], "badge1": "Pro", "content": "## Performans Metrikleri\n1. **FPS:** Saniyedeki kare sayısı, genel akıcılığı gösterir.\n2. **Çarpışma Süresi:** Bir karedeki toplam çarpışma tespiti süresi.\n3. **Çift Sayısı:** İşlenen potansiyel çarpışma çiftlerinin sayısı (geniş faz).\n4. **Gerçek Çarpışma Sayısı:** Dar fazda tespit edilen çarpışma sayısı.\n5. CPU kullanımını takip edin.\n\n## Genişletilmiş Notlar (Zero-Config)\n\n- **Hedef Kitle:** Pro seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde Çarpışma Tespiti Performans senaryoları\n- **Avantajları:** Bu protokolü sayesinde Çarpışma Tespiti Performans işlemleri daha zero-config hale gelir; özellikle ölçek büyüdükçe fark etime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** vektör, matematik, geometri\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 428, "no": "428", "cat": "Vektör ve Matris İşlemleri", "name": "Bağlamsal Vektör Çapraz Çarpımı Kılavuzu", "desc": "monitoring bağlamında Vektör Çapraz Çarpımı için bağlamsal bir kılavuzu. İki vektöre dik bir vektör oluşturmak için çapraz çarpımını kullanın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["vektör", "normal", "yön", "monitoring", "bağlamsal", "pro"], "badge1": "Pro", "content": "## Çapraz Çarpım Uygulama\n1. V1(x1, y1, z1) ve V2(x2, y2, z2) vektörlerini belirleyin.\n2. Çapraz çarpımı V1 x V2 = (y1z2 - z1y2, z1x2 - x1z2, x1y2 - y1x2) formülüyle hesaplayın.\n3. Sonuç vektörü, her iki orijinal vektöre de diktir.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Pro seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde Vektör Çapraz Çarpımı senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde Vektör Çapraz Çarpımı işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde Vektör Çapraz Çarpımı ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** vektör, normal, yön\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 429, "no": "429", "cat": "Vektör ve Matris İşlemleri", "name": "Edge-Optimize Vektör Normalizasyonu Çerçevesi", "desc": "monitoring bağlamında Vektör Normalizasyonu için edge-optimize bir çerçevesi. Bir vektörün yönünü koruyarak uzunluğunu 1'e ayarlamak için normalleştirin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["birim vektör", "yön", "uzunluk", "monitoring", "edge-optimize", "pro"], "badge1": "Pro", "content": "## Vektörü Normalleştirme\n1. Normalleştirilecek V(x, y, z) vektörünü alın.\n2. Vektörün uzunluğunu (magnitude) ||V|| = sqrt(x^2 + y^2 + z^2) ile bulun.\n3. Her bileşeni uzunluğa bölerek V_normalized = (x/||V||, y/||V||, z/||V||) elde edin.\n\n## Uygulama Senaryosu (Edge-Optimize)\n\nBu çerçevesi, monitoring alanında Vektör Normalizasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Vektör Normalizasyonu akışını edge-optimize yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 430, "no": "430", "cat": "Vektör ve Matris İşlemleri", "name": "Polyglot Dönüşüm Matrisi Oluşturma Akışı", "desc": "şablon bağlamında Dönüşüm Matrisi Oluşturma için polyglot bir akışı. Bir objenin konumu, dönüşü ve ölçeği için tek bir matris oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["matris", "transformasyon", "model", "şablon", "polyglot", "orta"], "badge1": "Orta", "content": "## Model Matrisi Oluşturma\n1. Birim matrisle başlayın.\n2. Ölçeklendirme (scale) matrisini uygulayın.\n3. Döndürme (rotation) matrisini (genellikle quaternion'dan) uygulayın.\n4. Öteleme (translation) matrisini uygulayın.\n5. Sonuç, dünya uzayında objenin tam dönüşümüdür.\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** Orta seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Dönüşüm Matrisi Oluşturma senaryoları\n- **Avantajları:** Bu akışı sayesinde Dönüşüm Matrisi Oluşturma işlemleri daha polyglot hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Dönüşüm Matrisi Oluşturma ihtiyacını analiz edin.\n  2. Bu akışı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** matris, transformasyon, model\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 431, "no": "431", "cat": "Çarpışma Tespiti", "name": "Bağlamsal AABB Çarpışma Testi Kılavuzu", "desc": "dağıtım bağlamında AABB Çarpışma Testi için bağlamsal bir kılavuzu. Axis-Aligned Bounding Box (AABB) kullanarak hızlı ve basit çarpışma testi yapın. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["çarpışma", "AABB", "kutu", "dağıtım", "bağlamsal", "i̇leri"], "badge1": "İleri", "content": "## AABB Çarpışma Algoritması\n1. İki AABB'nin minimum ve maksimum x, y, z koordinatlarını belirleyin.\n2. Çarpışma var mı kontrol edin: (A.minX < B.maxX && A.maxX > B.minX) ve aynı şekilde y ve z eksenleri için.\n3. Tüm eksenlerde örtüşme varsa çarpışma vardır.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** İleri seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde AABB Çarpışma Testi senaryoları\n- **Avantajları:** Bu kılavuzu sayesinde AABB Çarpışma Testi işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde AABB Çarpışma Testi ihtiyacını analiz edin.\n  2. Bu kılavuzu'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** çarpışma, AABB, kutu\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-450-final"}}, {"id": 432, "no": "432", "cat": "Çarpışma Tespiti", "name": "Pratik Küre-Küre Çarpışma Protokolü", "desc": "güvenlik bağlamında Küre-Küre Çarpışma için pratik bir protokolü. İki kürenin merkezleri arası mesafeyi karşılaştırarak çarpışma tespiti yapın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["küre", "çarpışma", "geometri", "güvenlik", "pratik", "orta"], "badge1": "Orta", "content": "## Küre Çarpışma Kontrolü\n1. Küre1'in merkezi C1 ve yarıçapı R1'i, Küre2'nin merkezi C2 ve yarıçapı R2'yi alın.\n2. İki merkez arasındaki mesafeyi (d) hesaplayın: d = ||C1 - C2||.\n3. Eğer d <= (R1 + R2) ise küreler çarpışmaktadır.\n\n## Uygulama Senaryosu (Pratik)\n\nBu protokolü, güvenlik alanında Küre-Küre Çarpışma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Küre-Küre Çarpışma akışını pratik yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-450-final"}}, {"id": 433, "no": "433", "cat": "Çarpışma Tespiti", "name": "Observable Ray-AABB Kesişimi Protokolü", "desc": "CI/CD bağlamında Ray-AABB Kesişimi için observable bir protokolü. Bir ışının AABB ile kesişip kesişmediğini ve kesişme noktasını bulun. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["ışın", "kesişim", "geometri", "CI/CD", "observable", "pro"], "badge1": "Pro", "content": "## Ray-AABB Kesişim Algoritması\n1. Işın başlangıç noktası P ve yönü D'yi, AABB'nin min/max köşelerini alın.\n2. Her eksen için kesişim parametrelerini (t_min, t_max) hesaplayın.\n3. Tüm eksenlerin [t_min, t_max] aralıklarının kesişimini bulun.\n4. Kesişim boş değilse ve t_min < t_max ise kesişim vardır.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Pro seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Ray-AABB Kesişimi senaryoları\n- **Avantajları:** Bu protokolü sayesinde Ray-AABB Kesişimi işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Ray-AABB Kesişimi ihtiyacını analiz edin.\n  2. Bu protokolü'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ışın, kesişim, geometri\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 434, "no": "434", "cat": "Çarpışma Tespiti", "name": "Kanıt-Tabanlı OBB Çarpışma Testi Yönergesi", "desc": "API bağlamında OBB Çarpışma Testi için kanıt-tabanlı bir yönergesi. Döndürülmüş Sınır Kutuları (OBB) kullanarak daha doğru çarpışma tespiti yapın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["OBB", "çarpışma", "SAT", "API", "kanıt-tabanlı", "başlangıç"], "badge1": "Başlangıç", "content": "## OBB-OBB Çarpışma (SAT)\n1. Ayrılabilir Eksen Teoremi (SAT) prensiplerini uygulayın.\n2. İki OBB'nin tüm yüzey normalleri ve kenar çiftleri için potansiyel ayrılma eksenlerini belirleyin.\n3. Her eksende iki OBB'nin projeksiyonlarının çakışıp çakışmadığını kontrol edin.\n4. Tüm eksenlerde çakışma varsa çarpışma vardır.\n\n## Genişletilmiş Notlar (Kanıt-Tabanlı)\n\n- **Hedef Kitle:** Başlangıç seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde OBB Çarpışma Testi senaryoları\n- **Avantajları:** Bu yönergesi sayesinde OBB Çarpışma Testi işlemleri daha kanıt-tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde OBB Çarpışma Testi ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** OBB, çarpışma, SAT\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 435, "no": "435", "cat": "Fizik Motoru Optimizasyonu", "name": "Headless Geniş Faz Optimizasyonu Tasarımı", "desc": "API bağlamında Geniş Faz Optimizasyonu için headless bir tasarımı. Gereksiz dar faz çarpışma kontrollerini azaltmak için geniş faz algoritmaları kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["optimizasyon", "geniş faz", "performans", "API", "headless", "orta"], "badge1": "Orta", "content": "## Geniş Faz Stratejileri\n1. Bölgesel Yapılar: Bounding Volume Hiyerarşileri (BVH) veya Uzaysal Bölümleme (Octrees, Grids) kullanın.\n2. Hareketli Objeler: Potansiyel çarpışan çiftleri belirlemek için sweep-and-prune algoritmasını uygulayın.\n3. Yalnızca yakın objeler için dar faz kontrolü yapın.\n\n## Uygulama Senaryosu (Headless)\n\nBu tasarımı, API alanında Geniş Faz Optimizasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Geniş Faz Optimizasyonu akışını headless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 436, "no": "436", "cat": "Fizik Motoru Optimizasyonu", "name": "Kullanıcı-Merkezli Dar Faz Optimizasyonu Algoritması", "desc": "API bağlamında Dar Faz Optimizasyonu için kullanıcı-merkezli bir algoritması. Doğru çarpışma noktalarını ve normallerini verimli bir şekilde hesaplayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["optimizasyon", "dar faz", "hassasiyet", "API", "kullanıcı-merkezli", "başlangıç"], "badge1": "Başlangıç", "content": "## Dar Faz Algoritma Seçimi\n1. Basit şekiller için (küre, AABB) analitik çözümler kullanın.\n2. Karmaşık şekiller için GJK/EPA gibi yinelemeli algoritmaları tercih edin.\n3. Çarpışma bilgilerini (nokta, normal, derinlik) doğru bir şekilde elde edin.\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu algoritması, API alanında Dar Faz Optimizasyonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Dar Faz Optimizasyonu akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** API katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 437, "no": "437", "cat": "Fizik Motoru Optimizasyonu", "name": "Stream Tabanlı Çarpışma Katmanları Sistemi", "desc": "performans bağlamında Çarpışma Katmanları için stream tabanlı bir sistemi. Hangi nesnelerin birbiriyle etkileşime gireceğini kontrol ederek performansı artırın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["katmanlar", "filtreleme", "performans", "stream tabanlı", "orta"], "badge1": "Orta", "content": "## Çarpışma Katmanları Kurulumu\n1. Her fizik objesine bir katman ID'si veya bitmask atayın.\n2. Hangi katmanların birbiriyle çarpışacağını belirleyen bir matris veya kural seti oluşturun.\n3. Çarpışma testi sırasında yalnızca eşleşen katmanlara sahip objeleri kontrol edin.\n\n## Genişletilmiş Notlar (Stream Tabanlı)\n\n- **Hedef Kitle:** Orta seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Çarpışma Katmanları senaryoları\n- **Avantajları:** Bu sistemi sayesinde Çarpışma Katmanları işlemleri daha stream tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Çarpışma Katmanları ihtiyacını analiz edin.\n  2. Bu sistemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** katmanlar, filtreleme, performans\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-450-final"}}, {"id": 438, "no": "438", "cat": "Fizik Motoru Optimizasyonu", "name": "Headless Veri Yapıları Optimizasyonu Protokolü", "desc": "mimari bağlamında Veri Yapıları Optimizasyonu için headless bir protokolü. Fizik verilerini bellekte verimli bir şekilde depolayarak erişim hızını artırın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["veri", "bellek", "CACHE", "mimari", "headless", "orta"], "badge1": "Orta", "content": "## Bellek Dostu Yapılar\n1. Dizi tabanlı (Array of Structs) yerine Yapı tabanlı Diziler (Struct of Arrays) kullanmayı düşünün.\n2. Bağlantılı listelerden kaçının, bitişik bellek bölgelerini tercih edin.\n3. Çarpışma çiftlerini depolamak için hash tabloları veya ikili ağaçlar kullanın.\n\n## Genişletilmiş Notlar (Headless)\n\n- **Hedef Kitle:** Orta seviye mimari kullanıcıları\n- **Uygulama Alanı:** mimari ekosisteminde Veri Yapıları Optimizasyonu senaryoları\n- **Avantajları:** Bu protokolü sayesinde Veri Yapıları Optimizasyonu işlemleri daha headless hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mimari mimarinizde Veri Yapıları Optimizasyonu ihtiyacını analiz edin.\n  2. Bu protokolü'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** veri, bellek, CACHE\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-450-final"}}, {"id": 439, "no": "439", "cat": "Katı Cisim Fiziği", "name": "Pratik Euler Entegrasyonu Anlaşması", "desc": "şablon bağlamında Euler Entegrasyonu için pratik bir anlaşması. Katı cisimlerin hareketini zaman içinde basit bir şekilde güncellemek için Euler entegrasyonu kullanın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["entegrasyon", "hareket", "fizik", "şablon", "pratik", "orta"], "badge1": "Orta", "content": "## Euler Entegrasyonu Adımları\n1. Cisimlerin hız ve açısal hızlarını güncelleyin: v += a * dt, ω += α * dt.\n2. Konum ve dönüşü güncelleyin: p += v * dt, q += 0.5 * q_omega * dt.\n3. Küçük zaman adımları (dt) kullanarak kararlılığı artırın, ancak hassasiyet sınırlıdır.\n\n## Genişletilmiş Notlar (Pratik)\n\n- **Hedef Kitle:** Orta seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Euler Entegrasyonu senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Euler Entegrasyonu işlemleri daha pratik hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Euler Entegrasyonu ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** entegrasyon, hareket, fizik\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-450-final"}}, {"id": 440, "no": "440", "cat": "Katı Cisim Fiziği", "name": "Observable İmpuls Çözümleyicisi Refactor Yöntemi", "desc": "performans bağlamında İmpuls Çözümleyicisi için observable bir refactor yöntemi. Çarpışma sonrası anlık kuvvetleri (impulslar) uygulayarak katı cisimlerin tepkilerini hesaplayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["impuls", "çarpışma", "kuvvet", "performans", "observable", "uzman"], "badge1": "Uzman", "content": "## İmpuls Uygulama\n1. Çarpışma noktasını, normalini ve cisimlerin göreceli hızını bulun.\n2. Geri sekme (restitution) ve kütle bilgilerini kullanarak impuls büyüklüğünü hesaplayın.\n3. Bu impulsu çarpışan cisimlere uygulayarak hızlarını ve açısal hızlarını güncelleyin.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Uzman seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde İmpuls Çözümleyicisi senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde İmpuls Çözümleyicisi işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde İmpuls Çözümleyicisi ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** impuls, çarpışma, kuvvet\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-450-final"}}, {"id": 441, "no": "441", "cat": "Katı Cisim Fiziği", "name": "Production-Grade Sürtünme Hesaplaması Düzeneği", "desc": "monitoring bağlamında Sürtünme Hesaplaması için production-grade bir düzeneği. Çarpışma yüzeyleri arasındaki sürtünme kuvvetini doğru bir şekilde modelleyin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["sürtünme", "kuvvet", "fizik", "monitoring", "production-grade", "başlangıç"], "badge1": "Başlangıç", "content": "## Sürtünme Uygulama\n1. Normal impulsun büyüklüğünü hesaplayın.\n2. Statik ve kinetik sürtünme katsayılarını (μs, μk) belirleyin.\n3. Yüzeydeki göreceli teğetsel hızı kullanarak sürtünme impulsunu hesaplayın.\n4. Uygulanacak sürtünme impulsunu sınırlamak için normal impulsu kullanın.\n\n## Uygulama Senaryosu (Production-Grade)\n\nBu düzeneği, monitoring alanında Sürtünme Hesaplaması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Sürtünme Hesaplaması akışını production-grade yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-450-final"}}, {"id": 442, "no": "442", "cat": "Katı Cisim Fiziği", "name": "Otonom Yerçekimi ve Kuvvet Refactor Yöntemi", "desc": "CI/CD bağlamında Yerçekimi ve Kuvvet için otonom bir refactor yöntemi. Cisimlere yerçekimi ve diğer dış kuvvetleri doğru bir şekilde uygulayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["yerçekimi", "kuvvet", "ivme", "CI/CD", "otonom", "orta"], "badge1": "Orta", "content": "## Kuvvetlerin Uygulanması\n1. Her cismin kütlesini (m) ve yerçekimi ivmesini (g) tanımlayın.\n2. Cisimlere etki eden yerçekimi kuvvetini Fg = m * g olarak hesaplayın.\n3. Diğer dış kuvvetleri (rüzgar, itme vb.) F_ext olarak ekleyin.\n4. Toplam kuvveti kullanarak ivmeyi (a = F_total / m) güncelleyin.\n\n## Genişletilmiş Notlar (Otonom)\n\n- **Hedef Kitle:** Orta seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Yerçekimi ve Kuvvet senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde Yerçekimi ve Kuvvet işlemleri daha otonom hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Yerçekimi ve Kuvvet ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** yerçekimi, kuvvet, ivme\n", "source": {"generated": true, "variant_of": 16, "wave": "v3-450-final"}}, {"id": 443, "no": "443", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Resilient GJK Algoritması Akışı", "desc": "yapay zeka bağlamında GJK Algoritması için resilient bir akışı. Karmaşık dışbükey şekiller arasında çarpışma tespiti için GJK algoritmasını kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["GJK", "dar faz", "dışbükey", "yapay zeka", "resilient", "başlangıç"], "badge1": "Başlangıç", "content": "## GJK Çarpışma Kontrolü\n1. Minkowski Farkı'nı kullanarak iki cismin fark uzayındaki destek noktalarını bulun.\n2. Simplex adı verilen bir şekil oluşturarak orijini içerip içermediğini kontrol edin.\n3. Orijin simplex içinde ise çarpışma vardır; aksi takdirde yoktur.\n4. Algoritma, yinelemeli olarak simplex'i büyütür veya küçültür.\n\n## Genişletilmiş Notlar (Resilient)\n\n- **Hedef Kitle:** Başlangıç seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde GJK Algoritması senaryoları\n- **Avantajları:** Bu akışı sayesinde GJK Algoritması işlemleri daha resilient hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde GJK Algoritması ihtiyacını analiz edin.\n  2. Bu akışı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** GJK, dar faz, dışbükey\n", "source": {"generated": true, "variant_of": 17, "wave": "v3-450-final"}}, {"id": 444, "no": "444", "cat": "Gelişmiş Çarpışma Algoritmaları", "name": "Dağıtık EPA Algoritması Çekirdeği", "desc": "ölçeklenme bağlamında EPA Algoritması için dağıtık bir çekirdeği. GJK ile tespit edilen çarpışmanın derinliğini ve temas noktasını EPA ile bulun. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["EPA", "derinlik", "temas", "ölçeklenme", "dağıtık", "pro"], "badge1": "Pro", "content": "## EPA ile Çarpışma Bilgisi\n1. GJK'dan elde edilen son simplex'i (çarpışma olduğunu varsayarak) kullanın.\n2. Simplex'in orijinaline en yakın yüzeyini bulun.\n3. Bu yüzeyin normali çarpışma normali, orijine olan mesafesi ise çarpışma derinliğidir.\n4. Temas noktasını barycentric koordinatlarla hesaplayın.\n\n## Uygulama Senaryosu (Dağıtık)\n\nBu çekirdeği, ölçeklenme alanında EPA Algoritması problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** EPA Algoritması akışını dağıtık yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 18, "wave": "v3-450-final"}}, {"id": 445, "no": "445", "cat": "Performans Analizi ve Profilleme", "name": "Pratik Fizik Motoru Profilleme İskeleti", "desc": "şablon bağlamında Fizik Motoru Profilleme için pratik bir i̇skeleti. Fizik motorunuzun performans darboğazlarını belirlemek için profilleme araçlarını kullanın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["profilleme", "performans", "analiz", "şablon", "pratik", "uzman"], "badge1": "Uzman", "content": "## Fizik Motoru Profilleme\n1. Özel profilleyici araçları (örn. Tracy, RenderDoc) veya motorun kendi profilleme API'sini entegre edin.\n2. Çarpışma tespiti, impuls çözme, entegrasyon gibi ana fizik adımlarını ayrı ayrı ölçün.\n3. En çok zaman alan fonksiyonları ve kod bölgelerini belirleyin.\n4. Optimizasyonları bu darboğazlara odaklayın.\n\n## Genişletilmiş Notlar (Pratik)\n\n- **Hedef Kitle:** Uzman seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Fizik Motoru Profilleme senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Fizik Motoru Profilleme işlemleri daha pratik hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Fizik Motoru Profilleme ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** profilleme, performans, analiz\n", "source": {"generated": true, "variant_of": 19, "wave": "v3-450-final"}}, {"id": 446, "no": "446", "cat": "Performans Analizi ve Profilleme", "name": "Senkron Çarpışma Tespiti Performans Sözleşmesi", "desc": "mikroservis bağlamında Çarpışma Tespiti Performans için senkron bir sözleşmesi. Çarpışma tespiti algoritmalarınızın verimliliğini değerlendirmek için metrikler kullanın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["metrik", "çarpışma", "optimizasyon", "mikroservis", "senkron", "başlangıç"], "badge1": "Başlangıç", "content": "## Performans Metrikleri\n1. **FPS:** Saniyedeki kare sayısı, genel akıcılığı gösterir.\n2. **Çarpışma Süresi:** Bir karedeki toplam çarpışma tespiti süresi.\n3. **Çift Sayısı:** İşlenen potansiyel çarpışma çiftlerinin sayısı (geniş faz).\n4. **Gerçek Çarpışma Sayısı:** Dar fazda tespit edilen çarpışma sayısı.\n5. CPU kullanımını takip edin.\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** Başlangıç seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Çarpışma Tespiti Performans senaryoları\n- **Avantajları:** Bu sözleşmesi sayesinde Çarpışma Tespiti Performans işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Çarpışma Tespiti Performans ihtiyacını analiz edin.\n  2. Bu sözleşmesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** metrik, çarpışma, optimizasyon\n", "source": {"generated": true, "variant_of": 20, "wave": "v3-450-final"}}, {"id": 447, "no": "447", "cat": "Vektör ve Matris İşlemleri", "name": "AI-Augmented Vektör Nokta Çarpımı Refactor Yöntemi", "desc": "caching bağlamında Vektör Nokta Çarpımı için ai-augmented bir refactor yöntemi. İki vektör arasındaki açıyı veya yansımayı bulmak için nokta çarpımını kullanın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["vektör", "matematik", "geometri", "caching", "ai-augmented", "pro"], "badge1": "Pro", "content": "## Nokta Ça // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'physicsvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
