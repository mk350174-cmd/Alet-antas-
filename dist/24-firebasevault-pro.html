<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">F</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Firebase<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Oyunlar ve web araçları için backend, yetkilendirme ve sunucusuz veritabanı şablonları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>25</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Firebase ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">25</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">

const ITEMS = [{"id":1,"cat":"TypeScript","name":"material-kit-react","desc":"React Dashboard made with Material UI’s components. Our pro template contains features like TypeScript version, authenti","tags":["admin","admin-dashboard","admin-template","auth0","★5584"],"badge1":"TypeScript","badge2":"★ 5.584","content":"**Material Kit React — Firebase Admin Dashboard Şablonu**\n\nDevias'ın React + Material UI tabanlı admin dashboard başlangıç kiti. Firebase Authentication ve Firestore entegrasyonu için hazır altyapı sunar.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/devias-io/material-kit-react\ncd material-kit-react\nnpm install\n# Firebase config ekle:\ncp src/config.example.js src/config.js\nnpm run dev  # http://localhost:3000\n```\n\n**Firebase Auth Entegrasyonu:**\n```javascript\n// src/contexts/firebase-auth-context.js\nimport { initializeApp } from 'firebase/app';\nimport { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'firebase/auth';\n\nconst app = initializeApp(firebaseConfig);\nconst auth = getAuth(app);\n\nexport const signIn = (email, password) =>\n  signInWithEmailAndPassword(auth, email, password);\n\nexport const useAuth = () => {\n  const [user, setUser] = useState(null);\n  useEffect(() => onAuthStateChanged(auth, setUser), []);\n  return user;\n};\n```\n\n**Özellikler:** Responsive sidebar, data table, form validation, dark/light mode, Next.js ile SSR desteği. Pro sürümde Stripe entegrasyonu ve multi-tenant yapısı mevcut.","meta":{"Yıldız":5584,"Dil":"TypeScript","Fork":2572},"source":{"url":"https://github.com/devias-io/material-kit-react","license":"MIT","author":"devias-io"},"no":"001"},{"id":2,"cat":"TypeScript","name":"create-expo-stack","desc":"CLI tool to initialize a React Native application with Expo. Provides options to include Typescript, file-based routing ","tags":["boilerplate","cli","expo","expo-cli","★2555"],"badge1":"TypeScript","badge2":"★ 2.555","content":"roninoss/create-expo-stack\n\nCLI tool to initialize a React Native application with Expo. Provides options to include Typescript, file-based routing via Expo Router, configuration based routing via pure React Navigation, styling via Nativewind, Restyle, Unistyles, StyleSheets, or Tamagui, and/or backend as a service such as Firebase and Supabase.\n\n⭐ Yıldız: 2555\n🍴 Fork: 114\n📅 Güncelleme: 2026-06-02\n🔗 https://github.com/roninoss/create-expo-stack","meta":{"Yıldız":2555,"Dil":"TypeScript","Fork":114},"source":{"url":"https://github.com/roninoss/create-expo-stack","license":"MIT","author":"roninoss"},"no":"002"},{"id":3,"cat":"JavaScript","name":"bento-starter","desc":":bento: Full-Stack solution to quickly build PWA applications with Vue.js and Firebase","tags":["circleci","firebase","firebase-auth","firebase-firestore","★1512"],"badge1":"JavaScript","badge2":"★ 1.512","content":"**Bento Starter — Firebase + Vue.js PWA Şablonu**\n\nFirebase, Vue.js ve Workbox ile hızlı PWA (Progressive Web App) geliştirmek için full-stack başlangıç kiti.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/kefranabg/bento-starter\ncd bento-starter\nnpm install\n# .env dosyası oluştur:\necho \"VUE_APP_FIREBASE_API_KEY=your_key\" > .env.local\nnpm run serve\n```\n\n**Firebase Servisleri Entegrasyonu:**\n```javascript\n// src/firebase/init.js\nimport { initializeApp } from 'firebase/app';\nimport { getFirestore } from 'firebase/firestore';\nimport { getAuth } from 'firebase/auth';\nimport { getStorage } from 'firebase/storage';\n\nconst app = initializeApp({\n  apiKey: process.env.VUE_APP_FIREBASE_API_KEY,\n  authDomain: process.env.VUE_APP_FIREBASE_AUTH_DOMAIN,\n  projectId: process.env.VUE_APP_FIREBASE_PROJECT_ID\n});\n\nexport const db = getFirestore(app);\nexport const auth = getAuth(app);\nexport const storage = getStorage(app);\n```\n\n**PWA Özellikleri:** Offline çalışma (Workbox service worker), push notification, install prompt, app shell architecture. `npm run build` → Firebase Hosting'e deploy için `firebase deploy --only hosting`.","meta":{"Yıldız":1512,"Dil":"JavaScript","Fork":128},"source":{"url":"https://github.com/kefranabg/bento-starter","license":"MIT","author":"kefranabg"},"no":"003"},{"id":4,"cat":"TypeScript","name":"hoverboard","desc":"Conference website template","tags":["conference-management","firebase","firestore","gdg","★1150"],"badge1":"TypeScript","badge2":"★ 1.150","content":"## hoverboard: GDG DevFest Web Uygulaması Şablonu\n\nGoogle Developer Groups etkinlikleri için özel olarak tasarlanmış Firebase destekli konferans web uygulaması.\n\n**Özellikler:**\n- Konuşmacı profilleri ve oturum programı\n- Firebase Authentication ile giriş\n- Firestore ile gerçek zamanlı güncelleme\n- PWA desteği (çevrimdışı çalışır)\n- Polymer/LitElement tabanlı\n\n**Kurulum:**\n```bash\ngit clone https://github.com/gdg-x/hoverboard\nnpm install\n# Firebase proje bağla\nfirebase login\nfirebase use --add\nnpm run start  # Yerel geliştirme\n```\n\n**Özelleştirme:**\n```javascript\n// src/firebase-config.js\nexport const firebaseConfig = {\n  apiKey: process.env.FIREBASE_API_KEY,\n  authDomain: 'your-event.firebaseapp.com',\n  projectId: 'your-event-project'\n};\n```\n\n**Veri yapısı:**\n```\nFirestore:\n- /sessions/{id}: title, description, speaker, room, time\n- /speakers/{id}: name, bio, photo, social\n- /schedule/{day}/timeslots/{id}: sessions[]\n- /gallery/{id}: images[]\n```\n\n**Deploy:**\n```bash\nnpm run build\nfirebase deploy --only hosting\n```\n\n**Prompt:** \"Bu hoverboard şablonunu bir yazılım konferansı için özelleştir; çok oturumlu program, konuşmacı biyografileri ve canlı tweet duvarı ekle.\"","meta":{"Yıldız":1150,"Dil":"TypeScript","Fork":1084},"source":{"url":"https://github.com/gdg-x/hoverboard","license":"NOASSERTION","author":"gdg-x"},"no":"004"},{"id":5,"cat":"JavaScript","name":"web","desc":"Supercharged version of Create React App with all the bells and whistles.","tags":["avatar","boilerplate","create-react-app","demo","★727"],"badge1":"JavaScript","badge2":"★ 727","content":"## Firebase Web Başlangıç Şablonu\n\nFirebase servislerini entegre eden temel web uygulaması başlangıç kiti.\n\n**Kapsanan Firebase servisleri:**\n- Authentication (Google, Email)\n- Firestore (gerçek zamanlı DB)\n- Storage (dosya yükleme)\n- Hosting (deploy)\n- Analytics\n\n**Hızlı kurulum:**\n```bash\nnpm create firebase-app@latest my-app\ncd my-app\nnpm install firebase\n```\n\n**Firebase SDK kurulumu:**\n```javascript\nimport { initializeApp } from 'firebase/app';\nimport { getFirestore, collection, addDoc, onSnapshot } from 'firebase/firestore';\nimport { getAuth, signInWithGoogle } from 'firebase/auth';\n\nconst app = initializeApp(firebaseConfig);\nconst db = getFirestore(app);\nconst auth = getAuth(app);\n\n// Gerçek zamanlı veri dinleme\nconst unsubscribe = onSnapshot(collection(db, 'messages'), (snapshot) => {\n  snapshot.docs.forEach(doc => console.log(doc.data()));\n});\n```\n\n**Güvenlik kuralları:**\n```\n// Firestore rules\nrules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /users/{userId} {\n      allow read, write: if request.auth.uid == userId;\n    }\n  }\n}\n```\n\n**Prompt:** \"Firebase Authentication + Firestore kullanan gerçek zamanlı mesajlaşma uygulaması yap; güvenlik kurallarını kur ve Google sign-in entegre et.\"","meta":{"Yıldız":727,"Dil":"JavaScript","Fork":141},"source":{"url":"https://github.com/rmuif/web","license":"MIT","author":"rmuif"},"no":"005"},{"id":6,"cat":"Dart","name":"flutter_getx_template","desc":"Create flutter project with all needed configuration in two minutes (theme, localization, connect to firebase, FCM, loca","tags":["android","api","app","dart","★514"],"badge1":"Dart","badge2":"★ 514","content":"**Flutter GetX Şablonu — Firebase + State Management**\n\nGetX state management, Firebase auth/Firestore ve Dependency Injection ile yapılandırılmış Flutter başlangıç şablonu. 2 dakikada yeni proje.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/EmadBeltaje/flutter_getx_template\ncd flutter_getx_template\nflutter pub get\n# google-services.json'u android/app/ altına koy\n# GoogleService-Info.plist'i ios/Runner/ altına koy\nflutter run\n```\n\n**GetX Controller Örneği:**\n```dart\nclass AuthController extends GetxController {\n  final FirebaseAuth _auth = FirebaseAuth.instance;\n  final Rx<User?> _user = Rx<User?>(null);\n  User? get user => _user.value;\n\n  @override\n  void onInit() {\n    _user.bindStream(_auth.authStateChanges());\n    ever(_user, _setInitialScreen);\n    super.onInit();\n  }\n\n  void _setInitialScreen(User? user) {\n    if (user == null) Get.offAllNamed('/login');\n    else Get.offAllNamed('/home');\n  }\n\n  Future<void> signIn(String email, String password) async {\n    await _auth.signInWithEmailAndPassword(email: email, password: password);\n  }\n}\n```\n\n**Mimari:** GetX Routes + Bindings, Firestore CRUD servisleri, responsive UI (GetX responsive helper), localization desteği.","meta":{"Yıldız":514,"Dil":"Dart","Fork":136},"source":{"url":"https://github.com/EmadBeltaje/flutter_getx_template","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"EmadBeltaje"},"no":"006"},{"id":7,"cat":"JavaScript","name":"react-firebase-admin","desc":"React ⚛️ starter kit with Firebase 🔥 and Bulma for setting up an admin dashboard - Highly scalable, PWA, Serverless","tags":["admin-dashboard","boilerplate","bulma","cloud-functions","★418"],"badge1":"JavaScript","badge2":"★ 418","content":"**React Firebase Admin — Bulma CSS + Firebase Başlangıç Kiti**\n\nFirebase Authentication, Firestore ve Bulma CSS kullanan React admin uygulaması şablonu. RBAC (rol tabanlı erişim kontrolü) hazır yapısı ile.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/CreateThrive/react-firebase-admin\ncd react-firebase-admin\nnpm install\ncp .env.example .env  # Firebase config değerlerini gir\nnpm start\n```\n\n**Kullanıcı Rol Yönetimi (Firestore):**\n```javascript\n// users/{uid} dökümanı:\n// { email: '...', role: 'admin' | 'editor' | 'viewer', createdAt }\n\n// Firestore Security Rules:\nrules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /admin/{document=**} {\n      allow read, write: if get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'admin';\n    }\n    match /users/{userId} {\n      allow read: if request.auth.uid == userId;\n    }\n  }\n}\n```\n\n**Özellikler:** Kullanıcı listesi (Firestore pagination), rol atama, Firebase Cloud Functions ile email doğrulama, Bulma + Sass ile özelleştirilebilir UI.","meta":{"Yıldız":418,"Dil":"JavaScript","Fork":100},"source":{"url":"https://github.com/CreateThrive/react-firebase-admin","license":"MIT","author":"CreateThrive"},"no":"007"},{"id":8,"cat":"JavaScript","name":"Amazon-starter-template-nextjs","desc":"This is the Official Starter template for the AMAZON 5 Day challenge (The SECRET Challenge!) - Next.js | React.js | Tail","tags":["★383"],"badge1":"JavaScript","badge2":"★ 383","content":"**Amazon Klonu — Next.js + Firebase Başlangıç Şablonu**\n\nSonny Sangha'nın ünlü Amazon klon projesi için Next.js + Firebase + Stripe ödeme entegrasyonu başlangıç şablonu.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/sonnysangha/Amazon-starter-template-nextjs\ncd Amazon-starter-template-nextjs\nnpm install\n# .env.local oluştur:\ncat > .env.local <<EOF\nNEXTAUTH_URL=http://localhost:3000\nNEXTAUTH_SECRET=your_secret\nFIREBASE_API_KEY=xxx\nFIREBASE_AUTH_DOMAIN=xxx.firebaseapp.com\nSTRIPE_PUBLIC_KEY=pk_test_xxx\nSTRIPE_SECRET_KEY=sk_test_xxx\nEOF\nnpm run dev\n```\n\n**Sepet Durumu (Redux + Firebase):**\n```javascript\n// slices/basketSlice.js\nconst basketSlice = createSlice({\n  name: 'basket',\n  initialState: { items: [] },\n  reducers: {\n    addToBasket: (state, action) => {\n      state.items = [...state.items, action.payload];\n    },\n    removeFromBasket: (state, action) => {\n      const idx = state.items.findIndex(i => i.id === action.payload.id);\n      if (idx >= 0) state.items.splice(idx, 1);\n    }\n  }\n});\n```\n\n**Özellikler:** Google OAuth (NextAuth), Stripe Checkout, Firebase Firestore sipariş geçmişi, Tailwind CSS, Vercel deployment.","meta":{"Yıldız":383,"Dil":"JavaScript","Fork":183},"source":{"url":"https://github.com/sonnysangha/Amazon-starter-template-nextjs","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"sonnysangha"},"no":"008"},{"id":9,"cat":"Vue","name":"karngyan.com","desc":"Dark themed, SEO friendly: Nuxt Content + TailwindCSS + Firebase + i18n + RSS2 based SPA for procrastinating developers ","tags":["blog","comments","developer","firebase","★368"],"badge1":"Vue","badge2":"★ 368","content":"**karngyan.com — Nuxt + Firebase + TailwindCSS Blog Şablonu**\n\nSEO optimizasyonlu, dark theme, çok dilli (i18n) kişisel blog şablonu. Nuxt Content + Firebase Hosting + RSS feed.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/karngyan/karngyan.com\ncd karngyan.com\nnpm install\n# content/ klasörü altındaki markdown dosyalarını düzenle\nnpm run dev  # http://localhost:3000\n\n# Firebase Hosting deploy:\nnpx firebase login\nnpx firebase init hosting\nnpm run generate  # Statik dosya üret\nnpx firebase deploy --only hosting\n```\n\n**Nuxt Content Blog Yazısı:**\n```markdown\n---\ntitle: \"Firebase ile Gerçek Zamanlı Uygulama\"\ndescription: \"Firestore ve Vue 3 ile canlı veri güncelleme\"\nimg: /img/firebase-post.jpg\nalt: Firebase\ncreatedAt: 2024-01-15\ntags: [firebase, vue, realtime]\n---\n\n## Giriş\nFirestore'un `onSnapshot` metodu...\n```\n\n**Özellikler:** Nuxt SEO meta tags, OG image otomatik üretimi, sitemap.xml, RSS feed (`/feed.xml`), Google Analytics entegrasyonu, Disqus yorum sistemi.","meta":{"Yıldız":368,"Dil":"Vue","Fork":120},"source":{"url":"https://github.com/karngyan/karngyan.com","license":"MIT","author":"karngyan"},"no":"009"},{"id":10,"cat":"JavaScript","name":"graphcool-templates","desc":"📗 Collection of Graphcool Templates","tags":["auth0","firebase","graphcool","graphql","★350"],"badge1":"JavaScript","badge2":"★ 350","content":"## Graphcool Templates: GraphQL Backend Şablonları\n\nFirebase + GraphQL birleştiren backend servis şablonları koleksiyonu.\n\n**Şablon kategorileri:**\n```\nauthentication/\n  auth0/           # Auth0 entegrasyonu\n  facebook/        # Facebook OAuth\n  github/          # GitHub OAuth\n  google/          # Google OAuth\n  email-password/  # Klasik giriş\n\npayment/\n  stripe/          # Ödeme işlemleri\n  stripe-subscription/ # Abonelik\n\nfile-handling/\n  filestack/       # Dosya yükleme CDN\n  s3/              # AWS S3 entegrasyonu\n```\n\n**GraphQL şema örneği:**\n```graphql\ntype User @model {\n  id: ID! @isUnique\n  email: String! @isUnique\n  password: String!\n  posts: [Post!]! @relation(name: \"UserPosts\")\n  createdAt: DateTime!\n}\n\ntype Post @model {\n  id: ID! @isUnique\n  title: String!\n  content: String\n  author: User! @relation(name: \"UserPosts\")\n  published: Boolean! @defaultValue(value: false)\n}\n```\n\n**Resolver fonksiyon örneği:**\n```javascript\n// functions/authenticate.js\nmodule.exports = async (event) => {\n  const { email, password } = event.data;\n  // Kimlik doğrulama mantığı\n  return { data: { token, userId } };\n};\n```\n\n**Prompt:** \"Graphcool şablonlarından Stripe abonelik sistemi ve GitHub OAuth'u kombine et; SaaS uygulaması için ödeme + giriş altyapısı kur.\"","meta":{"Yıldız":350,"Dil":"JavaScript","Fork":97},"source":{"url":"https://github.com/prisma-archive/graphcool-templates","license":"MIT","author":"prisma-archive"},"no":"010"},{"id":11,"cat":"SCSS","name":"adminlte-3-react","desc":"React 18.3.1 start-up project with AdminLTE 3.2.0 template","tags":["admin-panel","admin-template","adminlte","adminlte3","★281"],"badge1":"SCSS","badge2":"★ 281","content":"## AdminLTE 3 React: Firebase Destekli Admin Dashboard\n\nAdminLTE 3 tasarım sistemini React ve Firebase ile entegre eden yönetim paneli şablonu.\n\n**Özellikler:**\n- AdminLTE 3 bileşen kütüphanesi + React\n- Firebase Authentication ile güvenli giriş\n- Firestore ile gerçek zamanlı veri\n- Rol tabanlı erişim kontrolü (admin/user)\n- Grafik ve istatistik bileşenleri\n\n**Proje yapısı:**\n```\nsrc/\n  components/\n    Sidebar/\n    Navbar/\n    Cards/\n    Charts/\n  pages/\n    Dashboard/\n    Users/\n    Settings/\n  firebase/\n    config.js\n    auth.js\n    firestore.js\n  hooks/\n    useAuth.js\n    useFirestore.js\n```\n\n**Firestore ile canlı veri:**\n```javascript\nimport { useCollection } from 'react-firebase-hooks/firestore';\nimport { collection } from 'firebase/firestore';\n\nfunction UserTable() {\n  const [users, loading] = useCollection(collection(db, 'users'));\n  \n  return (\n    <table>\n      {users?.docs.map(doc => (\n        <tr key={doc.id}><td>{doc.data().email}</td></tr>\n      ))}\n    </table>\n  );\n}\n```\n\n**Prompt:** \"Bu admin paneli şablonunu e-ticaret yönetim sistemine dönüştür; ürün CRUD, sipariş takibi ve satış grafiği için Firebase entegrasyonu yaz.\"","meta":{"Yıldız":281,"Dil":"SCSS","Fork":143},"source":{"url":"https://github.com/erdkse/adminlte-3-react","license":"MIT","author":"erdkse"},"no":"011"},{"id":12,"cat":"Kotlin","name":"Beaver","desc":"Android MVVM + Dagger 2 (Hilt) + JetPack project template ","tags":["android","androidx","appindexing","crashlytics","★274"],"badge1":"Kotlin","badge2":"★ 274","content":"## Beaver: Flutter Firebase Başlangıç Kiti\n\nFlutter + Firebase entegrasyonu için hazır bir mobil uygulama şablonu.\n\n**Kapsanan özellikler:**\n- Flutter + Firebase Authentication\n- Firestore gerçek zamanlı veritabanı\n- Firebase Storage (profil fotoğrafı)\n- Push Notification (FCM)\n- Tema sistemi (açık/koyu mod)\n\n**Kurulum:**\n```bash\ngit clone https://github.com/caijinglong/beaver\ncd beaver\nflutter pub get\n# Firebase kurulumu:\nflutterfire configure  # firebase_options.dart üretir\nflutter run\n```\n\n**Firebase Authentication (Flutter):**\n```dart\nimport 'package:firebase_auth/firebase_auth.dart';\n\nclass AuthService {\n  final FirebaseAuth _auth = FirebaseAuth.instance;\n  \n  // Email/şifre girişi\n  Future<UserCredential> signIn(String email, String password) async {\n    return await _auth.signInWithEmailAndPassword(\n      email: email, password: password);\n  }\n  \n  // Oturum durumu stream\n  Stream<User?> get authStateChanges => _auth.authStateChanges();\n}\n```\n\n**Firestore CRUD (Flutter):**\n```dart\nfinal db = FirebaseFirestore.instance;\n\n// Veri ekle\nawait db.collection('posts').add({'title': 'Hello', 'createdAt': Timestamp.now()});\n\n// Gerçek zamanlı izle\ndb.collection('posts').snapshots().listen((snapshot) {\n  snapshot.docs.forEach((doc) => print(doc.data()));\n});\n```\n\n**Prompt:** \"Beaver şablonunu kullanarak sosyal medya benzeri Flutter uygulaması yap; gönderi paylaşma, takip etme ve bildirim sistemi Firebase ile entegre et.\"","meta":{"Yıldız":274,"Dil":"Kotlin","Fork":29},"source":{"url":"https://github.com/SamYStudiO/Beaver","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"SamYStudiO"},"no":"012"},{"id":13,"cat":"HTML","name":"adminlte-3-vue","desc":"Vue 3.4.27 start-up project with AdminLTE 3.2.0 template","tags":["admin-lte","admin-panel","admin-template","adminlte","★268"],"badge1":"HTML","badge2":"★ 268","content":"## AdminLTE 3 Vue: Firebase Vue Admin Dashboard\n\nVue.js 3 + AdminLTE 3 + Firebase entegrasyonlu yönetim paneli başlangıç kiti.\n\n**Teknik yığın:**\n- Vue 3 (Composition API)\n- Pinia (durum yönetimi)\n- Vue Router 4\n- Firebase Authentication + Firestore\n- AdminLTE 3 CSS çerçevesi\n\n**Pinia + Firebase store:**\n```javascript\n// stores/auth.js\nimport { defineStore } from 'pinia';\nimport { signInWithEmailAndPassword, onAuthStateChanged } from 'firebase/auth';\n\nexport const useAuthStore = defineStore('auth', {\n  state: () => ({ user: null, loading: true }),\n  \n  actions: {\n    async login(email, password) {\n      const cred = await signInWithEmailAndPassword(auth, email, password);\n      this.user = cred.user;\n    },\n    init() {\n      onAuthStateChanged(auth, (user) => {\n        this.user = user;\n        this.loading = false;\n      });\n    }\n  }\n});\n```\n\n**Route koruması:**\n```javascript\n// router/index.js\nrouter.beforeEach((to) => {\n  const authStore = useAuthStore();\n  if (to.meta.requiresAuth && !authStore.user) {\n    return { name: 'Login' };\n  }\n});\n```\n\n**Prompt:** \"Vue 3 + Firebase ile rol tabanlı erişim kontrolü ekle; admin/editor/viewer rolleri Firestore'da sakla, Vue Router guard ile sayfa erişimini kısıtla.\"","meta":{"Yıldız":268,"Dil":"HTML","Fork":118},"source":{"url":"https://github.com/erdkse/adminlte-3-vue","license":"MIT","author":"erdkse"},"no":"013"},{"id":14,"cat":"SCSS","name":"adminlte-3-angular","desc":"Angular 18.0.0 start-up project with AdminLTE 3.2.0 template","tags":["admin-panel","admin-template","adminlte","adminlte3","★260"],"badge1":"SCSS","badge2":"★ 260","content":"## AdminLTE 3 Angular: Firebase Angular Admin Panel\n\nAngular + AdminLTE 3 + Firebase entegrasyonlu kurumsal yönetim paneli şablonu.\n\n**Teknik yığın:**\n- Angular 17+ (standalone components)\n- NgRx (durum yönetimi)\n- AngularFire (Firebase resmi Angular paketi)\n- AdminLTE 3 SCSS\n\n**AngularFire kurulum:**\n```bash\nng add @angular/fire\n# Otomatik Firebase entegrasyon ve environment.ts güncellemesi\n```\n\n**AngularFire AuthGuard:**\n```typescript\n// auth.guard.ts\nimport { inject } from '@angular/core';\nimport { Auth, user } from '@angular/fire/auth';\nimport { map, take } from 'rxjs/operators';\n\nexport const authGuard = () => {\n  const auth = inject(Auth);\n  return user(auth).pipe(\n    take(1),\n    map(u => u ? true : '/login')\n  );\n};\n```\n\n**Firestore ile reactive veri:**\n```typescript\nimport { Firestore, collection, collectionData } from '@angular/fire/firestore';\n\n@Component({...})\nexport class ProductListComponent {\n  products$ = collectionData(\n    collection(inject(Firestore), 'products'),\n    { idField: 'id' }\n  );\n}\n```\n\n**Template:**\n```html\n<tr *ngFor=\"let product of products$ | async\">\n  <td>{{ product.name }}</td>\n  <td>{{ product.price | currency:'TRY' }}</td>\n</tr>\n```\n\n**Prompt:** \"AngularFire ile müşteri yönetim modülü yaz; sonsuz scroll ile Firestore sayfalama, arama filtresi ve CSV dışa aktarma özelliği ekle.\"","meta":{"Yıldız":260,"Dil":"SCSS","Fork":205},"source":{"url":"https://github.com/erdkse/adminlte-3-angular","license":"MIT","author":"erdkse"},"no":"014"},{"id":15,"cat":"Svelte","name":"svelte-firebase","desc":"A template to help you start developing SPAs with Svelte and Firebase.","tags":["hacktoberfest","★228"],"badge1":"Svelte","badge2":"★ 228","content":"## Svelte + Firebase Başlangıç Şablonu\n\nSvelte/SvelteKit ile Firebase servislerini entegre eden minimal ama tam özellikli başlangıç kiti.\n\n**SvelteKit + Firebase kurulum:**\n```bash\nnpm create svelte@latest my-app\ncd my-app\nnpm install firebase\n# Firebase yapılandırması\n```\n\n**lib/firebase.js:**\n```javascript\nimport { initializeApp } from 'firebase/app';\nimport { getFirestore } from 'firebase/firestore';\nimport { getAuth } from 'firebase/auth';\nimport { browser } from '$app/environment';\n\nlet app, db, auth;\nif (browser) {\n  app = initializeApp(firebaseConfig);\n  db = getFirestore(app);\n  auth = getAuth(app);\n}\nexport { db, auth };\n```\n\n**Svelte Auth Store:**\n```javascript\n// stores/auth.js\nimport { writable } from 'svelte/store';\nimport { onAuthStateChanged } from 'firebase/auth';\n\nexport const user = writable(null);\n\nexport function initAuth() {\n  onAuthStateChanged(auth, (u) => user.set(u));\n}\n```\n\n**SvelteKit route koruması:**\n```javascript\n// +layout.server.js\nexport async function load({ cookies }) {\n  const token = cookies.get('token');\n  if (!token) return redirect(307, '/login');\n  return { user: await verifyToken(token) };\n}\n```\n\n**Prompt:** \"SvelteKit + Firebase ile blog uygulaması yap; SSR ile SEO uyumlu içerik, Firestore ile yorum sistemi, Storage ile görsel yükleme.\"","meta":{"Yıldız":228,"Dil":"Svelte","Fork":50},"source":{"url":"https://github.com/jorgegorka/svelte-firebase","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"jorgegorka"},"no":"015"},{"id":16,"cat":"JavaScript","name":"expo-native-firebase","desc":"🔥 Native Firebase Expo App (iOS, Android) Demo for Firestore, Notifications, Analytics, Storage, Messaging, Database  \ud83d","tags":["android","app","boilerplate","cross-platform","★217"],"badge1":"JavaScript","badge2":"★ 217","content":"**Expo Native Firebase — iOS/Android Demo**\n\nEvan Bacon'ın Expo + React Native + Firebase Native SDK entegrasyon demo'su. Firestore, Notifications, Auth ve Storage özellikleri.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/EvanBacon/expo-native-firebase\ncd expo-native-firebase\nnpm install\n# EAS Build ile native build:\nnpx eas-cli build --platform android --profile development\n```\n\n**Firestore Gerçek Zamanlı Güncelleme:**\n```javascript\nimport firestore from '@react-native-firebase/firestore';\nimport { useEffect, useState } from 'react';\n\nfunction usePosts() {\n  const [posts, setPosts] = useState([]);\n  useEffect(() => {\n    const unsubscribe = firestore()\n      .collection('posts')\n      .orderBy('createdAt', 'desc')\n      .limit(20)\n      .onSnapshot(snapshot => {\n        setPosts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));\n      });\n    return unsubscribe;  // Component unmount'ta dinlemeyi durdur\n  }, []);\n  return posts;\n}\n```\n\n**Push Notification:**\n```javascript\nimport messaging from '@react-native-firebase/messaging';\nawait messaging().requestPermission();\nconst token = await messaging().getToken();\n// Token'ı Firestore'a kaydet: users/{uid}/fcmToken\n```","meta":{"Yıldız":217,"Dil":"JavaScript","Fork":30},"source":{"url":"https://github.com/EvanBacon/expo-native-firebase","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"EvanBacon"},"no":"016"},{"id":17,"cat":"Dart","name":"TallyAssist","desc":"Open source Flutter-based template for a business assistant application","tags":["android","android-apps","business-solutions","firebase","★211"],"badge1":"Dart","badge2":"★ 211","content":"## TallyAssist: Firebase Tabanlı Muhasebe Asistanı\n\nFirebase ve yapay zeka destekli muhasebe ve fatura yönetimi şablonu.\n\n**Özellikler:**\n- Fatura oluşturma ve PDF dışa aktarma\n- Firebase Firestore'da müşteri/fatura veritabanı\n- Gelir/gider takibi ve grafikler\n- AI destekli kategori önerisi\n- Firebase Auth ile çok kullanıcılı\n\n**Fatura veri modeli:**\n```javascript\n// Firestore koleksiyon yapısı\n// /users/{uid}/invoices/{invoiceId}\n{\n  invoiceNumber: 'INV-2024-001',\n  client: { name: 'ABC Ltd.', email: 'info@abc.com' },\n  items: [\n    { description: 'Web Geliştirme', qty: 1, price: 5000, tax: 18 }\n  ],\n  subtotal: 5000,\n  taxTotal: 900,\n  total: 5900,\n  status: 'pending',  // 'paid', 'overdue'\n  dueDate: Timestamp,\n  createdAt: Timestamp\n}\n```\n\n**Firestore kuralları (çok kullanıcılı):**\n```\nrules_version = '2';\nservice cloud.firestore {\n  match /databases/{db}/documents {\n    match /users/{userId}/{document=**} {\n      allow read, write: if request.auth.uid == userId;\n    }\n  }\n}\n```\n\n**Prompt:** \"Bu muhasebe şablonuna otomatik kategori önerisi ekle; AI geçmiş harcamaları analiz etsin ve yeni girişler için kategori otomatik doldurun, aylık rapor üretsin.\"","meta":{"Yıldız":211,"Dil":"Dart","Fork":95},"source":{"url":"https://github.com/TallyAssist/TallyAssist","license":"MIT","author":"TallyAssist"},"no":"017"},{"id":18,"cat":"Dart","name":"templates","desc":"The official library of starter templates for Firebase Studio","tags":["★194"],"badge1":"Dart","badge2":"★ 194","content":"## Firebase Official Templates: Resmi Başlangıç Şablonları\n\nFirebase'in resmi GitHub deposundaki örnekler ve başlangıç şablonları koleksiyonu.\n\n**Temel şablonlar:**\n```bash\n# Firebase CLI ile proje başlatma\nfirebase init\n# Seçenekler:\n# → Hosting + Firestore + Authentication\n# → Functions + Hosting\n# → Emulators (yerel test)\n\n# Örnek projeleri görüntüle\nfirebase experiments:list\n```\n\n**quickstarts-js (resmi JavaScript örnekleri):**\n```\nauth-email/         # Email/şifre girişi\nauth-google/        # Google OAuth\nfirestore/          # CRUD örnekleri\nfunctions/          # Cloud Functions\nstorage/            # Dosya yükleme/indirme\nperformance/        # Performans izleme\nremote-config/      # A/B test konfigürasyonu\n```\n\n**Hızlı Firestore örneği:**\n```javascript\nimport { getFirestore, doc, setDoc, getDoc } from 'firebase/firestore';\n\nconst db = getFirestore();\n\n// Belge yaz\nawait setDoc(doc(db, 'cities', 'LA'), {\n  name: 'Los Angeles',\n  state: 'CA',\n  country: 'USA'\n});\n\n// Belge oku\nconst docSnap = await getDoc(doc(db, 'cities', 'LA'));\nif (docSnap.exists()) console.log(docSnap.data());\n```\n\n**Emülatör ile yerel test:**\n```bash\nfirebase emulators:start\n# http://localhost:4000 — Emülatör UI\n# Gerçek Firebase'e erişmeden test et\n```\n\n**Prompt:** \"Firebase emülatör ortamı kur; Firestore, Auth ve Functions emülatörlerini başlat, Jest entegrasyonu ile otomatik test pipeline oluştur.\"","meta":{"Yıldız":194,"Dil":"Dart","Fork":80},"source":{"url":"https://github.com/firebase-studio/templates","license":"Apache-2.0","author":"firebase-studio"},"no":"018"},{"id":19,"cat":"Dart","name":"flutter_app_template","desc":"Flutter + Firebaseアプリのスターターキット、新規アプリ開発はこのテンプレートをベースに始める。お仕事のご相談はこちらから https://neverjp.com/contact/","tags":["android","dart","firebase","flutter","★193"],"badge1":"Dart","badge2":"★ 193","content":"**Flutter Firebase Uygulama Şablonu (Japonca Kaynak)**\n\nHukusuke'nin Flutter + Firebase başlangıç kiti. Clean Architecture, Riverpod state management ve Firestore CRUD işlemleri için production-ready yapı.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/hukusuke1007/flutter_app_template\ncd flutter_app_template\nflutter pub get\n# FlutterFire CLI ile Firebase bağla:\ndart pub global activate flutterfire_cli\nflutterfire configure\nflutter run\n```\n\n**Riverpod + Firestore Provider:**\n```dart\n// lib/features/todo/data/todo_repository.dart\nclass TodoRepository {\n  final FirebaseFirestore _firestore;\n  TodoRepository(this._firestore);\n\n  Stream<List<Todo>> watchTodos(String userId) {\n    return _firestore\n        .collection('users').doc(userId)\n        .collection('todos')\n        .orderBy('createdAt', descending: true)\n        .snapshots()\n        .map((s) => s.docs.map(Todo.fromFirestore).toList());\n  }\n\n  Future<void> addTodo(String userId, String title) =>\n    _firestore.collection('users').doc(userId)\n      .collection('todos').add({\n        'title': title, 'done': false,\n        'createdAt': FieldValue.serverTimestamp()\n      });\n}\n\nfinal todoRepoProvider = Provider((ref) =>\n  TodoRepository(FirebaseFirestore.instance));\n```\n\n**Özellikler:** Feature-first mimari, GoRouter navigasyon, Firebase Analytics, Crashlytics, Remote Config.","meta":{"Yıldız":193,"Dil":"Dart","Fork":47},"source":{"url":"https://github.com/hukusuke1007/flutter_app_template","license":"MIT","author":"hukusuke1007"},"no":"019"},{"id":20,"cat":"TypeScript","name":"nextjs-firebase-starter","desc":"A production-ready starter template for building full-stack web applications with Next.js 15, React 19, and Firebase. Th","tags":["authentication","authentification","crud","database","★157"],"badge1":"TypeScript","badge2":"★ 157","content":"milliorn/nextjs-firebase-starter\n\nA production-ready starter template for building full-stack web applications with Next.js 15, React 19, and Firebase. This template ships with email/password authentication, Firestore data helpers, a route-protected admin page, and a global auth context so you can skip the boilerplate.\n\n⭐ Yıldız: 157\n🍴 Fork: 36\n📅 Güncelleme: 2026-06-03\n🔗 https://github.com/milliorn/nextjs-firebase-starter","meta":{"Yıldız":157,"Dil":"TypeScript","Fork":36},"source":{"url":"https://github.com/milliorn/nextjs-firebase-starter","license":"MIT","author":"milliorn"},"no":"020"},{"id":21,"cat":"Dart","name":"flutter_login_screen","desc":"A basic login/register screen that can be used as a template for future Flutter projects. ","tags":["firebase","flutter","flutter-examples","flutter-template","★141"],"badge1":"Dart","badge2":"★ 141","content":"**Flutter Login/Register Ekranı — Firebase Auth Şablonu**\n\nFirebase Authentication entegrasyonlu temel giriş ve kayıt ekranı. Email/parola ile birlikte Google Sign-In için hazır şablon.\n\n**Kurulum:**\n```bash\ngit clone https://github.com/KimLangholz/flutter_login_screen\ncd flutter_login_screen\nflutter pub get\n# pubspec.yaml:\n# firebase_auth: ^4.0.0\n# firebase_core: ^2.0.0\n# google_sign_in: ^6.0.0\nflutter run\n```\n\n**Email/Parola Giriş:**\n```dart\nFuture<UserCredential?> signInWithEmail(String email, String password) async {\n  try {\n    return await FirebaseAuth.instance.signInWithEmailAndPassword(\n      email: email.trim(),\n      password: password,\n    );\n  } on FirebaseAuthException catch (e) {\n    // Hata kodları: user-not-found, wrong-password, too-many-requests\n    throw _mapFirebaseError(e.code);\n  }\n}\n\nString _mapFirebaseError(String code) {\n  const errors = {\n    'user-not-found': 'Kullanıcı bulunamadı',\n    'wrong-password': 'Hatalı şifre',\n    'too-many-requests': 'Çok fazla deneme, lütfen bekleyin'\n  };\n  return errors[code] ?? 'Giriş başarısız';\n}\n```\n\n**Form Validasyonu:**\n```dart\nTextFormField(\n  validator: (value) {\n    if (value == null || !value.contains('@')) return 'Geçerli e-posta girin';\n    return null;\n  },\n)\n```\n\nŞablon üzerine Google/Apple Sign-In ekleyerek sosyal giriş desteği ekleyebilirsiniz.","meta":{"Yıldız":141,"Dil":"Dart","Fork":28},"source":{"url":"https://github.com/KimLangholz/flutter_login_screen","license":"MIT","author":"KimLangholz"},"no":"021"},{"id":22,"cat":"TypeScript","name":"cloudflare-starter-kit","desc":"Template (boilerplate) repository for scaffolding Cloudflare Workers projects","tags":["boilerplate","cdn","cloudflare","cloudflare-workers","★139"],"badge1":"TypeScript","badge2":"★ 139","content":"## Cloudflare + Firebase Starter Kit\n\nCloudflare Workers/Pages ile Firebase'i birleştiren edge-first uygulama başlangıç kiti.\n\n**Mimari:**\n```\nKullanıcı → Cloudflare CDN (edge) → Firebase\n         → Workers (serverless) → Firestore\n         → Pages (static host) → Firebase Auth\n```\n\n**Cloudflare Worker + Firebase Admin:**\n```javascript\n// worker.js (Cloudflare Workers)\nimport { initializeApp, cert } from 'firebase-admin/app';\nimport { getFirestore } from 'firebase-admin/firestore';\n\nconst app = initializeApp({\n  credential: cert({\n    projectId: FIREBASE_PROJECT_ID,\n    privateKey: FIREBASE_PRIVATE_KEY.replace(/\\\\n/g, '\\n'),\n    clientEmail: FIREBASE_CLIENT_EMAIL\n  })\n});\n\nexport default {\n  async fetch(request, env) {\n    const db = getFirestore();\n    const snapshot = await db.collection('products').get();\n    const products = snapshot.docs.map(d => ({id: d.id, ...d.data()}));\n    return Response.json({ products });\n  }\n};\n```\n\n**Çevre değişkenleri (güvenli):**\n```bash\n# Cloudflare secret olarak sakla (repoya commit etme!)\nwrangler secret put FIREBASE_PRIVATE_KEY\nwrangler secret put FIREBASE_CLIENT_EMAIL\n```\n\n**Prompt:** \"Cloudflare Workers + Firebase ile rate-limited API servisi yaz; KV Store'da hız sınırları sakla, aşanlara 429 döndür, Firebase Firestore'a istek logla.\"","meta":{"Yıldız":139,"Dil":"TypeScript","Fork":20},"source":{"url":"https://github.com/kriasoft/cloudflare-starter-kit","license":"MIT","author":"kriasoft"},"no":"022"},{"id":23,"cat":"TypeScript","name":"venefish","desc":"Boilerplate & template for Next.js project deployable on Vercel. Firebase, shadcn/ui and Tailwind.","tags":["boilerplate","boilerplate-application","boilerplate-front-end","boilerplate-react","★130"],"badge1":"TypeScript","badge2":"★ 130","content":"## Venefish: Firebase + Next.js Balıkçılık Takip Uygulaması\n\nFirebase ve Next.js kullanan, konum tabanlı veri takibi için örnek niş uygulama şablonu.\n\n**Öğrenme değeri:**\nNiş bir domain (balıkçılık kayıtları) üzerinden genel Firebase + Next.js best practice'lerini gösterir: konum verisi, fotoğraf depolama, filtre/arama.\n\n**Teknik yapı:**\n```javascript\n// pages/api/catches.js — API route\nimport { getFirestore, collection, addDoc, query, where, getDocs } from 'firebase/firestore';\n\nexport default async function handler(req, res) {\n  if (req.method === 'POST') {\n    const { species, weight, location, photoUrl } = req.body;\n    const doc = await addDoc(collection(db, 'catches'), {\n      species, weight, location,\n      photoUrl,\n      userId: req.session.user.uid,\n      caughtAt: new Date()\n    });\n    res.json({ id: doc.id });\n  }\n}\n```\n\n**Coğrafi konum ile sorgulama:**\n```javascript\n// GeoFirestore ile yakındaki kayıtlar\nimport GeoFirestore from 'geofirestore';\nconst geoFirestore = new GeoFirestore(db);\nconst geoCollection = geoFirestore.collection('catches');\n\n// 10km yarıçapında avlanma noktaları\nconst query = geoCollection.near({\n  center: new firebase.firestore.GeoPoint(41.0082, 28.9784),\n  radius: 10\n});\n```\n\n**Prompt:** \"Bu şablonu baz alarak konum tabanlı etkinlik kayıt uygulaması yap; GPS konum, fotoğraf yükleme, harita görünümü ve sosyal paylaşım Firebase + Next.js ile kur.\"","meta":{"Yıldız":130,"Dil":"TypeScript","Fork":38},"source":{"url":"https://github.com/enesien/venefish","license":"MIT","author":"enesien"},"no":"023"},{"id":24,"cat":"JavaScript","name":"ReactJS-ecommerce-template","desc":"online shop template - React, Redux, Firebase, Stripe","tags":["★128"],"badge1":"JavaScript","badge2":"★ 128","content":"## ReactJS E-ticaret Firebase Şablonu\n\nReact + Firebase Authentication + Firestore ile tam e-ticaret frontend uygulaması.\n\n**Özellikler:**\n- Ürün listeleme, filtreleme, arama\n- Sepet ve favori sistemi (Firestore)\n- Stripe/İyzico ödeme entegrasyonu\n- Sipariş takibi\n- Kullanıcı profili ve adres yönetimi\n\n**Sepet Context:**\n```javascript\nimport { createContext, useContext, useState, useEffect } from 'react';\nimport { doc, setDoc, onSnapshot } from 'firebase/firestore';\n\nconst CartContext = createContext();\n\nexport function CartProvider({ children }) {\n  const [cart, setCart] = useState([]);\n  const { user } = useAuth();\n  \n  // Firestore ile cart senkronizasyonu\n  useEffect(() => {\n    if (!user) return;\n    const unsubscribe = onSnapshot(\n      doc(db, 'carts', user.uid),\n      (doc) => setCart(doc.data()?.items || [])\n    );\n    return unsubscribe;\n  }, [user]);\n  \n  async function addToCart(product) {\n    const newCart = [...cart, product];\n    await setDoc(doc(db, 'carts', user.uid), { items: newCart });\n  }\n  \n  return <CartContext.Provider value={{ cart, addToCart }}>{children}</CartContext.Provider>;\n}\n```\n\n**Prompt:** \"Bu e-ticaret şablonuna Türk ödeme sistemi İyzico entegre et; ödeme akışını kur, başarılı/başarısız siparişleri Firestore'a kaydet, admin için sipariş yönetimi ekle.\"","meta":{"Yıldız":128,"Dil":"JavaScript","Fork":70},"source":{"url":"https://github.com/bruceallday/ReactJS-ecommerce-template","license":"GitHub Search API · her repo kendi lisansına tabidir","author":"bruceallday"},"no":"024"},{"id":25,"cat":"JavaScript","name":"sapper-firebase-typescript-graphql-tailwindcss-actions-template","desc":"A template that includes Sapper for Svelte, Firebase functions and hosting, TypeScript and TypeGraphQL, Tailwind CSS, ES","tags":["apollo-server","cssnano","eslint","firebase","★105"],"badge1":"JavaScript","badge2":"★ 105","content":"babichjacob/sapper-firebase-typescript-graphql-tailwindcss-actions-template\n\nA template that includes Sapper for Svelte, Firebase functions and hosting, TypeScript and TypeGraphQL, Tailwind CSS, ESLint, and automatic building and deployment with GitHub Actions\n\n⭐ Yıldız: 105\n🍴 Fork: 14\n📅 Güncelleme: 2024-12-25\n🔗 https://github.com/babichjacob/sapper-firebase-typescript-graphql-tailwindcss-actions-template","meta":{"Yıldız":105,"Dil":"JavaScript","Fork":14},"source":{"url":"https://github.com/babichjacob/sapper-firebase-typescript-graphql-tailwindcss-actions-template","license":"MIT","author":"babichjacob"},"no":"025"}];

// ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'firebasevault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
