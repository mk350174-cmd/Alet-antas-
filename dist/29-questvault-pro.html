<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}

.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}

.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}

.cat-sec{border-bottom:1px solid var(--border)}

.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}

.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}

.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}

.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}

.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}

.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>

<body>

<header class="hero">
  <div class="hero-corner">Q</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Quest<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Çok dallı (branching) RPG görev tasarımı jeneratörü.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>21</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Quest ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">21</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">
    <div class="empty" id="emptyState">
      <div class="glyph">◈</div>
      <p>Sol taraftan bir öğe seç</p>
    </div>
    <div id="itemDetail" style="display:none"></div>
    <div id="allGrid" style="display:none"></div>

<script>

const CATS = [{"id":"Görev Yapısı","name":"Görev Yapısı","color":"#7CB9E8"},{"id":"Diyalog Tasarımı","name":"Diyalog Tasarımı","color":"#FFB6C1"},{"id":"Mekan & Çevre","name":"Mekan & Çevre","color":"#90EE90"},{"id":"NPC Etkileşimleri","name":"NPC Etkileşimleri","color":"#DDA0DD"},{"id":"Sonuç & Karar","name":"Sonuç & Karar","color":"#FFD700"}];
const ITEMS = [{"id":1,"no":"001","cat":"Görev Yapısı","name":"Basit Toplama Görevi","desc":"Belirli öğeleri toplayıp bir NPC'ye teslim etmeyi içeren temel görev şablonu.","tags":["temel","toplama","NPC","başlangıç"],"badge1":"Başlangıç","content":"**Basit Toplama Görevi Sistemi: RPG Item Koleksiyonu**\n\nToplama görevleri, oyuncuyu dünyayı keşfetmeye yönlendiren temel quest tipidir.\n\n**Unity C# Örnek Implementasyon:**\n```csharp\n[System.Serializable]\npublic class CollectionQuest {\n  public string questName;\n  public string itemToCollect;  // \"Kırmızı Mantar\"\n  public int requiredAmount;\n  public int currentAmount;\n  \n  public bool IsComplete => currentAmount >= requiredAmount;\n  \n  public void OnItemCollected(string itemName) {\n    if (itemName == itemToCollect && !IsComplete) {\n      currentAmount++;\n      UIManager.Instance.UpdateQuestTracker(this);\n      if (IsComplete) QuestManager.Instance.CompleteQuest(this);\n    }\n  }\n}\n```\n\n**Tasarım Prensipleri:**\n- Miktar: 3-5 arası (daha az = çok kolay, daha fazla = tekrarcı)\n- Görsel ipucu: İtem etrafında parlama efekti, minimap işareti\n- Çeşitlilik: Farklı spawn noktaları, bazı itemlar düşmanlardan düşsün\n- İlerleme: `Toplandı: 3/5` şeklinde anlık HUD gösterimi\n\n**Quest Verici Diyalog Akışı:**\n1. Başlangıç: \"Ormandaki 5 şifalı ot lazım, bana getirir misin?\"\n2. İlerleme: \"Henüz tamamlamadın, devam et.\"\n3. Tamamlama: \"Hepsi tamam! Al ödülünü.\"\n\nGörev objelerini `ICollectable` interface ile standartlaştır; farklı görevler aynı sistemi kullanabilsin.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":2,"no":"002","cat":"Görev Yapısı","name":"Zincirleme Görev Akışı","desc":"Bir görevin tamamlanmasının başka bir görevi tetiklediği doğrusal akış şablonu.","tags":["zincirleme","doğrusal","ilerleme","orta"],"badge1":"Orta","content":"**Quest Zinciri Tasarımı: Hikaye Odaklı Görev Serisi**\n\nZincirleme görevler, birbirini tetikleyen bir dizi quest ile hikayeyi ilerletir.\n\n**Quest Chain Veri Yapısı:**\n```csharp\n[CreateAssetMenu(menuName = \"Quest/QuestChain\")]\npublic class QuestChain : ScriptableObject {\n  public Quest[] quests;  // Sıralı görev dizisi\n  public int currentIndex = 0;\n  \n  public Quest ActiveQuest => \n    currentIndex < quests.Length ? quests[currentIndex] : null;\n  \n  public void AdvanceChain() {\n    if (currentIndex < quests.Length - 1) {\n      quests[currentIndex].Complete();\n      currentIndex++;\n      quests[currentIndex].Activate();\n      // Bir sonraki görev diyaloğunu tetikle\n      DialogueManager.StartDialogue(quests[currentIndex].introDialogue);\n    }\n  }\n}\n```\n\n**Zincirleme Örneği — \"Kayıp Köy\" Serisi:**\n1. Görev 1: Keşif yolu temizle (düşman öldür)\n2. Görev 2: Hayatta kalanları bul (toplama)\n3. Görev 3: Sığınak inşa et (kaynak topla)\n4. Görev 4: Canavarı yok et (boss fight)\n\n**Tasarım Kuralları:**\n- Her görev kendi içinde tamamlanmış hissettirmeli\n- Aralarında kısa anlatı köprüleri koy (cutscene, diyalog)\n- Zincirin %70'inde köy NPC'leri bağlamı zenginleştirsin\n- Opsiyonel yan kollar: Ana zincirden dallanıp isteğe bağlı ekstra görevler","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":3,"no":"003","cat":"Görev Yapısı","name":"Seçime Dayalı Başlangıç","desc":"Oyuncunun başlangıçta yaptığı seçime göre farklı görev kollarını başlatan yapı.","tags":["dallanma","seçim","başlangıç","ileri"],"badge1":"İleri","content":"**Seçimle Başlayan Görev: Branching Quest Tasarımı**\n\nOyuncu başlangıç seçimiyle görevin akışını belirler — agency hissi güçlü.\n\n**Karar Sistemi:**\n```csharp\npublic class BranchingQuestStart : MonoBehaviour {\n  public enum ApproachType { Stealth, Force, Diplomacy }\n  \n  public void StartQuest(ApproachType approach) {\n    switch (approach) {\n      case ApproachType.Stealth:\n        QuestManager.StartQuest(\"infiltrate_quietly\");\n        InventoryManager.GiveItem(\"smoke_bomb\", 3);\n        break;\n      case ApproachType.Force:\n        QuestManager.StartQuest(\"storm_the_gate\");\n        InventoryManager.GiveItem(\"health_potion\", 2);\n        break;\n      case ApproachType.Diplomacy:\n        QuestManager.StartQuest(\"negotiate_entry\");\n        // Gereksinim: Karizm > 50\n        if (PlayerStats.Charisma < 50)\n          UIManager.ShowWarning(\"Karizman yeterli olmayabilir!\");\n        break;\n    }\n  }\n}\n```\n\n**Seçim Sunumu:**\n- Seçenekleri baskı altında değil, sakin bir anlatı anında ver\n- Her seçeneğin sonucunu ima et (\"Güç kullanırsam yaralananlar olabilir\")\n- Karakter istatistiklerine kilitle (STR/INT/CHA eşiği gerekebilir)\n\n**Sonuç Farklılaştırma:**\n- Sessiz yol: Daha az çatışma, ama keşfedilirse anında başarısız\n- Güç yolu: Hızlı ama NPC ölümleri kalıcı\n- Diplomasi: Uzun sürer ama ittifak kazandırır\nHer yol aynı son hedefine ulaştırmalı; yalnızca deneyim farklı olmalı.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":4,"no":"004","cat":"Görev Yapısı","name":"Zaman Kısıtlı Görev","desc":"Belirli bir süre içinde tamamlanması gereken, başarısızlık ihtimalli görev şablonu.","tags":["zaman","gerilim","başarısızlık","orta"],"badge1":"Orta","content":"**Zamanlı Görev Tasarımı: Gerilim ve Aciliyet Mekanikleri**\n\nZaman baskısı, sıradan görevleri heyecan dolu deneyimlere dönüştürür.\n\n**Timer Sistemi:**\n```csharp\npublic class TimedQuest : MonoBehaviour {\n  public float timeLimit = 300f;  // 5 dakika\n  private float remaining;\n  private bool isActive;\n  \n  void Update() {\n    if (!isActive) return;\n    remaining -= Time.deltaTime;\n    UIManager.UpdateTimer(remaining);\n    \n    if (remaining <= 60f) UIManager.FlashTimerRed(); // Son 1 dak\n    if (remaining <= 0f) FailQuest();\n  }\n  \n  void FailQuest() {\n    isActive = false;\n    QuestManager.FailQuest(this);\n    // Sonuçlar: kurtarılamayan esir oldu, yangın söndürülemedi...\n    GameEvents.OnTimedQuestFailed?.Invoke(questID);\n  }\n}\n```\n\n**Tasarım Prensipleri:**\n- Süre: Rahat tamamlama süresinin %70'i (stres yaratmak için)\n- İpucu: Süre dolmadan 30-60 saniye uyarı ver\n- Başarısızlık sonucu: Gerçekçi ve anlamlı olmalı (\"Köy yandı, artık geri dönüş yok\")\n- Kurtarma fırsatı: Opsiyonel olarak tek seferlik zaman uzatma aracı\n\n**Türler:**\n1. Kurtarma: X kişiyi Y sürede kurtaracaksın\n2. Savunma: Dalgaları Z saniye tut\n3. Teslimat: Paketi süre dolmadan yerine ulaştır\n4. Hazırlık: Saldırı gelmeden önce tahkimat kur\n\nZaman baskısını diegetic yap: Gerçek dünya sesi (yangın, çan, alarm) ile destekle.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":5,"no":"005","cat":"Diyalog Tasarımı","name":"Basit Diyalog Ağacı","desc":"Tek yollu, temel bilgi aktarımı için kullanılan diyalog akış şablonu.","tags":["diyalog","NPC","bilgi","başlangıç"],"badge1":"Başlangıç","content":"**Diyalog Ağacı Sistemi: Temel Branching Dialogue**\n\nDiyalog ağacı, NPC ile dallanmalı konuşma deneyimi sunar.\n\n**Veri Yapısı (JSON):**\n```json\n{\n  \"id\": \"blacksmith_intro\",\n  \"text\": \"Merhaba yolcu! Sana yardımcı olabilir miyim?\",\n  \"responses\": [\n    {\n      \"text\": \"Silahlarını görmek istiyorum.\",\n      \"next\": \"show_weapons\"\n    },\n    {\n      \"text\": \"Bu köyde neler oluyor?\",\n      \"next\": \"village_info\"\n    },\n    {\n      \"text\": \"Hayır, teşekkürler.\",\n      \"next\": null,\n      \"action\": \"end_dialogue\"\n    }\n  ]\n}\n```\n\n**Unity Diyalog Yöneticisi:**\n```csharp\npublic class DialogueManager : MonoBehaviour {\n  private DialogueNode currentNode;\n  \n  public void StartDialogue(string startNodeId) {\n    currentNode = DialogueDatabase.GetNode(startNodeId);\n    DisplayNode();\n  }\n  \n  void DisplayNode() {\n    UIDialogue.SetNPCText(currentNode.text);\n    UIDialogue.ClearResponses();\n    foreach (var response in currentNode.responses)\n      UIDialogue.AddResponseButton(response.text, () => SelectResponse(response));\n  }\n  \n  void SelectResponse(DialogueResponse response) {\n    if (response.action != null) ExecuteAction(response.action);\n    if (response.next != null) {\n      currentNode = DialogueDatabase.GetNode(response.next);\n      DisplayNode();\n    } else EndDialogue();\n  }\n}\n```\n\nYapay zeka ile dinamik diyalog üretmek istiyorsan LLM API entegre et; ama sabit hikaye için JSON ağaç çok daha tutarlı.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":6,"no":"006","cat":"Diyalog Tasarımı","name":"Çoklu Seçimli Diyalog","desc":"Oyuncuya birden fazla yanıt seçeneği sunan, görev akışını etkileyen diyalog.","tags":["seçim","diyalog","dallanma","orta"],"badge1":"Orta","content":"**Çoklu Seçim Diyalog: Skill-Check ve Koşullu Seçenekler**\n\nGelişmiş diyalog sistemlerinde bazı yanıtlar belirli koşulları gerektirir.\n\n**Koşullu Seçenek Sistemi:**\n```csharp\n[System.Serializable]\npublic class DialogueResponse {\n  public string text;\n  public string nextNodeId;\n  public DialogueCondition condition;  // null = her zaman göster\n  public string lockedHint;  // Koşul sağlanmazsa gösterilen metin\n}\n\n[System.Serializable]\npublic class DialogueCondition {\n  public enum ConditionType { Stat, Item, QuestComplete, Flag }\n  public ConditionType type;\n  public string key;      // \"Charisma\" / \"lockpick\" / \"met_elder\"\n  public float minValue;  // Stat için minimum değer\n  \n  public bool IsMet() {\n    return type switch {\n      ConditionType.Stat => PlayerStats.Get(key) >= minValue,\n      ConditionType.Item => Inventory.Has(key),\n      ConditionType.QuestComplete => QuestManager.IsComplete(key),\n      ConditionType.Flag => GameFlags.IsSet(key),\n      _ => true\n    };\n  }\n}\n```\n\n**UI Gösterimi:**\n- Kilitli seçenekleri gri göster ama göster: `[Karizm: 60 gerekli] \"Sizi ikna edebilirim...\"`\n- Oyuncu neyin gerektiğini görüp buna göre karakter geliştirebilsin\n\n**Skill Check Örneği:**\n```\n> \"Bu kilidi açabilirim\" [Hırsızlık 40+ gerekli]\n> \"Kapı etrafını arayalım\" [Her zaman mevcut]\n> \"Muhafıza rüşvet vereyim\" [50 Altın gerekli]\n```\n\nKilitli seçenekler oyuncuya build çeşitliliğini ve dünyayı farklı keşfetme yollarını öğretir.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":7,"no":"007","cat":"Diyalog Tasarımı","name":"NPC Tepkili Diyalog","desc":"Oyuncunun geçmiş eylemlerine veya itibarına göre NPC yanıtlarını değiştiren sistem.","tags":["itibar","tepki","dinamik","ileri"],"badge1":"İleri","content":"**NPC Tepki Diyaloğu: Bağlama Duyarlı Konuşma Sistemi**\n\nNPC'lerin oyun durumuna, oyuncu eylemlerine ve geçmişe tepki vermesi canlılık yaratır.\n\n**Bağlam Değişkenleri Sistemi:**\n```csharp\npublic class ContextualDialogueSelector : MonoBehaviour {\n  public DialogueDatabase dialogueDB;\n  \n  public string GetGreeting() {\n    // Öncelik sırasına gore kontrol et\n    if (QuestManager.IsActive(\"save_village\") && TimeOfDay.IsNight)\n      return dialogueDB.Get(\"guard_urgent_night\");\n    \n    if (PlayerStats.Reputation < -50)\n      return dialogueDB.Get(\"hostile_greeting\");\n    \n    if (PlayerStats.Reputation > 80)\n      return dialogueDB.Get(\"friendly_greeting\");\n    \n    if (Weather.IsStorming)\n      return dialogueDB.Get(\"weather_comment\");\n    \n    return dialogueDB.Get(\"default_greeting\");\n  }\n}\n```\n\n**Hafıza Sistemi:**\n```csharp\n// NPC, onceki konusmayi hatirliyorsa\nif (NPCMemory.HasMetBefore(playerID)) {\n  dialogue = \"Ah, tekrar seni görüyorum! Geçen sefer anlattığın ejderha hikayesi...\"\n} else {\n  NPCMemory.RecordMeeting(playerID);\n  dialogue = \"Merhaba yabancı, daha önce görüşmedik galiba.\";\n}\n```\n\n**Tepki Kategorileri:**\n- Görev durumu: Aktif görevle ilgili ipucu/teşvik\n- İtibar: Kötü itibar → kısa/düşmanca; iyi itibar → sıcak/bilgi paylaşımı\n- Zaman/hava: Sabah selamı vs. gece endişesi\n- Yakın olaylar: Bir saatten az önce savaş olduysa yorum yap","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":8,"no":"008","cat":"Diyalog Tasarımı","name":"Geçmiş Bilgisi Diyaloğu","desc":"Oyuncunun öğrendiği bilgilere göre yeni diyalog seçenekleri açan mekanik.","tags":["bilgi","keşif","sır","orta"],"badge1":"Orta","content":"**Lore Diyaloğu: Dünya Arka Planını Organik Anlatma**\n\nGeçmiş bilgisi (lore), oyuncuyu sıkmadan dünya tarihini ve kurgusunu aktarır.\n\n**Katmanlı Bilgi Sistemi:**\n```csharp\npublic class LoreDialogueTree : MonoBehaviour {\n  // Ust katman: Herkes bilir\n  public string[] commonKnowledge = {\n    \"Bu köy yüz yıl önce kuruldu, kurucumuz Aldric'in heykeli meydanda.\"\n  };\n  \n  // Alt katman: Oyuncu sorduktan sonra acilir\n  public string[] deepLore = {\n    \"Aldric aslinda bir kaçkindi — ama bunu kimse bilmez...\"\n  };\n  \n  bool hasAskedBefore = false;\n  \n  public string GetLoreResponse(string topic) {\n    if (!hasAskedBefore) {\n      hasAskedBefore = true;\n      return commonKnowledge[Random.Range(0, commonKnowledge.Length)];\n    }\n    // Derin bilgi için itibar/keşif gereksin\n    if (PlayerStats.Reputation > 50)\n      return deepLore[Random.Range(0, deepLore.Length)];\n    return \"Sana daha fazlasını anlatmak için seni daha iyi tanımam gerekir.\";\n  }\n}\n```\n\n**Anlatı Teknikleri:**\n- Göster, anlatma: NPC yaşayan kanıtı olsun (\"Bu yara izini görüyor musun? Yirmi yıl önce...\")\n- Parçalı bilgi: Her NPC farklı bir parçayı biliyor; oyuncu birleştiriyor\n- Güvenilmez anlatıcı: İki NPC çelişkili versiyon anlatıyor — oyuncu hangisine inanacağına karar veriyor\n- Keşif ödülü: Gizli konuma gitmiş oyuncuya o konuma özel lore aç","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":9,"no":"009","cat":"Mekan & Çevre","name":"Keşif Odaklı Mekan","desc":"Oyuncuyu gizli geçitler ve sırlarla dolu bir alanı keşfetmeye teşvik eden görev.","tags":["keşif","mekan","gizli","orta"],"badge1":"Orta","content":"**Keşif Odaklı Mekan Tasarımı: Organik Dünya Yapısı**\n\nKeşfedilmeye değer mekanlar, oyuncuyu içsel motivasyonla yönlendirir.\n\n**Tasarım İlkeleri — \"Sütun ve Ödül\" Yapısı:**\n```\nMekan Anatomisi:\n├── Giriş noktası (oryantasyon, geri dönüş referansı)\n├── Ana sütun (landmark - \"Kule görülüyor, ona doğru git\")\n├── Yan kollar (opsiyonel, ödüllü)\n│   ├── Gizli oda (lore nesnesi / değerli item)\n│   ├── Tehlikeli kısayol (risk-ödül)\n│   └── NPC yan görevi tetikleyicisi\n└── Merkezi alan (ana görev objesi/boss/keşif hedefi)\n```\n\n**Görsel Yönlendirme (No HUD Design):**\n- Işık: Önemli yönler daha aydınlık\n- Renk: Etkileşilebilir nesneler farklı ton (altın, parlak)\n- Mimari: Koridorlar ve kapılar doğal yol işareti\n- Ses: Uzaktan gelen su sesi, merak uyandıran müzik\n\n**Gizli İçerik İpuçları:**\n```\n// Ortamsal ipucu sistem\nif (player.HasExplored(\"side_passage\"))\n  Journal.AddEntry(\"Tuhaf bir hava akımı hissettim — bir yerde çıkış var.\");\n```\n\n**Keşif Ödülü Hiyerarşisi:**\n1. Ana yol: Güvenli, orta ödül\n2. Gizli geçitler: Zorlu ama üst tier ekipman\n3. Tüm mekanı keşfetme bonusu: Başarım + özel diyalog","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":10,"no":"010","cat":"Mekan & Çevre","name":"Engel Temelli Mekan","desc":"Oyuncunun ilerlemek için çeşitli engelleri aşması gereken mekan tasarımı.","tags":["engel","bulmaca","çevre","ileri"],"badge1":"İleri","content":"**Engel Tabanlı Mekan Tasarımı: Bulmaca ve Çözüm Katmanları**\n\nEngellerle dolu mekanlar, oyuncuyu problem çözmeye zorlar ve yetkinlik hissi verir.\n\n**Engel Türleri ve Çözümleri:**\n```\nFiziksel Engel:\n- Kilitli kapı → anahtar bul / kilit aç / alternatif yol\n- Yüksek duvar → tırman mekanikleri / rampayı bul\n- Uçurum → zıpla / köprü inşa et / iple salla\n\nDüşman Engel:\n- Birden fazla muhafız → gizle / dikkat dağıt / güç kullan\n- Elit düşman → zayıf nokta araştır / çevre kullan\n\nÇevre Engeli:\n- Zehirli gaz → filtre bul / hızlı geç / fan bozukluk\n- Ateş barikatı → su kaynağı / alternatif tünel\n```\n\n**Katmanlı Çözüm Tasarımı:**\nHer önemli engel için en az 2-3 çözüm yolu tasarla:\n```\nDevasa Kaya Engeli:\n1. Güç: Strength 70+ → itip kaldır\n2. Zeka: Levye + kaldıraç noktası bul\n3. Çevre: Yanındaki akarsuyu saptır (kayayı aş)\n4. Sosyal: Yakın madenciden patlayıcı al\n```\n\n**Öğretim Tasarımı:**\nEngel mekaniğini küçük ölçekte tanıt, sonra büyük versiyonunu sun:\n1. Küçük kilit → oyuncu kilit açmayı öğrenir\n2. Büyük kapı → aynı mekanik, yüksek stres ortamında","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":11,"no":"011","cat":"Mekan & Çevre","name":"Dinamik Çevre Etkileşimi","desc":"Oyuncunun çevredeki objelerle etkileşime girerek görevleri tamamladığı senaryo.","tags":["dinamik","etkileşim","çevre","orta"],"badge1":"Orta","content":"**Dinamik Çevre Etkileşimi: Canlı Dünya Sistemi**\n\nÇevreyle etkileşim, oyun dünyasını canlı ve tepkisel hissettirir.\n\n**Yıkılabilir Ortam:**\n```csharp\npublic class DestructibleObject : MonoBehaviour {\n  public float health = 100f;\n  public GameObject destroyedPrefab;  // Yikilmis versiyon\n  public GameObject[] debris;          // Enkaz parcalari\n  \n  public void TakeDamage(float damage) {\n    health -= damage;\n    if (health <= 0) Destroy();\n  }\n  \n  void Destroy() {\n    // Partiküller ve ses\n    Instantiate(destroyedPrefab, transform.position, transform.rotation);\n    foreach (var d in debris) {\n      var rb = Instantiate(d, ...).GetComponent<Rigidbody>();\n      rb.AddExplosionForce(500f, transform.position, 3f);\n    }\n    Destroy(gameObject);\n  }\n}\n```\n\n**Çevre Etkileşim Kategorileri:**\n- Yangın yayılması: Tahta nesneler yakın ateşten tutuşur\n- Su: Elektrikli nesneleri kapatır, ateşi söndürür\n- Rüzgar: Zehir bulutu sürükler, sis dağılır\n- Gravite: Ağır nesneler düşerek düşman ezer\n\n**Quest ile Entegrasyon:**\n```csharp\n// Çevre bozuluğu quest tetikler\nGameEvents.OnBridgeDestroyed += () => {\n  QuestManager.UpdateObjective(\"find_alternate_route\");\n  DialogueManager.TriggerAmbientLine(\"köprü_çöktü_seslendirme\");\n};\n```\n\nDinamik çevre, aynı görevde farklı oynanış deneyimi yaratır; oyuncu yaratıcı çözümler bulduğunda güçlü özerklik hissi oluşur.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":12,"no":"012","cat":"Mekan & Çevre","name":"Gizli Geçit Görevi","desc":"Oyuncunun mekan içindeki gizli bir geçidi bulup kullanmasını gerektiren görev.","tags":["gizli","geçit","bulmaca","orta"],"badge1":"Orta","content":"**Gizli Geçit Görevleri: Keşif Ödülü Tasarımı**\n\nGizli yollar ve geçitler, dikkatli oyuncuları ödüllendiren meta-katman oluşturur.\n\n**Gizli Geçit Tetikleme Sistemi:**\n```csharp\npublic class SecretPassage : MonoBehaviour {\n  public bool requiresItem = false;\n  public string requiredItemId;\n  public AudioClip revealSound;\n  \n  [Header(\"Ipucu Sistemi\")]\n  public string environmentalHint;  // Duvarda oyma, fark edilir\n  public bool hintGivenByNPC = false;\n  \n  void OnPlayerInteract() {\n    if (requiresItem && !Inventory.Has(requiredItemId)) {\n      UIManager.ShowHint(\"Bir şey eksik...\");\n      return;\n    }\n    RevealPassage();\n  }\n  \n  void RevealPassage() {\n    AudioSource.PlayClipAtPoint(revealSound, transform.position);\n    // Animasyon: duvar kayar/döner\n    GetComponent<Animator>().SetTrigger(\"Open\");\n    AchievementManager.Unlock(\"secret_finder\");\n  }\n}\n```\n\n**Gizli Geçit İpucu Hiyerarşisi:**\n1. Ortamsal: Farklı doku/renk, hava akımı efekti, tuhaf gölge\n2. NPC ipucu: \"Dedeme göre kütüphanede çift başlı kartal olan yer...\"\n3. Lore nesnesi: Harita fragmanı, eski mektup\n4. Başarım: \"İlk gizli geçidi bul\" → oyuncu aktif arama motivasyonu\n\n**Gizlilik Dengesi:**\n- Çok gizli: Oyuncular hiç bulmaz — boş emek\n- Çok açık: Sürpriz kalmaz — zevk yok\n- Altın kural: Geri dönüp bakınca \"tabii ki!\" dedirtmeli","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":13,"no":"013","cat":"NPC Etkileşimleri","name":"Düşman NPC Etkileşimi","desc":"Düşman bir NPC'den bilgi alma veya onu alt etme odaklı görev şablonu.","tags":["düşman","bilgi","savaş","orta"],"badge1":"Orta","content":"**Düşman NPC Diyalog Sistemi: Çatışma Öncesi Sosyal Gerilim**\n\nDüşman NPC'ler çatışmadan önce diyalog seçeneği sunarsa dünya daha gerçekçi hisseder.\n\n**Düşman Niyet Sistemi:**\n```csharp\npublic class EnemyNPC : MonoBehaviour {\n  public enum HostilityState { Neutral, Suspicious, Hostile, Combat }\n  public HostilityState state = HostilityState.Neutral;\n  \n  public string[] suspiciousLines = {\n    \"Hey! Bu bölgede ne işin var?\",\n    \"Dur bir dakika. Kim gönderdi seni?\"\n  };\n  \n  void OnPlayerApproach() {\n    if (state == HostilityState.Neutral)\n      TriggerDialogue(\"guard_challenge\");\n    else if (state == HostilityState.Suspicious)\n      state = HostilityState.Hostile;\n    else if (state == HostilityState.Hostile)\n      EnterCombat();\n  }\n  \n  // Diyalog secenekleri: Kacan/Ruzger/Sozlesme/Mucadele\n  void HandlePlayerResponse(string responseType) {\n    state = responseType switch {\n      \"bribe\" when Inventory.HasGold(50) => HostilityState.Neutral,\n      \"intimidate\" when PlayerStats.Strength > 70 => HostilityState.Neutral,\n      \"lie\" when PlayerStats.Deception > 60 => HostilityState.Neutral,\n      _ => HostilityState.Hostile\n    };\n  }\n}\n```\n\n**Gerilim Yönetimi:**\n- İlk karşılaşma diyalogla başlasın — savaş her zaman son seçenek olabilsin\n- Kaçış seçeneği: Her zaman mevcut, ama sonuçları var (alarm verilir)\n- Ölümden önce son söz: Düşman son sözü bilgi verebilir","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":14,"no":"014","cat":"NPC Etkileşimleri","name":"Müttefik NPC Görevi","desc":"Oyuncunun bir müttefik NPC'ye yardım ederek güvenini kazanmasını sağlayan görev.","tags":["müttefik","yardım","güven","başlangıç"],"badge1":"Başlangıç","content":"**Müttefik NPC Görevleri: Koruma ve Yardım Mekanikleri**\n\nMüttefikle birlikte görev, co-op hissi ve duygusal bağ yaratır.\n\n**Yoldaş AI Davranışı:**\n```csharp\npublic class CompanionNPC : MonoBehaviour {\n  public CompanionState state = CompanionState.Follow;\n  public float followDistance = 3f;\n  public float combatAssistRange = 10f;\n  \n  void Update() {\n    switch (state) {\n      case CompanionState.Follow:\n        MoveTowardPlayer(followDistance);\n        break;\n      case CompanionState.Wait:\n        LookAtPlayer();  // Bekle ama takip etme\n        break;\n      case CompanionState.Fight:\n        AttackNearestEnemy();\n        break;\n    }\n    \n    // Otomatik yardim tetigi\n    if (EnemyInRange(combatAssistRange) && state != CompanionState.Wait)\n      state = CompanionState.Fight;\n  }\n  \n  // Oyuncu komutu\n  public void SetState(CompanionState newState) {\n    state = newState;\n    SpeakLine(stateChangeDialogue[newState]);  // Tepki sesi\n  }\n}\n```\n\n**Görev Türleri:**\n- Koruma görevi: NPC'yi düşman dalgalarından koru, HP çubuğu görünür\n- Kurtarma: Esir NPC'yi bul ve geri getir, takip ederek\n- Birlikte ulaşma: İkisi aynı anda kapıya gelmeli — senkronizasyon bulmacası\n- Öğretme: NPC oyuncuya mekanik öğretiyor (birlikte pratik yap)\n\n**Duygusal Bağ:** NPC'nin kişilik özelliklerini yolculuk sırasında ortamsal diyalogla yansıt. Amacı olan, korkan, mizah anlayışı olan NPC'ler akılda kalır.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":15,"no":"015","cat":"NPC Etkileşimleri","name":"Tüccar NPC Diyaloğu","desc":"Tüccar NPC ile yapılan diyalogların görevleri tetiklediği veya etkilediği senaryo.","tags":["tüccar","ekonomi","diyalog","orta"],"badge1":"Orta","content":"**Tüccar NPC Sistemi: Dinamik Alışveriş Diyaloğu**\n\nTüccar NPC'ler yalnızca ticaret ekranı değil, bilgi kaynağı ve dünya bağlamı sunar.\n\n**Tüccar Diyalog + Ticaret Entegrasyonu:**\n```csharp\npublic class MerchantNPC : MonoBehaviour {\n  public MerchantInventory inventory;\n  public float reputationPriceMultiplier = 1f;\n  \n  void OnGreet() {\n    string greeting = PlayerStats.Reputation > 60\n      ? \"Ah, eski dostum! Sana özel fiyat yapayım.\"\n      : \"Hoş geldin. Mallarıma bak istersen.\";\n    DialogueManager.Say(greeting);\n  }\n  \n  public float GetPrice(Item item) {\n    float basePrice = item.baseValue;\n    // İtibar indirimi: maks %30\n    float discount = Mathf.Clamp01(PlayerStats.Reputation / 200f) * 0.3f;\n    return basePrice * (1f - discount) * reputationPriceMultiplier;\n  }\n  \n  // Pazarlik\n  public bool NegotiatePrice(Item item, float offeredPrice) {\n    float minAccepted = GetPrice(item) * 0.85f;\n    if (offeredPrice >= minAccepted) {\n      DialogueManager.Say(\"Anlaştık!\");\n      return true;\n    }\n    DialogueManager.Say(\"Olmaz, en az \" + minAccepted + \" altın.\");\n    return false;\n  }\n}\n```\n\n**Bilgi Ticareti:**\n- Ücretli bilgi: \"50 altın ver, kale planını anlatayım.\"\n- İtibarla bedava bilgi: Dostluk kurulmuşsa paylaşır\n- Görev tetikleyici: \"Bugün tuhaf bir grup geldi... belki ilgini çeker.\"\n\n**Envanter Yenileme:** Gerçek zamanlı değil, gece/gündüz döngüsünde taze mal. Nadir itemlar sınırlı stok ile stres yaratır.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":16,"no":"016","cat":"NPC Etkileşimleri","name":"Güven Temelli Görev Veren","desc":"Oyuncunun belirli bir NPC ile olan güven seviyesine göre görevlerin açıldığı sistem.","tags":["güven","ilişki","dallanma","ileri"],"badge1":"İleri","content":"**Güven Temelli Görev Vericiler: İtibar Sistemi ile Entegrasyon**\n\nBazı görevler yalnızca belirli bir güven eşiği karşılandığında açılır — bu, keşfin ödülüdür.\n\n**İtibar ve Görev Kilidi:**\n```csharp\npublic class TrustBasedQuestGiver : MonoBehaviour {\n  [Header(\"Guven Gereksinimleri\")]\n  public float minTrustLevel = 75f;\n  public string[] trustBuildingQuests;  // Once bunlari tamamla\n  \n  void OnInteract() {\n    float trust = RelationshipManager.GetTrust(playerID, npcID);\n    \n    if (trust < 25f) {\n      DialogueManager.Say(\"Seni tanımıyorum henüz. Kendini kanıtla.\");\n    } else if (trust < 50f) {\n      DialogueManager.Say(\"İyisin ama... daha önemli bir iş için hazır değilsin.\");\n      ShowTrustBuildingHints();\n    } else if (trust < minTrustLevel) {\n      DialogueManager.Say(\"Yaklaşıyorsun. Birkaç şey daha...\");\n    } else {\n      UnlockSpecialQuest();\n      DialogueManager.Say(\"Sana güveniyorum. Bu iş için tam adamsın.\");\n    }\n  }\n  \n  void ShowTrustBuildingHints() {\n    foreach (var qid in trustBuildingQuests)\n      if (!QuestManager.IsComplete(qid))\n        UIManager.AddQuestHint(QuestDatabase.Get(qid).name);\n  }\n}\n```\n\n**Güven İnşa Etme Yolları:**\n- Küçük görevler: Mektup taşı, malzeme getir → her biri +10 güven\n- İtibar olayları: Kasabayı kurtardın → +25 güven tüm köylülerle\n- Negatif eylemler: Hırsızlık -30, yalan söylemek -10\n\n**Ödül:** Yüksek güvenle açılan görevler en iyi ödülü ve lore'u içermeli — sabırlı oyuncuyu ödüllendiren katman.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":17,"no":"017","cat":"Sonuç & Karar","name":"İkili Sonuç Kararı","desc":"Oyuncunun yaptığı tek bir seçimin iki farklı görev sonundan birini tetiklediği yapı.","tags":["karar","sonuç","ikili","orta"],"badge1":"Orta","content":"## İkili Sonuç Kararı\n1. Problem: [Durum] hakkında bir karar verme gerekliliği (örn: 'köylüyü kurtar mı, yoksa eşkıyaya yardım et mi?').\n2. Seçenek A: [Seçenek A]'yı seçmek, [Sonuç A]'ya yol açar (örn: 'köylülerle iyi ilişkiler').\n3. Seçenek B: [Seçenek B]'yi seçmek, [Sonuç B]'ye yol açar (örn: 'eşkiyalarla iyi ilişkiler').\n4. Etki: Bu kararın oyun dünyasına kalıcı etkileri olsun.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":18,"no":"018","cat":"Sonuç & Karar","name":"Çoklu Dallanma Sonu","desc":"Birden fazla faktörün görevin nihai sonucunu belirlediği karmaşık görev yapısı.","tags":["dallanma","karmaşık","çoklu","ileri"],"badge1":"İleri","content":"## Çoklu Dallanma Sonu\n1. Başlangıç: Görev A başlar.\n2. Ara Kararlar: Görev boyunca yapılan [Karar 1], [Karar 2], [Karar 3] gibi seçimler kaydedilir.\n3. Koşullar: Görevin sonunda, kaydedilen kararların kombinasyonuna göre [Sonuç X], [Sonuç Y] veya [Sonuç Z] tetiklenir.\n4. Varyasyon: Her sonuç, farklı NPC diyalogları, dünya durumu değişiklikleri veya ödüller içersin.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":19,"no":"019","cat":"Sonuç & Karar","name":"Yan Görev Etkisi","desc":"Tamamlanan veya göz ardı edilen yan görevlerin ana hikayeyi etkilediği sistem.","tags":["yan görev","ana hikaye","etkileşim","ileri"],"badge1":"İleri","content":"**Yan Görevlerin Ana Hikayeye Etkisi: Nonlineer Anlatı**\n\nYan görevler yalnızca ek içerik değil; ana hikayeyi şekillendiren anlatı araçlarıdır.\n\n**Çapraz Etki Sistemi:**\n```csharp\npublic class QuestConsequenceSystem : MonoBehaviour {\n  static Dictionary<string, bool> completedQuests = new();\n  \n  public static void RegisterCompletion(string questID) {\n    completedQuests[questID] = true;\n    EvaluateConsequences(questID);\n  }\n  \n  static void EvaluateConsequences(string questID) {\n    // Yan gorev ana gosteri degistiriyor\n    if (questID == \"save_informant\" && MainQuest.CurrentChapter == 3) {\n      // Muhabir hayatta ve bilgi verebilir\n      MainQuestNPC.unlockDialogue(\"informant_tip\");\n      Debug.Log(\"Ana hikayede yeni yol acildi!\");\n    }\n    \n    if (questID == \"burned_village\" ) {\n      // Olumsuz secim sonucu\n      WorldState.SetFlag(\"village_hostile\");\n      // Koylular artik yardim etmiyor\n    }\n  }\n}\n```\n\n**Tasarım Stratejileri:**\n- Ekleme: Yan görev tamamlandıysa yeni NPC/diyalog/kısayol açılır\n- Engelleme: Yan görevi atlayan oyuncu bir kaynaktan yoksun kalır\n- Yansıma: Ana görev sonu konuşmalarında yan görev kararları anılır\n\n**Örnek Etki Matrisi:**\n```\nYan Görev              Ana Hikaye Etkisi\nŞifacıyı kurtar →      Boss savaşında iyileşme büyüsü yardımı\nTüccarı kurtar →       Özel ekipman indirimi son görev öncesi\nİhbarcıyı ihbar et →   Gizli operasyon bilgisi kaybolur\n```","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":20,"no":"020","cat":"Sonuç & Karar","name":"İtibar Değişimi","desc":"Oyuncunun görev içi kararlarının çeşitli fraksiyonlarla olan itibarını değiştirdiği sistem.","tags":["itibar","fraksiyon","dallanma","orta"],"badge1":"Orta","content":"**İtibar Değişim Sistemi: Dinamik NPC İlişkileri**\n\nİtibar sistemi, oyuncunun dünyayla ilişkisini canlı tutar ve seçimlerin gerçek ağırlığı olduğunu hissettirir.\n\n**İtibar Sistemi Mimarisi:**\n```csharp\npublic class ReputationSystem : MonoBehaviour {\n  // Grup bazli itibar\n  public static Dictionary<string, float> factionRep = new() {\n    { \"merchant_guild\", 0f },\n    { \"thieves_guild\", 0f },\n    { \"town_guards\", 0f },\n    { \"mage_circle\", 0f }\n  };\n  \n  public static void ChangeRep(string faction, float delta, string reason) {\n    factionRep[faction] = Mathf.Clamp(factionRep[faction] + delta, -100f, 100f);\n    \n    // Eşik bildirim\n    float newRep = factionRep[faction];\n    if (newRep >= 75f) UnlockFactionPerks(faction);\n    if (newRep <= -50f) TriggerFactionHostility(faction);\n    \n    // UI: \"Tüccar Loncası itibarınız +10 arttı\"\n    UIManager.ShowRepChange(faction, delta, reason);\n  }\n  \n  public static string GetRepTitle(string faction) {\n    float rep = factionRep[faction];\n    return rep switch {\n      >= 90 => \"Efsanevi\",\n      >= 75 => \"Dost\",\n      >= 50 => \"Saygın\",\n      >= 25 => \"Tanıdık\",\n      >= 0 => \"Yabancı\",\n      >= -25 => \"Şüpheli\",\n      _ => \"Düşman\"\n    };\n  }\n}\n```\n\n**İtibar Kazanma/Kaybetme Kaynakları:**\n- Görev tamamlama: +10 ila +30\n- Hırsızlık: -15 ila -40 (tutarlara göre)\n- Büyük kurtarma/yardım: +50\n- Suikast: İlgili grupla -80, rakiple +20\n\n**Görsel Yansıma:** NPC selamlamaları, dükkan fiyatları, korumaların tepkisi itibar değişimini somutlaştırır.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}},{"id":21,"no":"021","cat":"Sonuç & Karar","name":"Alternatif Görev Tamamlama","desc":"Bir görevin birden fazla farklı yolla tamamlanabileceği esnek bir yapı.","tags":["esnek","tamamlama","seçim","ileri"],"badge1":"İleri","content":"**Alternatif Tamamlama Yolları: Oyuncuya Özerklik Tasarımı**\n\nBir hedefe birden fazla yol sunmak, oyuncunun kendi tarzını yaşatmasını sağlar.\n\n**Çok Yollu Görev Hedefi:**\n```csharp\npublic class MultiPathObjective : MonoBehaviour {\n  public string objectiveDescription = \"Kaleye gir\";\n  \n  // Herhangi biri tamamlaninca gorev ilerler\n  bool enteredViaFrontGate = false;\n  bool enteredViaSecretTunnel = false;\n  bool enteredViaSocialEngineering = false;\n  \n  bool IsObjectiveComplete =>\n    enteredViaFrontGate || enteredViaSecretTunnel || enteredViaSocialEngineering;\n  \n  void Update() {\n    if (IsObjectiveComplete && !objectiveMarkedDone) {\n      objectiveMarkedDone = true;\n      QuestManager.AdvanceObjective(this);\n      // Hangi yol secildi? Sonuclari degistir\n      if (enteredViaFrontGate) NPC_Captain.state = \"suspicious\";\n      if (enteredViaSecretTunnel) NPC_Captain.state = \"unaware\";\n      if (enteredViaSocialEngineering) NPC_Captain.state = \"trusting\";\n    }\n  }\n}\n```\n\n**Tamamlama Yolu Örnekleri:**\n```\nHedef: \"Hapishane kayıtlarını al\"\n\nYol 1 (Güç): Muhafızları etkisiz kıl, kasayı kır → hızlı ama gürültülü\nYol 2 (Hile): Kıyafet değiştir, sekreter rolü oyna → zaman alır\nYol 3 (Keşif): Eski kanalizasyon girişi bul → önceki yan görev gerektirir\nYol 4 (Sosyal): İdari bir NPC'yi ikna et → Charisma 65+ gerekli\n```\n\n**Tasarım İlkesi:** Tüm yollar eşit güçlük ve ödülle tasarlanmamalı; farklı risk-ödül profilleri tercih zevkini artırır. Oyuncu en çok beğendiği yolu bulunca tatmin hisseder.","source":{"generated":true,"provider":"gemini","model":"gemini-2.5-flash"}}];

// ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'questvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
