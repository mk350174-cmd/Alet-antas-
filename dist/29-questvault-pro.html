<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;

  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}

.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}

.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}

.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>

<body>

<header class="hero">
  <div class="hero-corner">Q</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Quest<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Çok dallı (branching) RPG görev tasarımı jeneratörü.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>21</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Quest ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">21</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>
  </aside>

  <main class="main" id="mainContent">
    <div class="empty" id="emptyState">
      <div class="glyph">◈</div>
      <p>Sol taraftan bir öğe seç</p>
    </div>
    <div id="itemDetail" style="display:none"></div>
    <div id="allGrid" style="display:none"></div>

const ITEMS = [{"id": 1, "no": "001", "cat": "Görev Yapısı", "name": "Basit Toplama Görevi", "desc": "Belirli öğeleri toplayıp bir NPC'ye teslim etmeyi içeren temel görev şablonu.", "tags": ["temel", "toplama", "NPC", "başlangıç"], "badge1": "Başlangıç", "content": "## Toplama Görevi Şablonu\n1. Görev Veren: [NPC Adı] ile etkileşime geç.\n2. Hedef: [X] adet [Öğe Adı]'nı [Konum]'dan topla.\n3. Teslimat: Toplanan öğeleri [NPC Adı]'na geri götür.\n4. Ödül: [Deneyim Puanı] ve [Altın/Öğe] kazan. Görev akışını Quest Editor'de görselleştir.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 2, "no": "002", "cat": "Görev Yapısı", "name": "Zincirleme Görev Akışı", "desc": "Bir görevin tamamlanmasının başka bir görevi tetiklediği doğrusal akış şablonu.", "tags": ["zincirleme", "doğrusal", "ilerleme", "orta"], "badge1": "Orta", "content": "## Zincirleme Görev Oluşturma\n1. Görev A: [Başlangıç NPC]'den al, [Hedef 1]'i tamamla.\n2. Görev B: Görev A bitince otomatik tetiklenir, [Hedef 2]'yi tamamla.\n3. Görev C: Görev B bitince tetiklenir, [Hedef 3]'ü tamamla.\n4. Sonuç: Büyük ödül ve hikaye ilerlemesi. Dallanma noktalarını belirle.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 3, "no": "003", "cat": "Görev Yapısı", "name": "Seçime Dayalı Başlangıç", "desc": "Oyuncunun başlangıçta yaptığı seçime göre farklı görev kollarını başlatan yapı.", "tags": ["dallanma", "seçim", "başlangıç", "ileri"], "badge1": "İleri", "content": "## Seçimli Görev Başlatma\n1. NPC Diyaloğu: [NPC] oyuncuya iki seçenek sunar (örn: 'A tarafı' veya 'B tarafı').\n2. Seçenek A: Seçim A yapılırsa, 'A Görevi' başlar.\n3. Seçenek B: Seçim B yapılırsa, 'B Görevi' başlar.\n4. İzleme: Oyuncunun seçimini bir görev değişkeni ile takip et ve ilgili görevi aktif et.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 4, "no": "004", "cat": "Görev Yapısı", "name": "Zaman Kısıtlı Görev", "desc": "Belirli bir süre içinde tamamlanması gereken, başarısızlık ihtimalli görev şablonu.", "tags": ["zaman", "gerilim", "başarısızlık", "orta"], "badge1": "Orta", "content": "## Zaman Kısıtlı Görev Tasarımı\n1. Tetikleyici: Görev başladığında [Süre]'lik bir geri sayım sayacı başlat.\n2. Hedef: [Belirli Eylem]'i süre bitmeden tamamla.\n3. Başarı: Süre içinde tamamlarsan, [Başarı Ödülü] kazan.\n4. Başarısızlık: Süre biterse, [Başarısızlık Sonucu] ile karşılaş. Alternatif akışları düşün.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 5, "no": "005", "cat": "Diyalog Tasarımı", "name": "Basit Diyalog Ağacı", "desc": "Tek yollu, temel bilgi aktarımı için kullanılan diyalog akış şablonu.", "tags": ["diyalog", "NPC", "bilgi", "başlangıç"], "badge1": "Başlangıç", "content": "## Temel Diyalog Ağacı\n1. NPC: 'Merhaba, sana bir görevim var.'\n2. Oyuncu: 'Görev nedir?'\n3. NPC: 'Bana [Öğe Adı]'nı getir.'\n4. Oyuncu: 'Peki, getiririm.'\n5. NPC: 'Harika.'\nDiyalog editöründe bu basit akışı kur. Seçeneksiz düz bir konuşma.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 6, "no": "006", "cat": "Diyalog Tasarımı", "name": "Çoklu Seçimli Diyalog", "desc": "Oyuncuya birden fazla yanıt seçeneği sunan, görev akışını etkileyen diyalog.", "tags": ["seçim", "diyalog", "dallanma", "orta"], "badge1": "Orta", "content": "## Çoklu Seçimli Diyalog\n1. NPC: 'Ne yapmayı düşünüyorsun?'\n2. Oyuncu Seçenekleri:\n   a) 'Sana yardım ederim.' -> Görev A'yı aktif et.\n   b) 'Beni ilgilendirmez.' -> Görev teklifini reddet.\n   c) 'Daha fazla bilgi alabilir miyim?' -> Yeni NPC diyalog kolu aç.\nHer seçeneği ayrı bir görev state'ine bağla.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 7, "no": "007", "cat": "Diyalog Tasarımı", "name": "NPC Tepkili Diyalog", "desc": "Oyuncunun geçmiş eylemlerine veya itibarına göre NPC yanıtlarını değiştiren sistem.", "tags": ["itibar", "tepki", "dinamik", "ileri"], "badge1": "İleri", "content": "## NPC Tepki Diyaloğu\n1. Koşul: Oyuncunun [Fraksiyon] itibarı [Eşik Değer]'den yüksekse/düşükse.\n2. Diyalog A: İtibar yüksekse, NPC dostça yanıt verir ve özel bir görev sunar.\n3. Diyalog B: İtibar düşükse, NPC düşmanca konuşur ve görev vermeyi reddeder.\nKoşullu diyalog düğümleri kullanarak akışı tasarla.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 8, "no": "008", "cat": "Diyalog Tasarımı", "name": "Geçmiş Bilgisi Diyaloğu", "desc": "Oyuncunun öğrendiği bilgilere göre yeni diyalog seçenekleri açan mekanik.", "tags": ["bilgi", "keşif", "sır", "orta"], "badge1": "Orta", "content": "## Bilgi Tabanlı Diyalog\n1. Önkoşul: Oyuncu [Belirli Bilgi]'yi (örn: bir not okuyarak) edinmiş olmalı.\n2. Diyalog: [NPC] ile konuşurken, oyuncuya 'Öğrendiğim bilgilerle ilgili soru sor' seçeneği belirir.\n3. Yeni Kol: Bu seçenek seçildiğinde, NPC yeni bilgiler veya bir yan görev sunar.\nGörev değişkenleri ile bilgi edinimi durumunu kontrol et.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 9, "no": "009", "cat": "Mekan & Çevre", "name": "Keşif Odaklı Mekan", "desc": "Oyuncuyu gizli geçitler ve sırlarla dolu bir alanı keşfetmeye teşvik eden görev.", "tags": ["keşif", "mekan", "gizli", "orta"], "badge1": "Orta", "content": "## Keşif Görevi Mekanı\n1. Alan Tanımı: [Harita Bölgesi]'ni tasarla (örn: eski tapınak).\n2. Hedefler: Oyuncuyu [X] adet [Gizli Obje]'yi bulmaya yönlendir.\n3. İpuçları: Harita üzerinde ipuçları (notlar, işaretler) bırak.\n4. Engel: Bölgeyi düşmanlar veya çevresel bulmacalarla doldur. Görevin ödülü keşif hissiyatı olsun.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 10, "no": "010", "cat": "Mekan & Çevre", "name": "Engel Temelli Mekan", "desc": "Oyuncunun ilerlemek için çeşitli engelleri aşması gereken mekan tasarımı.", "tags": ["engel", "bulmaca", "çevre", "ileri"], "badge1": "İleri", "content": "## Engel Mekanı Taslağı\n1. Mekan: [Zorlu Bölge] (örn: yıkık kale) oluştur.\n2. Engeller: İlk kapı için [Anahtar Bulmaca], sonraki oda için [Düşman Dalgaları], son geçit için [Platforming Engel].\n3. Çözüm: Her engelin farklı bir çözüm yolu olsun.\n4. İlerleme: Engelleri aşmak, görevin bir sonraki adımını tetiklesin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 11, "no": "011", "cat": "Mekan & Çevre", "name": "Dinamik Çevre Etkileşimi", "desc": "Oyuncunun çevredeki objelerle etkileşime girerek görevleri tamamladığı senaryo.", "tags": ["dinamik", "etkileşim", "çevre", "orta"], "badge1": "Orta", "content": "## Dinamik Çevre Görevi\n1. Görev: [Hedef Obje]'yi [Mekan]'dan al.\n2. Engeller: Obje, [Hareketli Platform], [Kaldıraç Sistemi] gibi çevresel öğelerle korunuyor.\n3. Çözüm: Oyuncunun çevresel öğeleri manipüle ederek objeye ulaşmasını sağla.\n4. Geribildirim: Her etkileşimde görsel ve işitsel geribildirim ekle.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 12, "no": "012", "cat": "Mekan & Çevre", "name": "Gizli Geçit Görevi", "desc": "Oyuncunun mekan içindeki gizli bir geçidi bulup kullanmasını gerektiren görev.", "tags": ["gizli", "geçit", "bulmaca", "orta"], "badge1": "Orta", "content": "## Gizli Geçit Keşfi\n1. Görev Veren: [NPC Adı] 'kayıp bir geçitten' bahseder.\n2. Hedef: [Mekan]'da 'Gizli Geçit'i bul.\n3. İpuçları: Geçide giden yolu gösteren notlar, semboller veya çevresel ipuçları yerleştir.\n4. Etkileşim: Geçidi aktive etmek için bir bulmaca veya anahtar kullan. Geçit keşfi ile yeni bir alana erişim sağla.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 13, "no": "013", "cat": "NPC Etkileşimleri", "name": "Düşman NPC Etkileşimi", "desc": "Düşman bir NPC'den bilgi alma veya onu alt etme odaklı görev şablonu.", "tags": ["düşman", "bilgi", "savaş", "orta"], "badge1": "Orta", "content": "## Düşman NPC Görevi\n1. Hedef: [Düşman NPC]'den [Gizli Bilgi]'yi elde et VEYA onu alt et.\n2. Seçenek 1 (Diplomasi): Diyalog seçenekleriyle onu ikna etmeyi dene.\n3. Seçenek 2 (Savaş): Onu yenerek bilgiyi veya görev objesini al.\n4. Sonuç: Seçime göre farklı görev akışları veya ödüller. Görev değişkenleriyle seçimleri kaydet.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 14, "no": "014", "cat": "NPC Etkileşimleri", "name": "Müttefik NPC Görevi", "desc": "Oyuncunun bir müttefik NPC'ye yardım ederek güvenini kazanmasını sağlayan görev.", "tags": ["müttefik", "yardım", "güven", "başlangıç"], "badge1": "Başlangıç", "content": "## Müttefik NPC Yardımı\n1. Görev Veren: [Müttefik NPC] senden [Talep] eder (örn: 'kayıp aile yadigarı bul').\n2. Hedef: Talebi yerine getirerek NPC'nin sorununu çöz.\n3. Ödül: Görev tamamlandığında NPC'nin sana olan 'güven' seviyesini artır.\n4. Sonuç: Yüksek güven, gelecekte özel görevler veya indirimler sunabilir.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 15, "no": "015", "cat": "NPC Etkileşimleri", "name": "Tüccar NPC Diyaloğu", "desc": "Tüccar NPC ile yapılan diyalogların görevleri tetiklediği veya etkilediği senaryo.", "tags": ["tüccar", "ekonomi", "diyalog", "orta"], "badge1": "Orta", "content": "## Tüccar Görev Diyaloğu\n1. Etkileşim: [Tüccar NPC] ile alım/satım yaparken sohbet başlat.\n2. İpucu: Tüccar, belirli bir [Nadir Öğe] için yüksek fiyat ödeyeceğini söyler.\n3. Görev: Bu ipucu, oyuncuya o nadir öğeyi bulma görevi verir.\n4. Dallanma: Öğeyi bulup getirirsen, özel bir ödül veya yeni bir tüccar bağlantısı açılır.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 16, "no": "016", "cat": "NPC Etkileşimleri", "name": "Güven Temelli Görev Veren", "desc": "Oyuncunun belirli bir NPC ile olan güven seviyesine göre görevlerin açıldığı sistem.", "tags": ["güven", "ilişki", "dallanma", "ileri"], "badge1": "İleri", "content": "## Güven Tabanlı Görevler\n1. Görev Veren: [Gizemli NPC]'nin başlangıçta güven seviyesi düşüktür.\n2. Görev A: Basit bir iyilik yaparak güveni artır (örn: 'kayıp eşya bul').\n3. Görev B: Güven eşiğine ulaşıldığında, NPC daha kritik ve dallanmalı bir görev verir.\n4. Sonuç: Güven seviyesi, diyalogları ve mevcut görevleri dinamik olarak değiştirsin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 17, "no": "017", "cat": "Sonuç & Karar", "name": "İkili Sonuç Kararı", "desc": "Oyuncunun yaptığı tek bir seçimin iki farklı görev sonundan birini tetiklediği yapı.", "tags": ["karar", "sonuç", "ikili", "orta"], "badge1": "Orta", "content": "## İkili Sonuç Kararı\n1. Problem: [Durum] hakkında bir karar verme gerekliliği (örn: 'köylüyü kurtar mı, yoksa eşkıyaya yardım et mi?').\n2. Seçenek A: [Seçenek A]'yı seçmek, [Sonuç A]'ya yol açar (örn: 'köylülerle iyi ilişkiler').\n3. Seçenek B: [Seçenek B]'yi seçmek, [Sonuç B]'ye yol açar (örn: 'eşkiyalarla iyi ilişkiler').\n4. Etki: Bu kararın oyun dünyasına kalıcı etkileri olsun.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 18, "no": "018", "cat": "Sonuç & Karar", "name": "Çoklu Dallanma Sonu", "desc": "Birden fazla faktörün görevin nihai sonucunu belirlediği karmaşık görev yapısı.", "tags": ["dallanma", "karmaşık", "çoklu", "ileri"], "badge1": "İleri", "content": "## Çoklu Dallanma Sonu\n1. Başlangıç: Görev A başlar.\n2. Ara Kararlar: Görev boyunca yapılan [Karar 1], [Karar 2], [Karar 3] gibi seçimler kaydedilir.\n3. Koşullar: Görevin sonunda, kaydedilen kararların kombinasyonuna göre [Sonuç X], [Sonuç Y] veya [Sonuç Z] tetiklenir.\n4. Varyasyon: Her sonuç, farklı NPC diyalogları, dünya durumu değişiklikleri veya ödüller içersin.", "source": {"generated": true, "provider": "gemini", "model": "gemini-2.5-flash"}}, {"id": 19, "no": "019", "cat": "Sonuç & Karar", "name": "Yan Görev Etkisi", "desc": "Tamamlanan veya göz ardı edilen yan görevlerin ana ler veya hikaye varyasyonları sun.\n\n## Uygulama Senaryosu (Hibrit)\n\nBu standartı, ölçeklenme alanında Alternatif Görev Tamamlama problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Alternatif Görev Tamamlama akışını hibrit yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 21, "wave": "v3-400"}}, {"id": 401, "no": "401", "cat": "Görev Yapısı", "name": "Stream Tabanlı Basit Toplama Görevi Standartı", "desc": "akış bağlamında Basit Toplama Görevi için stream tabanlı bir standartı. Belirli öğeleri toplayıp bir NPC'ye teslim etmeyi içeren temel görev şablonu. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "toplama", "NPC", "akış", "stream tabanlı", "başlangıç"], "badge1": "Başlangıç", "content": "## Toplama Görevi Şablonu\n1. Görev Veren: [NPC Adı] ile etkileşime geç.\n2. Hedef: [X] adet [Öğe Adı]'nı [Konum]'dan topla.\n3. Teslimat: Toplanan öğeleri [NPC Adı]'na geri götür.\n4. Ödül: [Deneyim Puanı] ve [Altın/Öğe] kazan. Görev akışını Quest Editor'de görselleştir.\n\n## Genişletilmiş Notlar (Stream Tabanlı)\n\n- **Hedef Kitle:** Başlangıç seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Basit Toplama Görevi senaryoları\n- **Avantajları:** Bu standartı sayesinde Basit Toplama Görevi işlemleri daha stream tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Basit Toplama Görevi ihtiyacını analiz edin.\n  2. Bu standartı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** temel, toplama, NPC\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 402, "no": "402", "cat": "AI Prompt Kütüphanesi", "name": "Sistem Promptu — Quest Tasarımı", "desc": "Quest Tasarımı alanı için orijinal sistem promptu promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "system-prompt", "quest", "orijinal"], "badge1": "Orijinal AI", "content": "## SİSTEM PROMPTU — Quest Tasarımı Uzmanı\n\nSen kıdemli bir **Quest Tasarımı** uzmanısın. Görevin: quest design, narrative branches.\n\n### Davranış Kuralları\n1. **Net ve doğrulanabilir** yanıtlar ver; spekülasyondan kaçın.\n2. Her iddiayı kaynak veya somut örnekle destekle.\n3. Belirsizlik varsa açıkça **\"emin değilim\"** de — yanlış cevap verme.\n4. Kullanıcıya **adım adım** rehberlik et; tek seferde fazla yükleme.\n5. Yanıt formatı: önce TL;DR (2 cümle), sonra detaylar, sonra sonraki adım önerisi.\n\n### Yasak Davranışlar\n- Üretilmiş istatistik veya uydurma kaynak verme\n- Konu dışına çıkma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru Quest Tasarımı kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — Quest Tasarımı", "desc": "Quest Tasarımı alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "quest", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Quest Tasarımı\n\nAşağıda Quest Tasarımı alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** quest design, narrative branches konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** quest design, narrative branches alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** quest design, narrative branches için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Quest Tasarımı", "desc": "Quest Tasarımı alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "quest", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Quest Tasarımı\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Quest Tasarımı ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) quest design, narrative branches ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Quest Tasarımı", "desc": "Quest Tasarımı alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "quest", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Quest Tasarımı Mentörü\n\n**Kimsin:** 15+ yıl Quest Tasarımı deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** quest design, narrative branches\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün Quest Tasarımı ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — Quest Tasarımı", "desc": "Quest Tasarımı alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "quest", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — Quest Tasarımı\n\nQuest Tasarımı alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"Quest Tasarımı\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 407, "no": "407", "cat": "Görev Yapısı", "name": "Multi-Tenant Basit Toplama Görevi Rehberi", "desc": "arayüz bağlamında Basit Toplama Görevi için multi-tenant bir rehberi. Belirli öğeleri toplayıp bir NPC'ye teslim etmeyi içeren temel görev şablonu. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["temel", "toplama", "NPC", "arayüz", "multi-tenant", "uzman"], "badge1": "Uzman", "content": "## Toplama Görevi Şablonu\n1. Görev Veren: [NPC Adı] ile etkileşime geç.\n2. Hedef: [X] adet [Öğe Adı]'nı [Konum]'dan topla.\n3. Teslimat: Toplanan öğeleri [NPC Adı]'na geri götür.\n4. Ödül: [Deneyim Puanı] ve [Altın/Öğe] kazan. Görev akışını Quest Editor'de görselleştir.\n\n## Genişletilmiş Notlar (Multi-Tenant)\n\n- **Hedef Kitle:** Uzman seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Basit Toplama Görevi senaryoları\n- **Avantajları:** Bu rehberi sayesinde Basit Toplama Görevi işlemleri daha multi-tenant hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:* ma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** keşif, mekan, gizli\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-450-final"}}, {"id": 437, "no": "437", "cat": "Mekan & Çevre", "name": "Kanıt-Tabanlı Engel Temelli Mekan Pratiği", "desc": "performans bağlamında Engel Temelli Mekan için kanıt-tabanlı bir pratiği. Oyuncunun ilerlemek için çeşitli engelleri aşması gereken mekan tasarımı. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["engel", "bulmaca", "çevre", "performans", "kanıt-tabanlı", "orta"], "badge1": "Orta", "content": "## Engel Mekanı Taslağı\n1. Mekan: [Zorlu Bölge] (örn: yıkık kale) oluştur.\n2. Engeller: İlk kapı için [Anahtar Bulmaca], sonraki oda için [Düşman Dalgaları], son geçit için [Platforming Engel].\n3. Çözüm: Her engelin farklı bir çözüm yolu olsun.\n4. İlerleme: Engelleri aşmak, görevin bir sonraki adımını tetiklesin.\n\n## Genişletilmiş Notlar (Kanıt-Tabanlı)\n\n- **Hedef Kitle:** Orta seviye performans kullanıcıları\n- **Uygulama Alanı:** performans ekosisteminde Engel Temelli Mekan senaryoları\n- **Avantajları:** Bu pratiği sayesinde Engel Temelli Mekan işlemleri daha kanıt-tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut performans mimarinizde Engel Temelli Mekan ihtiyacını analiz edin.\n  2. Bu pratiği'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** engel, bulmaca, çevre\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-450-final"}}, {"id": 438, "no": "438", "cat": "Mekan & Çevre", "name": "Dağıtık Dinamik Çevre Etkileşimi Mode // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'questvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
