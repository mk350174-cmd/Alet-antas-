<style>
:root{
  --bg:#06100a;--bg2:#0a140e;--bg3:#0e1812;--bg4:#121c16;
  --border:#16201a;--border2:#1e2822;--border3:#2a342e;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#5ed47e;--primary2:#5ed47e;
  --primary-dim:#5ed47e15;--primary-glow:#5ed47e30;
  --accent:#4fc3f7;--accent2:#4fc3f7;
  --accent-dim:#4fc3f718;--accent-glow:#4fc3f730;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#5ed47e08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#4fc3f706 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a140e 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#5ed47e0a 0%,#5ed47e03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #5ed47e30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#5ed47e03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#5ed47e06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #5ed47e20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a140e,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#40b660);color:#06100a;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #5ed47e20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #5ed47e35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">D</div>
  <div class="hero-eyebrow">Oyun Motoru & 3D · Alet Çantası</div>
  <h1 class="hero-title">Dialog<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">NPC'ler için dinamik, bağlama duyarlı diyalog ağaçları ve JSON formatında senaryo çıktıları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>15</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Dialog ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">15</span>
      </button>
    </div>
    <div id="catBtns"></div>

const ITEMS = [{"id": 1, "no": "001", "cat": "Diyalog Ağaçları", "name": "Temel Diyalog Ağacı İskeleti", "desc": "NPC için kök düğüm, dallar ve yaprak yanıtlardan oluşan ağaç yapısı kurun.", "tags": ["ağaç", "düğüm", "iskelet"], "badge1": "Başlangıç", "content": "## Diyalog Ağacı İskeleti\n1. Kök düğümü (selamlama) tanımla.\n2. Her düğüme `id`, `text`, `choices[]` alanları ekle.\n3. Choices içinde `next` ile hedef düğüm id'sini bağla.\n4. Yaprak düğümlere `end:true` koyarak konuşmayı sonlandır.", "source": {"generated": true}}, {"id": 2, "no": "002", "cat": "Diyalog Ağaçları", "name": "Geri Dönüşlü Konuşma Döngüleri", "desc": "Oyuncunun ana menüye dönebildiği döngüsel diyalog yapıları tasarlayın.", "tags": ["döngü", "menü", "navigasyon"], "badge1": "Orta", "content": "## Döngüsel Diyalog\n1. Bir `hub` düğümü belirle (tüm konular buraya döner).\n2. Alt konuları hub'a `back` seçeneğiyle bağla.\n3. Ziyaret edilen düğümleri `visited[]` ile işaretle.\n4. Tükenmiş seçenekleri gri/pasif göster.", "source": {"generated": true}}, {"id": 3, "no": "003", "cat": "Diyalog Ağaçları", "name": "Koşullu Düğüm Kilitleri", "desc": "Belirli koşullar sağlanmadan açılmayan diyalog dallarını planlayın.", "tags": ["koşul", "kilit", "flag"], "badge1": "İleri", "content": "## Koşullu Kilitler\n1. Düğüme `requires` alanı ekle (örn: `hasKey`, `level>=5`).\n2. Koşul sağlanmazsa seçeneği gizle veya kilitli göster.\n3. Oyuncu durumunu merkezi `gameState` objesinden oku.\n4. Kilit açıldığında küçük bir ipucu metni sun.", "source": {"generated": true}}, {"id": 4, "no": "004", "cat": "Bağlamsal Tepkiler", "name": "Zaman Duyarlı Selamlamalar", "desc": "Oyun içi saate göre değişen NPC karşılama replikleri üretin.", "tags": ["zaman", "selamlama", "bağlam"], "badge1": "Başlangıç", "content": "## Zamana Duyarlı Replik\n1. `timeOfDay` değişkenini (sabah/öğle/akşam/gece) oku.\n2. Her dilim için ayrı selamlama dizisi tanımla.\n3. Rastgele varyasyonla tekrarı azalt.\n4. Özel günlerde (bayram) override repliği ekle.", "source": {"generated": true}}, {"id": 5, "no": "005", "cat": "Bağlamsal Tepkiler", "name": "İlişki Seviyesine Göre Ton", "desc": "Oyuncuyla NPC arasındaki güven puanına göre konuşma tonunu değiştirin.", "tags": ["ilişki", "ton", "güven"], "badge1": "Orta", "content": "## İlişkiye Bağlı Ton\n1. `affinity` puanını 0-100 aralığında tut.\n2. Düşük/orta/yüksek için üç ton seti yaz (soğuk, nötr, sıcak).\n3. Eşik geçişlerinde kısa bir tepki cümlesi tetikle.\n4. Hakaret/iyilik eylemleriyle puanı güncelle.", "source": {"generated": true}}, {"id": 6, "no": "006", "cat": "Bağlamsal Tepkiler", "name": "Çevresel Olay Yorumları", "desc": "Yakın çevrede olan olaylara NPC'nin anlık tepki vermesini sağlayın.", "tags": ["olay", "tepki", "çevre"], "badge1": "İleri", "content": "## Çevresel Yorum\n1. `nearbyEvents[]` listesini her tick'te kontrol et.\n2. Yangın, savaş, hava durumu için tepki şablonları hazırla.\n3. En yüksek öncelikli olayı seç ve bark (anlık replik) bas.\n4. Tekrarı önlemek için 30 sn cooldown uygula.", "source": {"generated": true}}, {"id": 7, "no": "007", "cat": "JSON Şablonları", "name": "Standart Diyalog JSON Şeması", "desc": "Motor bağımsız, taşınabilir bir diyalog JSON şeması tanımlayın.", "tags": ["json", "şema", "standart"], "badge1": "Başlangıç", "content": "## Diyalog JSON Şeması\n```json\n{\"id\":\"npc_01\",\"nodes\":[{\"id\":1,\"speaker\":\"Demirci\",\"text\":\"...\",\"choices\":[{\"text\":\"Evet\",\"next\":2}]}]}\n```\n1. `speaker`, `text`, `choices` zorunlu.\n2. `next` null ise konuşma biter.\n3. `flags` ile yan etki tetikle.", "source": {"generated": true}}, {"id": 8, "no": "008", "cat": "JSON Şablonları", "name": "Lokalizasyon Anahtarlı Çıktı", "desc": "Metinleri çeviri anahtarlarıyla ayıran çok dilli JSON yapısı.", "tags": ["lokalizasyon", "çeviri", "i18n"], "badge1": "Orta", "content": "## Lokalize JSON\n1. `text` yerine `textKey` kullan (örn: `npc01.greet`).\n2. Gerçek metni ayrı `tr.json`/`en.json` dosyasında tut.\n3. Çalışma anında aktif dile göre anahtarı çöz.\n4. Eksik anahtarları fallback dil ile doldur.", "source": {"generated": true}}, {"id": 9, "no": "009", "cat": "JSON Şablonları", "name": "Sesli Replik Metadata'sı", "desc": "Her repliğe ses dosyası ve dudak senkronu verisi bağlayan şema.", "tags": ["ses", "metadata", "lipsync"], "badge1": "İleri", "content": "## Ses Metadata\n1. Düğüme `audioClip` ve `duration` alanları ekle.\n2. `lipsyncData` için viseme zaman damgaları tut.\n3. Altyazı zamanlamasını `duration` ile eşle.\n4. Ses yoksa metni varsayılan hızda göster.", "source": {"generated": true}}, {"id": 10, "no": "010", "cat": "Karakter Sesi", "name": "Arketip Bazlı Konuşma Stili", "desc": "Bilge, palyaço, asker gibi arketiplere özgü kelime dağarcığı oluşturun.", "tags": ["arketip", "stil", "ses"], "badge1": "Orta", "content": "## Arketip Sesi\n1. Karaktere bir arketip ata (bilge/asker/tüccar).\n2. Her arketip için 10 imza kelime/deyim belirle.\n3. Cümle uzunluğu ve resmiyet seviyesini ayarla.\n4. Repliklere arketip filtresi uygulayarak tutarlılık sağla.", "source": {"generated": true}}, {"id": 11, "no": "011", "cat": "Karakter Sesi", "name": "Lehçe ve Aksan İşaretleri", "desc": "Bölgesel karakterler için yazımda aksan yansıtan metin kuralları.", "tags": ["lehçe", "aksan", "bölge"], "badge1": "İleri", "content": "## Lehçe Yansıtma\n1. Karakterin geldiği bölgeyi belirle.\n2. Birkaç fonetik kural tanımla (örn: 'geliyorum'→'geliyom').\n3. Aşırıya kaçmadan 2-3 imza değişiklik uygula.\n4. Okunabilirliği test et, gerekirse yumuşat.", "source": {"generated": true}}, {"id": 12, "no": "012", "cat": "Dallanma Mantığı", "name": "Sonuç Odaklı Seçim Ağırlıkları", "desc": "Oyuncu seçimlerinin uzun vadeli sonuçlara bağlandığı ağırlık sistemi.", "tags": ["seçim", "ağırlık", "sonuç"], "badge1": "İleri", "content": "## Seçim Ağırlığı\n1. Her seçime `weight` ve `consequence` etiketi ver.\n2. Seçimleri `decisionLog[]` içinde biriktir.\n3. Belirli eşiklerde hikaye dalını değiştir.\n4. Finalde log'a göre uygun sonu seç.", "source": {"generated": true}}, {"id": 13, "no": "013", "cat": "Dallanma Mantığı", "name": "Zaman Baskılı Diyalog", "desc": "Oyuncunun sınırlı sürede yanıt vermesi gereken gergin sahneler kurun.", "tags": ["zaman", "baskı", "gerilim"], "badge1": "Orta", "content": "## Zaman Baskısı\n1. Seçim ekranına `timer` (örn: 5 sn) ekle.\n2. Süre dolarsa varsayılan/sessizlik dalına geç.\n3. Geri sayımı görsel bir çubukla göster.\n4. Sonucu `timedOut:true` ile işaretleyip sahneyi etkile.", "source": {"generated": true}}, {"id": 14, "no": "014", "cat": "Duygu Sistemleri", "name": "NPC Ruh Hali Makinesi", "desc": "Mutlu, kızgın, korkmuş durumları arası geçiş yapan durum makinesi.", "tags": ["ruh hali", "fsm", "duygu"], "badge1": "İleri", "content": "## Ruh Hali FSM\n1. Durumları tanımla: sakin, tedirgin, öfkeli, neşeli.\n2. Geçiş tetikleyicilerini belirle (tehdit→tedirgin).\n3. Her duruma özel replik havuzu bağla.\n4. Zamanla nötr duruma geri dönüş (decay) ekle.", "source": {"generated": true}}, {"id": 15, "no": "015", "cat": "Duygu Sistemleri", "name": "Hafıza Tabanlı Sitem", "desc": "Geçmiş oyuncu davranışlarını hatırlayıp dile getiren NPC hafızası.", "tags": ["hafıza", "geçmiş", "sitem"], "badge1": "İleri", "content": "## Hafıza ve Sitem\n1. Önemli oyuncu eylemlerini `memories[]` içinde sakla.\n2. Her hafızaya duygu etiketi ve tarih ekle.\n3. İlgili bağlamda hafızayı çağırıp replik üret.\n4. Eski hafızaların etkisini zamanla azalt.", "source": {"generated": true}}, {"id": 17, "no": "017", "cat": "Diyalog Ağaçları", "name": "Stratejik Temel Diyalog Senaryosu", "desc": "Oyun bağlamında temel diyalog için stratejik bir senaryosu. NPC için kök düğüm, dallar ve yaprak yanıtlardan oluşan ağaç yapısı kurun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "düğüm", "iskelet", "oyun", "stratejik", "orta"], "badge1": "Orta", "content": "## Diyalog Ağacı İskeleti\n1. Kök düğümü (selamlama) tanımla.\n2. Her düğüme `id`, `text`, `choices[]` alanları ekle.\n3. Choices içinde `next` ile hedef düğüm id'sini bağla.\n4. Yaprak düğümlere `end:true` koyarak konuşmayı sonlandır.\n\n## Genişletilmiş Notlar (Stratejik)\n\n- **Hedef Kitle:** Orta seviye oyun kullanıcıları\n- **Uygulama Alanı:** Oyun ekosisteminde temel diyalog senaryoları\n- **Avantajları:** Bu senaryosu sayesinde temel diyalog işlemleri daha stratejik hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut oyun mimarinizde temel diyalog ihtiyacını analiz edin.\n  2. Bu senaryosu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ağaç, düğüm, iskelet", "source": {"generated": true, "variant_of": 1}}, {"id": 18, "no": "018", "cat": "Diyalog Ağaçları", "name": "Makro Temel Diyalog Pipeline'ı", "desc": "dinamik, bağlamında temel diyalog için makro bir pipeline'ı. NPC için kök düğüm, dallar ve yaprak yanıtlardan oluşan ağaç yapısı kurun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "düğüm", "iskelet", "dinamik,", "makro", "i̇leri"], "badge1": "İleri", "content": "## Diyalog Ağacı İskeleti\n1. Kök düğümü (selamlama) tanımla.\n2. Her düğüme `id`, `text`, `choices[]` alanları ekle.\n3. Choices içinde `next` ile hedef düğüm id'sini bağla.\n4. Yaprak düğümlere `end:true` koyarak konuşmayı sonlandır.\n\n## Genişletilmiş Notlar (Makro)\n\n- **Hedef Kitle:** İleri seviye dinamik, kullanıcıları\n- **Uygulama Alanı:** dinamik, ekosisteminde temel diyalog senaryoları\n- **Avantajları:** Bu pipeline'ı sayesinde temel diyalog işlemleri daha makro hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kulla r:**\n  1. Mevcut test mimarinizde Zaman Duyarlı Selamlamalar ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zaman, selamlama, bağlam\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 185, "no": "185", "cat": "Bağlamsal Tepkiler", "name": "Mobile-First İlişki Seviyesine Göre Yönergesi", "desc": "veri bağlamında İlişki Seviyesine Göre için mobile-first bir yönergesi. Oyuncuyla NPC arasındaki güven puanına göre konuşma tonunu değiştirin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ilişki", "ton", "güven", "veri", "mobile-first", "başlangıç"], "badge1": "Başlangıç", "content": "## İlişkiye Bağlı Ton\n1. `affinity` puanını 0-100 aralığında tut.\n2. Düşük/orta/yüksek için üç ton seti yaz (soğuk, nötr, sıcak).\n3. Eşik geçişlerinde kısa bir tepki cümlesi tetikle.\n4. Hakaret/iyilik eylemleriyle puanı güncelle.\n\n## Uygulama Senaryosu (Mobile-First)\n\nBu yönergesi, veri alanında İlişki Seviyesine Göre problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İlişki Seviyesine Göre akışını mobile-first yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** veri katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 186, "no": "186", "cat": "Bağlamsal Tepkiler", "name": "Yalın Çevresel Olay Yorumları Pratiği", "desc": "akış bağlamında Çevresel Olay Yorumları için yalın bir pratiği. Yakın çevrede olan olaylara NPC'nin anlık tepki vermesini sağlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["olay", "tepki", "çevre", "akış", "yalın", "başlangıç"], "badge1": "Başlangıç", "content": "## Çevresel Yorum\n1. `nearbyEvents[]` listesini her tick'te kontrol et.\n2. Yangın, savaş, hava durumu için tepki şablonları hazırla.\n3. En yüksek öncelikli olayı seç ve bark (anlık replik) bas.\n4. Tekrarı önlemek için 30 sn cooldown uygula.\n\n## Uygulama Senaryosu (Yalın)\n\nBu pratiği, akış alanında Çevresel Olay Yorumları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Çevresel Olay Yorumları akışını yalın yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 187, "no": "187", "cat": "JSON Şablonları", "name": "Kanıt-Tabanlı Standart Diyalog JSON Doktrini", "desc": "logging bağlamında Standart Diyalog JSON için kanıt-tabanlı bir doktrini. Motor bağımsız, taşınabilir bir diyalog JSON şeması tanımlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["json", "şema", "standart", "logging", "kanıt-tabanlı", "başlangıç"], "badge1": "Başlangıç", "content": "## Diyalog JSON Şeması\n```json\n{\"id\":\"npc_01\",\"nodes\":[{\"id\":1,\"speaker\":\"Demirci\",\"text\":\"...\",\"choices\":[{\"text\":\"Evet\",\"next\":2}]}]}\n```\n1. `speaker`, `text`, `choices` zorunlu.\n2. `next` null ise konuşma biter.\n3. `flags` ile yan etki tetikle.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu doktrini, logging alanında Standart Diyalog JSON problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Standart Diyalog JSON akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 188, "no": "188", "cat": "JSON Şablonları", "name": "Performant Lokalizasyon Anahtarlı Çıktı Rehberi", "desc": "ölçeklenme bağlamında Lokalizasyon Anahtarlı Çıktı için performant bir rehberi. Metinleri çeviri anahtarlarıyla ayıran çok dilli JSON yapısı. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["lokalizasyon", "çeviri", "i18n", "ölçeklenme", "performant", "başlangıç"], "badge1": "Başlangıç", "content": "## Lokalize JSON\n1. `text` yerine `textKey` kullan (örn: `npc01.greet`).\n2. Gerçek metni ayrı `tr.json`/`en.json` dosyasında tut.\n3. Çalışma anında aktif dile göre anahtarı çöz.\n4. Eksik anahtarları fallback dil ile doldur.\n\n## Genişletilmiş Notlar (Performant)\n\n- **Hedef Kitle:** Başlangıç seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Lokalizasyon Anahtarlı Çıktı senaryoları\n- **Avantajları:** Bu rehberi sayesinde Lokalizasyon Anahtarlı Çıktı işlemleri daha performant hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut ölçeklenme mimarinizde Lokalizasyon Anahtarlı Çıktı ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** lokalizasyon, çeviri, i18n\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 189, "no": "189", "cat": "JSON Şablonları", "name": "Federe Sesli Replik Metadata'sı Çerçevesi", "desc": "şablon bağlamında Sesli Replik Metadata'sı için federe bir çerçevesi. Her repliğe ses dosyası ve dudak senkronu verisi bağlayan şema. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["ses", "metadata", "lipsync", "şablon", "federe", "pro"], "badge1": "Pro", "content": "## Ses Metadata\n1. Düğüme `audioClip` ve `duration` alanları ekle.\n2. `lipsyncData` için viseme zaman damgaları tut.\n3. Altyazı zamanlamasını `duration` ile eşle.\n4. Ses yoksa metni varsayılan hızda göster.\n\n## Genişletilmiş Notlar (Federe)\n\n- **Hedef Kitle:** Pro seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Sesli Replik Metadata'sı senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Sesli Replik Metadata'sı işlemleri daha federe hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Sesli Replik Metadata'sı ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ses, metadata, lipsync\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 190, "no": "190", "cat": "Karakter Sesi", "name": "Hibrit Arketip Bazlı Konuşma Önerisi", "desc": "CI/CD bağlamında Arketip Bazlı Konuşma için hibrit bir önerisi. Bilge, palyaço, asker gibi arketiplere özgü kelime dağarcığı oluşturun. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["arketip", "stil", "ses", "CI/CD", "hibrit", "i̇leri"], "badge1": "İleri", "content": "## Arketip Sesi\n1. Karaktere bir arketip ata (bilge/asker/tüccar).\n2. Her arketip için 10 imza kelime/deyim belirle.\n3. Cümle uzunluğu ve resmiyet seviyesini ayarla.\n4. Repliklere arketip filtresi uygulayarak tutarlılık sağla.\n\n## Genişletilmiş Notlar (Hibrit)\n\n- **Hedef Kitle:** İleri seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Arketip Bazlı Konuşma senaryoları\n- **Avantajları:** Bu önerisi sayesinde Arketip Bazlı Konuşma işlemleri daha hibrit hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Arketip Bazlı Konuşma ihtiyacını analiz edin.\n  2. Bu önerisi'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** arketip, stil, ses\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 191, "no": "191", "cat": "Karakter Sesi", "name": "Zero-Config Lehçe ve Aksan Şablonu", "desc": "güvenlik bağlamında Lehçe ve Aksan için zero-config bir şablonu. Bölgesel karakterler için yazımda aksan yansıtan metin kuralları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir."  varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["koşul", "kilit", "flag", "veri", "resilient", "uzman"], "badge1": "Uzman", "content": "## Koşullu Kilitler\n1. Düğüme `requires` alanı ekle (örn: `hasKey`, `level>=5`).\n2. Koşul sağlanmazsa seçeneği gizle veya kilitli göster.\n3. Oyuncu durumunu merkezi `gameState` objesinden oku.\n4. Kilit açıldığında küçük bir ipucu metni sun.\n\n## Genişletilmiş Notlar (Resilient)\n\n- **Hedef Kitle:** Uzman seviye veri kullanıcıları\n- **Uygulama Alanı:** veri ekosisteminde Koşullu Düğüm Kilitleri senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Koşullu Düğüm Kilitleri işlemleri daha resilient hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut veri mimarinizde Koşullu Düğüm Kilitleri ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** koşul, kilit, flag\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 214, "no": "214", "cat": "Bağlamsal Tepkiler", "name": "Adaptif Zaman Duyarlı Selamlamalar Akışı", "desc": "yapay zeka bağlamında Zaman Duyarlı Selamlamalar için adaptif bir akışı. Oyun içi saate göre değişen NPC karşılama replikleri üretin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["zaman", "selamlama", "bağlam", "yapay zeka", "adaptif", "pro"], "badge1": "Pro", "content": "## Zamana Duyarlı Replik\n1. `timeOfDay` değişkenini (sabah/öğle/akşam/gece) oku.\n2. Her dilim için ayrı selamlama dizisi tanımla.\n3. Rastgele varyasyonla tekrarı azalt.\n4. Özel günlerde (bayram) override repliği ekle.\n\n## U lındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 216, "no": "216", "cat": "Bağlamsal Tepkiler", "name": "Veri-Odaklı Çevresel Olay Yorumları Yapısı", "desc": "mikroservis bağlamında Çevresel Olay Yorumları için veri-odaklı bir yapısı. Yakın çevrede olan olaylara NPC'nin anlık tepki vermesini sağlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["olay", "tepki", "çevre", "mikroservis", "veri-odaklı", "orta"], "badge1": "Orta", "content": "## Çevresel Yorum\n1. `nearbyEvents[]` listesini her tick'te kontrol et.\n2. Yangın, savaş, hava durumu için tepki şablonları hazırla.\n3. En yüksek öncelikli olayı seç ve bark (anlık replik) bas.\n4. Tekrarı önlemek için 30 sn cooldown uygula.\n\n## Genişletilmiş Notlar (Veri-Odaklı)\n\n- **Hedef Kitle:** Orta seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde Çevresel Olay Yorumları senaryoları\n- **Avantajları:** Bu yapısı sayesinde Çevresel Olay Yorumları işlemleri daha veri-odaklı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde Çevresel Olay Yorumları ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** olay, tepki, çevre\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 217, "no": "217", "cat": "JSON Şablonları", "name": "Hibrit-Cloud Standart Diyalog JSON Kılavuzu", "desc": "mikroservis bağlamında Standart Diyalog JSON için hibrit-cloud bir kı  **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 220, "no": "220", "cat": "Karakter Sesi", "name": "Observable Arketip Bazlı Konuşma Stratejisi", "desc": "CI/CD bağlamında Arketip Bazlı Konuşma için observable bir stratejisi. Bilge, palyaço, asker gibi arketiplere özgü kelime dağarcığı oluşturun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["arketip", "stil", "ses", "CI/CD", "observable", "orta"], "badge1": "Orta", "content": "## Arketip Sesi\n1. Karaktere bir arketip ata (bilge/asker/tüccar).\n2. Her arketip için 10 imza kelime/deyim belirle.\n3. Cümle uzunluğu ve resmiyet seviyesini ayarla.\n4. Repliklere arketip filtresi uygulayarak tutarlılık sağla.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Orta seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Arketip Bazlı Konuşma senaryoları\n- **Avantajları:** Bu stratejisi sayesinde Arketip Bazlı Konuşma işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Arketip Bazlı Konuşma ihtiyacını analiz edin.\n  2. Bu stratejisi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** arketip, stil, ses\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 221, "no": "221", "cat": "Karakter Sesi", "name": "Serverless Lehçe ve Aksan Algoritması", "desc": "ölçeklenme bağlamında Lehçe ve Aksan için serverless bir algoritması. Bölgesel karakterler için yazımda aksan yansıtan metin kuralları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["lehçe", "aksan", "bölge", "ölçeklenme", "serverless", "orta"], "badge1": "Orta", "content": "## Lehçe Yansıtma\n1. Karakterin geldiği bölgeyi belirle.\n2. Birkaç fonetik kural tanımla (örn: 'geliyorum'→'geliyom').\n3. Aşırıya kaçmadan 2-3 imza değişiklik uygula.\n4. Okunabilirliği test et, gerekirse yumuşat.\n\n## Uygulama Senaryosu (Serverless)\n\nBu algoritması, ölçeklenme alanında Lehçe ve Aksan problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Lehçe ve Aksan akışını serverless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 222, "no": "222", "cat": "Dallanma Mantığı", "name": "Hibrit-Cloud Sonuç Odaklı Seçim Metodu", "desc": "performans bağlamında Sonuç Odaklı Seçim için hibrit-cloud bir metodu. Oyuncu seçimlerinin uzun vadeli sonuçlara bağlandığı ağırlık sistemi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["seçim", "ağırlık", "sonuç", "performans", "hibrit-cloud", "orta"], "badge1": "Orta", "content": "## Seçim Ağırlığı\n1. Her seçime `weight` ve `consequence` etiketi ver.\n2. Seçimleri `decisionLog[]` içinde biriktir.\n3. Belirli eşiklerde hikaye dalını değiştir.\n4. Finalde log'a göre uygun sonu se acı akışını pipeline yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** ölçeklenme katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 302, "no": "302", "cat": "Diyalog Ağaçları", "name": "AI-Augmented Geri Dönüşlü Konuşma Anlaşması", "desc": "akış bağlamında Geri Dönüşlü Konuşma için ai-augmented bir anlaşması. Oyuncunun ana menüye dönebildiği döngüsel diyalog yapıları tasarlayın. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["döngü", "menü", "navigasyon", "akış", "ai-augmented", "orta"], "badge1": "Orta", "content": "## Döngüsel Diyalog\n1. Bir `hub` düğümü belirle (tüm konular buraya döner).\n2. Alt konuları hub'a `back` seçeneğiyle bağla.\n3. Ziyaret edilen düğümleri `visited[]` ile işaretle.\n4. Tükenmiş seçenekleri gri/pasif göster.\n\n## Genişletilmiş Notlar (AI-Augmented)\n\n- **Hedef Kitle:** Orta seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Geri Dönüşlü Konuşma senaryoları\n- **Avantajları:** Bu anlaşması sayesinde Geri Dönüşlü Konuşma işlemleri daha ai-augmented hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Geri Dönüşlü Konuşma ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** döngü, menü, navigasyon\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 303, "no": "303", "cat": "Diyalog Ağaçları", "name": "Sezgisel Koşullu Düğüm Kilitleri Metodu", "desc": "güvenlik bağlamında Koşullu Düğüm Kilitleri için sezgisel bir metodu. Belirli koşullar sağlanmadan açılmayan diyalog dallarını planlayın. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["koşul", "kilit", "flag", "güvenlik", "sezgisel", "başlangıç"], "badge1": "Başlangıç", "content": "## Koşullu Kilitler\n1. Düğüme `requires` alanı ekle (örn: `hasKey`, `level>=5`).\n2. Koşul sağlanmazsa seçeneği gizle veya kilitli göster.\n3. Oyuncu durumunu merkezi `gameState` objesinden oku.\n4. Kilit açıldığında küçük bir ipucu metni sun.\n\n## Uygulama Senaryosu (Sezgisel)\n\nBu metodu, güvenlik alanında Koşullu Düğüm Kilitleri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Koşullu Düğüm Kilitleri akışını sezgisel yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 304, "no": "304", "cat": "Bağlamsal Tepkiler", "name": "Observable Zaman Duyarlı Selamlamalar Şablonu", "desc": "CI/CD bağlamında Zaman Duyarlı Selamlamalar için observable bir şablonu. Oyun içi saate göre değişen NPC karşılama replikleri üretin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["zaman", "selamlama", "bağlam", "CI/CD", "observable", "pro"], "badge1": "Pro", "content": "## Zamana Duyarlı Replik\n1. `timeOfDay` değişkenini (sabah/öğle/akşam/gece) oku.\n2. Her dilim için ayrı selamlama dizisi tanımla.\n3. Rastgele varyasyonla tekrarı azalt.\n4. Özel günlerde (bayram) override repliği ekle.\n\n## Genişletilmiş Notlar (Observable)\n\n- **Hedef Kitle:** Pro seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Zaman Duyarlı Selamlamalar senaryoları\n- **Avantajları:** Bu şablonu sayesinde Zaman Duyarlı Selamlamalar işlemleri daha observable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Zaman Duyarlı Selamlamalar ihtiyacını analiz edin.\n  2. Bu şablonu'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** zaman, selamlama, bağlam\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-400"}}, {"id": 305, "no": "305", "cat": "Bağlamsal Tepkiler", "name": "Federe İlişki Seviyesine Göre Optimizasyonu", "desc": "yapay zeka bağlamında İlişki Seviyesine Göre için federe bir optimizasyonu. Oyuncuyla NPC arasındaki güven puanına göre konuşma tonunu değiştirin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["ilişki", "ton", "güven", "yapay zeka", "federe", "pro"], "badge1": "Pro", "content": "## İlişkiye Bağlı Ton\n1. `affinity` puanını 0-100 aralığında tut.\n2. Düşük/orta/yüksek için üç ton seti yaz (soğuk, nötr, sıcak).\n3. Eşik geçişlerinde kısa bir tepki cümlesi tetikle.\n4. Hakaret/iyilik eylemleriyle puanı güncelle.\n\n## Uygulama Senaryosu (Federe)\n\nBu optimizasyonu, yapay zeka alanında İlişki Seviyesine Göre problemini şu şekilde çözer:\n\n1. **Tanı tonom bir rehberi. Diyalog Ağaçları kategorisinde oyun odaklı pratik bir pattern'i. Orta seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["diyalog ağaçları", "oyun", "pratik", "mühendislik", "otonom", "i̇leri"], "badge1": "İleri", "content": "## Pratik Oyun Pattern'i\n\nBu öğe, **Diyalog Ağaçları** kategorisinde oyun konusuna pratik bir yaklaşım sunar.\n\n### Temel Konsept\nOyun bağlamında temel kavramı, modern diyalog ağaçları pratiğinde merkezi bir rol oynar. Pratik yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım maliyeti düşer.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata oranı azalır.\n\n### Adım Adım Uygulama\n\n1. **Analiz:** Mevcut diyalog ağaçları yapınızdaki oyun ihtiyaçlarını listele.\n2. **Tasarım:** Bu pattern'i için orta seviyede bir taslak çıkar.\n3. **Pilot:** Küçük bir kapsamda dene, metrik topla.\n4. **Geri Bildirim:** Ekip ve kullanıcı geri bildirimlerini değerlendir.\n5. **Rollout:** Kademeli olarak tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokümantasyon: ekip dışı kullanıcılar zorlanır.\n- Metrik eksikliği: başarıyı ölçemezsen iyileştiremezsin.\n- Eskimiş bağımlılıklar: güvenlik açıklarına davetiye.\n\n### Anahtar Metrikler\n\n| Metrik | Hedef | Kritik Eşik |\n|---|---|---|\n| Latency (p95) | < 200ms | > 500ms |\n| Hata oranı | < %0.1 | > %1 |\n| Throughput | > 1000 rps | < 500 rps |\n| Uptime | %99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi Oyun dokümantasyonu\n- Diyalog Ağaçları topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Uygulama Senaryosu (Otonom)\n\nBu rehberi, mühendislik alanında Pratik Oyun Pattern'i problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **M f": 2, "wave": "v3-400"}}, {"id": 333, "no": "333", "cat": "Diyalog Ağaçları", "name": "Dağıtık Koşullu Düğüm Kilitleri Mimari Yaklaşımı", "desc": "yapay zeka bağlamında Koşullu Düğüm Kilitleri için dağıtık bir mimari yaklaşımı. Belirli koşullar sağlanmadan açılmayan diyalog dallarını planlayın. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["koşul", "kilit", "flag", "yapay zeka", "dağıtık", "pro"], "badge1": "Pro", "content": "## Koşullu Kilitler\n1. Düğüme `requires` alanı ekle (örn: `hasKey`, `level>=5`).\n2. Koşul sağlanmazsa seçeneği gizle veya kilitli göster.\n3. Oyuncu durumunu merkezi `gameState` objesinden oku.\n4. Kilit açıldığında küçük bir ipucu metni sun.\n\n## Genişletilmiş Notlar (Dağıtık)\n\n- **Hedef Kitle:** Pro seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Koşullu Düğüm Kilitleri senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Koşullu Düğüm Kilitleri işlemleri daha dağıtık hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Koşullu Düğüm Kilitleri ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** koşul, kilit, flag\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 334, "no": "334", "cat": "Bağlamsal Tepkiler", "name": "Sıfır-Trust Zaman Duyarlı Selamlamalar Kalıbı", "desc": "logging bağlamında Zaman Duyarlı Selamlamalar için sıfır-trust bir kalıbı. Oyun içi saate göre değişen NPC karşılama replikleri üretin. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.",  rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 343, "no": "343", "cat": "Dallanma Mantığı", "name": "Multi-Tenant Zaman Baskılı Diyalog Önerisi", "desc": "performans bağlamında Zaman Baskılı Diyalog için multi-tenant bir önerisi. Oyuncunun sınırlı sürede yanıt vermesi gereken gergin sahneler kurun. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["zaman", "baskı", "gerilim", "performans", "multi-tenant", "orta"], "badge1": "Orta", "content": "## Zaman Baskısı\n1. Seçim ekranına `timer` (örn: 5 sn) ekle.\n2. Süre dolarsa varsayılan/sessizlik dalına geç.\n3. Geri sayımı görsel bir çubukla göster.\n4. Sonucu `timedOut:true` ile işaretleyip sahneyi etkile.\n\n## Uygulama Senaryosu (Multi-Tenant)\n\nBu önerisi, performans alanında Zaman Baskılı Diyalog problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zaman Baskılı Diyalog akışını multi-tenant yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 344, "no": "344", "cat": "Duygu Sistemleri", "name": "Observable NPC Ruh Hali Rehberi", "desc": "mimari bağlamında NPC Ruh Hali için observable bir rehberi. Mutlu, kızgın, korkmuş durumları arası geçiş yapan durum makinesi. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["ruh hali", "fsm", "duygu", "mimari", "observable", "pro"], "badge1": "Pro", "content": "## Ruh Hali FSM\n1. Durumları tanımla: sakin, tedirgin, öfkeli, neşeli.\n2. Geçiş tetikleyicilerini belirle (tehdit→tedirgin).\n3. Her duruma özel replik havuzu bağla.\n4. Zamanla nötr duruma geri dönüş (decay) ekle.\n\n## Uygulama Senaryosu (Observable)\n\nBu rehberi, mimari alanında NPC Ruh Hali problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** NPC Ruh Hali akışını observable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mimari katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 345, "no": "345", "cat": "Duygu Sistemleri", "name": "Mobile-First Hafıza Tabanlı Sitem Metodu", "desc": "API bağlamında Hafıza Tabanlı Sitem için mobile-first bir metodu. Geçmiş oyuncu davranışlarını hatırlayıp dile getiren NPC hafızası. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["hafıza", "geçmiş", "sitem", "API", "mobile-first", "orta"], "badge1": "Orta", "content": "## Hafıza ve Sitem\n1. Önemli oyuncu eylemlerini `memories[]` içinde sakla.\n2. Her hafızaya duygu etiketi ve tarih ekle.\n3. İlgili bağlamda hafızayı çağırıp replik üret.\n4. Eski hafızaların etkisini zamanla azalt.\n\n## Genişletilmiş Notlar (Mobile-First)\n\n- **Hedef Kitle:** Orta seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Hafıza Tabanlı Sitem senaryoları\n- **Avantajları:** Bu metodu sayesinde Hafıza Tabanlı Sitem işlemleri daha mobile-first hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Hafıza Tabanlı Sitem ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hafıza, geçmiş, sitem\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 346, "no": "346", "cat": "Diyalog Ağaçları", "name": "Idempotent Pratik Oyun Pattern'i Metodu", "desc": "güvenlik bağlamında Pratik Oyun Pattern'i için idempotent bir metodu. Diyalog Ağaçları kategorisinde oyun odaklı pratik bir pattern'i. Orta seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["diyalog ağaçları", "oyun", "pratik", "güvenlik", "idempotent", "uzman"], "badge1": "Uzman", "content": "## Pratik Oyun Pattern'i\n\nBu öğe, **Diyalog Ağaçları** kategorisinde oyun konusuna pratik bir yaklaşım sunar.\n\n### Temel Konsept\nOyun bağlamında temel kavramı, modern diyalog ağaçları pratiğinde merkezi bir rol oynar. Pratik yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım maliyeti düşer.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata oranı azalır.\n\n### Adım Adım Uygulama\n\n1. **Analiz:** Mevcut diyalog ağaçları yapınızdaki oyun ihtiyaçlarını listele.\n2. **Tasarım:** Bu pattern'i için orta seviyede bir taslak çıkar.\n3. **Pilot:** Küçük bir kapsamda dene, metrik topla.\n4. **Geri Bildirim:** Ekip ve kullanıcı geri bildirimlerini değerlendir.\n5. **Rollout:** Kademeli olarak tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokümantasyon: ekip dışı kullanıcılar zorlanır.\n- Metrik eksikliği: başarıyı ölçemezsen iyileştiremezsin.\n- Eskimiş bağımlılıklar: güvenlik açıklarına davetiye.\n\n### Anahtar Metrikler\n\n| Metrik | Hedef | Kritik Eşik |\n|---|---|---|\n| Latency (p95) | < 200ms | > 500ms |\n| Hata oranı | < %0.1 | > %1 |\n| Throughput | > 1000 rps | < 500 rps |\n| Uptime | %99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi Oyun dokümantasyonu\n- Diyalog Ağaçları topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Uzman seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Pratik Oyun Pattern'i senaryoları\n- **Avantajları:** Bu metodu sayesinde Pratik Oyun Pattern'i işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Pratik Oyun Pattern'i ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** diyalog ağaçları, oyun, pratik\n", "source": {"generated": true, "variant_of": 166, "wave": "v3-400"}}, {"id": 347, "no": "347", "cat": "Bağlamsal Tepkiler", "name": "Event-Sourced Profesyonel Motoru Önerisi Protokolü", "desc": "caching bağlamında Profesyonel Motoru Önerisi için event-sourced bir protokolü. Bağlamsal Tepkiler kategorisinde motoru odaklı profesyonel bir önerisi. İleri seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu v atmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 372, "no": "372", "cat": "Dallanma Mantığı", "name": "Atomic Sonuç Odaklı Seçim Çekirdeği", "desc": "akış bağlamında Sonuç Odaklı Seçim için atomic bir çekirdeği. Oyuncu seçimlerinin uzun vadeli sonuçlara bağlandığı ağırlık sistemi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["seçim", "ağırlık", "sonuç", "akış", "atomic", "uzman"], "badge1": "Uzman", "content": "## Seçim Ağırlığı\n1. Her seçime `weight` ve `consequence` etiketi ver.\n2. Seçimleri `decisionLog[]` içinde biriktir.\n3. Belirli eşiklerde hikaye dalını değiştir.\n4. Finalde log'a göre uygun sonu seç.\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Uzman seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Sonuç Odaklı Seçim senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Sonuç Odaklı Seçim işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Sonuç Odaklı Seçim ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** seçim, ağırlık, sonuç\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 373, "no": "373", "cat": "Dallanma Mantığı", "name": "Bağlamsal Zaman Baskılı Diyalog Modeli", "desc": "CI/CD bağlamında Zaman Baskılı Diyalog için bağlamsal bir modeli. Oyuncunun sınırlı sürede yanıt vermesi gereken gergin sahneler kurun. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["zaman", "baskı", "gerilim", "CI/CD", "bağlamsal", "pro"], "badge1": "Pro", "content": "## Zaman Baskısı\n1. Seçim ekranına `timer` (örn: 5 sn) ekle.\n2. Süre dolarsa varsayılan/sessizlik dalına geç.\n3. Geri sayımı görsel bir çubukla göster.\n4. Sonucu `timedOut:true` ile işaretleyip sahneyi etkile.\n\n## Uygulama Senaryosu (Bağlamsal)\n\nBu modeli, CI/CD alanında Zaman Baskılı Diyalog problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zaman Baskılı Diyalog akışını bağlamsal yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 374, "no": "374", "cat": "Duygu Sistemleri", "name": "Pratik NPC Ruh Hali Metodu", "desc": "ölçeklenme bağlamında NPC Ruh Hali için pratik bir metodu. Mutlu, kızgın, korkmuş durumları arası geçiş yapan durum makinesi. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["ruh hali", "fsm", "duygu", "ölçeklenme", "pratik", "orta"], "badge1": "Orta", "content": "## Ruh Hali FSM\n1. Durumları tanımla: sakin, tedirgin, öfkeli, neşeli.\n2. Geçiş tetikleyicilerini belirle (tehdit→tedirgin).\n3. Her duruma özel replik havuzu bağla.\n4. Zamanla nötr duruma geri dönüş (decay) ekle.\n\n## Uygulama Senaryosu (Pratik)\n\nBu metodu, ölçeklenme alanında NPC Ruh Hali problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** NPC Ruh Hali akışını pratik yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygın uction-Grade Pratik Oyun Pattern'i Düzeneği", "desc": "API bağlamında Pratik Oyun Pattern'i için production-grade bir düzeneği. Diyalog Ağaçları kategorisinde oyun odaklı pratik bir pattern'i. Orta seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["diyalog ağaçları", "oyun", "pratik", "API", "production-grade", "uzman"], "badge1": "Uzman", "content": "## Pratik Oyun Pattern'i\n\nBu öğe, **Diyalog Ağaçları** kategorisinde oyun konusuna pratik bir yaklaşım sunar.\n\n### Temel Konsept\nOyun bağlamında temel kavramı, modern diyalog ağaçları pratiğinde merkezi bir rol oynar. Pratik yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım maliyeti düşer.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata oranı azalır.\n\n### Adım Adım Uygulama\n\n1. **Analiz:** Mevcut diyalog ağaçları yapınızdaki oyun ihtiyaçlarını listele.\n2. **Tasarım:** Bu pattern'i için orta seviyede bir taslak çıkar.\n3. **Pilot:** Küçük bir kapsamda dene, metrik topla.\n4. **Geri Bildirim:** Ekip ve kullanıcı geri bildirimlerini değerlendir.\n5. **Rollout:** Kademeli olarak tüm sisteme yay.\n6. **Gözlem:** Production'da en az 2 sprint izle.\n7. **İyileştirme:** Toplanan verilere göre revize et.\n\n### Sık Yapılan Hatalar\n\n- Aşırı mühendislik: gerekmedikçe karmaşıklaştırma.\n- Yetersiz dokümantasyon: ekip dışı kullanıcılar zorlanır.\n- Metrik eksikliği: başarıyı ölçemezsen iyileştiremezsin.\n- Eskimiş bağımlılıklar: güvenlik açıklarına davetiye.\n\n### Anahtar Metrikler\n\n| Metrik | Hedef | Kritik Eşik |\n|---|---|---|\n| Latency (p95) | < 200ms | > 500ms |\n| Hata oranı | < %0.1 | > %1 |\n| Throughput | > 1000 rps | < 500 rps |\n| Uptime | %99.9 | < %99.5 |\n\n### İlgili Kaynaklar\n\n- Resmi Oyun dokümantasyonu\n- Diyalog Ağaçları topluluk forumları\n- Konferans sunumları ve case study'ler\n- Açık kaynak referans implementasyonları\n\n## Genişletilmiş Notlar (Production-Grade)\n\n- **Hedef Kitle:** Uzman seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Pratik Oyun Pattern'i senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Pratik Oyun Pattern'i işlemleri daha production-grade hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Pratik Oyun Pattern'i ihtiyacını analiz edin.\n  2. Bu düzeneği'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** diyalog ağaçları, oyun, pratik\n", "source": {"generated": true, "variant_of": 166, "wave": "v3-400"}}, {"id": 377, "no": "377", "cat": "Bağlamsal Tepkiler", "name": "Şeffaf Profesyonel Motoru Önerisi Modeli", "desc": "dağıtım bağlamında Profesyonel Motoru Önerisi için şeffaf bir modeli. Bağlamsal Tepkiler kategorisinde motoru odaklı profesyonel bir önerisi. İleri seviyesi kullanıcılar için tasarlanmış kapsamlı bir referans. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["bağlamsal tepkiler", "motoru", "profesyonel", "dağıtım", "şeffaf", "pro"], "badge1": "Pro", "content": "## Profesyonel Motoru Önerisi\n\nBu öğe, **Bağlamsal Tepkiler** kategorisinde motoru konusuna profesyonel bir yaklaşım sunar.\n\n### Temel Konsept\nMotoru bağlamında zaman kavramı, modern bağlamsal tepkiler pratiğinde merkezi bir rol oynar. Profesyonel yaklaşım sayesinde:\n\n- Performans artar (ortalama %15-35).\n- Bakım maliyeti düşer.\n- Ölçeklenebilirlik kolaylaşır.\n- Hata oranı azalır.\n\n### Adım Adım Uygulama\n\n1. **Analiz:** Mevcut bağlamsal tepkiler yapınızdaki motoru ihtiyaçlarını listele.\n2. **Tasarım:** Bu önerisi için i̇leri seviyede bir taslak çıkar.\n3. **Pilot:** Küçük bir kapsamd
