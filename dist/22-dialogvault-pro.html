blonları", "name": "Şeffaf Standart Diyalog JSON Optimizasyonu", "desc": "entegrasyon bağlamında Standart Diyalog JSON için şeffaf bir optimizasyonu. Motor bağımsız, taşınabilir bir diyalog JSON şeması tanımlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["json", "şema", "standart", "entegrasyon", "şeffaf", "uzman"], "badge1": "Uzman", "content": "## Diyalog JSON Şeması\n```json\n{\"id\":\"npc_01\",\"nodes\":[{\"id\":1,\"speaker\":\"Demirci\",\"text\":\"...\",\"choices\":[{\"text\":\"Evet\",\"next\":2}]}]}\n```\n1. `speaker`, `text`, `choices` zorunlu.\n2. `next` null ise konuşma biter.\n3. `flags` ile yan etki tetikle.\n\n## Uygulama Senaryosu (Şeffaf)\n\nBu optimizasyonu, entegrasyon alanında Standart Diyalog JSON problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Standart Diyalog JSON akışını şeffaf yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 398, "no": "398", "cat": "JSON Şablonları", "name": "Stream Tabanlı Lokalizasyon Anahtarlı Çıktı Standartı", "desc": "akış bağlamında Lokalizasyon Anahtarlı Çıktı için stream tabanlı bir standartı. Metinleri çeviri anahtarlarıyla ayıran çok dilli JSON yapısı. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["lokalizasyon", "çeviri", "i18n", "akış", "stream tabanlı", "pro"], "badge1": "Pro", "content": "## Lokalize JSON\n1. `text` yerine `textKey` kullan (örn: `npc01.greet`).\n2. Gerçek metni ayrı `tr.json`/`en.json` dosyasında tut.\n3. Çalışma anında aktif dile göre anahtarı çöz.\n4. Eksik anahtarları fallback dil ile doldur.\n\n## Uygulama Senaryosu (Stream Tabanlı)\n\nBu standartı, akış alanında Lokalizasyon Anahtarlı Çıktı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Lokalizasyon Anahtarlı Çıktı akışını stream tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** akış katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 399, "no": "399", "cat": "JSON Şablonları", "name": "Pluggable Sesli Replik Metadata'sı Akışı", "desc": "şablon bağlamında Sesli Replik Metadata'sı için pluggable bir akışı. Her repliğe ses dosyası ve dudak senkronu verisi bağlayan şema. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["ses", "metadata", "lipsync", "şablon", "pluggable", "uzman"], "badge1": "Uzman", "content": "## Ses Metadata\n1. Düğüme `audioClip` ve `duration` alanları ekle.\n2. `lipsyncData` için viseme zaman damgaları tut.\n3. Altyazı zamanlamasını `duration` ile eşle.\n4. Ses yoksa metni varsayılan hızda göster.\n\n## Uygulama Senaryosu (Pluggable)\n\nBu akışı, şablon alanında Sesli Replik Metadata'sı problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Sesli Replik Metadata'sı akışını pluggable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 400, "no": "400", "cat": "Karakter Sesi", "name": "Kanıt-Tabanlı Arketip Bazlı Konuşma Kütüphanesi", "desc": "caching bağlamında Arketip Bazlı Konuşma için kanıt-tabanlı bir kütüphanesi. Bilge, palyaço, asker gibi arketiplere özgü kelime dağarcığı oluşturun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["arketip", "stil", "ses", "caching", "kanıt-tabanlı", "başlangıç"], "badge1": "Başlangıç", "content": "## Arketip Sesi\n1. Karaktere bir arketip ata (bilge/asker/tüccar).\n2. Her arketip için 10 imza kelime/deyim belirle.\n3. Cümle uzunluğu ve resmiyet seviyesini ayarla.\n4. Repliklere arketip filtresi uygulayarak tutarlılık sağla.\n\n## Uygulama Senaryosu (Kanıt-Tabanlı)\n\nBu kütüphanesi, caching alanında Arketip Bazlı Konuşma problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Arketip Bazlı Konuşma akışını kanıt-tabanlı yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 401, "no": "401", "cat": "AI Prompt Kütüphanesi", "name": "Sistem Promptu — Diyalog", "desc": "Diyalog alanı için orijinal sistem promptu promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "system-prompt", "diyalog", "orijinal"], "badge1": "Orijinal AI", "content": "## SİSTEM PROMPTU — Diyalog Uzmanı\n\nSen kıdemli bir **Diyalog** uzmanısın. Görevin: NPC dialog, branching conversations.\n\n### Davranış Kuralları\n1. **Net ve doğrulanabilir** yanıtlar ver; spekülasyondan kaçın.\n2. Her iddiayı kaynak veya somut örnekle destekle.\n3. Belirsizlik varsa açıkça **\"emin değilim\"** de — yanlış cevap verme.\n4. Kullanıcıya **adım adım** rehberlik et; tek seferde fazla yükleme.\n5. Yanıt formatı: önce TL;DR (2 cümle), sonra detaylar, sonra sonraki adım önerisi.\n\n### Yasak Davranışlar\n- Üretilmiş istatistik veya uydurma kaynak verme\n- Konu dışına çıkma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru Diyalog kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 402, "no": "402", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — Diyalog", "desc": "Diyalog alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "diyalog", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Diyalog\n\nAşağıda Diyalog alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** NPC dialog, branching conversations konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** NPC dialog, branching conversations alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** NPC dialog, branching conversations için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Diyalog", "desc": "Diyalog alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "diyalog", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Diyalog\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Diyalog ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) NPC dialog, branching conversations ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Diyalog", "desc": "Diyalog alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "diyalog", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Diyalog Mentörü\n\n**Kimsin:** 15+ yıl Diyalog deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** NPC dialog, branching conversations\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün Diyalog ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — Diyalog", "desc": "Diyalog alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "diyalog", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — Diyalog\n\nDiyalog alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"Diyalog\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "Diyalog Ağaçları", "name": "Bağlamsal Temel Diyalog Ağacı Çerçevesi", "desc": "yapay zeka bağlamında Temel Diyalog Ağacı için bağlamsal bir çerçevesi. NPC için kök düğüm, dallar ve yaprak yanıtlardan oluşan ağaç yapısı kurun. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["ağaç", "düğüm", "iskelet", "yapay zeka", "bağlamsal", "başlangıç"], "badge1": "Başlangıç", "content": "## Diyalog Ağacı İskeleti\n1. Kök düğümü (selamlama) tanımla.\n2. Her düğüme `id`, `text`, `choices[]` alanları ekle.\n3. Choices içinde `next` ile hedef düğüm id'sini bağla.\n4. Yaprak düğümlere `end:true` koyarak konuşmayı sonlandır.\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Başlangıç seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Temel Diyalog Ağacı senaryoları\n- **Avantajları:** Bu çerçevesi sayesinde Temel Diyalog Ağacı işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Temel Diyalog Ağacı ihtiyacını analiz edin.\n  2. Bu çerçevesi'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** ağaç, düğüm, iskelet\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 407, "no": "407", "cat": "Diyalog Ağaçları", "name": "Stream Tabanlı Geri Dönüşlü Konuşma Çekirdeği", "desc": "arayüz bağlamında Geri Dönüşlü Konuşma için stream tabanlı bir çekirdeği. Oyuncunun ana menüye dönebildiği döngüsel diyalog yapıları tasarlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["döngü", "menü", "navigasyon", "arayüz", "stream tabanlı", "uzman"], "badge1": "Uzman", "content": "## Döngüsel Diyalog\n1. Bir `hub` düğümü belirle (tüm konular buraya döner).\n2. Alt konuları hub'a `back` seçeneğiyle bağla.\n3. Ziyaret edilen düğümleri `visited[]` ile işaretle.\n4. Tükenmiş seçenekleri gri/pasif göster.\n\n## Genişletilmiş Notlar (Stream Tabanlı)\n\n- **Hedef Kitle:** Uzman seviye arayüz kullanıcıları\n- **Uygulama Alanı:** arayüz ekosisteminde Geri Dönüşlü Konuşma senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde Geri Dönüşlü Konuşma işlemleri daha stream tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut arayüz mimarinizde Geri Dönüşlü Konuşma ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** döngü, menü, navigasyon\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-450-final"}}, {"id": 408, "no": "408", "cat": "Diyalog Ağaçları", "name": "Adaptif Koşullu Düğüm Kilitleri Protokolü", "desc": "test bağlamında Koşullu Düğüm Kilitleri için adaptif bir protokolü. Belirli koşullar sağlanmadan açılmayan diyalog dallarını planlayın. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["koşul", "kilit", "flag", "test", "adaptif", "uzman"], "badge1": "Uzman", "content": "## Koşullu Kilitler\n1. Düğüme `requires` alanı ekle (örn: `hasKey`, `level>=5`).\n2. Koşul sağlanmazsa seçeneği gizle veya kilitli göster.\n3. Oyuncu durumunu merkezi `gameState` objesinden oku.\n4. Kilit açıldığında küçük bir ipucu metni sun.\n\n## Uygulama Senaryosu (Adaptif)\n\nBu protokolü, test alanında Koşullu Düğüm Kilitleri problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Koşullu Düğüm Kilitleri akışını adaptif yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** test katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 409, "no": "409", "cat": "Bağlamsal Tepkiler", "name": "Serverless Zaman Duyarlı Selamlamalar Tasarımı", "desc": "şablon bağlamında Zaman Duyarlı Selamlamalar için serverless bir tasarımı. Oyun içi saate göre değişen NPC karşılama replikleri üretin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["zaman", "selamlama", "bağlam", "şablon", "serverless", "orta"], "badge1": "Orta", "content": "## Zamana Duyarlı Replik\n1. `timeOfDay` değişkenini (sabah/öğle/akşam/gece) oku.\n2. Her dilim için ayrı selamlama dizisi tanımla.\n3. Rastgele varyasyonla tekrarı azalt.\n4. Özel günlerde (bayram) override repliği ekle.\n\n## Uygulama Senaryosu (Serverless)\n\nBu tasarımı, şablon alanında Zaman Duyarlı Selamlamalar problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Zaman Duyarlı Selamlamalar akışını serverless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard' // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'dialogvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
</body>
</html>
