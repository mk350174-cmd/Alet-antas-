önergesi. Tek main branch üzerinde feature flag kullanarak sürekli entegrasyon iş akışı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["trunk", "feature flag", "CI", "şablon", "production-grade", "uzman"], "badge1": "Uzman", "content": "## Trunk-Based Development\n1. Herkes doğrudan `main`'e veya max. 1-2 günlük kısa branch'e iter.\n2. Feature flag ile tamamlanmamış kod main'de gizlenir.\n3. Her push CI tetikler → tüm testler geçmeli.\n4. Release: tag + feature flag açma.\n\nFaydası: Uzun yaşayan branch merge cehennemi yok.\nGereksiz: Code review gecikme riski artar → pair programming önerilir.\n\n## Genişletilmiş Notlar (Production-Grade)\n\n- **Hedef Kitle:** Uzman seviye şablon kullanıcıları\n- **Uygulama Alanı:** şablon ekosisteminde Trunk-Based Development senaryoları\n- **Avantajları:** Bu yönergesi sayesinde Trunk-Based Development işlemleri daha production-grade hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut şablon mimarinizde Trunk-Based Development ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** trunk, feature flag, CI\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-450-final"}}, {"id": 417, "no": "417", "cat": "Temel Git", "name": "Atomic git reflog ile Anlaşması", "desc": "monitoring bağlamında git reflog ile için atomic bir anlaşması. Yanlışlıkla silinen commit veya branch'i git reflog ile geri getirin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["reflog", "kurtarma", "kayıp", "monitoring", "atomic", "pro"], "badge1": "Pro", "content": "## git reflog ile Kurtarma\n```bash\n# Tüm HEAD hareketleri\ngit reflog\n# HEAD@{0}: reset: moving to HEAD~3\n# HEAD@{1}: commit: önemli değişiklik\n\n# Kayıp commit'i geri al\ngit checkout HEAD@{1}\n# veya\ngit cherry-pick HEAD@{1}\n\n# Silinen branch geri al\ngit reflog --all | grep 'feature/deleted'\n# feature/deleted: HEAD@{5} commit abc123\ngit checkout -b feature/deleted abc123\n\n# Zamana göre arama\ngit reflog 'HEAD@{2 days ago}'\n```\n\n## Uygulama Senaryosu (Atomic)\n\nBu anlaşması, monitoring alanında git reflog ile problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** git reflog ile akışını atomic yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-450-final"}}, {"id": 418, "no": "418", "cat": "Git Hooks", "name": "Kullanıcı-Merkezli Commit-msg Hook Şablonu Çerçevesi", "desc": "şablon bağlamında Commit-msg Hook Şablonu için kullanıcı-merkezli bir çerçevesi. Commit mesajını Conventional Commits formatına uyan hook şablonu. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["hook", "commit-msg", "format", "şablon", "kullanıcı-merkezli", "başlangıç"], "badge1": "Başlangıç", "content": "## commit-msg Hook\n```bash\n#!/bin/bash\n# .git/hooks/commit-msg\nMSG_FILE=$1\nMSG=$(cat \"$MSG_FILE\")\n\n# Conventional Commits regex\nPATTERN='^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\\(.+\\))?(!)?: .{1,72}'\n\nif ! echo \"$MSG\" | grep -qE \"$PATTERN\"; then\n    echo \"HATA: Commit mesajı format dışı!\"\n    echo \"Beklenen: type(scope): mesaj\"\n    echo \"Örnek: feat(auth): JWT eklendi\"\n    exit 1\nfi\n\n# WIP commit'leri engelle (isteğe bağlı)\nif echo \"$MSG\" | grep -qi '^wip'; then\n    echo \"HATA: WIP commit'ler ana branch'e izin verilmez.\"\n    exit 1\nfi\n```\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu çerçevesi, şablon alanında Commit-msg Hook Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Commit-msg Hook Şablonu akışını kullanıcı-merkezli yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** şablon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-450-final"}}, {"id": 419, "no": "419", "cat": "Git Araçları", "name": "Container-Native GitHub CLI (gh) Refactor Yöntemi", "desc": "gözlemlenebilirlik bağlamında GitHub CLI (gh) için container-native bir refactor yöntemi. gh CLI ile PR oluşturma, review ve issue yönetimi komutları. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["gh", "GitHub", "CLI", "gözlemlenebilirlik", "container-native", "orta"], "badge1": "Orta", "content": "## GitHub CLI\n```bash\n# PR oluştur\ngh pr create --title 'feat: yeni özellik' --body 'Açıklama' --base main\n\n# PR listele ve incele\ngh pr list\ngh pr view 123\ngh pr checkout 123\n\n# PR birleştir\ngh pr merge 123 --squash\n\n# Issue\ngh issue create --title 'Bug: ...' --label 'bug,critical'\ngh issue list --assignee @me\ngh issue close 456\n\n# Workflow tetikle\ngh workflow run deploy.yml -f env=production\n\n# Repo klonla\ngh repo clone org/repo\n```\n\n## Genişletilmiş Notlar (Container-Native)\n\n- **Hedef Kitle:** Orta seviye gözlemlenebilirlik kullanıcıları\n- **Uygulama Alanı:** gözlemlenebilirlik ekosisteminde GitHub CLI (gh) senaryoları\n- **Avantajları:** Bu refactor yöntemi sayesinde GitHub CLI (gh) işlemleri daha container-native hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut gözlemlenebilirlik mimarinizde GitHub CLI (gh) ihtiyacını analiz edin.\n  2. Bu refactor yöntemi'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** gh, GitHub, CLI\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-450-final"}}, {"id": 420, "no": "420", "cat": "Merge & Rebase", "name": "Pluggable Rebase vs Merge Sistemi", "desc": "akış bağlamında Rebase vs Merge için pluggable bir sistemi. Rebase ve merge arasındaki farklar ve hangi senaryoda hangisini kullanmalısınız. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["rebase", "merge", "geçmiş", "akış", "pluggable", "başlangıç"], "badge1": "Başlangıç", "content": "## Rebase vs Merge\n| | Rebase | Merge |\n|--|--------|-------|\n| Geçmiş | Doğrusal, temiz | Gerçek, dal yapısı |\n| Conflict | Her commit için | Bir kez |\n| Public branch | Tehlikeli | Güvenli |\n| Feature → main | Rebase sonra fast-forward | Merge commit |\n\nAltın kural: Public/shared branch'leri rebase etme → başkalarının geçmişini bozar.\nİş akışı: `git pull --rebase` ile yerel commit'leri saat üstüne taşı.\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Başlangıç seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Rebase vs Merge senaryoları\n- * h develop\n# ... geliştir ...\ngit checkout develop\ngit merge --no-ff feature/user-auth\ngit branch -d feature/user-auth\n\n# Release\ngit checkout -b release/1.2.0 develop\n# Versiyon bump, son düzeltmeler\ngit checkout main && git merge --no-ff release/1.2.0\ngit tag -a v1.2.0 -m 'Sürüm 1.2.0'\ngit checkout develop && git merge --no-ff release/1.2.0\ngit branch -d release/1.2.0\n\n# Hotfix\ngit checkout -b hotfix/critical-fix main\ngit checkout main && git merge --no-ff hotfix/critical-fix\ngit checkout develop && git merge --no-ff hotfix/critical-fix\n```\n\n## Uygulama Senaryosu (Headless)\n\nBu doktrini, performans alanında Git Flow Komutları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Git Flow Komutları akışını headless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** performans katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-450-final"}}, {"id": 439, "no": "439", "cat": "Git Hooks", "name": "Composable Pre-commit Hook Şablonu Kılavuzu", "desc": "logging bağlamında Pre-commit Hook Şablonu için composable bir kılavuzu. Commit öncesi lint, test ve format kontrolü yapan pre-commit hook. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["hook", "pre-commit", "lint", "logging", "composable", "başlangıç"], "badge1": "Başlangıç", "content": "## Pre-commit Hook\n```bash\n#!/bin/bash\n# .git/hooks/pre-commit\nset -e\n\necho 'Pre-commit kontrolleri...'\n\n# Değişen Python dosyalarını lint\nCHANGED_PY=$(git diff --cached --name-only --diff-filter=ACM | grep '\\.py$' || true)\nif [[ -n $CHANGED_PY ]]; then\n    python -m flake8 $CHANGED_PY\n    python -m black --check $CHANGED_PY\nfi\n\n# JS/TS dosyaları\nCHANGED_JS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\\.(js|ts)x?$' || true)\n[[ -n $CHANGED_JS ]] && npx eslint $CHANGED_JS\n\necho 'Tüm kontroller geçti ✓'\n```\n\n## Uygulama Senaryosu (Composable)\n\nBu kılavuzu, logging alanında Pre-commit Hook Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Pre-commit Hook Şablonu akışını composable yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** başlangıç seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 4, "wave": "v3-450-final"}}, {"id": 440, "no": "440", "cat": "Merge & Rebase", "name": "Pluggable Merge Conflict Çözümü İskeleti", "desc": "şablon bağlamında Merge Conflict Çözümü için pluggable bir i̇skeleti. Conflict işaretlerini okuma ve ours/theirs stratejileri ile çözüm. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["conflict", "merge", "çözüm", "şablon", "pluggable", "uzman"], "badge1": "Uzman", "content": "## Conflict Çözümü\n```\n<<<<<<< HEAD\n// Bizim değişikliğimiz\nconst timeout = 5000;\n=======\n// Gelen değişiklik\nconst timeout = 10000;\n>>>>>>> feature/retry\n```\n\nStratejiler:\n```bash\n# Tamamen bize ait\ngit checkout --ours dosya.js\n# Tamamen karşı tarafa ait\ngit checkout --theirs dosya.js\n\n# Belirli dosyada merge yolu\ngit checkout -m dosya.js\n\n# Araçla\ngit mergetool  # vimdiff, vscode vs.\n```\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Uzman sevi  oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** PR, review, checklist\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-450-final"}}, {"id": 443, "no": "443", "cat": "Takım İş Akışı", "name": "Headless Commit Mesajı Standartları Akışı", "desc": "güvenlik bağlamında Commit Mesajı Standartları için headless bir akışı. Conventional Commits formatı ile okunabilir ve araçlarla işlenebilir commit mesajları. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["commit", "conventional", "mesaj", "güvenlik", "headless", "i̇leri"], "badge1": "İleri", "content": "## Conventional Commits\n```\n<type>(<scope>): <subject>\n\n[body]\n\n[footer]\n```\nType'lar:\n- `feat`: Yeni özellik\n- `fix`: Bug düzeltme\n- `docs`: Dokümantasyon\n- `refactor`: Yeniden yapılandırma\n- `test`: Test ekleme\n- `chore`: Bakım\n- `perf`: Performans\n\nÖrnekler:\n```\nfeat(auth): JWT refresh token eklendi\nfix(api): null pointer hatası düzeltildi\nfeat!: API v2'ye geçiş (breaking change)\n```\n\n## Uygulama Senaryosu (Headless)\n\nBu akışı, güvenlik alanında Commit Mesajı Standartları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Commit Mesajı Standartları akışını headless yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** güvenlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-450-final"}}, {"id": 444, "no": "444", "cat": "Git Araçla // ── STATE ──
let activeItem = null;
let activeCat = 'all';
let API_KEY = '';
const STORAGE_KEY = 'gitvault_pro_api_key';

// ── API ──
function saveApiKey(){
  const val = document.getElementById('apiInput').value.trim();
  if(!val) return;
  API_KEY = val;
  localStorage.setItem(STORAGE_KEY, val);
  updateApiStatus();
}
function updateApiStatus(){
  const dot = document.getElementById('apiDot');
  const lbl = document.getElementById('apiLbl');
  const inp = document.getElementById('apiInput');
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    API_KEY = saved; inp.value = saved;
    dot.classList.add('ok'); lbl.classList.add('ok');
    lbl.textContent = 'API key aktif';
  } else {
    inp.value = '';
    dot.classList.remove('ok'); lbl.classList.remove('ok');
    lbl.textContent = 'Bağlı değil';
  }
}

// ── INIT ──
function init(){
  updateApiStatus();
  buildCatButtons();
  buildItemList(ITEMS);
  document.getElementById('searchInput').addEventListener('input', e=>onSearch(e.target.value));
  document.getElementById('mainContent').addEventListener('scroll', e=>{
    document.getElementById('scrollTop').classList.toggle('visible', e.target.scrollTop > 300);
  });
}

// ── CATEGORIES ──
function buildCatButtons(){
  const el = document.getElementById('catBtns');
  const cats = Array.isArray(CATS) ? CATS : Object.keys(CATS).sort().map(k=>({id:k,name:k,color:(CATS[k].c||CATS[k].color||'var(--primary)'),count:(CATS[k].n||CATS[k].count||0)}));
  el.innerHTML = cats.map(cat=>`
    <button class="cat-btn" data-cat="${esc(cat.id||cat.name)}" style="--cc:${cat.color||cat.c||'var(--primary)'}" onclick="filterCat('${esc(cat.id||cat.name)}',this)">
      <span class="cdot"></span><span class="cname">${esc(cat.name)}</span><span class="ccount">${cat.count||cat.n||''}</span>
    </button>`).join('');
}

function catColor(cat){
  if(Array.isArray(CATS)){
    const found = CATS.find(c=>c.id===cat||c.name===cat);
    return found ? (found.color||found.c||'var(--primary)') : 'var(--primary)';
  }
  return (CATS[cat]||{}).c || (CATS[cat]||{}).color || 'var(--primary)';
}

// ── ITEM LIST ──
function buildItemList(items){
  const el = document.getElementById('itemList');
  if(!items.length){ el.innerHTML='<div style="padding:20px;text-align:center;font-family:DM Mono,monospace;font-size:10px;color:var(--text4)">Sonuç bulunamadı</div>'; return; }
  el.innerHTML = items.map((s,i)=>{
    const cc = s.cc || catColor(s.cat);
    const no = s.no || String(i+1).padStart(3,'0');
    return `<div class="item-row" id="item-${s.id}" data-id="${s.id}" style="--sc:${cc}" onclick="selectItem(${s.id})">
      <span class="item-no">${no}</span>
      <span class="item-dot"></span>
      <div class="item-info">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-desc">${esc(s.desc||'')}</div>
      </div>
      ${s.badge1?`<span class="item-badge">${esc(s.badge1)}</span>`:''}
    </div>`;
  }).join('');
}

// ── FILTER ──
function filterCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = cat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===cat);
  if(q) filtered = filtered.filter(s=>searchMatch(s, q));
  buildItemList(filtered);
  showGrid(filtered, cat==='all' ? 'Tüm Öğeler' : cat);
}

function onSearch(q){
  const lower = q.toLowerCase();
  let filtered = activeCat==='all' ? ITEMS : ITEMS.filter(s=>s.cat===activeCat);
  if(lower) filtered = filtered.filter(s=>searchMatch(s, lower));
  buildItemList(filtered);
  showGrid(filtered, q ? `"${q}" — ${filtered.length} sonuç` : 'Tüm Öğeler');
}

function searchMatch(s, q){
  return (s.name||'').toLowerCase().includes(q) ||
         (s.desc||'').toLowerCase().includes(q) ||
         (s.cat||'').toLowerCase().includes(q) ||
         (Array.isArray(s.tags) && s.tags.some(t=>t.toLowerCase().includes(q)));
}

// ── SELECT ──
function selectItem(id){
  activeItem = ITEMS.find(s=>s.id===id);
  if(!activeItem) return;
  document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('active'));
  const itm = document.getElementById('item-'+id);
  if(itm){ itm.classList.add('active'); itm.scrollIntoView({block:'nearest'}); }
  hideAll();
  document.getElementById('itemDetail').style.display='block';
  renderDetail(activeItem);
  document.getElementById('mainContent').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER DETAIL ──
function renderDetail(s){
  const cc = s.cc || catColor(s.cat);
  const metaFields = Object.entries(s.meta||{});
  const tags = Array.isArray(s.tags) ? s.tags : [];

  document.getElementById('itemDetail').innerHTML = `
    <div class="item-hdr">
      <div class="item-hdr-top">
        <span class="item-badge-lg cat" style="--cc:${cc}">${esc(s.cat)}</span>
        ${s.badge1?`<span class="item-badge-lg b1">${esc(s.badge1)}</span>`:''}
        ${s.badge2?`<span class="item-badge-lg b2">${esc(s.badge2)}</span>`:''}
        <button class="copy-btn" id="copyBtn" onclick="copyContent(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Kopyala
        </button>
      </div>
      <h2 class="item-title"><em>${esc(s.name)}</em></h2>
      <p class="item-subdesc">${esc(s.desc||'')}</p>
    </div>
    ${metaFields.length ? `<div class="meta-grid">${metaFields.map(([k,v])=>`
      <div class="meta-cell">
        <div class="meta-label">${esc(k)}</div>
        <div class="meta-value">${esc(String(v))}</div>
      </div>`).join('')}</div>` : ''}
    ${s.content ? `<div class="content-sec">
      <div class="content-title" style="--cc:${cc}">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--primary);display:inline-block"></span>
        İçerik
      </div>
      <div class="content-body" style="--cc:${cc}">${esc(s.content)}</div>
    </div>` : ''}
    ${tags.length ? `<div class="tags-sec">
      <div class="content-title">
        <span style="width:5px;height:5px;border-radius:50%;background:${cc};display:inline-block"></span>
        Etiketler
      </div>
      <div class="tag-chips">${tags.map(t=>`<span class="tag-chip" style="--cc:${cc}">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}
    ${s.source && s.source.url ? `<div class="source-sec">
      <span class="source-label">Kaynak</span>
      <a class="source-link" href="${esc(s.source.url)}" target="_blank" rel="noopener nofollow">${esc(s.source.url)}</a>
      ${s.source.license ? `<span class="source-license">${esc(s.source.license)}</span>` : ''}
      ${s.source.author ? `<span class="source-author">@${esc(s.source.author)}</span>` : ''}
    </div>` : ''}
    <div class="sim-sec">
      <div class="sim-hdr"><span class="sim-title">Benzer Öğeler</span></div>
      <div class="sim-grid">${buildSimilar(s).map(g=>`
        <div class="sim-card" style="--sc:${g.cc||catColor(g.cat)}" onclick="selectItem(${g.id})">
          <div class="sim-card-name">${esc(g.name)}</div>
          <div class="sim-card-desc">${esc(g.desc||'')}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildSimilar(s){
  const sameCat = ITEMS.filter(g=>g.cat===s.cat && g.id!==s.id);
  return sameCat.slice(0,4);
}

// ── COPY ──
function copyContent(id){
  const item = ITEMS.find(x=>x.id===id);
  if(!item) return;
  const txt = item.content || item.name + '\n' + (item.desc||'');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ btn.classList.add('copied'); btn.textContent='✓ Kopyalandı'; setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Kopyala'; }, 2000); }
  }).catch(()=>{});
}

// ── GRID ──
function showGrid(items, title){
  hideAll();
  document.getElementById('allGrid').style.display='block';
  document.getElementById('allGrid').innerHTML=`<div class="all-grid">
    <div class="grid-header">
      <h2 class="grid-title"><em>${esc(title)}</em></h2>
      <span class="grid-count">${items.length} öğeler</span>
    </div>
    <div class="item-cards">
      ${items.map((s,i)=>{
        const cc = s.cc || catColor(s.cat);
        const no = s.no || String(i+1).padStart(3,'0');
        return `<div class="item-card" style="--cc:${cc}" onclick="selectItem(${s.id})">
          <div class="card-no">${no}</div>
          <div class="card-name">${esc(s.name)}</div>
          <div class="card-desc">${esc(s.desc||'')}</div>
          <div class="card-foot">
            <span class="card-cat">${esc(s.cat)}</span>
            ${s.badge1?`<span class="card-b1">${esc(s.badge1)}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── UTILS ──
function hideAll(){
  document.getElementById('emptyState').style.display='none';
  document.getElementById('itemDetail').style.display='none';
  document.getElementById('allGrid').style.display='none';
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

window.addEventListener('DOMContentLoaded', ()=>{
  init();
  showGrid(ITEMS, 'Tüm Öğeler');
});
</script>
