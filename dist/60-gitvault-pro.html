<style>
:root{
  --bg:#06080e;--bg2:#0a0c12;--bg3:#0e1016;--bg4:#12141a;
  --border:#16181e;--border2:#1e2026;--border3:#2a2c32;
  --text:#ede9e0;--text2:#9896a0;--text3:#585668;--text4:#343244;
  --primary:#4a9eff;--primary2:#4a9eff;
  --primary-dim:#4a9eff15;--primary-glow:#4a9eff30;
  --accent:#a78bfa;--accent2:#a78bfa;
  --accent-dim:#a78bfa18;--accent-glow:#a78bfa30;
  --radius:6px;--radius-lg:12px;--radius-xl:20px;
  --tr:0.28s cubic-bezier(0.4,0,0.2,1);--tr-fast:0.15s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm:0 2px 8px #00000060;--shadow-md:0 8px 32px #00000080;--shadow-lg:0 20px 60px #000000a0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#4a9eff08 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,#a78bfa06 0%,transparent 50%);pointer-events:none;z-index:0}

.hero{position:relative;padding:56px 56px 44px;border-bottom:1px solid var(--border);overflow:hidden;background:linear-gradient(180deg,#0a0c12 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:900px;height:500px;background:radial-gradient(ellipse,#4a9eff0a 0%,#4a9eff03 40%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 30%,var(--accent) 70%,transparent 100%);opacity:.15}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--primary);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:14px;opacity:.9}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--primary));opacity:.7}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--primary),transparent)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,5.5vw,80px);font-weight:300;line-height:.9;letter-spacing:-.025em;margin-bottom:16px}
.hero-title em{font-style:italic;color:var(--primary);text-shadow:0 0 60px #4a9eff30}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:14px;color:var(--text2);max-width:540px;line-height:1.75;margin-bottom:28px}
.hero-stats{display:flex;gap:0;flex-wrap:wrap;align-items:stretch}
.stat{display:flex;flex-direction:column;gap:4px;padding:14px 26px;border-right:1px solid var(--border)}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-.02em}
.stat-num em{color:var(--primary);font-style:normal}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.14em;text-transform:uppercase}
.hero-corner{position:absolute;top:12px;right:48px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:700;color:#4a9eff03;line-height:1;user-select:none;pointer-events:none;letter-spacing:-.04em}

.api-bar{background:linear-gradient(90deg,#4a9eff06,var(--bg2),transparent);border-bottom:1px solid var(--border);padding:10px 56px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative;overflow:hidden}
.api-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,var(--primary),transparent);opacity:.5}
.api-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.08em;white-space:nowrap}
.api-input{flex:1;min-width:220px;max-width:360px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;transition:all var(--tr);letter-spacing:.04em}
.api-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-dim);background:var(--bg4)}
.api-input::placeholder{color:var(--text4)}
.api-save{background:linear-gradient(135deg,var(--primary),#2c80e1);color:#06080e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);text-transform:uppercase;box-shadow:0 2px 12px #4a9eff20}
.api-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px #4a9eff35}
.api-status{font-family:'DM Mono',monospace;font-size:10px;display:flex;align-items:center;gap:7px;letter-spacing:.06em}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--text4)}
.api-dot.ok{background:#5ac87d;box-shadow:0 0 8px #5ac87d60}
.api-status-lbl{color:var(--text4)}
.api-status-lbl.ok{color:#5ac87d}

.app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 280px)}
.sidebar{border-right:1px solid var(--border);background:var(--bg2);position:sticky;top:0;height:calc(100vh - 280px);overflow-y:auto;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.main{overflow-y:auto;height:calc(100vh - 280px)}

.srch-wrap{padding:10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2;backdrop-filter:blur(10px)}
.srch-inner{position:relative}
.srch-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px 9px 30px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:12px;transition:all var(--tr)}
.srch-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-dim);background:var(--bg4)}
.srch-input::placeholder{color:var(--text4)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.srch-inner:focus-within .srch-icon{color:var(--primary)}

.cat-sec{border-bottom:1px solid var(--border)}
.cat-hdr{padding:7px 12px 3px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--text4)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 12px;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Instrument Sans',sans-serif;font-size:11px;transition:all var(--tr-fast);text-align:left;border-left:2px solid transparent}
.cat-btn:hover{color:var(--text);background:var(--bg3)}
.cat-btn.active{color:var(--text);background:var(--bg4);border-left-color:var(--cc,var(--primary))}
.cat-btn .cdot{width:7px;height:7px;border-radius:50%;background:var(--cc,var(--primary));flex-shrink:0;margin-right:8px}
.cat-btn .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn .ccount{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

.item-list{flex:1;overflow-y:auto;padding-bottom:20px}
.item-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--tr-fast);border-left:2px solid transparent}
.item-row:hover{background:var(--bg3)}
.item-row.active{background:var(--bg4);border-left-color:var(--sc,var(--primary))}
.item-no{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);width:28px;flex-shrink:0}
.item-dot{width:6px;height:6px;border-radius:50%;background:var(--sc,var(--primary));flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.item-desc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.item-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border2);color:var(--text4);flex-shrink:0}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;opacity:.35;padding:40px}
.empty .glyph{font-family:'Cormorant Garamond',serif;font-size:80px;color:var(--primary);line-height:1}
.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}

.item-hdr{padding:28px 40px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0a0c12,var(--bg))}
.item-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.item-badge-lg{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);letter-spacing:.1em;text-transform:uppercase}
.item-badge-lg.cat{background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:var(--cc,var(--primary))}
.item-badge-lg.b1{background:var(--bg3);border:1px solid var(--border2);color:var(--text3)}
.item-badge-lg.b2{background:var(--bg3);border:1px solid var(--border2);color:var(--primary);font-size:9px}
.copy-btn{margin-left:auto;background:linear-gradient(135deg,var(--primary),#2c80e1);color:#06080e;border:none;border-radius:var(--radius);padding:7px 16px;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.1em;transition:all var(--tr);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px #4a9eff20}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px #4a9eff35}
.copy-btn.copied{background:linear-gradient(135deg,#5ac87d,#3aaa5d)}
.item-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;line-height:1;letter-spacing:-.02em;margin-bottom:8px}
.item-title em{font-style:italic;color:var(--cc,var(--primary))}
.item-subdesc{font-size:13px;color:var(--text2);line-height:1.7;max-width:600px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));border-bottom:1px solid var(--border)}
.meta-cell{padding:14px 20px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:6px}
.meta-value{font-size:13px;color:var(--text);line-height:1.3}
.meta-value.count{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--primary)}

.content-sec{padding:28px 40px;border-bottom:1px solid var(--border)}
.content-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.content-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.content-body{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px 24px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.75;color:var(--text2);white-space:pre-wrap;word-break:break-word;position:relative;overflow:hidden}
.content-body::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cc,var(--primary)),transparent);opacity:.6}

.tags-sec{padding:20px 40px;border-bottom:1px solid var(--border)}
.tag-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag-chip{font-family:'DM Mono',monospace;font-size:8px;padding:3px 9px;border-radius:var(--radius-xl);background:color-mix(in srgb,var(--cc,var(--primary)) 8%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 18%,transparent);color:var(--cc,var(--primary));letter-spacing:.06em}

.source-sec{padding:14px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.source-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text4)}
.source-link{font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.85;word-break:break-all}
.source-link:hover{opacity:1;text-decoration:underline}
.source-license{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);padding:2px 8px;border:1px solid var(--border2);border-radius:var(--radius-xl)}
.source-author{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3)}

.all-grid{padding:24px 32px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid-header{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.grid-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:-.01em}
.grid-title em{font-style:italic;color:var(--primary)}
.grid-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em}
.item-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--primary));opacity:.6;transition:opacity var(--tr)}
.item-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px #00000050}
.item-card:hover::before{opacity:1}
.card-no{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);margin-bottom:8px;letter-spacing:.08em}
.card-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-cat{font-family:'DM Mono',monospace;font-size:8px;color:var(--cc,var(--primary));background:color-mix(in srgb,var(--cc,var(--primary)) 10%,transparent);border:1px solid color-mix(in srgb,var(--cc,var(--primary)) 20%,transparent);padding:2px 7px;border-radius:10px;letter-spacing:.06em;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-b1{font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);letter-spacing:.06em}

.sim-sec{padding:20px 40px}
.sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sim-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.sim-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden;border-left:3px solid var(--sc,var(--primary))}
.sim-card:hover{background:var(--bg3);transform:translateY(-1px)}
.sim-card-name{font-size:11px;color:var(--text);line-height:1.3;margin-bottom:4px;font-weight:500}
.sim-card-desc{font-size:10px;color:var(--text3);line-height:1.4}

.footer{border-top:1px solid var(--border);padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.footer-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text)}
.footer-brand em{font-style:italic;color:var(--primary)}
.footer-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--text4);letter-spacing:.08em}

.scroll-top{position:fixed;bottom:18px;right:18px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--text3);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;transition:all var(--tr);z-index:100}
.scroll-top:hover{background:var(--bg4);color:var(--text);border-color:var(--primary)}
.scroll-top.visible{display:flex}

@media(max-width:768px){
  .hero{padding:36px 20px 28px}
  .hero-corner{display:none}
  .api-bar{padding:8px 20px}
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;max-height:300px;border-right:none;border-bottom:1px solid var(--border)}
  .main{height:auto}
  .item-hdr,.content-sec,.tags-sec,.sim-sec,.source-sec{padding:14px 20px}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
  .all-grid{padding:16px 20px}
  .footer{padding:16px 20px;flex-direction:column;align-items:flex-start}
  .stat{padding:10px 14px}
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-corner">G</div>
  <div class="hero-eyebrow">Yazılım Mimarisi & DevOps · Alet Çantası</div>
  <h1 class="hero-title">Git<em>Vault</em> <span>Pro</span></h1>
  <p class="hero-sub">Gelişmiş Git repo yönetimi, conflict çözümleri ve geçmiş (history) manipülasyonu komutları.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num"><em>15</em></div><div class="stat-label">Öğeler</div></div>
  </div>
</header>

<div class="api-bar">
  <span class="api-lbl">API KEY →</span>
  <input class="api-input" id="apiInput" type="password" placeholder="sk-ant-api..." autocomplete="off">
  <button class="api-save" onclick="saveApiKey()">KAYDET</button>
  <div class="api-status">
    <div class="api-dot" id="apiDot"></div>
    <span class="api-status-lbl" id="apiLbl">Bağlı değil</span>
  </div>
  <a id="apiLink" href="https://console.anthropic.com" target="_blank" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--primary);text-decoration:none;opacity:.7;margin-left:auto">Anthropic key al →</a>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="srch-wrap">
      <div class="srch-inner">
        <span class="srch-icon">⌕</span>
        <input class="srch-input" id="searchInput" type="text" placeholder="Git ara..." autocomplete="off">
      </div>
    </div>
    <div class="cat-sec">
      <div class="cat-hdr">Kategoriler</div>
      <button class="cat-btn active" data-cat="all" style="--cc:var(--primary)" onclick="filterCat('all',this)">
        <span class="cdot"></span><span class="cname">Tümü</span><span class="ccount">15</span>
      </button>
    </div>
    <div id="catBtns"></div>
    <div class="item-list" id="itemList"></div>

ry-pick", "seçim", "commit"], "badge1": "Orta", "content": "## Cherry-pick\n```bash\n# Tek commit\ngit cherry-pick abc123\n\n# Aralık (a dahil değil, b dahil)\ngit cherry-pick a123^..b456\n\n# Commit etmeden staging\ngit cherry-pick -n abc123\ngit diff --cached  # Kontrol et\ngit commit -m 'Cherry-picked fix'\n\n# Conflict varsa\ngit cherry-pick --continue\ngit cherry-pick --abort\n\n# Başka repodaki commit\ngit remote add other https://github.com/org/other.git\ngit fetch other\ngit cherry-pick other/main\n```", "source": {"generated": true}}, {"id": 7, "no": "007", "cat": "Takım İş Akışı", "name": "PR Review Checklist", "desc": "Pull request gözden geçirme için kapsamlı değerlendirme kontrol listesi.", "tags": ["PR", "review", "checklist"], "badge1": "Başlangıç", "content": "## PR Review Checklist\n**Kod kalitesi:**\n- [ ] İş mantığı doğru mu?\n- [ ] Edge case'ler ele alınmış mı?\n- [ ] Test kapsamı yeterli mi?\n- [ ] Performans etkisi var mı?\n\n**Güvenlik:**\n- [ ] SQL injection, XSS riski var mı?\n- [ ] Gizli bilgi commit'te mi?\n- [ ] Yetkilendirme kontrolü var mı?\n\n**Okunabilirlik:**\n- [ ] İsimler anlamlı mı?\n- [ ] Karmaşık mantık açıklanmış mı?\n- [ ] PR açıklaması yeterli mi?", "source": {"generated": true}}, {"id": 8, "no": "008", "cat": "Takım İş Akışı", "name": "Commit Mesajı Standartları", "desc": "Conventional Commits formatı ile okunabilir ve araçlarla işlenebilir commit mesajları.", "tags": ["commit", "conventional", "mesaj"], "badge1": "Başlangıç", "content": "## Conventional Commits\n```\n<type>(<scope>): <subject>\n\n[body]\n\n[footer]\n```\nType'lar:\n- `feat`: Yeni özellik\n- `fix`: Bug düzeltme\n- `docs`: Dokümantasyon\n- `refactor`: Yeniden yapılandırma\n- `test`: Test ekleme\n- `chore`: Bakım\n- `perf`: Performans\n\nÖrnekler:\n```\nfeat(auth): JWT refresh token eklendi\nfix(api): null pointer hatası düzeltildi\nfeat!: API v2'ye geçiş (breaking change)\n```", "source": {"generated": true}}, {"id": 9, "no": "009", "cat": "Git Araçları", "na  Gelişmiş problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Git Stash Gelişmiş akışını layered yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** CI/CD katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 2, "wave": "v3-400"}}, {"id": 213, "no": "213", "cat": "Branch Stratejileri", "name": "Polyglot Git Flow Komutları Düzeneği", "desc": "ölçeklenme bağlamında Git Flow Komutları için polyglot bir düzeneği. Feature, release ve hotfix branching iş akışı komutları ve kurallari. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["git flow", "feature", "release", "ölçeklenme", "polyglot", "i̇leri"], "badge1": "İleri", "content": "## Git Flow\n```bash\n# Feature geliştirme\ngit checkout -b feature/user-auth develop\n# ... geliştir ...\ngit checkout develop\ngit merge --no-ff feature/user-auth\ngit branch -d feature/user-auth\n\n# Release\ngit checkout -b release/1.2.0 develop\n# Versiyon bump, son düzeltmeler\ngit checkout main && git merge --no-ff release/1.2.0\ngit tag -a v1.2.0 -m 'Sürüm 1.2.0'\ngit checkout develop && git merge --no-ff release/1.2.0\ngit branch -d release/1.2.0\n\n# Hotfix\ngit checkout -b hotfix/critical-fix main\ngit checkout main && git merge --no-ff hotfix/critical-fix\ngit checkout develop && git merge --no-ff hotfix/critical-fix\n```\n\n## Genişletilmiş Notlar (Polyglot)\n\n- **Hedef Kitle:** İleri seviye ölçeklenme kullanıcıları\n- **Uygulama Alanı:** ölçeklenme ekosisteminde Git Flow Komutları senaryoları\n- **Avantajları:** Bu düzeneği sayesinde Git Flow Komutları işlemleri daha a planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 5, "wave": "v3-400"}}, {"id": 216, "no": "216", "cat": "Merge & Rebase", "name": "Pipeline Cherry-pick Kullanımı Mimari Yaklaşımı", "desc": "yapay zeka bağlamında Cherry-pick Kullanımı için pipeline bir mimari yaklaşımı. Belirli commit'leri başka bir branch'e seçici kopyalama. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["cherry-pick", "seçim", "commit", "yapay zeka", "pipeline", "i̇leri"], "badge1": "İleri", "content": "## Cherry-pick\n```bash\n# Tek commit\ngit cherry-pick abc123\n\n# Aralık (a dahil değil, b dahil)\ngit cherry-pick a123^..b456\n\n# Commit etmeden staging\ngit cherry-pick -n abc123\ngit diff --cached  # Kontrol et\ngit commit -m 'Cherry-picked fix'\n\n# Conflict varsa\ngit cherry-pick --continue\ngit cherry-pick --abort\n\n# Başka repodaki commit\ngit remote add other https://github.com/org/other.git\ngit fetch other\ngit cherry-pick other/main\n```\n\n## Genişletilmiş Notlar (Pipeline)\n\n- **Hedef Kitle:** İleri seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Cherry-pick Kullanımı senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Cherry-pick Kullanımı işlemleri daha pipeline hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Cherry-pick Kullanımı ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** cherry-pick, seçim, commit\n", "source": {"generated": true, "variant_of": 6, "wave": "v3-400"}}, {"id": 217, "no": "217", "cat": "Takım İş Akışı", "name": "Layered PR Review Checklist Anlaşması", "desc": "CI/CD bağlamında PR Review Checklist için layered bir anlaşması. Pull request gözden geçirme için kapsamlı değerlendirme kontrol listesi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["PR", "review", "checklist", "CI/CD", "layered", "i̇leri"], "badge1": "İleri", "content": "## PR Review Checklist\n**Kod kalitesi:**\n- [ ] İş mantığı doğru mu?\n- [ ] Edge case'ler ele alınmış mı?\n- [ ] Test kapsamı yeterli mi?\n- [ ] Performans etkisi var mı?\n\n**Güvenlik:**\n- [ ] SQL injection, XSS riski var mı?\n- [ ] Gizli bilgi commit'te mi?\n- [ ] Yetkilendirme kontrolü var mı?\n\n**Okunabilirlik:**\n- [ ] İsimler anlamlı mı?\n- [ ] Karmaşık mantık açıklanmış mı?\n- [ ] PR açıklaması yeterli mi?\n\n## Genişletilmiş Notlar (Layered)\n\n- **Hedef Kitle:** İleri seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde PR Review Checklist senaryoları\n- **Avantajları:** Bu anlaşması sayesinde PR Review Checklist işlemleri daha layered hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde PR Review Checklist ihtiyacını analiz edin.\n  2. Bu anlaşması'i pilot bir modülde test edin.\n  3. Metrikleri (i̇leri seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** PR, review, checklist\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 218, "no": "218", "cat": "Takım İş Akışı", "name": "Pluggable Commit Mesajı Standartları Standartı", "desc": "entegrasyon bağlamında Commit Mesajı Standartları için pluggable bir standartı. Conventional Commits formatı ile okunabilir ve araçlarla işlenebilir commit mesajları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["commit", "conventional", "mesaj", "entegrasyon", "pluggable", "uzman"], "badge1": "Uzman", "content": "## Conventional Commits\n```\n<type>(<scope>): <subject>\n\n[body]\n\n[footer]\n```\nType'lar:\n- `feat`: Yeni özellik\n- `fix`: Bug düzeltme\n- `docs`: Dokümantasyon\n- `refactor`: Yeniden yapılandırma\n- `test`: Test ekleme\n- `chore`: Bakım\n- `perf`: Performans\n\nÖrnekler:\n```\nfeat(auth): JWT refresh token eklendi\nfix(api): null pointer hatası düzeltildi\nfeat!: API v2'ye geçiş (breaking change)\n```\n\n## Genişletilmiş Notlar (Pluggable)\n\n- **Hedef Kitle:** Uzman seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde Commit Mesajı Standartları senaryoları\n- **Avantajları:** Bu standartı sayesinde Commit Mesajı Standartları işlemleri daha pluggable hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde Commit Mesajı Standartları ihtiyacını analiz edin.\n  2. Bu standartı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** commit, conventional, mesaj\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 219, "no": "219", "cat": "Git Araçları", "name": "Pratik git bisect ile Düzeni", "desc": "yapay zeka bağlamında git bisect ile için pratik bir düzeni. Binary search yöntemiyle hangi commit'in bug oluşturduğunu tespit edin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["bisect", "bug", "arama", "yapay zeka", "pratik", "i̇leri"], "badge1": "İleri", "content": "## git bisect\n```bash\ngit bisect start\ngit bisect bad          # Şu anki commit bozuk\ngit bisect good v1.0.0  # Bu tag iyiydi\n\n# Git otomatik olarak commit checkout yapar\n# Her adımda test et:\nif ./test.sh; then\n    git bisect good\nelse\n    git bisect bad\nfi\n\n# Otomasyon\ngit bisect run ./test.sh\n\n# Sonuç\n# 'abc123 is the first bad commit'\n\n# Bitir\ngit bisect reset\n```\n\n## Uygulama Senaryosu (Pratik)\n\nBu düzeni, yapay zeka alanında git bisect ile problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** git bisect ile akışını pratik yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** yapay zeka katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 220, "no": "220", "cat": "Git Araçları", "name": "Kullanıcı-Merkezli git log Filtreleme Yönergesi", "desc": "akış bağlamında git log Filtreleme için kullanıcı-merkezli bir yönergesi. Tarih, yazar, mesaj ve dosya bazlı git log sorgulama ve görselleştirme. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["log", "history", "filtre", "akış", "kullanıcı-merkezli", "pro"], "badge1": "Pro", "content": "## git log Şablonları\n```bash\n# Özet görünüm\ngit log --oneline --graph --decorate --all\n\n# Yazar filtresi\ngit log --author='Ahmet' --since='2 weeks ago'\n\n# Mesaj araması\ngit log --grep='fix' --all\n\n# Dosya geçmişi\ngit log --follow -p -- src/auth.py\n\n# Belirli tarih aralığı\ngit log --after='2026-01-01' --before='2026-06-01'\n\n# Özel format\ngit log --format='%h %an %s' --no-merges -20\n\n# Diff ile\ngit log -p --stat HEAD~5..HEAD\n```\n\n## Genişletilmiş Notlar (Kullanıcı-Merkezli)\n\n- **Hedef Kitle:** Pro seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde git log Filtreleme senaryoları\n- **Avantajları:** Bu yönergesi sayesinde git log Filtreleme işlemleri daha kullanıcı-merkezli hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde git log Filtreleme ihtiyacını analiz edin.\n  2. Bu yönergesi'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** log, history, filtre\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 221, "no": "221", "cat": "Branch Stratejileri", "name": "Resilient Trunk-Based Development Anlaşması", "desc": "CI/CD bağlamında Trunk-Based Development için resilient bir anlaşması. Tek main branch üzerinde feature flag kullanarak sürekli entegrasyon iş akışı. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["trunk", "feature flag", "CI", "CI/CD", "resilient", "i̇leri"], "badge1": "İleri", "content": "## Trunk-Based Development\n1. Herkes doğrudan `main`'e veya max. 1-2 günlük kısa branch'e iter.\n2. Feature flag ile tamamlanmamış kod main'de gizlenir.\n3. Her push CI tetikler → tüm testler geçmeli.\n4. Release: tag + feature flag açma.\n\nFaydası: Uzun yaşayan branch merge cehennemi yok.\nGereksiz: Code review gecikme riski artar → pair programming önerilir.\n\n## Uygulama Senaryosu (Resilient)\n\nBu an  "ölçeklenebilir", "uzman"], "badge1": "Uzman", "content": "## PR Review Checklist\n**Kod kalitesi:**\n- [ ] İş mantığı doğru mu?\n- [ ] Edge case'ler ele alınmış mı?\n- [ ] Test kapsamı yeterli mi?\n- [ ] Performans etkisi var mı?\n\n**Güvenlik:**\n- [ ] SQL injection, XSS riski var mı?\n- [ ] Gizli bilgi commit'te mi?\n- [ ] Yetkilendirme kontrolü var mı?\n\n**Okunabilirlik:**\n- [ ] İsimler anlamlı mı?\n- [ ] Karmaşık mantık açıklanmış mı?\n- [ ] PR açıklaması yeterli mi?\n\n## Uygulama Senaryosu (Ölçeklenebilir)\n\nBu rehberi, logging alanında PR Review Checklist problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** PR Review Checklist akışını ölçeklenebilir yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** logging katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 278, "no": "278", "cat": "Takım İş Akışı", "name": "Idempotent Commit Mesajı Standartları Modeli", "desc": "güvenlik bağlamında Commit Mesajı Standartları için idempotent bir modeli. Conventional Commits formatı ile okunabilir ve araçlarla işlenebilir commit mesajları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["commit", "conventional", "mesaj", "güvenlik", "idempotent", "uzman"], "badge1": "Uzman", "content": "## Conventional Commits\n```\n<type>(<scope>): <subject>\n\n[body]\n\n[footer]\n```\nType'lar:\n- `feat`: Yeni özellik\n- `fix`: Bug düzeltme\n- `docs`: Dokümantasyon\n- `refactor`: Yeniden yapılandırma\n- `test`: Test ekleme\n- `chore`: Bakım\n- `perf`: Performans\n\nÖrnekler:\n```\nfeat(auth): JWT refresh token eklendi\nfix(api): null pointer hatası düzeltildi\nfeat!: API v2'ye geçiş (breaking change)\n```\n\n## Genişletilmiş Notlar (Idempotent)\n\n- **Hedef Kitle:** Uzman seviye güvenlik kullanıcıları\n- **Uygulama Alanı:** güvenlik ekosisteminde Commit Mesajı Standartları senaryoları\n- **Avantajları:** Bu modeli sayesinde Commit Mesajı Standartları işlemleri daha idempotent hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut güvenlik mimarinizde Commit Mesajı Standartları ihtiyacını analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** commit, conventional, mesaj\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 279, "no": "279", "cat": "Git Araçları", "name": "Kullanıcı-Merkezli git bisect ile Protokolü", "desc": "test bağlamında git bisect ile için kullanıcı-merkezli bir protokolü. Binary search yöntemiyle hangi commit'in bug oluşturduğunu tespit edin. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["bisect", "bug", "arama", "test", "kullanıcı-merkezli", "i̇leri"], "badge1": "İleri", "content": "## git bisect\n```bash\ngit bisect start\ngit bisect bad          # Şu anki commit bozuk\ngit bisect good v1.0.0  # Bu tag iyiydi\n\n# Git otomatik olarak commit checkout yapar\n# Her adımda test et:\nif ./test.sh; then\n    git bisect good\nelse\n    git bisect bad\nfi\n\n# Otomasyon\ngit bisect run ./test.sh\n\n# Sonuç\n# 'abc123 is the first bad commit'\n\n# Bitir\ngit bisect reset\n```\n\n## Uygulama Senaryosu (Kullanıcı-Merkezli)\n\nBu protokolü, test alanında git bis : {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 282, "no": "282", "cat": "Temel Git", "name": "Stream Tabanlı git reflog ile Kuralı", "desc": "entegrasyon bağlamında git reflog ile için stream tabanlı bir kuralı. Yanlışlıkla silinen commit veya branch'i git reflog ile geri getirin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["reflog", "kurtarma", "kayıp", "entegrasyon", "stream tabanlı", "orta"], "badge1": "Orta", "content": "## git reflog ile Kurtarma\n```bash\n# Tüm HEAD hareketleri\ngit reflog\n# HEAD@{0}: reset: moving to HEAD~3\n# HEAD@{1}: commit: önemli değişiklik\n\n# Kayıp commit'i geri al\ngit checkout HEAD@{1}\n# veya\ngit cherry-pick HEAD@{1}\n\n# Silinen branch geri al\ngit reflog --all | grep 'feature/deleted'\n# feature/deleted: HEAD@{5} commit abc123\ngit checkout -b feature/deleted abc123\n\n# Zamana göre arama\ngit reflog 'HEAD@{2 days ago}'\n```\n\n## Genişletilmiş Notlar (Stream Tabanlı)\n\n- **Hedef Kitle:** Orta seviye entegrasyon kullanıcıları\n- **Uygulama Alanı:** entegrasyon ekosisteminde git reflog ile senaryoları\n- **Avantajları:** Bu kuralı sayesinde git reflog ile işlemleri daha stream tabanlı hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut entegrasyon mimarinizde git reflog ile ihtiyacını analiz edin.\n  2. Bu kuralı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** reflog, kurtarma, kayıp\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 283, "no": "283", "cat": "Git Hooks", "name": "Senkron Commit-msg Hook Şablonu İskeleti", "desc": "monitoring bağ ı raporlanmıştır.\n- **İlgili Konular:** PR, review, checklist\n", "source": {"generated": true, "variant_of": 7, "wave": "v3-400"}}, {"id": 308, "no": "308", "cat": "Takım İş Akışı", "name": "AI-Augmented Commit Mesajı Standartları Tasarımı", "desc": "caching bağlamında Commit Mesajı Standartları için ai-augmented bir tasarımı. Conventional Commits formatı ile okunabilir ve araçlarla işlenebilir commit mesajları. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["commit", "conventional", "mesaj", "caching", "ai-augmented", "başlangıç"], "badge1": "Başlangıç", "content": "## Conventional Commits\n```\n<type>(<scope>): <subject>\n\n[body]\n\n[footer]\n```\nType'lar:\n- `feat`: Yeni özellik\n- `fix`: Bug düzeltme\n- `docs`: Dokümantasyon\n- `refactor`: Yeniden yapılandırma\n- `test`: Test ekleme\n- `chore`: Bakım\n- `perf`: Performans\n\nÖrnekler:\n```\nfeat(auth): JWT refresh token eklendi\nfix(api): null pointer hatası düzeltildi\nfeat!: API v2'ye geçiş (breaking change)\n```\n\n## Genişletilmiş Notlar (AI-Augmented)\n\n- **Hedef Kitle:** Başlangıç seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde Commit Mesajı Standartları senaryoları\n- **Avantajları:** Bu tasarımı sayesinde Commit Mesajı Standartları işlemleri daha ai-augmented hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde Commit Mesajı Standartları ihtiyacını analiz edin.\n  2. Bu tasarımı'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** commit, conventional, mesaj\n", "source": {"generated": true, "variant_of": 8, "wave": "v3-400"}}, {"id": 309, "no": "309", "cat": "Git Araçları", "name": "Atomic git bisect ile Çekirdeği", "desc": "caching bağlamında git bisect ile için atomic bir çekirdeği. Binary search yöntemiyle hangi commit'in bug oluşturduğunu tespit edin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["bisect", "bug", "arama", "caching", "atomic", "pro"], "badge1": "Pro", "content": "## git bisect\n```bash\ngit bisect start\ngit bisect bad          # Şu anki commit bozuk\ngit bisect good v1.0.0  # Bu tag iyiydi\n\n# Git otomatik olarak commit checkout yapar\n# Her adımda test et:\nif ./test.sh; then\n    git bisect good\nelse\n    git bisect bad\nfi\n\n# Otomasyon\ngit bisect run ./test.sh\n\n# Sonuç\n# 'abc123 is the first bad commit'\n\n# Bitir\ngit bisect reset\n```\n\n## Genişletilmiş Notlar (Atomic)\n\n- **Hedef Kitle:** Pro seviye caching kullanıcıları\n- **Uygulama Alanı:** caching ekosisteminde git bisect ile senaryoları\n- **Avantajları:** Bu çekirdeği sayesinde git bisect ile işlemleri daha atomic hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut caching mimarinizde git bisect ile ihtiyacını analiz edin.\n  2. Bu çekirdeği'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** bisect, bug, arama\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 310, "no": "310", "cat": "Git Araçları", "name": "Senkron git log Filtreleme Modeli", "desc": "test bağlamında git log Filtreleme için senkron bir modeli. Tarih, yazar, mesaj ve dosya bazlı git log sorgulama ve görselleştirme. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["log", "history", "filtre", "test", "senkron", "pro"], "badge1": "Pro", "content": "## git log Şablonları\n```bash\n# Özet görünüm\ngit log --oneline --graph --decorate --all\n\n# Yazar filtresi\ngit log --author='Ahmet' --since='2 weeks ago'\n\n# Mesaj araması\ngit log --grep='fix' --all\n\n# Dosya geçmişi\ngit log --follow -p -- src/auth.py\n\n# Belirli tarih aralığı\ngit log --after='2026-01-01' --before='2026-06-01'\n\n# Özel format\ngit log --format='%h %an %s' --no-merges -20\n\n# Diff ile\ngit log -p --stat HEAD~5..HEAD\n```\n\n## Genişletilmiş Notlar (Senkron)\n\n- **Hedef Kitle:** Pro seviye test kullanıcıları\n- **Uygulama Alanı:** test ekosisteminde git log Filtreleme senaryoları\n- **Avantajları:** Bu modeli sayesinde git log Filtreleme işlemleri daha senkron hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut test mimarinizde git log Filtreleme ihtiyacını analiz edin.\n  2. Bu modeli'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** log, history, filtre\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 311, "no": "311", "cat": "Branch Stratejileri", "name": "Mobile-First Trunk-Based Development Düzeni", "desc": "mühendislik bağlamında Trunk-Based Development için mobile-first bir düzeni. Tek main branch üzerinde feature flag kullanarak sürekli entegrasyon iş akışı. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["trunk", "feature flag", "CI", "mühendislik", "mobile-first", "pro"], "badge1": "Pro", "content": "## Trunk-Based Development\n1. Herkes doğrudan `main`'e veya max. 1-2 günlük kısa branch'e iter.\n2. Feature flag ile tamamlanmamış kod main'de gizlenir.\n3. Her push CI tetikler → tüm testler geçmeli.\n4. Release: tag + feature flag açma.\n\nFaydası: Uzun yaşayan branch merge cehennemi yok.\nGereksiz: Code review gecikme riski artar → pair programming önerilir.\n\n## Uygulama Senaryosu (Mobile-First)\n\nBu düzeni, mühendislik alanında Trunk-Based Development problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Trunk-Based Development akışını mobile-first yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mühendislik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 312, "no": "312", "cat": "Temel Git", "name": "Hibrit-Cloud git reflog ile Kuralı", "desc": "test bağlamında git reflog ile için hibrit-cloud bir kuralı. Yanlışlıkla silinen commit veya branch'i git reflog ile geri getirin. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["reflog", "kurtarma", "kayıp", "test", "hibrit-cloud", "başlangıç"], "badge1": "Başlangıç", "content": "## git reflog ile Kurtarma\n```bash\n# Tüm HEAD hareketleri\ngit reflog\n# HEAD@{0}: reset: moving to HEAD~3\n# HEAD@{1}: commit: önemli değişiklik\n\n# Kayıp commit'i geri al\ngit checkout HEAD@{1}\n# veya\ngit cherry-pick HEAD@{1}\n\n# Silinen branch geri al\ngit reflog --all | grep 'feature/deleted'\n# feature/deleted: HEAD@{5} commit abc123\ngit checkout -b feature/deleted abc123\n\n# Zamana göre arama\ngit reflog 'HEAD@{2 days ago}'\n```\n\n## Uygulama Senaryosu (Hibrit-Cloud)\n\nBu kuralı, test ı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** caching katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 14, "wave": "v3-400"}}, {"id": 315, "no": "315", "cat": "Merge & Rebase", "name": "Reaktif Rebase vs Merge Yapısı", "desc": "API bağlamında Rebase vs Merge için reaktif bir yapısı. Rebase ve merge arasındaki farklar ve hangi senaryoda hangisini kullanmalısınız. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["rebase", "merge", "geçmiş", "API", "reaktif", "uzman"], "badge1": "Uzman", "content": "## Rebase vs Merge\n| | Rebase | Merge |\n|--|--------|-------|\n| Geçmiş | Doğrusal, temiz | Gerçek, dal yapısı |\n| Conflict | Her commit için | Bir kez |\n| Public branch | Tehlikeli | Güvenli |\n| Feature → main | Rebase sonra fast-forward | Merge commit |\n\nAltın kural: Public/shared branch'leri rebase etme → başkalarının geçmişini bozar.\nİş akışı: `git pull --rebase` ile yerel commit'leri saat üstüne taşı.\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Uzman seviye API kullanıcıları\n- **Uygulama Alanı:** API ekosisteminde Rebase vs Merge senaryoları\n- **Avantajları:** Bu yapısı sayesinde Rebase vs Merge işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut API mimarinizde Rebase vs Merge ihtiyacını analiz edin.\n  2. Bu yapısı'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** rebase, merge, geçmiş\n", "source": {"generated": true, "variant_of": 15, "wave": "v3-400"}}, {"id": 316, "no": "316", "cat": "Temel Git", "name": "Yalın Pratik Yazılım Pattern'i Yapısı", 5-35 iyileşme.\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 341, "no": "341", "cat": "Branch Stratejileri", "name": "Self-Healing Trunk-Based Development Rehberi", "desc": "akış bağlamında Trunk-Based Development için self-healing bir rehberi. Tek main branch üzerinde feature flag kullanarak sürekli entegrasyon iş akışı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["trunk", "feature flag", "CI", "akış", "self-healing", "uzman"], "badge1": "Uzman", "content": "## Trunk-Based Development\n1. Herkes doğrudan `main`'e veya max. 1-2 günlük kısa branch'e iter.\n2. Feature flag ile tamamlanmamış kod main'de gizlenir.\n3. Her push CI tetikler → tüm testler geçmeli.\n4. Release: tag + feature flag açma.\n\nFaydası: Uzun yaşayan branch merge cehennemi yok.\nGereksiz: Code review gecikme riski artar → pair programming önerilir.\n\n## Genişletilmiş Notlar (Self-Healing)\n\n- **Hedef Kitle:** Uzman seviye akış kullanıcıları\n- **Uygulama Alanı:** akış ekosisteminde Trunk-Based Development senaryoları\n- **Avantajları:** Bu rehberi sayesinde Trunk-Based Development işlemleri daha self-healing hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut akış mimarinizde Trunk-Based Development ihtiyacını analiz edin.\n  2. Bu rehberi'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** trunk, feature flag, CI\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 342, "no": "342", "cat": "Temel Git", "name": "Edge-Optimize git reflog ile Algoritması", "desc": "entegrasyon bağlamında git reflog ile için edge-optimize bir algoritması. Yanlışlıkla silinen commit veya branch'i git reflog ile geri getirin. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["reflog", "kurtarma", "kayıp", "entegrasyon", "edge-optimize", "orta"], "badge1": "Orta", "content": "## git reflog ile Kurtarma\n```bash\n# Tüm HEAD hareketleri\ngit reflog\n# HEAD@{0}: reset: moving to HEAD~3\n# HEAD@{1}: commit: önemli değişiklik\n\n# Kayıp commit'i geri al\ngit checkout HEAD@{1}\n# veya\ngit cherry-pick HEAD@{1}\n\n# Silinen branch geri al\ngit reflog --all | grep 'feature/deleted'\n# feature/deleted: HEAD@{5} commit abc123\ngit checkout -b feature/deleted abc123\n\n# Zamana göre arama\ngit reflog 'HEAD@{2 days ago}'\n```\n\n## Uygulama Senaryosu (Edge-Optimize)\n\nBu algoritması, entegrasyon alanında git reflog ile problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** git reflog ile akışını edge-optimize yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** orta seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** entegrasyon katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 343, "no": "343", "cat": "Git Hooks", "name": "Self-Healing Commit-msg Hook Şablonu Mimari Yaklaşımı", "desc": "yapay zeka bağlamında Commit-msg Hook Şablonu için self-healing bir mimari yaklaşımı. Commit mesajını Conventional Commits formatına uyan hook şablonu. Bu varyant orta seviye kullanıcılar için optimize edilmiştir.", "tags": ["hook", "commit-msg", "format", "yapay zeka", "self-healing", "orta"], "badge1": "Orta", "content": "## commit-msg Hook\n```bash\n#!/bin/bash\n# .git/hooks/commit-msg\nMSG_FILE=$1\nMSG=$(cat \"$MSG_FILE\")\n\n# Conventional Commits regex\nPATTERN='^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\\(.+\\))?(!)?: .{1,72}'\n\nif ! echo \"$MSG\" | grep -qE \"$PATTERN\"; then\n    echo \"HATA: Commit mesajı format dışı!\"\n    echo \"Beklenen: type(scope): mesaj\"\n    echo \"Örnek: feat(auth): JWT eklendi\"\n    exit 1\nfi\n\n# WIP commit'leri engelle (isteğe bağlı)\nif echo \"$MSG\" | grep -qi '^wip'; then\n    echo \"HATA: WIP commit'ler ana branch'e izin verilmez.\"\n    exit 1\nfi\n```\n\n## Genişletilmiş Notlar (Self-Healing)\n\n- **Hedef Kitle:** Orta seviye yapay zeka kullanıcıları\n- **Uygulama Alanı:** yapay zeka ekosisteminde Commit-msg Hook Şablonu senaryoları\n- **Avantajları:** Bu mimari yaklaşımı sayesinde Commit-msg Hook Şablonu işlemleri daha self-healing hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut yapay zeka mimarinizde Commit-msg Hook Şablonu ihtiyacını analiz edin.\n  2. Bu mimari yaklaşımı'i pilot bir modülde test edin.\n  3. Metrikleri (orta seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hook, commit-msg, format\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 344, "no": "344", "cat": "Git Araçları", "name": "Kanıt-Tabanlı GitHub CLI (gh) Pratiği", "desc": "logging bağlamında GitHub CLI (gh) için kanıt-tabanlı bir pratiği. gh CLI ile PR oluşturma, review ve issue yönetimi komutları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["gh", "GitHub", "CLI", "logging", "kanıt-tabanlı", "uzman"], "badge1": "Uzman", "content": "## GitHub CLI\n```bash\n# PR oluştur\ngh pr create -- erated": true, "variant_of": 180, "wave": "v3-400"}}, {"id": 361, "no": "361", "cat": "Temel Git", "name": "Idempotent İnteraktif Rebase Şablonu Kalıbı", "desc": "dağıtım bağlamında İnteraktif Rebase Şablonu için idempotent bir kalıbı. Commit geçmişini düzenlemek için git rebase -i kullanım rehberi. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["rebase", "commit", "düzenleme", "dağıtım", "idempotent", "i̇leri"], "badge1": "İleri", "content": "## İnteraktif Rebase\n```bash\n# Son 5 commit'i düzenle\ngit rebase -i HEAD~5\n\n# Komutlar:\n# pick   → olduğu gibi bırak\n# reword → mesajı değiştir\n# squash → öncekiyle birleştir\n# fixup  → squash ama mesajı at\n# drop   → commit'i sil\n# edit   → durakla, değiştir\n\n# Örnek: 3 commit'i 1'e sıkıştır\n# pick abc123 ilk commit\n# squash def456 ikinci\n# squash ghi789 üçüncü\n\n# Devam\ngit rebase --continue\ngit rebase --abort  # İptal\n```\n\n## Uygulama Senaryosu (Idempotent)\n\nBu kalıbı, dağıtım alanında İnteraktif Rebase Şablonu problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** İnteraktif Rebase Şablonu akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** i̇leri seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** dağıtım katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-400"}}, {"id": 362, "no": "362", "cat": "Temel Git", "name": "Bağlamsal Git Stash Gelişmiş Yönergesi", "desc": "mühendislik bağlamında Git Stash Gelişmiş için bağlamsal bir yönergesi. Çoklu stash yönetimi, isimli stash ve kısmi stash işlemleri. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.  feature/user-auth develop\n# ... geliştir ...\ngit checkout develop\ngit merge --no-ff feature/user-auth\ngit branch -d feature/user-auth\n\n# Release\ngit checkout -b release/1.2.0 develop\n# Versiyon bump, son düzeltmeler\ngit checkout main && git merge --no-ff release/1.2.0\ngit tag -a v1.2.0 -m 'Sürüm 1.2.0'\ngit checkout develop && git merge --no-ff release/1.2.0\ngit branch -d release/1.2.0\n\n# Hotfix\ngit checkout -b hotfix/critical-fix main\ngit checkout main && git merge --no-ff hotfix/critical-fix\ngit checkout develop && git merge --no-ff hotfix/critical-fix\n```\n\n## Uygulama Senaryosu (Idempotent)\n\nBu protokolü, monitoring alanında Git Flow Komutları problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Git Flow Komutları akışını idempotent yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** pro seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** monitoring katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 3, "wave": "v3-400"}}, {"id": 364, "no": "364", "cat": "Git Hooks", "name": "Hibrit Pre-commit Hook Şablonu İskeleti", "desc": "akış bağlamında Pre-commit Hook Şablonu için hibrit bir i̇skeleti. Commit öncesi lint, test ve format kontrolü yapan pre-commit hook. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["hook", "pre-commit", "lint", "akış", "hibrit", "başlangıç"], "badge1": "Başlangıç", "content": "## Pre-commit Hook\n```bash\n#!/bin/bash\n# .git/hooks/pre-commit\nset -e\n\necho 'Pre-commit kontrolleri...'\n\n# Değişen Python dosyalarını lint\nCHANGED_PY=$(git diff --cached --name-only --diff-filter=ACM | grep '\\.py$' || true)\n kullanıcılar için optimize edilmiştir.", "tags": ["log", "history", "filtre", "monitoring", "reaktif", "başlangıç"], "badge1": "Başlangıç", "content": "## git log Şablonları\n```bash\n# Özet görünüm\ngit log --oneline --graph --decorate --all\n\n# Yazar filtresi\ngit log --author='Ahmet' --since='2 weeks ago'\n\n# Mesaj araması\ngit log --grep='fix' --all\n\n# Dosya geçmişi\ngit log --follow -p -- src/auth.py\n\n# Belirli tarih aralığı\ngit log --after='2026-01-01' --before='2026-06-01'\n\n# Özel format\ngit log --format='%h %an %s' --no-merges -20\n\n# Diff ile\ngit log -p --stat HEAD~5..HEAD\n```\n\n## Genişletilmiş Notlar (Reaktif)\n\n- **Hedef Kitle:** Başlangıç seviye monitoring kullanıcıları\n- **Uygulama Alanı:** monitoring ekosisteminde git log Filtreleme senaryoları\n- **Avantajları:** Bu algoritması sayesinde git log Filtreleme işlemleri daha reaktif hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut monitoring mimarinizde git log Filtreleme ihtiyacını analiz edin.\n  2. Bu algoritması'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** log, history, filtre\n", "source": {"generated": true, "variant_of": 10, "wave": "v3-400"}}, {"id": 371, "no": "371", "cat": "Branch Stratejileri", "name": "Şeffaf Trunk-Based Development Akışı", "desc": "gözlemlenebilirlik bağlamında Trunk-Based Development için şeffaf bir akışı. Tek main branch üzerinde feature flag kullanarak sürekli entegrasyon iş akışı. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["trunk", "feature flag", "CI", "gözlemlenebilirlik", "şeffaf", "uzman"], "badge1": "Uzman", "content": "## Trunk-Based Development\n1. Herkes doğrudan `main`'e veya max. 1-2 günlük kısa branch'e iter.\n2. Feature flag ile tamamlanmamış kod main'de gizlenir.\n3. Her push CI tetikler → tüm testler geçmeli.\n4. Release: tag + feature flag açma.\n\nFaydası: Uzun yaşayan branch merge cehennemi yok.\nGereksiz: Code review gecikme riski artar → pair programming önerilir.\n\n## Uygulama Senaryosu (Şeffaf)\n\nBu akışı, gözlemlenebilirlik alanında Trunk-Based Development problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** Trunk-Based Development akışını şeffaf yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** gözlemlenebilirlik katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 11, "wave": "v3-400"}}, {"id": 372, "no": "372", "cat": "Temel Git", "name": "Modüler git reflog ile Protokolü", "desc": "dağıtım bağlamında git reflog ile için modüler bir protokolü. Yanlışlıkla silinen commit veya branch'i git reflog ile geri getirin. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["reflog", "kurtarma", "kayıp", "dağıtım", "modüler", "pro"], "badge1": "Pro", "content": "## git reflog ile Kurtarma\n```bash\n# Tüm HEAD hareketleri\ngit reflog\n# HEAD@{0}: reset: moving to HEAD~3\n# HEAD@{1}: commit: önemli değişiklik\n\n# Kayıp commit'i geri al\ngit checkout HEAD@{1}\n# veya\ngit cherry-pick HEAD@{1}\n\n# Silinen branch geri al\ngit reflog --all | grep 'feature/deleted'\n# feature/deleted: HEAD@{5} commit abc123\ngit checkout -b feature/deleted abc123\n\n# Zamana göre arama\ngit reflog 'HEAD@{2 days ago}'\n```\n\n## Genişletilmiş Notlar (Modüler)\n\n- **Hedef Kitle:** Pro seviye dağıtım kullanıcıları\n- **Uygulama Alanı:** dağıtım ekosisteminde git reflog ile senaryoları\n- **Avantajları:** Bu protokolü sayesinde git reflog ile işlemleri daha modüler hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut dağıtım mimarinizde git reflog ile ihtiyacını analiz edin.\n  2. Bu protokolü'i pilot bir modülde test edin.\n  3. Metrikleri (pro seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** reflog, kurtarma, kayıp\n", "source": {"generated": true, "variant_of": 12, "wave": "v3-400"}}, {"id": 373, "no": "373", "cat": "Git Hooks", "name": "Bağlamsal Commit-msg Hook Şablonu İskeleti", "desc": "CI/CD bağlamında Commit-msg Hook Şablonu için bağlamsal bir i̇skeleti. Commit mesajını Conventional Commits formatına uyan hook şablonu. Bu varyant başlangıç seviye kullanıcılar için optimize edilmiştir.", "tags": ["hook", "commit-msg", "format", "CI/CD", "bağlamsal", "başlangıç"], "badge1": "Başlangıç", "content": "## commit-msg Hook\n```bash\n#!/bin/bash\n# .git/hooks/commit-msg\nMSG_FILE=$1\nMSG=$(cat \"$MSG_FILE\")\n\n# Conventional Commits regex\nPATTERN='^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\\(.+\\))?(!)?: .{1,72}'\n\nif ! echo \"$MSG\" | grep -qE \"$PATTERN\"; then\n    echo \"HATA: Commit mesajı format dışı!\"\n    echo \"Beklenen: type(scope): mesaj\"\n    echo \"Örnek: feat(auth): JWT eklendi\"\n    exit 1\nfi\n\n# WIP commit'leri engelle (isteğe bağlı)\nif echo \"$MSG\" | grep -qi '^wip'; then\n    echo \"HATA: WIP commit'ler ana branch'e izin verilmez.\"\n    exit 1\nfi\n```\n\n## Genişletilmiş Notlar (Bağlamsal)\n\n- **Hedef Kitle:** Başlangıç seviye CI/CD kullanıcıları\n- **Uygulama Alanı:** CI/CD ekosisteminde Commit-msg Hook Şablonu senaryoları\n- **Avantajları:** Bu i̇skeleti sayesinde Commit-msg Hook Şablonu işlemleri daha bağlamsal hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut CI/CD mimarinizde Commit-msg Hook Şablonu ihtiyacını analiz edin.\n  2. Bu i̇skeleti'i pilot bir modülde test edin.\n  3. Metrikleri (başlangıç seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** hook, commit-msg, format\n", "source": {"generated": true, "variant_of": 13, "wave": "v3-400"}}, {"id": 374, "no": "374", "cat": "Git Araçları", "name": "Yalın GitHub CLI (gh) Düzeneği", "desc": "mimari bağlamında GitHub CLI (gh) için yalın bir düzeneği. gh CLI ile PR oluşturma, review ve issue yönetimi komutları. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["gh", "GitHub", "CLI", "mimari", "yalın", "uzman"], "badge1": "Uzman", "content": "## GitHub CLI\n```bash\n# PR oluştur\ngh pr create --title 'feat: yeni özellik' --body 'Açıklama' --base main\n\n# PR listele ve incele\ngh pr list\ngh pr view 123\ngh pr checkout 123\n\n# PR birleştir\ngh pr merge 123 --squash\n\n# Issue\ngh issue create --title 'Bug: ...' --label 'bug,critical'\ngh issue list --assignee @me\ngh issue close 456\n\n# Workflow tetikle\ngh workflow run deploy.yml -f env=production\n\n# Repo klonla\ngh repo clone org/repo\n```\n\n## Uygulama Senaryosu (Yalın)\n\nBu düzeneği, mimari alanında GitHub CLI (gh) problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** GitHub CLI (gh) akışını yalı t uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["bisect", "bug", "arama", "mikroservis", "quantum-hazır", "uzman"], "badge1": "Uzman", "content": "## git bisect\n```bash\ngit bisect start\ngit bisect bad          # Şu anki commit bozuk\ngit bisect good v1.0.0  # Bu tag iyiydi\n\n# Git otomatik olarak commit checkout yapar\n# Her adımda test et:\nif ./test.sh; then\n    git bisect good\nelse\n    git bisect bad\nfi\n\n# Otomasyon\ngit bisect run ./test.sh\n\n# Sonuç\n# 'abc123 is the first bad commit'\n\n# Bitir\ngit bisect reset\n```\n\n## Uygulama Senaryosu (Quantum-Hazır)\n\nBu akışı, mikroservis alanında git bisect ile problemini şu şekilde çözer:\n\n1. **Tanılama:** Mevcut sistemde darboğazı belirleyin.\n2. **Modelleme:** git bisect ile akışını quantum-hazır yaklaşımla modelleyin.\n3. **Prototip:** Küçük ölçekli bir prototip ile fizibilite testi yapın.\n4. **Ölçüm:** uzman seviyede SLI/SLO tanımlayın.\n5. **Yaygınlaştırma:** Aşamalı rollout planı uygulayın.\n\n### Kontrol Listesi\n- [ ] Bağımlılık haritası çıkarıldı\n- [ ] Geri alma planı hazırlandı\n- [ ] İzleme dashboard'u kuruldu\n- [ ] Stakeholder onayı alındı\n- [ ] Eğitim materyalleri hazırlandı\n\n**Tahmini Etki:** mikroservis katmanında %15-35 iyileşme.\n", "source": {"generated": true, "variant_of": 9, "wave": "v3-400"}}, {"id": 400, "no": "400", "cat": "Git Araçları", "name": "Federe git log Filtreleme Rehberi", "desc": "yapay zeka bağlamında git log Filtreleme için federe bir rehberi. Tarih, yazar, mesaj ve dosya bazlı git log sorgulama ve görselleştirme. Bu varyant pro seviye kullanıcılar için optimize edilmiştir.", "tags": ["log", "history", "filtre", "yapay zeka", "federe", "pro"], "badge1": "Pro", "content": "## git log Şablonları\n```bash\n# Özet görünüm\ngit log --oneline --graph --decorate --all\n\n# Yazar filtresi\ngit log --author='Ahmet' --since='2 weeks ago'\n\n# Mesaj araması\ngit log --grep='fix' --all\n\n# Dosya geçmişi\ngit log --follow -p -- src/auth.py\n\n# Belirli ta ma\n- Kullanıcının hatasını gizleme — nazikçe düzelt\n\n### Bağlam Sınırı\nEğer soru Git kapsamı dışındaysa, kullanıcıyı yönlendir: \"Bu soru benim uzmanlık alanım dışında — şu kaynağa bakmanı öneririm: ...\"\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 402, "no": "402", "cat": "AI Prompt Kütüphanesi", "name": "Few-Shot Şablon — Git", "desc": "Git alanı için orijinal few-shot şablon promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "few-shot", "git", "orijinal"], "badge1": "Orijinal AI", "content": "## FEW-SHOT ŞABLONU — Git\n\nAşağıda Git alanından üç örnek veriliyor. Aynı tarzda dördüncüyü tamamla.\n\n### Örnek 1\n**Girdi:** Git workflows, branching strategies konusunda klasik bir senaryo.\n**İstenen:** Profesyonel bir analiz.\n**Çıktı:** [Konu] için 3 ana boyut tespit edildi: A, B, C. A en kritik çünkü ölçeklenebilirliği doğrudan etkiler. B orta öncelikli. C uzun vadeli.\n\n### Örnek 2\n**Girdi:** Git workflows, branching strategies alanında acil bir karar gerekiyor.\n**İstenen:** Hızlı öneri + risk değerlendirmesi.\n**Çıktı:** Önerim: X yaklaşımı. Risk: orta. Mitigasyon: aşamalı rollout + geri alma planı.\n\n### Örnek 3\n**Girdi:** Git workflows, branching strategies için karşılaştırmalı analiz isteniyor.\n**İstenen:** Yan yana tablo.\n**Çıktı:** | Kriter | Yaklaşım A | Yaklaşım B |\\n|---|---|---|\\n| Maliyet | Düşük | Yüksek |...\n\n### Örnek 4 (TAMAMLA)\n**Girdi:** [Kullanıcı buraya kendi sorusunu yazacak]\n**İstenen:** [Çıktı türü]\n**Çıktı:** ...\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 403, "no": "403", "cat": "AI Prompt Kütüphanesi", "name": "Adım-Adım Talimat — Git", "desc": "Git alanı için orijinal adım-adım talimat promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "step-by-step", "git", "orijinal"], "badge1": "Orijinal AI", "content": "## ADIM-ADIM TALİMAT — Git\n\nAşağıdaki adımları **sırasıyla** uygula. Bir adımı atlayamazsın.\n\n### Adım 1 — Anlama\nKullanıcının Git ile ilgili sorusunu **kendi cümlelerinle özetle**. Belirsizlikler varsa **tek bir** netleştirme sorusu sor; sonra dur ve bekle.\n\n### Adım 2 — Bağlam Toplama\nŞu bilgileri kontrol et: (a) önceden verilmiş veri var mı? (b) Git workflows, branching strategies ile çelişen kısıt? (c) zaman/bütçe sınırı? Eksikse listele.\n\n### Adım 3 — Plan Üretme\n3-7 maddelik bir eylem planı çıkar. Her madde **fiil ile başlasın**.\n\n### Adım 4 — Uygulama\nPlanı uygulayan **somut çıktıyı** üret (kod, metin, tablo, vb.).\n\n### Adım 5 — Doğrulama\nÇıktıyı kendi başına kontrol et: (1) Adım 1'deki soruya tam cevap mı? (2) Eksik veya yanlış kısım var mı? (3) Geliştirilebilir mi?\n\n### Adım 6 — Teslim\nFinal çıktıyı temiz biçimde sun + kısa bir **\"sonraki adım önerisi\"** ekle.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 404, "no": "404", "cat": "AI Prompt Kütüphanesi", "name": "Rol/Persona Tanımı — Git", "desc": "Git alanı için orijinal rol/persona tanımı promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "role-persona", "git", "orijinal"], "badge1": "Orijinal AI", "content": "## ROL/PERSONA — Git Mentörü\n\n**Kimsin:** 15+ yıl Git deneyimi olan, sabırlı ve net bir mentör.\n\n**Ses tonun:**\n- Profesyonel ama sıcak\n- Jargon yerine somut örnekler\n- Kullanıcıyı **özne** olarak konumlandır (\"sen yapabilirsin\")\n- Asla küçümseyici olma\n\n**Uzmanlık alanın:** Git workflows, branching strategies\n\n**Bilmediğin durumda davranış:** Açıkça \"bu spesifik konuda güncel veriye ihtiyacım var\" de. Yalan söyleme veya yaklaşık tahminle kapatma.\n\n**Sınırların:**\n- Tıbbi, hukuki, finansal **kesin tavsiye verme** — disiplinin sınırını anımsat\n- Üretilmiş kaynak verme\n- Kullanıcının verisini başka amaçla kullanma\n\n**Başlangıç davranışın:** Kullanıcı ilk mesajı attığında, kısa bir tanışma cümlesi + \"bugün Git ile ilgili sana nasıl yardım edebilirim?\" diye sor.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 405, "no": "405", "cat": "AI Prompt Kütüphanesi", "name": "Çıktı Şeması (JSON) — Git", "desc": "Git alanı için orijinal çıktı şeması (json) promptu. Üretken AI sistemlerinde doğrudan kullanılabilir.", "tags": ["ai-prompt", "output-schema", "git", "orijinal"], "badge1": "Orijinal AI", "content": "## ÇIKTI ŞEMASI (JSON) — Git\n\nGit alanındaki tüm yanıtlarını **aşağıdaki JSON şemasına göre** ver. Şemadan sapma. Geçersiz JSON üretme.\n\n```json\n{\n  \"konu\": \"string\",\n  \"ozet\": \"string (en fazla 280 karakter)\",\n  \"guven_skoru\": \"number (0.0-1.0)\",\n  \"detaylar\": [\n    {\n      \"baslik\": \"string\",\n      \"icerik\": \"string\",\n      \"kaynak\": \"string | null\",\n      \"kategori\": \"string\"\n    }\n  ],\n  \"sonraki_adim\": \"string\",\n  \"uyari\": \"string | null\",\n  \"meta\": {\n    \"alan\": \"Git\",\n    \"guncellik\": \"string (YYYY-MM)\",\n    \"kaynak_sayisi\": \"number\"\n  }\n}\n```\n\n### Kurallar\n- Belirsizlik varsa `guven_skoru` < 0.7 ver.\n- Kaynağın yoksa `kaynak: null` koy; **uydurma**.\n- `uyari` alanını yanıltıcı olabilecek durumlarda kullan.\n", "source": {"generated": false, "original_ai_prompt": true, "wave": "v3-ai-prompts-500"}}, {"id": 406, "no": "406", "cat": "Temel Git", "name": "DevOps-Ready İnteraktif Rebase Şablonu Metodu", "desc": "mikroservis bağlamında İnteraktif Rebase Şablonu için devops-ready bir metodu. Commit geçmişini düzenlemek için git rebase -i kullanım rehberi. Bu varyant uzman seviye kullanıcılar için optimize edilmiştir.", "tags": ["rebase", "commit", "düzenleme", "mikroservis", "devops-ready", "uzman"], "badge1": "Uzman", "content": "## İnteraktif Rebase\n```bash\n# Son 5 commit'i düzenle\ngit rebase -i HEAD~5\n\n# Komutlar:\n# pick   → olduğu gibi bırak\n# reword → mesajı değiştir\n# squash → öncekiyle birleştir\n# fixup  → squash ama mesajı at\n# drop   → commit'i sil\n# edit   → durakla, değiştir\n\n# Örnek: 3 commit'i 1'e sıkıştır\n# pick abc123 ilk commit\n# squash def456 ikinci\n# squash ghi789 üçüncü\n\n# Devam\ngit rebase --continue\ngit rebase --abort  # İptal\n```\n\n## Genişletilmiş Notlar (DevOps-Ready)\n\n- **Hedef Kitle:** Uzman seviye mikroservis kullanıcıları\n- **Uygulama Alanı:** mikroservis ekosisteminde İnteraktif Rebase Şablonu senaryoları\n- **Avantajları:** Bu metodu sayesinde İnteraktif Rebase Şablonu işlemleri daha devops-ready hale gelir; özellikle ölçek büyüdükçe fark hissedilir.\n- **Riskler:** Yanlış kullanım durumunda performans düşüşü, karmaşıklık artışı veya bakım yükü oluşabilir.\n- **Önerilen Adımlar:**\n  1. Mevcut mikroservis mimarinizde İnteraktif Rebase Şablonu ihtiyacını analiz edin.\n  2. Bu metodu'i pilot bir modülde test edin.\n  3. Metrikleri (uzman seviyede) ölçün: latency, throughput, hata oranı.\n  4. Üretime kademeli geçiş yapın, gerekirse feature flag ile.\n  5. Dokümantasyon ve runbook hazırlayın.\n- **Karşılaştırma:** Klasik yaklaşıma göre %20-40 verim artışı raporlanmıştır.\n- **İlgili Konular:** rebase, commit, düzenleme\n", "source": {"generated": true, "variant_of": 1, "wave": "v3-450-final"}}, {"id": 407, "no": "407", "cat": "Temel Git", "name": "Type-Safe Git Stash Gelişmiş Pratiği", "desc": "veri bağlamında Git Stash Gelişmiş için type-safe bir pratiği. Çoklu stash yönetimi, isimli stash ve kısmi stash işlemleri. Bu varyant i̇leri seviye kullanıcılar için optimize edilmiştir.", "tags": ["stash", "geçici", "kayıt", "veri", "type-safe", "i̇leri"], "badge1": "İleri", "content": "## Git Stash\n```bash\n# Stash ile kaydet\ngit stash push -m 'WIP: kullanıcı formu'\ngit stash push --include-untracked\n\n# Listele\ngit stash list\n# stash@{0}: WIP: kullanıcı formu\n\n# Belirli stash'i uygula\ngit stash apply stash@{0}\ngit stash pop stash@{1}  # Uygula + sil\n\n# Belirli dosyaları stash\ngit stash push -p  # İnteraktif\ngit stash push -- src/feature.js\n\n
